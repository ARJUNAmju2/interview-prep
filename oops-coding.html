code:`public class BankAccount
{
    private decimal _balance;
    public string Owner { get; }

    public BankAccount(string owner, decimal initial)
    {
        Owner = owner;
        _balance = initial >= 0 ? initial : 0;
    }

    public decimal Balance => _balance;

    public bool Deposit(decimal amount)
    {
        if (amount <= 0) return false;
        _balance += amount;
        return true;
    }

    public bool Withdraw(decimal amount)
    {
        if (amount <= 0 || amount > _balance) return false;
        _balance -= amount;
        return true;
    }

    public override string ToString()
        => $"{Owner} | Balance: {_balance:C}";
}

// Usage

acc.Withdraw(1500);
Console.WriteLine(acc);           // Ravi | Balance: ₹5,500.00

{

q:"Implement Generic Repository Pattern with CRUD operations.",
tag:"gen",tagName:"Generics",
code:`public interface IEntity
{
    int Id { get; set; }
}

public class Product : IEntity
{
    public int Id { get; set; }
    public string Name { get; set; }
    public decimal Price { get; set; }
    public override string ToString() => $"[{Id}] {Name} - ₹{Price}";
}

// Generic Repository — works with ANY entity
public class Repository<T> where T : class, IEntity
{
    private readonly List<T> _data = new();
    private int _nextId = 1;

    public void Add(T item) { item.Id = _nextId++; _data.Add(item); }
    public T GetById(int id) => _data.FirstOrDefault(x => x.Id == id);
    public List<T> GetAll() => _data.ToList();
    public bool Delete(int id) => _data.RemoveAll(x => x.Id == id) > 0;

    public void Update(T item)
    {
        var idx = _data.FindIndex(x => x.Id == item.Id);
        if (idx >= 0) _data[idx] = item;
    }
}

// Usage
var repo = new Repository<Product>();
repo.Add(new Product { Name = "Laptop", Price = 50000 });
repo.Add(new Product { Name = "Mouse", Price = 500 });
repo.Add(new Product { Name = "Keyboard", Price = 1500 });

repo.GetAll().ForEach(Console.WriteLine);
// [1] Laptop - ₹50000
// [2] Mouse - ₹500
// [3] Keyboard - ₹1500

repo.Delete(2);
repo.Update(new Product { Id = 1, Name = "Laptop Pro", Price = 75000 });

Console.WriteLine("--- After Update ---");
repo.GetAll().ForEach(Console.WriteLine);
// [1] Laptop Pro - ₹75000
// [3] Keyboard - ₹1500`

q:"Implement IDisposable pattern — FileManager class that properly cleans up resources.",
tag:"enc",tagName:"Encapsulation",
code:`public class FileManager : IDisposable
{
    private StreamWriter _writer;
    private bool _disposed = false;

    public FileManager(string path)
    {
        _writer = new StreamWriter(path);
        Console.WriteLine("File opened");
    }

    public void Write(string text)
    {
        if (_disposed) throw new ObjectDisposedException(nameof(FileManager));
        _writer.WriteLine(text);
    }

    public void Dispose()
    {
        Dispose(true);
        GC.SuppressFinalize(this);
    }

    protected virtual void Dispose(bool disposing)
    {
        if (!_disposed)
        {
            if (disposing)
            {
                _writer?.Close();
                _writer?.Dispose();
            }
            _disposed = true;
            Console.WriteLine("File closed & resources freed");
        }
    }

    ~FileManager() => Dispose(false);
}

// Usage with using statement — auto Dispose!
using (var fm = new FileManager("log.txt"))
{
    fm.Write("Line 1");
    fm.Write("Line 2");
}  // Dispose() called automatically here!

// C# 8+ simplified
using var fm2 = new FileManager("log2.txt");
fm2.Write("Hello");
// Dispose() called when fm2 goes out of scope`

q:"Implement Observer Pattern using Events — Stock price alert system.",
tag:"del",tagName:"Delegates",
code:`public class Stock
{
    public string Symbol { get; }
    private decimal _price;

    public event Action<string, decimal> OnPriceChanged;

    public Stock(string symbol, decimal price)
    {
        Symbol = symbol;
        _price = price;
    }

    public decimal Price
    {
        get => _price;
        set
        {
            if (_price != value)
            {
                _price = value;
                OnPriceChanged?.Invoke(Symbol, _price);
            }
        }
    }
}

public class EmailAlert
{
    public void Notify(string symbol, decimal price)
        => Console.WriteLine($"📧 Email: {symbol} is now ₹{price}");
}

public class SmsAlert
{
    public void Notify(string symbol, decimal price)
        => Console.WriteLine($"📱 SMS: {symbol} is now ₹{price}");
}

// Usage
var tcs = new Stock("TCS", 3500);
var email = new EmailAlert();
var sms = new SmsAlert();

tcs.OnPriceChanged += email.Notify;  // Subscribe
tcs.OnPriceChanged += sms.Notify;

tcs.Price = 3600;
// 📧 Email: TCS is now ₹3600
// 📱 SMS: TCS is now ₹3600

tcs.OnPriceChanged -= sms.Notify;    // Unsubscribe SMS
tcs.Price = 3700;
// 📧 Email: TCS is now ₹3700`
},

public sealed class AppConfig
{
    private readonly Dictionary<string, string> _settings = new();

// Immutable class (like String) — sealed + readonly
public sealed class Money
{
    public decimal Amount { get; }
    public string Currency { get; }

    public Money(decimal amount, string currency)
    {
        Amount = amount;
        Currency = currency;
    }

    // Returns NEW object instead of modifying
    public Money Add(Money other)
    {
        if (Currency != other.Currency)
            throw new InvalidOperationException("Currency mismatch");
        return new Money(Amount + other.Amount, Currency);
    }

    public override string ToString() => $"{Currency} {Amount}";
}

public class Person
{
    public string Name { get; set; }

    public Person ShallowCopy() => (Person)MemberwiseClone();

    public Person DeepCopy() => new Person
    {
        Name = this.Name,
        Addr = new Address { City = this.Addr.City }
    };
}

// INTERVIEW QUESTION: What is the output?

// p1: Ravi, Delhi    ← ✅ NOT affected (independent copy)`

tag:"dp",tagName:"Design Pattern",
code:`public abstract class Pizza
{
    public abstract string Description { get; }
    public abstract decimal Cost();
}

public class BasePizza : Pizza
{
    public override string Description => "Base Pizza";
    public override decimal Cost() => 200;
}

// Decorator base
public abstract class ToppingDecorator : Pizza
{
    protected readonly Pizza _pizza;
    protected ToppingDecorator(Pizza pizza) => _pizza = pizza;
}

public class Cheese : ToppingDecorator
{
    public Cheese(Pizza p) : base(p) { }
    public override string Description => _pizza.Description + " + Cheese";
    public override decimal Cost() => _pizza.Cost() + 50;
}

public class Mushroom : ToppingDecorator
{
    public Mushroom(Pizza p) : base(p) { }
    public override string Description => _pizza.Description + " + Mushroom";
    public override decimal Cost() => _pizza.Cost() + 40;
}

public class Pepperoni : ToppingDecorator
{
    public Pepperoni(Pizza p) : base(p) { }
    public override string Description => _pizza.Description + " + Pepperoni";
    public override decimal Cost() => _pizza.Cost() + 60;
}

// Usage — stack decorators dynamically!
Pizza order = new BasePizza();
order = new Cheese(order);
order = new Mushroom(order);
order = new Pepperoni(order);

Console.WriteLine(order.Description);
// Base Pizza + Cheese + Mushroom + Pepperoni
Console.WriteLine($"Total: ₹{order.Cost()}");
// Total: ₹350`

function gp(){return JSON.parse(localStorage.getItem('oops_code_prog')||'{}')}
function sp(p){localStorage.setItem('oops_code_prog',JSON.stringify(p))}
function tog(i){const p=gp();p[i]=!p[i];sp(p);render()}

let openIdx=-1;
function togOpen(i){openIdx=openIdx===i?-1:i;render()}

function render(){
  const p=gp();
  const done=QS.filter((_,i)=>p[i]).length;
  document.getElementById('prog').textContent=done+'/'+QS.length+' Covered';
  document.getElementById('barFill').style.width=(done/QS.length*100)+'%';

  document.getElementById('cards').innerHTML=QS.map((q,i)=>{
    const d=!!p[i],o=openIdx===i;
    return `<div class="card ${d?'done':''}">
      <div class="card-head" onclick="togOpen(${i})">
        <div class="num">${i+1}</div>
        <div class="title">${q.q}<span class="tag ${q.tag}">${q.tagName}</span></div>
        <div class="arrow ${o?'open':''}">▼</div>
        <div class="chk" onclick="event.stopPropagation();tog(${i})">${d?'✅':'⬜'}</div>
      </div>
      <div class="body ${o?'open':''}"><pre>${q.code}</pre></div>
    </div>`;
  }).join('');
}
render();

function exportCodePDF() {
  const p = gp();
  const w = window.open('', '_blank');
  let html = '<table style="width:100%;border-collapse:collapse"><tr><th style="background:#0ea5e9;color:#fff;padding:8px;border:1px solid #ddd">#</th><th style="background:#0ea5e9;color:#fff;padding:8px;border:1px solid #ddd">Question</th><th style="background:#0ea5e9;color:#fff;padding:8px;border:1px solid #ddd">Concept</th><th style="background:#0ea5e9;color:#fff;padding:8px;border:1px solid #ddd">Status</th></tr>';
  QS.forEach((q, i) => {
    const done = !!p[i];
    html += `<tr><td style="border:1px solid #ddd;padding:6px">${i+1}</td><td style="border:1px solid #ddd;padding:6px">${q.q}</td><td style="border:1px solid #ddd;padding:6px">${q.tagName}</td><td style="border:1px solid #ddd;padding:6px;color:${done?'green':'red'};font-weight:700">${done?'\u2705 Covered':'\u2b1c Pending'}</td></tr>`;
    html += `<tr><td colspan="4" style="border:1px solid #ddd;padding:8px"><pre style="background:#1e1e2e;color:#cdd6f4;padding:10px;border-radius:6px;font-size:12px;overflow-x:auto;white-space:pre-wrap">${q.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></td></tr>`;
  });
  html += '</table>';
  const d = QS.filter((_,i) => p[i]).length;
  w.document.write(`<html><head><title>OOPs Coding Report</title><style>body{font-family:Segoe UI,sans-serif;padding:30px}h1{color:#0369a1}pre{font-family:Consolas,monospace}</style></head><body><h1>\ud83d\udcbb OOPs Coding Questions Report</h1><p><b>Progress: ${d}/${QS.length}</b></p>${html}<script>window.print();<\/script></body></html>`);
  w.document.close();
}

function exportCodeExcel() {
  const p = gp();
  let csv = '#,Question,Concept,Status\n';
  QS.forEach((q, i) => {
    csv += `${i+1},"${q.q.replace(/"/g,'""')}","${q.tagName}","${p[i]?'Covered':'Pending'}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'OOPs_Coding_Report.csv';
  a.click();
}
