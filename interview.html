{q:"What is C# and what are its key features?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; C# is a <span class="key">modern, object-oriented, type-safe</span> language developed by Microsoft.<br>&#9733; Key features include <span class="key">OOP support</span>, <span class="key">garbage collection</span>, <span class="key">LINQ</span>, <span class="key">async/await</span>, <span class="key">cross-platform</span> with .NET Core, and strong <span class="key">type safety</span> that catches errors at compile time.</div><div class="tip">💡 <b>Versions:</b> Latest is C# 12 with .NET 8. Know at least 2-3 new features like records, pattern matching, global usings.</div>'},
{q:"What is the difference between Value Types and Reference Types?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Value types</span> store data directly in Stack memory — each variable has its own copy.<br>&#9733; <span class="key">Reference types</span> store a reference/pointer in Stack that points to the actual object in Heap memory — multiple variables can point to the same object.<br>&#9733; Value types: int, bool, struct.<br>&#9733; Reference types: class, string, array.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Value Type - each has OWN copy</span><br><span class="kw">int</span> a = 10;<br><span class="kw">int</span> b = a;<br>b = 20;<br>Console.WriteLine(a); <span class="cm">// 10 ✅ unchanged</span><br><br><span class="cm">// Reference Type - both point to SAME object</span><br><span class="kw">int</span>[] arr1 = { 1, 2, 3 };<br><span class="kw">int</span>[] arr2 = arr1;<br>arr2[0] = 99;<br>Console.WriteLine(arr1[0]); <span class="cm">// 99 😱 changed!</span></div><div class="tip">💡 <b>Trick:</b> string is a reference type but BEHAVES like value type because it is immutable. This is a common interview question!</div>'},
{q:"What is Boxing and Unboxing?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Boxing</span> is converting a value type to object type — the value moves from Stack to Heap.<br>&#9733; <span class="key">Unboxing</span> is the reverse — extracting the value type from the object.<br>&#9733; Both are <b>expensive operations</b> because they involve memory allocation and copying.<br>&#9733; We should avoid them using <span class="key">Generics</span> (List&lt;int&gt; instead of ArrayList).</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Boxing - value type to object (SLOW)</span><br><span class="kw">int</span> num = 42;<br><span class="kw">object</span> obj = num; <span class="cm">// 📥 Boxing happens here</span><br><br><span class="cm">// Unboxing - object back to value type</span><br><span class="kw">int</span> result = (<span class="kw">int</span>)obj; <span class="cm">// 📤 Unboxing happens here</span><br><br><span class="cm">// ⚠️ Wrong unboxing = CRASH!</span><br><span class="cm">// double d = (double)obj; // InvalidCastException!</span></div><div class="tip">💡 <b>Why avoid?</b> Boxing creates a new object on Heap = slow + GC pressure. ArrayList boxes everything, List&lt;T&gt; does NOT. This is why Generics were introduced!</div>'},
{q:"What is the difference between String and StringBuilder?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">String</span> is immutable — every modification creates a new object in memory, making it slow for repeated changes.<br>&#9733; <span class="key">StringBuilder</span> is mutable — it modifies the same internal buffer, making it much faster for concatenation in loops.<br>&#9733; Use String for few changes, StringBuilder for many.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// String - SLOW (creates new object each time)</span><br><span class="kw">string</span> s = <span class="str">""</span>;<br><span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt; 1000; i++)<br>&nbsp;&nbsp;s += <span class="str">"hello "</span>; <span class="cm">// 1000 new strings! 💥</span><br><br><span class="cm">// StringBuilder - FAST (modifies same object)</span><br><span class="kw">var</span> sb = <span class="kw">new</span> StringBuilder();<br><span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt; 1000; i++)<br>&nbsp;&nbsp;sb.Append(<span class="str">"hello "</span>); <span class="cm">// 1 object only! 🚀</span><br><span class="kw">string</span> result = sb.ToString();</div><div class="tip">💡 <b>Rule of thumb:</b> Less than 5 changes = use String. More than 5 or inside a loop = use StringBuilder. This is a very common interview question!</div>'},
{q:"What is the difference between == and .Equals()?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; For <span class="key">value types</span>, both == and .Equals() compare values.<br>&#9733; For <span class="key">reference types</span>, == compares memory references (are they the same object?) while .Equals() compares content (can be overridden).<br>&#9733; <span class="key">string</span> is special — == is overloaded to compare content.<br>&#9733; Also, .Equals() can throw NullReferenceException if called on null, but == handles null safely.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Value Types - both work same</span><br><span class="kw">int</span> a = 5, b = 5;<br>Console.WriteLine(a == b); <span class="cm">// True ✅</span><br>Console.WriteLine(a.Equals(b)); <span class="cm">// True ✅</span><br><br><span class="cm">// Reference Types - DIFFERENT!</span><br><span class="kw">object</span> x = <span class="kw">new</span> Person(<span class="str">"Arjun"</span>);<br><span class="kw">object</span> y = <span class="kw">new</span> Person(<span class="str">"Arjun"</span>);<br>Console.WriteLine(x == y); <span class="cm">// False ❌ (different address)</span><br>Console.WriteLine(x.Equals(y)); <span class="cm">// True ✅ (if Equals overridden)</span><br><br><span class="cm">// String - special case</span><br><span class="kw">string</span> s1 = <span class="str">"hello"</span>;<br><span class="kw">string</span> s2 = <span class="str">"hello"</span>;<br>Console.WriteLine(s1 == s2); <span class="cm">// True ✅ (== overloaded)</span><br>Console.WriteLine(s1.Equals(s2)); <span class="cm">// True ✅</span></div><div class="tip">💡 <b>Null Safety:</b> "hello".Equals(null) = False ✅ | null.Equals("hello") = NullReferenceException 💥 | null == null = True ✅</div>'},
{q:"What are Nullable Types? How do you use the ? operator?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Nullable types</span> allow value types to hold null using the <b>?</b> syntax (int?, bool?).<br>&#9733; Internally it is <b>Nullable&lt;T&gt;</b> struct.<br>&#9733; You check with <span class="key">.HasValue</span> and get data with <span class="key">.Value</span>.<br>&#9733; The <b>??</b> operator provides a default value when null, and <b>?.</b> safely accesses members on nullable objects.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">int</span>? age = <span class="kw">null</span>; <span class="cm">// Nullable int</span><br><span class="kw">bool</span>? isActive = <span class="kw">null</span>; <span class="cm">// Nullable bool</span><br><br><span class="cm">// Check if has value</span><br><span class="kw">if</span>(age.HasValue)<br>&nbsp;&nbsp;Console.WriteLine(age.Value);<br><br><span class="cm">// Null Coalescing - give default if null</span><br><span class="kw">int</span> result = age ?? 0; <span class="cm">// If null, use 0</span><br><br><span class="cm">// Null Conditional</span><br><span class="kw">int</span>? len = name?.Length; <span class="cm">// If name is null, len = null</span></div><div class="tip">💡 <b>Real use:</b> Database columns can be NULL. When mapping to C#, you need int? for nullable DB columns. EF Core uses this heavily!</div>'},
{q:"What is the difference between const and readonly?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">const</span> is a compile-time constant — value must be assigned at declaration, is implicitly static, and only works with primitive types.<br>&#9733; <span class="key">readonly</span> is a runtime constant — can be assigned in declaration or constructor, works with any type including objects.<br>&#9733; Use const for values that never change like PI, use readonly for values set once at runtime like connection strings.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Config {<br>&nbsp;&nbsp;<span class="kw">const double</span> PI = 3.14; <span class="cm">// Must assign here</span><br>&nbsp;&nbsp;<span class="kw">readonly</span> DateTime _created; <span class="cm">// Can assign in ctor</span><br><br>&nbsp;&nbsp;<span class="kw">public</span> Config() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_created = DateTime.Now; <span class="cm">// ✅ OK in constructor</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// PI = 3.15; // ❌ ERROR! const cannot change</span><br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">void</span> Test() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// _created = DateTime.Now; // ❌ ERROR! readonly</span><br>&nbsp;&nbsp;}<br>}</div><div class="tip">💡 <b>DLL Trap:</b> If you change a const value in a library, all consuming projects must be RECOMPILED. readonly does not have this problem!</div>'},
{q:"What is an Enum? When would you use it?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; An <span class="key">Enum</span> is a value type that defines a set of named integer constants.<br>&#9733; It improves <b>code readability</b>, provides <b>type safety</b> (cant assign random numbers), and is commonly used for status codes, days, roles, etc.<br>&#9733; By default values start from 0 but can be customized.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">enum</span> Status { Active, Inactive, Suspended }<br><span class="cm">// Active=0, Inactive=1, Suspended=2 (auto)</span><br><br><span class="kw">enum</span> Priority { Low = 1, Medium = 5, High = 10 }<br><span class="cm">// Custom values</span><br><br>Status s = Status.Active;<br><span class="kw">int</span> val = (<span class="kw">int</span>)s; <span class="cm">// 0</span><br><span class="kw">string</span> name = s.ToString(); <span class="cm">// "Active"</span><br><br><span class="cm">// Parse from string</span><br>Status parsed = Enum.Parse&lt;Status&gt;(<span class="str">"Inactive"</span>);</div><div class="tip">💡 <b>Use [Flags] for bitwise:</b> [Flags] enum Permissions { Read=1, Write=2, Delete=4 } allows combining: Read | Write = 3</div>'},
{q:"What is the difference between Array and ArrayList?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Array</span> is fixed-size and strongly typed.<br>&#9733; <span class="key">ArrayList</span> is dynamic but stores objects, causing boxing/unboxing and no type safety.<br>&#9733; In modern C#, we use <span class="key">List&lt;T&gt;</span> which combines the best of both — dynamic size with type safety and no boxing.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Array - fixed size, typed</span><br><span class="kw">int</span>[] arr = <span class="kw">new int</span>[3] { 1, 2, 3 };<br><span class="cm">// arr[3] = 4; // ❌ IndexOutOfRange!</span><br><br><span class="cm">// ArrayList - dynamic, NOT typed (avoid!)</span><br>ArrayList list = <span class="kw">new</span> ArrayList();<br>list.Add(1); list.Add(<span class="str">"hello"</span>); <span class="cm">// 😱 mixed types</span><br><span class="kw">int</span> val = (<span class="kw">int</span>)list[0]; <span class="cm">// Unboxing needed</span><br><br><span class="cm">// List&lt;T&gt; - BEST choice! ⭐</span><br>List&lt;<span class="kw">int</span>&gt; nums = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;() { 1, 2, 3 };<br>nums.Add(4); <span class="cm">// ✅ Dynamic</span><br><span class="cm">// nums.Add("hello"); // ❌ Compile error - type safe!</span></div><div class="tip">💡 <b>Interview tip:</b> Always mention List&lt;T&gt; as the modern replacement. Shows you know current best practices!</div>'},
{q:"What is a Namespace and why is it used?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Namespace</span> is a logical grouping of related classes, interfaces, and other types.<br>&#9733; It prevents <span class="key">naming conflicts</span> — two classes can have the same name if they are in different namespaces.<br>&#9733; We use the <b>using</b> directive to import namespaces.<br>&#9733; Common examples: System, System.Collections.Generic, System.Linq.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Defining namespace</span><br><span class="kw">namespace</span> MyApp.Models {<br>&nbsp;&nbsp;<span class="kw">class</span> User { <span class="kw">public string</span> Name; }<br>}<br><br><span class="kw">namespace</span> ThirdParty.Auth {<br>&nbsp;&nbsp;<span class="kw">class</span> User { <span class="kw">public string</span> Token; } <span class="cm">// Same name, no conflict!</span><br>}<br><br><span class="cm">// Using namespace</span><br><span class="kw">using</span> MyApp.Models;<br>User u = <span class="kw">new</span> User(); <span class="cm">// Uses MyApp.Models.User</span><br><br><span class="cm">// Full path to avoid confusion</span><br><span class="kw">var</span> u2 = <span class="kw">new</span> ThirdParty.Auth.User();</div><div class="tip">💡 <b>C# 10+ Feature:</b> File-scoped namespace — <code>namespace MyApp.Models;</code> (no curly braces needed, saves indentation!)</div>'},
{q:"What are Properties? Difference between auto and full properties?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Properties</span> provide controlled access to fields using get/set accessors.<br>&#9733; <span class="key">Auto properties</span> are shorthand where compiler generates the backing field.<br>&#9733; <span class="key">Full properties</span> have explicit backing field and allow custom logic like validation.<br>&#9733; Use auto for simple data, full when you need logic.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Auto Property - short and clean</span><br><span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br><span class="kw">public int</span> Age { <span class="kw">get</span>; <span class="kw">private set</span>; } <span class="cm">// read outside, set inside only</span><br><br><span class="cm">// Full Property - with validation logic</span><br><span class="kw">private int</span> _age;<br><span class="kw">public int</span> Age {<br>&nbsp;&nbsp;<span class="kw">get</span> { <span class="kw">return</span> _age; }<br>&nbsp;&nbsp;<span class="kw">set</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(value &lt; 0 || value &gt; 150)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">throw new</span> ArgumentException(<span class="str">"Invalid age"</span>);<br>&nbsp;&nbsp;&nbsp;&nbsp;_age = value;<br>&nbsp;&nbsp;}<br>}</div>'},
{q:"What is the difference between ref and out parameters?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Both pass by reference.<br>&#9733; <span class="key">ref</span> requires the variable to be initialized before passing — used for two-way data.<br>&#9733; <span class="key">out</span> does not require initialization but the method must assign a value — used when method returns multiple values.<br>&#9733; Common example: int.TryParse uses out.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ref - must initialize before passing</span><br><span class="kw">void</span> Double(<span class="kw">ref int</span> x) { x = x * 2; }<br><span class="kw">int</span> num = 5; <span class="cm">// MUST initialize!</span><br>Double(<span class="kw">ref</span> num); <span class="cm">// num = 10</span><br><br><span class="cm">// out - no need to initialize, method MUST assign</span><br><span class="kw">void</span> GetValues(<span class="kw">out int</span> x, <span class="kw">out int</span> y) {<br>&nbsp;&nbsp;x = 10; y = 20; <span class="cm">// MUST assign both!</span><br>}<br><span class="kw">int</span> a, b; <span class="cm">// no initialization needed</span><br>GetValues(<span class="kw">out</span> a, <span class="kw">out</span> b);<br><br><span class="cm">// Common use: TryParse pattern</span><br><span class="kw">if</span>(<span class="kw">int</span>.TryParse(<span class="str">"123"</span>, <span class="kw">out int</span> result))<br>&nbsp;&nbsp;Console.WriteLine(result); <span class="cm">// 123</span></div>'},
{q:"What is the difference between throw and throw ex?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">throw</span> (without variable) preserves the original stack trace — always use this for rethrowing.<br>&#9733; <span class="key">throw ex</span> resets the stack trace to the current line — you lose the original error location.<br>&#9733; This is a very common interview question and a common bug in production code!</div><h4>💻 Code Example</h4><div class="code"><span class="kw">try</span> {<br>&nbsp;&nbsp;SomeMethod(); <span class="cm">// error happens here at line 50</span><br>}<br><span class="kw">catch</span>(Exception ex) {<br>&nbsp;&nbsp;<span class="cm">// ✅ GOOD - preserves original stack trace</span><br>&nbsp;&nbsp;<span class="kw">throw</span>; <span class="cm">// stack trace shows line 50</span><br><br>&nbsp;&nbsp;<span class="cm">// ❌ BAD - resets stack trace</span><br>&nbsp;&nbsp;<span class="kw">throw</span> ex; <span class="cm">// stack trace shows THIS line, not 50!</span><br><br>&nbsp;&nbsp;<span class="cm">// ✅ ALSO GOOD - wrap with new exception</span><br>&nbsp;&nbsp;<span class="kw">throw new</span> ApplicationException(<span class="str">"Failed"</span>, ex);<br>}</div>'},
{q:"What is type casting? Explain implicit and explicit casting.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Implicit casting</span> is automatic and safe — smaller to larger type (int to double).<br>&#9733; <span class="key">Explicit casting</span> requires (type) syntax and may lose data — larger to smaller.<br>&#9733; For reference types, use <span class="key">as</span> (returns null on failure) or <span class="key">is</span> (pattern matching) for safe casting.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Implicit - automatic, no data loss</span><br><span class="kw">int</span> num = 100;<br><span class="kw">double</span> d = num; <span class="cm">// ✅ auto: int → double (100.0)</span><br><br><span class="cm">// Explicit - manual cast, may lose data</span><br><span class="kw">double</span> price = 99.99;<br><span class="kw">int</span> rounded = (<span class="kw">int</span>)price; <span class="cm">// 99 ⚠️ lost .99!</span><br><br><span class="cm">// Reference type casting</span><br>Animal a = <span class="kw">new</span> Dog(); <span class="cm">// implicit (upcasting)</span><br>Dog d = (Dog)a; <span class="cm">// explicit (downcasting)</span><br><br><span class="cm">// Safe casting with as/is</span><br>Dog d2 = a <span class="kw">as</span> Dog; <span class="cm">// returns null if fails</span><br><span class="kw">if</span>(a <span class="kw">is</span> Dog dog) { } <span class="cm">// pattern matching</span></div>'},
{q:"What is the purpose of the using statement?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">using directive</span> imports namespaces.<br>&#9733; The <span class="key">using statement</span> ensures IDisposable objects are properly disposed — it calls Dispose() automatically at the end of the block.<br>&#9733; In C# 8+, using declaration (without braces) disposes when the variable goes out of scope.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Import namespace</span><br><span class="kw">using</span> System;<br><span class="kw">using</span> System.Collections.Generic;<br><br><span class="cm">// 2. Auto-dispose (classic)</span><br><span class="kw">using</span>(<span class="kw">var</span> reader = <span class="kw">new</span> StreamReader(<span class="str">"file.txt"</span>)) {<br>&nbsp;&nbsp;<span class="kw">string</span> content = reader.ReadToEnd();<br>} <span class="cm">// Dispose() called automatically here!</span><br><br><span class="cm">// 2. Auto-dispose (C# 8+ simplified)</span><br><span class="kw">using var</span> conn = <span class="kw">new</span> SqlConnection(connStr);<br>conn.Open();<br><span class="cm">// Dispose() called when method ends</span></div>'},
{q:"What is the var keyword? Is it dynamic typing?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">var</span> is implicit typing, NOT dynamic.<br>&#9733; The compiler determines the type at compile time and it cannot change.<br>&#9733; <span class="key">dynamic</span> bypasses compile-time checking and resolves at runtime. var is just syntactic sugar for readability — the IL code is identical to explicit typing.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// var - compiler infers type at COMPILE time</span><br><span class="kw">var</span> name = <span class="str">"Arjun"</span>; <span class="cm">// compiler knows its string</span><br><span class="kw">var</span> age = 28; <span class="cm">// compiler knows its int</span><br><span class="cm">// name = 123; // ❌ ERROR! name is string, cant assign int</span><br><br><span class="cm">// dynamic - resolved at RUNTIME</span><br><span class="kw">dynamic</span> x = <span class="str">"hello"</span>;<br>x = 123; <span class="cm">// ✅ no error! type changes at runtime</span><br>x = <span class="kw">true</span>; <span class="cm">// ✅ anything goes!</span><br><br><span class="cm">// var is useful for long type names</span><br><span class="kw">var</span> dict = <span class="kw">new</span> Dictionary&lt;<span class="kw">string</span>, List&lt;<span class="kw">int</span>&gt;&gt;();<br><span class="cm">// instead of: Dictionary&lt;string, List&lt;int&gt;&gt; dict = ...</span></div>'},
{q:"What is the difference between is and as keyword?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">is</span> checks type compatibility and returns bool.<br>&#9733; With C# 7+ pattern matching, it can check and cast in one step.<br>&#9733; <span class="key">as</span> attempts a safe cast and returns null on failure instead of throwing an exception.<br>&#9733; Use is for type checking, as for safe casting.<br>&#9733; Direct cast (Type) throws InvalidCastException on failure.</div><h4>💻 Code Example</h4><div class="code">Animal a = <span class="kw">new</span> Dog();<br><br><span class="cm">// is - checks type (returns bool)</span><br><span class="kw">if</span>(a <span class="kw">is</span> Dog) { Console.WriteLine(<span class="str">"Its a dog"</span>); }<br><br><span class="cm">// is with pattern matching (C# 7+)</span><br><span class="kw">if</span>(a <span class="kw">is</span> Dog d) { d.Bark(); } <span class="cm">// check + cast in one!</span><br><br><span class="cm">// as - safe cast (returns null if fails)</span><br>Dog dog = a <span class="kw">as</span> Dog; <span class="cm">// dog or null</span><br><span class="kw">if</span>(dog != <span class="kw">null</span>) { dog.Bark(); }<br><br><span class="cm">// Direct cast - throws exception if fails!</span><br>Dog d2 = (Dog)a; <span class="cm">// InvalidCastException if not Dog!</span></div>'},
// Intermediate
{q:"What are Delegates? Explain Multicast Delegates.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Delegate</span> is a type-safe function pointer that holds method references.<br>&#9733; <span class="key">Multicast delegates</span> use += to chain multiple methods — invoking the delegate calls all methods in order.<br>&#9733; They are the foundation of <span class="key">Events</span> in C#.<br>&#9733; Built-in delegates: Action (void), Func (returns value), Predicate (returns bool).</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Declare delegate type</span><br><span class="kw">delegate void</span> Notify(<span class="kw">string</span> msg);<br><br><span class="cm">// Single delegate</span><br>Notify n = (msg) =&gt; Console.WriteLine(<span class="str">"Email: "</span> + msg);<br>n(<span class="str">"Order placed"</span>); <span class="cm">// Email: Order placed</span><br><br><span class="cm">// Multicast - chain multiple methods with +=</span><br>Notify multi = (msg) =&gt; Console.WriteLine(<span class="str">"Email: "</span> + msg);<br>multi += (msg) =&gt; Console.WriteLine(<span class="str">"SMS: "</span> + msg);<br>multi += (msg) =&gt; Console.WriteLine(<span class="str">"Push: "</span> + msg);<br><br>multi(<span class="str">"Order placed"</span>);<br><span class="cm">// Email: Order placed</span><br><span class="cm">// SMS: Order placed</span><br><span class="cm">// Push: Order placed</span><br><span class="cm">// All 3 methods called!</span></div>'},
{q:"What are Events and how do they differ from Delegates?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Events</span> are delegates with encapsulation.<br>&#9733; Key difference: delegates can be invoked by anyone, events can only be invoked by the declaring class.<br>&#9733; Subscribers can only += or -=.<br>&#9733; Events implement the <span class="key">Observer Pattern</span> and provide loose coupling between publisher and subscribers.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="cm">// Delegate - anyone can invoke ❌ unsafe</span><br>&nbsp;&nbsp;<span class="kw">public</span> Action&lt;<span class="kw">string</span>&gt; OnOrderDelegate;<br><br>&nbsp;&nbsp;<span class="cm">// Event - only this class can invoke ✅ safe</span><br>&nbsp;&nbsp;<span class="kw">public event</span> Action&lt;<span class="kw">string</span>&gt; OnOrderEvent;<br><br>&nbsp;&nbsp;<span class="kw">public void</span> PlaceOrder() {<br>&nbsp;&nbsp;&nbsp;&nbsp;OnOrderEvent?.Invoke(<span class="str">"Order #123"</span>); <span class="cm">// ✅ owner can invoke</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="kw">var</span> svc = <span class="kw">new</span> OrderService();<br>svc.OnOrderEvent += (msg) =&gt; Console.WriteLine(msg); <span class="cm">// ✅ subscribe</span><br><span class="cm">// svc.OnOrderEvent("hack"); // ❌ cannot invoke from outside!</span><br><span class="cm">// svc.OnOrderDelegate("hack"); // ✅ delegate allows this ❌ unsafe!</span></div>'},
{q:"Explain async and await. How does asynchronous programming work?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">async</span> marks a method as asynchronous.<br>&#9733; <span class="key">await</span> pauses execution until the awaited task completes, but frees the thread to do other work.<br>&#9733; Return type is Task (void) or Task&lt;T&gt; (with result).<br>&#9733; It does NOT create new threads — it uses the thread pool efficiently.<br>&#9733; Use for I/O-bound operations like DB calls, HTTP requests, file I/O.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ Synchronous - blocks thread while waiting</span><br><span class="kw">public string</span> GetData() {<br>&nbsp;&nbsp;<span class="kw">var</span> result = httpClient.GetStringAsync(url).Result; <span class="cm">// BLOCKS!</span><br>&nbsp;&nbsp;<span class="kw">return</span> result;<br>}<br><br><span class="cm">// ✅ Asynchronous - frees thread while waiting</span><br><span class="kw">public async</span> Task&lt;<span class="kw">string</span>&gt; GetDataAsync() {<br>&nbsp;&nbsp;<span class="kw">var</span> result = <span class="kw">await</span> httpClient.GetStringAsync(url); <span class="cm">// frees thread!</span><br>&nbsp;&nbsp;<span class="kw">return</span> result; <span class="cm">// continues after data arrives</span><br>}<br><br><span class="cm">// Multiple async calls in parallel</span><br><span class="kw">var</span> task1 = GetUsersAsync();<br><span class="kw">var</span> task2 = GetOrdersAsync();<br><span class="kw">await</span> Task.WhenAll(task1, task2); <span class="cm">// both run together!</span></div><div class="tip">💡 <b>Rule:</b> async all the way! Dont mix .Result or .Wait() with async — it causes deadlocks!</div>'},
{q:"What is LINQ? Explain Query Syntax vs Method Syntax.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">LINQ</span> provides a unified query syntax for collections, databases, XML.<br>&#9733; <span class="key">Query syntax</span> looks like SQL (from, where, select).<br>&#9733; <span class="key">Method syntax</span> uses extension methods with lambdas (Where, Select, OrderBy).<br>&#9733; Method syntax is more popular and supports more operations.<br>&#9733; Both compile to the same IL code.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">var</span> employees = <span class="kw">new</span> List&lt;Employee&gt; { ... };<br><br><span class="cm">// Query Syntax (SQL-like)</span><br><span class="kw">var</span> result = <span class="kw">from</span> e <span class="kw">in</span> employees<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">where</span> e.Salary &gt; 50000<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">orderby</span> e.Name<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">select</span> e;<br><br><span class="cm">// Method Syntax (Lambda - more popular ⭐)</span><br><span class="kw">var</span> result = employees<br>&nbsp;&nbsp;.Where(e =&gt; e.Salary &gt; 50000)<br>&nbsp;&nbsp;.OrderBy(e =&gt; e.Name)<br>&nbsp;&nbsp;.Select(e =&gt; <span class="kw">new</span> { e.Name, e.Salary });<br><br><span class="cm">// Common LINQ methods</span><br>employees.First(); <span class="cm">// first item</span><br>employees.Count(); <span class="cm">// count</span><br>employees.Any(e =&gt; e.Age &gt; 30); <span class="cm">// true/false</span><br>employees.Sum(e =&gt; e.Salary); <span class="cm">// total</span></div>'},
{q:"What is the difference between IEnumerable and IQueryable?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">IEnumerable</span> executes queries in memory (LINQ to Objects) — good for in-memory collections.<br>&#9733; <span class="key">IQueryable</span> builds expression trees and translates to SQL (LINQ to SQL/EF) — filtering happens at the database.<br>&#9733; Always use IQueryable with EF Core for performance.<br>&#9733; IQueryable extends IEnumerable.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// IEnumerable - loads ALL rows, then filters in C#</span><br>IEnumerable&lt;Employee&gt; emps = _db.Employees;<br><span class="kw">var</span> result = emps.Where(e =&gt; e.Salary &gt; 50000);<br><span class="cm">// SQL: SELECT * FROM Employees (ALL rows!)</span><br><span class="cm">// Then C# filters in memory ❌ slow for large data</span><br><br><span class="cm">// IQueryable - builds SQL query, filters at DB</span><br>IQueryable&lt;Employee&gt; emps = _db.Employees;<br><span class="kw">var</span> result = emps.Where(e =&gt; e.Salary &gt; 50000);<br><span class="cm">// SQL: SELECT * FROM Employees WHERE Salary > 50000</span><br><span class="cm">// Only matching rows come to C# ✅ fast!</span></div><div class="tip">💡 <b>Rule:</b> Use IQueryable for database queries (EF Core). Use IEnumerable for in-memory collections (List, Array). This is a TOP interview question!</div>'},
{q:"What are Lambda Expressions? How are they used?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Lambda expressions</span> are inline anonymous functions using => syntax. <b>(parameters) => expression</b>.<br>&#9733; They are used with delegates (Func, Action), LINQ queries, and event handlers.<br>&#9733; Single expression lambdas auto-return the result.<br>&#9733; Multi-line lambdas need curly braces and explicit return.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Full method</span><br><span class="kw">bool</span> IsAdult(<span class="kw">int</span> age) { <span class="kw">return</span> age >= 18; }<br><br><span class="cm">// Lambda - same thing, shorter!</span><br>Func&lt;<span class="kw">int</span>, <span class="kw">bool</span>&gt; isAdult = age =&gt; age >= 18;<br><br><span class="cm">// Used in LINQ (most common)</span><br><span class="kw">var</span> adults = people.Where(p =&gt; p.Age >= 18);<br><span class="kw">var</span> names = people.Select(p =&gt; p.Name);<br><span class="kw">var</span> sorted = people.OrderBy(p =&gt; p.Salary);<br><br><span class="cm">// Multi-line lambda</span><br><span class="kw">var</span> result = people.Where(p =&gt; {<br>&nbsp;&nbsp;<span class="kw">var</span> isActive = p.Status == <span class="str">"Active"</span>;<br>&nbsp;&nbsp;<span class="kw">return</span> isActive &amp;&amp; p.Age > 18;<br>});</div>'},
{q:"What is the difference between Func, Action, and Predicate?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Action</span> is a delegate that returns void — Action&lt;T&gt; takes params, no return.<br>&#9733; <span class="key">Func</span> returns a value — Func&lt;T, TResult&gt; where last type is return type.<br>&#9733; <span class="key">Predicate</span> always returns bool — Predicate&lt;T&gt; is shorthand for Func&lt;T, bool&gt;.<br>&#9733; All three are built-in generic delegates.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Action - returns void</span><br>Action&lt;<span class="kw">string</span>&gt; greet = name =&gt; Console.WriteLine(<span class="str">"Hi "</span> + name);<br>greet(<span class="str">"Arjun"</span>); <span class="cm">// Hi Arjun (no return)</span><br><br><span class="cm">// Func - returns a value (last type = return type)</span><br>Func&lt;<span class="kw">int</span>, <span class="kw">int</span>, <span class="kw">int</span>&gt; add = (a, b) =&gt; a + b;<br><span class="kw">int</span> sum = add(5, 3); <span class="cm">// 8</span><br><br><span class="cm">// Predicate - always returns bool</span><br>Predicate&lt;<span class="kw">int</span>&gt; isEven = n =&gt; n % 2 == 0;<br><span class="kw">bool</span> result = isEven(4); <span class="cm">// true</span><br><br><span class="cm">// In LINQ</span><br>list.ForEach(x =&gt; Console.WriteLine(x)); <span class="cm">// Action</span><br>list.Select(x =&gt; x * 2); <span class="cm">// Func</span><br>list.FindAll(x =&gt; x > 10); <span class="cm">// Predicate</span></div>'},
{q:"What is the difference between Task and Thread?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Thread</span> is a low-level OS thread — expensive to create, manual management.<br>&#9733; <span class="key">Task</span> is a high-level abstraction over the thread pool — lightweight, supports async/await, cancellation, continuation.<br>&#9733; Always prefer Task over Thread in modern C#.<br>&#9733; Task uses ThreadPool internally for efficiency.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Thread - manual, heavy, old way</span><br><span class="kw">var</span> thread = <span class="kw">new</span> Thread(() =&gt; {<br>&nbsp;&nbsp;Console.WriteLine(<span class="str">"Thread running"</span>);<br>});<br>thread.Start();<br>thread.Join(); <span class="cm">// wait to finish</span><br><br><span class="cm">// Task - modern, lightweight, uses thread pool</span><br><span class="kw">var</span> task = Task.Run(() =&gt; {<br>&nbsp;&nbsp;Console.WriteLine(<span class="str">"Task running"</span>);<br>});<br><span class="kw">await</span> task; <span class="cm">// await instead of Join</span><br><br><span class="cm">// Task with return value</span><br>Task&lt;<span class="kw">int</span>&gt; calcTask = Task.Run(() =&gt; 5 + 3);<br><span class="kw">int</span> result = <span class="kw">await</span> calcTask; <span class="cm">// 8</span></div>'},
{q:"What is the yield keyword and how does it work?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">yield return</span> creates an iterator that returns items one at a time (lazy evaluation).<br>&#9733; It doesnt create the entire collection in memory — generates each item on demand.<br>&#9733; The method must return IEnumerable&lt;T&gt;.<br>&#9733; <span class="key">yield break</span> stops iteration early.<br>&#9733; Great for large datasets and infinite sequences.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Without yield - creates entire list in memory</span><br>List&lt;<span class="kw">int</span>&gt; GetEvenNumbers(<span class="kw">int</span> max) {<br>&nbsp;&nbsp;<span class="kw">var</span> list = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;();<br>&nbsp;&nbsp;<span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt;= max; i++)<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(i % 2 == 0) list.Add(i);<br>&nbsp;&nbsp;<span class="kw">return</span> list; <span class="cm">// ALL items at once</span><br>}<br><br><span class="cm">// With yield - returns one at a time (lazy!)</span><br>IEnumerable&lt;<span class="kw">int</span>&gt; GetEvenNumbers(<span class="kw">int</span> max) {<br>&nbsp;&nbsp;<span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt;= max; i++)<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(i % 2 == 0) <span class="kw">yield return</span> i; <span class="cm">// one at a time!</span><br>}<br><br><span class="cm">// yield break - stop early</span><br><span class="kw">yield break</span>; <span class="cm">// exits the iterator</span></div>'},
{q:"What is Reflection in C#? When would you use it?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Reflection</span> allows inspecting metadata of types at runtime — get class names, properties, methods, attributes, and create instances dynamically.<br>&#9733; Used in: <span class="key">DI containers</span>, <span class="key">serialization</span>, <span class="key">ORM mapping</span>, <span class="key">unit test frameworks</span>.<br>&#9733; Downside: slower than direct code, breaks compile-time safety.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">using</span> System.Reflection;<br><br><span class="kw">var</span> emp = <span class="kw">new</span> Employee { Name = <span class="str">"Arjun"</span>, Age = 28 };<br>Type type = emp.GetType();<br><br><span class="cm">// Get class name</span><br>Console.WriteLine(type.Name); <span class="cm">// "Employee"</span><br><br><span class="cm">// Get all properties</span><br><span class="kw">foreach</span>(<span class="kw">var</span> prop <span class="kw">in</span> type.GetProperties())<br>&nbsp;&nbsp;Console.WriteLine($<span class="str">"{prop.Name} = {prop.GetValue(emp)}"</span>);<br><span class="cm">// Name = Arjun</span><br><span class="cm">// Age = 28</span><br><br><span class="cm">// Create object dynamically</span><br><span class="kw">var</span> obj = Activator.CreateInstance(type);</div>'},
{q:"What are Attributes? How do you create Custom Attributes?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Attributes</span> are metadata markers using [Brackets].<br>&#9733; Built-in examples: [Required], [Obsolete], [Authorize], [HttpGet].<br>&#9733; Create custom attributes by inheriting from <span class="key">Attribute</span> class.<br>&#9733; Read them at runtime using <span class="key">Reflection</span>.<br>&#9733; Used in validation, serialization, MVC routing, and DI.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Built-in attributes</span><br>[Obsolete(<span class="str">"Use NewMethod instead"</span>)]<br><span class="kw">public void</span> OldMethod() { }<br><br>[Required]<br>[StringLength(50)]<br><span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br><br><span class="cm">// Custom Attribute</span><br><span class="kw">public class</span> AuditLogAttribute : Attribute {<br>&nbsp;&nbsp;<span class="kw">public string</span> Action { <span class="kw">get</span>; }<br>&nbsp;&nbsp;<span class="kw">public</span> AuditLogAttribute(<span class="kw">string</span> action) { Action = action; }<br>}<br><br>[AuditLog(<span class="str">"Delete"</span>)]<br><span class="kw">public void</span> DeleteUser(<span class="kw">int</span> id) { }<br><br><span class="cm">// Read attribute via Reflection</span><br><span class="kw">var</span> attr = method.GetCustomAttribute&lt;AuditLogAttribute&gt;();</div>'},
{q:"What is the difference between List<T> and Dictionary<TKey,TValue>?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">List&lt;T&gt;</span> is an ordered collection accessed by index, allows duplicates, search is O(n).<br>&#9733; <span class="key">Dictionary&lt;K,V&gt;</span> stores key-value pairs, keys must be unique, lookup by key is O(1).<br>&#9733; Use List when you need ordered items, Dictionary when you need fast lookup by key.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// List - ordered, access by index</span><br><span class="kw">var</span> names = <span class="kw">new</span> List&lt;<span class="kw">string</span>&gt; { <span class="str">"Arjun"</span>, <span class="str">"Ravi"</span>, <span class="str">"Priya"</span> };<br>names[0]; <span class="cm">// "Arjun" (by index)</span><br>names.Add(<span class="str">"Meena"</span>);<br>names.Contains(<span class="str">"Ravi"</span>); <span class="cm">// true (slow - scans all)</span><br><br><span class="cm">// Dictionary - key-value pairs, fast lookup</span><br><span class="kw">var</span> ages = <span class="kw">new</span> Dictionary&lt;<span class="kw">string</span>, <span class="kw">int</span>&gt; {<br>&nbsp;&nbsp;[<span class="str">"Arjun"</span>] = 28,<br>&nbsp;&nbsp;[<span class="str">"Ravi"</span>] = 25<br>};<br>ages[<span class="str">"Arjun"</span>]; <span class="cm">// 28 (by key - O(1) fast!)</span><br>ages.ContainsKey(<span class="str">"Ravi"</span>); <span class="cm">// true (very fast!)</span></div>'},
{q:"What are Tuples? Difference between Tuple and ValueTuple?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Tuple</span> (System.Tuple) is a reference type with Item1, Item2 names — not readable.<br>&#9733; <span class="key">ValueTuple</span> (C# 7+) is a value type with named members — cleaner and more performant.<br>&#9733; Use ValueTuple to return multiple values from methods without creating a class.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Old Tuple (reference type) - Item1, Item2 names 😩</span><br>Tuple&lt;<span class="kw">string</span>, <span class="kw">int</span>&gt; old = Tuple.Create(<span class="str">"Arjun"</span>, 28);<br>old.Item1; <span class="cm">// "Arjun" - what is Item1? unclear!</span><br><br><span class="cm">// ValueTuple (C# 7+) - named members! ⭐</span><br>(<span class="kw">string</span> Name, <span class="kw">int</span> Age) person = (<span class="str">"Arjun"</span>, 28);<br>person.Name; <span class="cm">// "Arjun" ✅ clear!</span><br>person.Age; <span class="cm">// 28 ✅</span><br><br><span class="cm">// Return multiple values from method</span><br>(<span class="kw">string</span> Name, <span class="kw">int</span> Count) GetStats() {<br>&nbsp;&nbsp;<span class="kw">return</span> (<span class="str">"Products"</span>, 150);<br>}<br><span class="kw">var</span> stats = GetStats();<br>Console.WriteLine(stats.Name); <span class="cm">// "Products"</span></div>'},
{q:"What is the Null Coalescing (??) and Null Conditional (?.) operator?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">??</span> returns the left operand if not null, otherwise the right (default value).<br>&#9733; <span class="key">??=</span> assigns only if the variable is null.<br>&#9733; <span class="key">?.</span> safely accesses members — returns null instead of throwing NullReferenceException.<br>&#9733; These operators eliminate verbose null checks and make code cleaner.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ?? Null Coalescing - provide default</span><br><span class="kw">string</span> name = <span class="kw">null</span>;<br><span class="kw">string</span> result = name ?? <span class="str">"Unknown"</span>; <span class="cm">// "Unknown"</span><br><br><span class="kw">string</span> name2 = <span class="str">"Arjun"</span>;<br><span class="kw">string</span> result2 = name2 ?? <span class="str">"Unknown"</span>; <span class="cm">// "Arjun"</span><br><br><span class="cm">// ??= Null Coalescing Assignment (C# 8+)</span><br>name ??= <span class="str">"Default"</span>; <span class="cm">// assign only if null</span><br><br><span class="cm">// ?. Null Conditional - safe navigation</span><br><span class="kw">string</span> city = user?.Address?.City; <span class="cm">// null if any is null</span><br><span class="cm">// Without ?. you need:</span><br><span class="cm">// if(user != null &amp;&amp; user.Address != null) city = user.Address.City;</span><br><br><span class="cm">// ?[] for arrays</span><br><span class="kw">int</span>? first = numbers?[0]; <span class="cm">// null if array is null</span></div>'},
{q:"What is Pattern Matching in C#?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Pattern Matching</span> tests values against patterns and extracts data.<br>&#9733; Types: <span class="key">Type pattern</span> (is Dog d), <span class="key">Switch expression</span> (C# 8), <span class="key">Relational</span> (>= 90), <span class="key">Logical</span> (and, or, not), <span class="key">Property pattern</span> ({ Age: > 18 }).<br>&#9733; Each C# version adds more powerful patterns.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Type pattern (C# 7)</span><br><span class="kw">if</span>(animal <span class="kw">is</span> Dog dog) { dog.Bark(); } <span class="cm">// check + cast!</span><br><br><span class="cm">// Switch pattern (C# 8+)</span><br><span class="kw">string</span> GetDiscount(<span class="kw">object</span> customer) =&gt; customer <span class="kw">switch</span> {<br>&nbsp;&nbsp;Employee e <span class="kw">when</span> e.Years &gt; 5 =&gt; <span class="str">"20% off"</span>,<br>&nbsp;&nbsp;Employee e =&gt; <span class="str">"10% off"</span>,<br>&nbsp;&nbsp;Student =&gt; <span class="str">"15% off"</span>,<br>&nbsp;&nbsp;<span class="kw">null</span> =&gt; <span class="str">"No customer"</span>,<br>&nbsp;&nbsp;_ =&gt; <span class="str">"5% off"</span> <span class="cm">// default</span><br>};<br><br><span class="cm">// Relational pattern (C# 9+)</span><br><span class="kw">string</span> Grade(<span class="kw">int</span> score) =&gt; score <span class="kw">switch</span> {<br>&nbsp;&nbsp;>= 90 =&gt; <span class="str">"A"</span>,<br>&nbsp;&nbsp;>= 80 =&gt; <span class="str">"B"</span>,<br>&nbsp;&nbsp;>= 70 =&gt; <span class="str">"C"</span>,<br>&nbsp;&nbsp;_ =&gt; <span class="str">"F"</span><br>};</div>'},
{q:"What is the difference between Managed and Unmanaged code?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Managed code</span> runs under CLR with automatic memory management, GC, type safety, and exception handling.<br>&#9733; <span class="key">Unmanaged code</span> runs outside CLR — no GC, manual memory management.<br>&#9733; C# is managed, C/C++ is unmanaged.<br>&#9733; To use unmanaged resources in C#, implement <span class="key">IDisposable</span> for proper cleanup.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Managed code - CLR handles everything</span><br><span class="kw">string</span> name = <span class="str">"Arjun"</span>; <span class="cm">// GC cleans up automatically</span><br><span class="kw">var</span> list = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;(); <span class="cm">// memory managed by CLR</span><br><br><span class="cm">// Unmanaged code - calling Win32 API</span><br>[DllImport(<span class="str">"user32.dll"</span>)]<br><span class="kw">static extern int</span> MessageBox(IntPtr h, <span class="kw">string</span> text, <span class="kw">string</span> caption, <span class="kw">int</span> type);<br><br><span class="cm">// Unmanaged resources need manual cleanup</span><br><span class="cm">// File handles, DB connections, network sockets</span><br><span class="cm">// Use IDisposable + using statement!</span></div>'},
{q:"What are Indexers in C#?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Indexers</span> allow objects to be accessed using [] syntax like arrays.<br>&#9733; Defined using <b>this[parameter]</b> with get/set accessors.<br>&#9733; You can have multiple indexers with different parameter types (int, string).<br>&#9733; Used in collections like List&lt;T&gt;, Dictionary&lt;K,V&gt;.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> StudentCollection {<br>&nbsp;&nbsp;<span class="kw">private</span> List&lt;Student&gt; _students = <span class="kw">new</span>();<br><br>&nbsp;&nbsp;<span class="cm">// Indexer by int</span><br>&nbsp;&nbsp;<span class="kw">public</span> Student <span class="kw">this</span>[<span class="kw">int</span> index] {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> =&gt; _students[index];<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">set</span> =&gt; _students[index] = value;<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="cm">// Indexer by string (name)</span><br>&nbsp;&nbsp;<span class="kw">public</span> Student <span class="kw">this</span>[<span class="kw">string</span> name] {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> =&gt; _students.FirstOrDefault(s =&gt; s.Name == name);<br>&nbsp;&nbsp;}<br>}<br><br><span class="kw">var</span> col = <span class="kw">new</span> StudentCollection();<br>col[0]; <span class="cm">// access by index</span><br>col[<span class="str">"Arjun"</span>]; <span class="cm">// access by name!</span></div>'},
// Advanced
{q:"Explain the Garbage Collector. What are Gen0, Gen1, Gen2?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">GC</span> automatically reclaims memory of unreferenced objects.<br>&#9733; It uses <span class="key">generational collection</span>: <span class="key">Gen 0</span> for new short-lived objects (collected most often), <span class="key">Gen 1</span> as a buffer, <span class="key">Gen 2</span> for long-lived objects (collected rarely, expensive).<br>&#9733; Objects are promoted when they survive a collection.<br>&#9733; Most objects die in Gen 0.</div><h4>💻 How It Works</h4><div class="code"><span class="cm">// Object created → goes to Gen 0</span><br><span class="kw">var</span> temp = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;(); <span class="cm">// Gen 0</span><br><br><span class="cm">// If survives Gen 0 collection → promoted to Gen 1</span><br><span class="cm">// If survives Gen 1 collection → promoted to Gen 2</span><br><br><span class="cm">// Force GC (avoid in production!)</span><br>GC.Collect(); <span class="cm">// forces garbage collection</span><br>GC.GetGeneration(temp); <span class="cm">// which generation?</span></div>'},
{q:"What is the difference between Finalize and Dispose?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Dispose</span> is explicit cleanup called by developer via IDisposable or using statement — deterministic, immediate.<br>&#9733; <span class="key">Finalize</span> (~destructor) is called by GC — non-deterministic, unpredictable timing, adds GC overhead.<br>&#9733; Always prefer Dispose.<br>&#9733; Implement both as a safety net (Dispose pattern).</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> DbService : IDisposable {<br>&nbsp;&nbsp;<span class="kw">private</span> SqlConnection _conn;<br>&nbsp;&nbsp;<span class="kw">private bool</span> _disposed = <span class="kw">false</span>;<br><br>&nbsp;&nbsp;<span class="cm">// Dispose - called by developer</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Dispose() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(!_disposed) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;_conn?.Close(); <span class="cm">// clean NOW</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;_disposed = <span class="kw">true</span>;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;GC.SuppressFinalize(<span class="kw">this</span>); <span class="cm">// skip finalizer</span><br>&nbsp;&nbsp;&nbsp;&nbsp;}<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="cm">// Finalizer - backup if Dispose not called</span><br>&nbsp;&nbsp;~DbService() { Dispose(); }<br>}<br><br><span class="cm">// Always use \"using\" statement!</span><br><span class="kw">using var</span> db = <span class="kw">new</span> DbService(); <span class="cm">// auto Dispose!</span></div>'},
{q:"How does the CLR (Common Language Runtime) work?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">CLR</span> is the runtime engine of .NET.<br>&#9733; C# compiles to <span class="key">IL (Intermediate Language)</span>, then CLR uses <span class="key">JIT compiler</span> to convert IL to native machine code at runtime.<br>&#9733; CLR provides: garbage collection, type safety, exception handling, security, and thread management.<br>&#9733; This is why C# is called managed code.</div>'},
{q:"What is Span<T> and Memory<T>? When would you use them?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Span&lt;T&gt;</span> provides a type-safe view over contiguous memory without allocation — stack-only, cannot be used in async.<br>&#9733; <span class="key">Memory&lt;T&gt;</span> is similar but heap-allocated, can be used in async methods.<br>&#9733; Both reduce GC pressure and improve performance for parsing, slicing, and buffer operations.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Without Span - creates new array (allocation!)</span><br><span class="kw">int</span>[] arr = { 1, 2, 3, 4, 5 };<br><span class="kw">int</span>[] slice = arr[1..4]; <span class="cm">// new array {2,3,4} ❌ copies!</span><br><br><span class="cm">// With Span - no copy, just a view!</span><br>Span&lt;<span class="kw">int</span>&gt; span = arr.AsSpan(1, 3); <span class="cm">// {2,3,4} ✅ zero copy!</span><br>span[0] = 99; <span class="cm">// modifies original arr!</span><br><br><span class="cm">// String slicing without allocation</span><br>ReadOnlySpan&lt;<span class="kw">char</span>&gt; name = <span class="str">"Hello World"</span>.AsSpan(0, 5); <span class="cm">// "Hello"</span><br><br><span class="cm">// Memory&lt;T&gt; - can be used in async methods</span><br>Memory&lt;<span class="kw">int</span>&gt; mem = arr.AsMemory(1, 3);<br><span class="kw">await</span> ProcessAsync(mem); <span class="cm">// Span cant be used in async!</span></div>'},
{q:"Explain the Task Parallel Library (TPL).",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">TPL</span> provides Task-based parallelism using the thread pool.<br>&#9733; Key APIs: <span class="key">Task.Run</span> (offload work), <span class="key">Task.WhenAll</span> (wait for all), <span class="key">Task.WhenAny</span> (first to finish), <span class="key">Parallel.ForEach</span> (parallel loops).<br>&#9733; TPL handles thread creation, scheduling, and load balancing automatically.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Task.Run - run work on thread pool</span><br><span class="kw">await</span> Task.Run(() =&gt; HeavyCalculation());<br><br><span class="cm">// Run multiple tasks in parallel</span><br><span class="kw">var</span> t1 = GetUsersAsync();<br><span class="kw">var</span> t2 = GetOrdersAsync();<br><span class="kw">var</span> t3 = GetProductsAsync();<br><span class="kw">await</span> Task.WhenAll(t1, t2, t3); <span class="cm">// all 3 run together!</span><br><br><span class="cm">// Parallel.ForEach - parallel loop</span><br>Parallel.ForEach(items, item =&gt; {<br>&nbsp;&nbsp;Process(item); <span class="cm">// each item processed in parallel</span><br>});<br><br><span class="cm">// Task.WhenAny - first to complete wins</span><br><span class="kw">var</span> fastest = <span class="kw">await</span> Task.WhenAny(t1, t2, t3);</div>'},
{q:"What are Expression Trees?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Expression Trees</span> represent lambda expressions as a data structure (tree of nodes) instead of executable code.<br>&#9733; They can be inspected, modified, and translated to other languages like SQL.<br>&#9733; <span class="key">EF Core</span> uses expression trees to convert LINQ queries to SQL.<br>&#9733; This is why IQueryable uses Expression&lt;Func&gt; instead of Func.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Normal lambda - compiled to executable code</span><br>Func&lt;<span class="kw">int</span>, <span class="kw">bool</span>&gt; func = x =&gt; x &gt; 5; <span class="cm">// runs in C#</span><br><br><span class="cm">// Expression tree - code as DATA structure</span><br>Expression&lt;Func&lt;<span class="kw">int</span>, <span class="kw">bool</span>&gt;&gt; expr = x =&gt; x &gt; 5;<br><span class="cm">// Not executed! Its a tree:</span><br><span class="cm">//       ></span><br><span class="cm">//      / \</span><br><span class="cm">//     x   5</span><br><br><span class="cm">// EF Core uses this to build SQL!</span><br>_db.Products.Where(p =&gt; p.Price &gt; 100);<br><span class="cm">// Expression tree → translated to:</span><br><span class="cm">// SELECT * FROM Products WHERE Price > 100</span></div>'},
{q:"What is ConfigureAwait(true) vs ConfigureAwait(false)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">ConfigureAwait(true)</span> (default) captures the synchronization context and resumes on the original thread — needed for UI updates.<br>&#9733; <span class="key">ConfigureAwait(false)</span> skips context capture and resumes on any thread pool thread — better performance, avoids deadlocks.<br>&#9733; Use false in library code and backend services, true in UI code.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ConfigureAwait(true) - default, returns to original thread</span><br><span class="kw">public async</span> Task LoadData() {<br>&nbsp;&nbsp;<span class="kw">var</span> data = <span class="kw">await</span> httpClient.GetAsync(url); <span class="cm">// same as .ConfigureAwait(true)</span><br>&nbsp;&nbsp;<span class="cm">// continues on ORIGINAL thread (UI thread)</span><br>&nbsp;&nbsp;label.Text = data; <span class="cm">// ✅ safe to update UI</span><br>}<br><br><span class="cm">// ConfigureAwait(false) - any thread, faster</span><br><span class="kw">public async</span> Task&lt;<span class="kw">string</span>&gt; GetDataAsync() {<br>&nbsp;&nbsp;<span class="kw">var</span> data = <span class="kw">await</span> httpClient.GetAsync(url)<br>&nbsp;&nbsp;&nbsp;&nbsp;.ConfigureAwait(<span class="kw">false</span>); <span class="cm">// any thread pool thread</span><br>&nbsp;&nbsp;<span class="cm">// ❌ DONT update UI here!</span><br>&nbsp;&nbsp;<span class="kw">return</span> data; <span class="cm">// ✅ just return data</span><br>}</div>'},
{q:"How do you handle Thread Safety? Explain lock, Monitor, Semaphore, Mutex.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">lock</span> is simplest — wraps Monitor.Enter/Exit, one thread at a time, same process.<br>&#9733; <span class="key">Monitor</span> gives more control (TryEnter, Wait, Pulse).<br>&#9733; <span class="key">Semaphore</span> allows N concurrent threads — great for rate limiting.<br>&#9733; <span class="key">Mutex</span> works across processes — used to prevent multiple app instances.<br>&#9733; For async code, use SemaphoreSlim.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// lock - simplest, most common ⭐</span><br><span class="kw">private static readonly object</span> _lock = <span class="kw">new</span>();<br><span class="kw">lock</span>(_lock) {<br>&nbsp;&nbsp;_balance += amount; <span class="cm">// only one thread at a time</span><br>}<br><br><span class="cm">// Monitor - same as lock but more control</span><br>Monitor.Enter(_lock);<br><span class="kw">try</span> { _balance += amount; }<br><span class="kw">finally</span> { Monitor.Exit(_lock); }<br><br><span class="cm">// Semaphore - allows N threads at once</span><br><span class="kw">var</span> sem = <span class="kw">new</span> SemaphoreSlim(3); <span class="cm">// max 3 threads</span><br><span class="kw">await</span> sem.WaitAsync();<br><span class="kw">try</span> { <span class="cm">/* work */</span> }<br><span class="kw">finally</span> { sem.Release(); }<br><br><span class="cm">// Mutex - like lock but works across PROCESSES</span><br><span class="kw">var</span> mutex = <span class="kw">new</span> Mutex(<span class="kw">false</span>, <span class="str">"MyApp"</span>);<br>mutex.WaitOne(); <span class="cm">// only one app instance!</span></div>'},
{q:"What are Source Generators in C#?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Source Generators</span> run at compile time and generate additional C# source code.<br>&#9733; They inspect existing code using Roslyn API and produce new code.<br>&#9733; Benefits: no runtime reflection (faster), compile-time safety, reduces boilerplate.<br>&#9733; Used in: System.Text.Json, Regex, logging, MVVM frameworks.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// You write this:</span><br>[AutoNotify]<br><span class="kw">partial class</span> Person {<br>&nbsp;&nbsp;<span class="kw">private string</span> _name;<br>&nbsp;&nbsp;<span class="kw">private int</span> _age;<br>}<br><br><span class="cm">// Source Generator AUTO-CREATES this at compile time:</span><br><span class="kw">partial class</span> Person : INotifyPropertyChanged {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> =&gt; _name;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">set</span> { _name = value; OnPropertyChanged(); }<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">public int</span> Age {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> =&gt; _age;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">set</span> { _age = value; OnPropertyChanged(); }<br>&nbsp;&nbsp;}<br>}</div>'},
{q:"What is the difference between .NET Framework, .NET Core, and .NET 5/6/7/8?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">.NET Framework</span> is Windows-only, legacy, last version 4.8.<br>&#9733; <span class="key">.NET Core</span> was cross-platform rewrite (1.0-3.1).<br>&#9733; <span class="key">.NET 5+</span> unified both into one platform — just called .NET.<br>&#9733; Current LTS is <span class="key">.NET 8</span>.<br>&#9733; New projects should always use .NET 8.<br>&#9733; Even-numbered versions are LTS (Long Term Support).</div>'},
{q:"How do you avoid Memory Leaks in C#?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Common causes: <span class="key">unsubscribed event handlers</span>, <span class="key">undisposed resources</span>, <span class="key">static collections</span> growing forever, <span class="key">closures capturing references</span>.<br>&#9733; Fixes: always unsubscribe events, use using statement, use WeakReference for caches, use IMemoryCache with expiry.<br>&#9733; Detect with dotnet-dump and Visual Studio Diagnostic Tools.</div><h4>💻 Common Causes & Fixes</h4><div class="code"><span class="cm">// ❌ Leak 1: Event handlers not unsubscribed</span><br>button.Click += OnClick; <span class="cm">// subscribes</span><br><span class="cm">// Fix: button.Click -= OnClick; // unsubscribe!</span><br><br><span class="cm">// ❌ Leak 2: Not disposing IDisposable</span><br><span class="kw">var</span> conn = <span class="kw">new</span> SqlConnection();<br><span class="cm">// Fix: using var conn = new SqlConnection();</span><br><br><span class="cm">// ❌ Leak 3: Static collections growing forever</span><br><span class="kw">static</span> List&lt;User&gt; _cache = <span class="kw">new</span>(); <span class="cm">// never cleared!</span><br><span class="cm">// Fix: Use ConcurrentDictionary with expiry, or IMemoryCache</span><br><br><span class="cm">// ❌ Leak 4: Captured variables in closures/lambdas</span><br><span class="cm">// ❌ Leak 5: Large Object Heap fragmentation</span><br><br><span class="cm">// Tools to detect:</span><br><span class="cm">// dotnet-dump, dotnet-counters, Visual Studio Diagnostic Tools</span></div>'},
{q:"What are Channels in C#?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Channels</span> provide async-friendly producer-consumer communication.<br>&#9733; <span class="key">CreateBounded</span> limits capacity (backpressure), <span class="key">CreateUnbounded</span> has no limit.<br>&#9733; Writer writes, Reader reads asynchronously.<br>&#9733; Better than BlockingCollection for async scenarios.<br>&#9733; Used in background processing, streaming, and pipeline architectures.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">var</span> channel = Channel.CreateUnbounded&lt;<span class="kw">string</span>&gt;();<br><br><span class="cm">// Producer - writes messages</span><br><span class="kw">async</span> Task Produce() {<br>&nbsp;&nbsp;<span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt; 10; i++) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> channel.Writer.WriteAsync($<span class="str">"Message {i}"</span>);<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> Task.Delay(100);<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;channel.Writer.Complete();<br>}<br><br><span class="cm">// Consumer - reads messages</span><br><span class="kw">async</span> Task Consume() {<br>&nbsp;&nbsp;<span class="kw">await foreach</span>(<span class="kw">var</span> msg <span class="kw">in</span> channel.Reader.ReadAllAsync()) {<br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(msg);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Run both together</span><br><span class="kw">await</span> Task.WhenAll(Produce(), Consume());</div>'},
{q:"How does the JIT Compiler work? What is AOT Compilation?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">JIT</span> compiles IL to native code at runtime, method by method on first call.<br>&#9733; It optimizes for the current CPU but has slower cold start.<br>&#9733; <span class="key">AOT</span> compiles everything ahead of time — instant startup, smaller memory footprint, but larger binary. .NET 8 supports <span class="key">Native AOT</span> for serverless, containers, and mobile apps.</div>'},
{q:"What is IAsyncEnumerable<T>?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">IAsyncEnumerable&lt;T&gt;</span> combines async and streaming — returns items one at a time asynchronously using <b>await foreach</b> and <b>yield return</b>.<br>&#9733; Unlike Task&lt;List&lt;T&gt;&gt; which waits for all data, it streams items as they become available.<br>&#9733; Great for large datasets, real-time data, and API streaming.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Without - wait for ALL data, then process</span><br><span class="kw">var</span> allProducts = <span class="kw">await</span> _db.Products.ToListAsync(); <span class="cm">// waits for ALL</span><br><span class="kw">foreach</span>(<span class="kw">var</span> p <span class="kw">in</span> allProducts) { Process(p); }<br><br><span class="cm">// With IAsyncEnumerable - process as they arrive!</span><br><span class="kw">async</span> IAsyncEnumerable&lt;Product&gt; GetProductsAsync() {<br>&nbsp;&nbsp;<span class="kw">await foreach</span>(<span class="kw">var</span> p <span class="kw">in</span> _db.Products.AsAsyncEnumerable()) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">yield return</span> p; <span class="cm">// stream one at a time!</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Consumer</span><br><span class="kw">await foreach</span>(<span class="kw">var</span> product <span class="kw">in</span> GetProductsAsync()) {<br>&nbsp;&nbsp;Console.WriteLine(product.Name); <span class="cm">// process immediately!</span><br>}</div>'},
{q:"Explain Record types. How are they different from Class and Struct?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Record</span> is a reference type with value-based equality, auto-generated ToString, Equals, GetHashCode, and deconstruction.<br>&#9733; <span class="key">Class</span> has reference equality by default.<br>&#9733; <span class="key">Struct</span> is value type on stack.<br>&#9733; Records support <b>with</b> expression for non-destructive mutation.<br>&#9733; Use records for DTOs, immutable data, and domain value objects.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Record - one line! Auto-generates everything</span><br><span class="kw">record</span> Person(<span class="kw">string</span> Name, <span class="kw">int</span> Age);<br><br><span class="kw">var</span> p1 = <span class="kw">new</span> Person(<span class="str">"Arjun"</span>, 28);<br><span class="kw">var</span> p2 = <span class="kw">new</span> Person(<span class="str">"Arjun"</span>, 28);<br><br>p1 == p2; <span class="cm">// true ✅ (value equality!)</span><br><span class="cm">// Class would be false (reference equality)</span><br><br>Console.WriteLine(p1); <span class="cm">// Person { Name = Arjun, Age = 28 }</span><br><br><span class="cm">// Immutable - create modified copy with "with"</span><br><span class="kw">var</span> p3 = p1 <span class="kw">with</span> { Age = 29 }; <span class="cm">// new object, Age changed</span><br><br><span class="cm">// record struct (C# 10) - value type record</span><br><span class="kw">record struct</span> Point(<span class="kw">int</span> X, <span class="kw">int</span> Y);</div>'},
{q:"What is the volatile keyword?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">volatile</span> prevents compiler and CPU from caching a field — ensures every read gets the latest value from main memory.<br>&#9733; Used for simple flags shared between threads.<br>&#9733; It does NOT provide atomicity — for complex operations use <span class="key">lock</span> or <span class="key">Interlocked</span> class instead.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Worker {<br>&nbsp;&nbsp;<span class="cm">// Without volatile - thread may read cached (stale) value</span><br>&nbsp;&nbsp;<span class="cm">// private bool _running = true; // ❌ may not see update!</span><br><br>&nbsp;&nbsp;<span class="cm">// With volatile - always reads latest value</span><br>&nbsp;&nbsp;<span class="kw">private volatile bool</span> _running = <span class="kw">true</span>; <span class="cm">// ✅</span><br><br>&nbsp;&nbsp;<span class="kw">public void</span> DoWork() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">while</span>(_running) { <span class="cm">// always reads fresh value</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// do work...</span><br>&nbsp;&nbsp;&nbsp;&nbsp;}<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public void</span> Stop() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_running = <span class="kw">false</span>; <span class="cm">// other thread sets this</span><br>&nbsp;&nbsp;}<br>}</div><div class="tip">💡 <b>Note:</b> volatile only works on simple types (bool, int, reference types). For compound operations (read-modify-write), use Interlocked.Increment or lock.</div>'},
{q:"What are Weak References? When would you use them?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Weak Reference</span> allows GC to collect the object when memory is needed, unlike strong references that keep objects alive.<br>&#9733; Use <b>WeakReference&lt;T&gt;</b> and check with <b>TryGetTarget</b>.<br>&#9733; Used for: <span class="key">caches</span> that should auto-clear under memory pressure, <span class="key">event handlers</span> to prevent memory leaks, and large object management.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Strong reference - GC cannot collect</span><br><span class="kw">var</span> obj = <span class="kw">new</span> LargeObject(); <span class="cm">// stays in memory</span><br><br><span class="cm">// Weak reference - GC CAN collect if needed</span><br><span class="kw">var</span> weakRef = <span class="kw">new</span> WeakReference&lt;LargeObject&gt;(obj);<br>obj = <span class="kw">null</span>; <span class="cm">// remove strong reference</span><br><br><span class="cm">// Later - check if still alive</span><br><span class="kw">if</span>(weakRef.TryGetTarget(<span class="kw">out var</span> target)) {<br>&nbsp;&nbsp;Console.WriteLine(<span class="str">"Still alive!"</span>);<br>&nbsp;&nbsp;target.DoSomething();<br>} <span class="kw">else</span> {<br>&nbsp;&nbsp;Console.WriteLine(<span class="str">"GC collected it"</span>);<br>&nbsp;&nbsp;<span class="cm">// recreate if needed</span><br>}<br><br><span class="cm">// Use case: Cache that auto-clears under memory pressure</span><br><span class="kw">var</span> cache = <span class="kw">new</span> Dictionary&lt;<span class="kw">string</span>, WeakReference&lt;ExpensiveData&gt;&gt;();</div>'},
