{q:"What is a Promise? Explain resolve, reject, then, catch.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Promise</b> represents a <b>future value</b> — something that will complete later (like an API call). It can be <b>resolved</b> (success) or <b>rejected</b> (failure). Use <b>.then()</b> for success, <b>.catch()</b> for error.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Create a Promise</span><br><span class="kw">const</span> fetchData = <span class="kw">new</span> Promise((resolve, reject) =&gt; {<br>&nbsp;&nbsp;setTimeout(() =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">const</span> success = <span class="kw">true</span>;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(success) resolve(<span class="str">"Data loaded!"</span>); <span class="cm">// ✅</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">else</span> reject(<span class="str">"Failed!"</span>); <span class="cm">// ❌</span><br>&nbsp;&nbsp;}, 1000);<br>});<br><br><span class="cm">// Use the Promise</span><br>fetchData<br>&nbsp;&nbsp;.then(data =&gt; console.log(data)) <span class="cm">// "Data loaded!"</span><br>&nbsp;&nbsp;.catch(err =&gt; console.log(err)) <span class="cm">// if rejected</span><br>&nbsp;&nbsp;.finally(() =&gt; console.log(<span class="str">"Done"</span>)); <span class="cm">// always runs</span><br><br><span class="cm">// Promise states: Pending → Fulfilled OR Rejected</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Promise</span> represents an async operation with 3 states: Pending, Fulfilled (resolved), Rejected. <span class="key">resolve()</span> for success, <span class="key">reject()</span> for failure. <span class="key">.then()</span> handles success, <span class="key">.catch()</span> handles errors, <span class="key">.finally()</span> runs always. Promises solve callback hell with chaining."</p>'},
{q:"What is async/await in JavaScript?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>async/await</b> is <b>syntactic sugar over Promises</b>. Makes async code look like synchronous code — much cleaner than .then() chains. <b>async</b> marks a function, <b>await</b> pauses until Promise resolves.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// With Promises (.then chain - messy)</span><br>fetch(<span class="str">"/api/users"</span>)<br>&nbsp;&nbsp;.then(res =&gt; res.json())<br>&nbsp;&nbsp;.then(data =&gt; console.log(data))<br>&nbsp;&nbsp;.catch(err =&gt; console.log(err));<br><br><span class="cm">// With async/await - clean! ⭐</span><br><span class="kw">async function</span> getUsers() {<br>&nbsp;&nbsp;<span class="kw">try</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">const</span> res = <span class="kw">await</span> fetch(<span class="str">"/api/users"</span>);<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">const</span> data = <span class="kw">await</span> res.json();<br>&nbsp;&nbsp;&nbsp;&nbsp;console.log(data);<br>&nbsp;&nbsp;} <span class="kw">catch</span>(err) {<br>&nbsp;&nbsp;&nbsp;&nbsp;console.log(err);<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">async</span> makes a function return a Promise. <span class="key">await</span> pauses execution until the Promise resolves. Use try/catch for error handling. async/await is cleaner than .then() chains. An async function always returns a Promise."</p>'},
{q:"What is Closure? Give an example.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Closure</b> is a function that <b>remembers variables from its outer scope</b> even after the outer function has finished. Like a backpack — the inner function carries the outer variables with it.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">function</span> createCounter() {<br>&nbsp;&nbsp;<span class="kw">let</span> count = 0; <span class="cm">// outer variable</span><br><br>&nbsp;&nbsp;<span class="kw">return function</span>() { <span class="cm">// inner function (closure)</span><br>&nbsp;&nbsp;&nbsp;&nbsp;count++; <span class="cm">// remembers count!</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> count;<br>&nbsp;&nbsp;};<br>}<br><br><span class="kw">const</span> counter = createCounter();<br>counter(); <span class="cm">// 1</span><br>counter(); <span class="cm">// 2</span><br>counter(); <span class="cm">// 3 (count is preserved!)</span><br><br><span class="cm">// count is private - cant access from outside!</span><br><span class="cm">// console.log(count); // ❌ ReferenceError</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Closure</span> is a function that has access to variables from its outer (enclosing) scope even after the outer function has returned. Used for: <span class="key">data privacy</span> (private variables), <span class="key">factory functions</span>, <span class="key">callbacks</span>, and maintaining state. Every function in JS creates a closure."</p>'},
{q:"What is the Event Loop? Explain Call Stack, Task Queue.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>JavaScript is <b>single-threaded</b> but handles async operations using the <b>Event Loop</b>. It checks: is the Call Stack empty? If yes, pick next task from the Queue.</p><svg viewBox="0 0 440 120" style="max-width:440px"><rect x="10" y="5" width="120" height="105" rx="8" fill="#3b82f6"/><text x="70" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Call Stack</text><text x="70" y="40" text-anchor="middle" fill="#bae6fd" font-size="7">Runs code line by line</text><text x="70" y="55" text-anchor="middle" fill="#bae6fd" font-size="7">One thing at a time</text><text x="70" y="70" text-anchor="middle" fill="#bae6fd" font-size="7">LIFO (Last In First Out)</text><text x="70" y="90" text-anchor="middle" fill="#fff" font-size="7">main() → fn1() → fn2()</text><rect x="160" y="5" width="120" height="105" rx="8" fill="#10b981"/><text x="220" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Web APIs</text><text x="220" y="40" text-anchor="middle" fill="#d1fae5" font-size="7">setTimeout</text><text x="220" y="55" text-anchor="middle" fill="#d1fae5" font-size="7">fetch / AJAX</text><text x="220" y="70" text-anchor="middle" fill="#d1fae5" font-size="7">DOM events</text><text x="220" y="90" text-anchor="middle" fill="#d1fae5" font-size="7">Run in background</text><rect x="310" y="5" width="120" height="105" rx="8" fill="#f59e0b"/><text x="370" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Task Queue</text><text x="370" y="40" text-anchor="middle" fill="#fef3c7" font-size="7">Callbacks wait here</text><text x="370" y="55" text-anchor="middle" fill="#fef3c7" font-size="7">FIFO (First In First Out)</text><text x="370" y="70" text-anchor="middle" fill="#fef3c7" font-size="7">Event Loop picks</text><text x="370" y="90" text-anchor="middle" fill="#fef3c7" font-size="7">when stack is empty</text></svg><h4>🗣️ Interview Answer</h4><p>"JS is single-threaded. <span class="key">Call Stack</span> executes code synchronously. Async operations go to <span class="key">Web APIs</span> (browser). When done, callbacks go to <span class="key">Task Queue</span>. The <span class="key">Event Loop</span> checks: if Call Stack is empty, move next callback from Queue to Stack. Microtask queue (Promises) has priority over macrotask queue (setTimeout)."</p>'},
{q:"What is Hoisting in JavaScript?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Hoisting</b> = JavaScript moves <b>declarations to the top</b> of their scope before execution. Variables declared with var and function declarations are hoisted. let/const are hoisted but NOT initialized (temporal dead zone).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// var is hoisted (initialized as undefined)</span><br>console.log(a); <span class="cm">// undefined (not error!)</span><br><span class="kw">var</span> a = 10;<br><br><span class="cm">// let/const are hoisted but NOT initialized</span><br>console.log(b); <span class="cm">// ❌ ReferenceError! (temporal dead zone)</span><br><span class="kw">let</span> b = 20;<br><br><span class="cm">// Function declarations are fully hoisted</span><br>greet(); <span class="cm">// "Hello!" ✅ works before declaration!</span><br><span class="kw">function</span> greet() { console.log(<span class="str">"Hello!"</span>); }<br><br><span class="cm">// Function expressions are NOT hoisted</span><br>sayHi(); <span class="cm">// ❌ TypeError!</span><br><span class="kw">var</span> sayHi = <span class="kw">function</span>() { console.log(<span class="str">"Hi"</span>); };</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Hoisting</span> moves declarations to the top of scope. <span class="key">var</span> is hoisted and initialized as undefined. <span class="key">let/const</span> are hoisted but in temporal dead zone (cant access before declaration). <span class="key">Function declarations</span> are fully hoisted. Function expressions are NOT. This is why let/const are safer than var."</p>'},
{q:"What is Destructuring? Explain Object and Array destructuring.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Destructuring</b> = <b>unpack values</b> from arrays or objects into separate variables in one line. Like opening a gift box and taking out items directly.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Object Destructuring</span><br><span class="kw">const</span> user = { name: <span class="str">"Arjun"</span>, age: 28, city: <span class="str">"Delhi"</span> };<br><span class="kw">const</span> { name, age } = user; <span class="cm">// name="Arjun", age=28</span><br><span class="kw">const</span> { name: userName } = user; <span class="cm">// rename: userName="Arjun"</span><br><span class="kw">const</span> { country = <span class="str">"India"</span> } = user; <span class="cm">// default value</span><br><br><span class="cm">// Array Destructuring</span><br><span class="kw">const</span> [first, second, ...rest] = [1, 2, 3, 4, 5];<br><span class="cm">// first=1, second=2, rest=[3,4,5]</span><br><br><span class="cm">// Swap variables!</span><br><span class="kw">let</span> a = 1, b = 2;<br>[a, b] = [b, a]; <span class="cm">// a=2, b=1 🤯</span><br><br><span class="cm">// In function parameters</span><br><span class="kw">function</span> greet({ name, age }) {<br>&nbsp;&nbsp;console.log(<span class="str">`${name} is ${age}`</span>);<br>}<br>greet(user);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Destructuring</span> extracts values from objects/arrays into variables. Object destructuring uses {}, array uses []. Supports renaming, default values, rest operator, and nested destructuring. Commonly used in function parameters, React props, and API responses."</p>'},
{q:"What is the Spread and Rest operator (...)?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Spread (...)</b> = <b>expands</b> an array/object into individual items. <b>Rest (...)</b> = <b>collects</b> remaining items into an array. Same syntax, opposite behavior!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// SPREAD: expand items</span><br><span class="kw">const</span> arr1 = [1, 2, 3];<br><span class="kw">const</span> arr2 = [...arr1, 4, 5]; <span class="cm">// [1,2,3,4,5] spread into new array</span><br><br><span class="kw">const</span> obj1 = { name: <span class="str">"Arjun"</span> };<br><span class="kw">const</span> obj2 = { ...obj1, age: 28 }; <span class="cm">// {name:"Arjun", age:28}</span><br><br><span class="cm">// REST: collect remaining items</span><br><span class="kw">const</span> [first, ...others] = [1, 2, 3, 4];<br><span class="cm">// first=1, others=[2,3,4]</span><br><br><span class="kw">function</span> sum(...nums) { <span class="cm">// rest: collect all args</span><br>&nbsp;&nbsp;<span class="kw">return</span> nums.reduce((a, b) =&gt; a + b, 0);<br>}<br>sum(1, 2, 3, 4); <span class="cm">// 10</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Spread</span> expands arrays/objects into individual elements — used for copying, merging, function arguments. <span class="key">Rest</span> collects remaining elements into an array — used in function parameters and destructuring. Same ... syntax, context determines behavior."</p>'},
{q:"What is Fetch API? How do you call a .NET Web API from JS?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Fetch API</b> is the modern way to make <b>HTTP requests</b> from JavaScript. Returns a Promise. Used to call your .NET Web API from the frontend.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// GET request</span><br><span class="kw">const</span> res = <span class="kw">await</span> fetch(<span class="str">"/api/products"</span>);<br><span class="kw">const</span> products = <span class="kw">await</span> res.json();<br><br><span class="cm">// POST request</span><br><span class="kw">const</span> res = <span class="kw">await</span> fetch(<span class="str">"/api/products"</span>, {<br>&nbsp;&nbsp;method: <span class="str">"POST"</span>,<br>&nbsp;&nbsp;headers: { <span class="str">"Content-Type"</span>: <span class="str">"application/json"</span> },<br>&nbsp;&nbsp;body: JSON.stringify({ name: <span class="str">"Laptop"</span>, price: 50000 })<br>});<br><br><span class="cm">// With JWT token</span><br><span class="kw">const</span> res = <span class="kw">await</span> fetch(<span class="str">"/api/orders"</span>, {<br>&nbsp;&nbsp;headers: { <span class="str">"Authorization"</span>: <span class="str">`Bearer ${token}`</span> }<br>});<br><br><span class="cm">// Error handling</span><br><span class="kw">if</span>(!res.ok) <span class="kw">throw new</span> Error(<span class="str">`HTTP ${res.status}`</span>);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Fetch API</span> is the modern replacement for XMLHttpRequest. Returns Promises, supports async/await. Send JSON with Content-Type header, parse response with .json(). Add Authorization header for JWT. Check res.ok for errors — fetch doesnt throw on 4xx/5xx!"</p>'},
{q:"What is Local Storage vs Session Storage vs Cookies?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>All three store data in the browser. <b>LocalStorage</b> = permanent until cleared. <b>SessionStorage</b> = cleared when tab closes. <b>Cookies</b> = sent to server with every request, has expiry.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// LocalStorage: permanent, 5-10MB</span><br>localStorage.setItem(<span class="str">"theme"</span>, <span class="str">"dark"</span>);<br>localStorage.getItem(<span class="str">"theme"</span>); <span class="cm">// "dark"</span><br>localStorage.removeItem(<span class="str">"theme"</span>);<br><br><span class="cm">// SessionStorage: per tab, cleared on close</span><br>sessionStorage.setItem(<span class="str">"cart"</span>, JSON.stringify(items));<br><br><span class="cm">// Cookies: sent to server, 4KB limit</span><br>document.cookie = <span class="str">"token=abc123; expires=Fri, 31 Dec 2024; path=/"</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">LocalStorage</span>: 5-10MB, permanent, not sent to server. <span class="key">SessionStorage</span>: 5MB, per tab, cleared on close. <span class="key">Cookies</span>: 4KB, sent with every HTTP request, has expiry, supports HttpOnly (JS cant access). Use LocalStorage for preferences, SessionStorage for temp data, Cookies for auth tokens."</p>'},
{q:"What is TypeScript? Why use it over JavaScript?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>TypeScript</b> = JavaScript + <b>static types</b>. It catches errors at <b>compile time</b> instead of runtime. Like adding guardrails to JavaScript. Created by Microsoft.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// JavaScript: no type checking</span><br><span class="kw">let</span> name = <span class="str">"Arjun"</span>;<br>name = 123; <span class="cm">// ✅ no error (bug at runtime!)</span><br><br><span class="cm">// TypeScript: type checking</span><br><span class="kw">let</span> name: <span class="kw">string</span> = <span class="str">"Arjun"</span>;<br>name = 123; <span class="cm">// ❌ compile error! caught early!</span><br><br><span class="cm">// Interface</span><br><span class="kw">interface</span> User {<br>&nbsp;&nbsp;name: <span class="kw">string</span>;<br>&nbsp;&nbsp;age: <span class="kw">number</span>;<br>&nbsp;&nbsp;email?: <span class="kw">string</span>; <span class="cm">// optional</span><br>}<br><br><span class="kw">function</span> greet(user: User): <span class="kw">string</span> {<br>&nbsp;&nbsp;<span class="kw">return</span> <span class="str">`Hello ${user.name}`</span>;<br>}<br><br><span class="cm">// TypeScript compiles to JavaScript</span><br><span class="cm">// .ts → tsc compiler → .js</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">TypeScript</span> adds static typing to JavaScript. Benefits: <span class="key">compile-time error detection</span>, better IntelliSense, interfaces, enums, generics, and easier refactoring. Compiles to plain JavaScript. Used in Angular (required), React (optional). For .NET developers, TypeScript feels familiar because of C#-like syntax."</p>'},
// Advanced
{q:"What is Angular/React basics? Component, Props, State.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Component</b> = reusable UI block. <b>Props</b> = data from parent (read-only). <b>State</b> = data inside component (can change, triggers re-render).</p><h4>💻 Code Example</h4><div class="code"><span class="kw">function</span> ProductCard({ name, price }) { <span class="cm">// props</span><br>&nbsp;&nbsp;<span class="kw">const</span> [qty, setQty] = useState(1); <span class="cm">// state</span><br>&nbsp;&nbsp;<span class="kw">return</span> (&lt;div&gt;<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;h3&gt;{name}&lt;/h3&gt;&lt;p&gt;Qty: {qty}&lt;/p&gt;<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;button onClick={() =&gt; setQty(qty+1)}&gt;+&lt;/button&gt;<br>&nbsp;&nbsp;&lt;/div&gt;);<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Component</span> is a reusable UI piece. <span class="key">Props</span> are read-only data from parent. <span class="key">State</span> is mutable data owned by the component — re-renders on change."</p>'},
{q:"What is the Virtual DOM in React?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>The <b>Virtual DOM</b> is a lightweight copy of the real DOM in memory. React compares old vs new (<b>diffing</b>), then updates <b>only changed parts</b> in real DOM. Much faster!</p><h4>💻 How It Works</h4><div class="code"><span class="cm">// 1. State changes (counter: 5 → 6)</span><br><span class="cm">// 2. React creates NEW Virtual DOM</span><br><span class="cm">// 3. DIFF: compares new vs old</span><br><span class="cm">// 4. Finds only counter changed</span><br><span class="cm">// 5. Updates ONLY that element in real DOM ✅</span></div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">Virtual DOM</span> is an in-memory representation. React uses <span class="key">diffing algorithm</span> to find changes, then applies minimal updates to real DOM (<span class="key">reconciliation</span>). Makes React fast because direct DOM manipulation is expensive."</p>'},
{q:"What is RxJS? Explain Observables.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Observable</b> = like Promise but for <b>multiple values over time</b>. Promise = ONE value. Observable = STREAM. <b>RxJS</b> is the library. Used heavily in Angular.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">import</span> { interval } <span class="kw">from</span> <span class="str">"rxjs"</span>;<br>interval(1000).subscribe(v =&gt; console.log(v)); <span class="cm">// 0,1,2,3...</span><br><br><span class="cm">// Angular HTTP returns Observable</span><br><span class="kw">this</span>.http.get&lt;Product[]&gt;(<span class="str">"/api/products"</span>)<br>&nbsp;&nbsp;.pipe(filter(p =&gt; p.price &gt; 100))<br>&nbsp;&nbsp;.subscribe(data =&gt; console.log(data));</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">RxJS</span> provides Observables for reactive programming. Use <span class="key">.subscribe()</span> to listen, <span class="key">.pipe()</span> with operators (map, filter, switchMap). Angular uses Observables for HTTP, forms, routing. Always unsubscribe to prevent memory leaks!"</p>'},
{q:"What is Webpack/Vite? How does module bundling work?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Bundlers</b> combine many JS/CSS files into fewer optimized files. <b>Webpack</b> = powerful but complex. <b>Vite</b> = modern, fast, simple.</p><h4>💻 How It Works</h4><div class="code"><span class="cm">// 100+ files → Bundler → few optimized files</span><br><span class="cm">// Also does: Minification, Tree-shaking,</span><br><span class="cm">// Code splitting, Transpiling (TS → JS)</span><br><br><span class="cm">// Vite: ES modules in dev (instant start!)</span><br><span class="cm">// Webpack: bundles everything (slower start)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Bundlers</span> combine files into optimized bundles with minification, tree-shaking, code splitting. <span class="key">Webpack</span> is most popular. <span class="key">Vite</span> is faster with native ES modules. Angular uses Webpack, newer projects prefer Vite."</p>'},
{q:"What is Server-Side Rendering (SSR) vs Client-Side Rendering (CSR)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>CSR</b> = browser builds page with JS (slow first load, bad SEO). <b>SSR</b> = server sends ready HTML (fast first load, great SEO).</p><svg viewBox="0 0 440 95" style="max-width:440px"><rect x="10" y="5" width="200" height="80" rx="8" fill="#f59e0b"/><text x="110" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">CSR (Client-Side)</text><text x="110" y="40" text-anchor="middle" fill="#fef3c7" font-size="7">Empty HTML + JS sent</text><text x="110" y="55" text-anchor="middle" fill="#fef3c7" font-size="7">❌ Slow first load, bad SEO</text><text x="110" y="75" text-anchor="middle" fill="#fff" font-size="7">React SPA, Angular SPA</text><rect x="230" y="5" width="200" height="80" rx="8" fill="#10b981"/><text x="330" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">SSR (Server-Side)</text><text x="330" y="40" text-anchor="middle" fill="#d1fae5" font-size="7">Full HTML sent ready</text><text x="330" y="55" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Fast first load, great SEO</text><text x="330" y="75" text-anchor="middle" fill="#fff" font-size="7">Next.js, Angular Universal</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">CSR</span> renders in browser — fast navigation but slow first paint, bad SEO. <span class="key">SSR</span> renders on server — fast first load, great SEO. Modern approach: SSR first load + CSR navigation (hydration). Next.js and Angular Universal support SSR."</p>'},
{q:"How do you integrate Angular/React with ASP.NET Core?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>Two ways: <b>Same project</b> (ASP.NET serves SPA) or <b>Separate projects</b> (API + frontend independent). Separate is preferred for production.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Approach 1: Same project</span><br>app.UseSpa(spa =&gt; { spa.Options.SourcePath = <span class="str">"ClientApp"</span>; });<br><br><span class="cm">// Approach 2: Separate (recommended ⭐)</span><br><span class="cm">// API: ASP.NET Core (port 5000)</span><br><span class="cm">// SPA: Angular/React (port 3000)</span><br><span class="cm">// SPA calls API via fetch, needs CORS!</span><br>builder.Services.AddCors(o =&gt; o.AddPolicy(<span class="str">"spa"</span>,<br>&nbsp;&nbsp;p =&gt; p.WithOrigins(<span class="str">"https://myapp.com"</span>)<br>&nbsp;&nbsp;&nbsp;&nbsp;.AllowAnyHeader().AllowAnyMethod()));</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Same project</span> with UseSpa() — simpler but coupled. <span class="key">Separate projects</span> — independent deployment, need CORS, preferred for production. Deploy SPA on Azure Static Web Apps, API on Azure App Service."</p>'}
],

plsql:[
// Basics
{q:"What is PL/SQL? How is it different from SQL?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>SQL</b> = asks ONE question at a time (single command). <b>PL/SQL</b> = a full programming language that <b>wraps SQL with logic</b> (loops, conditions, variables, error handling). Like SQL on steroids!</p><svg viewBox="0 0 440 160" style="max-width:440px"><rect x="10" y="5" width="200" height="145" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12">SQL</text><text x="110" y="48" text-anchor="middle" fill="#334155" font-size="9">✅ Single command at a time</text><text x="110" y="65" text-anchor="middle" fill="#334155" font-size="9">✅ SELECT, INSERT, UPDATE</text><text x="110" y="82" text-anchor="middle" fill="#334155" font-size="9">❌ No variables</text><text x="110" y="99" text-anchor="middle" fill="#334155" font-size="9">❌ No loops / IF-ELSE</text><text x="110" y="116" text-anchor="middle" fill="#334155" font-size="9">❌ No error handling</text><text x="110" y="140" text-anchor="middle" fill="#1e40af" font-size="8" font-weight="600">Declarative - WHAT to do</text><rect x="230" y="5" width="200" height="145" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">PL/SQL</text><text x="330" y="48" text-anchor="middle" fill="#334155" font-size="9">✅ Block of multiple commands</text><text x="330" y="65" text-anchor="middle" fill="#334155" font-size="9">✅ SQL + Programming logic</text><text x="330" y="82" text-anchor="middle" fill="#334155" font-size="9">✅ Variables, cursors</text><text x="330" y="99" text-anchor="middle" fill="#334155" font-size="9">✅ IF/ELSE, FOR, WHILE</text><text x="330" y="116" text-anchor="middle" fill="#334155" font-size="9">✅ EXCEPTION handling</text><text x="330" y="140" text-anchor="middle" fill="#16a34a" font-size="8" font-weight="600">Procedural - HOW to do</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">-- SQL: single command</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Salary > 50000;<br><br><span class="cm">-- PL/SQL: full program block</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;v_name VARCHAR2(50);<br>&nbsp;&nbsp;v_sal NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary <span class="kw">INTO</span> v_name, v_sal<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = 101;<br><br>&nbsp;&nbsp;<span class="kw">IF</span> v_sal > 50000 <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\'  is Senior\'</span>);<br>&nbsp;&nbsp;<span class="kw">ELSE</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\'  is Junior\'</span>);<br>&nbsp;&nbsp;<span class="kw">END IF</span>;<br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> NO_DATA_FOUND <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Not found\'</span>);<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">SQL</span> is declarative — you tell WHAT data you want. <span class="key">PL/SQL</span> is procedural — you tell HOW to process data using variables, loops, conditions, and exception handling. PL/SQL wraps SQL with programming logic and runs as a block on the Oracle server, reducing network round trips."</p>'},
{q:"What is a PL/SQL Block? Explain DECLARE, BEGIN, EXCEPTION, END.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A PL/SQL Block is the <b>basic unit of code</b>. It has 4 sections like a sandwich — DECLARE (optional), BEGIN (required), EXCEPTION (optional), END (required).</p><svg viewBox="0 0 440 190" style="max-width:440px"><rect x="80" y="5" width="280" height="40" rx="8" fill="#3b82f6"/><text x="220" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">📋 DECLARE (Optional)</text><text x="220" y="38" text-anchor="middle" fill="#bae6fd" font-size="8">Variables, cursors, constants</text><rect x="80" y="50" width="280" height="55" rx="8" fill="#10b981"/><text x="220" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">✅ BEGIN (Required)</text><text x="220" y="87" text-anchor="middle" fill="#d1fae5" font-size="8">SQL statements + logic</text><text x="220" y="100" text-anchor="middle" fill="#d1fae5" font-size="8">IF/ELSE, loops, queries</text><rect x="80" y="110" width="280" height="40" rx="8" fill="#f59e0b"/><text x="220" y="127" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">⚠️ EXCEPTION (Optional)</text><text x="220" y="143" text-anchor="middle" fill="#fef3c7" font-size="8">Error handling (like try-catch)</text><rect x="80" y="155" width="280" height="30" rx="8" fill="#ef4444"/><text x="220" y="175" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">✅ END; (Required)</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Anonymous Block (simplest)</span><br><span class="kw">DECLARE</span> <span class="cm">-- 1. Declare variables</span><br>&nbsp;&nbsp;v_emp_name VARCHAR2(50);<br>&nbsp;&nbsp;v_salary NUMBER := 0;<br><span class="kw">BEGIN</span> <span class="cm">-- 2. Main logic</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary <span class="kw">INTO</span> v_emp_name, v_salary<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = 101;<br><br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_emp_name || <span class="str">\' earns \'</span> || v_salary);<br><span class="kw">EXCEPTION</span> <span class="cm">-- 3. Handle errors</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> NO_DATA_FOUND <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Employee not found\'</span>);<br>&nbsp;&nbsp;<span class="kw">WHEN</span> OTHERS <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Error: \'</span> || SQLERRM);<br><span class="kw">END</span>; <span class="cm">-- 4. End block</span></div><h4>🗣️ Interview Answer</h4><p>"A PL/SQL block has 4 sections: <span class="key">DECLARE</span> (optional — variables, cursors), <span class="key">BEGIN</span> (required — executable statements), <span class="key">EXCEPTION</span> (optional — error handling), <span class="key">END</span> (required). There are 3 types: Anonymous blocks (unnamed), Procedures (named, no return), Functions (named, returns value)."</p>'},
{q:"What are Variables in PL/SQL? How do you declare them?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>Variables are <b>named containers</b> that store data temporarily during PL/SQL execution. You declare them in the DECLARE section with a <b>name, type, and optional default value</b>.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="cm">-- Basic variables</span><br>&nbsp;&nbsp;v_name VARCHAR2(50); <span class="cm">-- text, max 50 chars</span><br>&nbsp;&nbsp;v_salary NUMBER(10,2) := 50000; <span class="cm">-- number with default</span><br>&nbsp;&nbsp;v_is_active BOOLEAN := TRUE; <span class="cm">-- true/false</span><br>&nbsp;&nbsp;v_hire_date DATE := SYSDATE; <span class="cm">-- current date</span><br><br>&nbsp;&nbsp;<span class="cm">-- Constant (cannot change)</span><br>&nbsp;&nbsp;c_tax_rate CONSTANT NUMBER := 0.18;<br><br>&nbsp;&nbsp;<span class="cm">-- NOT NULL (must have value)</span><br>&nbsp;&nbsp;v_dept VARCHAR2(20) NOT NULL := <span class="str">\'IT\'</span>;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;v_name := <span class="str">\'Arjun\'</span>; <span class="cm">-- assign value</span><br>&nbsp;&nbsp;v_salary := v_salary * (1 + c_tax_rate);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\' - \'</span> || v_salary);<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"Variables in PL/SQL are declared in the <span class="key">DECLARE</span> section with syntax: <b>name datatype [:= value]</b>. Common types: VARCHAR2, NUMBER, DATE, BOOLEAN. Use <span class="key">CONSTANT</span> for fixed values, <span class="key">NOT NULL</span> to enforce value. Use <span class="key">:=</span> for assignment (not = like in SQL). Variables are local to the block."</p>'},
{q:"What is the %TYPE attribute?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>%TYPE</b> copies the <b>data type of a table column</b> to your variable. If the column type changes in the table, your variable <b>automatically updates</b>. No hardcoding!</p><svg viewBox="0 0 440 120" style="max-width:440px"><rect x="10" y="10" width="150" height="90" rx="8" fill="#ef4444"/><text x="85" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">❌ Without %TYPE</text><text x="85" y="50" text-anchor="middle" fill="#fecaca" font-size="8">v_name VARCHAR2(50);</text><text x="85" y="68" text-anchor="middle" fill="#fecaca" font-size="7">If column changes to</text><text x="85" y="80" text-anchor="middle" fill="#fecaca" font-size="7">VARCHAR2(100)...</text><text x="85" y="95" text-anchor="middle" fill="#fecaca" font-size="7" font-weight="600">YOUR CODE BREAKS! 💥</text><text x="195" y="55" text-anchor="middle" fill="#64748b" font-size="14">→</text><rect x="220" y="10" width="210" height="90" rx="8" fill="#10b981"/><text x="325" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">✅ With %TYPE</text><text x="325" y="50" text-anchor="middle" fill="#d1fae5" font-size="8">v_name Employee.Name%TYPE;</text><text x="325" y="68" text-anchor="middle" fill="#d1fae5" font-size="7">If column changes...</text><text x="325" y="80" text-anchor="middle" fill="#d1fae5" font-size="7">Variable auto-updates!</text><text x="325" y="95" text-anchor="middle" fill="#d1fae5" font-size="7" font-weight="600">SAFE and MAINTAINABLE ✅</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="cm">-- Copies datatype from Employee.Name column</span><br>&nbsp;&nbsp;v_name Employee.Name<span class="kw">%TYPE</span>;<br>&nbsp;&nbsp;v_salary Employee.Salary<span class="kw">%TYPE</span>;<br>&nbsp;&nbsp;v_dept Department.DeptName<span class="kw">%TYPE</span>;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary <span class="kw">INTO</span> v_name, v_salary<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = 101;<br><br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\' - \'</span> || v_salary);<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">%TYPE</span> anchors a variable to a table columns data type. Syntax: <b>variable_name table.column%TYPE</b>. Benefits: no hardcoding types, auto-adapts if column type changes, reduces maintenance. Always use %TYPE instead of hardcoding VARCHAR2(50) etc."</p>'},
{q:"What is the %ROWTYPE attribute?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>%ROWTYPE</b> creates a variable that holds an <b>entire row</b> of a table. Instead of declaring 10 separate variables for 10 columns, one %ROWTYPE variable holds all of them!</p><svg viewBox="0 0 440 130" style="max-width:440px"><rect x="10" y="10" width="180" height="100" rx="8" fill="#ef4444"/><text x="100" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">❌ Without %ROWTYPE</text><text x="100" y="48" text-anchor="middle" fill="#fecaca" font-size="7">v_id NUMBER;</text><text x="100" y="60" text-anchor="middle" fill="#fecaca" font-size="7">v_name VARCHAR2(50);</text><text x="100" y="72" text-anchor="middle" fill="#fecaca" font-size="7">v_salary NUMBER;</text><text x="100" y="84" text-anchor="middle" fill="#fecaca" font-size="7">v_dept VARCHAR2(20);</text><text x="100" y="96" text-anchor="middle" fill="#fecaca" font-size="7">v_email VARCHAR2(100);</text><text x="100" y="108" text-anchor="middle" fill="#fecaca" font-size="7" font-weight="600">5 variables! 😩</text><text x="220" y="60" text-anchor="middle" fill="#64748b" font-size="14">→</text><rect x="250" y="10" width="180" height="100" rx="8" fill="#10b981"/><text x="340" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">✅ With %ROWTYPE</text><text x="340" y="55" text-anchor="middle" fill="#d1fae5" font-size="8">v_emp Employee%ROWTYPE;</text><text x="340" y="75" text-anchor="middle" fill="#d1fae5" font-size="7">Holds ALL columns!</text><text x="340" y="90" text-anchor="middle" fill="#d1fae5" font-size="7">v_emp.Name, v_emp.Salary</text><text x="340" y="108" text-anchor="middle" fill="#d1fae5" font-size="7" font-weight="600">1 variable! 😍</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">DECLARE</span><br>&nbsp;&nbsp;v_emp Employee<span class="kw">%ROWTYPE</span>; <span class="cm">-- holds entire row</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> * <span class="kw">INTO</span> v_emp<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = 101;<br><br>&nbsp;&nbsp;<span class="cm">-- Access each column with dot notation</span><br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_emp.Name);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_emp.Salary);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_emp.Email);<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">%ROWTYPE</span> declares a record variable that matches an entire table row structure. Syntax: <b>variable table_name%ROWTYPE</b>. Access columns using dot notation (v_emp.Name). Benefits: less code, auto-adapts to table changes, perfect with SELECT * INTO. Use %TYPE for single column, %ROWTYPE for entire row."</p>'},
{q:"What are Cursors? Explain Implicit vs Explicit Cursors.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Cursor</b> is a <b>pointer to a result set</b> returned by a query. It lets you process rows <b>one by one</b>. Like a bookmark that moves through pages of a book.</p><svg viewBox="0 0 440 160" style="max-width:440px"><rect x="10" y="5" width="200" height="145" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="25" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">Implicit Cursor</text><text x="110" y="45" text-anchor="middle" fill="#334155" font-size="8">✅ Created by Oracle auto</text><text x="110" y="60" text-anchor="middle" fill="#334155" font-size="8">✅ For single-row queries</text><text x="110" y="75" text-anchor="middle" fill="#334155" font-size="8">✅ SELECT INTO, INSERT, etc.</text><text x="110" y="90" text-anchor="middle" fill="#334155" font-size="8">✅ No OPEN/FETCH/CLOSE</text><text x="110" y="110" text-anchor="middle" fill="#1e40af" font-size="7">SQL%FOUND, SQL%ROWCOUNT</text><text x="110" y="125" text-anchor="middle" fill="#1e40af" font-size="7">SQL%NOTFOUND</text><text x="110" y="142" text-anchor="middle" fill="#64748b" font-size="7">Oracle handles everything</text><rect x="230" y="5" width="200" height="145" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="25" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="11">Explicit Cursor</text><text x="330" y="45" text-anchor="middle" fill="#334155" font-size="8">✅ Created by developer</text><text x="330" y="60" text-anchor="middle" fill="#334155" font-size="8">✅ For multi-row queries</text><text x="330" y="75" text-anchor="middle" fill="#334155" font-size="8">✅ DECLARE → OPEN → FETCH → CLOSE</text><text x="330" y="90" text-anchor="middle" fill="#334155" font-size="8">✅ Full control over rows</text><text x="330" y="110" text-anchor="middle" fill="#16a34a" font-size="7">cur%FOUND, cur%ROWCOUNT</text><text x="330" y="125" text-anchor="middle" fill="#16a34a" font-size="7">cur%NOTFOUND, cur%ISOPEN</text><text x="330" y="142" text-anchor="middle" fill="#64748b" font-size="7">You control everything</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Implicit Cursor (auto by Oracle)</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * 1.1;<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(SQL%ROWCOUNT || <span class="str">\' rows updated\'</span>);<br><span class="kw">END</span>;<br><br><span class="cm">-- Explicit Cursor (you control)</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="kw">CURSOR</span> c_emp <span class="kw">IS</span> <span class="kw">SELECT</span> Name, Salary <span class="kw">FROM</span> Employee;<br>&nbsp;&nbsp;v_name Employee.Name%TYPE;<br>&nbsp;&nbsp;v_sal Employee.Salary%TYPE;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">OPEN</span> c_emp;<br>&nbsp;&nbsp;<span class="kw">LOOP</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">FETCH</span> c_emp <span class="kw">INTO</span> v_name, v_sal;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">EXIT WHEN</span> c_emp%NOTFOUND;<br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\' - \'</span> || v_sal);<br>&nbsp;&nbsp;<span class="kw">END LOOP</span>;<br>&nbsp;&nbsp;<span class="kw">CLOSE</span> c_emp;<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Cursor</span> is a pointer to a query result set. <span class="key">Implicit cursors</span> are auto-created by Oracle for single SQL statements. <span class="key">Explicit cursors</span> are declared by developers for multi-row processing with DECLARE, OPEN, FETCH, CLOSE lifecycle. Use cursor FOR loop for simpler syntax."</p>'},
{q:"What is the difference between WHERE and HAVING?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>WHERE</b> filters <b>rows BEFORE</b> grouping. <b>HAVING</b> filters <b>groups AFTER</b> GROUP BY. WHERE works on individual rows, HAVING works on aggregated results.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- WHERE: filter rows first, then group</span><br><span class="kw">SELECT</span> DeptId, COUNT(*) <span class="kw">as</span> Total<br><span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Salary > 30000 <span class="cm">-- filter individual rows</span><br><span class="kw">GROUP BY</span> DeptId<br><span class="kw">HAVING</span> COUNT(*) > 5; <span class="cm">-- filter groups</span><br><br><span class="cm">-- WHERE: cannot use COUNT, SUM, AVG</span><br><span class="cm">-- HAVING: can use aggregate functions</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">WHERE</span> filters rows before GROUP BY and cannot use aggregate functions. <span class="key">HAVING</span> filters groups after GROUP BY and can use COUNT, SUM, AVG. Execution order: WHERE → GROUP BY → HAVING."</p>'},
{q:"What are Joins? Explain INNER, LEFT, RIGHT, FULL JOIN.",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Joins</b> combine data from <b>two or more tables</b> based on a related column.</p><svg viewBox="0 0 440 120" style="max-width:440px"><rect x="10" y="5" width="100" height="50" rx="6" fill="#3b82f6"/><text x="60" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">INNER JOIN</text><text x="60" y="42" text-anchor="middle" fill="#bae6fd" font-size="7">Only matching rows</text><rect x="120" y="5" width="100" height="50" rx="6" fill="#10b981"/><text x="170" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">LEFT JOIN</text><text x="170" y="42" text-anchor="middle" fill="#d1fae5" font-size="7">All left + match right</text><rect x="230" y="5" width="100" height="50" rx="6" fill="#f59e0b"/><text x="280" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">RIGHT JOIN</text><text x="280" y="42" text-anchor="middle" fill="#fef3c7" font-size="7">All right + match left</text><rect x="340" y="5" width="90" height="50" rx="6" fill="#8b5cf6"/><text x="385" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">FULL JOIN</text><text x="385" y="42" text-anchor="middle" fill="#ede9fe" font-size="7">All from both</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">-- INNER: only employees WITH department</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">INNER JOIN</span> Department d<br><span class="kw">ON</span> e.DeptId = d.DeptId;<br><br><span class="cm">-- LEFT: all employees, even without dept</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">LEFT JOIN</span> Department d<br><span class="kw">ON</span> e.DeptId = d.DeptId;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">INNER JOIN</span> returns only matching rows from both tables. <span class="key">LEFT JOIN</span> returns all left rows + matching right (NULL if no match). <span class="key">RIGHT JOIN</span> is opposite. <span class="key">FULL OUTER JOIN</span> returns all rows from both tables."</p>'},
{q:"What is a Stored Procedure? How do you create one?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Stored Procedure</b> is a <b>saved PL/SQL program</b> stored in the database. You write it once, call it many times. Like saving a recipe — cook anytime without rewriting steps.</p><svg viewBox="0 0 440 130" style="max-width:440px"><rect x="10" y="10" width="130" height="100" rx="8" fill="#64748b"/><text x="75" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">📝 Anonymous Block</text><text x="75" y="50" text-anchor="middle" fill="#e2e8f0" font-size="7">❌ Not saved</text><text x="75" y="63" text-anchor="middle" fill="#e2e8f0" font-size="7">❌ Write every time</text><text x="75" y="76" text-anchor="middle" fill="#e2e8f0" font-size="7">❌ Cannot call again</text><text x="75" y="100" text-anchor="middle" fill="#e2e8f0" font-size="7">One-time use</text><text x="170" y="60" text-anchor="middle" fill="#64748b" font-size="14">→</text><rect x="200" y="10" width="230" height="100" rx="8" fill="#10b981"/><text x="315" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">✅ Stored Procedure</text><text x="315" y="50" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Saved in database</text><text x="315" y="63" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Call anytime: EXEC proc_name</text><text x="315" y="76" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Accepts parameters (IN/OUT)</text><text x="315" y="89" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Pre-compiled = faster</text><text x="315" y="105" text-anchor="middle" fill="#d1fae5" font-size="7" font-weight="600">Reusable and secure!</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Create Procedure</span><br><span class="kw">CREATE OR REPLACE PROCEDURE</span> give_raise(<br>&nbsp;&nbsp;p_emp_id <span class="kw">IN</span> NUMBER,<br>&nbsp;&nbsp;p_percent <span class="kw">IN</span> NUMBER,<br>&nbsp;&nbsp;p_new_sal <span class="kw">OUT</span> NUMBER<br>) <span class="kw">AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee<br>&nbsp;&nbsp;<span class="kw">SET</span> Salary = Salary * (1 + p_percent/100)<br>&nbsp;&nbsp;<span class="kw">WHERE</span> EmpId = p_emp_id<br>&nbsp;&nbsp;<span class="kw">RETURNING</span> Salary <span class="kw">INTO</span> p_new_sal;<br>&nbsp;&nbsp;<span class="kw">COMMIT</span>;<br><span class="kw">END</span>;<br><br><span class="cm">-- Call it</span><br><span class="kw">DECLARE</span> v_sal NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;give_raise(101, 10, v_sal);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'New salary: \'</span> || v_sal);<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Stored Procedure</span> is a named PL/SQL block stored in the database. It accepts <span class="key">IN</span> (input), <span class="key">OUT</span> (output), <span class="key">IN OUT</span> (both) parameters. Benefits: reusable, pre-compiled (faster), reduces network traffic, and provides security through controlled access."</p>'},
{q:"What is a Function? Difference between Procedure and Function?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Function</b> is like a Procedure but it <b>MUST return a value</b>. Procedure = does a task. Function = does a task AND gives back a result.</p><svg viewBox="0 0 440 160" style="max-width:440px"><rect x="10" y="5" width="200" height="145" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="25" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12">Procedure</text><text x="110" y="45" text-anchor="middle" fill="#334155" font-size="8">❌ No RETURN value</text><text x="110" y="60" text-anchor="middle" fill="#334155" font-size="8">✅ IN, OUT, IN OUT params</text><text x="110" y="75" text-anchor="middle" fill="#334155" font-size="8">❌ Cannot use in SELECT</text><text x="110" y="90" text-anchor="middle" fill="#334155" font-size="8">✅ Can have DML (INSERT etc)</text><text x="110" y="105" text-anchor="middle" fill="#334155" font-size="8">✅ Called with EXEC/CALL</text><text x="110" y="128" text-anchor="middle" fill="#1e40af" font-size="7">EXEC give_raise(101, 10);</text><text x="110" y="142" text-anchor="middle" fill="#64748b" font-size="7">Does action, no return</text><rect x="230" y="5" width="200" height="145" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="25" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">Function</text><text x="330" y="45" text-anchor="middle" fill="#334155" font-size="8">✅ MUST RETURN a value</text><text x="330" y="60" text-anchor="middle" fill="#334155" font-size="8">✅ Only IN params (usually)</text><text x="330" y="75" text-anchor="middle" fill="#334155" font-size="8">✅ Can use in SELECT</text><text x="330" y="90" text-anchor="middle" fill="#334155" font-size="8">❌ Should avoid DML</text><text x="330" y="105" text-anchor="middle" fill="#334155" font-size="8">✅ Called in expressions</text><text x="330" y="128" text-anchor="middle" fill="#16a34a" font-size="7">SELECT get_salary(101) FROM dual;</text><text x="330" y="142" text-anchor="middle" fill="#64748b" font-size="7">Calculates and returns</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Function: MUST return a value</span><br><span class="kw">CREATE OR REPLACE FUNCTION</span> get_salary(<br>&nbsp;&nbsp;p_emp_id <span class="kw">IN</span> NUMBER<br>) <span class="kw">RETURN</span> NUMBER <span class="kw">AS</span><br>&nbsp;&nbsp;v_sal NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Salary <span class="kw">INTO</span> v_sal<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = p_emp_id;<br>&nbsp;&nbsp;<span class="kw">RETURN</span> v_sal; <span class="cm">-- MUST return!</span><br><span class="kw">END</span>;<br><br><span class="cm">-- Use in SELECT (procedure cannot do this!)</span><br><span class="kw">SELECT</span> Name, get_salary(EmpId) <span class="kw">FROM</span> Employee;</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Function</span> MUST return a value using RETURN keyword and can be used inside SELECT statements. A <span class="key">Procedure</span> does not return a value (uses OUT params instead) and cannot be used in SELECT. Use functions for calculations, procedures for actions like INSERT/UPDATE."</p>'},
{q:"What are IN, OUT, and IN OUT parameters?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>IN</b> = input only, pass value INTO procedure (default). <b>OUT</b> = output only, procedure sends value BACK. <b>IN OUT</b> = both ways, pass in and get modified value back.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE PROCEDURE</span> calculate_bonus(<br>&nbsp;&nbsp;p_emp_id <span class="kw">IN</span> NUMBER, <span class="cm">-- input: read only</span><br>&nbsp;&nbsp;p_bonus <span class="kw">OUT</span> NUMBER, <span class="cm">-- output: procedure sets this</span><br>&nbsp;&nbsp;p_salary <span class="kw">IN OUT</span> NUMBER <span class="cm">-- both: read + modify</span><br>) <span class="kw">AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;p_bonus := p_salary * 0.1; <span class="cm">-- set OUT param</span><br>&nbsp;&nbsp;p_salary := p_salary + p_bonus; <span class="cm">-- modify IN OUT param</span><br><span class="kw">END</span>;<br><br><span class="cm">-- Call it</span><br><span class="kw">DECLARE</span> v_bonus NUMBER; v_sal NUMBER := 50000;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;calculate_bonus(101, v_bonus, v_sal);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_bonus); <span class="cm">-- 5000</span><br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_sal); <span class="cm">-- 55000 (modified!)</span><br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">IN</span> is default, read-only input. <span class="key">OUT</span> is write-only, procedure assigns value for caller. <span class="key">IN OUT</span> is read-write, caller passes value and procedure can modify it. IN params can have defaults, OUT/IN OUT cannot."</p>'},
{q:"What is NVL? Difference between NVL and NVL2?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>NVL(value, default)</b> = if value is NULL, return default.<br><b>NVL2(value, not_null_result, null_result)</b> = if NOT null return 2nd param, if NULL return 3rd param.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- NVL: replace NULL with default</span><br><span class="kw">SELECT</span> NVL(Phone, <span class="str">\'No Phone\'</span>) <span class="kw">FROM</span> Employee;<br><span class="cm">-- NULL → "No Phone", "9876543210" → "9876543210"</span><br><br><span class="cm">-- NVL2: different result for null vs not-null</span><br><span class="kw">SELECT</span> NVL2(Commission, Salary + Commission, Salary) <span class="kw">FROM</span> Employee;<br><span class="cm">-- Commission exists → Salary + Commission</span><br><span class="cm">-- Commission is NULL → just Salary</span><br><br><span class="cm">-- NVL2 for status display</span><br><span class="kw">SELECT</span> NVL2(ManagerId, <span class="str">\'Has Manager\'</span>, <span class="str">\'Top Level\'</span>) <span class="kw">FROM</span> Employee;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">NVL(expr, default)</span> returns default if expr is NULL. <span class="key">NVL2(expr, val_if_not_null, val_if_null)</span> returns different values based on whether expr is NULL or not. NVL is like ISNULL in SQL Server. NVL2 is more flexible with 3 parameters."</p>'},
{q:"What is the difference between DELETE, TRUNCATE, and DROP?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>DELETE</b> = remove rows (can undo, slow). <b>TRUNCATE</b> = remove ALL rows (fast, cant undo). <b>DROP</b> = destroy entire table.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- DELETE: DML, can rollback, fires triggers</span><br><span class="kw">DELETE FROM</span> Employee <span class="kw">WHERE</span> DeptId = 3;<br><span class="kw">ROLLBACK</span>; <span class="cm">-- undo! ✅</span><br><br><span class="cm">-- TRUNCATE: DDL, cannot rollback, no triggers</span><br><span class="kw">TRUNCATE TABLE</span> Employee; <span class="cm">-- all rows gone, fast!</span><br><br><span class="cm">-- DROP: DDL, removes table completely</span><br><span class="kw">DROP TABLE</span> Employee; <span class="cm">-- table + data + indexes gone!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">DELETE</span> is DML, supports WHERE, can rollback, fires triggers, slow. <span class="key">TRUNCATE</span> is DDL, removes all rows, resets sequences, fast, no rollback. <span class="key">DROP</span> is DDL, removes entire table structure. In Oracle, use FLASHBACK TABLE to recover dropped tables from recycle bin."</p>'},
{q:"What are Constraints? Explain PK, FK, UNIQUE, CHECK, NOT NULL.",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Constraints</b> are rules that enforce data integrity at the database level.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE TABLE</span> Employee (<br>&nbsp;&nbsp;Id NUMBER <span class="kw">PRIMARY KEY</span>, <span class="cm">-- unique + not null</span><br>&nbsp;&nbsp;Name VARCHAR2(50) <span class="kw">NOT NULL</span>, <span class="cm">-- must have value</span><br>&nbsp;&nbsp;Email VARCHAR2(100) <span class="kw">UNIQUE</span>, <span class="cm">-- no duplicates</span><br>&nbsp;&nbsp;Age NUMBER <span class="kw">CHECK</span>(Age BETWEEN 18 AND 65), <span class="cm">-- range rule</span><br>&nbsp;&nbsp;DeptId NUMBER <span class="kw">REFERENCES</span> Department(Id) <span class="cm">-- foreign key</span><br>);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">PRIMARY KEY</span> = unique + not null. <span class="key">FOREIGN KEY</span> = references parent table. <span class="key">UNIQUE</span> = no duplicates (allows null). <span class="key">CHECK</span> = validates condition. <span class="key">NOT NULL</span> = mandatory value. Constraints ensure data integrity at DB level."</p>'},
{q:"What is a Sequence? How do you use it?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Sequence</b> is an Oracle object that generates <b>unique sequential numbers</b> automatically. Like a token counter. Used for primary key values (Oracle doesnt have IDENTITY like SQL Server).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Create sequence</span><br><span class="kw">CREATE SEQUENCE</span> emp_seq<br>&nbsp;&nbsp;START WITH 1<br>&nbsp;&nbsp;INCREMENT BY 1<br>&nbsp;&nbsp;NOCACHE; <span class="cm">-- or CACHE 20 for performance</span><br><br><span class="cm">-- Use in INSERT</span><br><span class="kw">INSERT INTO</span> Employee(Id, Name)<br><span class="kw">VALUES</span>(emp_seq.NEXTVAL, <span class="str">\'Arjun\'</span>); <span class="cm">-- Id = 1</span><br><br><span class="kw">INSERT INTO</span> Employee(Id, Name)<br><span class="kw">VALUES</span>(emp_seq.NEXTVAL, <span class="str">\'Ravi\'</span>); <span class="cm">-- Id = 2</span><br><br><span class="cm">-- Get current value</span><br><span class="kw">SELECT</span> emp_seq.CURRVAL <span class="kw">FROM</span> dual; <span class="cm">-- 2</span><br><br><span class="cm">-- Oracle 12c+ Identity column (like SQL Server)</span><br>Id NUMBER <span class="kw">GENERATED ALWAYS AS IDENTITY</span>;</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Sequence</span> generates unique numbers using NEXTVAL (next value) and CURRVAL (current value). Used for primary keys. CACHE improves performance by pre-generating numbers. Oracle 12c+ supports <span class="key">IDENTITY columns</span> as an alternative. Sequences are independent objects — can be shared across tables."</p>'},
{q:"What is DECODE? How is it different from CASE?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>DECODE</b> = Oracle-specific IF-THEN-ELSE in SQL. <b>CASE</b> = ANSI standard, more powerful, supports ranges and complex conditions.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- DECODE: simple equality checks only</span><br><span class="kw">SELECT</span> Name,<br>&nbsp;&nbsp;DECODE(DeptId, 1, <span class="str">\'IT\'</span>, 2, <span class="str">\'HR\'</span>, 3, <span class="str">\'Sales\'</span>, <span class="str">\'Other\'</span>) <span class="kw">as</span> Dept<br><span class="kw">FROM</span> Employee;<br><span class="cm">-- If DeptId=1 then IT, if 2 then HR, else Other</span><br><br><span class="cm">-- CASE: more powerful, supports ranges ⭐</span><br><span class="kw">SELECT</span> Name,<br>&nbsp;&nbsp;<span class="kw">CASE</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">WHEN</span> Salary > 80000 <span class="kw">THEN</span> <span class="str">\'Senior\'</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">WHEN</span> Salary > 50000 <span class="kw">THEN</span> <span class="str">\'Mid\'</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">ELSE</span> <span class="str">\'Junior\'</span><br>&nbsp;&nbsp;<span class="kw">END</span> <span class="kw">as</span> Level<br><span class="kw">FROM</span> Employee;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">DECODE</span> is Oracle-specific, only does equality checks (=), compact syntax. <span class="key">CASE</span> is ANSI standard, supports ranges (>, <, BETWEEN, LIKE, IS NULL), more readable. Prefer CASE for new code — its portable and more powerful."</p>'},
{q:"What is the difference between CHAR and VARCHAR2?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>CHAR</b> = fixed length, always uses full space (padded with spaces). <b>VARCHAR2</b> = variable length, uses only what you give. VARCHAR2 saves space!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- CHAR(10): always 10 bytes</span><br><span class="kw">DECLARE</span> v_code CHAR(10) := <span class="str">\'Hi\'</span>;<br><span class="cm">-- Stored as: "Hi        " (padded to 10 chars)</span><br>LENGTH(v_code); <span class="cm">-- 10 (includes padding!)</span><br><br><span class="cm">-- VARCHAR2(10): only uses needed space</span><br><span class="kw">DECLARE</span> v_name VARCHAR2(10) := <span class="str">\'Hi\'</span>;<br><span class="cm">-- Stored as: "Hi" (2 bytes only)</span><br>LENGTH(v_name); <span class="cm">-- 2</span><br><br><span class="cm">-- ⚠️ CHAR comparison trap!</span><br><span class="cm">-- CHAR(10) \'Hi\' = CHAR(10) \'Hi\' → TRUE (both padded)</span><br><span class="cm">-- CHAR(10) \'Hi\' = VARCHAR2 \'Hi\' → may be FALSE! (padding mismatch)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">CHAR</span> is fixed-length, padded with spaces — use for fixed codes (Gender=M, Country=IN). <span class="key">VARCHAR2</span> is variable-length, saves space — use for names, addresses, most text. VARCHAR2 max is 4000 bytes in SQL, 32767 in PL/SQL. Always prefer VARCHAR2 unless data is truly fixed-length."</p>'},
// Intermediate
{q:"What are Triggers? Explain BEFORE, AFTER, INSTEAD OF triggers.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Trigger</b> runs automatically when INSERT/UPDATE/DELETE happens. <b>BEFORE</b> = runs before the action (can modify data). <b>AFTER</b> = runs after (for logging). <b>INSTEAD OF</b> = replaces the action.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- BEFORE trigger: auto-set created date</span><br><span class="kw">CREATE TRIGGER</span> trg_before_insert<br><span class="kw">BEFORE INSERT ON</span> Employee<br><span class="kw">FOR EACH ROW</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;:NEW.CreatedAt := SYSDATE; <span class="cm">-- set before insert</span><br>&nbsp;&nbsp;:NEW.Name := UPPER(:NEW.Name); <span class="cm">-- auto uppercase</span><br><span class="kw">END</span>;<br><br><span class="cm">-- AFTER trigger: audit log</span><br><span class="kw">CREATE TRIGGER</span> trg_after_delete<br><span class="kw">AFTER DELETE ON</span> Employee<br><span class="kw">FOR EACH ROW</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">INSERT INTO</span> AuditLog(Action, EmpName, DeletedAt)<br>&nbsp;&nbsp;<span class="kw">VALUES</span>(<span class="str">\'DELETE\'</span>, :OLD.Name, SYSDATE);<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">BEFORE</span> triggers run before DML — can modify :NEW values, validate data. <span class="key">AFTER</span> triggers run after DML — used for auditing, logging. <span class="key">INSTEAD OF</span> triggers replace the DML — used on views for complex updates. :NEW has new values, :OLD has previous values."</p>'},
{q:"What are Packages? Explain Package Specification and Body.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Package</b> groups related procedures, functions, variables into <b>one unit</b>. <b>Specification</b> = public interface (what you can call). <b>Body</b> = private implementation (how it works).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Package Specification (public interface)</span><br><span class="kw">CREATE PACKAGE</span> emp_pkg <span class="kw">AS</span><br>&nbsp;&nbsp;<span class="kw">PROCEDURE</span> hire_employee(p_name VARCHAR2, p_salary NUMBER);<br>&nbsp;&nbsp;<span class="kw">FUNCTION</span> get_salary(p_id NUMBER) <span class="kw">RETURN</span> NUMBER;<br>&nbsp;&nbsp;c_tax_rate CONSTANT NUMBER := 0.18;<br><span class="kw">END</span> emp_pkg;<br><br><span class="cm">-- Package Body (private implementation)</span><br><span class="kw">CREATE PACKAGE BODY</span> emp_pkg <span class="kw">AS</span><br>&nbsp;&nbsp;<span class="cm">-- Private helper (not in spec = hidden!)</span><br>&nbsp;&nbsp;<span class="kw">PROCEDURE</span> log_action(p_msg VARCHAR2) <span class="kw">IS BEGIN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">INSERT INTO</span> Logs <span class="kw">VALUES</span>(p_msg, SYSDATE);<br>&nbsp;&nbsp;<span class="kw">END</span>;<br><br>&nbsp;&nbsp;<span class="kw">PROCEDURE</span> hire_employee(p_name VARCHAR2, p_salary NUMBER) <span class="kw">IS BEGIN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">INSERT INTO</span> Employee(Name, Salary) <span class="kw">VALUES</span>(p_name, p_salary);<br>&nbsp;&nbsp;&nbsp;&nbsp;log_action(<span class="str">\'Hired: \'</span> || p_name);<br>&nbsp;&nbsp;<span class="kw">END</span>;<br><span class="kw">END</span> emp_pkg;<br><br><span class="cm">-- Call: emp_pkg.hire_employee(\'Arjun\', 50000);</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Package</span> groups related PL/SQL objects. <span class="key">Specification</span> declares public interface (visible to callers). <span class="key">Body</span> contains implementation + private members. Benefits: encapsulation, modularity, better performance (loaded once into memory), overloading support."</p>'},
{q:"What is a REF CURSOR? Strong vs Weak REF CURSOR?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>REF CURSOR</b> is a <b>pointer to a result set</b> that can be passed between programs. <b>Strong</b> = tied to specific return type. <b>Weak</b> = can return any query result (SYS_REFCURSOR).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Strong REF CURSOR: fixed return type</span><br><span class="kw">TYPE</span> emp_cursor <span class="kw">IS REF CURSOR RETURN</span> Employee%ROWTYPE;<br><br><span class="cm">-- Weak REF CURSOR: any query (most common ⭐)</span><br><span class="kw">PROCEDURE</span> get_data(p_cursor <span class="kw">OUT</span> SYS_REFCURSOR) <span class="kw">IS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">OPEN</span> p_cursor <span class="kw">FOR</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = 1;<br><span class="kw">END</span>;<br><br><span class="cm">-- Call from C# / .NET</span><br><span class="cm">// OracleCommand cmd = new OracleCommand("get_data", conn);</span><br><span class="cm">// cmd.Parameters.Add("p_cursor", OracleDbType.RefCursor, ParameterDirection.Output);</span><br><span class="cm">// OracleDataReader reader = cmd.ExecuteReader();</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">REF CURSOR</span> is a pointer to a query result set. <span class="key">Strong</span> is typed (RETURN type specified) — compile-time checking. <span class="key">Weak</span> (SYS_REFCURSOR) can return any query — more flexible. Commonly used to return result sets to .NET/Java applications from stored procedures."</p>'},
{q:"What are Collections? Explain VARRAY, Nested Table, Associative Array.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>Collections are <b>array-like structures</b> in PL/SQL to hold multiple values.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Associative Array (INDEX BY) - most flexible ⭐</span><br><span class="kw">TYPE</span> name_table <span class="kw">IS TABLE OF</span> VARCHAR2(50) <span class="kw">INDEX BY</span> PLS_INTEGER;<br>v_names name_table;<br>v_names(1) := <span class="str">\'Arjun\'</span>; v_names(2) := <span class="str">\'Ravi\'</span>;<br><span class="cm">-- No fixed size, sparse, PL/SQL only (not in tables)</span><br><br><span class="cm">-- 2. Nested Table - can store in DB column</span><br><span class="kw">TYPE</span> name_nt <span class="kw">IS TABLE OF</span> VARCHAR2(50);<br>v_names name_nt := name_nt(<span class="str">\'Arjun\'</span>, <span class="str">\'Ravi\'</span>);<br><span class="cm">-- Dynamic size, dense, can be stored in table column</span><br><br><span class="cm">-- 3. VARRAY - fixed max size</span><br><span class="kw">TYPE</span> name_va <span class="kw">IS VARRAY</span>(5) <span class="kw">OF</span> VARCHAR2(50);<br>v_names name_va := name_va(<span class="str">\'Arjun\'</span>, <span class="str">\'Ravi\'</span>);<br><span class="cm">-- Max 5 elements, dense, can be stored in table column</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Associative Array</span> (INDEX BY) — key-value pairs, sparse, PL/SQL only, most flexible. <span class="key">Nested Table</span> — dynamic size, can be stored in DB columns, supports set operations. <span class="key">VARRAY</span> — fixed max size, dense, stored in DB. Use Associative Array for PL/SQL processing, Nested Table for DB storage."</p>'},
{q:"What is BULK COLLECT and FORALL?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>BULK COLLECT</b> = fetch <b>many rows at once</b> into a collection (instead of one by one). <b>FORALL</b> = execute DML for <b>all collection elements at once</b>. Both reduce context switches between SQL and PL/SQL engines = MUCH faster!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- ❌ SLOW: row-by-row processing</span><br><span class="kw">FOR</span> rec <span class="kw">IN</span> (<span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee) <span class="kw">LOOP</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * 1.1 <span class="kw">WHERE</span> Id = rec.Id;<br><span class="kw">END LOOP</span>; <span class="cm">-- 10000 context switches! 💥</span><br><br><span class="cm">-- ✅ FAST: BULK COLLECT + FORALL</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="kw">TYPE</span> id_table <span class="kw">IS TABLE OF</span> Employee.Id%TYPE;<br>&nbsp;&nbsp;v_ids id_table;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="cm">-- Fetch all IDs at once</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Id <span class="kw">BULK COLLECT INTO</span> v_ids <span class="kw">FROM</span> Employee;<br><br>&nbsp;&nbsp;<span class="cm">-- Update all at once</span><br>&nbsp;&nbsp;<span class="kw">FORALL</span> i <span class="kw">IN</span> v_ids.FIRST..v_ids.LAST<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * 1.1 <span class="kw">WHERE</span> Id = v_ids(i);<br><span class="kw">END</span>; <span class="cm">-- 1 context switch! 🚀</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">BULK COLLECT</span> fetches multiple rows into a collection in one context switch. <span class="key">FORALL</span> executes DML for all collection elements in one switch. Together they reduce SQL-PL/SQL context switches from N to 1 — 10-50x faster for large datasets. Use LIMIT clause with BULK COLLECT for memory management."</p>'},
{q:"What is the difference between UNION and UNION ALL?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>UNION</b> = combines and <b>removes duplicates</b> (slower). <b>UNION ALL</b> = combines and <b>keeps all rows</b> (faster).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- UNION: removes duplicates</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employees <span class="kw">UNION</span> <span class="kw">SELECT</span> Name <span class="kw">FROM</span> Contractors;<br><br><span class="cm">-- UNION ALL: keeps duplicates (faster!)</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employees <span class="kw">UNION ALL</span> <span class="kw">SELECT</span> Name <span class="kw">FROM</span> Contractors;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">UNION</span> removes duplicates using sort — slower. <span class="key">UNION ALL</span> keeps all rows — faster. Use UNION ALL when duplicates are acceptable or impossible."</p>'},
{q:"What are Analytical Functions? Explain ROW_NUMBER, RANK, DENSE_RANK.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Analytical functions</b> calculate values across rows without collapsing them (unlike GROUP BY).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Salaries: 80000, 70000, 70000, 60000</span><br><br><span class="cm">-- ROW_NUMBER: unique number, no ties</span><br><span class="cm">-- 80000=1, 70000=2, 70000=3, 60000=4</span><br><br><span class="cm">-- RANK: same for ties, SKIPS next</span><br><span class="cm">-- 80000=1, 70000=2, 70000=2, 60000=4 (skips 3!)</span><br><br><span class="cm">-- DENSE_RANK: same for ties, NO skip</span><br><span class="cm">-- 80000=1, 70000=2, 70000=2, 60000=3</span><br><br><span class="kw">SELECT</span> Name, Salary,<br>&nbsp;&nbsp;ROW_NUMBER() OVER(<span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>) <span class="kw">as</span> rn,<br>&nbsp;&nbsp;RANK() OVER(<span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>) <span class="kw">as</span> rnk,<br>&nbsp;&nbsp;DENSE_RANK() OVER(<span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>) <span class="kw">as</span> drnk<br><span class="kw">FROM</span> Employee;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">ROW_NUMBER</span> gives unique sequential numbers. <span class="key">RANK</span> gives same number for ties but skips. <span class="key">DENSE_RANK</span> gives same for ties, no skip. Use PARTITION BY to restart per group. Common interview question: find Nth highest salary using DENSE_RANK."</p>'},
{q:"What is a Materialized View? How is it different from a View?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>View</b> = saved query, runs every time (virtual). <b>Materialized View</b> = saved query + <b>stores the result physically</b>. Much faster reads but data can be stale.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Regular View: runs query every time</span><br><span class="kw">CREATE VIEW</span> v_dept_summary <span class="kw">AS</span><br><span class="kw">SELECT</span> DeptId, COUNT(*) cnt, AVG(Salary) avg_sal<br><span class="kw">FROM</span> Employee <span class="kw">GROUP BY</span> DeptId;<br><br><span class="cm">-- Materialized View: stores result, refreshes periodically</span><br><span class="kw">CREATE MATERIALIZED VIEW</span> mv_dept_summary<br>REFRESH FAST ON COMMIT <span class="cm">-- auto-refresh when data changes</span><br><span class="kw">AS</span><br><span class="kw">SELECT</span> DeptId, COUNT(*) cnt, SUM(Salary) total_sal<br><span class="kw">FROM</span> Employee <span class="kw">GROUP BY</span> DeptId;<br><br><span class="cm">-- Manual refresh</span><br>DBMS_MVIEW.REFRESH(<span class="str">\'mv_dept_summary\'</span>);</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">View</span> is virtual — query runs every time. A <span class="key">Materialized View</span> stores data physically — instant reads. Refresh modes: <span class="key">ON COMMIT</span> (auto after changes), <span class="key">ON DEMAND</span> (manual), <span class="key">FAST</span> (incremental) or <span class="key">COMPLETE</span> (full rebuild). Used for reporting, data warehousing, remote data caching."</p>'},
{q:"What is the MERGE statement?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>MERGE</b> does INSERT or UPDATE in <b>one statement</b> based on whether the row exists. Also called UPSERT.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">MERGE INTO</span> Products target<br><span class="kw">USING</span> NewProducts source<br><span class="kw">ON</span> (target.Id = source.Id)<br><br><span class="kw">WHEN MATCHED THEN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE SET</span> target.Price = source.Price<br><br><span class="kw">WHEN NOT MATCHED THEN</span><br>&nbsp;&nbsp;<span class="kw">INSERT</span>(Id, Name, Price)<br>&nbsp;&nbsp;<span class="kw">VALUES</span>(source.Id, source.Name, source.Price);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">MERGE</span> combines INSERT and UPDATE in one atomic statement. WHEN MATCHED = update existing rows. WHEN NOT MATCHED = insert new rows. Efficient for syncing data between tables. Also supports DELETE in the MATCHED clause."</p>'},
{q:"What are Exceptions? Explain Predefined and User-Defined Exceptions.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Exceptions</b> handle errors in PL/SQL. <b>Predefined</b> = built-in errors Oracle already knows (NO_DATA_FOUND, TOO_MANY_ROWS). <b>User-Defined</b> = custom errors YOU create for business rules.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Predefined exceptions</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name <span class="kw">INTO</span> v_name <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Id = 999;<br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> NO_DATA_FOUND <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Not found\'</span>);<br>&nbsp;&nbsp;<span class="kw">WHEN</span> TOO_MANY_ROWS <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Multiple rows\'</span>);<br>&nbsp;&nbsp;<span class="kw">WHEN</span> OTHERS <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Error: \'</span> || SQLERRM);<br><span class="kw">END</span>;<br><br><span class="cm">-- User-Defined exception</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;e_low_salary <span class="kw">EXCEPTION</span>;<br>&nbsp;&nbsp;v_sal NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Salary <span class="kw">INTO</span> v_sal <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Id = 101;<br>&nbsp;&nbsp;<span class="kw">IF</span> v_sal &lt; 10000 <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">RAISE</span> e_low_salary; <span class="cm">-- throw custom error!</span><br>&nbsp;&nbsp;<span class="kw">END IF</span>;<br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> e_low_salary <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Salary too low!\'</span>);<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Predefined</span> exceptions are built-in: NO_DATA_FOUND, TOO_MANY_ROWS, ZERO_DIVIDE, DUP_VAL_ON_INDEX. <span class="key">User-defined</span> are declared with EXCEPTION keyword and raised with RAISE. WHEN OTHERS catches all unhandled errors. SQLCODE gives error number, SQLERRM gives error message."</p>'},
