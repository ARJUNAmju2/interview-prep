{q:"What is PRAGMA EXCEPTION_INIT?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>PRAGMA EXCEPTION_INIT</b> links a <b>user-defined exception name</b> to a specific <b>Oracle error number</b>. So instead of catching error -2292, you catch a meaningful name like e_child_exists.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">DECLARE</span><br>&nbsp;&nbsp;e_child_exists <span class="kw">EXCEPTION</span>;<br>&nbsp;&nbsp;<span class="kw">PRAGMA EXCEPTION_INIT</span>(e_child_exists, -2292); <span class="cm">-- FK violation</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">DELETE FROM</span> Department <span class="kw">WHERE</span> Id = 1;<br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> e_child_exists <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Cannot delete - employees exist!\'</span>);<br><span class="kw">END</span>;<br><br><span class="cm">-- Common Oracle error codes:</span><br><span class="cm">-- -1: unique constraint violated</span><br><span class="cm">-- -2292: child record found (FK)</span><br><span class="cm">-- -1400: cannot insert NULL</span><br><span class="cm">-- -1422: exact fetch returns more than one row</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">PRAGMA EXCEPTION_INIT</span> associates a user-defined exception with an Oracle error number. This lets you catch specific Oracle errors by meaningful names instead of using WHEN OTHERS with SQLCODE checks. Makes error handling cleaner and more readable."</p>'},
{q:"What is the difference between RAISE and RAISE_APPLICATION_ERROR?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>RAISE</b> = throws a PL/SQL exception (caught within PL/SQL only). <b>RAISE_APPLICATION_ERROR</b> = throws an error that <b>reaches the calling application</b> (C#, Java) with a custom error number and message.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- RAISE: PL/SQL internal only</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;e_invalid <span class="kw">EXCEPTION</span>;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">RAISE</span> e_invalid; <span class="cm">-- caught in EXCEPTION block</span><br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> e_invalid <span class="kw">THEN</span> NULL;<br><span class="kw">END</span>;<br><br><span class="cm">-- RAISE_APPLICATION_ERROR: reaches calling app!</span><br><span class="kw">CREATE PROCEDURE</span> withdraw(p_amt NUMBER) <span class="kw">AS</span><br>&nbsp;&nbsp;v_balance NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Balance <span class="kw">INTO</span> v_balance <span class="kw">FROM</span> Account;<br>&nbsp;&nbsp;<span class="kw">IF</span> p_amt > v_balance <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;RAISE_APPLICATION_ERROR(-20001, <span class="str">\'Insufficient balance!\'</span>);<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">-- Error number must be -20000 to -20999</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">-- C# catches this as OracleException!</span><br>&nbsp;&nbsp;<span class="kw">END IF</span>;<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">RAISE</span> throws exceptions within PL/SQL — caught in EXCEPTION block. <span class="key">RAISE_APPLICATION_ERROR</span> sends custom error (-20000 to -20999) to the calling application (C#, Java). Use RAISE for internal flow control, RAISE_APPLICATION_ERROR for business rule violations that the app needs to handle."</p>'},
{q:"What is a Database Link?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Database Link</b> lets you <b>access tables in a REMOTE database</b> from your current database. Like a bridge between two databases on different servers.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Create database link</span><br><span class="kw">CREATE DATABASE LINK</span> remote_db<br><span class="kw">CONNECT TO</span> remote_user <span class="kw">IDENTIFIED BY</span> password<br><span class="kw">USING</span> <span class="str">\'remote_tns_name\'</span>;<br><br><span class="cm">-- Query remote table using @link_name</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee@remote_db;<br><br><span class="cm">-- Join local and remote tables</span><br><span class="kw">SELECT</span> l.Name, r.OrderTotal<br><span class="kw">FROM</span> local_customers l<br><span class="kw">JOIN</span> orders@remote_db r <span class="kw">ON</span> l.Id = r.CustomerId;<br><br><span class="cm">-- Insert from remote to local</span><br><span class="kw">INSERT INTO</span> local_products<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> products@remote_db;</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Database Link</span> connects to a remote Oracle database using @link_name syntax. Can SELECT, INSERT, UPDATE across databases. Types: <span class="key">Private</span> (one user), <span class="key">Public</span> (all users). Use for data migration, distributed queries, and cross-database reporting. Performance depends on network speed."</p>'},
{q:"What are Indexes? Explain B-Tree vs Bitmap Indexes.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>B-Tree</b> = default index, good for <b>high cardinality</b> (many unique values like Name, ID). <b>Bitmap</b> = good for <b>low cardinality</b> (few distinct values like Gender, Status).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- B-Tree Index (default) - for unique/high cardinality</span><br><span class="kw">CREATE INDEX</span> idx_emp_name <span class="kw">ON</span> Employee(Name);<br><span class="cm">-- Good for: Name, Email, Phone (many unique values)</span><br><span class="cm">-- Best for: OLTP, frequent DML</span><br><br><span class="cm">-- Bitmap Index - for low cardinality</span><br><span class="kw">CREATE BITMAP INDEX</span> idx_emp_gender <span class="kw">ON</span> Employee(Gender);<br><span class="cm">-- Good for: Gender (M/F), Status (Active/Inactive)</span><br><span class="cm">-- Best for: OLAP/reporting, read-heavy</span><br><span class="cm">-- ❌ BAD for OLTP - locking issues with DML!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">B-Tree</span> is the default, balanced tree structure — best for high cardinality columns and OLTP. <span class="key">Bitmap</span> uses bit arrays — best for low cardinality columns and OLAP/reporting. Bitmap indexes cause severe locking in DML-heavy environments — never use on OLTP tables."</p>'},
{q:"What is EXPLAIN PLAN? How do you read an Execution Plan?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>EXPLAIN PLAN</b> shows <b>how Oracle will execute your query</b> — which indexes, joins, and operations it will use. Like an X-ray of query performance.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Generate plan</span><br><span class="kw">EXPLAIN PLAN FOR</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">JOIN</span> Department d <span class="kw">ON</span> e.DeptId = d.Id<br><span class="kw">WHERE</span> e.Salary > 50000;<br><br><span class="cm">-- View plan</span><br><span class="kw">SELECT</span> * <span class="kw">FROM TABLE</span>(DBMS_XPLAN.DISPLAY);<br><br><span class="cm">-- Key operations to look for:</span><br><span class="cm">-- ✅ INDEX RANGE SCAN = good (using index)</span><br><span class="cm">-- ✅ INDEX UNIQUE SCAN = best (PK lookup)</span><br><span class="cm">-- ❌ TABLE ACCESS FULL = bad (full table scan!)</span><br><span class="cm">-- ⚠️ SORT = expensive, check if index can avoid</span><br><span class="cm">-- Check: Cost, Rows, Bytes columns</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">EXPLAIN PLAN</span> shows the execution strategy. Read bottom-up, innermost first. Look for: <span class="key">INDEX SCAN</span> (good), <span class="key">FULL TABLE SCAN</span> (bad — add index), <span class="key">NESTED LOOPS</span> (good for small sets), <span class="key">HASH JOIN</span> (good for large sets). Use DBMS_XPLAN.DISPLAY for formatted output. Check Cost column for relative expense."</p>'},
{q:"What is the WITH clause (CTE)?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>The <b>WITH clause</b> (Common Table Expression) creates a <b>temporary named result set</b> within a query. Makes complex queries readable by breaking them into named steps.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Without WITH: messy nested subqueries</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> (<span class="kw">SELECT</span> ... <span class="kw">FROM</span> (<span class="kw">SELECT</span> ... )); <span class="cm">-- hard to read!</span><br><br><span class="cm">-- With WITH clause: clean and readable!</span><br><span class="kw">WITH</span><br>&nbsp;&nbsp;dept_stats <span class="kw">AS</span> (<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">SELECT</span> DeptId, AVG(Salary) avg_sal, COUNT(*) cnt<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">GROUP BY</span> DeptId<br>&nbsp;&nbsp;),<br>&nbsp;&nbsp;high_paying <span class="kw">AS</span> (<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">SELECT</span> * <span class="kw">FROM</span> dept_stats <span class="kw">WHERE</span> avg_sal > 60000<br>&nbsp;&nbsp;)<br><span class="kw">SELECT</span> d.DeptName, h.avg_sal, h.cnt<br><span class="kw">FROM</span> high_paying h<br><span class="kw">JOIN</span> Department d <span class="kw">ON</span> h.DeptId = d.Id;</div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">WITH clause (CTE)</span> defines temporary named result sets for the duration of a query. Benefits: readability, reusability (reference multiple times), and recursive queries for hierarchical data. Oracle may materialize CTEs for performance. Multiple CTEs separated by commas."</p>'},
{q:"What is the difference between Correlated and Non-Correlated Subqueries?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Non-Correlated</b> = inner query runs <b>once independently</b>. <b>Correlated</b> = inner query runs <b>for each row</b> of outer query (references outer table).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Non-Correlated: runs ONCE</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Salary > (<span class="kw">SELECT</span> AVG(Salary) <span class="kw">FROM</span> Employee);<br><span class="cm">-- AVG calculated once, then compared</span><br><br><span class="cm">-- Correlated: runs per EACH outer row</span><br><span class="kw">SELECT</span> e.Name, e.Salary <span class="kw">FROM</span> Employee e<br><span class="kw">WHERE</span> e.Salary > (<br>&nbsp;&nbsp;<span class="kw">SELECT</span> AVG(Salary) <span class="kw">FROM</span> Employee<br>&nbsp;&nbsp;<span class="kw">WHERE</span> DeptId = e.DeptId <span class="cm">-- references outer e!</span><br>);<br><span class="cm">-- AVG recalculated for each employees dept</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Non-correlated</span> runs independently once — faster. <span class="key">Correlated</span> references outer query, runs per row — slower but more powerful. Correlated subqueries can often be rewritten as JOINs for better performance. EXISTS with correlated subquery is common for checking related data."</p>'},
// Advanced
{q:"How do you optimize slow-running PL/SQL queries?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>Optimizing PL/SQL = reduce <b>context switches</b> (use BULK COLLECT/FORALL), optimize SQL inside PL/SQL, and use proper indexes.</p><h4>💻 Key Techniques</h4><div class="code"><span class="cm">-- 1. Use BULK COLLECT instead of row-by-row</span><br><span class="kw">SELECT</span> Id <span class="kw">BULK COLLECT INTO</span> v_ids <span class="kw">FROM</span> Employee;<br><span class="kw">FORALL</span> i <span class="kw">IN</span> v_ids.FIRST..v_ids.LAST<br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * 1.1 <span class="kw">WHERE</span> Id = v_ids(i);<br><br><span class="cm">-- 2. Use LIMIT with BULK COLLECT for large data</span><br><span class="kw">FETCH</span> c_emp <span class="kw">BULK COLLECT INTO</span> v_emps <span class="kw">LIMIT</span> 1000;<br><br><span class="cm">-- 3. Avoid SELECT * → select only needed columns</span><br><span class="cm">-- 4. Use EXISTS instead of IN for subqueries</span><br><span class="kw">WHERE EXISTS</span> (<span class="kw">SELECT</span> 1 <span class="kw">FROM</span> Orders <span class="kw">WHERE</span> CustId = c.Id)<br><br><span class="cm">-- 5. Use SQL instead of PL/SQL loops when possible</span><br><span class="cm">-- ❌ FOR rec IN cursor LOOP ... UPDATE ... END LOOP;</span><br><span class="cm">-- ✅ Single UPDATE statement with JOIN!</span><br><br><span class="cm">-- 6. Check execution plan</span><br><span class="kw">EXPLAIN PLAN FOR</span> <span class="kw">SELECT</span> ...;<br><span class="kw">SELECT</span> * <span class="kw">FROM TABLE</span>(DBMS_XPLAN.DISPLAY);</div><h4>🗣️ Interview Answer</h4><p>"Key optimizations: <span class="key">BULK COLLECT + FORALL</span> to reduce context switches, <span class="key">LIMIT</span> clause for memory management, <span class="key">EXISTS over IN</span>, avoid row-by-row processing (use set-based SQL), check <span class="key">EXPLAIN PLAN</span>, add proper indexes, and use <span class="key">DBMS_PROFILER</span> to find bottlenecks."</p>'},
{q:"What is Partitioning? Explain Range, List, Hash, Composite.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Partitioning</b> splits a large table into <b>smaller pieces</b> for faster queries and easier maintenance. Oracle only scans relevant partitions.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Range Partition: by date ranges</span><br><span class="kw">CREATE TABLE</span> Orders (<br>&nbsp;&nbsp;Id NUMBER, OrderDate DATE, Total NUMBER<br>) <span class="kw">PARTITION BY RANGE</span>(OrderDate) (<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_2023 <span class="kw">VALUES LESS THAN</span> (DATE <span class="str">\'2024-01-01\'</span>),<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_2024 <span class="kw">VALUES LESS THAN</span> (DATE <span class="str">\'2025-01-01\'</span>),<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_future <span class="kw">VALUES LESS THAN</span> (MAXVALUE)<br>);<br><br><span class="cm">-- List Partition: by specific values</span><br><span class="kw">PARTITION BY LIST</span>(Region) (<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_north <span class="kw">VALUES</span> (<span class="str">\'Delhi\'</span>, <span class="str">\'Punjab\'</span>),<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_south <span class="kw">VALUES</span> (<span class="str">\'Kerala\'</span>, <span class="str">\'TN\'</span>)<br>);<br><br><span class="cm">-- Hash Partition: even distribution</span><br><span class="kw">PARTITION BY HASH</span>(CustomerId) <span class="kw">PARTITIONS</span> 8;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Range</span> — by value ranges (dates, IDs), most common. <span class="key">List</span> — by specific values (regions, status). <span class="key">Hash</span> — even distribution using hash function. <span class="key">Composite</span> — combination (Range-Hash, Range-List). Benefits: partition pruning (scan only relevant), easier maintenance, parallel operations."</p>'},
{q:"What is the Oracle Optimizer? CBO vs RBO?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>The <b>Optimizer</b> decides the <b>best way to execute your query</b>. <b>RBO</b> (Rule-Based) = follows fixed rules (old, deprecated). <b>CBO</b> (Cost-Based) = analyzes statistics to find the cheapest plan (modern, default).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- CBO uses table/column statistics to decide</span><br><span class="cm">-- Gather statistics (important for CBO!)</span><br><span class="kw">EXEC</span> DBMS_STATS.GATHER_TABLE_STATS(<span class="str">\'HR\'</span>, <span class="str">\'EMPLOYEE\'</span>);<br><span class="kw">EXEC</span> DBMS_STATS.GATHER_SCHEMA_STATS(<span class="str">\'HR\'</span>);<br><br><span class="cm">-- CBO considers:</span><br><span class="cm">-- - Table size (number of rows)</span><br><span class="cm">-- - Column cardinality (distinct values)</span><br><span class="cm">-- - Index availability</span><br><span class="cm">-- - CPU and I/O cost</span><br><span class="cm">-- - Data distribution (histograms)</span><br><br><span class="cm">-- RBO (deprecated since Oracle 10g)</span><br><span class="cm">-- Used fixed rules like: indexed column = always use index</span><br><span class="cm">-- No statistics needed but often chose bad plans</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">CBO</span> (Cost-Based Optimizer) is the default since Oracle 10g. It uses <span class="key">statistics</span> (table size, cardinality, histograms) to calculate the cheapest execution plan. <span class="key">RBO</span> (Rule-Based) used fixed rules — deprecated. Always keep statistics up-to-date with DBMS_STATS for CBO to make good decisions."</p>'},
{q:"What are Hints? Give examples of commonly used hints.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Hints</b> are instructions you give to the optimizer to <b>override its default plan</b>. Like telling GPS "take this specific route" instead of the suggested one. Use only when optimizer makes a bad choice.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Force full table scan (ignore indexes)</span><br><span class="kw">SELECT</span> /*+ FULL(e) */ * <span class="kw">FROM</span> Employee e;<br><br><span class="cm">-- Force specific index</span><br><span class="kw">SELECT</span> /*+ INDEX(e idx_emp_dept) */ * <span class="kw">FROM</span> Employee e<br><span class="kw">WHERE</span> DeptId = 5;<br><br><span class="cm">-- Force join method</span><br><span class="kw">SELECT</span> /*+ USE_HASH(e d) */ e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">JOIN</span> Department d <span class="kw">ON</span> e.DeptId = d.Id;<br><br><span class="cm">-- Parallel execution</span><br><span class="kw">SELECT</span> /*+ PARALLEL(e, 4) */ * <span class="kw">FROM</span> Employee e;<br><br><span class="cm">-- Common hints:</span><br><span class="cm">-- FULL(table) - full table scan</span><br><span class="cm">-- INDEX(table index_name) - use specific index</span><br><span class="cm">-- USE_NL / USE_HASH / USE_MERGE - join methods</span><br><span class="cm">-- PARALLEL(table, degree) - parallel execution</span><br><span class="cm">-- FIRST_ROWS(n) - optimize for first N rows</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Hints</span> override optimizer decisions using /*+ HINT */ syntax. Common: <span class="key">FULL</span> (force scan), <span class="key">INDEX</span> (force index), <span class="key">USE_HASH/USE_NL</span> (join method), <span class="key">PARALLEL</span> (parallel execution). Use sparingly — hints bypass optimizer intelligence. Better to fix statistics or add indexes first."</p>'},
{q:"What is AUTONOMOUS_TRANSACTION?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>AUTONOMOUS_TRANSACTION</b> creates an <b>independent transaction</b> inside another transaction. The inner transaction can COMMIT or ROLLBACK without affecting the outer one. Used for audit logging — log even if main transaction fails.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Audit log procedure with autonomous transaction</span><br><span class="kw">CREATE PROCEDURE</span> log_action(p_msg VARCHAR2) <span class="kw">AS</span><br>&nbsp;&nbsp;<span class="kw">PRAGMA AUTONOMOUS_TRANSACTION</span>; <span class="cm">-- independent!</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">INSERT INTO</span> AuditLog(Message, LogDate)<br>&nbsp;&nbsp;<span class="kw">VALUES</span>(p_msg, SYSDATE);<br>&nbsp;&nbsp;<span class="kw">COMMIT</span>; <span class="cm">-- commits ONLY the log, not the outer transaction!</span><br><span class="kw">END</span>;<br><br><span class="cm">-- Usage</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;log_action(<span class="str">\'Attempting transfer\'</span>); <span class="cm">-- logged ✅</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance - 1000;<br>&nbsp;&nbsp;<span class="kw">ROLLBACK</span>; <span class="cm">-- transfer rolled back, but log STAYS! ✅</span><br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">PRAGMA AUTONOMOUS_TRANSACTION</span> creates an independent transaction that can commit/rollback without affecting the parent. Used for: <span class="key">audit logging</span> (log even if main fails), <span class="key">error logging</span>, <span class="key">sequence generation</span>. The autonomous transaction has its own COMMIT/ROLLBACK scope."</p>'},
{q:"How do you handle Deadlocks in Oracle?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>A <b>Deadlock</b> = two sessions waiting for each other forever. Oracle <b>automatically detects</b> and kills one session (raises ORA-00060). You need to handle it in code and prevent it by design.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Oracle auto-detects deadlock and raises ORA-00060</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;e_deadlock <span class="kw">EXCEPTION</span>;<br>&nbsp;&nbsp;<span class="kw">PRAGMA EXCEPTION_INIT</span>(e_deadlock, -60);<br>&nbsp;&nbsp;v_retries NUMBER := 3;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">FOR</span> i <span class="kw">IN</span> 1..v_retries <span class="kw">LOOP</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">BEGIN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance - 100 <span class="kw">WHERE</span> Id = 1;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance + 100 <span class="kw">WHERE</span> Id = 2;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">COMMIT</span>;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">EXIT</span>; <span class="cm">-- success, exit loop</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">WHEN</span> e_deadlock <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">ROLLBACK</span>;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;DBMS_LOCK.SLEEP(1); <span class="cm">-- wait and retry</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">END</span>;<br>&nbsp;&nbsp;<span class="kw">END LOOP</span>;<br><span class="kw">END</span>;<br><br><span class="cm">-- Prevention: always lock tables in SAME ORDER!</span></div><h4>🗣️ Interview Answer</h4><p>"Oracle auto-detects deadlocks and raises <span class="key">ORA-00060</span>. Handle with retry logic using PRAGMA EXCEPTION_INIT. Prevent by: accessing tables in <span class="key">consistent order</span>, keeping transactions short, using <span class="key">SELECT FOR UPDATE NOWAIT</span>, and proper indexing to reduce lock scope."</p>'},
{q:"What is Oracle Advanced Queuing (AQ)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Oracle AQ</b> is a <b>built-in message queuing system</b> inside Oracle database. Like RabbitMQ but inside your DB. One process puts messages in a queue, another reads them. Used for async processing.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create queue table</span><br><span class="kw">EXEC</span> DBMS_AQADM.CREATE_QUEUE_TABLE(<br>&nbsp;&nbsp;queue_table =&gt; <span class="str">\'order_qt\'</span>,<br>&nbsp;&nbsp;queue_payload_type =&gt; <span class="str">\'SYS.AQ$_JMS_TEXT_MESSAGE\'</span>);<br><br><span class="cm">-- 2. Create and start queue</span><br><span class="kw">EXEC</span> DBMS_AQADM.CREATE_QUEUE(queue_name =&gt; <span class="str">\'order_queue\'</span>, queue_table =&gt; <span class="str">\'order_qt\'</span>);<br><span class="kw">EXEC</span> DBMS_AQADM.START_QUEUE(queue_name =&gt; <span class="str">\'order_queue\'</span>);<br><br><span class="cm">-- 3. Enqueue (put message)</span><br>DBMS_AQ.ENQUEUE(queue_name =&gt; <span class="str">\'order_queue\'</span>, payload =&gt; msg);<br><br><span class="cm">-- 4. Dequeue (read message)</span><br>DBMS_AQ.DEQUEUE(queue_name =&gt; <span class="str">\'order_queue\'</span>, payload =&gt; msg);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Oracle AQ</span> is a database-integrated message queuing system. Supports point-to-point and publish-subscribe. Benefits: transactional (messages participate in DB transactions), no external broker needed, supports JMS. Used for async processing, event-driven architecture within Oracle."</p>'},
{q:"What is DBMS_SCHEDULER? How do you schedule jobs?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>DBMS_SCHEDULER</b> runs PL/SQL code <b>automatically at scheduled times</b>. Like a cron job inside Oracle. Run reports nightly, clean old data weekly, etc.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Create a scheduled job</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;DBMS_SCHEDULER.CREATE_JOB(<br>&nbsp;&nbsp;&nbsp;&nbsp;job_name =&gt; <span class="str">\'nightly_cleanup\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;job_type =&gt; <span class="str">\'PLSQL_BLOCK\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;job_action =&gt; <span class="str">\'BEGIN cleanup_old_data; END;\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;start_date =&gt; SYSTIMESTAMP,<br>&nbsp;&nbsp;&nbsp;&nbsp;repeat_interval =&gt; <span class="str">\'FREQ=DAILY; BYHOUR=2; BYMINUTE=0\'</span>, <span class="cm">-- 2 AM daily</span><br>&nbsp;&nbsp;&nbsp;&nbsp;enabled =&gt; TRUE<br>&nbsp;&nbsp;);<br><span class="kw">END</span>;<br><br><span class="cm">-- Check job status</span><br><span class="kw">SELECT</span> job_name, state, last_start_date, next_run_date<br><span class="kw">FROM</span> user_scheduler_jobs;<br><br><span class="cm">-- Run manually</span><br><span class="kw">EXEC</span> DBMS_SCHEDULER.RUN_JOB(<span class="str">\'nightly_cleanup\'</span>);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">DBMS_SCHEDULER</span> creates and manages scheduled jobs in Oracle. Supports: time-based schedules (daily, weekly), event-based triggers, job chains (dependencies), and monitoring. Replaced the older DBMS_JOB package. Check user_scheduler_jobs view for status."</p>'},
{q:"What is Flashback Technology?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Flashback</b> lets you <b>see or restore data as it was at a past point in time</b>. Accidentally deleted rows? Flashback brings them back! Like an undo button for your database.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Flashback Query: see data as it was 1 hour ago</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee<br><span class="kw">AS OF</span> TIMESTAMP (SYSTIMESTAMP - INTERVAL <span class="str">\'1\'</span> HOUR);<br><br><span class="cm">-- Flashback Table: restore table to past state</span><br><span class="kw">FLASHBACK TABLE</span> Employee <span class="kw">TO</span> TIMESTAMP<br>&nbsp;&nbsp;(SYSTIMESTAMP - INTERVAL <span class="str">\'30\'</span> MINUTE);<br><br><span class="cm">-- Flashback Drop: recover dropped table from recycle bin</span><br><span class="kw">FLASHBACK TABLE</span> Employee <span class="kw">TO BEFORE DROP</span>;<br><br><span class="cm">-- Check recycle bin</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> recyclebin;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Flashback</span> provides time-travel for data. Types: <span class="key">Flashback Query</span> (AS OF TIMESTAMP), <span class="key">Flashback Table</span> (restore table), <span class="key">Flashback Drop</span> (recover from recycle bin), <span class="key">Flashback Database</span> (restore entire DB). Uses undo data. Essential for accidental data loss recovery."</p>'},
{q:"How do you implement Row-Level Security?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Row-Level Security (VPD)</b> automatically <b>filters rows based on who is querying</b>. Each user sees only their own data. Implemented using <b>Virtual Private Database (VPD)</b> policies.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create policy function</span><br><span class="kw">CREATE FUNCTION</span> dept_security(p_schema VARCHAR2, p_table VARCHAR2)<br><span class="kw">RETURN</span> VARCHAR2 <span class="kw">AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">IF</span> SYS_CONTEXT(<span class="str">\'USERENV\'</span>, <span class="str">\'SESSION_USER\'</span>) = <span class="str">\'ADMIN\'</span> <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">RETURN NULL</span>; <span class="cm">-- admin sees ALL rows</span><br>&nbsp;&nbsp;<span class="kw">ELSE</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">RETURN</span> <span class="str">\'DeptId = SYS_CONTEXT(\\\'USERENV\\\', \\\'CLIENT_IDENTIFIER\\\')\'</span>;<br>&nbsp;&nbsp;<span class="kw">END IF</span>;<br><span class="kw">END</span>;<br><br><span class="cm">-- 2. Apply policy</span><br><span class="kw">EXEC</span> DBMS_RLS.ADD_POLICY(<br>&nbsp;&nbsp;object_schema =&gt; <span class="str">\'HR\'</span>, object_name =&gt; <span class="str">\'EMPLOYEE\'</span>,<br>&nbsp;&nbsp;policy_name =&gt; <span class="str">\'dept_policy\'</span>,<br>&nbsp;&nbsp;function_schema =&gt; <span class="str">\'HR\'</span>, policy_function =&gt; <span class="str">\'dept_security\'</span>);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">VPD (Virtual Private Database)</span> implements row-level security by automatically appending a WHERE clause to every query. Uses DBMS_RLS.ADD_POLICY with a policy function. Transparent to the application — no code changes needed. Users see only authorized rows."</p>'},
{q:"What is UTL_FILE? How do you read/write files?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>UTL_FILE</b> lets PL/SQL <b>read and write files on the server</b> file system. Used for generating CSV exports, reading config files, logging to files.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create directory object (DBA)</span><br><span class="kw">CREATE DIRECTORY</span> export_dir <span class="kw">AS</span> <span class="str">\'/tmp/exports\'</span>;<br><span class="kw">GRANT READ, WRITE ON DIRECTORY</span> export_dir <span class="kw">TO</span> hr;<br><br><span class="cm">-- 2. Write to file</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;v_file UTL_FILE.FILE_TYPE;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;v_file := UTL_FILE.FOPEN(<span class="str">\'EXPORT_DIR\'</span>, <span class="str">\'employees.csv\'</span>, <span class="str">\'W\'</span>);<br>&nbsp;&nbsp;UTL_FILE.PUT_LINE(v_file, <span class="str">\'Name,Salary,Dept\'</span>); <span class="cm">-- header</span><br>&nbsp;&nbsp;<span class="kw">FOR</span> rec <span class="kw">IN</span> (<span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee) <span class="kw">LOOP</span><br>&nbsp;&nbsp;&nbsp;&nbsp;UTL_FILE.PUT_LINE(v_file, rec.Name || <span class="str">\',\'</span> || rec.Salary);<br>&nbsp;&nbsp;<span class="kw">END LOOP</span>;<br>&nbsp;&nbsp;UTL_FILE.FCLOSE(v_file);<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">UTL_FILE</span> provides file I/O from PL/SQL. Requires a <span class="key">DIRECTORY object</span> pointing to a server path. Operations: FOPEN, PUT_LINE, GET_LINE, FCLOSE. Used for CSV exports, log files, data imports. Always handle exceptions and close files in EXCEPTION block."</p>'},
{q:"What is Dynamic SQL? Explain EXECUTE IMMEDIATE and DBMS_SQL.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Dynamic SQL</b> builds SQL statements as <b>strings at runtime</b>. <b>EXECUTE IMMEDIATE</b> = simple and common. <b>DBMS_SQL</b> = complex but more control (unknown columns at compile time).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- EXECUTE IMMEDIATE (most common ⭐)</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;v_sql VARCHAR2(500);<br>&nbsp;&nbsp;v_count NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="cm">-- Dynamic table name</span><br>&nbsp;&nbsp;v_sql := <span class="str">\'SELECT COUNT(*) FROM \'</span> || p_table_name;<br>&nbsp;&nbsp;<span class="kw">EXECUTE IMMEDIATE</span> v_sql <span class="kw">INTO</span> v_count;<br><br>&nbsp;&nbsp;<span class="cm">-- With bind variables (safe from injection!)</span><br>&nbsp;&nbsp;v_sql := <span class="str">\'DELETE FROM Employee WHERE DeptId = :d\'</span>;<br>&nbsp;&nbsp;<span class="kw">EXECUTE IMMEDIATE</span> v_sql <span class="kw">USING</span> p_dept_id;<br><br>&nbsp;&nbsp;<span class="cm">-- Dynamic DDL</span><br>&nbsp;&nbsp;<span class="kw">EXECUTE IMMEDIATE</span> <span class="str">\'CREATE TABLE temp_data (id NUMBER)\'</span>;<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">EXECUTE IMMEDIATE</span> is the simple way — handles most dynamic SQL needs with bind variables (:param) for safety. <span class="key">DBMS_SQL</span> is the complex way — needed when number of columns is unknown at compile time. Always use <span class="key">bind variables</span> to prevent SQL injection. Dynamic SQL is needed for DDL in PL/SQL and dynamic table/column names."</p>'},
{q:"What is the difference between GLOBAL and PRIVATE TEMPORARY TABLE?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Global Temporary Table (GTT)</b> = definition is permanent, <b>data is temporary</b> per session. <b>Private Temporary Table</b> (Oracle 18c+) = both definition AND data are temporary.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Global Temporary Table (traditional)</span><br><span class="kw">CREATE GLOBAL TEMPORARY TABLE</span> gtt_results (<br>&nbsp;&nbsp;Id NUMBER, Name VARCHAR2(50)<br>) <span class="kw">ON COMMIT DELETE ROWS</span>; <span class="cm">-- data cleared after commit</span><br><span class="cm">-- OR: ON COMMIT PRESERVE ROWS (cleared after session ends)</span><br><span class="cm">-- Table definition stays forever, data is per-session</span><br><br><span class="cm">-- Private Temporary Table (Oracle 18c+)</span><br><span class="kw">CREATE PRIVATE TEMPORARY TABLE</span> ora$ptt_results (<br>&nbsp;&nbsp;Id NUMBER, Name VARCHAR2(50)<br>) <span class="kw">ON COMMIT DROP DEFINITION</span>; <span class="cm">-- table itself drops after commit!</span><br><span class="cm">-- Must start with ORA$PTT_ prefix</span><br><span class="cm">-- Both definition and data are temporary</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">GTT</span> has permanent definition but temporary data per session. ON COMMIT DELETE ROWS or PRESERVE ROWS. <span class="key">Private Temporary Table</span> (18c+) has temporary definition AND data — drops after transaction/session. GTT is visible in data dictionary, PTT is not. Use GTT for repeated temp storage, PTT for one-time processing."</p>'},
{q:"How do you implement Audit Trails?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Audit Trail</b> tracks <b>WHO did WHAT and WHEN</b> in the database. Used for compliance, security, and debugging. Multiple approaches in Oracle.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Trigger-based audit (custom)</span><br><span class="kw">CREATE TRIGGER</span> trg_emp_audit<br><span class="kw">AFTER INSERT OR UPDATE OR DELETE ON</span> Employee<br><span class="kw">FOR EACH ROW</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="kw">PRAGMA AUTONOMOUS_TRANSACTION</span>;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">INSERT INTO</span> AuditLog(TableName, Action, OldVal, NewVal, ChangedBy, ChangedAt)<br>&nbsp;&nbsp;<span class="kw">VALUES</span>(<span class="str">\'Employee\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">CASE WHEN</span> INSERTING <span class="kw">THEN</span> <span class="str">\'INSERT\'</span> <span class="kw">WHEN</span> UPDATING <span class="kw">THEN</span> <span class="str">\'UPDATE\'</span> <span class="kw">ELSE</span> <span class="str">\'DELETE\'</span> <span class="kw">END</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;:OLD.Name, :NEW.Name, USER, SYSDATE);<br>&nbsp;&nbsp;<span class="kw">COMMIT</span>;<br><span class="kw">END</span>;<br><br><span class="cm">-- 2. Oracle Unified Auditing (built-in)</span><br><span class="kw">CREATE AUDIT POLICY</span> emp_audit_policy<br>&nbsp;&nbsp;ACTIONS UPDATE ON HR.Employee, DELETE ON HR.Employee;<br><span class="kw">AUDIT POLICY</span> emp_audit_policy;</div><h4>🗣️ Interview Answer</h4><p>"Audit trails track database changes. Approaches: <span class="key">Trigger-based</span> (custom audit table with AUTONOMOUS_TRANSACTION), <span class="key">Oracle Unified Auditing</span> (built-in, policy-based), <span class="key">Fine-Grained Auditing</span> (DBMS_FGA for SELECT auditing). Use autonomous transactions so audit records survive rollbacks."</p>'},
{q:"What is RESULT_CACHE hint?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>RESULT_CACHE</b> tells Oracle to <b>cache the query result in memory</b>. Next time the same query runs, Oracle returns the cached result instantly without re-executing. Like browser cache for SQL!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Query-level result cache</span><br><span class="kw">SELECT</span> /*+ RESULT_CACHE */ DeptId, COUNT(*), AVG(Salary)<br><span class="kw">FROM</span> Employee<br><span class="kw">GROUP BY</span> DeptId;<br><span class="cm">-- First run: executes query, caches result</span><br><span class="cm">-- Next runs: returns cached result instantly! 🚀</span><br><span class="cm">-- Auto-invalidated when Employee table changes</span><br><br><span class="cm">-- Function-level result cache</span><br><span class="kw">CREATE FUNCTION</span> get_dept_count(p_dept NUMBER)<br><span class="kw">RETURN</span> NUMBER <span class="kw">RESULT_CACHE</span> <span class="kw">AS</span><br>&nbsp;&nbsp;v_count NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> COUNT(*) <span class="kw">INTO</span> v_count <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = p_dept;<br>&nbsp;&nbsp;<span class="kw">RETURN</span> v_count;<br><span class="kw">END</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">RESULT_CACHE</span> stores query results in shared memory. Subsequent identical queries return cached results without re-execution. Auto-invalidated when underlying data changes. Works for queries and PL/SQL functions. Best for: read-heavy, rarely-changing lookup data. Dont use for frequently-changing tables."</p>'},
{q:"What is Edition-Based Redefinition?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Edition-Based Redefinition (EBR)</b> lets you <b>upgrade PL/SQL code with zero downtime</b>. You create a new "edition" of your code while the old edition keeps running. Users switch to the new edition when ready.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create new edition</span><br><span class="kw">CREATE EDITION</span> v2_release;<br><br><span class="cm">-- 2. Switch to new edition and modify code</span><br><span class="kw">ALTER SESSION SET EDITION</span> = v2_release;<br><span class="kw">CREATE OR REPLACE PROCEDURE</span> calculate_salary <span class="kw">AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="cm">-- new logic here</span><br><span class="kw">END</span>;<br><br><span class="cm">-- 3. Old users still use old edition (no disruption!)</span><br><span class="cm">-- 4. When ready, switch all users to new edition</span><br><span class="cm">-- 5. Drop old edition when no longer needed</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">EBR</span> enables zero-downtime upgrades of PL/SQL code. Create a new edition, modify code in it while old edition serves users. Switch users to new edition when tested. Supports: procedures, functions, packages, views, triggers. Key for <span class="key">continuous deployment</span> in Oracle environments."</p>'},
{q:"What is the difference between CONNECT BY and Recursive CTE?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>Both handle <b>hierarchical/tree data</b> (org charts, categories). <b>CONNECT BY</b> = Oracle-specific, older syntax. <b>Recursive CTE</b> = ANSI standard (WITH RECURSIVE), works in Oracle 11g+ and other databases.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- CONNECT BY (Oracle-specific)</span><br><span class="kw">SELECT</span> LEVEL, LPAD(<span class="str">\' \'</span>, LEVEL*2) || Name <span class="kw">as</span> OrgChart<br><span class="kw">FROM</span> Employee<br><span class="kw">START WITH</span> ManagerId <span class="kw">IS NULL</span> <span class="cm">-- root (CEO)</span><br><span class="kw">CONNECT BY PRIOR</span> Id = ManagerId <span class="cm">-- parent-child link</span><br><span class="kw">ORDER SIBLINGS BY</span> Name;<br><br><span class="cm">-- Recursive CTE (ANSI standard)</span><br><span class="kw">WITH</span> OrgChart(Id, Name, ManagerId, Lvl) <span class="kw">AS</span> (<br>&nbsp;&nbsp;<span class="cm">-- Anchor: top-level</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Id, Name, ManagerId, 1 <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> ManagerId <span class="kw">IS NULL</span><br>&nbsp;&nbsp;<span class="kw">UNION ALL</span><br>&nbsp;&nbsp;<span class="cm">-- Recursive: find children</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> e.Id, e.Name, e.ManagerId, o.Lvl + 1<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee e <span class="kw">JOIN</span> OrgChart o <span class="kw">ON</span> e.ManagerId = o.Id<br>)<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> OrgChart;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">CONNECT BY</span> is Oracle-specific with START WITH, PRIOR, LEVEL, SYS_CONNECT_BY_PATH. <span class="key">Recursive CTE</span> is ANSI standard using WITH + UNION ALL. CTE is portable across databases. CONNECT BY has simpler syntax and built-in functions (LEVEL, CONNECT_BY_ROOT). For new code, prefer Recursive CTE for portability."</p>'},
]
};

const CATS=[
{id:'oops',name:'OOPs',clr:'#ff6f00'},
{id:'csharp',name:'C#',clr:'#764ba2'},
{id:'mvc',name:'MVC / .NET Core',clr:'#2196f3'},
{id:'sqlserver',name:'SQL Server',clr:'#e91e63'},
{id:'webapi',name:'Web API / REST',clr:'#009688'},
{id:'gitdevops',name:'Git / DevOps',clr:'#607d8b'},
{id:'security',name:'Security',clr:'#f44336'},
{id:'javascript',name:'JavaScript/TS',clr:'#fdd835'},
{id:'behavioral',name:'Behavioral/HR',clr:'#9c27b0'},
{id:'plsql',name:'PL/SQL',clr:'#4caf50'}
];
const LVL={b:'Beginner',a:'Advanced',e:'Experienced'};

let cur='oops';
const searchEl=document.getElementById('search');
searchEl.addEventListener('input',render);

function gp(){return JSON.parse(localStorage.getItem('iv_prog')||'{}')}
function sp(p){localStorage.setItem('iv_prog',JSON.stringify(p))}

function tog(cat,i){const p=gp();const k=cat+'_'+i;p[k]=!p[k];sp(p);render()}
function toggleAns(id){const el=document.getElementById(id);el.style.display=el.style.display==='none'?'block':'none';}

let currentUtterance=null;
function speakMal(btn,text){
  if(speechSynthesis.speaking){speechSynthesis.cancel();btn.classList.remove('playing');btn.innerHTML='🔊 Malayalam';return;}
  const clean=text.replace(/<[^>]*>/g,' ').replace(/&[^;]+;/g,' ').replace(/\s+/g,' ').trim();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='ml-IN';u.rate=0.9;u.pitch=1;
  const voices=speechSynthesis.getVoices();
  const mlVoice=voices.find(v=>v.lang.startsWith('ml'));
  if(mlVoice)u.voice=mlVoice;
  btn.classList.add('playing');btn.innerHTML='⏹️ Stop';
  u.onend=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 Malayalam';};
  u.onerror=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 Malayalam';};
  speechSynthesis.speak(u);
}
function speakEng(btn,text){
  if(speechSynthesis.speaking){speechSynthesis.cancel();btn.classList.remove('playing');btn.innerHTML='🔊 English';return;}
  const clean=text.replace(/<[^>]*>/g,' ').replace(/&[^;]+;/g,' ').replace(/\s+/g,' ').trim();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='en-IN';u.rate=0.9;u.pitch=1;
  btn.classList.add('playing');btn.innerHTML='⏹️ Stop';
  u.onend=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 English';};
  u.onerror=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 English';};
  speechSynthesis.speak(u);
}
if(typeof speechSynthesis!=='undefined')speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

function render(){
  const p=gp(),s=searchEl.value.toLowerCase();
  // overall
  let tAll=0,dAll=0;
  CATS.forEach(c=>{DATA[c.id].forEach((_,i)=>{tAll++;if(p[c.id+'_'+i])dAll++})});
  document.getElementById('ov').textContent=dAll+'/'+tAll+' Completed';
  document.getElementById('ovBar').style.width=(tAll?(dAll/tAll*100):0)+'%';

  // tabs
  document.getElementById('tabs').innerHTML=CATS.map(c=>{
    let t=DATA[c.id].length,d=DATA[c.id].filter((_,i)=>p[c.id+'_'+i]).length;
    return `<div class="tab ${cur===c.id?'active':''}" onclick="cur='${c.id}';render()">${c.name}<span class="cnt">${d}/${t}</span></div>`;
  }).join('');

  // section
  const qs=DATA[cur],cat=CATS.find(c=>c.id===cur);
  let d=qs.filter((_,i)=>p[cur+'_'+i]).length;
  document.getElementById('secL').textContent=cat.name;
  document.getElementById('secC').textContent=d+'/'+qs.length;
  document.getElementById('secBar').style.width=(d/qs.length*100)+'%';
  document.getElementById('secBar').style.background=cat.clr;

  let html='',n=0;
  qs.forEach((q,i)=>{
    if(s&&!q.q.toLowerCase().includes(s))return;
    n++;
    const done=!!p[cur+'_'+i];
    const hasAns=!!q.a;
    const ansId=cur+'_ans_'+i;
    html+=`<div class="q ${done?'done':''}" onclick="tog('${cur}',${i})">
      <div class="qn">${n}</div>
      <div class="qt">${q.q}<span class="lvl ${q.l}">${LVL[q.l]}</span>${hasAns?`<button class="ans-btn" onclick="event.stopPropagation();toggleAns('${ansId}')">💡 Answer</button>`:''}</div>
      <div class="qc">${done?'✅':'⬜'}</div>
    </div>${hasAns?`<div class="ans-panel" id="${ansId}" style="display:none"><div style="margin-bottom:8px"><button class="voice-btn" onclick="event.stopPropagation();speakMal(this,document.getElementById('${ansId}').innerText)">🔊 Malayalam</button><button class="voice-btn" style="background:linear-gradient(135deg,#0ea5e9,#06b6d4)" onclick="event.stopPropagation();speakEng(this,document.getElementById('${ansId}').innerText)">🔊 English</button></div>${q.a}</div>`:''}`;

  });
  document.getElementById('qs').innerHTML=html||'<div style="text-align:center;color:#64748b;padding:30px;font-size:1rem">No questions match.</div>';
}
render();

function exportIvPDF() {
  const p = gp();
  const w = window.open('', '_blank');
  let html = '';
  CATS.forEach(c => {
    html += `<h2 style="color:#0ea5e9;margin-top:20px">${c.name}</h2><table style="width:100%;border-collapse:collapse;margin-bottom:10px"><tr><th style="background:#0ea5e9;color:#fff;padding:8px;border:1px solid #ddd;text-align:left">#</th><th style="background:#0ea5e9;color:#fff;padding:8px;border:1px solid #ddd;text-align:left">Question</th><th style="background:#0ea5e9;color:#fff;padding:8px;border:1px solid #ddd;text-align:left">Level</th><th style="background:#0ea5e9;color:#fff;padding:8px;border:1px solid #ddd;text-align:left">Status</th></tr>`;
    DATA[c.id].forEach((q, i) => {
      const done = !!p[c.id + '_' + i];
      html += `<tr><td style="border:1px solid #ddd;padding:6px">${i+1}</td><td style="border:1px solid #ddd;padding:6px">${q.q}</td><td style="border:1px solid #ddd;padding:6px">${LVL[q.l]}</td><td style="border:1px solid #ddd;padding:6px;color:${done?'green':'red'};font-weight:700">${done?'✅ Covered':'⬜ Pending'}</td></tr>`;
    });
    const d = DATA[c.id].filter((_,i) => p[c.id+'_'+i]).length;
    html += `</table><p><b>Progress: ${d}/${DATA[c.id].length}</b></p>`;
  });
  w.document.write(`<html><head><title>Interview Prep Report</title><style>body{font-family:Segoe UI,sans-serif;padding:30px}h1{color:#0369a1}</style></head><body><h1>🎯 Interview Prep Report</h1>${html}<script>window.print();<\/script></body></html>`);
  w.document.close();
}

function exportIvExcel() {
  const p = gp();
  let csv = 'Category,#,Question,Level,Status\n';
  CATS.forEach(c => {
    DATA[c.id].forEach((q, i) => {
      const done = !!p[c.id + '_' + i];
      csv += `"${c.name}",${i+1},"${q.q.replace(/"/g,'""')}","${LVL[q.l]}","${done?'Covered':'Pending'}"\n`;
    });
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Interview_Prep_Report.csv';
  a.click();
}

function exportIvWord() {
  const p = gp();
  let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><style>body{font-family:Segoe UI,sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:6px}th{background:#0ea5e9;color:#fff}h1{color:#0369a1}h2{color:#0ea5e9}</style></head><body><h1>🎯 Interview Prep Report</h1>`;
  CATS.forEach(c => {
    html += `<h2>${c.name}</h2><table><tr><th>#</th><th>Question</th><th>Level</th><th>Status</th></tr>`;
    DATA[c.id].forEach((q, i) => {
      const done = !!p[c.id + '_' + i];
      html += `<tr><td>${i+1}</td><td>${q.q}</td><td>${LVL[q.l]}</td><td style="color:${done?'green':'red'};font-weight:700">${done?'Covered':'Pending'}</td></tr>`;
    });
    const d = DATA[c.id].filter((_,i) => p[c.id+'_'+i]).length;
    html += `</table><p><b>Progress: ${d}/${DATA[c.id].length}</b></p>`;
  });
  html += '</body></html>';
  const blob = new Blob([html], { type: 'application/msword' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Interview_Prep_Report.doc';
  a.click();
}

function downloadQuestionsPDF() {
  const w = window.open('', '_blank');
  const colors = { oops:'#e65100', csharp:'#6a1b9a', mvc:'#0277bd', sqlserver:'#c2185b', webapi:'#00796b', gitdevops:'#37474f', security:'#c62828', javascript:'#f9a825', behavioral:'#6a1b9a', plsql:'#2e7d32' };
  const lvlColors = { b:'#2e7d32', a:'#e65100', e:'#c62828' };
  let html = '';
  CATS.forEach(c => {
    html += `<div style="page-break-inside:avoid;margin-bottom:30px">`;
    html += `<h2 style="color:${colors[c.id]};border-bottom:3px solid ${colors[c.id]};padding-bottom:6px;margin-bottom:14px;font-size:20px">${c.name} (${DATA[c.id].length} Questions)</h2>`;
    const grouped = { b:[], a:[], e:[] };
    DATA[c.id].forEach(q => grouped[q.l].push(q.q));
    [{k:'b',label:'🟢 Beginner'},{k:'a',label:'🟠 Advanced'},{k:'e',label:'🔴 Experienced'}].forEach(lv => {
      if (!grouped[lv.k].length) return;
      html += `<h3 style="color:${lvlColors[lv.k]};margin:12px 0 8px;font-size:16px">${lv.label} (${grouped[lv.k].length})</h3>`;
      html += `<ol style="margin:0 0 10px 20px;font-size:14px;line-height:2">`;
      grouped[lv.k].forEach(q => {
        html += `<li style="margin-bottom:2px">${q}</li>`;
      });
      html += `</ol>`;
    });
    html += `</div>`;
  });
  let total = 0;
  CATS.forEach(c => total += DATA[c.id].length);
  w.document.write(`<html><head><title>Interview Questions - All ${total} Questions</title>
    <style>
      body { font-family: 'Segoe UI', sans-serif; padding: 30px 40px; color: #111; }
      h1 { text-align: center; color: #0369a1; font-size: 26px; margin-bottom: 6px; }
      .subtitle { text-align: center; color: #555; font-size: 14px; margin-bottom: 30px; }
      .summary { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
      .summary-item { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 10px 20px; text-align: center; }
      .summary-item .num { font-size: 22px; font-weight: 700; color: #0369a1; }
      .summary-item .lbl { font-size: 12px; color: #555; }
      @media print { body { padding: 10px; } }
    </style>
  </head><body>
    <h1>🎯 .NET Interview Questions</h1>
    <div class="subtitle">Total ${total} Questions • OOPs • C# • MVC/.NET Core • PL/SQL</div>
    <div class="summary">
      ${CATS.map(c => `<div class="summary-item"><div class="num">${DATA[c.id].length}</div><div class="lbl">${c.name}</div></div>`).join('')}
    </div>
    ${html}
    <div style="text-align:center;margin-top:30px;color:#888;font-size:12px">Generated from Interview Prep App • ${new Date().toLocaleDateString()}</div>
    <script>window.print();<\/script>
  </body></html>`);
  w.document.close();
}
