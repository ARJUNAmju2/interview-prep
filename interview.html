{q:"What is the difference between RAISE and RAISE_APPLICATION_ERROR?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">RAISE</span> throws exceptions within PL/SQL — caught in EXCEPTION block.<br>&#9733; <span class="key">RAISE_APPLICATION_ERROR</span> sends custom error (-20000 to -20999) to the calling application (C#, Java).<br>&#9733; Use RAISE for internal flow control, RAISE_APPLICATION_ERROR for business rule violations that the app needs to handle.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- RAISE: PL/SQL internal only</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;e_invalid <span class="kw">EXCEPTION</span>;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">RAISE</span> e_invalid; <span class="cm">-- caught in EXCEPTION block</span><br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> e_invalid <span class="kw">THEN</span> NULL;<br><span class="kw">END</span>;<br><br><span class="cm">-- RAISE_APPLICATION_ERROR: reaches calling app!</span><br><span class="kw">CREATE PROCEDURE</span> withdraw(p_amt NUMBER) <span class="kw">AS</span><br>&nbsp;&nbsp;v_balance NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Balance <span class="kw">INTO</span> v_balance <span class="kw">FROM</span> Account;<br>&nbsp;&nbsp;<span class="kw">IF</span> p_amt > v_balance <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;RAISE_APPLICATION_ERROR(-20001, <span class="str">\'Insufficient balance!\'</span>);<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">-- Error number must be -20000 to -20999</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">-- C# catches this as OracleException!</span><br>&nbsp;&nbsp;<span class="kw">END IF</span>;<br><span class="kw">END</span>;</div>'},
{q:"What is a Database Link?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Database Link</span> connects to a remote Oracle database using @link_name syntax.<br>&#9733; Can SELECT, INSERT, UPDATE across databases.<br>&#9733; Types: <span class="key">Private</span> (one user), <span class="key">Public</span> (all users).<br>&#9733; Use for data migration, distributed queries, and cross-database reporting.<br>&#9733; Performance depends on network speed.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Create database link</span><br><span class="kw">CREATE DATABASE LINK</span> remote_db<br><span class="kw">CONNECT TO</span> remote_user <span class="kw">IDENTIFIED BY</span> password<br><span class="kw">USING</span> <span class="str">\'remote_tns_name\'</span>;<br><br><span class="cm">-- Query remote table using @link_name</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee@remote_db;<br><br><span class="cm">-- Join local and remote tables</span><br><span class="kw">SELECT</span> l.Name, r.OrderTotal<br><span class="kw">FROM</span> local_customers l<br><span class="kw">JOIN</span> orders@remote_db r <span class="kw">ON</span> l.Id = r.CustomerId;<br><br><span class="cm">-- Insert from remote to local</span><br><span class="kw">INSERT INTO</span> local_products<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> products@remote_db;</div>'},
{q:"What are Indexes? Explain B-Tree vs Bitmap Indexes.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">B-Tree</span> is the default, balanced tree structure — best for high cardinality columns and OLTP.<br>&#9733; <span class="key">Bitmap</span> uses bit arrays — best for low cardinality columns and OLAP/reporting.<br>&#9733; Bitmap indexes cause severe locking in DML-heavy environments — never use on OLTP tables.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- B-Tree Index (default) - for unique/high cardinality</span><br><span class="kw">CREATE INDEX</span> idx_emp_name <span class="kw">ON</span> Employee(Name);<br><span class="cm">-- Good for: Name, Email, Phone (many unique values)</span><br><span class="cm">-- Best for: OLTP, frequent DML</span><br><br><span class="cm">-- Bitmap Index - for low cardinality</span><br><span class="kw">CREATE BITMAP INDEX</span> idx_emp_gender <span class="kw">ON</span> Employee(Gender);<br><span class="cm">-- Good for: Gender (M/F), Status (Active/Inactive)</span><br><span class="cm">-- Best for: OLAP/reporting, read-heavy</span><br><span class="cm">-- ❌ BAD for OLTP - locking issues with DML!</span></div>'},
{q:"What is EXPLAIN PLAN? How do you read an Execution Plan?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">EXPLAIN PLAN</span> shows the execution strategy.<br>&#9733; Read bottom-up, innermost first.<br>&#9733; Look for: <span class="key">INDEX SCAN</span> (good), <span class="key">FULL TABLE SCAN</span> (bad — add index), <span class="key">NESTED LOOPS</span> (good for small sets), <span class="key">HASH JOIN</span> (good for large sets).<br>&#9733; Use DBMS_XPLAN.DISPLAY for formatted output.<br>&#9733; Check Cost column for relative expense.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Generate plan</span><br><span class="kw">EXPLAIN PLAN FOR</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">JOIN</span> Department d <span class="kw">ON</span> e.DeptId = d.Id<br><span class="kw">WHERE</span> e.Salary > 50000;<br><br><span class="cm">-- View plan</span><br><span class="kw">SELECT</span> * <span class="kw">FROM TABLE</span>(DBMS_XPLAN.DISPLAY);<br><br><span class="cm">-- Key operations to look for:</span><br><span class="cm">-- ✅ INDEX RANGE SCAN = good (using index)</span><br><span class="cm">-- ✅ INDEX UNIQUE SCAN = best (PK lookup)</span><br><span class="cm">-- ❌ TABLE ACCESS FULL = bad (full table scan!)</span><br><span class="cm">-- ⚠️ SORT = expensive, check if index can avoid</span><br><span class="cm">-- Check: Cost, Rows, Bytes columns</span></div>'},
{q:"What is the WITH clause (CTE)?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">WITH clause (CTE)</span> defines temporary named result sets for the duration of a query.<br>&#9733; Benefits: readability, reusability (reference multiple times), and recursive queries for hierarchical data.<br>&#9733; Oracle may materialize CTEs for performance.<br>&#9733; Multiple CTEs separated by commas.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Without WITH: messy nested subqueries</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> (<span class="kw">SELECT</span> ... <span class="kw">FROM</span> (<span class="kw">SELECT</span> ... )); <span class="cm">-- hard to read!</span><br><br><span class="cm">-- With WITH clause: clean and readable!</span><br><span class="kw">WITH</span><br>&nbsp;&nbsp;dept_stats <span class="kw">AS</span> (<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">SELECT</span> DeptId, AVG(Salary) avg_sal, COUNT(*) cnt<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">GROUP BY</span> DeptId<br>&nbsp;&nbsp;),<br>&nbsp;&nbsp;high_paying <span class="kw">AS</span> (<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">SELECT</span> * <span class="kw">FROM</span> dept_stats <span class="kw">WHERE</span> avg_sal > 60000<br>&nbsp;&nbsp;)<br><span class="kw">SELECT</span> d.DeptName, h.avg_sal, h.cnt<br><span class="kw">FROM</span> high_paying h<br><span class="kw">JOIN</span> Department d <span class="kw">ON</span> h.DeptId = d.Id;</div>'},
{q:"What is the difference between Correlated and Non-Correlated Subqueries?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Non-correlated</span> runs independently once — faster.<br>&#9733; <span class="key">Correlated</span> references outer query, runs per row — slower but more powerful.<br>&#9733; Correlated subqueries can often be rewritten as JOINs for better performance.<br>&#9733; EXISTS with correlated subquery is common for checking related data.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Non-Correlated: runs ONCE</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Salary > (<span class="kw">SELECT</span> AVG(Salary) <span class="kw">FROM</span> Employee);<br><span class="cm">-- AVG calculated once, then compared</span><br><br><span class="cm">-- Correlated: runs per EACH outer row</span><br><span class="kw">SELECT</span> e.Name, e.Salary <span class="kw">FROM</span> Employee e<br><span class="kw">WHERE</span> e.Salary > (<br>&nbsp;&nbsp;<span class="kw">SELECT</span> AVG(Salary) <span class="kw">FROM</span> Employee<br>&nbsp;&nbsp;<span class="kw">WHERE</span> DeptId = e.DeptId <span class="cm">-- references outer e!</span><br>);<br><span class="cm">-- AVG recalculated for each employees dept</span></div>'},
// Advanced
{q:"How do you optimize slow-running PL/SQL queries?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; "Key optimizations: <span class="key">BULK COLLECT + FORALL</span> to reduce context switches, <span class="key">LIMIT</span> clause for memory management, <span class="key">EXISTS over IN</span>, avoid row-by-row processing (use set-based SQL), check <span class="key">EXPLAIN PLAN</span>, add proper indexes, and use <span class="key">DBMS_PROFILER</span> to find bottlenecks."</div><h4>💻 Key Techniques</h4><div class="code"><span class="cm">-- 1. Use BULK COLLECT instead of row-by-row</span><br><span class="kw">SELECT</span> Id <span class="kw">BULK COLLECT INTO</span> v_ids <span class="kw">FROM</span> Employee;<br><span class="kw">FORALL</span> i <span class="kw">IN</span> v_ids.FIRST..v_ids.LAST<br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * 1.1 <span class="kw">WHERE</span> Id = v_ids(i);<br><br><span class="cm">-- 2. Use LIMIT with BULK COLLECT for large data</span><br><span class="kw">FETCH</span> c_emp <span class="kw">BULK COLLECT INTO</span> v_emps <span class="kw">LIMIT</span> 1000;<br><br><span class="cm">-- 3. Avoid SELECT * → select only needed columns</span><br><span class="cm">-- 4. Use EXISTS instead of IN for subqueries</span><br><span class="kw">WHERE EXISTS</span> (<span class="kw">SELECT</span> 1 <span class="kw">FROM</span> Orders <span class="kw">WHERE</span> CustId = c.Id)<br><br><span class="cm">-- 5. Use SQL instead of PL/SQL loops when possible</span><br><span class="cm">-- ❌ FOR rec IN cursor LOOP ... UPDATE ... END LOOP;</span><br><span class="cm">-- ✅ Single UPDATE statement with JOIN!</span><br><br><span class="cm">-- 6. Check execution plan</span><br><span class="kw">EXPLAIN PLAN FOR</span> <span class="kw">SELECT</span> ...;<br><span class="kw">SELECT</span> * <span class="kw">FROM TABLE</span>(DBMS_XPLAN.DISPLAY);</div>'},
{q:"What is Partitioning? Explain Range, List, Hash, Composite.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Range</span> — by value ranges (dates, IDs), most common.<br>&#9733; <span class="key">List</span> — by specific values (regions, status).<br>&#9733; <span class="key">Hash</span> — even distribution using hash function.<br>&#9733; <span class="key">Composite</span> — combination (Range-Hash, Range-List).<br>&#9733; Benefits: partition pruning (scan only relevant), easier maintenance, parallel operations.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Range Partition: by date ranges</span><br><span class="kw">CREATE TABLE</span> Orders (<br>&nbsp;&nbsp;Id NUMBER, OrderDate DATE, Total NUMBER<br>) <span class="kw">PARTITION BY RANGE</span>(OrderDate) (<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_2023 <span class="kw">VALUES LESS THAN</span> (DATE <span class="str">\'2024-01-01\'</span>),<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_2024 <span class="kw">VALUES LESS THAN</span> (DATE <span class="str">\'2025-01-01\'</span>),<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_future <span class="kw">VALUES LESS THAN</span> (MAXVALUE)<br>);<br><br><span class="cm">-- List Partition: by specific values</span><br><span class="kw">PARTITION BY LIST</span>(Region) (<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_north <span class="kw">VALUES</span> (<span class="str">\'Delhi\'</span>, <span class="str">\'Punjab\'</span>),<br>&nbsp;&nbsp;<span class="kw">PARTITION</span> p_south <span class="kw">VALUES</span> (<span class="str">\'Kerala\'</span>, <span class="str">\'TN\'</span>)<br>);<br><br><span class="cm">-- Hash Partition: even distribution</span><br><span class="kw">PARTITION BY HASH</span>(CustomerId) <span class="kw">PARTITIONS</span> 8;</div>'},
{q:"What is the Oracle Optimizer? CBO vs RBO?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">CBO</span> (Cost-Based Optimizer) is the default since Oracle 10g.<br>&#9733; It uses <span class="key">statistics</span> (table size, cardinality, histograms) to calculate the cheapest execution plan.<br>&#9733; <span class="key">RBO</span> (Rule-Based) used fixed rules — deprecated.<br>&#9733; Always keep statistics up-to-date with DBMS_STATS for CBO to make good decisions.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- CBO uses table/column statistics to decide</span><br><span class="cm">-- Gather statistics (important for CBO!)</span><br><span class="kw">EXEC</span> DBMS_STATS.GATHER_TABLE_STATS(<span class="str">\'HR\'</span>, <span class="str">\'EMPLOYEE\'</span>);<br><span class="kw">EXEC</span> DBMS_STATS.GATHER_SCHEMA_STATS(<span class="str">\'HR\'</span>);<br><br><span class="cm">-- CBO considers:</span><br><span class="cm">-- - Table size (number of rows)</span><br><span class="cm">-- - Column cardinality (distinct values)</span><br><span class="cm">-- - Index availability</span><br><span class="cm">-- - CPU and I/O cost</span><br><span class="cm">-- - Data distribution (histograms)</span><br><br><span class="cm">-- RBO (deprecated since Oracle 10g)</span><br><span class="cm">-- Used fixed rules like: indexed column = always use index</span><br><span class="cm">-- No statistics needed but often chose bad plans</span></div>'},
{q:"What are Hints? Give examples of commonly used hints.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Hints</span> override optimizer decisions using /*+ HINT */ syntax.<br>&#9733; Common: <span class="key">FULL</span> (force scan), <span class="key">INDEX</span> (force index), <span class="key">USE_HASH/USE_NL</span> (join method), <span class="key">PARALLEL</span> (parallel execution).<br>&#9733; Use sparingly — hints bypass optimizer intelligence.<br>&#9733; Better to fix statistics or add indexes first.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Force full table scan (ignore indexes)</span><br><span class="kw">SELECT</span> /*+ FULL(e) */ * <span class="kw">FROM</span> Employee e;<br><br><span class="cm">-- Force specific index</span><br><span class="kw">SELECT</span> /*+ INDEX(e idx_emp_dept) */ * <span class="kw">FROM</span> Employee e<br><span class="kw">WHERE</span> DeptId = 5;<br><br><span class="cm">-- Force join method</span><br><span class="kw">SELECT</span> /*+ USE_HASH(e d) */ e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">JOIN</span> Department d <span class="kw">ON</span> e.DeptId = d.Id;<br><br><span class="cm">-- Parallel execution</span><br><span class="kw">SELECT</span> /*+ PARALLEL(e, 4) */ * <span class="kw">FROM</span> Employee e;<br><br><span class="cm">-- Common hints:</span><br><span class="cm">-- FULL(table) - full table scan</span><br><span class="cm">-- INDEX(table index_name) - use specific index</span><br><span class="cm">-- USE_NL / USE_HASH / USE_MERGE - join methods</span><br><span class="cm">-- PARALLEL(table, degree) - parallel execution</span><br><span class="cm">-- FIRST_ROWS(n) - optimize for first N rows</span></div>'},
{q:"What is AUTONOMOUS_TRANSACTION?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">PRAGMA AUTONOMOUS_TRANSACTION</span> creates an independent transaction that can commit/rollback without affecting the parent.<br>&#9733; Used for: <span class="key">audit logging</span> (log even if main fails), <span class="key">error logging</span>, <span class="key">sequence generation</span>.<br>&#9733; The autonomous transaction has its own COMMIT/ROLLBACK scope.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Audit log procedure with autonomous transaction</span><br><span class="kw">CREATE PROCEDURE</span> log_action(p_msg VARCHAR2) <span class="kw">AS</span><br>&nbsp;&nbsp;<span class="kw">PRAGMA AUTONOMOUS_TRANSACTION</span>; <span class="cm">-- independent!</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">INSERT INTO</span> AuditLog(Message, LogDate)<br>&nbsp;&nbsp;<span class="kw">VALUES</span>(p_msg, SYSDATE);<br>&nbsp;&nbsp;<span class="kw">COMMIT</span>; <span class="cm">-- commits ONLY the log, not the outer transaction!</span><br><span class="kw">END</span>;<br><br><span class="cm">-- Usage</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;log_action(<span class="str">\'Attempting transfer\'</span>); <span class="cm">-- logged ✅</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance - 1000;<br>&nbsp;&nbsp;<span class="kw">ROLLBACK</span>; <span class="cm">-- transfer rolled back, but log STAYS! ✅</span><br><span class="kw">END</span>;</div>'},
{q:"How do you handle Deadlocks in Oracle?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Oracle auto-detects deadlocks and raises <span class="key">ORA-00060</span>.<br>&#9733; Handle with retry logic using PRAGMA EXCEPTION_INIT.<br>&#9733; Prevent by: accessing tables in <span class="key">consistent order</span>, keeping transactions short, using <span class="key">SELECT FOR UPDATE NOWAIT</span>, and proper indexing to reduce lock scope.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Oracle auto-detects deadlock and raises ORA-00060</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;e_deadlock <span class="kw">EXCEPTION</span>;<br>&nbsp;&nbsp;<span class="kw">PRAGMA EXCEPTION_INIT</span>(e_deadlock, -60);<br>&nbsp;&nbsp;v_retries NUMBER := 3;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">FOR</span> i <span class="kw">IN</span> 1..v_retries <span class="kw">LOOP</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">BEGIN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance - 100 <span class="kw">WHERE</span> Id = 1;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance + 100 <span class="kw">WHERE</span> Id = 2;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">COMMIT</span>;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">EXIT</span>; <span class="cm">-- success, exit loop</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">WHEN</span> e_deadlock <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">ROLLBACK</span>;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;DBMS_LOCK.SLEEP(1); <span class="cm">-- wait and retry</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">END</span>;<br>&nbsp;&nbsp;<span class="kw">END LOOP</span>;<br><span class="kw">END</span>;<br><br><span class="cm">-- Prevention: always lock tables in SAME ORDER!</span></div>'},
{q:"What is Oracle Advanced Queuing (AQ)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Oracle AQ</span> is a database-integrated message queuing system.<br>&#9733; Supports point-to-point and publish-subscribe.<br>&#9733; Benefits: transactional (messages participate in DB transactions), no external broker needed, supports JMS.<br>&#9733; Used for async processing, event-driven architecture within Oracle.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create queue table</span><br><span class="kw">EXEC</span> DBMS_AQADM.CREATE_QUEUE_TABLE(<br>&nbsp;&nbsp;queue_table =&gt; <span class="str">\'order_qt\'</span>,<br>&nbsp;&nbsp;queue_payload_type =&gt; <span class="str">\'SYS.AQ$_JMS_TEXT_MESSAGE\'</span>);<br><br><span class="cm">-- 2. Create and start queue</span><br><span class="kw">EXEC</span> DBMS_AQADM.CREATE_QUEUE(queue_name =&gt; <span class="str">\'order_queue\'</span>, queue_table =&gt; <span class="str">\'order_qt\'</span>);<br><span class="kw">EXEC</span> DBMS_AQADM.START_QUEUE(queue_name =&gt; <span class="str">\'order_queue\'</span>);<br><br><span class="cm">-- 3. Enqueue (put message)</span><br>DBMS_AQ.ENQUEUE(queue_name =&gt; <span class="str">\'order_queue\'</span>, payload =&gt; msg);<br><br><span class="cm">-- 4. Dequeue (read message)</span><br>DBMS_AQ.DEQUEUE(queue_name =&gt; <span class="str">\'order_queue\'</span>, payload =&gt; msg);</div>'},
{q:"What is DBMS_SCHEDULER? How do you schedule jobs?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">DBMS_SCHEDULER</span> creates and manages scheduled jobs in Oracle.<br>&#9733; Supports: time-based schedules (daily, weekly), event-based triggers, job chains (dependencies), and monitoring.<br>&#9733; Replaced the older DBMS_JOB package.<br>&#9733; Check user_scheduler_jobs view for status.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Create a scheduled job</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;DBMS_SCHEDULER.CREATE_JOB(<br>&nbsp;&nbsp;&nbsp;&nbsp;job_name =&gt; <span class="str">\'nightly_cleanup\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;job_type =&gt; <span class="str">\'PLSQL_BLOCK\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;job_action =&gt; <span class="str">\'BEGIN cleanup_old_data; END;\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;start_date =&gt; SYSTIMESTAMP,<br>&nbsp;&nbsp;&nbsp;&nbsp;repeat_interval =&gt; <span class="str">\'FREQ=DAILY; BYHOUR=2; BYMINUTE=0\'</span>, <span class="cm">-- 2 AM daily</span><br>&nbsp;&nbsp;&nbsp;&nbsp;enabled =&gt; TRUE<br>&nbsp;&nbsp;);<br><span class="kw">END</span>;<br><br><span class="cm">-- Check job status</span><br><span class="kw">SELECT</span> job_name, state, last_start_date, next_run_date<br><span class="kw">FROM</span> user_scheduler_jobs;<br><br><span class="cm">-- Run manually</span><br><span class="kw">EXEC</span> DBMS_SCHEDULER.RUN_JOB(<span class="str">\'nightly_cleanup\'</span>);</div>'},
{q:"What is Flashback Technology?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Flashback</span> provides time-travel for data.<br>&#9733; Types: <span class="key">Flashback Query</span> (AS OF TIMESTAMP), <span class="key">Flashback Table</span> (restore table), <span class="key">Flashback Drop</span> (recover from recycle bin), <span class="key">Flashback Database</span> (restore entire DB).<br>&#9733; Uses undo data.<br>&#9733; Essential for accidental data loss recovery.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Flashback Query: see data as it was 1 hour ago</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee<br><span class="kw">AS OF</span> TIMESTAMP (SYSTIMESTAMP - INTERVAL <span class="str">\'1\'</span> HOUR);<br><br><span class="cm">-- Flashback Table: restore table to past state</span><br><span class="kw">FLASHBACK TABLE</span> Employee <span class="kw">TO</span> TIMESTAMP<br>&nbsp;&nbsp;(SYSTIMESTAMP - INTERVAL <span class="str">\'30\'</span> MINUTE);<br><br><span class="cm">-- Flashback Drop: recover dropped table from recycle bin</span><br><span class="kw">FLASHBACK TABLE</span> Employee <span class="kw">TO BEFORE DROP</span>;<br><br><span class="cm">-- Check recycle bin</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> recyclebin;</div>'},
{q:"How do you implement Row-Level Security?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">VPD (Virtual Private Database)</span> implements row-level security by automatically appending a WHERE clause to every query.<br>&#9733; Uses DBMS_RLS.ADD_POLICY with a policy function.<br>&#9733; Transparent to the application — no code changes needed.<br>&#9733; Users see only authorized rows.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create policy function</span><br><span class="kw">CREATE FUNCTION</span> dept_security(p_schema VARCHAR2, p_table VARCHAR2)<br><span class="kw">RETURN</span> VARCHAR2 <span class="kw">AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">IF</span> SYS_CONTEXT(<span class="str">\'USERENV\'</span>, <span class="str">\'SESSION_USER\'</span>) = <span class="str">\'ADMIN\'</span> <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">RETURN NULL</span>; <span class="cm">-- admin sees ALL rows</span><br>&nbsp;&nbsp;<span class="kw">ELSE</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">RETURN</span> <span class="str">\'DeptId = SYS_CONTEXT(\\\'USERENV\\\', \\\'CLIENT_IDENTIFIER\\\')\'</span>;<br>&nbsp;&nbsp;<span class="kw">END IF</span>;<br><span class="kw">END</span>;<br><br><span class="cm">-- 2. Apply policy</span><br><span class="kw">EXEC</span> DBMS_RLS.ADD_POLICY(<br>&nbsp;&nbsp;object_schema =&gt; <span class="str">\'HR\'</span>, object_name =&gt; <span class="str">\'EMPLOYEE\'</span>,<br>&nbsp;&nbsp;policy_name =&gt; <span class="str">\'dept_policy\'</span>,<br>&nbsp;&nbsp;function_schema =&gt; <span class="str">\'HR\'</span>, policy_function =&gt; <span class="str">\'dept_security\'</span>);</div>'},
{q:"What is UTL_FILE? How do you read/write files?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">UTL_FILE</span> provides file I/O from PL/SQL.<br>&#9733; Requires a <span class="key">DIRECTORY object</span> pointing to a server path.<br>&#9733; Operations: FOPEN, PUT_LINE, GET_LINE, FCLOSE.<br>&#9733; Used for CSV exports, log files, data imports.<br>&#9733; Always handle exceptions and close files in EXCEPTION block.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create directory object (DBA)</span><br><span class="kw">CREATE DIRECTORY</span> export_dir <span class="kw">AS</span> <span class="str">\'/tmp/exports\'</span>;<br><span class="kw">GRANT READ, WRITE ON DIRECTORY</span> export_dir <span class="kw">TO</span> hr;<br><br><span class="cm">-- 2. Write to file</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;v_file UTL_FILE.FILE_TYPE;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;v_file := UTL_FILE.FOPEN(<span class="str">\'EXPORT_DIR\'</span>, <span class="str">\'employees.csv\'</span>, <span class="str">\'W\'</span>);<br>&nbsp;&nbsp;UTL_FILE.PUT_LINE(v_file, <span class="str">\'Name,Salary,Dept\'</span>); <span class="cm">-- header</span><br>&nbsp;&nbsp;<span class="kw">FOR</span> rec <span class="kw">IN</span> (<span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee) <span class="kw">LOOP</span><br>&nbsp;&nbsp;&nbsp;&nbsp;UTL_FILE.PUT_LINE(v_file, rec.Name || <span class="str">\',\'</span> || rec.Salary);<br>&nbsp;&nbsp;<span class="kw">END LOOP</span>;<br>&nbsp;&nbsp;UTL_FILE.FCLOSE(v_file);<br><span class="kw">END</span>;</div>'},
{q:"What is Dynamic SQL? Explain EXECUTE IMMEDIATE and DBMS_SQL.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">EXECUTE IMMEDIATE</span> is the simple way — handles most dynamic SQL needs with bind variables (:param) for safety.<br>&#9733; <span class="key">DBMS_SQL</span> is the complex way — needed when number of columns is unknown at compile time.<br>&#9733; Always use <span class="key">bind variables</span> to prevent SQL injection.<br>&#9733; Dynamic SQL is needed for DDL in PL/SQL and dynamic table/column names.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- EXECUTE IMMEDIATE (most common ⭐)</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;v_sql VARCHAR2(500);<br>&nbsp;&nbsp;v_count NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="cm">-- Dynamic table name</span><br>&nbsp;&nbsp;v_sql := <span class="str">\'SELECT COUNT(*) FROM \'</span> || p_table_name;<br>&nbsp;&nbsp;<span class="kw">EXECUTE IMMEDIATE</span> v_sql <span class="kw">INTO</span> v_count;<br><br>&nbsp;&nbsp;<span class="cm">-- With bind variables (safe from injection!)</span><br>&nbsp;&nbsp;v_sql := <span class="str">\'DELETE FROM Employee WHERE DeptId = :d\'</span>;<br>&nbsp;&nbsp;<span class="kw">EXECUTE IMMEDIATE</span> v_sql <span class="kw">USING</span> p_dept_id;<br><br>&nbsp;&nbsp;<span class="cm">-- Dynamic DDL</span><br>&nbsp;&nbsp;<span class="kw">EXECUTE IMMEDIATE</span> <span class="str">\'CREATE TABLE temp_data (id NUMBER)\'</span>;<br><span class="kw">END</span>;</div>'},
{q:"What is the difference between GLOBAL and PRIVATE TEMPORARY TABLE?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">GTT</span> has permanent definition but temporary data per session.<br>&#9733; ON COMMIT DELETE ROWS or PRESERVE ROWS.<br>&#9733; <span class="key">Private Temporary Table</span> (18c+) has temporary definition AND data — drops after transaction/session.<br>&#9733; GTT is visible in data dictionary, PTT is not.<br>&#9733; Use GTT for repeated temp storage, PTT for one-time processing.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Global Temporary Table (traditional)</span><br><span class="kw">CREATE GLOBAL TEMPORARY TABLE</span> gtt_results (<br>&nbsp;&nbsp;Id NUMBER, Name VARCHAR2(50)<br>) <span class="kw">ON COMMIT DELETE ROWS</span>; <span class="cm">-- data cleared after commit</span><br><span class="cm">-- OR: ON COMMIT PRESERVE ROWS (cleared after session ends)</span><br><span class="cm">-- Table definition stays forever, data is per-session</span><br><br><span class="cm">-- Private Temporary Table (Oracle 18c+)</span><br><span class="kw">CREATE PRIVATE TEMPORARY TABLE</span> ora$ptt_results (<br>&nbsp;&nbsp;Id NUMBER, Name VARCHAR2(50)<br>) <span class="kw">ON COMMIT DROP DEFINITION</span>; <span class="cm">-- table itself drops after commit!</span><br><span class="cm">-- Must start with ORA$PTT_ prefix</span><br><span class="cm">-- Both definition and data are temporary</span></div>'},
{q:"How do you implement Audit Trails?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Audit trails track database changes.<br>&#9733; Approaches: <span class="key">Trigger-based</span> (custom audit table with AUTONOMOUS_TRANSACTION), <span class="key">Oracle Unified Auditing</span> (built-in, policy-based), <span class="key">Fine-Grained Auditing</span> (DBMS_FGA for SELECT auditing).<br>&#9733; Use autonomous transactions so audit records survive rollbacks.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Trigger-based audit (custom)</span><br><span class="kw">CREATE TRIGGER</span> trg_emp_audit<br><span class="kw">AFTER INSERT OR UPDATE OR DELETE ON</span> Employee<br><span class="kw">FOR EACH ROW</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="kw">PRAGMA AUTONOMOUS_TRANSACTION</span>;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">INSERT INTO</span> AuditLog(TableName, Action, OldVal, NewVal, ChangedBy, ChangedAt)<br>&nbsp;&nbsp;<span class="kw">VALUES</span>(<span class="str">\'Employee\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">CASE WHEN</span> INSERTING <span class="kw">THEN</span> <span class="str">\'INSERT\'</span> <span class="kw">WHEN</span> UPDATING <span class="kw">THEN</span> <span class="str">\'UPDATE\'</span> <span class="kw">ELSE</span> <span class="str">\'DELETE\'</span> <span class="kw">END</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;:OLD.Name, :NEW.Name, USER, SYSDATE);<br>&nbsp;&nbsp;<span class="kw">COMMIT</span>;<br><span class="kw">END</span>;<br><br><span class="cm">-- 2. Oracle Unified Auditing (built-in)</span><br><span class="kw">CREATE AUDIT POLICY</span> emp_audit_policy<br>&nbsp;&nbsp;ACTIONS UPDATE ON HR.Employee, DELETE ON HR.Employee;<br><span class="kw">AUDIT POLICY</span> emp_audit_policy;</div>'},
{q:"What is RESULT_CACHE hint?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">RESULT_CACHE</span> stores query results in shared memory.<br>&#9733; Subsequent identical queries return cached results without re-execution.<br>&#9733; Auto-invalidated when underlying data changes.<br>&#9733; Works for queries and PL/SQL functions.<br>&#9733; Best for: read-heavy, rarely-changing lookup data.<br>&#9733; Dont use for frequently-changing tables.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Query-level result cache</span><br><span class="kw">SELECT</span> /*+ RESULT_CACHE */ DeptId, COUNT(*), AVG(Salary)<br><span class="kw">FROM</span> Employee<br><span class="kw">GROUP BY</span> DeptId;<br><span class="cm">-- First run: executes query, caches result</span><br><span class="cm">-- Next runs: returns cached result instantly! 🚀</span><br><span class="cm">-- Auto-invalidated when Employee table changes</span><br><br><span class="cm">-- Function-level result cache</span><br><span class="kw">CREATE FUNCTION</span> get_dept_count(p_dept NUMBER)<br><span class="kw">RETURN</span> NUMBER <span class="kw">RESULT_CACHE</span> <span class="kw">AS</span><br>&nbsp;&nbsp;v_count NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> COUNT(*) <span class="kw">INTO</span> v_count <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = p_dept;<br>&nbsp;&nbsp;<span class="kw">RETURN</span> v_count;<br><span class="kw">END</span>;</div>'},
{q:"What is Edition-Based Redefinition?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">EBR</span> enables zero-downtime upgrades of PL/SQL code.<br>&#9733; Create a new edition, modify code in it while old edition serves users.<br>&#9733; Switch users to new edition when tested.<br>&#9733; Supports: procedures, functions, packages, views, triggers.<br>&#9733; Key for <span class="key">continuous deployment</span> in Oracle environments.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create new edition</span><br><span class="kw">CREATE EDITION</span> v2_release;<br><br><span class="cm">-- 2. Switch to new edition and modify code</span><br><span class="kw">ALTER SESSION SET EDITION</span> = v2_release;<br><span class="kw">CREATE OR REPLACE PROCEDURE</span> calculate_salary <span class="kw">AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="cm">-- new logic here</span><br><span class="kw">END</span>;<br><br><span class="cm">-- 3. Old users still use old edition (no disruption!)</span><br><span class="cm">-- 4. When ready, switch all users to new edition</span><br><span class="cm">-- 5. Drop old edition when no longer needed</span></div>'},
{q:"What is the difference between CONNECT BY and Recursive CTE?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">CONNECT BY</span> is Oracle-specific with START WITH, PRIOR, LEVEL, SYS_CONNECT_BY_PATH.<br>&#9733; <span class="key">Recursive CTE</span> is ANSI standard using WITH + UNION ALL.<br>&#9733; CTE is portable across databases.<br>&#9733; CONNECT BY has simpler syntax and built-in functions (LEVEL, CONNECT_BY_ROOT).<br>&#9733; For new code, prefer Recursive CTE for portability.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- CONNECT BY (Oracle-specific)</span><br><span class="kw">SELECT</span> LEVEL, LPAD(<span class="str">\' \'</span>, LEVEL*2) || Name <span class="kw">as</span> OrgChart<br><span class="kw">FROM</span> Employee<br><span class="kw">START WITH</span> ManagerId <span class="kw">IS NULL</span> <span class="cm">-- root (CEO)</span><br><span class="kw">CONNECT BY PRIOR</span> Id = ManagerId <span class="cm">-- parent-child link</span><br><span class="kw">ORDER SIBLINGS BY</span> Name;<br><br><span class="cm">-- Recursive CTE (ANSI standard)</span><br><span class="kw">WITH</span> OrgChart(Id, Name, ManagerId, Lvl) <span class="kw">AS</span> (<br>&nbsp;&nbsp;<span class="cm">-- Anchor: top-level</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Id, Name, ManagerId, 1 <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> ManagerId <span class="kw">IS NULL</span><br>&nbsp;&nbsp;<span class="kw">UNION ALL</span><br>&nbsp;&nbsp;<span class="cm">-- Recursive: find children</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> e.Id, e.Name, e.ManagerId, o.Lvl + 1<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee e <span class="kw">JOIN</span> OrgChart o <span class="kw">ON</span> e.ManagerId = o.Id<br>)<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> OrgChart;</div>'},
]
};

const CATS=[
{id:'oops',name:'OOPs',clr:'#ff6f00'},
{id:'csharp',name:'C#',clr:'#764ba2'},
{id:'mvc',name:'MVC / .NET Core',clr:'#2196f3'},
{id:'sqlserver',name:'SQL Server',clr:'#e91e63'},
{id:'webapi',name:'Web API / REST',clr:'#009688'},
{id:'gitdevops',name:'Git / DevOps',clr:'#607d8b'},
{id:'security',name:'Security',clr:'#f44336'},
{id:'javascript',name:'JavaScript/TS',clr:'#fdd835'},
{id:'behavioral',name:'Behavioral/HR',clr:'#9c27b0'},
{id:'plsql',name:'PL/SQL',clr:'#4caf50'}
];
const LVL={b:'Beginner',a:'Advanced',e:'Experienced'};

function getStudy(){return JSON.parse(localStorage.getItem('iv_study')||'{}')}
function setStudy(d){localStorage.setItem('iv_study',JSON.stringify(d))}
function toggleStudy(cat,i){const d=getStudy();const k=cat+'_'+i;d[k]=!d[k];setStudy(d);render();}
let cur='oops';
const searchEl=document.getElementById('search');
searchEl.addEventListener('input',render);





function toggleAns(id){const el=document.getElementById(id);el.style.display=el.style.display==='none'?'block':'none';}

let currentUtterance=null;
function speakMal(btn,text){
  if(speechSynthesis.speaking){speechSynthesis.cancel();btn.classList.remove('playing');btn.innerHTML='🔊 Malayalam';return;}
  const clean=text.replace(/<[^>]*>/g,' ').replace(/&[^;]+;/g,' ').replace(/\s+/g,' ').trim();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='ml-IN';u.rate=0.9;u.pitch=1;
  const voices=speechSynthesis.getVoices();
  const mlVoice=voices.find(v=>v.lang.startsWith('ml'));
  if(mlVoice)u.voice=mlVoice;
  btn.classList.add('playing');btn.innerHTML='⏹️ Stop';
  u.onend=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 Malayalam';};
  u.onerror=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 Malayalam';};
  speechSynthesis.speak(u);
}
function speakEng(btn,text){
  if(speechSynthesis.speaking){speechSynthesis.cancel();btn.classList.remove('playing');btn.innerHTML='🔊 English';return;}
  const clean=text.replace(/<[^>]*>/g,' ').replace(/&[^;]+;/g,' ').replace(/\s+/g,' ').trim();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='en-IN';u.rate=0.9;u.pitch=1;
  btn.classList.add('playing');btn.innerHTML='⏹️ Stop';
  u.onend=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 English';};
  u.onerror=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 English';};
  speechSynthesis.speak(u);
}
if(typeof speechSynthesis!=='undefined')speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

function render(){
  const s=searchEl.value.toLowerCase();
  const sd=getStudy();

  // tabs with progress
  let totalAll=0,doneAll=0;
  document.getElementById('tabs').innerHTML=CATS.map(c=>{
    let t=DATA[c.id].length;
    let d=DATA[c.id].filter((_,i)=>sd[c.id+'_'+i]).length;
    totalAll+=t;doneAll+=d;
    return `<div class="tab ${cur===c.id?'active':''}" onclick="cur='${c.id}';render()">${c.name}<span class="cnt">${d}/${t}</span></div>`;
  }).join('');

  // overall progress
  document.getElementById('ov').textContent=doneAll+'/'+totalAll+' Studied';
  document.getElementById('ovBar').style.width=(totalAll?(doneAll/totalAll*100):0)+'%';

  // section
  const qs=DATA[cur],cat=CATS.find(c=>c.id===cur);
  let secDone=qs.filter((_,i)=>sd[cur+'_'+i]).length;
  document.getElementById('secL').textContent=cat.name;
  document.getElementById('secC').textContent=secDone+'/'+qs.length+' Studied';
  document.getElementById('secBar').style.width=(qs.length?(secDone/qs.length*100):0)+'%';
  document.getElementById('secBar').style.background=cat.clr;

  let html='',n=0;
  qs.forEach((q,i)=>{
    if(s&&!q.q.toLowerCase().includes(s))return;
    n++;
    const hasAns=!!q.a;
    const ansId=cur+'_ans_'+i;
    const studied=!!sd[cur+'_'+i];
    html+=`<div class="q ${studied?'studied':''}">
      <input type="checkbox" class="study-check" ${studied?'checked':''} onclick="event.stopPropagation();toggleStudy('${cur}',${i})" title="Mark as studied">
      <div class="qn">${n}</div>
      <div class="qt">${q.q}<span class="lvl ${q.l}">${LVL[q.l]}</span>${hasAns?`<button class="ans-btn" onclick="event.stopPropagation();toggleAns('${ansId}')">Answer</button>`:''}</div>
    </div>${hasAns?`<div class="ans-panel" id="${ansId}" style="display:none"><div style="margin-bottom:8px"><button class="voice-btn" onclick="event.stopPropagation();speakMal(this,document.getElementById('${ansId}').innerText)">Malayalam</button><button class="voice-btn" style="background:linear-gradient(135deg,#0ea5e9,#06b6d4)" onclick="event.stopPropagation();speakEng(this,document.getElementById('${ansId}').innerText)">English</button></div>${q.a}</div>`:''}`;
  });
  document.getElementById('qs').innerHTML=html||'<div style="text-align:center;color:#64748b;padding:30px;font-size:1rem">No questions match.</div>';
}
render();

      grouped[lv.k].forEach(q => {
        html += `<li style="margin-bottom:2px">${q}</li>`;
      });

  w.document.write(`<html><head><title>Interview Questions - All ${total} Questions</title>

      .summary-item { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 10px 20px; text-align: center; }
      .summary-item .num { font-size: 22px; font-weight: 700; color: #0369a1; }
      .summary-item .lbl { font-size: 12px; color: #555; }
      @media print { body { padding: 10px; } }
    </style>
  </head><body>
    <h1>🎯 .NET Interview Questions</h1>
    <div class="subtitle">Total ${total} Questions &#10148; OOPs &#10148; C# &#10148; MVC/.NET Core &#10148; PL/SQL</div>

    </div>
    ${html}
    <div style="text-align:center;margin-top:30px;color:#888;font-size:12px">Generated from Interview Prep App &#10148; ${new Date().toLocaleDateString()}</div>

function downloadQnAPDF() {
  const w = window.open('', '_blank');
  const c = CATS.find(x => x.id === cur);
  const qs = DATA[cur];
  const lvlColors = { b:'#2e7d32', a:'#e65100', e:'#c62828' };
  const lvlLabels = { b:'Beginner', a:'Advanced', e:'Experienced' };
  let html = '';
  let qNum = 0;
  const grouped = { b:[], a:[], e:[] };
  qs.forEach((q,i) => grouped[q.l].push({q:q.q, a:q.a, i:i}));
  [{k:'b',label:'Beginner'},{k:'a',label:'Advanced'},{k:'e',label:'Experienced'}].forEach(lv => {
    if (!grouped[lv.k].length) return;
    html += `<h3 style="color:${lvlColors[lv.k]};margin:18px 0 10px;font-size:17px;border-bottom:1px solid #ddd;padding-bottom:4px">${lv.label} (${grouped[lv.k].length})</h3>`;
    grouped[lv.k].forEach(item => {
      qNum++;
      let ans = item.a || '';
      ans = ans.replace(/<div style="margin-bottom:8px">[\s\S]*?<\/div>/, '');
      ans = ans.replace(/<h4>([^<]*)<\/h4>/g, '<div style="color:#0369a1;font-weight:700;font-size:13px;margin:10px 0 4px">$1</div>');
      ans = ans.replace(/class="quick-ans"/g, 'style="background:#ecfdf5;border:1px solid #6ee7b7;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#065f46;line-height:1.9"');
      ans = ans.replace(/class="code"/g, 'style="background:#f1f5f9;border:1px solid #e2e8f0;padding:10px 14px;border-radius:6px;font-family:Consolas,monospace;font-size:12px;overflow-x:auto;margin:8px 0;line-height:1.6;white-space:pre-wrap"');
      ans = ans.replace(/class="key"/g, 'style="background:#dbeafe;color:#1e40af;padding:2px 6px;border-radius:3px;font-weight:600;font-size:12px"');
      ans = ans.replace(/class="tip"/g, 'style="background:#fef3c7;border-left:3px solid #f59e0b;padding:8px 12px;border-radius:4px;margin:8px 0;font-size:12px;color:#92400e"');
      ans = ans.replace(/class="kw"/g, 'style="color:#7c3aed;font-weight:600"');
      ans = ans.replace(/class="str"/g, 'style="color:#16a34a"');
      ans = ans.replace(/class="cm"/g, 'style="color:#9ca3af"');
      ans = ans.replace(/<svg[\s\S]*?<\/svg>/g, '');
      html += `<div style="margin-bottom:18px">`;
      html += `<div style="font-size:14px;font-weight:700;color:#1e293b;margin-bottom:6px;padding:8px 12px;background:#f0f9ff;border-left:4px solid ${c.clr};border-radius:4px">${qNum}. ${item.q} <span style="font-size:11px;color:#fff;background:${lvlColors[lv.k]};padding:2px 8px;border-radius:10px;margin-left:6px">${lvlLabels[lv.k]}</span></div>`;
      html += `<div style="font-size:13px;color:#334155;padding:6px 12px;line-height:1.9;border:1px solid #e5e7eb;border-radius:6px;background:#fafafa">${ans}</div>`;
      html += `</div>`;
    });
  });
  w.document.write(`<html><head><title>${c.name} - QnA (${qs.length} Questions)</title>
    <style>
      body { font-family: 'Segoe UI', sans-serif; padding: 20px 30px; color: #111; font-size: 13px; }
      h1 { text-align: center; color: #0369a1; font-size: 24px; margin-bottom: 4px; }
      .subtitle { text-align: center; color: #555; font-size: 13px; margin-bottom: 20px; }
      @media print { body { padding: 10px; font-size: 12px; } }
    </style>
  </head><body>
    <h1>${c.name} - Questions and Answers</h1>
    <div class="subtitle">${qs.length} Questions</div>
    ${html}
    <div style="text-align:center;margin-top:20px;color:#888;font-size:11px">Generated from Interview Prep App - ${new Date().toLocaleDateString()}</div>
    <script>window.print();<\/script>
  </body></html>`);
  w.document.close();
}
