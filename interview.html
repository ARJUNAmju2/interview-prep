<text x="222" y="155" text-anchor="middle" fill="#16a34a" font-size="7">= "Arjun";</text><text x="222" y="172" text-anchor="middle" fill="#64748b" font-size="7">Type: dynamic</text><rect x="300" y="5" width="130" height="175" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="365" y="28" text-anchor="middle" fill="#92400e" font-weight="700" font-size="11">TempData</text><text x="365" y="48" text-anchor="middle" fill="#334155" font-size="8">Uses Session/Cookie</text><text x="365" y="63" text-anchor="middle" fill="#334155" font-size="8">behind the scenes</text><text x="365" y="83" text-anchor="middle" fill="#334155" font-size="8">✅ Across requests!</text><text x="365" y="100" text-anchor="middle" fill="#f59e0b" font-size="8">✅ Survives redirect</text><text x="365" y="117" text-anchor="middle" fill="#334155" font-size="8">❌ One-time read</text><text x="365" y="140" text-anchor="middle" fill="#92400e" font-size="7">TempData["Msg"]</text><text x="365" y="155" text-anchor="middle" fill="#92400e" font-size="7">= "Saved!";</text><text x="365" y="172" text-anchor="middle" fill="#64748b" font-size="7">Type: Dictionary</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Controller</span><br>ViewData[<span class="str">"Title"</span>] = <span class="str">"Home"</span>; <span class="cm">// needs casting in view</span><br>ViewBag.Name = <span class="str">"Arjun"</span>; <span class="cm">// dynamic, no casting</span><br>TempData[<span class="str">"Msg"</span>] = <span class="str">"Saved!"</span>; <span class="cm">// survives redirect</span><br><br><span class="cm">// View</span><br>&lt;h1&gt;@ViewData[<span class="str">"Title"</span>]&lt;/h1&gt;<br>&lt;p&gt;@ViewBag.Name&lt;/p&gt;<br>&lt;p&gt;@TempData[<span class="str">"Msg"</span>]&lt;/p&gt;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">ViewData</span> is a dictionary that passes data from Controller to View, needs type casting. <span class="key">ViewBag</span> is a dynamic wrapper over ViewData, no casting needed. Both work for current request only. <span class="key">TempData</span> uses session/cookies and survives across requests (redirects) — perfect for success messages after redirect."</p><div class="tip">💡 <b>Best practice:</b> Use strongly-typed <b>ViewModel</b> instead of ViewBag/ViewData. TempData only for redirect messages!</div>'},
{q:"What are Action Results? Name different types.",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>ActionResult</b> is the <b>return type</b> of a Controller action. It tells ASP.NET <b>what to send back</b> to the browser — HTML page, JSON, redirect, file, error, etc.</p><svg viewBox="0 0 440 190" style="max-width:440px"><rect x="10" y="5" width="420" height="35" rx="8" fill="#8b5cf6"/><text x="220" y="28" text-anchor="middle" fill="#fff" font-weight="700" font-size="13">Common Action Results</text><rect x="10" y="50" width="100" height="55" rx="6" fill="#10b981"/><text x="60" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">View()</text><text x="60" y="85" text-anchor="middle" fill="#d1fae5" font-size="7">Returns HTML</text><text x="60" y="97" text-anchor="middle" fill="#d1fae5" font-size="7">page</text><rect x="115" y="50" width="100" height="55" rx="6" fill="#0ea5e9"/><text x="165" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Json()</text><text x="165" y="85" text-anchor="middle" fill="#bae6fd" font-size="7">Returns JSON</text><text x="165" y="97" text-anchor="middle" fill="#bae6fd" font-size="7">for APIs</text><rect x="220" y="50" width="100" height="55" rx="6" fill="#f59e0b"/><text x="270" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Redirect()</text><text x="270" y="85" text-anchor="middle" fill="#fef3c7" font-size="7">Redirects to</text><text x="270" y="97" text-anchor="middle" fill="#fef3c7" font-size="7">another URL</text><rect x="325" y="50" width="105" height="55" rx="6" fill="#ef4444"/><text x="377" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">NotFound()</text><text x="377" y="85" text-anchor="middle" fill="#fecaca" font-size="7">Returns 404</text><text x="377" y="97" text-anchor="middle" fill="#fecaca" font-size="7">error</text><rect x="10" y="115" width="100" height="55" rx="6" fill="#06b6d4"/><text x="60" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">File()</text><text x="60" y="150" text-anchor="middle" fill="#cffafe" font-size="7">Download</text><text x="60" y="162" text-anchor="middle" fill="#cffafe" font-size="7">a file</text><rect x="115" y="115" width="100" height="55" rx="6" fill="#64748b"/><text x="165" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Content()</text><text x="165" y="150" text-anchor="middle" fill="#e2e8f0" font-size="7">Plain text</text><text x="165" y="162" text-anchor="middle" fill="#e2e8f0" font-size="7">response</text><rect x="220" y="115" width="100" height="55" rx="6" fill="#ec4899"/><text x="270" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Ok() / BadRequest()</text><text x="270" y="150" text-anchor="middle" fill="#fce7f3" font-size="7">200 / 400</text><text x="270" y="162" text-anchor="middle" fill="#fce7f3" font-size="7">status codes</text><rect x="325" y="115" width="105" height="55" rx="6" fill="#84cc16"/><text x="377" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">PartialView()</text><text x="377" y="150" text-anchor="middle" fill="#ecfccb" font-size="7">Returns partial</text><text x="377" y="162" text-anchor="middle" fill="#ecfccb" font-size="7">HTML fragment</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">public</span> IActionResult Index() =&gt; View(); <span class="cm">// HTML</span><br><span class="kw">public</span> IActionResult GetData() =&gt; Json(products); <span class="cm">// JSON</span><br><span class="kw">public</span> IActionResult Save() =&gt; RedirectToAction(<span class="str">"Index"</span>);<br><span class="kw">public</span> IActionResult Find(<span class="kw">int</span> id) =&gt; NotFound(); <span class="cm">// 404</span><br><span class="kw">public</span> IActionResult Download() =&gt; File(bytes, <span class="str">"application/pdf"</span>);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">ActionResult</span> is the base return type for controller actions. Common types: <span class="key">ViewResult</span> (HTML), <span class="key">JsonResult</span> (JSON), <span class="key">RedirectResult</span> (redirect), <span class="key">NotFoundResult</span> (404), <span class="key">FileResult</span> (download), <span class="key">ContentResult</span> (text), <span class="key">StatusCodeResult</span> (custom status). In .NET Core, we use <b>IActionResult</b> or <b>ActionResult&lt;T&gt;</b>."</p>'},
{q:"What is the difference between GET and POST?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>GET</b> = <b>asking for data</b> (like reading a book). Data visible in URL.<br><b>POST</b> = <b>sending data</b> (like submitting a form). Data hidden in request body.</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="5" width="200" height="155" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">📥 GET</text><text x="110" y="50" text-anchor="middle" fill="#334155" font-size="9">✅ Read / Fetch data</text><text x="110" y="67" text-anchor="middle" fill="#334155" font-size="9">✅ Data in URL (?id=5)</text><text x="110" y="84" text-anchor="middle" fill="#334155" font-size="9">✅ Can be bookmarked</text><text x="110" y="101" text-anchor="middle" fill="#334155" font-size="9">✅ Cached by browser</text><text x="110" y="118" text-anchor="middle" fill="#dc2626" font-size="9">❌ Limited data size</text><text x="110" y="135" text-anchor="middle" fill="#dc2626" font-size="9">❌ Not secure for passwords</text><text x="110" y="155" text-anchor="middle" fill="#1e40af" font-size="8" font-weight="600">/products?page=2</text><rect x="230" y="5" width="200" height="155" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="13">📤 POST</text><text x="330" y="50" text-anchor="middle" fill="#334155" font-size="9">✅ Send / Submit data</text><text x="330" y="67" text-anchor="middle" fill="#334155" font-size="9">✅ Data in body (hidden)</text><text x="330" y="84" text-anchor="middle" fill="#334155" font-size="9">✅ No size limit</text><text x="330" y="101" text-anchor="middle" fill="#334155" font-size="9">✅ Secure for sensitive data</text><text x="330" y="118" text-anchor="middle" fill="#dc2626" font-size="9">❌ Cannot bookmark</text><text x="330" y="135" text-anchor="middle" fill="#dc2626" font-size="9">❌ Not cached</text><text x="330" y="155" text-anchor="middle" fill="#16a34a" font-size="8" font-weight="600">Form submit, Login, Create</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// GET - fetch data</span><br>[HttpGet]<br><span class="kw">public</span> IActionResult Index() {<br>&nbsp;&nbsp;<span class="kw">var</span> products = _db.Products.ToList();<br>&nbsp;&nbsp;<span class="kw">return</span> View(products);<br>}<br><br><span class="cm">// POST - submit data</span><br>[HttpPost]<br>[ValidateAntiForgeryToken]<br><span class="kw">public</span> IActionResult Create(Product product) {<br>&nbsp;&nbsp;_db.Products.Add(product);<br>&nbsp;&nbsp;_db.SaveChanges();<br>&nbsp;&nbsp;<span class="kw">return</span> RedirectToAction(<span class="str">"Index"</span>);<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">GET</span> retrieves data, sends parameters in URL, is idempotent, and can be cached/bookmarked. <span class="key">POST</span> submits data in the request body, is not idempotent, and is used for create/update operations. GET for reading, POST for writing. Always use <span class="key">[ValidateAntiForgeryToken]</span> with POST to prevent CSRF attacks."</p><div class="tip">💡 <b>Idempotent:</b> GET called 10 times = same result. POST called 10 times = may create 10 records! Thats why POST is not idempotent.</div>'},
{q:"What is Layout in MVC? How does _Layout.cshtml work?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Layout</b> is a <b>master template</b> that defines the common structure (header, footer, navbar) shared across all pages. Individual views only contain their unique content. Like a photo frame — frame stays same, photo changes.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">&lt;!-- Views/Shared/_Layout.cshtml --&gt;</span><br>&lt;html&gt;<br>&lt;head&gt;&lt;title&gt;@ViewData[<span class="str">"Title"</span>]&lt;/title&gt;&lt;/head&gt;<br>&lt;body&gt;<br>&nbsp;&nbsp;&lt;nav&gt;Header / Navbar&lt;/nav&gt;<br>&nbsp;&nbsp;&lt;div class=<span class="str">"container"</span>&gt;<br>&nbsp;&nbsp;&nbsp;&nbsp;@RenderBody() <span class="cm">&lt;!-- page content goes here --&gt;</span><br>&nbsp;&nbsp;&lt;/div&gt;<br>&nbsp;&nbsp;&lt;footer&gt;Footer&lt;/footer&gt;<br>&nbsp;&nbsp;@RenderSection(<span class="str">"Scripts"</span>, required: <span class="kw">false</span>)<br>&lt;/body&gt;<br>&lt;/html&gt;<br><br><span class="cm">&lt;!-- Views/Home/Index.cshtml --&gt;</span><br>@{ Layout = <span class="str">"_Layout"</span>; ViewData[<span class="str">"Title"</span>] = <span class="str">"Home"</span>; }<br>&lt;h1&gt;Welcome!&lt;/h1&gt; <span class="cm">&lt;!-- this goes into @RenderBody() --&gt;</span><br>@section Scripts { &lt;script&gt;...&lt;/script&gt; }</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Layout</span> is a master page template in _Layout.cshtml. <span class="key">@RenderBody()</span> renders the child view content. <span class="key">@RenderSection()</span> renders optional sections like scripts. Set in _ViewStart.cshtml for all views or per-view with Layout property. Avoids repeating header/footer on every page."</p>'},
{q:"What are Partial Views? When would you use them?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Partial View</b> is a <b>reusable chunk of HTML</b> that you can embed inside other views. Like a component — write once, use in multiple pages. Example: a login form, product card, comment section.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">&lt;!-- Views/Shared/_ProductCard.cshtml (Partial) --&gt;</span><br>@model Product<br>&lt;div class=<span class="str">"card"</span>&gt;<br>&nbsp;&nbsp;&lt;h3&gt;@Model.Name&lt;/h3&gt;<br>&nbsp;&nbsp;&lt;p&gt;Price: @Model.Price&lt;/p&gt;<br>&lt;/div&gt;<br><br><span class="cm">&lt;!-- Use in any view --&gt;</span><br>@foreach(<span class="kw">var</span> p <span class="kw">in</span> Model.Products) {<br>&nbsp;&nbsp;&lt;partial name=<span class="str">"_ProductCard"</span> model=<span class="str">"p"</span> /&gt;<br>}<br><br><span class="cm">&lt;!-- Or using Html helper --&gt;</span><br>@await Html.PartialAsync(<span class="str">"_ProductCard"</span>, product)</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Partial View</span> is a reusable view fragment rendered inside another view. Use &lt;partial&gt; tag helper or Html.PartialAsync(). Used for: reusable UI components, breaking large views into smaller pieces, and AJAX-loaded content. Naming convention: prefix with underscore (_ProductCard)."</p>'},
{q:"What is the wwwroot folder in .NET Core?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>wwwroot</b> is the <b>web root folder</b> for static files — CSS, JavaScript, images, fonts. Only files inside wwwroot are accessible from the browser. Everything outside is protected.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Folder structure</span><br><span class="cm">// wwwroot/</span><br><span class="cm">//   css/site.css</span><br><span class="cm">//   js/app.js</span><br><span class="cm">//   images/logo.png</span><br><span class="cm">//   lib/bootstrap/</span><br><br><span class="cm">// Access in HTML</span><br>&lt;link href=<span class="str">"/css/site.css"</span> rel=<span class="str">"stylesheet"</span> /&gt;<br>&lt;script src=<span class="str">"/js/app.js"</span>&gt;&lt;/script&gt;<br>&lt;img src=<span class="str">"/images/logo.png"</span> /&gt;<br><br><span class="cm">// Enable in Program.cs</span><br>app.UseStaticFiles(); <span class="cm">// MUST add this middleware!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">wwwroot</span> is the web root for static files in ASP.NET Core. Only files here are publicly accessible via URL. Must enable with <span class="key">app.UseStaticFiles()</span> middleware. Contains CSS, JS, images, and client-side libraries. Files outside wwwroot (like Controllers, Models) are NOT accessible from browser — this is a security feature."</p>'},
{q:"What is Program.cs in .NET 6+? Explain Minimal Hosting Model.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>In .NET 6+, <b>Program.cs</b> is the <b>single entry point</b> for your app. No more Startup.cs! Everything — services, middleware, configuration — goes in one file. Called <b>Minimal Hosting Model</b>.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs (.NET 6+ Minimal Hosting)</span><br><span class="kw">var</span> builder = WebApplication.CreateBuilder(args);<br><br><span class="cm">// 1. Register Services (was in Startup.ConfigureServices)</span><br>builder.Services.AddControllers();<br>builder.Services.AddScoped&lt;IProductService, ProductService&gt;();<br>builder.Services.AddDbContext&lt;AppDbContext&gt;();<br>builder.Services.AddSwaggerGen();<br><br><span class="kw">var</span> app = builder.Build();<br><br><span class="cm">// 2. Configure Middleware Pipeline (was in Startup.Configure)</span><br>app.UseHttpsRedirection();<br>app.UseStaticFiles();<br>app.UseAuthentication();<br>app.UseAuthorization();<br>app.MapControllers();<br><br>app.Run();<br><span class="cm">// Thats it! No Startup.cs, no Main method, no class!</span></div><h4>🗣️ Interview Answer</h4><p>"In .NET 6+, <span class="key">Program.cs</span> replaces both Program.cs and Startup.cs using the <span class="key">Minimal Hosting Model</span>. Uses top-level statements — no Main method or class needed. WebApplication.CreateBuilder() for services, then Build() and configure middleware. Simpler, less boilerplate code."</p>'},
{q:"What is appsettings.json? How do you read configuration?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>appsettings.json</b> is the <b>configuration file</b> for your app — stores connection strings, API keys, app settings. Like a settings menu for your application.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// appsettings.json</span><br>{<br>&nbsp;&nbsp;<span class="str">"ConnectionStrings"</span>: {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"Default"</span>: <span class="str">"Server=.;Database=MyDb;..."</span><br>&nbsp;&nbsp;},<br>&nbsp;&nbsp;<span class="str">"AppSettings"</span>: {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"PageSize"</span>: 20,<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"ApiUrl"</span>: <span class="str">"https://api.example.com"</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Read in Program.cs</span><br><span class="kw">var</span> connStr = builder.Configuration.GetConnectionString(<span class="str">"Default"</span>);<br><br><span class="cm">// Read in Controller via IConfiguration</span><br><span class="kw">public class</span> HomeController {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IConfiguration _config;<br>&nbsp;&nbsp;<span class="kw">public</span> HomeController(IConfiguration config) { _config = config; }<br>&nbsp;&nbsp;<span class="kw">var</span> pageSize = _config.GetValue&lt;<span class="kw">int</span>&gt;(<span class="str">"AppSettings:PageSize"</span>);<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">appsettings.json</span> stores application configuration. Read using <span class="key">IConfiguration</span> injected via DI. Supports environment-specific files: appsettings.Development.json, appsettings.Production.json. For strongly-typed config, use the <span class="key">Options Pattern</span> with IOptions&lt;T&gt;. Connection strings accessed via GetConnectionString()."</p>'},
{q:"What are Tag Helpers? How are they different from HTML Helpers?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Tag Helpers</b> are the <b>modern replacement</b> for HTML Helpers. They look like normal HTML attributes (asp-for, asp-action) instead of C# method calls. Cleaner and more designer-friendly.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">&lt;!-- HTML Helper (old way) --&gt;</span><br>@Html.TextBoxFor(m =&gt; m.Name, <span class="kw">new</span> { @class = <span class="str">"form-control"</span> })<br>@Html.ActionLink(<span class="str">"Details"</span>, <span class="str">"Details"</span>, <span class="kw">new</span> { id = item.Id })<br><br><span class="cm">&lt;!-- Tag Helper (modern way ⭐) --&gt;</span><br>&lt;input asp-for=<span class="str">"Name"</span> class=<span class="str">"form-control"</span> /&gt;<br>&lt;a asp-action=<span class="str">"Details"</span> asp-route-id=<span class="str">"@item.Id"</span>&gt;Details&lt;/a&gt;<br><br><span class="cm">&lt;!-- Form with Tag Helpers --&gt;</span><br>&lt;form asp-action=<span class="str">"Create"</span> asp-controller=<span class="str">"Product"</span> method=<span class="str">"post"</span>&gt;<br>&nbsp;&nbsp;&lt;label asp-for=<span class="str">"Name"</span>&gt;&lt;/label&gt;<br>&nbsp;&nbsp;&lt;input asp-for=<span class="str">"Name"</span> /&gt;<br>&nbsp;&nbsp;&lt;span asp-validation-for=<span class="str">"Name"</span>&gt;&lt;/span&gt;<br>&nbsp;&nbsp;&lt;button type=<span class="str">"submit"</span>&gt;Save&lt;/button&gt;<br>&lt;/form&gt;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Tag Helpers</span> use HTML-like attributes (asp-for, asp-action) instead of C# method calls. They are cleaner, IntelliSense-friendly, and work naturally with HTML. <span class="key">HTML Helpers</span> use @Html.Method() C# syntax. Tag Helpers are preferred in ASP.NET Core. Enable with @addTagHelper in _ViewImports.cshtml."</p>'},
{q:"What is the difference between ASP.NET MVC 5 and ASP.NET Core MVC?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>MVC 5</b> = old, runs on .NET Framework, Windows only.<br><b>Core MVC</b> = modern, cross-platform, faster, built-in DI, middleware pipeline.</p><h4>💻 Key Differences</h4><div class="code"><span class="cm">// MVC 5 (Old)</span><br><span class="cm">- .NET Framework only (Windows)</span><br><span class="cm">- System.Web dependency (heavy)</span><br><span class="cm">- Global.asax + Web.config</span><br><span class="cm">- No built-in DI</span><br><span class="cm">- IIS only</span><br><br><span class="cm">// ASP.NET Core MVC (Modern)</span><br><span class="cm">- Cross-platform (Windows, Linux, Mac)</span><br><span class="cm">- No System.Web (lightweight)</span><br><span class="cm">- Program.cs + appsettings.json</span><br><span class="cm">- Built-in DI container</span><br><span class="cm">- Kestrel + any reverse proxy</span><br><span class="cm">- Middleware pipeline</span><br><span class="cm">- Tag Helpers</span><br><span class="cm">- Much faster performance</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">ASP.NET Core MVC</span> is cross-platform, uses Kestrel server, has built-in DI, middleware pipeline, Tag Helpers, and is significantly faster. <span class="key">MVC 5</span> is Windows-only, depends on System.Web, uses Global.asax, and requires IIS. Core is the future — all new projects should use ASP.NET Core."</p>'},
// Intermediate
{q:"What are Filters? Explain Authorization, Action, Result, Exception filters.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Filters</b> run code <b>before or after</b> specific stages in the request pipeline. Like security checkpoints at an airport — each filter checks something different.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Authorization Filter - runs FIRST, checks access</span><br>[Authorize(Roles = <span class="str">"Admin"</span>)]<br><span class="kw">public</span> IActionResult AdminPanel() { }<br><br><span class="cm">// 2. Action Filter - runs before/after action method</span><br><span class="kw">public class</span> LogActionFilter : IActionFilter {<br>&nbsp;&nbsp;<span class="kw">public void</span> OnActionExecuting(ActionExecutingContext ctx) {<br>&nbsp;&nbsp;&nbsp;&nbsp;Log.Info(<span class="str">"Before action"</span>);<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">public void</span> OnActionExecuted(ActionExecutedContext ctx) {<br>&nbsp;&nbsp;&nbsp;&nbsp;Log.Info(<span class="str">"After action"</span>);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// 3. Exception Filter - handles unhandled exceptions</span><br><span class="cm">// 4. Result Filter - runs before/after result execution</span><br><br><span class="cm">// Apply globally</span><br>builder.Services.AddControllers(options =&gt; {<br>&nbsp;&nbsp;options.Filters.Add&lt;LogActionFilter&gt;();<br>});</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Filters</span> execute code at specific pipeline stages. Order: <span class="key">Authorization</span> (access check) → <span class="key">Resource</span> (caching) → <span class="key">Action</span> (before/after action) → <span class="key">Exception</span> (error handling) → <span class="key">Result</span> (before/after result). Apply per-action, per-controller, or globally."</p>'},
{q:"What is Dependency Injection in ASP.NET Core? Explain Transient, Scoped, Singleton.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>ASP.NET Core has a <b>built-in DI container</b>. You register services with a lifetime that controls <b>how long the object lives</b>.</p><svg viewBox="0 0 440 130" style="max-width:440px"><rect x="10" y="5" width="130" height="115" rx="8" fill="#10b981"/><text x="75" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Transient</text><text x="75" y="45" text-anchor="middle" fill="#d1fae5" font-size="7">New instance EVERY time</text><text x="75" y="60" text-anchor="middle" fill="#d1fae5" font-size="7">injected</text><text x="75" y="80" text-anchor="middle" fill="#d1fae5" font-size="7">Lightweight services</text><text x="75" y="95" text-anchor="middle" fill="#fff" font-size="7">AddTransient&lt;T&gt;()</text><text x="75" y="112" text-anchor="middle" fill="#d1fae5" font-size="6">EmailService, Validators</text><rect x="155" y="5" width="130" height="115" rx="8" fill="#3b82f6"/><text x="220" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Scoped ⭐</text><text x="220" y="45" text-anchor="middle" fill="#bae6fd" font-size="7">One instance PER</text><text x="220" y="60" text-anchor="middle" fill="#bae6fd" font-size="7">HTTP request</text><text x="220" y="80" text-anchor="middle" fill="#bae6fd" font-size="7">Most common!</text><text x="220" y="95" text-anchor="middle" fill="#fff" font-size="7">AddScoped&lt;T&gt;()</text><text x="220" y="112" text-anchor="middle" fill="#bae6fd" font-size="6">DbContext, Repositories</text><rect x="300" y="5" width="130" height="115" rx="8" fill="#f59e0b"/><text x="365" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Singleton</text><text x="365" y="45" text-anchor="middle" fill="#fef3c7" font-size="7">ONE instance for</text><text x="365" y="60" text-anchor="middle" fill="#fef3c7" font-size="7">entire app lifetime</text><text x="365" y="80" text-anchor="middle" fill="#fef3c7" font-size="7">Shared across all</text><text x="365" y="95" text-anchor="middle" fill="#fff" font-size="7">AddSingleton&lt;T&gt;()</text><text x="365" y="112" text-anchor="middle" fill="#fef3c7" font-size="6">Cache, Config, Logger</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - register services</span><br>builder.Services.AddTransient&lt;IEmailService, EmailService&gt;(); <span class="cm">// new each time</span><br>builder.Services.AddScoped&lt;IProductRepo, ProductRepo&gt;(); <span class="cm">// per request</span><br>builder.Services.AddSingleton&lt;ICacheService, CacheService&gt;(); <span class="cm">// one forever</span></div><h4>🗣️ Interview Answer</h4><p>"ASP.NET Core has built-in DI. <span class="key">Transient</span> creates new instance every injection. <span class="key">Scoped</span> creates one per HTTP request (most common for DbContext, repos). <span class="key">Singleton</span> creates one for the entire app lifetime. Never inject Scoped into Singleton — causes captive dependency bug!"</p>'},
{q:"What is Middleware? How does the Request Pipeline work?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Middleware</b> is code that runs in a <b>pipeline</b> for every HTTP request. Each middleware can process the request, pass it to the next, or short-circuit. Like a chain of security guards — each checks something.</p><svg viewBox="0 0 440 100" style="max-width:440px"><rect x="10" y="25" width="70" height="40" rx="6" fill="#64748b"/><text x="45" y="49" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">Request</text><text x="95" y="48" text-anchor="middle" fill="#64748b" font-size="12">→</text><rect x="105" y="15" width="65" height="60" rx="6" fill="#ef4444"/><text x="137" y="38" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">Exception</text><text x="137" y="52" text-anchor="middle" fill="#fecaca" font-size="6">Handler</text><text x="137" y="68" text-anchor="middle" fill="#fecaca" font-size="6">1st</text><text x="185" y="48" text-anchor="middle" fill="#64748b" font-size="12">→</text><rect x="195" y="15" width="55" height="60" rx="6" fill="#f59e0b"/><text x="222" y="38" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">HTTPS</text><text x="222" y="52" text-anchor="middle" fill="#fef3c7" font-size="6">Redirect</text><text x="222" y="68" text-anchor="middle" fill="#fef3c7" font-size="6">2nd</text><text x="265" y="48" text-anchor="middle" fill="#64748b" font-size="12">→</text><rect x="275" y="15" width="55" height="60" rx="6" fill="#3b82f6"/><text x="302" y="38" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">Auth</text><text x="302" y="52" text-anchor="middle" fill="#bae6fd" font-size="6">Check</text><text x="302" y="68" text-anchor="middle" fill="#bae6fd" font-size="6">3rd</text><text x="345" y="48" text-anchor="middle" fill="#64748b" font-size="12">→</text><rect x="355" y="15" width="75" height="60" rx="6" fill="#10b981"/><text x="392" y="38" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">Controller</text><text x="392" y="52" text-anchor="middle" fill="#d1fae5" font-size="6">Action</text><text x="392" y="68" text-anchor="middle" fill="#d1fae5" font-size="6">End</text><text x="220" y="95" text-anchor="middle" fill="#64748b" font-size="8">Order matters! Each middleware calls next() or short-circuits</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - ORDER MATTERS!</span><br>app.UseExceptionHandler(<span class="str">"/error"</span>); <span class="cm">// 1st - catch errors</span><br>app.UseHttpsRedirection(); <span class="cm">// 2nd - force HTTPS</span><br>app.UseStaticFiles(); <span class="cm">// 3rd - serve CSS/JS</span><br>app.UseAuthentication(); <span class="cm">// 4th - who are you?</span><br>app.UseAuthorization(); <span class="cm">// 5th - can you access?</span><br>app.MapControllers(); <span class="cm">// 6th - route to controller</span><br><br><span class="cm">// Custom middleware</span><br>app.Use(<span class="kw">async</span> (context, next) =&gt; {<br>&nbsp;&nbsp;Log.Info(<span class="str">"Before"</span>);<br>&nbsp;&nbsp;<span class="kw">await</span> next(); <span class="cm">// call next middleware</span><br>&nbsp;&nbsp;Log.Info(<span class="str">"After"</span>);<br>});</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Middleware</span> are components in the request pipeline. Each can process requests, call next(), or short-circuit. <span class="key">Order matters</span> — exception handling first, then HTTPS, static files, auth, then routing. Use app.Use() for custom middleware. The pipeline is bidirectional — response flows back through the same middleware."</p>'},
{q:"What are Areas in MVC? When would you use them?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Areas</b> let you <b>organize a large MVC app into smaller sections</b>. Each area has its own Controllers, Views, and Models. Like departments in a company — Admin area, Customer area, API area.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Folder structure</span><br><span class="cm">// Areas/</span><br><span class="cm">//   Admin/</span><br><span class="cm">//     Controllers/DashboardController.cs</span><br><span class="cm">//     Views/Dashboard/Index.cshtml</span><br><span class="cm">//   Customer/</span><br><span class="cm">//     Controllers/OrderController.cs</span><br><span class="cm">//     Views/Order/Index.cshtml</span><br><br>[Area(<span class="str">"Admin"</span>)]<br><span class="kw">public class</span> DashboardController : Controller {<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Index() =&gt; View();<br>}<br><br><span class="cm">// Route: /Admin/Dashboard/Index</span><br><span class="cm">// Program.cs</span><br>app.MapControllerRoute(<br>&nbsp;&nbsp;name: <span class="str">"areas"</span>,<br>&nbsp;&nbsp;pattern: <span class="str">"{area:exists}/{controller}/{action}"</span>);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Areas</span> partition a large MVC app into functional groups, each with its own Controllers, Views, and Models. Use [Area] attribute on controllers. Useful for separating Admin, API, Customer sections. Each area has independent routing and can be developed by different teams."</p>'},
{q:"What is Entity Framework Core? Code First vs Database First?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>EF Core</b> is an <b>ORM</b> that lets you work with databases using <b>C# objects instead of SQL</b>. <b>Code First</b> = write C# classes, EF creates tables. <b>Database First</b> = tables exist, EF generates classes.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Code First - you write classes</span><br><span class="kw">public class</span> Product {<br>&nbsp;&nbsp;<span class="kw">public int</span> Id { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Price { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// DbContext</span><br><span class="kw">public class</span> AppDbContext : DbContext {<br>&nbsp;&nbsp;<span class="kw">public</span> DbSet&lt;Product&gt; Products { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// Migration creates the table</span><br><span class="cm">// dotnet ef migrations add InitialCreate</span><br><span class="cm">// dotnet ef database update</span><br><br><span class="cm">// CRUD without writing SQL!</span><br>_db.Products.Add(<span class="kw">new</span> Product { Name=<span class="str">"Laptop"</span> });<br><span class="kw">await</span> _db.SaveChangesAsync();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">EF Core</span> is an ORM that maps C# classes to database tables. <span class="key">Code First</span> — define models in C#, use migrations to create/update DB. <span class="key">Database First</span> — scaffold models from existing DB using dotnet ef dbcontext scaffold. Code First is preferred for new projects, Database First for legacy databases."</p>'},
{q:"What are Migrations in EF Core? How do you manage them?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Migrations</b> track <b>changes to your model</b> and apply them to the database. Like version control (Git) but for your database schema.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Create migration (after changing model)</span><br>dotnet ef migrations add AddPriceColumn<br><br><span class="cm">// 2. Apply to database</span><br>dotnet ef database update<br><br><span class="cm">// 3. Revert last migration</span><br>dotnet ef migrations remove<br><br><span class="cm">// 4. Revert database to specific migration</span><br>dotnet ef database update PreviousMigrationName<br><br><span class="cm">// 5. Generate SQL script (for production)</span><br>dotnet ef migrations script -o migration.sql<br><br><span class="cm">// Migration file auto-generated:</span><br><span class="kw">public partial class</span> AddPriceColumn : Migration {<br>&nbsp;&nbsp;<span class="kw">protected override void</span> Up(MigrationBuilder mb) {<br>&nbsp;&nbsp;&nbsp;&nbsp;mb.AddColumn&lt;<span class="kw">decimal</span>&gt;(<span class="str">"Price"</span>, <span class="str">"Products"</span>);<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">protected override void</span> Down(MigrationBuilder mb) {<br>&nbsp;&nbsp;&nbsp;&nbsp;mb.DropColumn(<span class="str">"Price"</span>, <span class="str">"Products"</span>);<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Migrations</span> version-control your database schema. Commands: <span class="key">add</span> (create migration), <span class="key">update</span> (apply to DB), <span class="key">remove</span> (delete last), <span class="key">script</span> (generate SQL for production). Each migration has Up() and Down() methods for applying and reverting changes."</p>'},
{q:"What is the Repository Pattern with EF Core?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Repository Pattern</b> adds a <b>layer between Controller and DbContext</b>. Instead of calling _db.Products directly, you call _repo.GetAll(). Makes code testable and swappable.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Interface</span><br><span class="kw">interface</span> IProductRepo {<br>&nbsp;&nbsp;Task&lt;List&lt;Product&gt;&gt; GetAllAsync();<br>&nbsp;&nbsp;Task&lt;Product&gt; GetByIdAsync(<span class="kw">int</span> id);<br>&nbsp;&nbsp;Task AddAsync(Product p);<br>&nbsp;&nbsp;Task SaveAsync();<br>}<br><br><span class="cm">// Implementation</span><br><span class="kw">class</span> ProductRepo : IProductRepo {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> AppDbContext _db;<br>&nbsp;&nbsp;<span class="kw">public</span> ProductRepo(AppDbContext db) { _db = db; }<br>&nbsp;&nbsp;<span class="kw">public async</span> Task&lt;List&lt;Product&gt;&gt; GetAllAsync()<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; <span class="kw">await</span> _db.Products.ToListAsync();<br>}<br><br><span class="cm">// Register in DI</span><br>builder.Services.AddScoped&lt;IProductRepo, ProductRepo&gt;();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Repository Pattern</span> abstracts data access behind an interface. Controller depends on IRepository, not DbContext directly. Benefits: testability (mock interface), separation of concerns, swap data source easily. Some argue EF Core DbContext IS already a repository — adding another layer may be over-engineering for simple apps."</p>'},
{q:"What is Model Validation? Explain Data Annotations and FluentValidation.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Model Validation</b> checks if user input is correct before processing. <b>Data Annotations</b> = attributes on properties [Required]. <b>FluentValidation</b> = separate validator class with rules.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Data Annotations - on the model</span><br><span class="kw">public class</span> Product {<br>&nbsp;&nbsp;[Required(ErrorMessage = <span class="str">"Name is required"</span>)]<br>&nbsp;&nbsp;[StringLength(100)]<br>&nbsp;&nbsp;<span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br><br>&nbsp;&nbsp;[Range(1, 100000)]<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Price { <span class="kw">get</span>; <span class="kw">set</span>; }<br><br>&nbsp;&nbsp;[EmailAddress]<br>&nbsp;&nbsp;<span class="kw">public string</span> Email { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// FluentValidation - separate class (cleaner for complex rules)</span><br><span class="kw">public class</span> ProductValidator : AbstractValidator&lt;Product&gt; {<br>&nbsp;&nbsp;<span class="kw">public</span> ProductValidator() {<br>&nbsp;&nbsp;&nbsp;&nbsp;RuleFor(p =&gt; p.Name).NotEmpty().MaximumLength(100);<br>&nbsp;&nbsp;&nbsp;&nbsp;RuleFor(p =&gt; p.Price).GreaterThan(0);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Check in controller</span><br><span class="kw">if</span>(!ModelState.IsValid) <span class="kw">return</span> BadRequest(ModelState);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Data Annotations</span> use attributes like [Required], [Range], [StringLength] directly on model properties — simple but limited. <span class="key">FluentValidation</span> uses separate validator classes with fluent rules — better for complex validation, testable, follows SRP. Check with ModelState.IsValid in controller."</p>'},
{q:"What is the difference between AddSingleton, AddScoped, and AddTransient?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>AddTransient</b> = new object EVERY time. <b>AddScoped</b> = one object PER request. <b>AddSingleton</b> = one object for ENTIRE app. Same as DI lifetimes!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Each request gets a GUID to prove the point</span><br><span class="kw">public class</span> MyService { <span class="kw">public</span> Guid Id = Guid.NewGuid(); }<br><br><span class="cm">// Transient - different Id every injection</span><br>builder.Services.AddTransient&lt;MyService&gt;();<br><span class="cm">// Inject twice in same request = 2 different Ids</span><br><br><span class="cm">// Scoped - same Id within one request</span><br>builder.Services.AddScoped&lt;MyService&gt;();<br><span class="cm">// Inject twice in same request = SAME Id</span><br><span class="cm">// New request = new Id</span><br><br><span class="cm">// Singleton - same Id forever</span><br>builder.Services.AddSingleton&lt;MyService&gt;();<br><span class="cm">// All requests, all users = SAME Id</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Transient</span> — new instance per injection (lightweight stateless services). <span class="key">Scoped</span> — one instance per HTTP request (DbContext, repositories). <span class="key">Singleton</span> — one instance for app lifetime (cache, config). Rule: never inject Scoped into Singleton — causes captive dependency!"</p>'},
{q:"What is CORS? How do you configure it?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>CORS</b> (Cross-Origin Resource Sharing) allows your API to accept requests from <b>different domains</b>. By default, browsers block cross-origin requests for security. CORS tells the browser "its OK, allow this domain."</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - configure CORS</span><br>builder.Services.AddCors(options =&gt; {<br>&nbsp;&nbsp;options.AddPolicy(<span class="str">"AllowFrontend"</span>, policy =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;policy.WithOrigins(<span class="str">"https://myapp.com"</span>)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.AllowAnyHeader()<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.AllowAnyMethod();<br>&nbsp;&nbsp;});<br>});<br><br><span class="cm">// Use in pipeline</span><br>app.UseCors(<span class="str">"AllowFrontend"</span>);<br><br><span class="cm">// Or per controller/action</span><br>[EnableCors(<span class="str">"AllowFrontend"</span>)]<br><span class="kw">public class</span> ApiController { }<br><br><span class="cm">// Allow all (dev only! ❌ not for production)</span><br>policy.AllowAnyOrigin().AllowAnyHeader().AllowAnyMethod();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">CORS</span> is a browser security feature that blocks cross-origin requests. Configure in ASP.NET Core with AddCors() and UseCors(). Specify allowed origins, headers, and methods. Use named policies for different rules. Never use AllowAnyOrigin in production — specify exact domains."</p>'},
{q:"What is the difference between Web API and MVC in ASP.NET Core?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>In ASP.NET Core, both are <b>unified</b> — same framework! The difference is: <b>MVC</b> returns Views (HTML), <b>API</b> returns data (JSON). API uses [ApiController] and ControllerBase.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// MVC Controller - returns HTML views</span><br><span class="kw">public class</span> HomeController : <span class="kw">Controller</span> {<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Index() =&gt; View(); <span class="cm">// HTML</span><br>}<br><br><span class="cm">// API Controller - returns JSON data</span><br>[ApiController]<br>[Route(<span class="str">"api/[controller]"</span>)]<br><span class="kw">public class</span> ProductsController : <span class="kw">ControllerBase</span> {<br>&nbsp;&nbsp;[HttpGet]<br>&nbsp;&nbsp;<span class="kw">public</span> ActionResult&lt;List&lt;Product&gt;&gt; Get() =&gt; Ok(products);<br>}<br><br><span class="cm">// [ApiController] gives you:</span><br><span class="cm">// - Auto model validation (400 if invalid)</span><br><span class="cm">// - Auto [FromBody] binding</span><br><span class="cm">// - Problem details for errors</span></div><h4>🗣️ Interview Answer</h4><p>"In ASP.NET Core, MVC and Web API are <span class="key">unified</span>. MVC uses Controller base class and returns Views. API uses <span class="key">[ApiController]</span> with ControllerBase and returns JSON. [ApiController] adds auto validation, auto [FromBody] binding, and ProblemDetails error responses."</p>'},
{q:"What are Razor Pages? How are they different from MVC?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Razor Pages</b> is a <b>page-focused</b> model — each page has its own .cshtml file + code-behind (.cshtml.cs). No separate Controller needed. Simpler than MVC for page-based scenarios.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Pages/Products/Index.cshtml.cs (PageModel = Controller + Model)</span><br><span class="kw">public class</span> IndexModel : PageModel {<br>&nbsp;&nbsp;<span class="kw">public</span> List&lt;Product&gt; Products { <span class="kw">get</span>; <span class="kw">set</span>; }<br><br>&nbsp;&nbsp;<span class="kw">public void</span> OnGet() { <span class="cm">// handles GET request</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Products = _db.Products.ToList();<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult OnPost() { <span class="cm">// handles POST</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> RedirectToPage();<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Pages/Products/Index.cshtml</span><br>@page<br>@model IndexModel<br>@foreach(<span class="kw">var</span> p <span class="kw">in</span> Model.Products) {<br>&nbsp;&nbsp;&lt;p&gt;@p.Name&lt;/p&gt;<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Razor Pages</span> is page-centric — each page has .cshtml + .cshtml.cs (PageModel). Uses OnGet/OnPost handlers instead of separate controllers. <span class="key">MVC</span> is controller-centric — one controller handles multiple views. Use Razor Pages for simple page-based apps, MVC for complex apps with shared controllers."</p>'},
{q:"What is SignalR? When would you use it?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>SignalR</b> enables <b>real-time communication</b> between server and client. Server can <b>push data to clients instantly</b> without the client asking. Like WhatsApp — messages appear instantly without refreshing.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Server - Hub (like a controller for real-time)</span><br><span class="kw">public class</span> ChatHub : Hub {<br>&nbsp;&nbsp;<span class="kw">public async</span> Task SendMessage(<span class="kw">string</span> user, <span class="kw">string</span> msg) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> Clients.All.SendAsync(<span class="str">"ReceiveMessage"</span>, user, msg);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Program.cs</span><br>builder.Services.AddSignalR();<br>app.MapHub&lt;ChatHub&gt;(<span class="str">"/chatHub"</span>);<br><br><span class="cm">// Client (JavaScript)</span><br><span class="kw">const</span> conn = <span class="kw">new</span> signalR.HubConnectionBuilder()<br>&nbsp;&nbsp;.withUrl(<span class="str">"/chatHub"</span>).build();<br>conn.on(<span class="str">"ReceiveMessage"</span>, (user, msg) =&gt; {<br>&nbsp;&nbsp;addMessageToChat(user, msg); <span class="cm">// instant update!</span><br>});<br>conn.start();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">SignalR</span> enables real-time bidirectional communication using WebSockets (with fallbacks to SSE, Long Polling). Server can push to clients instantly. Use for: <span class="key">chat apps</span>, <span class="key">live notifications</span>, <span class="key">dashboards</span>, <span class="key">collaborative editing</span>, <span class="key">live scores</span>. Uses Hub class on server, JS/C# client libraries."</p>'},
{q:"What is Caching? Explain In-Memory and Distributed Caching.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Caching</b> stores frequently used data in <b>fast storage</b> to avoid hitting the database every time. <b>In-Memory</b> = stored in app memory (single server). <b>Distributed</b> = stored in Redis/SQL (shared across servers).</p><svg viewBox="0 0 440 120" style="max-width:440px"><rect x="10" y="5" width="200" height="105" rx="8" fill="#10b981"/><text x="110" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">In-Memory Cache</text><text x="110" y="45" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Super fast (same process)</text><text x="110" y="60" text-anchor="middle" fill="#d1fae5" font-size="8">❌ Lost on app restart</text><text x="110" y="75" text-anchor="middle" fill="#d1fae5" font-size="8">❌ Not shared across servers</text><text x="110" y="95" text-anchor="middle" fill="#fff" font-size="7">IMemoryCache</text><text x="110" y="107" text-anchor="middle" fill="#d1fae5" font-size="7">Single server apps</text><rect x="230" y="5" width="200" height="105" rx="8" fill="#3b82f6"/><text x="330" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Distributed Cache</text><text x="330" y="45" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Shared across servers</text><text x="330" y="60" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Survives app restart</text><text x="330" y="75" text-anchor="middle" fill="#bae6fd" font-size="8">❌ Slightly slower (network)</text><text x="330" y="95" text-anchor="middle" fill="#fff" font-size="7">IDistributedCache (Redis)</text><text x="330" y="107" text-anchor="middle" fill="#bae6fd" font-size="7">Multi-server / cloud apps</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// In-Memory Cache</span><br>builder.Services.AddMemoryCache();<br><br><span class="kw">public class</span> ProductService {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IMemoryCache _cache;<br>&nbsp;&nbsp;<span class="kw">public</span> List&lt;Product&gt; GetAll() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> _cache.GetOrCreate(<span class="str">"products"</span>, entry =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;entry.AbsoluteExpirationRelativeToNow = TimeSpan.FromMinutes(10);<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> _db.Products.ToList();<br>&nbsp;&nbsp;&nbsp;&nbsp;});<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">In-Memory cache</span> (IMemoryCache) stores in app process — fastest but not shared. <span class="key">Distributed cache</span> (IDistributedCache with Redis/SQL) stores externally — shared across servers, survives restarts. Use in-memory for single server, distributed for load-balanced/cloud apps."</p>'},
{q:"What is the Options Pattern in ASP.NET Core?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>The <b>Options Pattern</b> reads configuration from appsettings.json into a <b>strongly-typed C# class</b>. Instead of reading strings with _config["key"], you get a proper object with IntelliSense.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// appsettings.json</span><br>{ <span class="str">"EmailSettings"</span>: { <span class="str">"SmtpHost"</span>: <span class="str">"smtp.gmail.com"</span>, <span class="str">"Port"</span>: 587 } }<br><br><span class="cm">// Strongly-typed class</span><br><span class="kw">public class</span> EmailSettings {<br>&nbsp;&nbsp;<span class="kw">public string</span> SmtpHost { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public int</span> Port { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// Register in Program.cs</span><br>builder.Services.Configure&lt;EmailSettings&gt;(<br>&nbsp;&nbsp;builder.Configuration.GetSection(<span class="str">"EmailSettings"</span>));<br><br><span class="cm">// Inject and use</span><br><span class="kw">public class</span> EmailService {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> EmailSettings _settings;<br>&nbsp;&nbsp;<span class="kw">public</span> EmailService(IOptions&lt;EmailSettings&gt; options) {<br>&nbsp;&nbsp;&nbsp;&nbsp;_settings = options.Value;<br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(_settings.SmtpHost); <span class="cm">// IntelliSense! ✅</span><br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">Options Pattern</span> binds configuration sections to strongly-typed classes using Configure&lt;T&gt;(). Inject with <span class="key">IOptions&lt;T&gt;</span> (singleton), <span class="key">IOptionsSnapshot&lt;T&gt;</span> (scoped, reloads on change), or <span class="key">IOptionsMonitor&lt;T&gt;</span> (singleton with change notifications). Better than reading raw strings from IConfiguration."</p>'},
{q:"How do you implement Authentication and Authorization?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Authentication</b> = WHO are you? (login, verify identity).<br><b>Authorization</b> = WHAT can you do? (roles, permissions, access control).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - setup</span><br>builder.Services.AddAuthentication(JwtBearerDefaults.AuthenticationScheme)<br>&nbsp;&nbsp;.AddJwtBearer(options =&gt; { <span class="cm">/* JWT config */</span> });<br>builder.Services.AddAuthorization();<br><br>app.UseAuthentication(); <span class="cm">// WHO are you?</span><br>app.UseAuthorization(); <span class="cm">// CAN you access?</span><br><br><span class="cm">// Protect controller/action</span><br>[Authorize] <span class="cm">// must be logged in</span><br><span class="kw">public class</span> OrderController { }<br><br>[Authorize(Roles = <span class="str">"Admin"</span>)] <span class="cm">// must be Admin</span><br><span class="kw">public</span> IActionResult Delete() { }<br><br>[AllowAnonymous] <span class="cm">// anyone can access</span><br><span class="kw">public</span> IActionResult Login() { }</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Authentication</span> verifies identity (JWT, Cookie, OAuth). <span class="key">Authorization</span> checks permissions ([Authorize], Roles, Policies, Claims). Middleware order matters: UseAuthentication() before UseAuthorization(). Use [Authorize] to protect, [AllowAnonymous] to open. ASP.NET Core supports Role-based, Claims-based, and Policy-based authorization."</p>'},
{q:"What is the difference between Cookie and Token-based Authentication?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Cookie auth</b> = server stores session, sends cookie to browser. Good for <b>MVC web apps</b>.<br><b>Token auth (JWT)</b> = server sends token, client stores it. Good for <b>APIs and mobile apps</b>.</p><svg viewBox="0 0 440 130" style="max-width:440px"><rect x="10" y="5" width="200" height="115" rx="8" fill="#f59e0b"/><text x="110" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">🍪 Cookie-Based</text><text x="110" y="45" text-anchor="middle" fill="#fef3c7" font-size="8">✅ Server stores session</text><text x="110" y="60" text-anchor="middle" fill="#fef3c7" font-size="8">✅ Auto-sent by browser</text><text x="110" y="75" text-anchor="middle" fill="#fef3c7" font-size="8">❌ Not for mobile/APIs</text><text x="110" y="90" text-anchor="middle" fill="#fef3c7" font-size="8">❌ CSRF vulnerable</text><text x="110" y="110" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">Best for: MVC web apps</text><rect x="230" y="5" width="200" height="115" rx="8" fill="#10b981"/><text x="330" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">🔑 Token-Based (JWT)</text><text x="330" y="45" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Stateless (no server session)</text><text x="330" y="60" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Works with mobile/SPA</text><text x="330" y="75" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Scalable (no session store)</text><text x="330" y="90" text-anchor="middle" fill="#d1fae5" font-size="8">❌ Must handle token storage</text><text x="330" y="110" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">Best for: APIs, mobile, SPA</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">Cookie auth</span> is stateful — server maintains session, cookie auto-sent by browser. Good for MVC apps. <span class="key">Token (JWT) auth</span> is stateless — token contains all info, sent in Authorization header. Good for APIs, mobile, SPAs. JWT is scalable (no server session), cookie is simpler for traditional web apps."</p>'},
// Advanced
{q:"How do you implement JWT Authentication in Web API?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>JWT (JSON Web Token)</b> is a token sent in the <b>Authorization header</b> with every API request. Server validates the token instead of checking a session. Token has 3 parts: Header.Payload.Signature.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Program.cs - configure JWT</span><br>builder.Services.AddAuthentication(JwtBearerDefaults.AuthenticationScheme)<br>&nbsp;&nbsp;.AddJwtBearer(options =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;options.TokenValidationParameters = <span class="kw">new</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ValidateIssuer = <span class="kw">true</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ValidIssuer = <span class="str">"myapp"</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ValidateAudience = <span class="kw">true</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;IssuerSigningKey = <span class="kw">new</span> SymmetricSecurityKey(keyBytes)<br>&nbsp;&nbsp;&nbsp;&nbsp;};<br>&nbsp;&nbsp;});<br><br><span class="cm">// 2. Generate token on login</span><br><span class="kw">var</span> claims = <span class="kw">new</span>[] { <span class="kw">new</span> Claim(ClaimTypes.Name, user.Name) };<br><span class="kw">var</span> token = <span class="kw">new</span> JwtSecurityToken(<br>&nbsp;&nbsp;issuer: <span class="str">"myapp"</span>, claims: claims,<br>&nbsp;&nbsp;expires: DateTime.Now.AddHours(1),<br>&nbsp;&nbsp;signingCredentials: creds);<br><span class="kw">return</span> Ok(<span class="kw">new</span> JwtSecurityTokenHandler().WriteToken(token));<br><br><span class="cm">// 3. Client sends: Authorization: Bearer &lt;token&gt;</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">JWT</span> has 3 parts: Header (algorithm), Payload (claims/data), Signature (verification). Configure with AddJwtBearer() in Program.cs. On login, generate token with claims and signing key. Client sends token in <span class="key">Authorization: Bearer</span> header. Server validates signature, expiry, issuer on every request. Stateless — no server session needed."</p>'},
{q:"What is CQRS Pattern? How do you implement it with MediatR?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>CQRS</b> (Command Query Responsibility Segregation) = <b>separate READ and WRITE operations</b> into different models. Reads (queries) and writes (commands) have different needs, so separate them. <b>MediatR</b> is a library that implements this cleanly.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Command (Write) - changes data</span><br><span class="kw">public record</span> CreateProductCommand(<span class="kw">string</span> Name, <span class="kw">decimal</span> Price)<br>&nbsp;&nbsp;: IRequest&lt;<span class="kw">int</span>&gt;; <span class="cm">// returns product Id</span><br><br><span class="kw">public class</span> CreateProductHandler : IRequestHandler&lt;CreateProductCommand, <span class="kw">int</span>&gt; {<br>&nbsp;&nbsp;<span class="kw">public async</span> Task&lt;<span class="kw">int</span>&gt; Handle(CreateProductCommand cmd, CancellationToken ct) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">var</span> product = <span class="kw">new</span> Product { Name = cmd.Name, Price = cmd.Price };<br>&nbsp;&nbsp;&nbsp;&nbsp;_db.Add(product); <span class="kw">await</span> _db.SaveChangesAsync();<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> product.Id;<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Query (Read) - just fetches data</span><br><span class="kw">public record</span> GetProductsQuery : IRequest&lt;List&lt;Product&gt;&gt;;<br><br><span class="cm">// Controller - clean!</span><br>[HttpPost]<br><span class="kw">public async</span> Task&lt;IActionResult&gt; Create(CreateProductCommand cmd)<br>&nbsp;&nbsp;=&gt; Ok(<span class="kw">await</span> _mediator.Send(cmd));</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">CQRS</span> separates read (Query) and write (Command) models. Commands change state, queries return data. <span class="key">MediatR</span> implements this with IRequest/IRequestHandler pattern — sends commands/queries to their handlers. Benefits: clean controllers, single responsibility, easy to test, can scale reads and writes independently."</p>'},
{q:"What is the Mediator Pattern and MediatR?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>The <b>Mediator Pattern</b> = objects dont talk to each other directly, they go through a <b>middleman (mediator)</b>. <b>MediatR</b> is a .NET library that implements this. Controller sends a request, MediatR finds the right handler.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Install: dotnet add package MediatR</span><br><span class="cm">// Program.cs</span><br>builder.Services.AddMediatR(cfg =&gt;<br>&nbsp;&nbsp;cfg.RegisterServicesFromAssembly(<span class="kw">typeof</span>(Program).Assembly));<br><br><span class="cm">// Request</span><br><span class="kw">public record</span> GetUserQuery(<span class="kw">int</span> Id) : IRequest&lt;User&gt;;<br><br><span class="cm">// Handler (auto-discovered by MediatR)</span><br><span class="kw">public class</span> GetUserHandler : IRequestHandler&lt;GetUserQuery, User&gt; {<br>&nbsp;&nbsp;<span class="kw">public async</span> Task&lt;User&gt; Handle(GetUserQuery q, CancellationToken ct)<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; <span class="kw">await</span> _db.Users.FindAsync(q.Id);<br>}<br><br><span class="cm">// Controller - super clean, no service injection!</span><br>[HttpGet(<span class="str">"{id}"</span>)]<br><span class="kw">public async</span> Task&lt;IActionResult&gt; Get(<span class="kw">int</span> id)<br>&nbsp;&nbsp;=&gt; Ok(<span class="kw">await</span> _mediator.Send(<span class="kw">new</span> GetUserQuery(id)));</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Mediator Pattern</span> reduces coupling — objects communicate through a mediator instead of directly. <span class="key">MediatR</span> library implements this with IRequest/IRequestHandler. Controller sends request via _mediator.Send(), MediatR routes to the correct handler. Also supports <span class="key">Notifications</span> (one-to-many) and <span class="key">Pipeline Behaviors</span> (cross-cutting concerns like logging, validation)."</p>'},
{q:"How do you implement Global Exception Handling?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Global Exception Handling</b> catches ALL unhandled errors in one place instead of try-catch in every controller. Returns consistent error responses.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Method 1: Exception Handling Middleware (recommended)</span><br><span class="kw">public class</span> ExceptionMiddleware {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> RequestDelegate _next;<br>&nbsp;&nbsp;<span class="kw">public</span> ExceptionMiddleware(RequestDelegate next) { _next = next; }<br><br>&nbsp;&nbsp;<span class="kw">public async</span> Task InvokeAsync(HttpContext context) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">try</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> _next(context); <span class="cm">// call next middleware</span><br>&nbsp;&nbsp;&nbsp;&nbsp;} <span class="kw">catch</span>(Exception ex) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;context.Response.StatusCode = 500;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> context.Response.WriteAsJsonAsync(<span class="kw">new</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;error = ex.Message, status = 500<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;});<br>&nbsp;&nbsp;&nbsp;&nbsp;}<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Program.cs</span><br>app.UseMiddleware&lt;ExceptionMiddleware&gt;(); <span class="cm">// add FIRST!</span><br><br><span class="cm">// Method 2: Built-in (.NET 8+)</span><br>app.UseExceptionHandler();<br>builder.Services.AddProblemDetails();</div><h4>🗣️ Interview Answer</h4><p>"Implement with custom <span class="key">Exception Middleware</span> that wraps the pipeline in try-catch. Returns consistent error response (ProblemDetails format). Add as first middleware so it catches everything. .NET 8+ has built-in UseExceptionHandler() with ProblemDetails. Also can use <span class="key">IExceptionFilter</span> for MVC-specific handling."</p>'},
{q:"What are Health Checks? How do you implement them?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Health Checks</b> are endpoints that tell you if your app and its dependencies (DB, Redis, APIs) are <b>working or broken</b>. Load balancers and monitoring tools call these to check app health.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs</span><br>builder.Services.AddHealthChecks()<br>&nbsp;&nbsp;.AddSqlServer(connectionString, name: <span class="str">"database"</span>)<br>&nbsp;&nbsp;.AddRedis(redisConnStr, name: <span class="str">"redis"</span>)<br>&nbsp;&nbsp;.AddUrlGroup(<span class="kw">new</span> Uri(<span class="str">"https://api.example.com"</span>), name: <span class="str">"external-api"</span>);<br><br>app.MapHealthChecks(<span class="str">"/health"</span>); <span class="cm">// simple</span><br>app.MapHealthChecks(<span class="str">"/health/detail"</span>, <span class="kw">new</span> HealthCheckOptions {<br>&nbsp;&nbsp;ResponseWriter = UIResponseWriter.WriteHealthCheckUIResponse<br>}); <span class="cm">// detailed JSON</span><br><br><span class="cm">// GET /health returns:</span><br><span class="cm">// Healthy ✅ or Unhealthy ❌ or Degraded ⚠️</span><br><br><span class="cm">// Custom health check</span><br><span class="kw">public class</span> DiskSpaceCheck : IHealthCheck {<br>&nbsp;&nbsp;<span class="kw">public</span> Task&lt;HealthCheckResult&gt; CheckHealthAsync(...) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> freeSpace &gt; 1GB<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;? HealthCheckResult.Healthy()<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: HealthCheckResult.Unhealthy(<span class="str">"Low disk"</span>);<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Health Checks</span> expose /health endpoint that returns Healthy, Unhealthy, or Degraded status. Check database, Redis, external APIs, disk space. Used by <span class="key">load balancers</span> (remove unhealthy instances), <span class="key">Kubernetes</span> (liveness/readiness probes), and monitoring tools. Add with AddHealthChecks() and MapHealthChecks()."</p>'},
{q:"How do you implement API Versioning?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>API Versioning</b> lets you <b>maintain multiple versions</b> of your API at the same time. Old clients use v1, new clients use v2. No breaking changes!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Install: Asp.Versioning.Mvc</span><br>builder.Services.AddApiVersioning(options =&gt; {<br>&nbsp;&nbsp;options.DefaultApiVersion = <span class="kw">new</span> ApiVersion(1, 0);<br>&nbsp;&nbsp;options.AssumeDefaultVersionWhenUnspecified = <span class="kw">true</span>;<br>&nbsp;&nbsp;options.ReportApiVersions = <span class="kw">true</span>;<br>});<br><br><span class="cm">// 1. URL versioning (most common)</span><br>[ApiVersion(<span class="str">"1.0"</span>)]<br>[Route(<span class="str">"api/v{version:apiVersion}/products"</span>)]<br><span class="kw">public class</span> ProductsV1Controller { } <span class="cm">// /api/v1/products</span><br><br>[ApiVersion(<span class="str">"2.0"</span>)]<br>[Route(<span class="str">"api/v{version:apiVersion}/products"</span>)]<br><span class="kw">public class</span> ProductsV2Controller { } <span class="cm">// /api/v2/products</span><br><br><span class="cm">// 2. Query string: /api/products?api-version=2.0</span><br><span class="cm">// 3. Header: api-version: 2.0</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">API Versioning</span> supports multiple API versions simultaneously. Three approaches: <span class="key">URL path</span> (/api/v1/products — most popular), <span class="key">Query string</span> (?api-version=2), <span class="key">Header</span> (api-version: 2). Use Asp.Versioning.Mvc package. Mark controllers with [ApiVersion]. Deprecate old versions with [ApiVersion(\"1.0\", Deprecated = true)]."</p>'},
{q:"What is gRPC? How does it compare to REST?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>gRPC</b> is a high-performance RPC framework by Google. Uses <b>Protocol Buffers</b> (binary) instead of JSON (text). Much faster than REST for service-to-service communication.</p><svg viewBox="0 0 440 120" style="max-width:440px"><rect x="10" y="5" width="200" height="105" rx="8" fill="#3b82f6"/><text x="110" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">REST (JSON)</text><text x="110" y="45" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Human readable</text><text x="110" y="60" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Browser friendly</text><text x="110" y="75" text-anchor="middle" fill="#bae6fd" font-size="8">❌ Text-based (larger size)</text><text x="110" y="90" text-anchor="middle" fill="#bae6fd" font-size="8">❌ HTTP/1.1 (one request/conn)</text><text x="110" y="105" text-anchor="middle" fill="#fff" font-size="7">Best for: public APIs, web</text><rect x="230" y="5" width="200" height="105" rx="8" fill="#10b981"/><text x="330" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">gRPC (Protobuf)</text><text x="330" y="45" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Binary (10x smaller)</text><text x="330" y="60" text-anchor="middle" fill="#d1fae5" font-size="8">✅ HTTP/2 (multiplexing)</text><text x="330" y="75" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Streaming support</text><text x="330" y="90" text-anchor="middle" fill="#d1fae5" font-size="8">❌ Not browser friendly</text><text x="330" y="105" text-anchor="middle" fill="#fff" font-size="7">Best for: microservices</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">gRPC</span> uses Protocol Buffers (binary), HTTP/2, and is much faster than REST. Supports streaming (server, client, bidirectional). Best for <span class="key">microservice-to-microservice</span> communication. REST is better for public APIs and browser clients. In .NET, use Grpc.AspNetCore package."</p>'},
{q:"How do you implement Rate Limiting?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Rate Limiting</b> restricts how many requests a client can make in a time window. Prevents abuse, DDoS, and ensures fair usage. Like a bouncer at a club — only N people per hour.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// .NET 7+ built-in rate limiting</span><br>builder.Services.AddRateLimiter(options =&gt; {<br>&nbsp;&nbsp;<span class="cm">// Fixed window: 10 requests per 1 minute</span><br>&nbsp;&nbsp;options.AddFixedWindowLimiter(<span class="str">"fixed"</span>, opt =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.Window = TimeSpan.FromMinutes(1);<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.PermitLimit = 10;<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.QueueLimit = 2;<br>&nbsp;&nbsp;});<br><br>&nbsp;&nbsp;<span class="cm">// Sliding window: smoother distribution</span><br>&nbsp;&nbsp;options.AddSlidingWindowLimiter(<span class="str">"sliding"</span>, opt =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.Window = TimeSpan.FromMinutes(1);<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.PermitLimit = 10;<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.SegmentsPerWindow = 4;<br>&nbsp;&nbsp;});<br>});<br><br>app.UseRateLimiter();<br><br>[EnableRateLimiting(<span class="str">"fixed"</span>)]<br><span class="kw">public class</span> ApiController { }</div><h4>🗣️ Interview Answer</h4><p>".NET 7+ has built-in rate limiting with <span class="key">Fixed Window</span> (N requests per window), <span class="key">Sliding Window</span> (smoother), <span class="key">Token Bucket</span> (burst-friendly), <span class="key">Concurrency</span> (max simultaneous). Apply globally or per-endpoint with [EnableRateLimiting]. Returns 429 Too Many Requests when exceeded."</p>'},
{q:"What is the Outbox Pattern?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>The <b>Outbox Pattern</b> ensures <b>database changes and message publishing happen together reliably</b>. Instead of publishing directly to a message broker, save the message to an outbox table in the SAME database transaction. A background job then publishes it.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Problem: DB saves but message fails = inconsistency!</span><br><span class="cm">// _db.SaveChanges(); ✅</span><br><span class="cm">// _bus.Publish(event); ❌ fails! Message lost!</span><br><br><span class="cm">// Solution: Outbox Pattern</span><br><span class="cm">// 1. Save data + outbox message in SAME transaction</span><br><span class="kw">using var</span> tx = _db.Database.BeginTransaction();<br>_db.Orders.Add(order);<br>_db.OutboxMessages.Add(<span class="kw">new</span> OutboxMessage {<br>&nbsp;&nbsp;Type = <span class="str">"OrderCreated"</span>,<br>&nbsp;&nbsp;Payload = JsonSerializer.Serialize(order),<br>&nbsp;&nbsp;CreatedAt = DateTime.UtcNow<br>});<br>_db.SaveChanges();<br>tx.Commit(); <span class="cm">// both saved atomically! ✅</span><br><br><span class="cm">// 2. Background job reads outbox and publishes</span><br><span class="cm">// Polls OutboxMessages table, publishes to broker, marks as sent</span></div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">Outbox Pattern</span> solves the dual-write problem — saving to DB and publishing a message must both succeed or both fail. Save the event to an <span class="key">outbox table</span> in the same DB transaction. A background worker reads and publishes to the message broker. Ensures <span class="key">eventual consistency</span> without distributed transactions."</p>'},
{q:"How do you implement Background Services using IHostedService?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>IHostedService</b> / <b>BackgroundService</b> lets you run <b>long-running tasks in the background</b> — like scheduled jobs, queue processing, health monitoring — without blocking the main app.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Simple background service</span><br><span class="kw">public class</span> EmailQueueProcessor : BackgroundService {<br>&nbsp;&nbsp;<span class="kw">protected override async</span> Task ExecuteAsync(CancellationToken ct) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">while</span>(!ct.IsCancellationRequested) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">var</span> emails = <span class="kw">await</span> GetPendingEmails();<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">foreach</span>(<span class="kw">var</span> email <span class="kw">in</span> emails)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> SendEmail(email);<br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> Task.Delay(TimeSpan.FromSeconds(30), ct); <span class="cm">// poll every 30s</span><br>&nbsp;&nbsp;&nbsp;&nbsp;}<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Register in Program.cs</span><br>builder.Services.AddHostedService&lt;EmailQueueProcessor&gt;();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">BackgroundService</span> (inherits IHostedService) runs long-running tasks in the background. Override <span class="key">ExecuteAsync</span> with your logic. Register with AddHostedService&lt;T&gt;(). Use for: queue processing, scheduled tasks, outbox publishing, cache warming. Respects CancellationToken for graceful shutdown."</p>'},
{q:"What is the difference between Minimal APIs and Controller-based APIs?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Controller-based</b> = traditional, uses Controller classes with [HttpGet] etc. <b>Minimal APIs</b> = new in .NET 6, define endpoints directly in Program.cs with lambdas. Less code, faster for simple APIs.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Controller-based (traditional)</span><br>[ApiController]<br>[Route(<span class="str">"api/[controller]"</span>)]<br><span class="kw">public class</span> ProductsController : ControllerBase {<br>&nbsp;&nbsp;[HttpGet]<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult GetAll() =&gt; Ok(_db.Products.ToList());<br><br>&nbsp;&nbsp;[HttpGet(<span class="str">"{id}"</span>)]<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Get(<span class="kw">int</span> id) =&gt; Ok(_db.Products.Find(id));<br>}<br><br><span class="cm">// Minimal API (new way) - same thing, less code!</span><br>app.MapGet(<span class="str">"/api/products"</span>, (AppDb db) =&gt; db.Products.ToList());<br>app.MapGet(<span class="str">"/api/products/{id}"</span>, (AppDb db, <span class="kw">int</span> id) =&gt; db.Products.Find(id));<br>app.MapPost(<span class="str">"/api/products"</span>, (AppDb db, Product p) =&gt; {<br>&nbsp;&nbsp;db.Add(p); db.SaveChanges();<br>&nbsp;&nbsp;<span class="kw">return</span> Results.Created($<span class="str">"/api/products/{p.Id}"</span>, p);<br>});</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Controller-based</span> uses classes, attributes, filters — better for large complex APIs. <span class="key">Minimal APIs</span> define endpoints inline with MapGet/MapPost — less boilerplate, faster startup, good for microservices and simple APIs. Both support DI, auth, validation. Minimal APIs are NOT a replacement — choose based on complexity."</p>'},
{q:"How do you implement Microservices with .NET?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>Each <b>microservice</b> is a <b>separate .NET project</b> with its own database, deployed independently. They communicate via HTTP (REST), gRPC, or message brokers (RabbitMQ).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Solution structure</span><br><span class="cm">// src/</span><br><span class="cm">//   OrderService/ (own DB, own API)</span><br><span class="cm">//   ProductService/ (own DB, own API)</span><br><span class="cm">//   PaymentService/ (own DB, own API)</span><br><span class="cm">//   ApiGateway/ (Ocelot/YARP)</span><br><br><span class="cm">// Service-to-service call via HttpClient</span><br>builder.Services.AddHttpClient(<span class="str">"ProductService"</span>, c =&gt; {<br>&nbsp;&nbsp;c.BaseAddress = <span class="kw">new</span> Uri(<span class="str">"https://product-svc:5001"</span>);<br>});<br><br><span class="cm">// Or via message broker (async)</span><br><span class="cm">// OrderService publishes "OrderCreated" event</span><br><span class="cm">// PaymentService subscribes and processes payment</span><br><br><span class="cm">// Docker Compose for local dev</span><br><span class="cm">// docker-compose.yml runs all services + RabbitMQ + Redis</span></div><h4>🗣️ Interview Answer</h4><p>"Each microservice is a separate ASP.NET Core project with own database (<span class="key">Database per Service</span>). Communicate via <span class="key">REST/gRPC</span> (sync) or <span class="key">RabbitMQ/Kafka</span> (async). Use <span class="key">API Gateway</span> (Ocelot/YARP) for routing. Containerize with <span class="key">Docker</span>, orchestrate with <span class="key">Kubernetes</span>. Apply patterns: CQRS, Saga, Circuit Breaker, Outbox."</p>'},
