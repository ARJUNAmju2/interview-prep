{q:"What is Interface Segregation Principle (ISP)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Dont force classes to implement methods they dont need</b>. Better to have many small, focused interfaces than one big fat interface.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - fat interface</span><br><span class="kw">interface</span> IWorker {<br>&nbsp;&nbsp;<span class="kw">void</span> Work();<br>&nbsp;&nbsp;<span class="kw">void</span> Eat();<br>&nbsp;&nbsp;<span class="kw">void</span> Sleep();<br>}<br><span class="kw">class</span> Robot : IWorker {<br>&nbsp;&nbsp;<span class="kw">public void</span> Work() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> Eat() { <span class="kw">throw new</span> Exception(); } <span class="cm">// ❌ robots dont eat!</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Sleep() { <span class="kw">throw new</span> Exception(); } <span class="cm">// ❌</span><br>}<br><br><span class="cm">// ✅ GOOD - small focused interfaces</span><br><span class="kw">interface</span> IWorkable { <span class="kw">void</span> Work(); }<br><span class="kw">interface</span> IFeedable { <span class="kw">void</span> Eat(); }<br><span class="kw">class</span> Human : IWorkable, IFeedable { ... }<br><span class="kw">class</span> Robot : IWorkable { ... } <span class="cm">// only Work! ✅</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">ISP</span> states clients should not be forced to depend on interfaces they dont use. Split large interfaces into smaller, specific ones. This prevents empty or exception-throwing implementations."</p>'},
{q:"What is Dependency Inversion Principle (DIP)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>High-level modules should NOT depend on low-level modules. Both should depend on <b>abstractions (interfaces)</b>. Dont depend on concrete classes, depend on interfaces.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - depends on concrete class</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private</span> SqlDatabase _db = <span class="kw">new</span> SqlDatabase(); <span class="cm">// ❌ tight coupling</span><br>}<br><br><span class="cm">// ✅ GOOD - depends on abstraction</span><br><span class="kw">interface</span> IDatabase { <span class="kw">void</span> Save(<span class="kw">object</span> data); }<br><span class="kw">class</span> SqlDatabase : IDatabase { ... }<br><span class="kw">class</span> MongoDatabase : IDatabase { ... }<br><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IDatabase _db;<br>&nbsp;&nbsp;<span class="kw">public</span> OrderService(IDatabase db) { _db = db; } <span class="cm">// ✅ inject!</span><br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">DIP</span> states high-level modules should depend on abstractions, not concrete implementations. Achieved through <span class="key">Dependency Injection</span> — inject interfaces via constructor. This makes code testable (mock interfaces) and flexible (swap implementations)."</p>'},
{q:"What is Dependency Injection? Explain Constructor, Property, and Method injection.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Dependency Injection (DI)</b> = instead of a class creating its own dependencies, they are <b>given from outside</b>. Like ordering food delivery instead of cooking yourself.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Constructor Injection (most common ⭐)</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IEmailService _email;<br>&nbsp;&nbsp;<span class="kw">public</span> OrderService(IEmailService email) { _email = email; }<br>}<br><br><span class="cm">// 2. Property Injection</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">public</span> IEmailService Email { <span class="kw">get</span>; <span class="kw">set</span>; } <span class="cm">// set from outside</span><br>}<br><br><span class="cm">// 3. Method Injection</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">public void</span> Process(IEmailService email) { } <span class="cm">// passed per method</span><br>}<br><br><span class="cm">// ASP.NET Core DI registration</span><br>builder.Services.AddScoped&lt;IEmailService, EmailService&gt;();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">DI</span> provides dependencies from outside instead of creating them inside. <span class="key">Constructor injection</span> (most common) — via constructor parameter. <span class="key">Property injection</span> — via public property. <span class="key">Method injection</span> — via method parameter. ASP.NET Core has built-in DI container with AddTransient, AddScoped, AddSingleton."</p>'},
{q:"What is the Singleton Pattern? How do you make it thread-safe?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Singleton</b> ensures a class has <b>only ONE instance</b> throughout the application. Like there is only one President of a country at a time.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Thread-safe Singleton</span><br><span class="kw">public sealed class</span> Singleton {<br>&nbsp;&nbsp;<span class="kw">private static readonly</span> Lazy&lt;Singleton&gt; _instance<br>&nbsp;&nbsp;&nbsp;&nbsp;= <span class="kw">new</span> Lazy&lt;Singleton&gt;(() =&gt; <span class="kw">new</span> Singleton());<br><br>&nbsp;&nbsp;<span class="kw">private</span> Singleton() { } <span class="cm">// private constructor!</span><br><br>&nbsp;&nbsp;<span class="kw">public static</span> Singleton Instance =&gt; _instance.Value;<br>}<br><br><span class="cm">// Always same instance</span><br><span class="kw">var</span> a = Singleton.Instance;<br><span class="kw">var</span> b = Singleton.Instance;<br><span class="cm">// a == b → true (same object!)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Singleton</span> restricts a class to one instance using private constructor and static property. Thread-safe approaches: <span class="key">Lazy&lt;T&gt;</span> (best), double-check locking, or static readonly field. In ASP.NET Core, use <b>AddSingleton</b> in DI instead of manual singleton."</p>'},
{q:"What is the Factory Pattern? Explain Simple Factory vs Abstract Factory.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Factory Pattern</b> creates objects <b>without exposing creation logic</b>. Instead of using new directly, ask a factory to create the object for you.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Simple Factory</span><br><span class="kw">class</span> NotificationFactory {<br>&nbsp;&nbsp;<span class="kw">public static</span> INotification Create(<span class="kw">string</span> type) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> type <span class="kw">switch</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"email"</span> =&gt; <span class="kw">new</span> EmailNotification(),<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"sms"</span> =&gt; <span class="kw">new</span> SmsNotification(),<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;_ =&gt; <span class="kw">throw new</span> ArgumentException()<br>&nbsp;&nbsp;&nbsp;&nbsp;};<br>&nbsp;&nbsp;}<br>}<br><span class="kw">var</span> notif = NotificationFactory.Create(<span class="str">"email"</span>);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Simple Factory</span> uses one method to create different objects based on input. <span class="key">Factory Method</span> lets subclasses decide which class to instantiate. <span class="key">Abstract Factory</span> creates families of related objects. Factory pattern promotes loose coupling and follows OCP."</p>'},
{q:"What is the Strategy Pattern? Give a real-world example.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Strategy Pattern</b> lets you <b>swap algorithms at runtime</b>. Like choosing payment method — Credit Card, UPI, or Cash — same checkout, different strategy.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> IPaymentStrategy { <span class="kw">void</span> Pay(<span class="kw">decimal</span> amount); }<br><span class="kw">class</span> CreditCard : IPaymentStrategy { <span class="kw">public void</span> Pay(<span class="kw">decimal</span> amt) { } }<br><span class="kw">class</span> UPI : IPaymentStrategy { <span class="kw">public void</span> Pay(<span class="kw">decimal</span> amt) { } }<br><br><span class="kw">class</span> Checkout {<br>&nbsp;&nbsp;<span class="kw">private</span> IPaymentStrategy _strategy;<br>&nbsp;&nbsp;<span class="kw">public</span> Checkout(IPaymentStrategy strategy) { _strategy = strategy; }<br>&nbsp;&nbsp;<span class="kw">public void</span> Process(<span class="kw">decimal</span> amt) =&gt; _strategy.Pay(amt);<br>}<br><br><span class="kw">var</span> checkout = <span class="kw">new</span> Checkout(<span class="kw">new</span> UPI()); <span class="cm">// swap strategy!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Strategy Pattern</span> defines a family of algorithms, encapsulates each one, and makes them interchangeable at runtime. The client chooses which strategy to use. Follows OCP — add new strategies without modifying existing code."</p>'},
{q:"What is the Observer Pattern? How does it relate to Events in C#?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Observer Pattern</b> = when one object changes, all <b>subscribers get notified automatically</b>. Like YouTube — you subscribe to a channel, you get notified when new video is uploaded. C# <b>Events</b> implement this pattern.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// C# Events = Observer Pattern built-in!</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">public event</span> EventHandler&lt;<span class="kw">string</span>&gt; OrderPlaced; <span class="cm">// event</span><br><br>&nbsp;&nbsp;<span class="kw">public void</span> PlaceOrder() {<br>&nbsp;&nbsp;&nbsp;&nbsp;OrderPlaced?.Invoke(<span class="kw">this</span>, <span class="str">"Order #123"</span>); <span class="cm">// notify all!</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Subscribers</span><br><span class="kw">var</span> service = <span class="kw">new</span> OrderService();<br>service.OrderPlaced += (s, msg) =&gt; SendEmail(msg); <span class="cm">// subscriber 1</span><br>service.OrderPlaced += (s, msg) =&gt; SendSMS(msg); <span class="cm">// subscriber 2</span><br>service.PlaceOrder(); <span class="cm">// both get notified!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Observer Pattern</span> defines a one-to-many dependency — when the subject changes state, all observers are notified. In C#, this is implemented using <span class="key">Events and Delegates</span>. The publisher raises the event, subscribers handle it."</p>'},
{q:"What is the Decorator Pattern? When would you use it?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Decorator Pattern</b> adds <b>new behavior to an object dynamically</b> without changing its class. Like adding toppings to a pizza — base pizza stays same, you wrap it with extras.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> ICoffee { <span class="kw">string</span> Description(); <span class="kw">decimal</span> Cost(); }<br><br><span class="kw">class</span> BasicCoffee : ICoffee {<br>&nbsp;&nbsp;<span class="kw">public string</span> Description() =&gt; <span class="str">"Coffee"</span>;<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Cost() =&gt; 50;<br>}<br><br><span class="kw">class</span> MilkDecorator : ICoffee {<br>&nbsp;&nbsp;<span class="kw">private</span> ICoffee _coffee;<br>&nbsp;&nbsp;<span class="kw">public</span> MilkDecorator(ICoffee coffee) { _coffee = coffee; }<br>&nbsp;&nbsp;<span class="kw">public string</span> Description() =&gt; _coffee.Description() + <span class="str">" + Milk"</span>;<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Cost() =&gt; _coffee.Cost() + 20;<br>}<br><br><span class="kw">var</span> coffee = <span class="kw">new</span> MilkDecorator(<span class="kw">new</span> BasicCoffee());<br><span class="cm">// "Coffee + Milk" = 70</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Decorator Pattern</span> wraps an object to add new behavior dynamically without modifying the original class. It follows OCP. Real examples: Stream decorators in C# (BufferedStream wraps FileStream), middleware in ASP.NET Core."</p>'},
{q:"What is the Adapter Pattern?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Adapter Pattern</b> makes <b>incompatible interfaces work together</b>. Like a power adapter — Indian plug doesnt fit US socket, adapter makes it work.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Old system (incompatible)</span><br><span class="kw">class</span> OldPaymentGateway {<br>&nbsp;&nbsp;<span class="kw">public void</span> MakePayment(<span class="kw">string</span> xml) { } <span class="cm">// takes XML!</span><br>}<br><br><span class="cm">// New system expects this interface</span><br><span class="kw">interface</span> IPayment { <span class="kw">void</span> Pay(Order order); }<br><br><span class="cm">// Adapter bridges the gap</span><br><span class="kw">class</span> PaymentAdapter : IPayment {<br>&nbsp;&nbsp;<span class="kw">private</span> OldPaymentGateway _old = <span class="kw">new</span>();<br>&nbsp;&nbsp;<span class="kw">public void</span> Pay(Order order) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">string</span> xml = ConvertToXml(order); <span class="cm">// convert!</span><br>&nbsp;&nbsp;&nbsp;&nbsp;_old.MakePayment(xml);<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Adapter Pattern</span> converts the interface of a class into another interface that clients expect. Used when integrating legacy systems, third-party libraries, or incompatible APIs without modifying their source code."</p>'},
{q:"What is the Repository Pattern? How do you implement it?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Repository Pattern</b> creates a <b>layer between your business logic and database</b>. Instead of calling DbContext directly, you call a repository. Makes code testable and swappable.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> IProductRepository {<br>&nbsp;&nbsp;Task&lt;List&lt;Product&gt;&gt; GetAllAsync();<br>&nbsp;&nbsp;Task&lt;Product&gt; GetByIdAsync(<span class="kw">int</span> id);<br>&nbsp;&nbsp;Task AddAsync(Product product);<br>}<br><br><span class="kw">class</span> ProductRepository : IProductRepository {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> AppDbContext _db;<br>&nbsp;&nbsp;<span class="kw">public</span> ProductRepository(AppDbContext db) { _db = db; }<br>&nbsp;&nbsp;<span class="kw">public async</span> Task&lt;List&lt;Product&gt;&gt; GetAllAsync()<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; <span class="kw">await</span> _db.Products.ToListAsync();<br>}<br><br><span class="cm">// Controller uses interface, not DbContext!</span><br><span class="kw">class</span> ProductController {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IProductRepository _repo;<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Repository Pattern</span> abstracts data access behind an interface. Benefits: <span class="key">testability</span> (mock the interface), <span class="key">separation of concerns</span>, and ability to swap data sources. Register in DI: AddScoped&lt;IProductRepository, ProductRepository&gt;()."</p>'},
{q:"What is the Unit of Work Pattern?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Unit of Work</b> groups multiple database operations into a <b>single transaction</b>. Either ALL succeed or ALL fail. Like a bank transfer — debit AND credit must both happen.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> IUnitOfWork : IDisposable {<br>&nbsp;&nbsp;IProductRepository Products { <span class="kw">get</span>; }<br>&nbsp;&nbsp;IOrderRepository Orders { <span class="kw">get</span>; }<br>&nbsp;&nbsp;Task&lt;<span class="kw">int</span>&gt; SaveChangesAsync(); <span class="cm">// commit all at once!</span><br>}<br><br><span class="cm">// Usage - multiple repos, one save</span><br><span class="kw">await</span> _uow.Products.AddAsync(product);<br><span class="kw">await</span> _uow.Orders.AddAsync(order);<br><span class="kw">await</span> _uow.SaveChangesAsync(); <span class="cm">// both saved in one transaction!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Unit of Work</span> maintains a list of changes and commits them as a single transaction. It coordinates multiple repositories to ensure data consistency. In EF Core, DbContext already implements Unit of Work — SaveChanges() commits all tracked changes at once."</p>'},
{q:"What is the Builder Pattern? When would you use it?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Builder Pattern</b> constructs complex objects <b>step by step</b>. Instead of a constructor with 10 parameters, you chain methods. Like building a burger — add bun, patty, cheese, sauce one by one.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> QueryBuilder {<br>&nbsp;&nbsp;<span class="kw">private string</span> _table, _where, _order;<br>&nbsp;&nbsp;<span class="kw">public</span> QueryBuilder From(<span class="kw">string</span> t) { _table=t; <span class="kw">return this</span>; }<br>&nbsp;&nbsp;<span class="kw">public</span> QueryBuilder Where(<span class="kw">string</span> w) { _where=w; <span class="kw">return this</span>; }<br>&nbsp;&nbsp;<span class="kw">public</span> QueryBuilder OrderBy(<span class="kw">string</span> o) { _order=o; <span class="kw">return this</span>; }<br>&nbsp;&nbsp;<span class="kw">public string</span> Build() =&gt; $<span class="str">"SELECT * FROM {_table} WHERE {_where} ORDER BY {_order}"</span>;<br>}<br><br><span class="kw">var</span> sql = <span class="kw">new</span> QueryBuilder()<br>&nbsp;&nbsp;.From(<span class="str">"Employee"</span>)<br>&nbsp;&nbsp;.Where(<span class="str">"Salary > 50000"</span>)<br>&nbsp;&nbsp;.OrderBy(<span class="str">"Name"</span>)<br>&nbsp;&nbsp;.Build();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Builder Pattern</span> constructs complex objects step by step using method chaining. Each method returns this for fluent syntax. Use when constructor has too many parameters or object creation has multiple optional steps. Examples: StringBuilder, EF Core Fluent API."</p>'},
{q:"What is the Template Method Pattern?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Template Method</b> defines the <b>skeleton of an algorithm</b> in a parent class, but lets child classes <b>override specific steps</b>. Like a recipe template — steps are fixed, but ingredients can change.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">abstract class</span> ReportGenerator {<br>&nbsp;&nbsp;<span class="cm">// Template method - fixed steps</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Generate() {<br>&nbsp;&nbsp;&nbsp;&nbsp;FetchData(); <span class="cm">// step 1</span><br>&nbsp;&nbsp;&nbsp;&nbsp;FormatData(); <span class="cm">// step 2 - child overrides</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Export(); <span class="cm">// step 3 - child overrides</span><br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">private void</span> FetchData() { <span class="cm">/* common */</span> }<br>&nbsp;&nbsp;<span class="kw">protected abstract void</span> FormatData();<br>&nbsp;&nbsp;<span class="kw">protected abstract void</span> Export();<br>}<br><br><span class="kw">class</span> PdfReport : ReportGenerator {<br>&nbsp;&nbsp;<span class="kw">protected override void</span> FormatData() { <span class="cm">/* PDF format */</span> }<br>&nbsp;&nbsp;<span class="kw">protected override void</span> Export() { <span class="cm">/* save .pdf */</span> }<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Template Method</span> defines the algorithm structure in a base class method, with abstract steps that subclasses implement. The overall flow is fixed, but specific steps are customizable. Follows Hollywood Principle: dont call us, we will call you."</p>'},
{q:"What is the difference between Dispose and Finalize? Explain IDisposable.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Dispose</b> = YOU call it to clean up resources (deterministic). <b>Finalize</b> = GC calls it automatically (unpredictable). Always prefer Dispose with <b>using</b> statement.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> FileService : IDisposable {<br>&nbsp;&nbsp;<span class="kw">private</span> StreamReader _reader;<br><br>&nbsp;&nbsp;<span class="kw">public void</span> Dispose() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_reader?.Close(); <span class="cm">// clean up NOW</span><br>&nbsp;&nbsp;&nbsp;&nbsp;GC.SuppressFinalize(<span class="kw">this</span>); <span class="cm">// skip finalizer</span><br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;~FileService() { Dispose(); } <span class="cm">// backup if Dispose not called</span><br>}<br><br><span class="cm">// Best practice: using statement</span><br><span class="kw">using</span>(<span class="kw">var</span> svc = <span class="kw">new</span> FileService()) {<br>&nbsp;&nbsp;<span class="cm">// use it...</span><br>} <span class="cm">// Dispose() called automatically here!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Dispose</span> is called explicitly by the developer via IDisposable or using statement — deterministic cleanup. <span class="key">Finalize</span> (~destructor) is called by GC — non-deterministic, unpredictable timing. Always implement IDisposable for unmanaged resources and use the <b>using</b> statement."</p>'},
{q:"What are Delegates and Events? How do they relate to OOP?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Delegate</b> = a type-safe <b>function pointer</b>. It holds a reference to a method. <b>Event</b> = a delegate with restrictions — only the owner can invoke it. Like a TV remote (delegate) vs a broadcast channel (event).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Delegate - holds method reference</span><br><span class="kw">delegate void</span> Notify(<span class="kw">string</span> msg);<br><br>Notify n = (msg) =&gt; Console.WriteLine(msg);<br>n(<span class="str">"Hello!"</span>); <span class="cm">// calls the method</span><br><br><span class="cm">// Event - restricted delegate</span><br><span class="kw">class</span> Button {<br>&nbsp;&nbsp;<span class="kw">public event</span> EventHandler Clicked; <span class="cm">// event</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Click() =&gt; Clicked?.Invoke(<span class="kw">this</span>, EventArgs.Empty);<br>}<br><br><span class="kw">var</span> btn = <span class="kw">new</span> Button();<br>btn.Clicked += (s, e) =&gt; Console.WriteLine(<span class="str">"Clicked!"</span>);<br>btn.Click();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Delegates</span> are type-safe function pointers that enable callback methods and event handling. <span class="key">Events</span> are delegates with encapsulation — subscribers can only += or -=, cannot invoke directly. They implement the Observer Pattern and enable loose coupling in OOP."</p>'},
{q:"What is Domain-Driven Design (DDD)? Explain Entities, Value Objects, Aggregates.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>DDD</b> is an approach where code structure <b>mirrors the business domain</b>. You model real business concepts as code objects.</p><h4>💻 Key Concepts</h4><div class="code"><span class="cm">// Entity - has unique ID, identity matters</span><br><span class="kw">class</span> Order { <span class="cm">// Order #123 != Order #456</span><br>&nbsp;&nbsp;<span class="kw">public int</span> Id; <span class="cm">// unique identity</span><br>&nbsp;&nbsp;<span class="kw">public</span> List&lt;OrderItem&gt; Items;<br>}<br><br><span class="cm">// Value Object - no ID, value matters</span><br><span class="kw">record</span> Money(<span class="kw">decimal</span> Amount, <span class="kw">string</span> Currency);<br><span class="cm">// Money(100,"INR") == Money(100,"INR") → true (same value)</span><br><br><span class="cm">// Aggregate - cluster of entities treated as one unit</span><br><span class="cm">// Order is the Aggregate Root</span><br><span class="cm">// OrderItems can only be accessed through Order</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">DDD</span> models software around business domain. <span class="key">Entity</span> has unique identity (Order, Customer). <span class="key">Value Object</span> has no identity, compared by value (Money, Address). <span class="key">Aggregate</span> is a cluster of entities with one root that controls access. <span class="key">Bounded Context</span> defines boundaries between different domain models."</p>'},
{q:"What are Anti-Patterns? Explain God Object, Spaghetti Code.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Anti-Patterns</b> are <b>common BAD practices</b> that seem like solutions but create more problems. Like taking shortcuts that lead to dead ends.</p><h4>💻 Examples</h4><div class="code"><span class="cm">// ❌ God Object - one class does EVERYTHING</span><br><span class="kw">class</span> AppManager {<br>&nbsp;&nbsp;<span class="kw">public void</span> Login() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> SendEmail() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> GenerateReport() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> ProcessPayment() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> ManageInventory() { }<br>&nbsp;&nbsp;<span class="cm">// 5000 lines... impossible to maintain!</span><br>}<br><br><span class="cm">// ❌ Spaghetti Code - tangled, no structure</span><br><span class="cm">// goto statements, deeply nested ifs,</span><br><span class="cm">// no separation of concerns, copy-paste everywhere</span><br><br><span class="cm">// Other anti-patterns:</span><br><span class="cm">// ❌ Magic Numbers: if(status == 3) instead of Status.Active</span><br><span class="cm">// ❌ Copy-Paste Programming: duplicate code everywhere</span><br><span class="cm">// ❌ Golden Hammer: using same tool for everything</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Anti-patterns</span> are common bad practices. <span class="key">God Object</span> violates SRP — one class handles everything. <span class="key">Spaghetti Code</span> has no structure, tangled logic, hard to follow. Others: Magic Numbers, Copy-Paste Programming, Premature Optimization. Fix with SOLID principles and design patterns."</p>'},

// Basics
{q:"What is C# and what are its key features?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>C# (C-Sharp) is a <b>modern, object-oriented programming language</b> created by <b>Microsoft</b>. It runs on the <b>.NET platform</b>. Think of it as a powerful tool to build websites, desktop apps, mobile apps, games (Unity), and cloud services.</p><svg viewBox="0 0 440 200" style="max-width:440px"><rect x="10" y="5" width="420" height="40" rx="8" fill="#764ba2"/><text x="220" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="15">C# Key Features</text><rect x="10" y="55" width="130" height="65" rx="8" fill="#10b981"/><text x="75" y="78" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Object-Oriented</text><text x="75" y="95" text-anchor="middle" fill="#d1fae5" font-size="8">Classes, Objects</text><text x="75" y="108" text-anchor="middle" fill="#d1fae5" font-size="8">Inheritance, etc.</text><rect x="150" y="55" width="130" height="65" rx="8" fill="#0ea5e9"/><text x="215" y="78" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Type-Safe</text><text x="215" y="95" text-anchor="middle" fill="#bae6fd" font-size="8">Catches errors at</text><text x="215" y="108" text-anchor="middle" fill="#bae6fd" font-size="8">compile time</text><rect x="290" y="55" width="140" height="65" rx="8" fill="#f59e0b"/><text x="360" y="78" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Managed Code</text><text x="360" y="95" text-anchor="middle" fill="#fef3c7" font-size="8">Garbage Collector</text><text x="360" y="108" text-anchor="middle" fill="#fef3c7" font-size="8">handles memory</text><rect x="10" y="130" width="130" height="65" rx="8" fill="#ef4444"/><text x="75" y="153" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Cross-Platform</text><text x="75" y="170" text-anchor="middle" fill="#fecaca" font-size="8">.NET Core runs on</text><text x="75" y="183" text-anchor="middle" fill="#fecaca" font-size="8">Windows, Linux, Mac</text><rect x="150" y="130" width="130" height="65" rx="8" fill="#8b5cf6"/><text x="215" y="153" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Async Support</text><text x="215" y="170" text-anchor="middle" fill="#ede9fe" font-size="8">async/await for</text><text x="215" y="183" text-anchor="middle" fill="#ede9fe" font-size="8">non-blocking code</text><rect x="290" y="130" width="140" height="65" rx="8" fill="#06b6d4"/><text x="360" y="153" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">LINQ</text><text x="360" y="170" text-anchor="middle" fill="#cffafe" font-size="8">Query data like SQL</text><text x="360" y="183" text-anchor="middle" fill="#cffafe" font-size="8">inside C# code</text></svg><h4>🗣️ Interview Answer</h4><p>"C# is a <span class="key">modern, object-oriented, type-safe</span> language developed by Microsoft. Key features include <span class="key">OOP support</span>, <span class="key">garbage collection</span>, <span class="key">LINQ</span>, <span class="key">async/await</span>, <span class="key">cross-platform</span> with .NET Core, and strong <span class="key">type safety</span> that catches errors at compile time."</p><div class="tip">💡 <b>Versions:</b> Latest is C# 12 with .NET 8. Know at least 2-3 new features like records, pattern matching, global usings.</div>'},
{q:"What is the difference between Value Types and Reference Types?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Value Type</b> = stores the <b>actual data directly</b> (like a photocopy — each person has their own copy).<br><b>Reference Type</b> = stores a <b>pointer/address</b> to the data (like sharing a Google Doc link — everyone edits the same doc).</p><svg viewBox="0 0 440 210" style="max-width:440px"><rect x="10" y="5" width="200" height="195" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">📦 Value Type (Stack)</text><text x="110" y="50" text-anchor="middle" fill="#334155" font-size="10">int a = 10;</text><text x="110" y="65" text-anchor="middle" fill="#334155" font-size="10">int b = a;</text><text x="110" y="80" text-anchor="middle" fill="#334155" font-size="10">b = 20;</text><rect x="30" y="90" width="70" height="40" rx="6" fill="#10b981"/><text x="65" y="107" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">a = 10</text><text x="65" y="122" text-anchor="middle" fill="#d1fae5" font-size="8">Own copy</text><rect x="110" y="90" width="70" height="40" rx="6" fill="#f59e0b"/><text x="145" y="107" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">b = 20</text><text x="145" y="122" text-anchor="middle" fill="#fef3c7" font-size="8">Own copy</text><text x="110" y="150" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="600">✅ a is still 10!</text><text x="110" y="170" text-anchor="middle" fill="#64748b" font-size="9">int, float, bool, char,</text><text x="110" y="185" text-anchor="middle" fill="#64748b" font-size="9">struct, enum, decimal</text><rect x="230" y="5" width="200" height="195" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="13">🔗 Reference Type (Heap)</text><text x="330" y="50" text-anchor="middle" fill="#334155" font-size="10">var a = new Person();</text><text x="330" y="65" text-anchor="middle" fill="#334155" font-size="10">var b = a;</text><text x="330" y="80" text-anchor="middle" fill="#334155" font-size="10">b.Name = "Ravi";</text><rect x="260" y="90" width="60" height="40" rx="6" fill="#ef4444"/><text x="290" y="107" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">a →</text><text x="290" y="122" text-anchor="middle" fill="#fecaca" font-size="8">pointer</text><rect x="330" y="90" width="60" height="40" rx="6" fill="#ef4444"/><text x="360" y="107" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">b →</text><text x="360" y="122" text-anchor="middle" fill="#fecaca" font-size="8">pointer</text><rect x="280" y="135" width="100" height="25" rx="6" fill="#7f1d1d"/><text x="330" y="152" text-anchor="middle" fill="#fff" font-size="9">Same Object!</text><text x="330" y="175" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="600">😱 a.Name is also "Ravi"!</text><text x="330" y="190" text-anchor="middle" fill="#64748b" font-size="9">string, class, array,</text><text x="330" y="200" text-anchor="middle" fill="#64748b" font-size="9">delegate, interface</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Value Type - each has OWN copy</span><br><span class="kw">int</span> a = 10;<br><span class="kw">int</span> b = a;<br>b = 20;<br>Console.WriteLine(a); <span class="cm">// 10 ✅ unchanged</span><br><br><span class="cm">// Reference Type - both point to SAME object</span><br><span class="kw">int</span>[] arr1 = { 1, 2, 3 };<br><span class="kw">int</span>[] arr2 = arr1;<br>arr2[0] = 99;<br>Console.WriteLine(arr1[0]); <span class="cm">// 99 😱 changed!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Value types</span> store data directly in Stack memory — each variable has its own copy. <span class="key">Reference types</span> store a reference/pointer in Stack that points to the actual object in Heap memory — multiple variables can point to the same object. Value types: int, bool, struct. Reference types: class, string, array."</p><div class="tip">💡 <b>Trick:</b> string is a reference type but BEHAVES like value type because it is immutable. This is a common interview question!</div>'},
{q:"What is Boxing and Unboxing?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Boxing</b> = putting a value type INTO an object (value → reference). Like putting a gift into a box.<br><b>Unboxing</b> = taking it back OUT from the object (reference → value). Like opening the box to get the gift.</p><svg viewBox="0 0 440 160" style="max-width:440px"><rect x="10" y="10" width="200" height="130" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="35" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">📥 Boxing (Value → Object)</text><rect x="30" y="50" width="60" height="35" rx="6" fill="#10b981"/><text x="60" y="72" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">int 42</text><text x="110" y="72" text-anchor="middle" fill="#64748b" font-size="18">→</text><rect x="130" y="45" width="65" height="45" rx="6" fill="#8b5cf6"/><text x="162" y="65" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">object</text><text x="162" y="80" text-anchor="middle" fill="#ede9fe" font-size="8">[42 inside]</text><text x="110" y="110" text-anchor="middle" fill="#334155" font-size="9">int num = 42;</text><text x="110" y="125" text-anchor="middle" fill="#1e40af" font-size="9" font-weight="600">object obj = num;</text><rect x="230" y="10" width="200" height="130" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="330" y="35" text-anchor="middle" fill="#92400e" font-weight="700" font-size="13">📤 Unboxing (Object → Value)</text><rect x="250" y="45" width="65" height="45" rx="6" fill="#8b5cf6"/><text x="282" y="65" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">object</text><text x="282" y="80" text-anchor="middle" fill="#ede9fe" font-size="8">[42 inside]</text><text x="330" y="72" text-anchor="middle" fill="#64748b" font-size="18">→</text><rect x="350" y="50" width="60" height="35" rx="6" fill="#10b981"/><text x="380" y="72" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">int 42</text><text x="330" y="110" text-anchor="middle" fill="#334155" font-size="9">object obj = 42;</text><text x="330" y="125" text-anchor="middle" fill="#92400e" font-size="9" font-weight="600">int num = (int)obj;</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Boxing - value type to object (SLOW)</span><br><span class="kw">int</span> num = 42;<br><span class="kw">object</span> obj = num; <span class="cm">// 📥 Boxing happens here</span><br><br><span class="cm">// Unboxing - object back to value type</span><br><span class="kw">int</span> result = (<span class="kw">int</span>)obj; <span class="cm">// 📤 Unboxing happens here</span><br><br><span class="cm">// ⚠️ Wrong unboxing = CRASH!</span><br><span class="cm">// double d = (double)obj; // InvalidCastException!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Boxing</span> is converting a value type to object type — the value moves from Stack to Heap. <span class="key">Unboxing</span> is the reverse — extracting the value type from the object. Both are <b>expensive operations</b> because they involve memory allocation and copying. We should avoid them using <span class="key">Generics</span> (List&lt;int&gt; instead of ArrayList)."</p><div class="tip">💡 <b>Why avoid?</b> Boxing creates a new object on Heap = slow + GC pressure. ArrayList boxes everything, List&lt;T&gt; does NOT. This is why Generics were introduced!</div>'},
{q:"What is the difference between String and StringBuilder?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>String</b> is <b>immutable</b> — every time you change it, a NEW string is created in memory (old one becomes garbage).<br><b>StringBuilder</b> is <b>mutable</b> — it modifies the SAME object in memory. Much faster for many changes.</p><svg viewBox="0 0 440 190" style="max-width:440px"><rect x="10" y="5" width="200" height="175" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">❌ String (Immutable)</text><text x="110" y="48" text-anchor="middle" fill="#334155" font-size="9">string s = "Hello";</text><text x="110" y="62" text-anchor="middle" fill="#334155" font-size="9">s += " World";</text><rect x="25" y="72" width="55" height="22" rx="4" fill="#fca5a5"/><text x="52" y="87" text-anchor="middle" fill="#7f1d1d" font-size="8">"Hello" 🗑️</text><rect x="85" y="72" width="75" height="22" rx="4" fill="#fca5a5"/><text x="122" y="87" text-anchor="middle" fill="#7f1d1d" font-size="8">"Hello World"</text><text x="110" y="110" text-anchor="middle" fill="#dc2626" font-size="9">Loop 1000 times =</text><text x="110" y="125" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="700">1000 objects created! 💥</text><text x="110" y="148" text-anchor="middle" fill="#64748b" font-size="9">Each change = new object</text><text x="110" y="165" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="600">SLOW for many changes</text><rect x="230" y="5" width="200" height="175" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">✅ StringBuilder (Mutable)</text><text x="330" y="48" text-anchor="middle" fill="#334155" font-size="9">var sb = new StringBuilder();</text><text x="330" y="62" text-anchor="middle" fill="#334155" font-size="9">sb.Append("Hello World");</text><rect x="265" y="72" width="130" height="22" rx="4" fill="#86efac"/><text x="330" y="87" text-anchor="middle" fill="#14532d" font-size="8">Same buffer modified ✅</text><text x="330" y="110" text-anchor="middle" fill="#16a34a" font-size="9">Loop 1000 times =</text><text x="330" y="125" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="700">1 object only! 🚀</text><text x="330" y="148" text-anchor="middle" fill="#64748b" font-size="9">Modifies same buffer</text><text x="330" y="165" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">FAST for many changes</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// String - SLOW (creates new object each time)</span><br><span class="kw">string</span> s = <span class="str">""</span>;<br><span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt; 1000; i++)<br>&nbsp;&nbsp;s += <span class="str">"hello "</span>; <span class="cm">// 1000 new strings! 💥</span><br><br><span class="cm">// StringBuilder - FAST (modifies same object)</span><br><span class="kw">var</span> sb = <span class="kw">new</span> StringBuilder();<br><span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt; 1000; i++)<br>&nbsp;&nbsp;sb.Append(<span class="str">"hello "</span>); <span class="cm">// 1 object only! 🚀</span><br><span class="kw">string</span> result = sb.ToString();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">String</span> is immutable — every modification creates a new object in memory, making it slow for repeated changes. <span class="key">StringBuilder</span> is mutable — it modifies the same internal buffer, making it much faster for concatenation in loops. Use String for few changes, StringBuilder for many."</p><div class="tip">💡 <b>Rule of thumb:</b> Less than 5 changes = use String. More than 5 or inside a loop = use StringBuilder. This is a very common interview question!</div>'},
{q:"What is the difference between == and .Equals()?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>==</b> checks if two things are <b>equal</b> (for value types: compares values, for reference types: compares memory address by default).<br><b>.Equals()</b> checks if two things have the <b>same content</b> (can be overridden to compare values).</p><svg viewBox="0 0 440 200" style="max-width:440px"><rect x="10" y="5" width="420" height="35" rx="8" fill="#764ba2"/><text x="220" y="28" text-anchor="middle" fill="#fff" font-weight="700" font-size="13">== vs .Equals() Behavior</text><rect x="10" y="50" width="210" height="65" rx="8" fill="#dbeafe" stroke="#3b82f6"/><text x="115" y="70" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">Value Types (int, bool)</text><text x="115" y="88" text-anchor="middle" fill="#334155" font-size="10">== → compares VALUES ✅</text><text x="115" y="103" text-anchor="middle" fill="#334155" font-size="10">.Equals() → compares VALUES ✅</text><rect x="230" y="50" width="200" height="65" rx="8" fill="#fef3c7" stroke="#f59e0b"/><text x="330" y="70" text-anchor="middle" fill="#92400e" font-weight="700" font-size="11">Reference Types (class)</text><text x="330" y="88" text-anchor="middle" fill="#334155" font-size="10">== → compares ADDRESS 📍</text><text x="330" y="103" text-anchor="middle" fill="#334155" font-size="10">.Equals() → compares CONTENT 📝</text><rect x="10" y="125" width="420" height="65" rx="8" fill="#dcfce7" stroke="#10b981"/><text x="220" y="145" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="11">✨ Special Case: string</text><text x="220" y="163" text-anchor="middle" fill="#334155" font-size="10">string is reference type BUT == is overloaded</text><text x="220" y="180" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="600">Both == and .Equals() compare CONTENT for strings ✅</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Value Types - both work same</span><br><span class="kw">int</span> a = 5, b = 5;<br>Console.WriteLine(a == b); <span class="cm">// True ✅</span><br>Console.WriteLine(a.Equals(b)); <span class="cm">// True ✅</span><br><br><span class="cm">// Reference Types - DIFFERENT!</span><br><span class="kw">object</span> x = <span class="kw">new</span> Person(<span class="str">"Arjun"</span>);<br><span class="kw">object</span> y = <span class="kw">new</span> Person(<span class="str">"Arjun"</span>);<br>Console.WriteLine(x == y); <span class="cm">// False ❌ (different address)</span><br>Console.WriteLine(x.Equals(y)); <span class="cm">// True ✅ (if Equals overridden)</span><br><br><span class="cm">// String - special case</span><br><span class="kw">string</span> s1 = <span class="str">"hello"</span>;<br><span class="kw">string</span> s2 = <span class="str">"hello"</span>;<br>Console.WriteLine(s1 == s2); <span class="cm">// True ✅ (== overloaded)</span><br>Console.WriteLine(s1.Equals(s2)); <span class="cm">// True ✅</span></div><h4>🗣️ Interview Answer</h4><p>"For <span class="key">value types</span>, both == and .Equals() compare values. For <span class="key">reference types</span>, == compares memory references (are they the same object?) while .Equals() compares content (can be overridden). <span class="key">string</span> is special — == is overloaded to compare content. Also, .Equals() can throw NullReferenceException if called on null, but == handles null safely."</p><div class="tip">💡 <b>Null Safety:</b> "hello".Equals(null) = False ✅ | null.Equals("hello") = NullReferenceException 💥 | null == null = True ✅</div>'},
{q:"What are Nullable Types? How do you use the ? operator?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>Normally, value types like int, bool <b>cannot be null</b>. But sometimes you need null (e.g., database field with no value). <b>Nullable Types</b> allow value types to hold <b>null</b> by adding <b>?</b> after the type.</p><svg viewBox="0 0 440 160" style="max-width:440px"><rect x="10" y="5" width="200" height="145" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">❌ Without Nullable</text><text x="110" y="52" text-anchor="middle" fill="#334155" font-size="10">int age = null;</text><text x="110" y="72" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="700">💥 Compile Error!</text><text x="110" y="95" text-anchor="middle" fill="#334155" font-size="9">Value types MUST</text><text x="110" y="110" text-anchor="middle" fill="#334155" font-size="9">have a value</text><text x="110" y="135" text-anchor="middle" fill="#dc2626" font-size="9">int = 0 by default</text><rect x="230" y="5" width="200" height="145" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">✅ With Nullable (int?)</text><text x="330" y="52" text-anchor="middle" fill="#334155" font-size="10">int? age = null;</text><text x="330" y="72" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="700">✅ Works perfectly!</text><text x="330" y="95" text-anchor="middle" fill="#334155" font-size="9">Can hold value OR null</text><text x="330" y="110" text-anchor="middle" fill="#334155" font-size="9">age.HasValue = false</text><text x="330" y="135" text-anchor="middle" fill="#16a34a" font-size="9">int? = null by default</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">int</span>? age = <span class="kw">null</span>; <span class="cm">// Nullable int</span><br><span class="kw">bool</span>? isActive = <span class="kw">null</span>; <span class="cm">// Nullable bool</span><br><br><span class="cm">// Check if has value</span><br><span class="kw">if</span>(age.HasValue)<br>&nbsp;&nbsp;Console.WriteLine(age.Value);<br><br><span class="cm">// Null Coalescing - give default if null</span><br><span class="kw">int</span> result = age ?? 0; <span class="cm">// If null, use 0</span><br><br><span class="cm">// Null Conditional</span><br><span class="kw">int</span>? len = name?.Length; <span class="cm">// If name is null, len = null</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Nullable types</span> allow value types to hold null using the <b>?</b> syntax (int?, bool?). Internally it is <b>Nullable&lt;T&gt;</b> struct. You check with <span class="key">.HasValue</span> and get data with <span class="key">.Value</span>. The <b>??</b> operator provides a default value when null, and <b>?.</b> safely accesses members on nullable objects."</p><div class="tip">💡 <b>Real use:</b> Database columns can be NULL. When mapping to C#, you need int? for nullable DB columns. EF Core uses this heavily!</div>'},
{q:"What is the difference between const and readonly?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>const</b> = value is fixed <b>at compile time</b>. Can NEVER change. Must assign immediately.<br><b>readonly</b> = value is fixed <b>at runtime</b>. Can only be set in declaration or constructor.</p><svg viewBox="0 0 440 180" style="max-width:440px"><rect x="10" y="5" width="200" height="165" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">🔒 const</text><text x="110" y="50" text-anchor="middle" fill="#334155" font-size="10">✅ Must assign at declaration</text><text x="110" y="68" text-anchor="middle" fill="#334155" font-size="10">✅ Compile-time constant</text><text x="110" y="86" text-anchor="middle" fill="#334155" font-size="10">✅ Implicitly static</text><text x="110" y="104" text-anchor="middle" fill="#334155" font-size="10">❌ Cannot use with objects</text><text x="110" y="122" text-anchor="middle" fill="#334155" font-size="10">❌ Only primitive types</text><text x="110" y="148" text-anchor="middle" fill="#1e40af" font-size="9" font-weight="600">const double PI = 3.14;</text><text x="110" y="163" text-anchor="middle" fill="#64748b" font-size="8">Value baked into DLL</text><rect x="230" y="5" width="200" height="165" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#92400e" font-weight="700" font-size="13">🔐 readonly</text><text x="330" y="50" text-anchor="middle" fill="#334155" font-size="10">✅ Assign at declaration OR</text><text x="330" y="68" text-anchor="middle" fill="#334155" font-size="10">&nbsp;&nbsp;&nbsp;in constructor</text><text x="330" y="86" text-anchor="middle" fill="#334155" font-size="10">✅ Runtime constant</text><text x="330" y="104" text-anchor="middle" fill="#334155" font-size="10">✅ Can use with objects</text><text x="330" y="122" text-anchor="middle" fill="#334155" font-size="10">✅ Any data type</text><text x="330" y="148" text-anchor="middle" fill="#92400e" font-size="9" font-weight="600">readonly DateTime created;</text><text x="330" y="163" text-anchor="middle" fill="#64748b" font-size="8">Value set at runtime</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Config {<br>&nbsp;&nbsp;<span class="kw">const double</span> PI = 3.14; <span class="cm">// Must assign here</span><br>&nbsp;&nbsp;<span class="kw">readonly</span> DateTime _created; <span class="cm">// Can assign in ctor</span><br><br>&nbsp;&nbsp;<span class="kw">public</span> Config() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_created = DateTime.Now; <span class="cm">// ✅ OK in constructor</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// PI = 3.15; // ❌ ERROR! const cannot change</span><br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">void</span> Test() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// _created = DateTime.Now; // ❌ ERROR! readonly</span><br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">const</span> is a compile-time constant — value must be assigned at declaration, is implicitly static, and only works with primitive types. <span class="key">readonly</span> is a runtime constant — can be assigned in declaration or constructor, works with any type including objects. Use const for values that never change like PI, use readonly for values set once at runtime like connection strings."</p><div class="tip">💡 <b>DLL Trap:</b> If you change a const value in a library, all consuming projects must be RECOMPILED. readonly does not have this problem!</div>'},
{q:"What is an Enum? When would you use it?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>An <b>Enum</b> (Enumeration) is a set of <b>named constants</b> with integer values. Instead of remembering magic numbers like 1, 2, 3, you use meaningful names like <b>Active, Inactive, Suspended</b>.</p><svg viewBox="0 0 440 160" style="max-width:440px"><rect x="10" y="5" width="200" height="145" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">❌ Without Enum</text><text x="110" y="52" text-anchor="middle" fill="#334155" font-size="10">int status = 1;</text><text x="110" y="72" text-anchor="middle" fill="#dc2626" font-size="10">What is 1? 🤔</text><text x="110" y="92" text-anchor="middle" fill="#dc2626" font-size="10">What is 2? 🤔</text><text x="110" y="112" text-anchor="middle" fill="#dc2626" font-size="10">What is 3? 🤔</text><text x="110" y="138" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="600">Magic numbers = confusing!</text><rect x="230" y="5" width="200" height="145" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">✅ With Enum</text><text x="330" y="52" text-anchor="middle" fill="#334155" font-size="10">Status s = Status.Active;</text><text x="330" y="72" text-anchor="middle" fill="#16a34a" font-size="10">Active = 0 ✅</text><text x="330" y="92" text-anchor="middle" fill="#16a34a" font-size="10">Inactive = 1 ✅</text><text x="330" y="112" text-anchor="middle" fill="#16a34a" font-size="10">Suspended = 2 ✅</text><text x="330" y="138" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Clear and readable! 😍</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">enum</span> Status { Active, Inactive, Suspended }<br><span class="cm">// Active=0, Inactive=1, Suspended=2 (auto)</span><br><br><span class="kw">enum</span> Priority { Low = 1, Medium = 5, High = 10 }<br><span class="cm">// Custom values</span><br><br>Status s = Status.Active;<br><span class="kw">int</span> val = (<span class="kw">int</span>)s; <span class="cm">// 0</span><br><span class="kw">string</span> name = s.ToString(); <span class="cm">// "Active"</span><br><br><span class="cm">// Parse from string</span><br>Status parsed = Enum.Parse&lt;Status&gt;(<span class="str">"Inactive"</span>);</div><h4>🗣️ Interview Answer</h4><p>"An <span class="key">Enum</span> is a value type that defines a set of named integer constants. It improves <b>code readability</b>, provides <b>type safety</b> (cant assign random numbers), and is commonly used for status codes, days, roles, etc. By default values start from 0 but can be customized."</p><div class="tip">💡 <b>Use [Flags] for bitwise:</b> [Flags] enum Permissions { Read=1, Write=2, Delete=4 } allows combining: Read | Write = 3</div>'},
{q:"What is the difference between Array and ArrayList?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Array</b> = fixed size, <b>strongly typed</b> (only one data type), fast.<br><b>ArrayList</b> = dynamic size, stores <b>any type</b> (object), slower because of boxing/unboxing.<br>🚨 In modern C#, use <b>List&lt;T&gt;</b> instead of both!</p><svg viewBox="0 0 440 190" style="max-width:440px"><rect x="10" y="5" width="130" height="175" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="75" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12">Array</text><text x="75" y="48" text-anchor="middle" fill="#334155" font-size="9">✅ Fixed size</text><text x="75" y="65" text-anchor="middle" fill="#334155" font-size="9">✅ Type safe</text><text x="75" y="82" text-anchor="middle" fill="#334155" font-size="9">✅ Fast (no boxing)</text><text x="75" y="99" text-anchor="middle" fill="#334155" font-size="9">❌ Cannot resize</text><text x="75" y="120" text-anchor="middle" fill="#1e40af" font-size="8">int[] nums =</text><text x="75" y="135" text-anchor="middle" fill="#1e40af" font-size="8">new int[3];</text><text x="75" y="160" text-anchor="middle" fill="#64748b" font-size="8">Only int allowed</text><rect x="155" y="5" width="130" height="175" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="220" y="28" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">ArrayList</text><text x="220" y="48" text-anchor="middle" fill="#334155" font-size="9">✅ Dynamic size</text><text x="220" y="65" text-anchor="middle" fill="#334155" font-size="9">❌ Not type safe</text><text x="220" y="82" text-anchor="middle" fill="#334155" font-size="9">❌ Slow (boxing)</text><text x="220" y="99" text-anchor="middle" fill="#334155" font-size="9">❌ Stores object</text><text x="220" y="120" text-anchor="middle" fill="#dc2626" font-size="8">Can mix int,</text><text x="220" y="135" text-anchor="middle" fill="#dc2626" font-size="8">string, bool 😱</text><text x="220" y="160" text-anchor="middle" fill="#dc2626" font-size="8" font-weight="600">AVOID in modern C#</text><rect x="300" y="5" width="130" height="175" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="365" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">List&lt;T&gt; ⭐</text><text x="365" y="48" text-anchor="middle" fill="#334155" font-size="9">✅ Dynamic size</text><text x="365" y="65" text-anchor="middle" fill="#334155" font-size="9">✅ Type safe</text><text x="365" y="82" text-anchor="middle" fill="#334155" font-size="9">✅ Fast (no boxing)</text><text x="365" y="99" text-anchor="middle" fill="#334155" font-size="9">✅ Best of both!</text><text x="365" y="120" text-anchor="middle" fill="#16a34a" font-size="8">List&lt;int&gt; nums</text><text x="365" y="135" text-anchor="middle" fill="#16a34a" font-size="8">= new List&lt;int&gt;();</text><text x="365" y="160" text-anchor="middle" fill="#16a34a" font-size="8" font-weight="600">USE THIS! 🚀</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Array - fixed size, typed</span><br><span class="kw">int</span>[] arr = <span class="kw">new int</span>[3] { 1, 2, 3 };<br><span class="cm">// arr[3] = 4; // ❌ IndexOutOfRange!</span><br><br><span class="cm">// ArrayList - dynamic, NOT typed (avoid!)</span><br>ArrayList list = <span class="kw">new</span> ArrayList();<br>list.Add(1); list.Add(<span class="str">"hello"</span>); <span class="cm">// 😱 mixed types</span><br><span class="kw">int</span> val = (<span class="kw">int</span>)list[0]; <span class="cm">// Unboxing needed</span><br><br><span class="cm">// List&lt;T&gt; - BEST choice! ⭐</span><br>List&lt;<span class="kw">int</span>&gt; nums = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;() { 1, 2, 3 };<br>nums.Add(4); <span class="cm">// ✅ Dynamic</span><br><span class="cm">// nums.Add("hello"); // ❌ Compile error - type safe!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Array</span> is fixed-size and strongly typed. <span class="key">ArrayList</span> is dynamic but stores objects, causing boxing/unboxing and no type safety. In modern C#, we use <span class="key">List&lt;T&gt;</span> which combines the best of both — dynamic size with type safety and no boxing."</p><div class="tip">💡 <b>Interview tip:</b> Always mention List&lt;T&gt; as the modern replacement. Shows you know current best practices!</div>'},
{q:"What is a Namespace and why is it used?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Namespace</b> is like a <b>folder for your code</b>. It groups related classes together and prevents <b>name conflicts</b>. Just like you can have two files named "Report.pdf" in different folders, you can have two classes named "User" in different namespaces.</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="5" width="420" height="35" rx="8" fill="#764ba2"/><text x="220" y="28" text-anchor="middle" fill="#fff" font-weight="700" font-size="13">📁 Namespaces = Folders for Code</text><rect x="10" y="50" width="200" height="110" rx="8" fill="#dbeafe" stroke="#3b82f6"/><text x="110" y="72" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">MyApp.Models</text><rect x="25" y="82" width="80" height="25" rx="4" fill="#93c5fd"/><text x="65" y="99" text-anchor="middle" fill="#1e3a8a" font-size="9">User.cs</text><rect x="115" y="82" width="80" height="25" rx="4" fill="#93c5fd"/><text x="155" y="99" text-anchor="middle" fill="#1e3a8a" font-size="9">Product.cs</text><rect x="25" y="115" width="80" height="25" rx="4" fill="#93c5fd"/><text x="65" y="132" text-anchor="middle" fill="#1e3a8a" font-size="9">Order.cs</text><rect x="230" y="50" width="200" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b"/><text x="330" y="72" text-anchor="middle" fill="#92400e" font-weight="700" font-size="11">MyApp.Services</text><rect x="245" y="82" width="85" height="25" rx="4" fill="#fde68a"/><text x="287" y="99" text-anchor="middle" fill="#78350f" font-size="9">UserService.cs</text><rect x="340" y="82" width="80" height="25" rx="4" fill="#fde68a"/><text x="380" y="99" text-anchor="middle" fill="#78350f" font-size="9">EmailService.cs</text><rect x="245" y="115" width="85" height="25" rx="4" fill="#fde68a"/><text x="287" y="132" text-anchor="middle" fill="#78350f" font-size="9">OrderService.cs</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Defining namespace</span><br><span class="kw">namespace</span> MyApp.Models {<br>&nbsp;&nbsp;<span class="kw">class</span> User { <span class="kw">public string</span> Name; }<br>}<br><br><span class="kw">namespace</span> ThirdParty.Auth {<br>&nbsp;&nbsp;<span class="kw">class</span> User { <span class="kw">public string</span> Token; } <span class="cm">// Same name, no conflict!</span><br>}<br><br><span class="cm">// Using namespace</span><br><span class="kw">using</span> MyApp.Models;<br>User u = <span class="kw">new</span> User(); <span class="cm">// Uses MyApp.Models.User</span><br><br><span class="cm">// Full path to avoid confusion</span><br><span class="kw">var</span> u2 = <span class="kw">new</span> ThirdParty.Auth.User();</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Namespace</span> is a logical grouping of related classes, interfaces, and other types. It prevents <span class="key">naming conflicts</span> — two classes can have the same name if they are in different namespaces. We use the <b>using</b> directive to import namespaces. Common examples: System, System.Collections.Generic, System.Linq."</p><div class="tip">💡 <b>C# 10+ Feature:</b> File-scoped namespace — <code>namespace MyApp.Models;</code> (no curly braces needed, saves indentation!)</div>'},
{q:"What are Properties? Difference between auto and full properties?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Properties</b> are smart fields that use <b>get/set</b> to control access. <b>Auto property</b> = shortcut, compiler creates backing field. <b>Full property</b> = you write the backing field and logic yourself.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Auto Property - short and clean</span><br><span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br><span class="kw">public int</span> Age { <span class="kw">get</span>; <span class="kw">private set</span>; } <span class="cm">// read outside, set inside only</span><br><br><span class="cm">// Full Property - with validation logic</span><br><span class="kw">private int</span> _age;<br><span class="kw">public int</span> Age {<br>&nbsp;&nbsp;<span class="kw">get</span> { <span class="kw">return</span> _age; }<br>&nbsp;&nbsp;<span class="kw">set</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(value &lt; 0 || value &gt; 150)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">throw new</span> ArgumentException(<span class="str">"Invalid age"</span>);<br>&nbsp;&nbsp;&nbsp;&nbsp;_age = value;<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Properties</span> provide controlled access to fields using get/set accessors. <span class="key">Auto properties</span> are shorthand where compiler generates the backing field. <span class="key">Full properties</span> have explicit backing field and allow custom logic like validation. Use auto for simple data, full when you need logic."</p>'},
{q:"What is the difference between ref and out parameters?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>ref</b> = pass by reference, variable <b>MUST be initialized before</b> passing.<br><b>out</b> = pass by reference, variable <b>does NOT need initialization</b>, method MUST assign it.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ref - must initialize before passing</span><br><span class="kw">void</span> Double(<span class="kw">ref int</span> x) { x = x * 2; }<br><span class="kw">int</span> num = 5; <span class="cm">// MUST initialize!</span><br>Double(<span class="kw">ref</span> num); <span class="cm">// num = 10</span><br><br><span class="cm">// out - no need to initialize, method MUST assign</span><br><span class="kw">void</span> GetValues(<span class="kw">out int</span> x, <span class="kw">out int</span> y) {<br>&nbsp;&nbsp;x = 10; y = 20; <span class="cm">// MUST assign both!</span><br>}<br><span class="kw">int</span> a, b; <span class="cm">// no initialization needed</span><br>GetValues(<span class="kw">out</span> a, <span class="kw">out</span> b);<br><br><span class="cm">// Common use: TryParse pattern</span><br><span class="kw">if</span>(<span class="kw">int</span>.TryParse(<span class="str">"123"</span>, <span class="kw">out int</span> result))<br>&nbsp;&nbsp;Console.WriteLine(result); <span class="cm">// 123</span></div><h4>🗣️ Interview Answer</h4><p>"Both pass by reference. <span class="key">ref</span> requires the variable to be initialized before passing — used for two-way data. <span class="key">out</span> does not require initialization but the method must assign a value — used when method returns multiple values. Common example: int.TryParse uses out."</p>'},
{q:"What is the difference between throw and throw ex?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>throw</b> = rethrows exception and <b>preserves the original stack trace</b>.<br><b>throw ex</b> = rethrows but <b>RESETS the stack trace</b>. You lose where the error actually happened!</p><h4>💻 Code Example</h4><div class="code"><span class="kw">try</span> {<br>&nbsp;&nbsp;SomeMethod(); <span class="cm">// error happens here at line 50</span><br>}<br><span class="kw">catch</span>(Exception ex) {<br>&nbsp;&nbsp;<span class="cm">// ✅ GOOD - preserves original stack trace</span><br>&nbsp;&nbsp;<span class="kw">throw</span>; <span class="cm">// stack trace shows line 50</span><br><br>&nbsp;&nbsp;<span class="cm">// ❌ BAD - resets stack trace</span><br>&nbsp;&nbsp;<span class="kw">throw</span> ex; <span class="cm">// stack trace shows THIS line, not 50!</span><br><br>&nbsp;&nbsp;<span class="cm">// ✅ ALSO GOOD - wrap with new exception</span><br>&nbsp;&nbsp;<span class="kw">throw new</span> ApplicationException(<span class="str">"Failed"</span>, ex);<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">throw</span> (without variable) preserves the original stack trace — always use this for rethrowing. <span class="key">throw ex</span> resets the stack trace to the current line — you lose the original error location. This is a very common interview question and a common bug in production code!"</p>'},
{q:"What is type casting? Explain implicit and explicit casting.",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Implicit casting</b> = automatic, safe, <b>smaller to bigger</b> (int → double).<br><b>Explicit casting</b> = manual, risky, <b>bigger to smaller</b> (double → int), may lose data.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Implicit - automatic, no data loss</span><br><span class="kw">int</span> num = 100;<br><span class="kw">double</span> d = num; <span class="cm">// ✅ auto: int → double (100.0)</span><br><br><span class="cm">// Explicit - manual cast, may lose data</span><br><span class="kw">double</span> price = 99.99;<br><span class="kw">int</span> rounded = (<span class="kw">int</span>)price; <span class="cm">// 99 ⚠️ lost .99!</span><br><br><span class="cm">// Reference type casting</span><br>Animal a = <span class="kw">new</span> Dog(); <span class="cm">// implicit (upcasting)</span><br>Dog d = (Dog)a; <span class="cm">// explicit (downcasting)</span><br><br><span class="cm">// Safe casting with as/is</span><br>Dog d2 = a <span class="kw">as</span> Dog; <span class="cm">// returns null if fails</span><br><span class="kw">if</span>(a <span class="kw">is</span> Dog dog) { } <span class="cm">// pattern matching</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Implicit casting</span> is automatic and safe — smaller to larger type (int to double). <span class="key">Explicit casting</span> requires (type) syntax and may lose data — larger to smaller. For reference types, use <span class="key">as</span> (returns null on failure) or <span class="key">is</span> (pattern matching) for safe casting."</p>'},
{q:"What is the purpose of the using statement?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>The <b>using statement</b> has 2 purposes:<br>1. <b>Import namespaces</b> (using System;)<br>2. <b>Auto-dispose resources</b> (using var file = ...) — calls Dispose() automatically when done.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Import namespace</span><br><span class="kw">using</span> System;<br><span class="kw">using</span> System.Collections.Generic;<br><br><span class="cm">// 2. Auto-dispose (classic)</span><br><span class="kw">using</span>(<span class="kw">var</span> reader = <span class="kw">new</span> StreamReader(<span class="str">"file.txt"</span>)) {<br>&nbsp;&nbsp;<span class="kw">string</span> content = reader.ReadToEnd();<br>} <span class="cm">// Dispose() called automatically here!</span><br><br><span class="cm">// 2. Auto-dispose (C# 8+ simplified)</span><br><span class="kw">using var</span> conn = <span class="kw">new</span> SqlConnection(connStr);<br>conn.Open();<br><span class="cm">// Dispose() called when method ends</span></div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">using directive</span> imports namespaces. The <span class="key">using statement</span> ensures IDisposable objects are properly disposed — it calls Dispose() automatically at the end of the block. In C# 8+, using declaration (without braces) disposes when the variable goes out of scope."</p>'},
{q:"What is the var keyword? Is it dynamic typing?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>var</b> is NOT dynamic typing! It is <b>implicit typing</b> — the compiler figures out the type at <b>compile time</b>. Once assigned, the type is FIXED. <b>dynamic</b> is resolved at runtime.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// var - compiler infers type at COMPILE time</span><br><span class="kw">var</span> name = <span class="str">"Arjun"</span>; <span class="cm">// compiler knows its string</span><br><span class="kw">var</span> age = 28; <span class="cm">// compiler knows its int</span><br><span class="cm">// name = 123; // ❌ ERROR! name is string, cant assign int</span><br><br><span class="cm">// dynamic - resolved at RUNTIME</span><br><span class="kw">dynamic</span> x = <span class="str">"hello"</span>;<br>x = 123; <span class="cm">// ✅ no error! type changes at runtime</span><br>x = <span class="kw">true</span>; <span class="cm">// ✅ anything goes!</span><br><br><span class="cm">// var is useful for long type names</span><br><span class="kw">var</span> dict = <span class="kw">new</span> Dictionary&lt;<span class="kw">string</span>, List&lt;<span class="kw">int</span>&gt;&gt;();<br><span class="cm">// instead of: Dictionary&lt;string, List&lt;int&gt;&gt; dict = ...</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">var</span> is implicit typing, NOT dynamic. The compiler determines the type at compile time and it cannot change. <span class="key">dynamic</span> bypasses compile-time checking and resolves at runtime. var is just syntactic sugar for readability — the IL code is identical to explicit typing."</p>'},
{q:"What is the difference between is and as keyword?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>is</b> = checks if an object IS of a certain type, returns <b>true/false</b>.<br><b>as</b> = tries to CAST, returns the <b>object or null</b> if it fails (no exception).</p><h4>💻 Code Example</h4><div class="code">Animal a = <span class="kw">new</span> Dog();<br><br><span class="cm">// is - checks type (returns bool)</span><br><span class="kw">if</span>(a <span class="kw">is</span> Dog) { Console.WriteLine(<span class="str">"Its a dog"</span>); }<br><br><span class="cm">// is with pattern matching (C# 7+)</span><br><span class="kw">if</span>(a <span class="kw">is</span> Dog d) { d.Bark(); } <span class="cm">// check + cast in one!</span><br><br><span class="cm">// as - safe cast (returns null if fails)</span><br>Dog dog = a <span class="kw">as</span> Dog; <span class="cm">// dog or null</span><br><span class="kw">if</span>(dog != <span class="kw">null</span>) { dog.Bark(); }<br><br><span class="cm">// Direct cast - throws exception if fails!</span><br>Dog d2 = (Dog)a; <span class="cm">// InvalidCastException if not Dog!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">is</span> checks type compatibility and returns bool. With C# 7+ pattern matching, it can check and cast in one step. <span class="key">as</span> attempts a safe cast and returns null on failure instead of throwing an exception. Use is for type checking, as for safe casting. Direct cast (Type) throws InvalidCastException on failure."</p>'},
// Intermediate
{q:"What are Delegates? Explain Multicast Delegates.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Delegate</b> is a <b>type-safe function pointer</b> — it holds a reference to a method and can call it later. <b>Multicast Delegate</b> holds references to <b>multiple methods</b> and calls them all.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Declare delegate type</span><br><span class="kw">delegate void</span> Notify(<span class="kw">string</span> msg);<br><br><span class="cm">// Single delegate</span><br>Notify n = (msg) =&gt; Console.WriteLine(<span class="str">"Email: "</span> + msg);<br>n(<span class="str">"Order placed"</span>); <span class="cm">// Email: Order placed</span><br><br><span class="cm">// Multicast - chain multiple methods with +=</span><br>Notify multi = (msg) =&gt; Console.WriteLine(<span class="str">"Email: "</span> + msg);<br>multi += (msg) =&gt; Console.WriteLine(<span class="str">"SMS: "</span> + msg);<br>multi += (msg) =&gt; Console.WriteLine(<span class="str">"Push: "</span> + msg);<br><br>multi(<span class="str">"Order placed"</span>);<br><span class="cm">// Email: Order placed</span><br><span class="cm">// SMS: Order placed</span><br><span class="cm">// Push: Order placed</span><br><span class="cm">// All 3 methods called!</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Delegate</span> is a type-safe function pointer that holds method references. <span class="key">Multicast delegates</span> use += to chain multiple methods — invoking the delegate calls all methods in order. They are the foundation of <span class="key">Events</span> in C#. Built-in delegates: Action (void), Func (returns value), Predicate (returns bool)."</p>'},
{q:"What are Events and how do they differ from Delegates?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Event</b> is a <b>restricted delegate</b>. With a delegate, anyone can invoke it. With an event, <b>only the owning class can invoke</b> it. Outsiders can only subscribe (+= ) or unsubscribe (-=).</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="cm">// Delegate - anyone can invoke ❌ unsafe</span><br>&nbsp;&nbsp;<span class="kw">public</span> Action&lt;<span class="kw">string</span>&gt; OnOrderDelegate;<br><br>&nbsp;&nbsp;<span class="cm">// Event - only this class can invoke ✅ safe</span><br>&nbsp;&nbsp;<span class="kw">public event</span> Action&lt;<span class="kw">string</span>&gt; OnOrderEvent;<br><br>&nbsp;&nbsp;<span class="kw">public void</span> PlaceOrder() {<br>&nbsp;&nbsp;&nbsp;&nbsp;OnOrderEvent?.Invoke(<span class="str">"Order #123"</span>); <span class="cm">// ✅ owner can invoke</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="kw">var</span> svc = <span class="kw">new</span> OrderService();<br>svc.OnOrderEvent += (msg) =&gt; Console.WriteLine(msg); <span class="cm">// ✅ subscribe</span><br><span class="cm">// svc.OnOrderEvent("hack"); // ❌ cannot invoke from outside!</span><br><span class="cm">// svc.OnOrderDelegate("hack"); // ✅ delegate allows this ❌ unsafe!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Events</span> are delegates with encapsulation. Key difference: delegates can be invoked by anyone, events can only be invoked by the declaring class. Subscribers can only += or -=. Events implement the <span class="key">Observer Pattern</span> and provide loose coupling between publisher and subscribers."</p>'},
{q:"Explain async and await. How does asynchronous programming work?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>async/await</b> lets your code <b>do other work while waiting</b> for slow operations (API calls, DB queries, file reads). Instead of blocking the thread, it frees it up.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ Synchronous - blocks thread while waiting</span><br><span class="kw">public string</span> GetData() {<br>&nbsp;&nbsp;<span class="kw">var</span> result = httpClient.GetStringAsync(url).Result; <span class="cm">// BLOCKS!</span><br>&nbsp;&nbsp;<span class="kw">return</span> result;<br>}<br><br><span class="cm">// ✅ Asynchronous - frees thread while waiting</span><br><span class="kw">public async</span> Task&lt;<span class="kw">string</span>&gt; GetDataAsync() {<br>&nbsp;&nbsp;<span class="kw">var</span> result = <span class="kw">await</span> httpClient.GetStringAsync(url); <span class="cm">// frees thread!</span><br>&nbsp;&nbsp;<span class="kw">return</span> result; <span class="cm">// continues after data arrives</span><br>}<br><br><span class="cm">// Multiple async calls in parallel</span><br><span class="kw">var</span> task1 = GetUsersAsync();<br><span class="kw">var</span> task2 = GetOrdersAsync();<br><span class="kw">await</span> Task.WhenAll(task1, task2); <span class="cm">// both run together!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">async</span> marks a method as asynchronous. <span class="key">await</span> pauses execution until the awaited task completes, but frees the thread to do other work. Return type is Task (void) or Task&lt;T&gt; (with result). It does NOT create new threads — it uses the thread pool efficiently. Use for I/O-bound operations like DB calls, HTTP requests, file I/O."</p><div class="tip">💡 <b>Rule:</b> async all the way! Dont mix .Result or .Wait() with async — it causes deadlocks!</div>'},
