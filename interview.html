{q:"What are Columnstore Indexes? When would you use them?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Columnstore Index</b> stores data <b>column-by-column</b> instead of row-by-row. Massively faster for <b>analytics and reporting</b> queries that aggregate large datasets (SUM, AVG, COUNT on millions of rows).</p><svg viewBox="0 0 440 110" style="max-width:440px"><rect x="10" y="5" width="200" height="95" rx="8" fill="#3b82f6"/><text x="110" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Row Store (Traditional)</text><text x="110" y="40" text-anchor="middle" fill="#bae6fd" font-size="8">Row 1: [Id, Name, Salary, Dept]</text><text x="110" y="53" text-anchor="middle" fill="#bae6fd" font-size="8">Row 2: [Id, Name, Salary, Dept]</text><text x="110" y="66" text-anchor="middle" fill="#bae6fd" font-size="8">Row 3: [Id, Name, Salary, Dept]</text><text x="110" y="85" text-anchor="middle" fill="#bae6fd" font-size="7">SUM(Salary) reads ALL columns ❌</text><text x="110" y="97" text-anchor="middle" fill="#fff" font-size="7">Good for: OLTP (single row lookups)</text><rect x="230" y="5" width="200" height="95" rx="8" fill="#10b981"/><text x="330" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Column Store</text><text x="330" y="40" text-anchor="middle" fill="#d1fae5" font-size="8">Id col: [1, 2, 3, 4, 5...]</text><text x="330" y="53" text-anchor="middle" fill="#d1fae5" font-size="8">Salary col: [50k, 60k, 70k...]</text><text x="330" y="66" text-anchor="middle" fill="#d1fae5" font-size="8">Dept col: [IT, HR, IT...]</text><text x="330" y="85" text-anchor="middle" fill="#d1fae5" font-size="7">SUM(Salary) reads ONLY Salary ✅</text><text x="330" y="97" text-anchor="middle" fill="#fff" font-size="7">Good for: OLAP (analytics, reports)</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">Columnstore indexes</span> store data column-wise with high compression. 10-100x faster for analytical queries (SUM, AVG on millions of rows) because only needed columns are read. Use for <span class="key">data warehousing, reporting, OLAP</span>. Not ideal for OLTP (single row operations). Can be clustered or non-clustered."</p>'},
{q:"What is Always Encrypted? How does it work?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Always Encrypted</b> encrypts sensitive data so that <b>even DBAs cannot read it</b>. Data is encrypted on the client side and stored encrypted in the database. Only the application with the key can decrypt.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Two encryption types:</span><br><span class="cm">-- 1. Deterministic: same input = same encrypted value</span><br><span class="cm">--    Can be used in WHERE, JOIN, GROUP BY</span><br><span class="cm">-- 2. Randomized: same input = different encrypted value</span><br><span class="cm">--    More secure but cannot search/join</span><br><br><span class="cm">-- Setup in SSMS:</span><br><span class="cm">-- Right-click column > Encrypt Column > Choose type</span><br><br><span class="cm">-- Column definition</span><br><span class="kw">CREATE TABLE</span> Patient (<br>&nbsp;&nbsp;Id INT,<br>&nbsp;&nbsp;Name VARCHAR(50),<br>&nbsp;&nbsp;SSN VARCHAR(11) ENCRYPTED WITH (<br>&nbsp;&nbsp;&nbsp;&nbsp;ENCRYPTION_TYPE = DETERMINISTIC,<br>&nbsp;&nbsp;&nbsp;&nbsp;ALGORITHM = <span class="str">\'AEAD_AES_256_CBC_HMAC_SHA_256\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;COLUMN_ENCRYPTION_KEY = CEK1<br>&nbsp;&nbsp;)<br>);<br><br><span class="cm">-- DBA sees: 0x7E4A... (encrypted gibberish)</span><br><span class="cm">-- App with key sees: 123-45-6789 (actual SSN)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Always Encrypted</span> encrypts data client-side — database stores only ciphertext. Even DBAs and cloud admins cannot read it. Two types: <span class="key">Deterministic</span> (allows equality search) and <span class="key">Randomized</span> (more secure, no search). Uses Column Master Key (CMK) and Column Encryption Key (CEK). Used for PII, SSN, credit cards."</p>'},
{q:"What is Row-Level Security (RLS)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Row-Level Security</b> automatically <b>filters rows based on WHO is querying</b>. Each user sees only THEIR data. Like a shared apartment — everyone uses the same door but sees only their own room.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create filter function</span><br><span class="kw">CREATE FUNCTION</span> fn_SecurityFilter(@DeptId INT)<br><span class="kw">RETURNS TABLE</span><br><span class="kw">WITH</span> SCHEMABINDING<br><span class="kw">AS RETURN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> 1 <span class="kw">AS</span> result<br>&nbsp;&nbsp;<span class="kw">WHERE</span> @DeptId = USER_NAME() <span class="cm">-- only your dept!</span><br>&nbsp;&nbsp;<span class="kw">OR</span> USER_NAME() = <span class="str">\'admin\'</span>; <span class="cm">-- admin sees all</span><br><br><span class="cm">-- 2. Create security policy</span><br><span class="kw">CREATE SECURITY POLICY</span> DeptFilter<br>&nbsp;&nbsp;<span class="kw">ADD FILTER PREDICATE</span> fn_SecurityFilter(DeptId) <span class="kw">ON</span> Employee;<br><br><span class="cm">-- Now: User "IT" runs SELECT * FROM Employee</span><br><span class="cm">-- Only sees IT department rows! ✅</span><br><span class="cm">-- User "admin" sees ALL rows ✅</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">RLS</span> transparently filters rows based on user context using a security predicate function. Users query the same table but see only authorized rows. Two types: <span class="key">Filter predicate</span> (silently filters rows) and <span class="key">Block predicate</span> (prevents INSERT/UPDATE of unauthorized rows). Applied at database level — no app code changes needed."</p>'},
{q:"What is SQL Server Profiler and Extended Events?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>SQL Server Profiler</b> = old tool to <b>trace and capture SQL queries</b> running on the server. <b>Extended Events</b> = modern, lightweight replacement. Both help you see what queries are running and find slow ones.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- SQL Server Profiler (old, being deprecated)</span><br><span class="cm">-- Tools > SQL Server Profiler in SSMS</span><br><span class="cm">-- Captures: queries, duration, reads, CPU</span><br><span class="cm">-- ❌ Heavy overhead on production!</span><br><br><span class="cm">-- Extended Events (modern, lightweight ⭐)</span><br><span class="kw">CREATE EVENT SESSION</span> SlowQueries <span class="kw">ON SERVER</span><br><span class="kw">ADD EVENT</span> sqlserver.sql_statement_completed (<br>&nbsp;&nbsp;<span class="kw">WHERE</span> duration > 5000000 <span class="cm">-- queries > 5 seconds</span><br>)<br><span class="kw">ADD TARGET</span> package0.event_file (<br>&nbsp;&nbsp;<span class="kw">SET</span> filename = <span class="str">\'SlowQueries.xel\'</span><br>);<br><br><span class="kw">ALTER EVENT SESSION</span> SlowQueries <span class="kw">ON SERVER STATE</span> = START;<br><br><span class="cm">-- View in SSMS: Management > Extended Events</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">SQL Server Profiler</span> is the legacy tracing tool — heavy overhead, being deprecated. <span class="key">Extended Events</span> is the modern replacement — lightweight, configurable, minimal performance impact. Use Extended Events to capture slow queries, deadlocks, errors in production. Access via SSMS or system DMVs."</p>'},
{q:"What is Database Sharding? When would you use it?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Sharding</b> splits your database across <b>multiple servers</b>. Each server holds a portion of the data. Like dividing a library into multiple buildings — A-M in Building 1, N-Z in Building 2.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Sharding strategies:</span><br><br><span class="cm">-- 1. Range-based: by ID range</span><br><span class="cm">-- Shard 1: Users 1-1000000</span><br><span class="cm">-- Shard 2: Users 1000001-2000000</span><br><br><span class="cm">-- 2. Hash-based: by hash of key</span><br><span class="cm">-- Shard = UserId % NumberOfShards</span><br><span class="cm">-- User 101 % 3 = Shard 2</span><br><br><span class="cm">-- 3. Geography-based</span><br><span class="cm">-- Shard India: Indian users</span><br><span class="cm">-- Shard US: American users</span><br><br><span class="cm">-- Application routes to correct shard</span><br><span class="kw">var</span> shardId = userId % totalShards;<br><span class="kw">var</span> connStr = GetConnectionString(shardId);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Sharding</span> horizontally partitions data across multiple database servers. Each shard holds a subset of data. Strategies: <span class="key">Range</span> (by ID range), <span class="key">Hash</span> (modulo), <span class="key">Geography</span> (by region). Use when single server cant handle the load. Challenges: cross-shard queries, joins, and maintaining consistency."</p>'},
{q:"What is Replication? Explain Snapshot, Transactional, Merge.",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Replication</b> copies data from one database (Publisher) to another (Subscriber) automatically. Like syncing files between computers.</p><svg viewBox="0 0 440 110" style="max-width:440px"><rect x="10" y="5" width="130" height="95" rx="8" fill="#3b82f6"/><text x="75" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Snapshot</text><text x="75" y="40" text-anchor="middle" fill="#bae6fd" font-size="7">Full copy at a point in time</text><text x="75" y="55" text-anchor="middle" fill="#bae6fd" font-size="7">Replaces entire data</text><text x="75" y="70" text-anchor="middle" fill="#bae6fd" font-size="7">Good for: small tables</text><text x="75" y="85" text-anchor="middle" fill="#bae6fd" font-size="7">that rarely change</text><text x="75" y="97" text-anchor="middle" fill="#fff" font-size="6">Periodic full refresh</text><rect x="155" y="5" width="130" height="95" rx="8" fill="#10b981"/><text x="220" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Transactional ⭐</text><text x="220" y="40" text-anchor="middle" fill="#d1fae5" font-size="7">Sends changes in real-time</text><text x="220" y="55" text-anchor="middle" fill="#d1fae5" font-size="7">Only INSERT/UPDATE/DELETE</text><text x="220" y="70" text-anchor="middle" fill="#d1fae5" font-size="7">Good for: reporting DBs</text><text x="220" y="85" text-anchor="middle" fill="#d1fae5" font-size="7">Low latency</text><text x="220" y="97" text-anchor="middle" fill="#fff" font-size="6">Most common type</text><rect x="300" y="5" width="130" height="95" rx="8" fill="#f59e0b"/><text x="365" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Merge</text><text x="365" y="40" text-anchor="middle" fill="#fef3c7" font-size="7">Both sides can change</text><text x="365" y="55" text-anchor="middle" fill="#fef3c7" font-size="7">Changes merged together</text><text x="365" y="70" text-anchor="middle" fill="#fef3c7" font-size="7">Good for: mobile/offline</text><text x="365" y="85" text-anchor="middle" fill="#fef3c7" font-size="7">Conflict resolution needed</text><text x="365" y="97" text-anchor="middle" fill="#fff" font-size="6">Bidirectional sync</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">Snapshot</span> copies entire data periodically — simple but heavy. <span class="key">Transactional</span> sends incremental changes in near real-time — most common for reporting replicas. <span class="key">Merge</span> allows changes on both sides with conflict resolution — used for mobile/offline scenarios. Components: Publisher, Distributor, Subscriber."</p>'},
{q:"What is Always On Availability Groups?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Always On Availability Groups</b> is SQL Servers <b>high availability solution</b>. It keeps copies of your database on multiple servers. If the primary server dies, a secondary <b>automatically takes over</b> in seconds.</p><h4>💻 How It Works</h4><div class="code"><span class="cm">-- Architecture:</span><br><span class="cm">-- Primary Replica (read-write) → handles all writes</span><br><span class="cm">--   ↓ sync/async replication</span><br><span class="cm">-- Secondary Replica 1 (read-only) → reporting queries</span><br><span class="cm">-- Secondary Replica 2 (read-only) → backup/DR</span><br><br><span class="cm">-- Benefits:</span><br><span class="cm">-- ✅ Automatic failover (seconds!)</span><br><span class="cm">-- ✅ Read-only secondaries (offload reports)</span><br><span class="cm">-- ✅ Multiple databases in one group</span><br><span class="cm">-- ✅ No shared storage needed</span><br><br><span class="cm">-- Listener: virtual name that auto-routes</span><br><span class="cm">-- App connects to Listener, not specific server</span><br><span class="cm">-- Failover? Listener points to new primary automatically!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Always On AG</span> provides high availability with automatic failover. Primary replica handles writes, secondary replicas are read-only (for reporting). Uses <span class="key">synchronous</span> (zero data loss) or <span class="key">asynchronous</span> (better performance) replication. Apps connect via a <span class="key">Listener</span> that auto-routes to the active primary."</p>'},
{q:"How do you handle Pagination efficiently in SQL Server?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Pagination</b> returns data in <b>pages</b> (page 1 = rows 1-20, page 2 = rows 21-40). Use <b>OFFSET-FETCH</b> in SQL Server 2012+. Never load all rows!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- OFFSET-FETCH (modern, recommended ⭐)</span><br><span class="kw">SELECT</span> Id, Name, Salary<br><span class="kw">FROM</span> Employee<br><span class="kw">ORDER BY</span> Id <span class="cm">-- ORDER BY is REQUIRED!</span><br><span class="kw">OFFSET</span> 20 <span class="kw">ROWS</span> <span class="cm">-- skip first 20</span><br><span class="kw">FETCH NEXT</span> 10 <span class="kw">ROWS ONLY</span>; <span class="cm">-- take next 10 (page 3)</span><br><br><span class="cm">-- Dynamic pagination</span><br><span class="kw">DECLARE</span> @Page INT = 3, @PageSize INT = 10;<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee<br><span class="kw">ORDER BY</span> Id<br><span class="kw">OFFSET</span> (@Page - 1) * @PageSize <span class="kw">ROWS</span><br><span class="kw">FETCH NEXT</span> @PageSize <span class="kw">ROWS ONLY</span>;<br><br><span class="cm">-- Keyset pagination (faster for deep pages)</span><br><span class="kw">SELECT TOP</span> 10 * <span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Id > @LastId <span class="cm">-- start after last seen ID</span><br><span class="kw">ORDER BY</span> Id;</div><h4>🗣️ Interview Answer</h4><p>"Use <span class="key">OFFSET-FETCH</span> for pagination — requires ORDER BY. For deep pages (page 1000+), OFFSET becomes slow. Use <span class="key">Keyset pagination</span> (WHERE Id > @lastId) for better performance on large datasets. Always have an index on the ORDER BY column."</p>'},
{q:"What is Parameter Sniffing? How do you fix it?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Parameter Sniffing</b> = SQL Server creates an execution plan based on the <b>FIRST parameter value</b> and reuses it for ALL values. If the first value is unusual, the plan is bad for normal values.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Problem: Plan optimized for DeptId=1 (10 rows)</span><br><span class="cm">-- But DeptId=5 has 100000 rows → same plan = SLOW!</span><br><br><span class="cm">-- Fix 1: OPTIMIZE FOR hint</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = @DeptId<br><span class="kw">OPTION</span> (OPTIMIZE FOR (@DeptId = 5)); <span class="cm">-- optimize for typical value</span><br><br><span class="cm">-- Fix 2: OPTIMIZE FOR UNKNOWN</span><br><span class="kw">OPTION</span> (OPTIMIZE FOR UNKNOWN); <span class="cm">-- uses average statistics</span><br><br><span class="cm">-- Fix 3: RECOMPILE (new plan every time)</span><br><span class="kw">OPTION</span> (RECOMPILE); <span class="cm">-- fresh plan each execution</span><br><br><span class="cm">-- Fix 4: Local variables in stored procedure</span><br><span class="kw">DECLARE</span> @localDept INT = @DeptId;<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = @localDept;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Parameter Sniffing</span> occurs when SQL Server caches a plan based on the first parameter value. Fixes: <span class="key">OPTIMIZE FOR</span> (specific or UNKNOWN), <span class="key">RECOMPILE</span> hint (fresh plan each time), local variables, or <span class="key">Query Store</span> to force a good plan. RECOMPILE has CPU overhead but guarantees optimal plan."</p>'},
{q:"What are Indexed Views? When should you use them?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>An <b>Indexed View</b> (Materialized View) <b>physically stores the view data</b> on disk. Normal views run the query every time. Indexed views pre-compute and store results — much faster reads but slower writes.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create view WITH SCHEMABINDING (required!)</span><br><span class="kw">CREATE VIEW</span> vw_DeptSummary <span class="kw">WITH SCHEMABINDING AS</span><br><span class="kw">SELECT</span> DeptId, COUNT_BIG(*) <span class="kw">as</span> EmpCount, SUM(Salary) <span class="kw">as</span> TotalSalary<br><span class="kw">FROM</span> dbo.Employee<br><span class="kw">GROUP BY</span> DeptId;<br><br><span class="cm">-- 2. Create unique clustered index on view</span><br><span class="kw">CREATE UNIQUE CLUSTERED INDEX</span> IX_DeptSummary<br><span class="kw">ON</span> vw_DeptSummary(DeptId);<br><br><span class="cm">-- Now data is physically stored!</span><br><span class="cm">-- SELECT from view is instant (no recalculation)</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> vw_DeptSummary; <span class="cm">-- reads stored data ✅</span><br><br><span class="cm">-- ⚠️ INSERT/UPDATE on Employee auto-updates the view</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Indexed Views</span> materialize view data on disk with a unique clustered index. Reads are instant but writes are slower (must update view too). Requires WITH SCHEMABINDING and deterministic expressions. Use for: frequently queried aggregations, reporting summaries, dashboards. Not for frequently updated tables."</p>'},
{q:"What is TDE (Transparent Data Encryption)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>TDE</b> encrypts the <b>entire database files at rest</b> (on disk). If someone steals the hard drive, they cant read the data. Transparent = no app code changes needed!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create master key</span><br><span class="kw">USE</span> master;<br><span class="kw">CREATE MASTER KEY ENCRYPTION BY PASSWORD</span> = <span class="str">\'StrongP@ss123\'</span>;<br><br><span class="cm">-- 2. Create certificate</span><br><span class="kw">CREATE CERTIFICATE</span> TDE_Cert <span class="kw">WITH SUBJECT</span> = <span class="str">\'TDE Certificate\'</span>;<br><br><span class="cm">-- 3. Create database encryption key</span><br><span class="kw">USE</span> MyDatabase;<br><span class="kw">CREATE DATABASE ENCRYPTION KEY</span><br><span class="kw">WITH ALGORITHM</span> = AES_256<br><span class="kw">ENCRYPTION BY SERVER CERTIFICATE</span> TDE_Cert;<br><br><span class="cm">-- 4. Enable encryption</span><br><span class="kw">ALTER DATABASE</span> MyDatabase <span class="kw">SET ENCRYPTION ON</span>;<br><br><span class="cm">-- ✅ Data files (.mdf), log files (.ldf), backups = ALL encrypted</span><br><span class="cm">-- ✅ No app code changes needed!</span><br><span class="cm">-- ⚠️ BACKUP the certificate! Without it, cant restore DB elsewhere</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">TDE</span> encrypts database files at rest using AES encryption. Protects against physical theft of drives/backups. <span class="key">Transparent</span> — no application changes needed. Encrypts data files, log files, and backups. Must backup the certificate — without it, database cannot be restored on another server. Different from Always Encrypted (which encrypts specific columns client-side)."</p>'},
{q:"What is the difference between OLTP and OLAP?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>OLTP</b> = handles <b>daily transactions</b> (INSERT, UPDATE, DELETE). Fast, many small operations.<br><b>OLAP</b> = handles <b>analytics and reporting</b> (SELECT with aggregations). Complex queries on large data.</p><svg viewBox="0 0 440 120" style="max-width:440px"><rect x="10" y="5" width="200" height="105" rx="8" fill="#3b82f6"/><text x="110" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">OLTP (Transactional)</text><text x="110" y="40" text-anchor="middle" fill="#bae6fd" font-size="8">✅ INSERT, UPDATE, DELETE</text><text x="110" y="55" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Many small transactions</text><text x="110" y="70" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Normalized (3NF)</text><text x="110" y="85" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Current data</text><text x="110" y="100" text-anchor="middle" fill="#fff" font-size="7">E-commerce, Banking, ERP</text><rect x="230" y="5" width="200" height="105" rx="8" fill="#10b981"/><text x="330" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">OLAP (Analytical)</text><text x="330" y="40" text-anchor="middle" fill="#d1fae5" font-size="8">✅ SELECT with SUM, AVG, COUNT</text><text x="330" y="55" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Few complex queries</text><text x="330" y="70" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Denormalized (Star Schema)</text><text x="330" y="85" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Historical data</text><text x="330" y="100" text-anchor="middle" fill="#fff" font-size="7">Reports, Dashboards, BI</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">OLTP</span> is optimized for fast transactions — normalized tables, row-store indexes, many concurrent users. <span class="key">OLAP</span> is optimized for analytics — denormalized (star/snowflake schema), columnstore indexes, complex aggregations. Typically OLTP data is replicated to an OLAP data warehouse for reporting."</p>'},
],
webapi:[
// Basics
{q:"What is a Web API? How is it different from MVC?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Web API</b> is a way to build <b>HTTP services that return data (JSON/XML)</b> — no HTML pages. <b>MVC</b> returns <b>HTML views</b> for browsers. API is for apps, mobile, other services to consume.</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="5" width="200" height="155" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12">🌐 MVC</text><text x="110" y="50" text-anchor="middle" fill="#334155" font-size="9">✅ Returns HTML Views</text><text x="110" y="67" text-anchor="middle" fill="#334155" font-size="9">✅ For browsers only</text><text x="110" y="84" text-anchor="middle" fill="#334155" font-size="9">✅ Uses Razor (.cshtml)</text><text x="110" y="101" text-anchor="middle" fill="#334155" font-size="9">✅ Controller : Controller</text><text x="110" y="118" text-anchor="middle" fill="#334155" font-size="9">✅ Returns ViewResult</text><text x="110" y="148" text-anchor="middle" fill="#1e40af" font-size="8" font-weight="600">Browser → HTML page</text><rect x="230" y="5" width="200" height="155" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">🔗 Web API</text><text x="330" y="50" text-anchor="middle" fill="#334155" font-size="9">✅ Returns JSON / XML</text><text x="330" y="67" text-anchor="middle" fill="#334155" font-size="9">✅ For any client (mobile, JS)</text><text x="330" y="84" text-anchor="middle" fill="#334155" font-size="9">✅ No Views needed</text><text x="330" y="101" text-anchor="middle" fill="#334155" font-size="9">✅ Controller : ControllerBase</text><text x="330" y="118" text-anchor="middle" fill="#334155" font-size="9">✅ Returns Ok(), NotFound()</text><text x="330" y="148" text-anchor="middle" fill="#16a34a" font-size="8" font-weight="600">Any client → JSON data</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// MVC Controller - returns HTML</span><br><span class="kw">public class</span> HomeController : <span class="kw">Controller</span> {<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Index() =&gt; View(); <span class="cm">// HTML</span><br>}<br><br><span class="cm">// Web API Controller - returns JSON</span><br>[ApiController]<br>[Route(<span class="str">"api/[controller]"</span>)]<br><span class="kw">public class</span> ProductsController : <span class="kw">ControllerBase</span> {<br>&nbsp;&nbsp;[HttpGet]<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult GetAll() =&gt; Ok(products); <span class="cm">// JSON</span><br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">MVC</span> returns HTML views for browsers using Razor. <span class="key">Web API</span> returns data (JSON/XML) for any client — mobile apps, JavaScript, other services. API inherits from <b>ControllerBase</b>, uses <b>[ApiController]</b> attribute, and returns status codes like Ok(), NotFound(), BadRequest()."</p>'},
{q:"What is REST? Explain RESTful principles.",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>REST</b> (Representational State Transfer) is a set of <b>rules for building APIs</b>. Like traffic rules for the internet — everyone follows the same pattern so communication is easy.</p><svg viewBox="0 0 440 210" style="max-width:440px"><rect x="10" y="5" width="420" height="35" rx="8" fill="#8b5cf6"/><text x="220" y="28" text-anchor="middle" fill="#fff" font-weight="700" font-size="13">6 RESTful Principles</text><rect x="10" y="50" width="135" height="55" rx="6" fill="#10b981"/><text x="77" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">1. Client-Server</text><text x="77" y="85" text-anchor="middle" fill="#d1fae5" font-size="7">Frontend and Backend</text><text x="77" y="97" text-anchor="middle" fill="#d1fae5" font-size="7">are separate</text><rect x="155" y="50" width="135" height="55" rx="6" fill="#0ea5e9"/><text x="222" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">2. Stateless</text><text x="222" y="85" text-anchor="middle" fill="#bae6fd" font-size="7">Each request has ALL</text><text x="222" y="97" text-anchor="middle" fill="#bae6fd" font-size="7">info needed</text><rect x="300" y="50" width="130" height="55" rx="6" fill="#f59e0b"/><text x="365" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">3. Cacheable</text><text x="365" y="85" text-anchor="middle" fill="#fef3c7" font-size="7">Responses can be</text><text x="365" y="97" text-anchor="middle" fill="#fef3c7" font-size="7">cached for speed</text><rect x="10" y="115" width="135" height="55" rx="6" fill="#ef4444"/><text x="77" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">4. Uniform Interface</text><text x="77" y="150" text-anchor="middle" fill="#fecaca" font-size="7">Standard HTTP methods</text><text x="77" y="162" text-anchor="middle" fill="#fecaca" font-size="7">GET, POST, PUT, DELETE</text><rect x="155" y="115" width="135" height="55" rx="6" fill="#64748b"/><text x="222" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">5. Layered System</text><text x="222" y="150" text-anchor="middle" fill="#e2e8f0" font-size="7">Client doesnt know</text><text x="222" y="162" text-anchor="middle" fill="#e2e8f0" font-size="7">about middle layers</text><rect x="300" y="115" width="130" height="55" rx="6" fill="#ec4899"/><text x="365" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">6. Resource-Based</text><text x="365" y="150" text-anchor="middle" fill="#fce7f3" font-size="7">URLs represent resources</text><text x="365" y="162" text-anchor="middle" fill="#fce7f3" font-size="7">/api/products/5</text><rect x="10" y="180" width="420" height="22" rx="6" fill="#f0f9ff" stroke="#bae6fd"/><text x="220" y="195" text-anchor="middle" fill="#0369a1" font-size="9" font-weight="600">REST = Rules | RESTful API = API that follows these rules</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">REST</span> is an architectural style for building APIs. Key principles: <span class="key">Stateless</span> (no server-side session), <span class="key">Resource-based</span> URLs (/api/products), <span class="key">Uniform interface</span> using HTTP methods, <span class="key">Client-Server</span> separation, <span class="key">Cacheable</span> responses, and <span class="key">Layered</span> system. A RESTful API follows all these principles."</p>'},
{q:"What are HTTP Methods? Explain GET, POST, PUT, PATCH, DELETE.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>HTTP Methods tell the server <b>what action to perform</b>. Like verbs in English — Get me data, Create this, Update that, Delete this.</p><svg viewBox="0 0 440 200" style="max-width:440px"><rect x="10" y="5" width="420" height="35" rx="8" fill="#0ea5e9"/><text x="220" y="28" text-anchor="middle" fill="#fff" font-weight="700" font-size="13">HTTP Methods = CRUD Operations</text><rect x="10" y="50" width="200" height="55" rx="6" fill="#10b981"/><text x="110" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">📥 GET = Read</text><text x="110" y="88" text-anchor="middle" fill="#d1fae5" font-size="9">GET /api/products → get all</text><text x="110" y="100" text-anchor="middle" fill="#d1fae5" font-size="8">GET /api/products/5 → get one</text><rect x="220" y="50" width="210" height="55" rx="6" fill="#3b82f6"/><text x="325" y="70" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">📤 POST = Create</text><text x="325" y="88" text-anchor="middle" fill="#bae6fd" font-size="9">POST /api/products</text><text x="325" y="100" text-anchor="middle" fill="#bae6fd" font-size="8">Body: {name, price} → new item</text><rect x="10" y="115" width="135" height="55" rx="6" fill="#f59e0b"/><text x="77" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">🔄 PUT = Replace</text><text x="77" y="153" text-anchor="middle" fill="#fef3c7" font-size="8">PUT /api/products/5</text><text x="77" y="165" text-anchor="middle" fill="#fef3c7" font-size="7">Full object update</text><rect x="155" y="115" width="135" height="55" rx="6" fill="#8b5cf6"/><text x="222" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">✏️ PATCH = Partial</text><text x="222" y="153" text-anchor="middle" fill="#ede9fe" font-size="8">PATCH /api/products/5</text><text x="222" y="165" text-anchor="middle" fill="#ede9fe" font-size="7">Update only some fields</text><rect x="300" y="115" width="130" height="55" rx="6" fill="#ef4444"/><text x="365" y="135" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">🗑️ DELETE</text><text x="365" y="153" text-anchor="middle" fill="#fecaca" font-size="8">DELETE /api/products/5</text><text x="365" y="165" text-anchor="middle" fill="#fecaca" font-size="7">Remove resource</text><rect x="10" y="180" width="420" height="18" rx="4" fill="#f0f9ff"/><text x="220" y="193" text-anchor="middle" fill="#0369a1" font-size="8" font-weight="600">CRUD: Create=POST | Read=GET | Update=PUT/PATCH | Delete=DELETE</text></svg><h4>💻 Code Example</h4><div class="code">[HttpGet] <span class="cm">// GET /api/products</span><br><span class="kw">public</span> IActionResult GetAll() =&gt; Ok(_db.Products);<br><br>[HttpGet(<span class="str">"{id}"</span>)] <span class="cm">// GET /api/products/5</span><br><span class="kw">public</span> IActionResult Get(<span class="kw">int</span> id) =&gt; Ok(_db.Products.Find(id));<br><br>[HttpPost] <span class="cm">// POST /api/products</span><br><span class="kw">public</span> IActionResult Create(Product p) { _db.Add(p); <span class="kw">return</span> CreatedAtAction(...); }<br><br>[HttpPut(<span class="str">"{id}"</span>)] <span class="cm">// PUT /api/products/5</span><br><span class="kw">public</span> IActionResult Update(<span class="kw">int</span> id, Product p) { ... <span class="kw">return</span> NoContent(); }<br><br>[HttpDelete(<span class="str">"{id}"</span>)] <span class="cm">// DELETE /api/products/5</span><br><span class="kw">public</span> IActionResult Delete(<span class="kw">int</span> id) { ... <span class="kw">return</span> NoContent(); }</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">GET</span> reads data (safe, idempotent). <span class="key">POST</span> creates new resource (not idempotent). <span class="key">PUT</span> replaces entire resource (idempotent). <span class="key">PATCH</span> partially updates (idempotent). <span class="key">DELETE</span> removes resource (idempotent). They map to CRUD: Create=POST, Read=GET, Update=PUT/PATCH, Delete=DELETE."</p>'},
{q:"What are HTTP Status Codes? Explain 200, 201, 204, 400, 401, 403, 404, 500.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>Status codes are <b>3-digit numbers</b> the server sends back to tell the client <b>what happened</b>. Like a report card — 2xx = pass, 4xx = your mistake, 5xx = server mistake.</p><svg viewBox="0 0 440 200" style="max-width:440px"><rect x="10" y="5" width="135" height="90" rx="8" fill="#10b981"/><text x="77" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">✅ 2xx = Success</text><text x="77" y="40" text-anchor="middle" fill="#d1fae5" font-size="8">200 = OK</text><text x="77" y="53" text-anchor="middle" fill="#d1fae5" font-size="8">201 = Created</text><text x="77" y="66" text-anchor="middle" fill="#d1fae5" font-size="8">204 = No Content</text><text x="77" y="82" text-anchor="middle" fill="#d1fae5" font-size="7">(success, no body)</text><rect x="155" y="5" width="135" height="90" rx="8" fill="#f59e0b"/><text x="222" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">⚠️ 4xx = Client Error</text><text x="222" y="40" text-anchor="middle" fill="#fef3c7" font-size="8">400 = Bad Request</text><text x="222" y="53" text-anchor="middle" fill="#fef3c7" font-size="8">401 = Unauthorized</text><text x="222" y="66" text-anchor="middle" fill="#fef3c7" font-size="8">403 = Forbidden</text><text x="222" y="82" text-anchor="middle" fill="#fef3c7" font-size="8">404 = Not Found</text><rect x="300" y="5" width="130" height="90" rx="8" fill="#ef4444"/><text x="365" y="22" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">💥 5xx = Server Error</text><text x="365" y="40" text-anchor="middle" fill="#fecaca" font-size="8">500 = Internal Error</text><text x="365" y="53" text-anchor="middle" fill="#fecaca" font-size="8">502 = Bad Gateway</text><text x="365" y="66" text-anchor="middle" fill="#fecaca" font-size="8">503 = Unavailable</text><text x="365" y="82" text-anchor="middle" fill="#fecaca" font-size="7">(server crashed)</text><rect x="10" y="105" width="420" height="85" rx="8" fill="#f0f9ff" stroke="#bae6fd"/><text x="220" y="122" text-anchor="middle" fill="#0369a1" font-size="9" font-weight="600">Quick Memory Trick:</text><text x="220" y="140" text-anchor="middle" fill="#16a34a" font-size="9">200 = Here is your data | 201 = I created it for you</text><text x="220" y="155" text-anchor="middle" fill="#f59e0b" font-size="9">400 = You sent wrong data | 401 = Who are you? Login first!</text><text x="220" y="170" text-anchor="middle" fill="#f59e0b" font-size="9">403 = I know you but NO access | 404 = Does not exist</text><text x="220" y="185" text-anchor="middle" fill="#ef4444" font-size="9">500 = My fault, something broke on server</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">return</span> Ok(data); <span class="cm">// 200</span><br><span class="kw">return</span> CreatedAtAction(...); <span class="cm">// 201</span><br><span class="kw">return</span> NoContent(); <span class="cm">// 204</span><br><span class="kw">return</span> BadRequest(<span class="str">"Invalid data"</span>); <span class="cm">// 400</span><br><span class="kw">return</span> Unauthorized(); <span class="cm">// 401</span><br><span class="kw">return</span> Forbid(); <span class="cm">// 403</span><br><span class="kw">return</span> NotFound(); <span class="cm">// 404</span><br><span class="kw">return</span> StatusCode(500, <span class="str">"Server error"</span>); <span class="cm">// 500</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">2xx</span> = success (200 OK, 201 Created, 204 No Content). <span class="key">4xx</span> = client error (400 Bad Request, 401 Unauthorized — not logged in, 403 Forbidden — no permission, 404 Not Found). <span class="key">5xx</span> = server error (500 Internal Server Error). 401 vs 403: 401 means identity unknown, 403 means identity known but access denied."</p>'},
{q:"What is the difference between PUT and PATCH?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>PUT</b> = <b>replace the ENTIRE object</b>. You must send ALL fields.<br><b>PATCH</b> = <b>update only SOME fields</b>. Send only what changed.</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="5" width="130" height="155" rx="8" fill="#64748b"/><text x="75" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Original Object</text><text x="75" y="45" text-anchor="middle" fill="#e2e8f0" font-size="8">Name: "Laptop"</text><text x="75" y="60" text-anchor="middle" fill="#e2e8f0" font-size="8">Price: 50000</text><text x="75" y="75" text-anchor="middle" fill="#e2e8f0" font-size="8">Stock: 10</text><text x="75" y="90" text-anchor="middle" fill="#e2e8f0" font-size="8">Color: "Silver"</text><rect x="155" y="5" width="130" height="155" rx="8" fill="#f59e0b"/><text x="220" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">🔄 PUT (Replace All)</text><text x="220" y="48" text-anchor="middle" fill="#fef3c7" font-size="8">Send ALL fields:</text><text x="220" y="65" text-anchor="middle" fill="#fff" font-size="8">Name: "Laptop"</text><text x="220" y="80" text-anchor="middle" fill="#fff" font-size="8">Price: 45000 ✅</text><text x="220" y="95" text-anchor="middle" fill="#fff" font-size="8">Stock: 10</text><text x="220" y="110" text-anchor="middle" fill="#fff" font-size="8">Color: "Silver"</text><text x="220" y="135" text-anchor="middle" fill="#fef3c7" font-size="7">Missing field = set to null!</text><text x="220" y="150" text-anchor="middle" fill="#fef3c7" font-size="7" font-weight="600">Must send everything</text><rect x="300" y="5" width="130" height="155" rx="8" fill="#10b981"/><text x="365" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">✏️ PATCH (Partial)</text><text x="365" y="48" text-anchor="middle" fill="#d1fae5" font-size="8">Send ONLY changed:</text><text x="365" y="75" text-anchor="middle" fill="#fff" font-size="8">Price: 45000 ✅</text><text x="365" y="105" text-anchor="middle" fill="#d1fae5" font-size="8">Other fields stay</text><text x="365" y="120" text-anchor="middle" fill="#d1fae5" font-size="8">as they are!</text><text x="365" y="150" text-anchor="middle" fill="#d1fae5" font-size="7" font-weight="600">Send only what changed</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// PUT - must send FULL object</span><br>[HttpPut(<span class="str">"{id}"</span>)]<br><span class="kw">public</span> IActionResult Update(<span class="kw">int</span> id, Product product) {<br>&nbsp;&nbsp;<span class="cm">// product must have ALL fields</span><br>&nbsp;&nbsp;_db.Products.Update(product);<br>&nbsp;&nbsp;_db.SaveChanges();<br>&nbsp;&nbsp;<span class="kw">return</span> NoContent(); <span class="cm">// 204</span><br>}<br><br><span class="cm">// PATCH - send only changed fields</span><br>[HttpPatch(<span class="str">"{id}"</span>)]<br><span class="kw">public</span> IActionResult Patch(<span class="kw">int</span> id, JsonPatchDocument&lt;Product&gt; patch) {<br>&nbsp;&nbsp;<span class="kw">var</span> product = _db.Products.Find(id);<br>&nbsp;&nbsp;patch.ApplyTo(product); <span class="cm">// updates only sent fields</span><br>&nbsp;&nbsp;_db.SaveChanges();<br>&nbsp;&nbsp;<span class="kw">return</span> NoContent();<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">PUT</span> replaces the entire resource — you must send all fields, missing fields become null. <span class="key">PATCH</span> partially updates — send only changed fields, rest stay unchanged. Both are idempotent. Use PUT for full updates, PATCH for partial updates. PATCH is more bandwidth-efficient."</p>'},
{q:"What is Content Negotiation? JSON vs XML?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Content Negotiation</b> means the client tells the server <b>what format it wants</b> the response in (JSON or XML). The server checks the <b>Accept</b> header and returns data in that format.</p><svg viewBox="0 0 440 130" style="max-width:440px"><rect x="10" y="10" width="100" height="50" rx="6" fill="#64748b"/><text x="60" y="32" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">📱 Client</text><text x="60" y="48" text-anchor="middle" fill="#e2e8f0" font-size="7">Accept: app/json</text><text x="140" y="38" text-anchor="middle" fill="#64748b" font-size="14">→</text><rect x="170" y="10" width="110" height="50" rx="6" fill="#8b5cf6"/><text x="225" y="32" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">🔄 Server</text><text x="225" y="48" text-anchor="middle" fill="#ede9fe" font-size="7">Checks Accept header</text><text x="310" y="38" text-anchor="middle" fill="#64748b" font-size="14">→</text><rect x="340" y="10" width="90" height="50" rx="6" fill="#10b981"/><text x="385" y="32" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">📦 Response</text><text x="385" y="48" text-anchor="middle" fill="#d1fae5" font-size="7">{"name":"Laptop"}</text><rect x="10" y="75" width="420" height="45" rx="8" fill="#f0f9ff" stroke="#bae6fd"/><text x="220" y="92" text-anchor="middle" fill="#0369a1" font-size="9" font-weight="600">Accept: application/json → returns JSON (default in .NET)</text><text x="220" y="108" text-anchor="middle" fill="#0369a1" font-size="9">Accept: application/xml → returns XML</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - enable XML support</span><br>builder.Services.AddControllers()<br>&nbsp;&nbsp;.AddXmlSerializerFormatters(); <span class="cm">// now supports XML too</span><br><br><span class="cm">// Client sends header:</span><br><span class="cm">// Accept: application/json → gets JSON</span><br><span class="cm">// Accept: application/xml → gets XML</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Content Negotiation</span> is the process where client specifies desired response format using the <b>Accept</b> header. ASP.NET Core returns <span class="key">JSON by default</span>. To support XML, add <b>AddXmlSerializerFormatters()</b>. JSON is preferred for APIs because it is lightweight, readable, and works natively with JavaScript."</p>'},
{q:"What is Model Binding in Web API?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Model Binding</b> automatically maps incoming request data (URL, query string, body, headers) to your <b>action method parameters</b>. You dont manually parse anything — ASP.NET does it for you!</p><svg viewBox="0 0 440 140" style="max-width:440px"><rect x="10" y="10" width="120" height="110" rx="8" fill="#64748b"/><text x="70" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">📨 Request Data</text><text x="70" y="50" text-anchor="middle" fill="#e2e8f0" font-size="7">URL: /api/products/5</text><text x="70" y="65" text-anchor="middle" fill="#e2e8f0" font-size="7">Query: ?sort=name</text><text x="70" y="80" text-anchor="middle" fill="#e2e8f0" font-size="7">Body: {name,price}</text><text x="70" y="95" text-anchor="middle" fill="#e2e8f0" font-size="7">Header: Auth token</text><text x="160" y="65" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">→ AUTO →</text><rect x="200" y="10" width="230" height="110" rx="8" fill="#10b981"/><text x="315" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">✅ C# Method Parameters</text><text x="315" y="50" text-anchor="middle" fill="#d1fae5" font-size="7">[FromRoute] int id = 5</text><text x="315" y="65" text-anchor="middle" fill="#d1fae5" font-size="7">[FromQuery] string sort = "name"</text><text x="315" y="80" text-anchor="middle" fill="#d1fae5" font-size="7">[FromBody] Product product = {...}</text><text x="315" y="95" text-anchor="middle" fill="#d1fae5" font-size="7">[FromHeader] string auth = "token"</text><text x="315" y="112" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">All mapped automatically!</text></svg><h4>💻 Code Example</h4><div class="code">[HttpGet(<span class="str">"{id}"</span>)] <span class="cm">// /api/products/5</span><br><span class="kw">public</span> IActionResult Get(<br>&nbsp;&nbsp;[FromRoute] <span class="kw">int</span> id, <span class="cm">// from URL path</span><br>&nbsp;&nbsp;[FromQuery] <span class="kw">string</span> sort, <span class="cm">// from ?sort=name</span><br>&nbsp;&nbsp;[FromHeader] <span class="kw">string</span> auth <span class="cm">// from header</span><br>) { ... }<br><br>[HttpPost]<br><span class="kw">public</span> IActionResult Create(<br>&nbsp;&nbsp;[FromBody] Product product <span class="cm">// from JSON body</span><br>) { ... }</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Model Binding</span> automatically maps request data to action parameters. Sources: <span class="key">[FromRoute]</span> for URL path, <span class="key">[FromQuery]</span> for query string, <span class="key">[FromBody]</span> for JSON body, <span class="key">[FromHeader]</span> for headers, <span class="key">[FromForm]</span> for form data. With [ApiController], complex types default to [FromBody] and simple types to [FromQuery]/[FromRoute]."</p>'},
{q:"What is [FromBody], [FromQuery], [FromRoute], [FromHeader]?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>These attributes tell ASP.NET <b>WHERE to find the data</b> in the incoming request. Like telling a delivery person which pocket to check for the package.</p><svg viewBox="0 0 440 180" style="max-width:440px"><rect x="10" y="5" width="210" height="80" rx="8" fill="#3b82f6"/><text x="115" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">🔗 [FromRoute]</text><text x="115" y="42" text-anchor="middle" fill="#bae6fd" font-size="8">From URL path</text><text x="115" y="58" text-anchor="middle" fill="#fff" font-size="8">/api/products/{id}</text><text x="115" y="75" text-anchor="middle" fill="#bae6fd" font-size="7">id = 5 from /api/products/5</text><rect x="230" y="5" width="200" height="80" rx="8" fill="#10b981"/><text x="330" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">❓ [FromQuery]</text><text x="330" y="42" text-anchor="middle" fill="#d1fae5" font-size="8">From query string</text><text x="330" y="58" text-anchor="middle" fill="#fff" font-size="8">/api/products?page=2&size=10</text><text x="330" y="75" text-anchor="middle" fill="#d1fae5" font-size="7">page=2, size=10</text><rect x="10" y="95" width="210" height="80" rx="8" fill="#f59e0b"/><text x="115" y="115" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">📨 [FromBody]</text><text x="115" y="132" text-anchor="middle" fill="#fef3c7" font-size="8">From JSON request body</text><text x="115" y="148" text-anchor="middle" fill="#fff" font-size="8">{"name":"Laptop","price":50000}</text><text x="115" y="165" text-anchor="middle" fill="#fef3c7" font-size="7">Used for POST/PUT</text><rect x="230" y="95" width="200" height="80" rx="8" fill="#8b5cf6"/><text x="330" y="115" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">📥 [FromHeader]</text><text x="330" y="132" text-anchor="middle" fill="#ede9fe" font-size="8">From HTTP headers</text><text x="330" y="148" text-anchor="middle" fill="#fff" font-size="8">Authorization: Bearer token</text><text x="330" y="165" text-anchor="middle" fill="#ede9fe" font-size="7">Used for auth, custom headers</text></svg><h4>💻 Code Example</h4><div class="code">[HttpGet(<span class="str">"{id}"</span>)]<br><span class="kw">public</span> IActionResult Get(<br>&nbsp;&nbsp;[FromRoute] <span class="kw">int</span> id, <span class="cm">// /api/products/5</span><br>&nbsp;&nbsp;[FromQuery] <span class="kw">string</span> search, <span class="cm">// ?search=laptop</span><br>&nbsp;&nbsp;[FromHeader(Name = <span class="str">"X-Api-Key"</span>)] <span class="kw">string</span> apiKey<br>) { ... }<br><br>[HttpPost]<br><span class="kw">public</span> IActionResult Create(<br>&nbsp;&nbsp;[FromBody] Product product <span class="cm">// JSON body</span><br>) { ... }</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">[FromRoute]</span> reads from URL path (/products/{id}). <span class="key">[FromQuery]</span> reads from query string (?key=value). <span class="key">[FromBody]</span> reads from request body (JSON). <span class="key">[FromHeader]</span> reads from HTTP headers. With [ApiController], complex types auto-bind from body, simple types from route/query."</p>'},
{q:"What is Swagger/OpenAPI? How do you configure it?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Swagger</b> is a tool that <b>auto-generates interactive API documentation</b>. You can see all your endpoints, test them directly in the browser, and share docs with frontend developers. <b>OpenAPI</b> is the specification standard.</p><svg viewBox="0 0 440 140" style="max-width:440px"><rect x="10" y="10" width="130" height="110" rx="8" fill="#64748b"/><text x="75" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">💻 Your API Code</text><text x="75" y="50" text-anchor="middle" fill="#e2e8f0" font-size="7">[HttpGet]</text><text x="75" y="63" text-anchor="middle" fill="#e2e8f0" font-size="7">[HttpPost]</text><text x="75" y="76" text-anchor="middle" fill="#e2e8f0" font-size="7">[HttpPut]</text><text x="75" y="89" text-anchor="middle" fill="#e2e8f0" font-size="7">[HttpDelete]</text><text x="75" y="110" text-anchor="middle" fill="#e2e8f0" font-size="6">Controllers + Models</text><text x="170" y="65" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">→ AUTO →</text><rect x="210" y="10" width="220" height="110" rx="8" fill="#10b981"/><text x="320" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">📚 Swagger UI</text><text x="320" y="50" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Lists all endpoints</text><text x="320" y="65" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Shows request/response models</text><text x="320" y="80" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Try It Out button (test live!)</text><text x="320" y="95" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Auto-generated from code</text><text x="320" y="112" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">/swagger/index.html</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - already included in .NET 6+ template!</span><br>builder.Services.AddEndpointsApiExplorer();<br>builder.Services.AddSwaggerGen(); <span class="cm">// Add Swagger</span><br><br><span class="kw">if</span>(app.Environment.IsDevelopment()) {<br>&nbsp;&nbsp;app.UseSwagger();<br>&nbsp;&nbsp;app.UseSwaggerUI(); <span class="cm">// /swagger/index.html</span><br>}<br><br><span class="cm">// Add XML comments for better docs</span><br><span class="cm">// [ProducesResponseType(typeof(Product), 200)]</span><br><span class="cm">// /// &lt;summary&gt;Gets product by ID&lt;/summary&gt;</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Swagger/OpenAPI</span> auto-generates interactive API documentation from your code. It shows all endpoints, request/response models, and lets you test APIs directly. In .NET 6+, its included by default using <b>Swashbuckle</b> package. Configure with AddSwaggerGen() and UseSwaggerUI(). Access at <b>/swagger</b>."</p>'},
{q:"What is the difference between IActionResult and ActionResult<T>?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>IActionResult</b> = can return <b>any type</b> of response (flexible but no type info).<br><b>ActionResult&lt;T&gt;</b> = returns <b>specific type OR error</b> (type-safe, better for Swagger docs).</p><svg viewBox="0 0 440 150" style="max-width:440px"><rect x="10" y="5" width="200" height="135" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">IActionResult</text><text x="110" y="48" text-anchor="middle" fill="#334155" font-size="8">✅ Can return anything</text><text x="110" y="63" text-anchor="middle" fill="#334155" font-size="8">✅ Ok(), NotFound(), etc.</text><text x="110" y="78" text-anchor="middle" fill="#334155" font-size="8">❌ No type information</text><text x="110" y="93" text-anchor="middle" fill="#334155" font-size="8">❌ Swagger cant show model</text><text x="110" y="115" text-anchor="middle" fill="#1e40af" font-size="7">IActionResult Get()</text><text x="110" y="130" text-anchor="middle" fill="#64748b" font-size="7">Flexible but less info</text><rect x="230" y="5" width="200" height="135" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="11">ActionResult&lt;T&gt; ⭐</text><text x="330" y="48" text-anchor="middle" fill="#334155" font-size="8">✅ Returns T or error</text><text x="330" y="63" text-anchor="middle" fill="#334155" font-size="8">✅ Type-safe</text><text x="330" y="78" text-anchor="middle" fill="#334155" font-size="8">✅ Swagger shows model</text><text x="330" y="93" text-anchor="middle" fill="#334155" font-size="8">✅ Better documentation</text><text x="330" y="115" text-anchor="middle" fill="#16a34a" font-size="7">ActionResult&lt;Product&gt; Get()</text><text x="330" y="130" text-anchor="middle" fill="#16a34a" font-size="7" font-weight="600">Preferred for APIs!</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// IActionResult - flexible, no type info</span><br>[HttpGet(<span class="str">"{id}"</span>)]<br><span class="kw">public</span> IActionResult Get(<span class="kw">int</span> id) {<br>&nbsp;&nbsp;<span class="kw">var</span> product = _db.Find(id);<br>&nbsp;&nbsp;<span class="kw">if</span>(product == <span class="kw">null</span>) <span class="kw">return</span> NotFound();<br>&nbsp;&nbsp;<span class="kw">return</span> Ok(product);<br>}<br><br><span class="cm">// ActionResult&lt;T&gt; - type-safe, Swagger friendly ⭐</span><br>[HttpGet(<span class="str">"{id}"</span>)]<br><span class="kw">public</span> ActionResult&lt;Product&gt; Get(<span class="kw">int</span> id) {<br>&nbsp;&nbsp;<span class="kw">var</span> product = _db.Find(id);<br>&nbsp;&nbsp;<span class="kw">if</span>(product == <span class="kw">null</span>) <span class="kw">return</span> NotFound();<br>&nbsp;&nbsp;<span class="kw">return</span> product; <span class="cm">// implicit Ok(product)</span><br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">IActionResult</span> is a general return type that can return any action result. <span class="key">ActionResult&lt;T&gt;</span> is type-safe — it can return either the specified type T or an error result. ActionResult&lt;T&gt; is preferred for APIs because Swagger can auto-detect the response model, and you can return the object directly without wrapping in Ok()."</p>'},
{q:"What is Routing in Web API? Attribute Routing?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Routing</b> maps incoming URLs to the correct controller action. <b>Attribute Routing</b> uses [Route] and [HttpGet] attributes directly on controllers — the standard for Web APIs.</p><h4>💻 Code Example</h4><div class="code">[ApiController]<br>[Route(<span class="str">"api/[controller]"</span>)] <span class="cm">// api/products</span><br><span class="kw">public class</span> ProductsController : ControllerBase {<br><br>&nbsp;&nbsp;[HttpGet] <span class="cm">// GET api/products</span><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult GetAll() { }<br><br>&nbsp;&nbsp;[HttpGet(<span class="str">"{id}"</span>)] <span class="cm">// GET api/products/5</span><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Get(<span class="kw">int</span> id) { }<br><br>&nbsp;&nbsp;[HttpGet(<span class="str">"category/{catId}"</span>)] <span class="cm">// GET api/products/category/3</span><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult ByCategory(<span class="kw">int</span> catId) { }<br><br>&nbsp;&nbsp;[HttpGet(<span class="str">"search"</span>)] <span class="cm">// GET api/products/search?name=laptop</span><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Search([FromQuery] <span class="kw">string</span> name) { }<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Attribute Routing</span> uses [Route] on controllers and [HttpGet/Post/Put/Delete] on actions. [controller] token auto-maps to class name. Route parameters use {id} syntax. Attribute routing is the standard for Web APIs — gives full control over URL structure."</p>'},
{q:"What is CORS? Why is it needed and how to configure?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>CORS</b> = browser blocks requests from a <b>different domain</b> for security. Your React app on localhost:3000 calling API on localhost:5000 gets blocked. CORS tells the browser "allow this."</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs</span><br>builder.Services.AddCors(options =&gt; {<br>&nbsp;&nbsp;options.AddPolicy(<span class="str">"MyPolicy"</span>, policy =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;policy.WithOrigins(<span class="str">"https://myapp.com"</span>, <span class="str">"http://localhost:3000"</span>)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.AllowAnyHeader()<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.AllowAnyMethod()<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.AllowCredentials();<br>&nbsp;&nbsp;});<br>});<br><br>app.UseCors(<span class="str">"MyPolicy"</span>); <span class="cm">// before MapControllers!</span><br><br><span class="cm">// Or per controller</span><br>[EnableCors(<span class="str">"MyPolicy"</span>)]<br><span class="kw">public class</span> ApiController { }</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">CORS</span> is a browser security feature that blocks cross-origin requests. Configure with AddCors() specifying allowed <span class="key">origins</span>, <span class="key">headers</span>, and <span class="key">methods</span>. Apply globally with UseCors() or per-controller with [EnableCors]. Never use AllowAnyOrigin in production."</p>'},
{q:"What is the difference between Web API and WCF?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>WCF</b> = old, heavy, supports multiple protocols (HTTP, TCP, MSMQ). <b>Web API</b> = modern, lightweight, HTTP only, RESTful. Web API replaced WCF for most scenarios.</p><h4>💻 Key Differences</h4><div class="code"><span class="cm">// WCF (Old - avoid for new projects)</span><br><span class="cm">- SOAP + XML based</span><br><span class="cm">- Complex configuration (web.config)</span><br><span class="cm">- Multiple protocols (HTTP, TCP, Named Pipes)</span><br><span class="cm">- Contract-based ([ServiceContract], [OperationContract])</span><br><span class="cm">- Heavy, complex</span><br><br><span class="cm">// Web API (Modern ⭐)</span><br><span class="cm">- REST + JSON based</span><br><span class="cm">- Simple configuration</span><br><span class="cm">- HTTP only (use gRPC for TCP-like speed)</span><br><span class="cm">- Convention-based (Controllers, [HttpGet])</span><br><span class="cm">- Lightweight, fast</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">WCF</span> is SOAP-based, supports multiple protocols, complex configuration — legacy. <span class="key">Web API</span> is REST-based, HTTP/JSON, lightweight, easy to consume from any client. For new projects, always use Web API. For TCP-like performance, use <span class="key">gRPC</span> instead of WCF."</p>'},
// Intermediate
{q:"What is JWT Authentication? How do you implement it?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>JWT</b> (JSON Web Token) is a token with 3 parts: <b>Header.Payload.Signature</b>. Client sends it in every request. Server validates the signature without storing sessions — stateless!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Login endpoint - generate token</span><br>[HttpPost(<span class="str">"login"</span>)]<br><span class="kw">public</span> IActionResult Login(LoginDto dto) {<br>&nbsp;&nbsp;<span class="kw">if</span>(!ValidateUser(dto)) <span class="kw">return</span> Unauthorized();<br>&nbsp;&nbsp;<span class="kw">var</span> claims = <span class="kw">new</span>[] {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">new</span> Claim(ClaimTypes.Name, dto.Username),<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">new</span> Claim(ClaimTypes.Role, <span class="str">"Admin"</span>)<br>&nbsp;&nbsp;};<br>&nbsp;&nbsp;<span class="kw">var</span> token = <span class="kw">new</span> JwtSecurityToken(<br>&nbsp;&nbsp;&nbsp;&nbsp;issuer: <span class="str">"myapp"</span>, claims: claims,<br>&nbsp;&nbsp;&nbsp;&nbsp;expires: DateTime.Now.AddHours(1),<br>&nbsp;&nbsp;&nbsp;&nbsp;signingCredentials: creds);<br>&nbsp;&nbsp;<span class="kw">return</span> Ok(<span class="kw">new</span> { token = <span class="kw">new</span> JwtSecurityTokenHandler().WriteToken(token) });<br>}<br><br><span class="cm">// 2. Client sends: Authorization: Bearer eyJhbG...</span><br><span class="cm">// 3. [Authorize] validates token automatically</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">JWT</span> has Header (algorithm), Payload (claims), Signature (verification). On login, server generates token. Client sends in <span class="key">Authorization: Bearer</span> header. Server validates signature and expiry. Stateless — no server session. Configure with AddJwtBearer() in Program.cs."</p>'},
{q:"What is OAuth 2.0? Explain Authorization Code, Client Credentials flow.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>OAuth 2.0</b> is a standard for <b>delegated authorization</b>. Instead of sharing your password, you give limited access via tokens. Like giving a valet key — they can drive but cant open the trunk.</p><h4>💻 Flows</h4><div class="code"><span class="cm">// 1. Authorization Code Flow (for web apps with users)</span><br><span class="cm">// User → Login page (Google/Azure) → Gets auth code</span><br><span class="cm">// App exchanges code for access token</span><br><span class="cm">// Most secure for user-facing apps</span><br><br><span class="cm">// 2. Client Credentials Flow (for service-to-service)</span><br><span class="cm">// No user involved! App authenticates itself</span><br><span class="cm">// App sends clientId + clientSecret → gets token</span><br><span class="kw">var</span> token = <span class="kw">await</span> httpClient.PostAsync(<span class="str">"https://auth.server/token"</span>,<br>&nbsp;&nbsp;<span class="kw">new</span> FormUrlEncodedContent(<span class="kw">new</span>[] {<br>&nbsp;&nbsp;&nbsp;&nbsp;{ <span class="str">"grant_type"</span>, <span class="str">"client_credentials"</span> },<br>&nbsp;&nbsp;&nbsp;&nbsp;{ <span class="str">"client_id"</span>, <span class="str">"myapp"</span> },<br>&nbsp;&nbsp;&nbsp;&nbsp;{ <span class="str">"client_secret"</span>, <span class="str">"secret"</span> }<br>&nbsp;&nbsp;}));</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">OAuth 2.0</span> provides delegated authorization. <span class="key">Authorization Code</span> flow is for user-facing apps — user logs in, app gets code, exchanges for token. <span class="key">Client Credentials</span> is for service-to-service — no user, app authenticates with clientId/secret. Other flows: Implicit (deprecated), PKCE (for SPAs/mobile)."</p>'},
{q:"What is the difference between Authentication and Authorization?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Authentication</b> = <b>WHO are you?</b> (verify identity — login).<br><b>Authorization</b> = <b>WHAT can you do?</b> (check permissions — access control).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Authentication: verify identity (JWT, Cookie)</span><br>app.UseAuthentication(); <span class="cm">// WHO are you?</span><br><br><span class="cm">// Authorization: check permissions</span><br>app.UseAuthorization(); <span class="cm">// CAN you access this?</span><br><br>[Authorize] <span class="cm">// must be logged in (authenticated)</span><br><span class="kw">public</span> IActionResult Profile() { }<br><br>[Authorize(Roles = <span class="str">"Admin"</span>)] <span class="cm">// must be Admin (authorized)</span><br><span class="kw">public</span> IActionResult DeleteUser() { }<br><br>[AllowAnonymous] <span class="cm">// anyone can access</span><br><span class="kw">public</span> IActionResult Login() { }<br><br><span class="cm">// 401 Unauthorized = not authenticated (login first!)</span><br><span class="cm">// 403 Forbidden = authenticated but not authorized (no permission!)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Authentication</span> verifies identity (WHO) — returns 401 if failed. <span class="key">Authorization</span> checks permissions (WHAT) — returns 403 if denied. Authentication always comes first. In ASP.NET Core: UseAuthentication() before UseAuthorization(). Support Role-based, Claims-based, and Policy-based authorization."</p>'},
{q:"What are Action Filters? How do you create custom filters?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Action Filters</b> run code <b>before and after</b> an action method executes. Used for logging, validation, caching — cross-cutting concerns without repeating code in every action.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Custom Action Filter</span><br><span class="kw">public class</span> LogExecutionTimeFilter : IActionFilter {<br>&nbsp;&nbsp;<span class="kw">private</span> Stopwatch _sw;<br><br>&nbsp;&nbsp;<span class="kw">public void</span> OnActionExecuting(ActionExecutingContext ctx) {<br>&nbsp;&nbsp;&nbsp;&nbsp;_sw = Stopwatch.StartNew(); <span class="cm">// before action</span><br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public void</span> OnActionExecuted(ActionExecutedContext ctx) {<br>&nbsp;&nbsp;&nbsp;&nbsp;_sw.Stop();<br>&nbsp;&nbsp;&nbsp;&nbsp;Log.Info($<span class="str">"{ctx.ActionDescriptor.DisplayName}: {_sw.ElapsedMilliseconds}ms"</span>);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Apply per action</span><br>[ServiceFilter(<span class="kw">typeof</span>(LogExecutionTimeFilter))]<br><span class="kw">public</span> IActionResult Get() { }<br><br><span class="cm">// Apply globally</span><br>builder.Services.AddControllers(o =&gt; o.Filters.Add&lt;LogExecutionTimeFilter&gt;());</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Action Filters</span> implement IActionFilter with OnActionExecuting (before) and OnActionExecuted (after). Apply per-action with [ServiceFilter], per-controller, or globally. Used for: logging, performance tracking, validation, caching. Also: IAsyncActionFilter for async version."</p>'},
{q:"How do you implement Global Exception Handling in Web API?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>Instead of try-catch in every controller, create <b>one middleware</b> that catches ALL unhandled exceptions and returns a consistent JSON error response.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Custom Exception Middleware</span><br><span class="kw">public class</span> ExceptionMiddleware {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> RequestDelegate _next;<br>&nbsp;&nbsp;<span class="kw">public async</span> Task InvokeAsync(HttpContext ctx) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">try</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> _next(ctx);<br>&nbsp;&nbsp;&nbsp;&nbsp;} <span class="kw">catch</span>(NotFoundException ex) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ctx.Response.StatusCode = 404;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> ctx.Response.WriteAsJsonAsync(<span class="kw">new</span> { error = ex.Message });<br>&nbsp;&nbsp;&nbsp;&nbsp;} <span class="kw">catch</span>(Exception ex) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ctx.Response.StatusCode = 500;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> ctx.Response.WriteAsJsonAsync(<span class="kw">new</span> { error = <span class="str">"Internal error"</span> });<br>&nbsp;&nbsp;&nbsp;&nbsp;}<br>&nbsp;&nbsp;}<br>}<br><br>app.UseMiddleware&lt;ExceptionMiddleware&gt;(); <span class="cm">// add FIRST!</span></div><h4>🗣️ Interview Answer</h4><p>"Create custom <span class="key">Exception Middleware</span> that wraps the pipeline in try-catch. Map exception types to HTTP status codes (NotFoundException→404, ValidationException→400). Return consistent <span class="key">ProblemDetails</span> JSON format. Add as first middleware. .NET 8+ has built-in app.UseExceptionHandler() with ProblemDetails."</p>'},
{q:"What is API Versioning? Explain URL, Query String, Header versioning.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>API Versioning</b> lets old and new clients use <b>different versions</b> of your API simultaneously. Three ways to specify the version.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. URL Path versioning (most popular ⭐)</span><br><span class="cm">// /api/v1/products</span><br><span class="cm">// /api/v2/products</span><br>[Route(<span class="str">"api/v{version:apiVersion}/[controller]"</span>)]<br><br><span class="cm">// 2. Query String versioning</span><br><span class="cm">// /api/products?api-version=2.0</span><br><br><span class="cm">// 3. Header versioning</span><br><span class="cm">// Header: X-Api-Version: 2.0</span><br><br><span class="cm">// Setup</span><br>builder.Services.AddApiVersioning(o =&gt; {<br>&nbsp;&nbsp;o.DefaultApiVersion = <span class="kw">new</span> ApiVersion(1, 0);<br>&nbsp;&nbsp;o.AssumeDefaultVersionWhenUnspecified = <span class="kw">true</span>;<br>&nbsp;&nbsp;o.ReportApiVersions = <span class="kw">true</span>; <span class="cm">// adds header in response</span><br>});</div><h4>🗣️ Interview Answer</h4><p>"Three approaches: <span class="key">URL path</span> (/api/v1/ — most common, clear), <span class="key">Query string</span> (?api-version=2 — easy to add), <span class="key">Header</span> (X-Api-Version — clean URL but hidden). URL path is preferred for public APIs. Use Asp.Versioning.Mvc package. Deprecate old versions with [ApiVersion(\"1.0\", Deprecated=true)]."</p>'},
{q:"What is the difference between Minimal APIs and Controller-based APIs?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Controller-based</b> = traditional classes with [HttpGet] etc. <b>Minimal APIs</b> = define endpoints directly in Program.cs. Less code for simple APIs.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Controller-based (traditional)</span><br>[ApiController]<br>[Route(<span class="str">"api/products"</span>)]<br><span class="kw">public class</span> ProductsController : ControllerBase {<br>&nbsp;&nbsp;[HttpGet] <span class="kw">public</span> IActionResult Get() =&gt; Ok(products);<br>&nbsp;&nbsp;[HttpPost] <span class="kw">public</span> IActionResult Create(Product p) =&gt; Created(...);<br>}<br><br><span class="cm">// Minimal API (same thing, less code!)</span><br>app.MapGet(<span class="str">"/api/products"</span>, (AppDb db) =&gt; db.Products.ToList());<br>app.MapPost(<span class="str">"/api/products"</span>, (AppDb db, Product p) =&gt; {<br>&nbsp;&nbsp;db.Add(p); db.SaveChanges();<br>&nbsp;&nbsp;<span class="kw">return</span> Results.Created($<span class="str">"/api/products/{p.Id}"</span>, p);<br>});</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Controller-based</span> uses classes, filters, model binding attributes — better for complex APIs. <span class="key">Minimal APIs</span> use MapGet/MapPost inline — less boilerplate, faster startup, good for microservices. Both support DI, auth, validation. Choose based on project complexity."</p>'},
{q:"What is HttpClient? How do you use IHttpClientFactory?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>HttpClient</b> makes HTTP calls to external APIs. But creating new HttpClient() each time causes <b>socket exhaustion</b>. <b>IHttpClientFactory</b> manages HttpClient instances properly.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - socket exhaustion!</span><br><span class="kw">using var</span> client = <span class="kw">new</span> HttpClient(); <span class="cm">// dont do this in a loop!</span><br><br><span class="cm">// ✅ GOOD - IHttpClientFactory</span><br><span class="cm">// Program.cs - register named client</span><br>builder.Services.AddHttpClient(<span class="str">"GitHub"</span>, c =&gt; {<br>&nbsp;&nbsp;c.BaseAddress = <span class="kw">new</span> Uri(<span class="str">"https://api.github.com"</span>);<br>&nbsp;&nbsp;c.DefaultRequestHeaders.Add(<span class="str">"User-Agent"</span>, <span class="str">"MyApp"</span>);<br>});<br><br><span class="cm">// Use in service</span><br><span class="kw">public class</span> GitHubService {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> HttpClient _client;<br>&nbsp;&nbsp;<span class="kw">public</span> GitHubService(IHttpClientFactory factory) {<br>&nbsp;&nbsp;&nbsp;&nbsp;_client = factory.CreateClient(<span class="str">"GitHub"</span>);<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">public async</span> Task&lt;<span class="kw">string</span>&gt; GetRepos()<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; <span class="kw">await</span> _client.GetStringAsync(<span class="str">"/users/arjun/repos"</span>);<br>}</div><h4>🗣️ Interview Answer</h4><p>"Never create HttpClient with new — causes socket exhaustion. Use <span class="key">IHttpClientFactory</span> which manages connection pooling and lifetime. Three patterns: <span class="key">Named clients</span> (factory.CreateClient(name)), <span class="key">Typed clients</span> (inject HttpClient in constructor), <span class="key">Basic</span> (factory.CreateClient()). Add Polly for retry/circuit breaker."</p>'},
{q:"What is the difference between Synchronous and Asynchronous API calls?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Synchronous</b> = thread <b>waits/blocks</b> until response comes. <b>Asynchronous</b> = thread is <b>freed</b> while waiting, can handle other requests. Async = more scalable!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ Synchronous - thread BLOCKED while waiting</span><br><span class="kw">public</span> IActionResult GetProducts() {<br>&nbsp;&nbsp;<span class="kw">var</span> data = _db.Products.ToList(); <span class="cm">// thread waits...</span><br>&nbsp;&nbsp;<span class="kw">return</span> Ok(data);<br>}<br><br><span class="cm">// ✅ Asynchronous - thread FREE while waiting</span><br><span class="kw">public async</span> Task&lt;IActionResult&gt; GetProducts() {<br>&nbsp;&nbsp;<span class="kw">var</span> data = <span class="kw">await</span> _db.Products.ToListAsync(); <span class="cm">// thread freed!</span><br>&nbsp;&nbsp;<span class="kw">return</span> Ok(data);<br>}<br><br><span class="cm">// With 100 concurrent requests:</span><br><span class="cm">// Sync: needs 100 threads (may run out!)</span><br><span class="cm">// Async: needs ~5 threads (reused!) ✅</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Synchronous</span> blocks the thread until I/O completes — wastes resources. <span class="key">Asynchronous</span> frees the thread during I/O wait — handles more concurrent requests with fewer threads. Always use async for I/O operations (DB, HTTP, file). Use async Task&lt;IActionResult&gt; with await."</p>'},
{q:"What is Request/Response Pipeline in ASP.NET Core?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>Every HTTP request flows through a <b>chain of middleware</b> components. Each can process, modify, or short-circuit the request. Response flows back through the same chain in reverse.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Request flows DOWN through middleware</span><br><span class="cm">// Response flows UP back through same middleware</span><br><br>app.UseExceptionHandler(); <span class="cm">// 1st ↓ catches errors on way up ↑</span><br>app.UseHttpsRedirection(); <span class="cm">// 2nd ↓</span><br>app.UseCors(); <span class="cm">// 3rd ↓</span><br>app.UseAuthentication(); <span class="cm">// 4th ↓ who are you?</span><br>app.UseAuthorization(); <span class="cm">// 5th ↓ can you access?</span><br>app.MapControllers(); <span class="cm">// 6th ↓ endpoint (controller action)</span><br><br><span class="cm">// Custom middleware</span><br>app.Use(<span class="kw">async</span> (ctx, next) =&gt; {<br>&nbsp;&nbsp;Log.Info(<span class="str">"Request: "</span> + ctx.Request.Path); <span class="cm">// ↓ going in</span><br>&nbsp;&nbsp;<span class="kw">await</span> next(); <span class="cm">// call next middleware</span><br>&nbsp;&nbsp;Log.Info(<span class="str">"Response: "</span> + ctx.Response.StatusCode); <span class="cm">// ↑ coming back</span><br>});</div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">request pipeline</span> is a chain of middleware. Request flows down, response flows back up. <span class="key">Order matters</span> — exception handling first, then HTTPS, CORS, auth, then endpoints. Each middleware calls next() to pass to the next or short-circuits by returning directly."</p>'},
