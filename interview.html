// Basics
{q:"What is ASP.NET MVC? Explain the MVC pattern.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; ASP.NET MVC is a web framework that follows the <span class="key">Model-View-Controller</span> pattern.<br>&#9733; <span class="key">Model</span> holds data and business logic, <span class="key">View</span> renders the UI (HTML), and <span class="key">Controller</span> handles user requests, gets data from Model, and returns the View.<br>&#9733; This separation makes code clean, testable, and maintainable.</div><div class="tip">💡 <b>Flow:</b> User clicks → Controller receives request → Gets data from Model → Passes to View → HTML sent to browser</div>'},
{q:"What is the difference between ASP.NET MVC and Web Forms?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Web Forms</span> uses event-driven model with ViewState, server controls, and code-behind — hard to test and heavy.<br>&#9733; <span class="key">MVC</span> uses clean separation with Controllers, Views, Models — lightweight, full HTML control, SEO-friendly URLs, and easy to unit test.<br>&#9733; MVC is the modern approach.</div><div class="tip">💡 <b>Note:</b> Web Forms is dead. Microsoft no longer develops it. Always say you prefer MVC/Core in interviews!</div>'},
{q:"What is a Controller? What is its role?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Controller</span> is a class that inherits from Controller base class.<br>&#9733; It contains <span class="key">Action Methods</span> that handle HTTP requests.<br>&#9733; It receives the request, interacts with the Model for data, and returns an <span class="key">ActionResult</span> (View, JSON, Redirect, etc.).<br>&#9733; Each public method in a controller is an action.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">public class</span> HomeController : Controller {<br><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Index() { <span class="cm">// Action method</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">var</span> products = _db.Products.ToList();<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> View(products); <span class="cm">// Returns HTML view</span><br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Details(<span class="kw">int</span> id) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">var</span> product = _db.Products.Find(id);<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(product == <span class="kw">null</span>) <span class="kw">return</span> NotFound();<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> View(product);<br>&nbsp;&nbsp;}<br>}</div>'},
{q:"What is a View? What is Razor syntax?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">View</span> is a .cshtml file that generates HTML for the browser.<br>&#9733; <span class="key">Razor</span> is the view engine that allows mixing C# with HTML using the <b>@</b> symbol.<br>&#9733; You can use @Model to access data, @if/@foreach for logic, and @Html helpers for forms.<br>&#9733; Views are stored in the Views folder following the convention Views/ControllerName/ActionName.cshtml.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">&lt;!-- Views/Home/Index.cshtml --&gt;</span><br>@model List&lt;Product&gt;<br><br>&lt;h1&gt;Products&lt;/h1&gt;<br><br>@<span class="kw">if</span>(Model.Any()) {<br>&nbsp;&nbsp;&lt;ul&gt;<br>&nbsp;&nbsp;@<span class="kw">foreach</span>(<span class="kw">var</span> p <span class="kw">in</span> Model) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;li&gt;@p.Name - ₹@p.Price&lt;/li&gt;<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;&lt;/ul&gt;<br>} <span class="kw">else</span> {<br>&nbsp;&nbsp;&lt;p&gt;No products found&lt;/p&gt;<br>}</div>'},
{q:"What is a Model? Explain Model Binding.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Model</span> is a class that represents data and business rules.<br>&#9733; <span class="key">Model Binding</span> automatically maps incoming request data (form fields, query strings, route data, JSON body) to action method parameters or model objects.<br>&#9733; It matches by <b>property name</b>.<br>&#9733; We validate using <span class="key">ModelState.IsValid</span> with Data Annotations.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Model class</span><br><span class="kw">public class</span> User {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public string</span> Email { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public int</span> Age { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// Model Binding - auto maps form/JSON to User</span><br>[HttpPost]<br><span class="kw">public</span> IActionResult Create(User user) { <span class="cm">// ✅ Auto bound!</span><br>&nbsp;&nbsp;<span class="kw">if</span>(ModelState.IsValid) {<br>&nbsp;&nbsp;&nbsp;&nbsp;_db.Users.Add(user);<br>&nbsp;&nbsp;&nbsp;&nbsp;_db.SaveChanges();<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">return</span> View(user);<br>}</div><div class="tip">💡 <b>Binding sources:</b> [FromBody] = JSON, [FromQuery] = ?key=val, [FromRoute] = /user/{id}, [FromForm] = form post</div>'},
{q:"What is Routing? Explain Attribute Routing vs Convention Routing.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Routing</span> maps URLs to Controller actions.<br>&#9733; <span class="key">Convention routing</span> defines a global pattern like {controller}/{action}/{id?} in Program.cs.<br>&#9733; <span class="key">Attribute routing</span> uses [Route] and [HttpGet] attributes directly on controllers/actions for custom URLs.<br>&#9733; Attribute routing is preferred for Web APIs, convention routing for MVC views.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Convention Routing (Program.cs)</span><br>app.MapControllerRoute(<br>&nbsp;&nbsp;name: <span class="str">"default"</span>,<br>&nbsp;&nbsp;pattern: <span class="str">"{controller=Home}/{action=Index}/{id?}"</span>);<br><br><span class="cm">// Attribute Routing (on Controller)</span><br>[Route(<span class="str">"api/[controller]"</span>)]<br><span class="kw">public class</span> ProductsController : ControllerBase {<br>&nbsp;&nbsp;[HttpGet] <span class="cm">// GET /api/products</span><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult GetAll() { }<br><br>&nbsp;&nbsp;[HttpGet(<span class="str">"{id}"</span>)] <span class="cm">// GET /api/products/5</span><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult GetById(<span class="kw">int</span> id) { }<br>}</div>'},
{q:"What are HTML Helpers? Give examples.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">HTML Helpers</span> are server-side methods that generate HTML in Razor views.<br>&#9733; Examples: <span class="key">Html.TextBoxFor</span>, <span class="key">Html.LabelFor</span>, <span class="key">Html.DropDownListFor</span>, <span class="key">Html.BeginForm</span>.<br>&#9733; They provide model binding, validation support, and anti-forgery tokens automatically.<br>&#9733; In ASP.NET Core, <span class="key">Tag Helpers</span> are the modern replacement.</div><h4>💻 Common Helpers</h4><div class="code"><span class="cm">// Text input</span><br>@Html.TextBoxFor(m =&gt; m.Name)<br><span class="cm">// Generates: &lt;input type="text" name="Name" /&gt;</span><br><br><span class="cm">// Label</span><br>@Html.LabelFor(m =&gt; m.Email)<br><span class="cm">// Generates: &lt;label for="Email"&gt;Email&lt;/label&gt;</span><br><br><span class="cm">// Dropdown</span><br>@Html.DropDownListFor(m =&gt; m.Country, countryList)<br><br><span class="cm">// Form</span><br>@using(Html.BeginForm(<span class="str">"Create"</span>, <span class="str">"User"</span>, FormMethod.Post)) {<br>&nbsp;&nbsp;@Html.TextBoxFor(m =&gt; m.Name)<br>&nbsp;&nbsp;@Html.ValidationMessageFor(m =&gt; m.Name)<br>&nbsp;&nbsp;&lt;button type=<span class="str">"submit"</span>&gt;Save&lt;/button&gt;<br>}</div><div class="tip">💡 <b>Modern way:</b> Use Tag Helpers instead! &lt;input asp-for="Name" /&gt; is cleaner than @Html.TextBoxFor(m =&gt; m.Name)</div>'},
{q:"What is the difference between ViewBag, ViewData, and TempData?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">ViewData</span> is a dictionary that passes data from Controller to View, needs type casting.<br>&#9733; <span class="key">ViewBag</span> is a dynamic wrapper over ViewData, no casting needed.<br>&#9733; Both work for current request only.<br>&#9733; <span class="key">TempData</span> uses session/cookies and survives across requests (redirects) — perfect for success messages after redirect.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Controller</span><br>ViewData[<span class="str">"Title"</span>] = <span class="str">"Home"</span>; <span class="cm">// needs casting in view</span><br>ViewBag.Name = <span class="str">"Arjun"</span>; <span class="cm">// dynamic, no casting</span><br>TempData[<span class="str">"Msg"</span>] = <span class="str">"Saved!"</span>; <span class="cm">// survives redirect</span><br><br><span class="cm">// View</span><br>&lt;h1&gt;@ViewData[<span class="str">"Title"</span>]&lt;/h1&gt;<br>&lt;p&gt;@ViewBag.Name&lt;/p&gt;<br>&lt;p&gt;@TempData[<span class="str">"Msg"</span>]&lt;/p&gt;</div><div class="tip">💡 <b>Best practice:</b> Use strongly-typed <b>ViewModel</b> instead of ViewBag/ViewData. TempData only for redirect messages!</div>'},
{q:"What are Action Results? Name different types.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">ActionResult</span> is the base return type for controller actions.<br>&#9733; Common types: <span class="key">ViewResult</span> (HTML), <span class="key">JsonResult</span> (JSON), <span class="key">RedirectResult</span> (redirect), <span class="key">NotFoundResult</span> (404), <span class="key">FileResult</span> (download), <span class="key">ContentResult</span> (text), <span class="key">StatusCodeResult</span> (custom status).<br>&#9733; In .NET Core, we use <b>IActionResult</b> or <b>ActionResult&lt;T&gt;</b>.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">public</span> IActionResult Index() =&gt; View(); <span class="cm">// HTML</span><br><span class="kw">public</span> IActionResult GetData() =&gt; Json(products); <span class="cm">// JSON</span><br><span class="kw">public</span> IActionResult Save() =&gt; RedirectToAction(<span class="str">"Index"</span>);<br><span class="kw">public</span> IActionResult Find(<span class="kw">int</span> id) =&gt; NotFound(); <span class="cm">// 404</span><br><span class="kw">public</span> IActionResult Download() =&gt; File(bytes, <span class="str">"application/pdf"</span>);</div>'},
{q:"What is the difference between GET and POST?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">GET</span> retrieves data, sends parameters in URL, is idempotent, and can be cached/bookmarked.<br>&#9733; <span class="key">POST</span> submits data in the request body, is not idempotent, and is used for create/update operations.<br>&#9733; GET for reading, POST for writing.<br>&#9733; Always use <span class="key">[ValidateAntiForgeryToken]</span> with POST to prevent CSRF attacks.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// GET - fetch data</span><br>[HttpGet]<br><span class="kw">public</span> IActionResult Index() {<br>&nbsp;&nbsp;<span class="kw">var</span> products = _db.Products.ToList();<br>&nbsp;&nbsp;<span class="kw">return</span> View(products);<br>}<br><br><span class="cm">// POST - submit data</span><br>[HttpPost]<br>[ValidateAntiForgeryToken]<br><span class="kw">public</span> IActionResult Create(Product product) {<br>&nbsp;&nbsp;_db.Products.Add(product);<br>&nbsp;&nbsp;_db.SaveChanges();<br>&nbsp;&nbsp;<span class="kw">return</span> RedirectToAction(<span class="str">"Index"</span>);<br>}</div><div class="tip">💡 <b>Idempotent:</b> GET called 10 times = same result. POST called 10 times = may create 10 records! Thats why POST is not idempotent.</div>'},
{q:"What is Layout in MVC? How does _Layout.cshtml work?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Layout</span> is a master page template in _Layout.cshtml.<br>&#9733; <span class="key">@RenderBody()</span> renders the child view content.<br>&#9733; <span class="key">@RenderSection()</span> renders optional sections like scripts.<br>&#9733; Set in _ViewStart.cshtml for all views or per-view with Layout property.<br>&#9733; Avoids repeating header/footer on every page.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">&lt;!-- Views/Shared/_Layout.cshtml --&gt;</span><br>&lt;html&gt;<br>&lt;head&gt;&lt;title&gt;@ViewData[<span class="str">"Title"</span>]&lt;/title&gt;&lt;/head&gt;<br>&lt;body&gt;<br>&nbsp;&nbsp;&lt;nav&gt;Header / Navbar&lt;/nav&gt;<br>&nbsp;&nbsp;&lt;div class=<span class="str">"container"</span>&gt;<br>&nbsp;&nbsp;&nbsp;&nbsp;@RenderBody() <span class="cm">&lt;!-- page content goes here --&gt;</span><br>&nbsp;&nbsp;&lt;/div&gt;<br>&nbsp;&nbsp;&lt;footer&gt;Footer&lt;/footer&gt;<br>&nbsp;&nbsp;@RenderSection(<span class="str">"Scripts"</span>, required: <span class="kw">false</span>)<br>&lt;/body&gt;<br>&lt;/html&gt;<br><br><span class="cm">&lt;!-- Views/Home/Index.cshtml --&gt;</span><br>@{ Layout = <span class="str">"_Layout"</span>; ViewData[<span class="str">"Title"</span>] = <span class="str">"Home"</span>; }<br>&lt;h1&gt;Welcome!&lt;/h1&gt; <span class="cm">&lt;!-- this goes into @RenderBody() --&gt;</span><br>@section Scripts { &lt;script&gt;...&lt;/script&gt; }</div>'},
{q:"What are Partial Views? When would you use them?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Partial View</span> is a reusable view fragment rendered inside another view.<br>&#9733; Use &lt;partial&gt; tag helper or Html.PartialAsync().<br>&#9733; Used for: reusable UI components, breaking large views into smaller pieces, and AJAX-loaded content.<br>&#9733; Naming convention: prefix with underscore (_ProductCard).</div><h4>💻 Code Example</h4><div class="code"><span class="cm">&lt;!-- Views/Shared/_ProductCard.cshtml (Partial) --&gt;</span><br>@model Product<br>&lt;div class=<span class="str">"card"</span>&gt;<br>&nbsp;&nbsp;&lt;h3&gt;@Model.Name&lt;/h3&gt;<br>&nbsp;&nbsp;&lt;p&gt;Price: @Model.Price&lt;/p&gt;<br>&lt;/div&gt;<br><br><span class="cm">&lt;!-- Use in any view --&gt;</span><br>@foreach(<span class="kw">var</span> p <span class="kw">in</span> Model.Products) {<br>&nbsp;&nbsp;&lt;partial name=<span class="str">"_ProductCard"</span> model=<span class="str">"p"</span> /&gt;<br>}<br><br><span class="cm">&lt;!-- Or using Html helper --&gt;</span><br>@await Html.PartialAsync(<span class="str">"_ProductCard"</span>, product)</div>'},
{q:"What is the wwwroot folder in .NET Core?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">wwwroot</span> is the web root for static files in ASP.NET Core.<br>&#9733; Only files here are publicly accessible via URL.<br>&#9733; Must enable with <span class="key">app.UseStaticFiles()</span> middleware.<br>&#9733; Contains CSS, JS, images, and client-side libraries.<br>&#9733; Files outside wwwroot (like Controllers, Models) are NOT accessible from browser — this is a security feature.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Folder structure</span><br><span class="cm">// wwwroot/</span><br><span class="cm">//   css/site.css</span><br><span class="cm">//   js/app.js</span><br><span class="cm">//   images/logo.png</span><br><span class="cm">//   lib/bootstrap/</span><br><br><span class="cm">// Access in HTML</span><br>&lt;link href=<span class="str">"/css/site.css"</span> rel=<span class="str">"stylesheet"</span> /&gt;<br>&lt;script src=<span class="str">"/js/app.js"</span>&gt;&lt;/script&gt;<br>&lt;img src=<span class="str">"/images/logo.png"</span> /&gt;<br><br><span class="cm">// Enable in Program.cs</span><br>app.UseStaticFiles(); <span class="cm">// MUST add this middleware!</span></div>'},
{q:"What is Program.cs in .NET 6+? Explain Minimal Hosting Model.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; In .NET 6+, <span class="key">Program.cs</span> replaces both Program.cs and Startup.cs using the <span class="key">Minimal Hosting Model</span>.<br>&#9733; Uses top-level statements — no Main method or class needed.<br>&#9733; WebApplication.CreateBuilder() for services, then Build() and configure middleware.<br>&#9733; Simpler, less boilerplate code.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs (.NET 6+ Minimal Hosting)</span><br><span class="kw">var</span> builder = WebApplication.CreateBuilder(args);<br><br><span class="cm">// 1. Register Services (was in Startup.ConfigureServices)</span><br>builder.Services.AddControllers();<br>builder.Services.AddScoped&lt;IProductService, ProductService&gt;();<br>builder.Services.AddDbContext&lt;AppDbContext&gt;();<br>builder.Services.AddSwaggerGen();<br><br><span class="kw">var</span> app = builder.Build();<br><br><span class="cm">// 2. Configure Middleware Pipeline (was in Startup.Configure)</span><br>app.UseHttpsRedirection();<br>app.UseStaticFiles();<br>app.UseAuthentication();<br>app.UseAuthorization();<br>app.MapControllers();<br><br>app.Run();<br><span class="cm">// Thats it! No Startup.cs, no Main method, no class!</span></div>'},
{q:"What is appsettings.json? How do you read configuration?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">appsettings.json</span> stores application configuration.<br>&#9733; Read using <span class="key">IConfiguration</span> injected via DI.<br>&#9733; Supports environment-specific files: appsettings.Development.json, appsettings.Production.json.<br>&#9733; For strongly-typed config, use the <span class="key">Options Pattern</span> with IOptions&lt;T&gt;.<br>&#9733; Connection strings accessed via GetConnectionString().</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// appsettings.json</span><br>{<br>&nbsp;&nbsp;<span class="str">"ConnectionStrings"</span>: {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"Default"</span>: <span class="str">"Server=.;Database=MyDb;..."</span><br>&nbsp;&nbsp;},<br>&nbsp;&nbsp;<span class="str">"AppSettings"</span>: {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"PageSize"</span>: 20,<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"ApiUrl"</span>: <span class="str">"https://api.example.com"</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Read in Program.cs</span><br><span class="kw">var</span> connStr = builder.Configuration.GetConnectionString(<span class="str">"Default"</span>);<br><br><span class="cm">// Read in Controller via IConfiguration</span><br><span class="kw">public class</span> HomeController {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IConfiguration _config;<br>&nbsp;&nbsp;<span class="kw">public</span> HomeController(IConfiguration config) { _config = config; }<br>&nbsp;&nbsp;<span class="kw">var</span> pageSize = _config.GetValue&lt;<span class="kw">int</span>&gt;(<span class="str">"AppSettings:PageSize"</span>);<br>}</div>'},
{q:"What are Tag Helpers? How are they different from HTML Helpers?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Tag Helpers</span> use HTML-like attributes (asp-for, asp-action) instead of C# method calls.<br>&#9733; They are cleaner, IntelliSense-friendly, and work naturally with HTML.<br>&#9733; <span class="key">HTML Helpers</span> use @Html.Method() C# syntax.<br>&#9733; Tag Helpers are preferred in ASP.NET Core.<br>&#9733; Enable with @addTagHelper in _ViewImports.cshtml.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">&lt;!-- HTML Helper (old way) --&gt;</span><br>@Html.TextBoxFor(m =&gt; m.Name, <span class="kw">new</span> { @class = <span class="str">"form-control"</span> })<br>@Html.ActionLink(<span class="str">"Details"</span>, <span class="str">"Details"</span>, <span class="kw">new</span> { id = item.Id })<br><br><span class="cm">&lt;!-- Tag Helper (modern way ⭐) --&gt;</span><br>&lt;input asp-for=<span class="str">"Name"</span> class=<span class="str">"form-control"</span> /&gt;<br>&lt;a asp-action=<span class="str">"Details"</span> asp-route-id=<span class="str">"@item.Id"</span>&gt;Details&lt;/a&gt;<br><br><span class="cm">&lt;!-- Form with Tag Helpers --&gt;</span><br>&lt;form asp-action=<span class="str">"Create"</span> asp-controller=<span class="str">"Product"</span> method=<span class="str">"post"</span>&gt;<br>&nbsp;&nbsp;&lt;label asp-for=<span class="str">"Name"</span>&gt;&lt;/label&gt;<br>&nbsp;&nbsp;&lt;input asp-for=<span class="str">"Name"</span> /&gt;<br>&nbsp;&nbsp;&lt;span asp-validation-for=<span class="str">"Name"</span>&gt;&lt;/span&gt;<br>&nbsp;&nbsp;&lt;button type=<span class="str">"submit"</span>&gt;Save&lt;/button&gt;<br>&lt;/form&gt;</div>'},
{q:"What is the difference between ASP.NET MVC 5 and ASP.NET Core MVC?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">ASP.NET Core MVC</span> is cross-platform, uses Kestrel server, has built-in DI, middleware pipeline, Tag Helpers, and is significantly faster.<br>&#9733; <span class="key">MVC 5</span> is Windows-only, depends on System.Web, uses Global.asax, and requires IIS.<br>&#9733; Core is the future — all new projects should use ASP.NET Core.</div><h4>💻 Key Differences</h4><div class="code"><span class="cm">// MVC 5 (Old)</span><br><span class="cm">- .NET Framework only (Windows)</span><br><span class="cm">- System.Web dependency (heavy)</span><br><span class="cm">- Global.asax + Web.config</span><br><span class="cm">- No built-in DI</span><br><span class="cm">- IIS only</span><br><br><span class="cm">// ASP.NET Core MVC (Modern)</span><br><span class="cm">- Cross-platform (Windows, Linux, Mac)</span><br><span class="cm">- No System.Web (lightweight)</span><br><span class="cm">- Program.cs + appsettings.json</span><br><span class="cm">- Built-in DI container</span><br><span class="cm">- Kestrel + any reverse proxy</span><br><span class="cm">- Middleware pipeline</span><br><span class="cm">- Tag Helpers</span><br><span class="cm">- Much faster performance</span></div>'},
// Intermediate
{q:"What are Filters? Explain Authorization, Action, Result, Exception filters.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Filters</span> execute code at specific pipeline stages.<br>&#9733; Order: <span class="key">Authorization</span> (access check) → <span class="key">Resource</span> (caching) → <span class="key">Action</span> (before/after action) → <span class="key">Exception</span> (error handling) → <span class="key">Result</span> (before/after result).<br>&#9733; Apply per-action, per-controller, or globally.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Authorization Filter - runs FIRST, checks access</span><br>[Authorize(Roles = <span class="str">"Admin"</span>)]<br><span class="kw">public</span> IActionResult AdminPanel() { }<br><br><span class="cm">// 2. Action Filter - runs before/after action method</span><br><span class="kw">public class</span> LogActionFilter : IActionFilter {<br>&nbsp;&nbsp;<span class="kw">public void</span> OnActionExecuting(ActionExecutingContext ctx) {<br>&nbsp;&nbsp;&nbsp;&nbsp;Log.Info(<span class="str">"Before action"</span>);<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">public void</span> OnActionExecuted(ActionExecutedContext ctx) {<br>&nbsp;&nbsp;&nbsp;&nbsp;Log.Info(<span class="str">"After action"</span>);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// 3. Exception Filter - handles unhandled exceptions</span><br><span class="cm">// 4. Result Filter - runs before/after result execution</span><br><br><span class="cm">// Apply globally</span><br>builder.Services.AddControllers(options =&gt; {<br>&nbsp;&nbsp;options.Filters.Add&lt;LogActionFilter&gt;();<br>});</div>'},
{q:"What is Dependency Injection in ASP.NET Core? Explain Transient, Scoped, Singleton.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; ASP.NET Core has built-in DI.<br>&#9733; <span class="key">Transient</span> creates new instance every injection.<br>&#9733; <span class="key">Scoped</span> creates one per HTTP request (most common for DbContext, repos).<br>&#9733; <span class="key">Singleton</span> creates one for the entire app lifetime.<br>&#9733; Never inject Scoped into Singleton — causes captive dependency bug!</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - register services</span><br>builder.Services.AddTransient&lt;IEmailService, EmailService&gt;(); <span class="cm">// new each time</span><br>builder.Services.AddScoped&lt;IProductRepo, ProductRepo&gt;(); <span class="cm">// per request</span><br>builder.Services.AddSingleton&lt;ICacheService, CacheService&gt;(); <span class="cm">// one forever</span></div>'},
{q:"What is Middleware? How does the Request Pipeline work?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Middleware</span> are components in the request pipeline.<br>&#9733; Each can process requests, call next(), or short-circuit.<br>&#9733; <span class="key">Order matters</span> — exception handling first, then HTTPS, static files, auth, then routing.<br>&#9733; Use app.Use() for custom middleware.<br>&#9733; The pipeline is bidirectional — response flows back through the same middleware.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - ORDER MATTERS!</span><br>app.UseExceptionHandler(<span class="str">"/error"</span>); <span class="cm">// 1st - catch errors</span><br>app.UseHttpsRedirection(); <span class="cm">// 2nd - force HTTPS</span><br>app.UseStaticFiles(); <span class="cm">// 3rd - serve CSS/JS</span><br>app.UseAuthentication(); <span class="cm">// 4th - who are you?</span><br>app.UseAuthorization(); <span class="cm">// 5th - can you access?</span><br>app.MapControllers(); <span class="cm">// 6th - route to controller</span><br><br><span class="cm">// Custom middleware</span><br>app.Use(<span class="kw">async</span> (context, next) =&gt; {<br>&nbsp;&nbsp;Log.Info(<span class="str">"Before"</span>);<br>&nbsp;&nbsp;<span class="kw">await</span> next(); <span class="cm">// call next middleware</span><br>&nbsp;&nbsp;Log.Info(<span class="str">"After"</span>);<br>});</div>'},
{q:"What are Areas in MVC? When would you use them?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Areas</span> partition a large MVC app into functional groups, each with its own Controllers, Views, and Models.<br>&#9733; Use [Area] attribute on controllers.<br>&#9733; Useful for separating Admin, API, Customer sections.<br>&#9733; Each area has independent routing and can be developed by different teams.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Folder structure</span><br><span class="cm">// Areas/</span><br><span class="cm">//   Admin/</span><br><span class="cm">//     Controllers/DashboardController.cs</span><br><span class="cm">//     Views/Dashboard/Index.cshtml</span><br><span class="cm">//   Customer/</span><br><span class="cm">//     Controllers/OrderController.cs</span><br><span class="cm">//     Views/Order/Index.cshtml</span><br><br>[Area(<span class="str">"Admin"</span>)]<br><span class="kw">public class</span> DashboardController : Controller {<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Index() =&gt; View();<br>}<br><br><span class="cm">// Route: /Admin/Dashboard/Index</span><br><span class="cm">// Program.cs</span><br>app.MapControllerRoute(<br>&nbsp;&nbsp;name: <span class="str">"areas"</span>,<br>&nbsp;&nbsp;pattern: <span class="str">"{area:exists}/{controller}/{action}"</span>);</div>'},
{q:"What is Entity Framework Core? Code First vs Database First?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">EF Core</span> is an ORM that maps C# classes to database tables.<br>&#9733; <span class="key">Code First</span> — define models in C#, use migrations to create/update DB.<br>&#9733; <span class="key">Database First</span> — scaffold models from existing DB using dotnet ef dbcontext scaffold.<br>&#9733; Code First is preferred for new projects, Database First for legacy databases.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Code First - you write classes</span><br><span class="kw">public class</span> Product {<br>&nbsp;&nbsp;<span class="kw">public int</span> Id { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Price { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// DbContext</span><br><span class="kw">public class</span> AppDbContext : DbContext {<br>&nbsp;&nbsp;<span class="kw">public</span> DbSet&lt;Product&gt; Products { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// Migration creates the table</span><br><span class="cm">// dotnet ef migrations add InitialCreate</span><br><span class="cm">// dotnet ef database update</span><br><br><span class="cm">// CRUD without writing SQL!</span><br>_db.Products.Add(<span class="kw">new</span> Product { Name=<span class="str">"Laptop"</span> });<br><span class="kw">await</span> _db.SaveChangesAsync();</div>'},
{q:"What are Migrations in EF Core? How do you manage them?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Migrations</span> version-control your database schema.<br>&#9733; Commands: <span class="key">add</span> (create migration), <span class="key">update</span> (apply to DB), <span class="key">remove</span> (delete last), <span class="key">script</span> (generate SQL for production).<br>&#9733; Each migration has Up() and Down() methods for applying and reverting changes.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Create migration (after changing model)</span><br>dotnet ef migrations add AddPriceColumn<br><br><span class="cm">// 2. Apply to database</span><br>dotnet ef database update<br><br><span class="cm">// 3. Revert last migration</span><br>dotnet ef migrations remove<br><br><span class="cm">// 4. Revert database to specific migration</span><br>dotnet ef database update PreviousMigrationName<br><br><span class="cm">// 5. Generate SQL script (for production)</span><br>dotnet ef migrations script -o migration.sql<br><br><span class="cm">// Migration file auto-generated:</span><br><span class="kw">public partial class</span> AddPriceColumn : Migration {<br>&nbsp;&nbsp;<span class="kw">protected override void</span> Up(MigrationBuilder mb) {<br>&nbsp;&nbsp;&nbsp;&nbsp;mb.AddColumn&lt;<span class="kw">decimal</span>&gt;(<span class="str">"Price"</span>, <span class="str">"Products"</span>);<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">protected override void</span> Down(MigrationBuilder mb) {<br>&nbsp;&nbsp;&nbsp;&nbsp;mb.DropColumn(<span class="str">"Price"</span>, <span class="str">"Products"</span>);<br>&nbsp;&nbsp;}<br>}</div>'},
{q:"What is the Repository Pattern with EF Core?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Repository Pattern</span> abstracts data access behind an interface.<br>&#9733; Controller depends on IRepository, not DbContext directly.<br>&#9733; Benefits: testability (mock interface), separation of concerns, swap data source easily.<br>&#9733; Some argue EF Core DbContext IS already a repository — adding another layer may be over-engineering for simple apps.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Interface</span><br><span class="kw">interface</span> IProductRepo {<br>&nbsp;&nbsp;Task&lt;List&lt;Product&gt;&gt; GetAllAsync();<br>&nbsp;&nbsp;Task&lt;Product&gt; GetByIdAsync(<span class="kw">int</span> id);<br>&nbsp;&nbsp;Task AddAsync(Product p);<br>&nbsp;&nbsp;Task SaveAsync();<br>}<br><br><span class="cm">// Implementation</span><br><span class="kw">class</span> ProductRepo : IProductRepo {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> AppDbContext _db;<br>&nbsp;&nbsp;<span class="kw">public</span> ProductRepo(AppDbContext db) { _db = db; }<br>&nbsp;&nbsp;<span class="kw">public async</span> Task&lt;List&lt;Product&gt;&gt; GetAllAsync()<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; <span class="kw">await</span> _db.Products.ToListAsync();<br>}<br><br><span class="cm">// Register in DI</span><br>builder.Services.AddScoped&lt;IProductRepo, ProductRepo&gt;();</div>'},
{q:"What is Model Validation? Explain Data Annotations and FluentValidation.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Data Annotations</span> use attributes like [Required], [Range], [StringLength] directly on model properties — simple but limited.<br>&#9733; <span class="key">FluentValidation</span> uses separate validator classes with fluent rules — better for complex validation, testable, follows SRP.<br>&#9733; Check with ModelState.IsValid in controller.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Data Annotations - on the model</span><br><span class="kw">public class</span> Product {<br>&nbsp;&nbsp;[Required(ErrorMessage = <span class="str">"Name is required"</span>)]<br>&nbsp;&nbsp;[StringLength(100)]<br>&nbsp;&nbsp;<span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br><br>&nbsp;&nbsp;[Range(1, 100000)]<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Price { <span class="kw">get</span>; <span class="kw">set</span>; }<br><br>&nbsp;&nbsp;[EmailAddress]<br>&nbsp;&nbsp;<span class="kw">public string</span> Email { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// FluentValidation - separate class (cleaner for complex rules)</span><br><span class="kw">public class</span> ProductValidator : AbstractValidator&lt;Product&gt; {<br>&nbsp;&nbsp;<span class="kw">public</span> ProductValidator() {<br>&nbsp;&nbsp;&nbsp;&nbsp;RuleFor(p =&gt; p.Name).NotEmpty().MaximumLength(100);<br>&nbsp;&nbsp;&nbsp;&nbsp;RuleFor(p =&gt; p.Price).GreaterThan(0);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Check in controller</span><br><span class="kw">if</span>(!ModelState.IsValid) <span class="kw">return</span> BadRequest(ModelState);</div>'},
{q:"What is the difference between AddSingleton, AddScoped, and AddTransient?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Transient</span> — new instance per injection (lightweight stateless services).<br>&#9733; <span class="key">Scoped</span> — one instance per HTTP request (DbContext, repositories).<br>&#9733; <span class="key">Singleton</span> — one instance for app lifetime (cache, config).<br>&#9733; Rule: never inject Scoped into Singleton — causes captive dependency!</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Each request gets a GUID to prove the point</span><br><span class="kw">public class</span> MyService { <span class="kw">public</span> Guid Id = Guid.NewGuid(); }<br><br><span class="cm">// Transient - different Id every injection</span><br>builder.Services.AddTransient&lt;MyService&gt;();<br><span class="cm">// Inject twice in same request = 2 different Ids</span><br><br><span class="cm">// Scoped - same Id within one request</span><br>builder.Services.AddScoped&lt;MyService&gt;();<br><span class="cm">// Inject twice in same request = SAME Id</span><br><span class="cm">// New request = new Id</span><br><br><span class="cm">// Singleton - same Id forever</span><br>builder.Services.AddSingleton&lt;MyService&gt;();<br><span class="cm">// All requests, all users = SAME Id</span></div>'},
{q:"What is CORS? How do you configure it?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">CORS</span> is a browser security feature that blocks cross-origin requests.<br>&#9733; Configure in ASP.NET Core with AddCors() and UseCors().<br>&#9733; Specify allowed origins, headers, and methods.<br>&#9733; Use named policies for different rules.<br>&#9733; Never use AllowAnyOrigin in production — specify exact domains.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - configure CORS</span><br>builder.Services.AddCors(options =&gt; {<br>&nbsp;&nbsp;options.AddPolicy(<span class="str">"AllowFrontend"</span>, policy =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;policy.WithOrigins(<span class="str">"https://myapp.com"</span>)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.AllowAnyHeader()<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.AllowAnyMethod();<br>&nbsp;&nbsp;});<br>});<br><br><span class="cm">// Use in pipeline</span><br>app.UseCors(<span class="str">"AllowFrontend"</span>);<br><br><span class="cm">// Or per controller/action</span><br>[EnableCors(<span class="str">"AllowFrontend"</span>)]<br><span class="kw">public class</span> ApiController { }<br><br><span class="cm">// Allow all (dev only! ❌ not for production)</span><br>policy.AllowAnyOrigin().AllowAnyHeader().AllowAnyMethod();</div>'},
{q:"What is the difference between Web API and MVC in ASP.NET Core?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; In ASP.NET Core, MVC and Web API are <span class="key">unified</span>.<br>&#9733; MVC uses Controller base class and returns Views.<br>&#9733; API uses <span class="key">[ApiController]</span> with ControllerBase and returns JSON. [ApiController] adds auto validation, auto [FromBody] binding, and ProblemDetails error responses.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// MVC Controller - returns HTML views</span><br><span class="kw">public class</span> HomeController : <span class="kw">Controller</span> {<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Index() =&gt; View(); <span class="cm">// HTML</span><br>}<br><br><span class="cm">// API Controller - returns JSON data</span><br>[ApiController]<br>[Route(<span class="str">"api/[controller]"</span>)]<br><span class="kw">public class</span> ProductsController : <span class="kw">ControllerBase</span> {<br>&nbsp;&nbsp;[HttpGet]<br>&nbsp;&nbsp;<span class="kw">public</span> ActionResult&lt;List&lt;Product&gt;&gt; Get() =&gt; Ok(products);<br>}<br><br><span class="cm">// [ApiController] gives you:</span><br><span class="cm">// - Auto model validation (400 if invalid)</span><br><span class="cm">// - Auto [FromBody] binding</span><br><span class="cm">// - Problem details for errors</span></div>'},
{q:"What are Razor Pages? How are they different from MVC?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Razor Pages</span> is page-centric — each page has .cshtml + .cshtml.cs (PageModel).<br>&#9733; Uses OnGet/OnPost handlers instead of separate controllers.<br>&#9733; <span class="key">MVC</span> is controller-centric — one controller handles multiple views.<br>&#9733; Use Razor Pages for simple page-based apps, MVC for complex apps with shared controllers.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Pages/Products/Index.cshtml.cs (PageModel = Controller + Model)</span><br><span class="kw">public class</span> IndexModel : PageModel {<br>&nbsp;&nbsp;<span class="kw">public</span> List&lt;Product&gt; Products { <span class="kw">get</span>; <span class="kw">set</span>; }<br><br>&nbsp;&nbsp;<span class="kw">public void</span> OnGet() { <span class="cm">// handles GET request</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Products = _db.Products.ToList();<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult OnPost() { <span class="cm">// handles POST</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> RedirectToPage();<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Pages/Products/Index.cshtml</span><br>@page<br>@model IndexModel<br>@foreach(<span class="kw">var</span> p <span class="kw">in</span> Model.Products) {<br>&nbsp;&nbsp;&lt;p&gt;@p.Name&lt;/p&gt;<br>}</div>'},
{q:"What is SignalR? When would you use it?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">SignalR</span> enables real-time bidirectional communication using WebSockets (with fallbacks to SSE, Long Polling).<br>&#9733; Server can push to clients instantly.<br>&#9733; Use for: <span class="key">chat apps</span>, <span class="key">live notifications</span>, <span class="key">dashboards</span>, <span class="key">collaborative editing</span>, <span class="key">live scores</span>.<br>&#9733; Uses Hub class on server, JS/C# client libraries.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Server - Hub (like a controller for real-time)</span><br><span class="kw">public class</span> ChatHub : Hub {<br>&nbsp;&nbsp;<span class="kw">public async</span> Task SendMessage(<span class="kw">string</span> user, <span class="kw">string</span> msg) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> Clients.All.SendAsync(<span class="str">"ReceiveMessage"</span>, user, msg);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Program.cs</span><br>builder.Services.AddSignalR();<br>app.MapHub&lt;ChatHub&gt;(<span class="str">"/chatHub"</span>);<br><br><span class="cm">// Client (JavaScript)</span><br><span class="kw">const</span> conn = <span class="kw">new</span> signalR.HubConnectionBuilder()<br>&nbsp;&nbsp;.withUrl(<span class="str">"/chatHub"</span>).build();<br>conn.on(<span class="str">"ReceiveMessage"</span>, (user, msg) =&gt; {<br>&nbsp;&nbsp;addMessageToChat(user, msg); <span class="cm">// instant update!</span><br>});<br>conn.start();</div>'},
{q:"What is Caching? Explain In-Memory and Distributed Caching.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">In-Memory cache</span> (IMemoryCache) stores in app process — fastest but not shared.<br>&#9733; <span class="key">Distributed cache</span> (IDistributedCache with Redis/SQL) stores externally — shared across servers, survives restarts.<br>&#9733; Use in-memory for single server, distributed for load-balanced/cloud apps.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// In-Memory Cache</span><br>builder.Services.AddMemoryCache();<br><br><span class="kw">public class</span> ProductService {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IMemoryCache _cache;<br>&nbsp;&nbsp;<span class="kw">public</span> List&lt;Product&gt; GetAll() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> _cache.GetOrCreate(<span class="str">"products"</span>, entry =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;entry.AbsoluteExpirationRelativeToNow = TimeSpan.FromMinutes(10);<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> _db.Products.ToList();<br>&nbsp;&nbsp;&nbsp;&nbsp;});<br>&nbsp;&nbsp;}<br>}</div>'},
{q:"What is the Options Pattern in ASP.NET Core?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">Options Pattern</span> binds configuration sections to strongly-typed classes using Configure&lt;T&gt;().<br>&#9733; Inject with <span class="key">IOptions&lt;T&gt;</span> (singleton), <span class="key">IOptionsSnapshot&lt;T&gt;</span> (scoped, reloads on change), or <span class="key">IOptionsMonitor&lt;T&gt;</span> (singleton with change notifications).<br>&#9733; Better than reading raw strings from IConfiguration.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// appsettings.json</span><br>{ <span class="str">"EmailSettings"</span>: { <span class="str">"SmtpHost"</span>: <span class="str">"smtp.gmail.com"</span>, <span class="str">"Port"</span>: 587 } }<br><br><span class="cm">// Strongly-typed class</span><br><span class="kw">public class</span> EmailSettings {<br>&nbsp;&nbsp;<span class="kw">public string</span> SmtpHost { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public int</span> Port { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// Register in Program.cs</span><br>builder.Services.Configure&lt;EmailSettings&gt;(<br>&nbsp;&nbsp;builder.Configuration.GetSection(<span class="str">"EmailSettings"</span>));<br><br><span class="cm">// Inject and use</span><br><span class="kw">public class</span> EmailService {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> EmailSettings _settings;<br>&nbsp;&nbsp;<span class="kw">public</span> EmailService(IOptions&lt;EmailSettings&gt; options) {<br>&nbsp;&nbsp;&nbsp;&nbsp;_settings = options.Value;<br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(_settings.SmtpHost); <span class="cm">// IntelliSense! ✅</span><br>&nbsp;&nbsp;}<br>}</div>'},
{q:"How do you implement Authentication and Authorization?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Authentication</span> verifies identity (JWT, Cookie, OAuth).<br>&#9733; <span class="key">Authorization</span> checks permissions ([Authorize], Roles, Policies, Claims).<br>&#9733; Middleware order matters: UseAuthentication() before UseAuthorization().<br>&#9733; Use [Authorize] to protect, [AllowAnonymous] to open.<br>&#9733; ASP.NET Core supports Role-based, Claims-based, and Policy-based authorization.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs - setup</span><br>builder.Services.AddAuthentication(JwtBearerDefaults.AuthenticationScheme)<br>&nbsp;&nbsp;.AddJwtBearer(options =&gt; { <span class="cm">/* JWT config */</span> });<br>builder.Services.AddAuthorization();<br><br>app.UseAuthentication(); <span class="cm">// WHO are you?</span><br>app.UseAuthorization(); <span class="cm">// CAN you access?</span><br><br><span class="cm">// Protect controller/action</span><br>[Authorize] <span class="cm">// must be logged in</span><br><span class="kw">public class</span> OrderController { }<br><br>[Authorize(Roles = <span class="str">"Admin"</span>)] <span class="cm">// must be Admin</span><br><span class="kw">public</span> IActionResult Delete() { }<br><br>[AllowAnonymous] <span class="cm">// anyone can access</span><br><span class="kw">public</span> IActionResult Login() { }</div>'},
{q:"What is the difference between Cookie and Token-based Authentication?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Cookie auth</span> is stateful — server maintains session, cookie auto-sent by browser.<br>&#9733; Good for MVC apps.<br>&#9733; <span class="key">Token (JWT) auth</span> is stateless — token contains all info, sent in Authorization header.<br>&#9733; Good for APIs, mobile, SPAs.<br>&#9733; JWT is scalable (no server session), cookie is simpler for traditional web apps.</div>'},
// Advanced
{q:"How do you implement JWT Authentication in Web API?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">JWT</span> has 3 parts: Header (algorithm), Payload (claims/data), Signature (verification).<br>&#9733; Configure with AddJwtBearer() in Program.cs.<br>&#9733; On login, generate token with claims and signing key.<br>&#9733; Client sends token in <span class="key">Authorization: Bearer</span> header.<br>&#9733; Server validates signature, expiry, issuer on every request.<br>&#9733; Stateless — no server session needed.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Program.cs - configure JWT</span><br>builder.Services.AddAuthentication(JwtBearerDefaults.AuthenticationScheme)<br>&nbsp;&nbsp;.AddJwtBearer(options =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;options.TokenValidationParameters = <span class="kw">new</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ValidateIssuer = <span class="kw">true</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ValidIssuer = <span class="str">"myapp"</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ValidateAudience = <span class="kw">true</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;IssuerSigningKey = <span class="kw">new</span> SymmetricSecurityKey(keyBytes)<br>&nbsp;&nbsp;&nbsp;&nbsp;};<br>&nbsp;&nbsp;});<br><br><span class="cm">// 2. Generate token on login</span><br><span class="kw">var</span> claims = <span class="kw">new</span>[] { <span class="kw">new</span> Claim(ClaimTypes.Name, user.Name) };<br><span class="kw">var</span> token = <span class="kw">new</span> JwtSecurityToken(<br>&nbsp;&nbsp;issuer: <span class="str">"myapp"</span>, claims: claims,<br>&nbsp;&nbsp;expires: DateTime.Now.AddHours(1),<br>&nbsp;&nbsp;signingCredentials: creds);<br><span class="kw">return</span> Ok(<span class="kw">new</span> JwtSecurityTokenHandler().WriteToken(token));<br><br><span class="cm">// 3. Client sends: Authorization: Bearer &lt;token&gt;</span></div>'},
{q:"What is CQRS Pattern? How do you implement it with MediatR?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">CQRS</span> separates read (Query) and write (Command) models.<br>&#9733; Commands change state, queries return data.<br>&#9733; <span class="key">MediatR</span> implements this with IRequest/IRequestHandler pattern — sends commands/queries to their handlers.<br>&#9733; Benefits: clean controllers, single responsibility, easy to test, can scale reads and writes independently.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Command (Write) - changes data</span><br><span class="kw">public record</span> CreateProductCommand(<span class="kw">string</span> Name, <span class="kw">decimal</span> Price)<br>&nbsp;&nbsp;: IRequest&lt;<span class="kw">int</span>&gt;; <span class="cm">// returns product Id</span><br><br><span class="kw">public class</span> CreateProductHandler : IRequestHandler&lt;CreateProductCommand, <span class="kw">int</span>&gt; {<br>&nbsp;&nbsp;<span class="kw">public async</span> Task&lt;<span class="kw">int</span>&gt; Handle(CreateProductCommand cmd, CancellationToken ct) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">var</span> product = <span class="kw">new</span> Product { Name = cmd.Name, Price = cmd.Price };<br>&nbsp;&nbsp;&nbsp;&nbsp;_db.Add(product); <span class="kw">await</span> _db.SaveChangesAsync();<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> product.Id;<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Query (Read) - just fetches data</span><br><span class="kw">public record</span> GetProductsQuery : IRequest&lt;List&lt;Product&gt;&gt;;<br><br><span class="cm">// Controller - clean!</span><br>[HttpPost]<br><span class="kw">public async</span> Task&lt;IActionResult&gt; Create(CreateProductCommand cmd)<br>&nbsp;&nbsp;=&gt; Ok(<span class="kw">await</span> _mediator.Send(cmd));</div>'},
{q:"What is the Mediator Pattern and MediatR?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Mediator Pattern</span> reduces coupling — objects communicate through a mediator instead of directly.<br>&#9733; <span class="key">MediatR</span> library implements this with IRequest/IRequestHandler.<br>&#9733; Controller sends request via _mediator.Send(), MediatR routes to the correct handler.<br>&#9733; Also supports <span class="key">Notifications</span> (one-to-many) and <span class="key">Pipeline Behaviors</span> (cross-cutting concerns like logging, validation).</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Install: dotnet add package MediatR</span><br><span class="cm">// Program.cs</span><br>builder.Services.AddMediatR(cfg =&gt;<br>&nbsp;&nbsp;cfg.RegisterServicesFromAssembly(<span class="kw">typeof</span>(Program).Assembly));<br><br><span class="cm">// Request</span><br><span class="kw">public record</span> GetUserQuery(<span class="kw">int</span> Id) : IRequest&lt;User&gt;;<br><br><span class="cm">// Handler (auto-discovered by MediatR)</span><br><span class="kw">public class</span> GetUserHandler : IRequestHandler&lt;GetUserQuery, User&gt; {<br>&nbsp;&nbsp;<span class="kw">public async</span> Task&lt;User&gt; Handle(GetUserQuery q, CancellationToken ct)<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; <span class="kw">await</span> _db.Users.FindAsync(q.Id);<br>}<br><br><span class="cm">// Controller - super clean, no service injection!</span><br>[HttpGet(<span class="str">"{id}"</span>)]<br><span class="kw">public async</span> Task&lt;IActionResult&gt; Get(<span class="kw">int</span> id)<br>&nbsp;&nbsp;=&gt; Ok(<span class="kw">await</span> _mediator.Send(<span class="kw">new</span> GetUserQuery(id)));</div>'},
{q:"How do you implement Global Exception Handling?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Implement with custom <span class="key">Exception Middleware</span> that wraps the pipeline in try-catch.<br>&#9733; Returns consistent error response (ProblemDetails format).<br>&#9733; Add as first middleware so it catches everything. .NET 8+ has built-in UseExceptionHandler() with ProblemDetails.<br>&#9733; Also can use <span class="key">IExceptionFilter</span> for MVC-specific handling.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Method 1: Exception Handling Middleware (recommended)</span><br><span class="kw">public class</span> ExceptionMiddleware {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> RequestDelegate _next;<br>&nbsp;&nbsp;<span class="kw">public</span> ExceptionMiddleware(RequestDelegate next) { _next = next; }<br><br>&nbsp;&nbsp;<span class="kw">public async</span> Task InvokeAsync(HttpContext context) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">try</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> _next(context); <span class="cm">// call next middleware</span><br>&nbsp;&nbsp;&nbsp;&nbsp;} <span class="kw">catch</span>(Exception ex) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;context.Response.StatusCode = 500;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> context.Response.WriteAsJsonAsync(<span class="kw">new</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;error = ex.Message, status = 500<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;});<br>&nbsp;&nbsp;&nbsp;&nbsp;}<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Program.cs</span><br>app.UseMiddleware&lt;ExceptionMiddleware&gt;(); <span class="cm">// add FIRST!</span><br><br><span class="cm">// Method 2: Built-in (.NET 8+)</span><br>app.UseExceptionHandler();<br>builder.Services.AddProblemDetails();</div>'},
{q:"What are Health Checks? How do you implement them?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Health Checks</span> expose /health endpoint that returns Healthy, Unhealthy, or Degraded status.<br>&#9733; Check database, Redis, external APIs, disk space.<br>&#9733; Used by <span class="key">load balancers</span> (remove unhealthy instances), <span class="key">Kubernetes</span> (liveness/readiness probes), and monitoring tools.<br>&#9733; Add with AddHealthChecks() and MapHealthChecks().</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Program.cs</span><br>builder.Services.AddHealthChecks()<br>&nbsp;&nbsp;.AddSqlServer(connectionString, name: <span class="str">"database"</span>)<br>&nbsp;&nbsp;.AddRedis(redisConnStr, name: <span class="str">"redis"</span>)<br>&nbsp;&nbsp;.AddUrlGroup(<span class="kw">new</span> Uri(<span class="str">"https://api.example.com"</span>), name: <span class="str">"external-api"</span>);<br><br>app.MapHealthChecks(<span class="str">"/health"</span>); <span class="cm">// simple</span><br>app.MapHealthChecks(<span class="str">"/health/detail"</span>, <span class="kw">new</span> HealthCheckOptions {<br>&nbsp;&nbsp;ResponseWriter = UIResponseWriter.WriteHealthCheckUIResponse<br>}); <span class="cm">// detailed JSON</span><br><br><span class="cm">// GET /health returns:</span><br><span class="cm">// Healthy ✅ or Unhealthy ❌ or Degraded ⚠️</span><br><br><span class="cm">// Custom health check</span><br><span class="kw">public class</span> DiskSpaceCheck : IHealthCheck {<br>&nbsp;&nbsp;<span class="kw">public</span> Task&lt;HealthCheckResult&gt; CheckHealthAsync(...) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> freeSpace &gt; 1GB<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;? HealthCheckResult.Healthy()<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: HealthCheckResult.Unhealthy(<span class="str">"Low disk"</span>);<br>&nbsp;&nbsp;}<br>}</div>'},
{q:"How do you implement API Versioning?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">API Versioning</span> supports multiple API versions simultaneously.<br>&#9733; Three approaches: <span class="key">URL path</span> (/api/v1/products — most popular), <span class="key">Query string</span> (?api-version=2), <span class="key">Header</span> (api-version: 2).<br>&#9733; Use Asp.Versioning.Mvc package.<br>&#9733; Mark controllers with [ApiVersion].<br>&#9733; Deprecate old versions with [ApiVersion(\"1.0\", Deprecated = true)].</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Install: Asp.Versioning.Mvc</span><br>builder.Services.AddApiVersioning(options =&gt; {<br>&nbsp;&nbsp;options.DefaultApiVersion = <span class="kw">new</span> ApiVersion(1, 0);<br>&nbsp;&nbsp;options.AssumeDefaultVersionWhenUnspecified = <span class="kw">true</span>;<br>&nbsp;&nbsp;options.ReportApiVersions = <span class="kw">true</span>;<br>});<br><br><span class="cm">// 1. URL versioning (most common)</span><br>[ApiVersion(<span class="str">"1.0"</span>)]<br>[Route(<span class="str">"api/v{version:apiVersion}/products"</span>)]<br><span class="kw">public class</span> ProductsV1Controller { } <span class="cm">// /api/v1/products</span><br><br>[ApiVersion(<span class="str">"2.0"</span>)]<br>[Route(<span class="str">"api/v{version:apiVersion}/products"</span>)]<br><span class="kw">public class</span> ProductsV2Controller { } <span class="cm">// /api/v2/products</span><br><br><span class="cm">// 2. Query string: /api/products?api-version=2.0</span><br><span class="cm">// 3. Header: api-version: 2.0</span></div>'},
{q:"What is gRPC? How does it compare to REST?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">gRPC</span> uses Protocol Buffers (binary), HTTP/2, and is much faster than REST.<br>&#9733; Supports streaming (server, client, bidirectional).<br>&#9733; Best for <span class="key">microservice-to-microservice</span> communication.<br>&#9733; REST is better for public APIs and browser clients.<br>&#9733; In .NET, use Grpc.AspNetCore package.</div>'},
{q:"How do you implement Rate Limiting?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; .NET 7+ has built-in rate limiting with <span class="key">Fixed Window</span> (N requests per window), <span class="key">Sliding Window</span> (smoother), <span class="key">Token Bucket</span> (burst-friendly), <span class="key">Concurrency</span> (max simultaneous).<br>&#9733; Apply globally or per-endpoint with [EnableRateLimiting].<br>&#9733; Returns 429 Too Many Requests when exceeded.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// .NET 7+ built-in rate limiting</span><br>builder.Services.AddRateLimiter(options =&gt; {<br>&nbsp;&nbsp;<span class="cm">// Fixed window: 10 requests per 1 minute</span><br>&nbsp;&nbsp;options.AddFixedWindowLimiter(<span class="str">"fixed"</span>, opt =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.Window = TimeSpan.FromMinutes(1);<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.PermitLimit = 10;<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.QueueLimit = 2;<br>&nbsp;&nbsp;});<br><br>&nbsp;&nbsp;<span class="cm">// Sliding window: smoother distribution</span><br>&nbsp;&nbsp;options.AddSlidingWindowLimiter(<span class="str">"sliding"</span>, opt =&gt; {<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.Window = TimeSpan.FromMinutes(1);<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.PermitLimit = 10;<br>&nbsp;&nbsp;&nbsp;&nbsp;opt.SegmentsPerWindow = 4;<br>&nbsp;&nbsp;});<br>});<br><br>app.UseRateLimiter();<br><br>[EnableRateLimiting(<span class="str">"fixed"</span>)]<br><span class="kw">public class</span> ApiController { }</div>'},
{q:"What is the Outbox Pattern?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">Outbox Pattern</span> solves the dual-write problem — saving to DB and publishing a message must both succeed or both fail.<br>&#9733; Save the event to an <span class="key">outbox table</span> in the same DB transaction.<br>&#9733; A background worker reads and publishes to the message broker.<br>&#9733; Ensures <span class="key">eventual consistency</span> without distributed transactions.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Problem: DB saves but message fails = inconsistency!</span><br><span class="cm">// _db.SaveChanges(); ✅</span><br><span class="cm">// _bus.Publish(event); ❌ fails! Message lost!</span><br><br><span class="cm">// Solution: Outbox Pattern</span><br><span class="cm">// 1. Save data + outbox message in SAME transaction</span><br><span class="kw">using var</span> tx = _db.Database.BeginTransaction();<br>_db.Orders.Add(order);<br>_db.OutboxMessages.Add(<span class="kw">new</span> OutboxMessage {<br>&nbsp;&nbsp;Type = <span class="str">"OrderCreated"</span>,<br>&nbsp;&nbsp;Payload = JsonSerializer.Serialize(order),<br>&nbsp;&nbsp;CreatedAt = DateTime.UtcNow<br>});<br>_db.SaveChanges();<br>tx.Commit(); <span class="cm">// both saved atomically! ✅</span><br><br><span class="cm">// 2. Background job reads outbox and publishes</span><br><span class="cm">// Polls OutboxMessages table, publishes to broker, marks as sent</span></div>'},
{q:"How do you implement Background Services using IHostedService?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">BackgroundService</span> (inherits IHostedService) runs long-running tasks in the background.<br>&#9733; Override <span class="key">ExecuteAsync</span> with your logic.<br>&#9733; Register with AddHostedService&lt;T&gt;().<br>&#9733; Use for: queue processing, scheduled tasks, outbox publishing, cache warming.<br>&#9733; Respects CancellationToken for graceful shutdown.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Simple background service</span><br><span class="kw">public class</span> EmailQueueProcessor : BackgroundService {<br>&nbsp;&nbsp;<span class="kw">protected override async</span> Task ExecuteAsync(CancellationToken ct) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">while</span>(!ct.IsCancellationRequested) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">var</span> emails = <span class="kw">await</span> GetPendingEmails();<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">foreach</span>(<span class="kw">var</span> email <span class="kw">in</span> emails)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> SendEmail(email);<br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> Task.Delay(TimeSpan.FromSeconds(30), ct); <span class="cm">// poll every 30s</span><br>&nbsp;&nbsp;&nbsp;&nbsp;}<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Register in Program.cs</span><br>builder.Services.AddHostedService&lt;EmailQueueProcessor&gt;();</div>'},
{q:"What is the difference between Minimal APIs and Controller-based APIs?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Controller-based</span> uses classes, attributes, filters — better for large complex APIs.<br>&#9733; <span class="key">Minimal APIs</span> define endpoints inline with MapGet/MapPost — less boilerplate, faster startup, good for microservices and simple APIs.<br>&#9733; Both support DI, auth, validation.<br>&#9733; Minimal APIs are NOT a replacement — choose based on complexity.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Controller-based (traditional)</span><br>[ApiController]<br>[Route(<span class="str">"api/[controller]"</span>)]<br><span class="kw">public class</span> ProductsController : ControllerBase {<br>&nbsp;&nbsp;[HttpGet]<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult GetAll() =&gt; Ok(_db.Products.ToList());<br><br>&nbsp;&nbsp;[HttpGet(<span class="str">"{id}"</span>)]<br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Get(<span class="kw">int</span> id) =&gt; Ok(_db.Products.Find(id));<br>}<br><br><span class="cm">// Minimal API (new way) - same thing, less code!</span><br>app.MapGet(<span class="str">"/api/products"</span>, (AppDb db) =&gt; db.Products.ToList());<br>app.MapGet(<span class="str">"/api/products/{id}"</span>, (AppDb db, <span class="kw">int</span> id) =&gt; db.Products.Find(id));<br>app.MapPost(<span class="str">"/api/products"</span>, (AppDb db, Product p) =&gt; {<br>&nbsp;&nbsp;db.Add(p); db.SaveChanges();<br>&nbsp;&nbsp;<span class="kw">return</span> Results.Created($<span class="str">"/api/products/{p.Id}"</span>, p);<br>});</div>'},
{q:"How do you implement Microservices with .NET?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Each microservice is a separate ASP.NET Core project with own database (<span class="key">Database per Service</span>).<br>&#9733; Communicate via <span class="key">REST/gRPC</span> (sync) or <span class="key">RabbitMQ/Kafka</span> (async).<br>&#9733; Use <span class="key">API Gateway</span> (Ocelot/YARP) for routing.<br>&#9733; Containerize with <span class="key">Docker</span>, orchestrate with <span class="key">Kubernetes</span>.<br>&#9733; Apply patterns: CQRS, Saga, Circuit Breaker, Outbox.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Solution structure</span><br><span class="cm">// src/</span><br><span class="cm">//   OrderService/ (own DB, own API)</span><br><span class="cm">//   ProductService/ (own DB, own API)</span><br><span class="cm">//   PaymentService/ (own DB, own API)</span><br><span class="cm">//   ApiGateway/ (Ocelot/YARP)</span><br><br><span class="cm">// Service-to-service call via HttpClient</span><br>builder.Services.AddHttpClient(<span class="str">"ProductService"</span>, c =&gt; {<br>&nbsp;&nbsp;c.BaseAddress = <span class="kw">new</span> Uri(<span class="str">"https://product-svc:5001"</span>);<br>});<br><br><span class="cm">// Or via message broker (async)</span><br><span class="cm">// OrderService publishes "OrderCreated" event</span><br><span class="cm">// PaymentService subscribes and processes payment</span><br><br><span class="cm">// Docker Compose for local dev</span><br><span class="cm">// docker-compose.yml runs all services + RabbitMQ + Redis</span></div>'},
{q:"How do you optimize EF Core queries for performance?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Key optimizations: <span class="key">AsNoTracking()</span> for read-only queries, <span class="key">Select()</span> to project only needed columns, <span class="key">Include()</span> to avoid N+1 problem, <span class="key">pagination</span> with Skip/Take, <span class="key">compiled queries</span> for hot paths, <span class="key">raw SQL</span> for complex queries.<br>&#9733; Always check generated SQL with ToQueryString().</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - loads ALL columns, tracks changes</span><br><span class="kw">var</span> products = _db.Products.ToList();<br><br><span class="cm">// ✅ GOOD - no tracking (read-only), select only needed</span><br><span class="kw">var</span> products = _db.Products<br>&nbsp;&nbsp;.AsNoTracking() <span class="cm">// ✅ faster for reads</span><br>&nbsp;&nbsp;.Where(p =&gt; p.IsActive)<br>&nbsp;&nbsp;.Select(p =&gt; <span class="kw">new</span> { p.Name, p.Price }) <span class="cm">// ✅ only needed cols</span><br>&nbsp;&nbsp;.Take(20) <span class="cm">// ✅ pagination</span><br>&nbsp;&nbsp;.ToListAsync();<br><br><span class="cm">// ❌ N+1 Problem</span><br><span class="kw">var</span> orders = _db.Orders.ToList(); <span class="cm">// 1 query</span><br><span class="kw">foreach</span>(<span class="kw">var</span> o <span class="kw">in</span> orders)<br>&nbsp;&nbsp;Console.WriteLine(o.Customer.Name); <span class="cm">// N queries! 💥</span><br><br><span class="cm">// ✅ Fix with Include (eager loading)</span><br><span class="kw">var</span> orders = _db.Orders.Include(o =&gt; o.Customer).ToList(); <span class="cm">// 1 query!</span></div>'},
{q:"What is Docker containerization for .NET?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Docker</span> containerizes .NET apps using a Dockerfile with multi-stage build (SDK for build, runtime for run).<br>&#9733; Benefits: consistent environments, easy deployment, scalable.<br>&#9733; Use <span class="key">docker-compose</span> for multi-container (app + DB + Redis).<br>&#9733; Deploy to <span class="key">Azure Container Apps</span>, <span class="key">AKS</span>, or any cloud.</div><h4>💻 Code Example</h4><div class="code"><span class="cm"># Dockerfile for .NET app</span><br>FROM mcr.microsoft.com/dotnet/sdk:8.0 AS build<br>WORKDIR /app<br>COPY *.csproj .<br>RUN dotnet restore<br>COPY . .<br>RUN dotnet publish -c Release -o /out<br><br>FROM mcr.microsoft.com/dotnet/aspnet:8.0<br>WORKDIR /app<br>COPY --from=build /out .<br>ENTRYPOINT [<span class="str">"dotnet"</span>, <span class="str">"MyApp.dll"</span>]<br><br><span class="cm"># Build and run</span><br><span class="cm"># docker build -t myapp .</span><br><span class="cm"># docker run -p 8080:80 myapp</span><br><br><span class="cm"># docker-compose.yml (multi-container)</span><br><span class="cm"># services:</span><br><span class="cm">#   api: build: . ports: ["8080:80"]</span><br><span class="cm">#   db: image: mcr.microsoft.com/mssql/server</span></div>'},
{q:"How do you implement CI/CD for .NET Core?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">CI</span>: on every push — restore, build, test, publish artifacts.<br>&#9733; <span class="key">CD</span>: auto-deploy to staging/production.<br>&#9733; Tools: <span class="key">Azure DevOps Pipelines</span> (YAML), <span class="key">GitHub Actions</span>.<br>&#9733; Steps: restore → build → test → publish → deploy.<br>&#9733; Use environments for approval gates.<br>&#9733; Include SonarQube for code quality.</div><h4>💻 Code Example</h4><div class="code"><span class="cm"># Azure DevOps Pipeline (azure-pipelines.yml)</span><br>trigger:<br>&nbsp;&nbsp;branches: [main]<br><br>stages:<br>- stage: Build<br>&nbsp;&nbsp;jobs:<br>&nbsp;&nbsp;- job: BuildAndTest<br>&nbsp;&nbsp;&nbsp;&nbsp;steps:<br>&nbsp;&nbsp;&nbsp;&nbsp;- task: UseDotNet@2<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;inputs: { version: 8.x }<br>&nbsp;&nbsp;&nbsp;&nbsp;- script: dotnet restore<br>&nbsp;&nbsp;&nbsp;&nbsp;- script: dotnet build --no-restore<br>&nbsp;&nbsp;&nbsp;&nbsp;- script: dotnet test --no-build<br>&nbsp;&nbsp;&nbsp;&nbsp;- script: dotnet publish -c Release -o $(Build.ArtifactStagingDirectory)<br>&nbsp;&nbsp;&nbsp;&nbsp;- task: PublishBuildArtifacts@1<br><br>- stage: Deploy<br>&nbsp;&nbsp;jobs:<br>&nbsp;&nbsp;- deployment: DeployToAzure<br>&nbsp;&nbsp;&nbsp;&nbsp;environment: Production<br>&nbsp;&nbsp;&nbsp;&nbsp;strategy:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;runOnce:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;deploy: <span class="cm"># deploy to App Service</span></div>'},
{q:"What is the Saga Pattern for distributed transactions?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">Saga Pattern</span> handles distributed transactions by breaking them into local transactions with compensating actions for rollback.<br>&#9733; Two types: <span class="key">Orchestration</span> (central coordinator manages steps) and <span class="key">Choreography</span> (services react to events).<br>&#9733; If step 3 fails, compensating actions undo steps 1 and 2.<br>&#9733; Ensures eventual consistency across microservices.</div>'},
