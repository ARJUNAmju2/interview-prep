{q:"What is Hoisting in JavaScript?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Hoisting</span> moves declarations to the top of scope.<br>&#9733; <span class="key">var</span> is hoisted and initialized as undefined.<br>&#9733; <span class="key">let/const</span> are hoisted but in temporal dead zone (cant access before declaration).<br>&#9733; <span class="key">Function declarations</span> are fully hoisted.<br>&#9733; Function expressions are NOT.<br>&#9733; This is why let/const are safer than var.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// var is hoisted (initialized as undefined)</span><br>console.log(a); <span class="cm">// undefined (not error!)</span><br><span class="kw">var</span> a = 10;<br><br><span class="cm">// let/const are hoisted but NOT initialized</span><br>console.log(b); <span class="cm">// ❌ ReferenceError! (temporal dead zone)</span><br><span class="kw">let</span> b = 20;<br><br><span class="cm">// Function declarations are fully hoisted</span><br>greet(); <span class="cm">// "Hello!" ✅ works before declaration!</span><br><span class="kw">function</span> greet() { console.log(<span class="str">"Hello!"</span>); }<br><br><span class="cm">// Function expressions are NOT hoisted</span><br>sayHi(); <span class="cm">// ❌ TypeError!</span><br><span class="kw">var</span> sayHi = <span class="kw">function</span>() { console.log(<span class="str">"Hi"</span>); };</div>'},
{q:"What is Destructuring? Explain Object and Array destructuring.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Destructuring</span> extracts values from objects/arrays into variables.<br>&#9733; Object destructuring uses {}, array uses [].<br>&#9733; Supports renaming, default values, rest operator, and nested destructuring.<br>&#9733; Commonly used in function parameters, React props, and API responses.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Object Destructuring</span><br><span class="kw">const</span> user = { name: <span class="str">"Arjun"</span>, age: 28, city: <span class="str">"Delhi"</span> };<br><span class="kw">const</span> { name, age } = user; <span class="cm">// name="Arjun", age=28</span><br><span class="kw">const</span> { name: userName } = user; <span class="cm">// rename: userName="Arjun"</span><br><span class="kw">const</span> { country = <span class="str">"India"</span> } = user; <span class="cm">// default value</span><br><br><span class="cm">// Array Destructuring</span><br><span class="kw">const</span> [first, second, ...rest] = [1, 2, 3, 4, 5];<br><span class="cm">// first=1, second=2, rest=[3,4,5]</span><br><br><span class="cm">// Swap variables!</span><br><span class="kw">let</span> a = 1, b = 2;<br>[a, b] = [b, a]; <span class="cm">// a=2, b=1 🤯</span><br><br><span class="cm">// In function parameters</span><br><span class="kw">function</span> greet({ name, age }) {<br>&nbsp;&nbsp;console.log(<span class="str">`${name} is ${age}`</span>);<br>}<br>greet(user);</div>'},
{q:"What is the Spread and Rest operator (...)?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Spread</span> expands arrays/objects into individual elements — used for copying, merging, function arguments.<br>&#9733; <span class="key">Rest</span> collects remaining elements into an array — used in function parameters and destructuring.<br>&#9733; Same ... syntax, context determines behavior.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// SPREAD: expand items</span><br><span class="kw">const</span> arr1 = [1, 2, 3];<br><span class="kw">const</span> arr2 = [...arr1, 4, 5]; <span class="cm">// [1,2,3,4,5] spread into new array</span><br><br><span class="kw">const</span> obj1 = { name: <span class="str">"Arjun"</span> };<br><span class="kw">const</span> obj2 = { ...obj1, age: 28 }; <span class="cm">// {name:"Arjun", age:28}</span><br><br><span class="cm">// REST: collect remaining items</span><br><span class="kw">const</span> [first, ...others] = [1, 2, 3, 4];<br><span class="cm">// first=1, others=[2,3,4]</span><br><br><span class="kw">function</span> sum(...nums) { <span class="cm">// rest: collect all args</span><br>&nbsp;&nbsp;<span class="kw">return</span> nums.reduce((a, b) =&gt; a + b, 0);<br>}<br>sum(1, 2, 3, 4); <span class="cm">// 10</span></div>'},
{q:"What is Fetch API? How do you call a .NET Web API from JS?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Fetch API</span> is the modern replacement for XMLHttpRequest.<br>&#9733; Returns Promises, supports async/await.<br>&#9733; Send JSON with Content-Type header, parse response with .json().<br>&#9733; Add Authorization header for JWT.<br>&#9733; Check res.ok for errors — fetch doesnt throw on 4xx/5xx!</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// GET request</span><br><span class="kw">const</span> res = <span class="kw">await</span> fetch(<span class="str">"/api/products"</span>);<br><span class="kw">const</span> products = <span class="kw">await</span> res.json();<br><br><span class="cm">// POST request</span><br><span class="kw">const</span> res = <span class="kw">await</span> fetch(<span class="str">"/api/products"</span>, {<br>&nbsp;&nbsp;method: <span class="str">"POST"</span>,<br>&nbsp;&nbsp;headers: { <span class="str">"Content-Type"</span>: <span class="str">"application/json"</span> },<br>&nbsp;&nbsp;body: JSON.stringify({ name: <span class="str">"Laptop"</span>, price: 50000 })<br>});<br><br><span class="cm">// With JWT token</span><br><span class="kw">const</span> res = <span class="kw">await</span> fetch(<span class="str">"/api/orders"</span>, {<br>&nbsp;&nbsp;headers: { <span class="str">"Authorization"</span>: <span class="str">`Bearer ${token}`</span> }<br>});<br><br><span class="cm">// Error handling</span><br><span class="kw">if</span>(!res.ok) <span class="kw">throw new</span> Error(<span class="str">`HTTP ${res.status}`</span>);</div>'},
{q:"What is Local Storage vs Session Storage vs Cookies?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">LocalStorage</span>: 5-10MB, permanent, not sent to server.<br>&#9733; <span class="key">SessionStorage</span>: 5MB, per tab, cleared on close.<br>&#9733; <span class="key">Cookies</span>: 4KB, sent with every HTTP request, has expiry, supports HttpOnly (JS cant access).<br>&#9733; Use LocalStorage for preferences, SessionStorage for temp data, Cookies for auth tokens.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// LocalStorage: permanent, 5-10MB</span><br>localStorage.setItem(<span class="str">"theme"</span>, <span class="str">"dark"</span>);<br>localStorage.getItem(<span class="str">"theme"</span>); <span class="cm">// "dark"</span><br>localStorage.removeItem(<span class="str">"theme"</span>);<br><br><span class="cm">// SessionStorage: per tab, cleared on close</span><br>sessionStorage.setItem(<span class="str">"cart"</span>, JSON.stringify(items));<br><br><span class="cm">// Cookies: sent to server, 4KB limit</span><br>document.cookie = <span class="str">"token=abc123; expires=Fri, 31 Dec 2024; path=/"</span>;</div>'},
{q:"What is TypeScript? Why use it over JavaScript?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">TypeScript</span> adds static typing to JavaScript.<br>&#9733; Benefits: <span class="key">compile-time error detection</span>, better IntelliSense, interfaces, enums, generics, and easier refactoring.<br>&#9733; Compiles to plain JavaScript.<br>&#9733; Used in Angular (required), React (optional).<br>&#9733; For .NET developers, TypeScript feels familiar because of C#-like syntax.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// JavaScript: no type checking</span><br><span class="kw">let</span> name = <span class="str">"Arjun"</span>;<br>name = 123; <span class="cm">// ✅ no error (bug at runtime!)</span><br><br><span class="cm">// TypeScript: type checking</span><br><span class="kw">let</span> name: <span class="kw">string</span> = <span class="str">"Arjun"</span>;<br>name = 123; <span class="cm">// ❌ compile error! caught early!</span><br><br><span class="cm">// Interface</span><br><span class="kw">interface</span> User {<br>&nbsp;&nbsp;name: <span class="kw">string</span>;<br>&nbsp;&nbsp;age: <span class="kw">number</span>;<br>&nbsp;&nbsp;email?: <span class="kw">string</span>; <span class="cm">// optional</span><br>}<br><br><span class="kw">function</span> greet(user: User): <span class="kw">string</span> {<br>&nbsp;&nbsp;<span class="kw">return</span> <span class="str">`Hello ${user.name}`</span>;<br>}<br><br><span class="cm">// TypeScript compiles to JavaScript</span><br><span class="cm">// .ts → tsc compiler → .js</span></div>'},
// Advanced
{q:"What is Angular/React basics? Component, Props, State.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Component</span> is a reusable UI piece.<br>&#9733; <span class="key">Props</span> are read-only data from parent.<br>&#9733; <span class="key">State</span> is mutable data owned by the component — re-renders on change.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">function</span> ProductCard({ name, price }) { <span class="cm">// props</span><br>&nbsp;&nbsp;<span class="kw">const</span> [qty, setQty] = useState(1); <span class="cm">// state</span><br>&nbsp;&nbsp;<span class="kw">return</span> (&lt;div&gt;<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;h3&gt;{name}&lt;/h3&gt;&lt;p&gt;Qty: {qty}&lt;/p&gt;<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;button onClick={() =&gt; setQty(qty+1)}&gt;+&lt;/button&gt;<br>&nbsp;&nbsp;&lt;/div&gt;);<br>}</div>'},
{q:"What is the Virtual DOM in React?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">Virtual DOM</span> is an in-memory representation.<br>&#9733; React uses <span class="key">diffing algorithm</span> to find changes, then applies minimal updates to real DOM (<span class="key">reconciliation</span>).<br>&#9733; Makes React fast because direct DOM manipulation is expensive.</div><h4>💻 How It Works</h4><div class="code"><span class="cm">// 1. State changes (counter: 5 → 6)</span><br><span class="cm">// 2. React creates NEW Virtual DOM</span><br><span class="cm">// 3. DIFF: compares new vs old</span><br><span class="cm">// 4. Finds only counter changed</span><br><span class="cm">// 5. Updates ONLY that element in real DOM ✅</span></div>'},
{q:"What is RxJS? Explain Observables.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">RxJS</span> provides Observables for reactive programming.<br>&#9733; Use <span class="key">.subscribe()</span> to listen, <span class="key">.pipe()</span> with operators (map, filter, switchMap).<br>&#9733; Angular uses Observables for HTTP, forms, routing.<br>&#9733; Always unsubscribe to prevent memory leaks!</div><h4>💻 Code Example</h4><div class="code"><span class="kw">import</span> { interval } <span class="kw">from</span> <span class="str">"rxjs"</span>;<br>interval(1000).subscribe(v =&gt; console.log(v)); <span class="cm">// 0,1,2,3...</span><br><br><span class="cm">// Angular HTTP returns Observable</span><br><span class="kw">this</span>.http.get&lt;Product[]&gt;(<span class="str">"/api/products"</span>)<br>&nbsp;&nbsp;.pipe(filter(p =&gt; p.price &gt; 100))<br>&nbsp;&nbsp;.subscribe(data =&gt; console.log(data));</div>'},
{q:"What is Webpack/Vite? How does module bundling work?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Bundlers</span> combine files into optimized bundles with minification, tree-shaking, code splitting.<br>&#9733; <span class="key">Webpack</span> is most popular.<br>&#9733; <span class="key">Vite</span> is faster with native ES modules.<br>&#9733; Angular uses Webpack, newer projects prefer Vite.</div><h4>💻 How It Works</h4><div class="code"><span class="cm">// 100+ files → Bundler → few optimized files</span><br><span class="cm">// Also does: Minification, Tree-shaking,</span><br><span class="cm">// Code splitting, Transpiling (TS → JS)</span><br><br><span class="cm">// Vite: ES modules in dev (instant start!)</span><br><span class="cm">// Webpack: bundles everything (slower start)</span></div>'},
{q:"What is Server-Side Rendering (SSR) vs Client-Side Rendering (CSR)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">CSR</span> renders in browser — fast navigation but slow first paint, bad SEO.<br>&#9733; <span class="key">SSR</span> renders on server — fast first load, great SEO.<br>&#9733; Modern approach: SSR first load + CSR navigation (hydration).<br>&#9733; Next.js and Angular Universal support SSR.</div>'},
{q:"How do you integrate Angular/React with ASP.NET Core?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Same project</span> with UseSpa() — simpler but coupled.<br>&#9733; <span class="key">Separate projects</span> — independent deployment, need CORS, preferred for production.<br>&#9733; Deploy SPA on Azure Static Web Apps, API on Azure App Service.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Approach 1: Same project</span><br>app.UseSpa(spa =&gt; { spa.Options.SourcePath = <span class="str">"ClientApp"</span>; });<br><br><span class="cm">// Approach 2: Separate (recommended ⭐)</span><br><span class="cm">// API: ASP.NET Core (port 5000)</span><br><span class="cm">// SPA: Angular/React (port 3000)</span><br><span class="cm">// SPA calls API via fetch, needs CORS!</span><br>builder.Services.AddCors(o =&gt; o.AddPolicy(<span class="str">"spa"</span>,<br>&nbsp;&nbsp;p =&gt; p.WithOrigins(<span class="str">"https://myapp.com"</span>)<br>&nbsp;&nbsp;&nbsp;&nbsp;.AllowAnyHeader().AllowAnyMethod()));</div>'}
],
behavioral:[
// Basics
{q:"Tell me about yourself.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Start with your <span class="key">present role</span> - what you do now, your current company, and key responsibilities.<br>&#9733; Then go to your <span class="key">past</span> - your education, how you started your career, and key achievements.<br>&#9733; End with your <span class="key">future</span> - why you are here, what excites you about this role, and your career goals.<br>&#9733; Keep it <b>2-3 minutes</b>. Be confident, structured, and relevant to the job.<br>&#9733; Example: "I am currently working as a .NET Developer where I have built multiple enterprise applications. My key projects include a Helpdesk Ticketing Tool (Web Service in VB), a Store Management Module (Windows Application in VB), and two MVC .NET Core applications - a Preventive Maintenance Module for scheduling branch visits and an Audit Module for tracking company-wide audit activities. I have experience in both legacy VB systems and modern .NET Core architecture. I am looking for a role where I can further grow in .NET Core and contribute to impactful projects."</div><div class="tip">&#128161; <b>Tip:</b> Practice this answer out loud. Never say "I dont know what to say." Have a crisp 2-minute version ready!</div>'},
{q:"Why are you looking for a change?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Never badmouth your current company or manager. Stay <span class="key">positive</span>.<br>&#9733; Focus on <span class="key">growth</span> - you want to learn new technologies, take on bigger challenges, or grow into a senior role.<br>&#9733; Mention what <span class="key">excites you about this company</span> - their tech stack, product, culture, or growth opportunities.<br>&#9733; Example: "I have learned a lot in my current role, but I feel I have reached a plateau. I am looking for a role where I can work on larger-scale systems, learn microservices architecture, and grow into a lead position. Your company excites me because of the modern tech stack and challenging projects."</div><div class="tip">&#128161; <b>Tip:</b> Never say salary is the reason. Even if it is, frame it as growth and learning!</div>'},
{q:"What are your strengths and weaknesses?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <b>Strengths:</b> Pick 2-3 strengths that are <span class="key">relevant to the job</span>. Give a short example for each.<br>&#9733; Example strengths: Problem-solving, quick learner, team collaboration, attention to detail, strong debugging skills.<br>&#9733; <b>Weaknesses:</b> Pick a <span class="key">real but minor</span> weakness and show how you are <span class="key">actively improving</span> it.<br>&#9733; Example: "My strength is problem-solving - I enjoy debugging complex issues and I recently optimized a slow API from 5 seconds to 200ms. My weakness is that I sometimes spend too much time perfecting code. I am working on balancing quality with delivery speed by setting time limits for tasks."</div><div class="tip">&#128161; <b>Tip:</b> Never say "I am a perfectionist" as a weakness - interviewers hear it 100 times. Be genuine!</div>'},
{q:"Where do you see yourself in 5 years?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show <span class="key">ambition</span> but keep it realistic and aligned with the company.<br>&#9733; Talk about <span class="key">technical growth</span> (senior developer, architect) or <span class="key">leadership</span> (tech lead, team lead).<br>&#9733; Show you want to <span class="key">stay and grow</span> with the company, not jump again in 1 year.<br>&#9733; Example: "In 5 years, I see myself as a Senior Developer or Tech Lead, mentoring junior developers and designing system architectures. I want to deepen my expertise in cloud technologies and microservices while contributing to the technical direction of the team."</div>'},
{q:"Why should we hire you?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Summarize your <span class="key">top 3 selling points</span> that match the job description.<br>&#9733; Show what <span class="key">value you bring</span> - skills, experience, attitude.<br>&#9733; Be confident but not arrogant.<br>&#9733; Example: "You should hire me because I bring 3+ years of hands-on experience in .NET Core and SQL Server, I have a proven track record of optimizing application performance, and I am a quick learner who adapts to new technologies fast. I am also a strong team player who actively participates in code reviews and knowledge sharing."</div>'},
{q:"What is your expected salary/CTC?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Research the market rate</span> for your role and experience level before the interview.<br>&#9733; Give a <span class="key">range</span>, not a fixed number. This gives room for negotiation.<br>&#9733; If possible, let the company make the first offer.<br>&#9733; Example: "Based on my experience and the market standards, I am expecting a CTC in the range of X to Y. However, I am open to discussion based on the overall compensation package and growth opportunities."<br>&#9733; If pressed early: "I would like to understand the complete role and responsibilities first before discussing compensation."</div><div class="tip">&#128161; <b>Tip:</b> Never undersell yourself. Research on Glassdoor, LinkedIn, and Levels.fyi before the interview!</div>'},
{q:"What do you know about our company?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Always research</span> the company before the interview. Check their website, LinkedIn, and recent news.<br>&#9733; Mention their <span class="key">products/services</span>, tech stack, recent achievements, or company culture.<br>&#9733; Show genuine interest - explain <span class="key">why this company excites you</span>.<br>&#9733; Example: "I know your company is a leading provider of [product/service] with a strong focus on [technology/innovation]. I was impressed by your recent [achievement/product launch]. I am excited about the opportunity to work with your modern tech stack and contribute to your growing team."</div>'},
{q:"Do you have any questions for us?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Always say YES</span>. Saying "No" shows lack of interest.<br>&#9733; Ask about the <span class="key">team</span>, <span class="key">tech stack</span>, <span class="key">projects</span>, or <span class="key">growth opportunities</span>.<br>&#9733; Good questions to ask:<br>&#9733; "What does a typical day look like for this role?"<br>&#9733; "What tech stack does the team currently use?"<br>&#9733; "How does the team handle code reviews and deployments?"<br>&#9733; "What are the growth opportunities for this position?"<br>&#9733; "What is the biggest challenge the team is currently facing?"</div><div class="tip">&#128161; <b>Tip:</b> Prepare 3-4 questions. Never ask about salary or leaves in the first round!</div>'},
// Intermediate
{q:"Tell me about a challenging project you worked on.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Use the <span class="key">STAR method</span>: Situation, Task, Action, Result.<br>&#9733; <b>Situation:</b> Describe the project and the challenge you faced.<br>&#9733; <b>Task:</b> What was your responsibility?<br>&#9733; <b>Action:</b> What specific steps did YOU take to solve it?<br>&#9733; <b>Result:</b> What was the outcome? Use <span class="key">numbers/metrics</span> if possible.<br>&#9733; Example: "In the Helpdesk Ticketing Tool, we had a challenge where tickets were being assigned to wrong teams, causing delays (Situation). I was tasked with building an intelligent ticket routing system (Task). I designed a workflow where tickets are categorized by type (Hardware, Software, Network) and auto-assigned to the appropriate team. I also built an escalation mechanism for unresolved tickets (Action). This reduced average ticket resolution time by 40% and eliminated mis-routing completely (Result)."</div>'},
{q:"How do you handle tight deadlines and pressure?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show you stay <span class="key">calm and organized</span> under pressure.<br>&#9733; Talk about <span class="key">prioritization</span> - break tasks into smaller pieces, focus on high-impact items first.<br>&#9733; Mention <span class="key">communication</span> - keep the team and manager informed about progress and blockers.<br>&#9733; Example: "When building the Audit Module in MVC .NET Core, we had a tight 3-week deadline to deliver the complete audit tracking system before the annual compliance review. I broke it into phases - Week 1: database design and core CRUD operations, Week 2: audit trail logging and reporting, Week 3: testing and deployment. I communicated daily progress to my manager and delivered on time with all features working."</div>'},
{q:"Describe a time you had a conflict with a team member.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show you handle conflicts <span class="key">professionally and maturely</span>.<br>&#9733; Never blame the other person. Focus on the <span class="key">resolution</span>.<br>&#9733; Show you <span class="key">listen</span>, <span class="key">understand their perspective</span>, and find a <span class="key">win-win solution</span>.<br>&#9733; Example: "While building the Store Module, a colleague wanted to handle all stock calculations on the client side in VB forms, while I suggested doing it in the database with stored procedures for data integrity. Instead of arguing, I demonstrated both approaches with a small prototype. We agreed to use stored procedures for stock calculations (to prevent data inconsistency across branches) and VB forms for UI validation. This hybrid approach ensured data accuracy across all branches."</div>'},
{q:"How do you prioritize tasks when you have multiple deadlines?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Use a <span class="key">prioritization framework</span> - urgent vs important, business impact, dependencies.<br>&#9733; <span class="key">Communicate</span> with stakeholders about realistic timelines.<br>&#9733; Break large tasks into <span class="key">smaller deliverables</span>.<br>&#9733; Example: "I use the Eisenhower matrix - urgent+important tasks first, then important but not urgent. I also check with my manager on business priority. In sprint planning, I estimate effort for each task and if I see a conflict, I raise it early so we can adjust scope or get help."</div>'},
{q:"Tell me about a time you made a mistake. How did you handle it?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Be <span class="key">honest</span> - everyone makes mistakes. Show you <span class="key">own it</span> and <span class="key">learn from it</span>.<br>&#9733; Explain what happened, how you <span class="key">fixed it</span>, and what you <span class="key">learned</span>.<br>&#9733; Example: "In the Store Module, I once pushed a stock update that incorrectly calculated branch transfers - items were deducted from source but not added to destination branch. I immediately identified the issue through the stock mismatch report, corrected the data manually, and fixed the transaction logic to use database transactions (BEGIN TRAN/COMMIT) so both operations succeed or fail together. After that, I added validation checks and reconciliation reports. It taught me the importance of atomic transactions in inventory systems."</div>'},
{q:"How do you stay updated with new technologies?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show you are a <span class="key">continuous learner</span>.<br>&#9733; Mention specific resources: <span class="key">blogs</span> (Medium, Dev.to), <span class="key">YouTube channels</span>, <span class="key">courses</span> (Udemy, Pluralsight), <span class="key">documentation</span>, <span class="key">conferences</span>.<br>&#9733; Mention <span class="key">hands-on practice</span> - side projects, contributing to open source, experimenting with new tools.<br>&#9733; Example: "I follow .NET blogs, Microsoft documentation, and take Udemy courses. My own career shows this growth - I started with VB Web Services (Helpdesk Tool) and Windows Applications (Store Module), then moved to modern MVC .NET Core for the Preventive Maintenance and Audit modules. I actively learn new patterns like Repository pattern, Dependency Injection, and Entity Framework Core by applying them in my projects."</div>'},
{q:"Describe your experience with Agile/Scrum methodology.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Explain your <span class="key">hands-on experience</span> with Agile ceremonies.<br>&#9733; Mention: <span class="key">Sprint Planning</span>, <span class="key">Daily Standups</span>, <span class="key">Sprint Review</span>, <span class="key">Retrospective</span>.<br>&#9733; Talk about tools: <span class="key">Jira</span>, Azure DevOps Boards, Trello.<br>&#9733; Example: "For the Preventive Maintenance and Audit modules (MVC .NET Core), we followed Agile methodology with 2-week sprints. I participated in sprint planning where we broke features like branch visit scheduling, audit trail logging into user stories. We had daily standups to discuss progress. I used Azure DevOps for task tracking and version control. Sprint reviews helped us get early feedback from the operations team."</div>'},
{q:"How do you handle code reviews and feedback?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show you <span class="key">welcome feedback</span> as a learning opportunity.<br>&#9733; When reviewing others: be <span class="key">constructive</span>, focus on code not the person, suggest improvements with examples.<br>&#9733; When receiving feedback: <span class="key">dont take it personally</span>, ask questions to understand, and implement the suggestions.<br>&#9733; Example: "I see code reviews as a learning opportunity for both sides. When I review code, I focus on readability, performance, and potential bugs. I always explain WHY something should change, not just what. When I receive feedback, I appreciate it and ask questions if I dont understand. It has helped me grow significantly as a developer."</div>'},
{q:"Tell me about a time you mentored a junior developer.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show your <span class="key">leadership and teaching</span> ability.<br>&#9733; Explain how you helped them <span class="key">grow</span> - pair programming, code reviews, knowledge sharing.<br>&#9733; Mention the <span class="key">result</span> - they became more independent, delivered features faster, etc.<br>&#9733; Example: "When a new developer joined to help with the Audit Module, I was their buddy. I started with pair programming to explain our MVC .NET Core project structure - Controllers, Services, Repository pattern, and Entity Framework Core. I created documentation for the project setup and database schema. I also walked them through the Preventive Maintenance module as a reference. Within 2 months, they were independently building audit report features and handling code reviews."</div>'},
// Advanced
{q:"Describe the architecture of your current/last project.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Explain the <span class="key">high-level architecture</span> clearly - frontend, backend, database, deployment.<br>&#9733; Mention <span class="key">tech stack</span>: .NET Core, Angular/React, SQL Server, Azure, etc.<br>&#9733; Explain <span class="key">patterns used</span>: Repository pattern, CQRS, microservices, etc.<br>&#9733; Example: "I have worked on different architectures:<br>&#9733; <b>Helpdesk Tool:</b> Web Service built in VB with SQL Server backend. Ticket creation, assignment, and resolution workflow with team-based routing.<br>&#9733; <b>Store Module:</b> Windows Application in VB with SQL Server. Stock management, branch-wise inventory tracking, and item transfer between branches.<br>&#9733; <b>Preventive Maintenance:</b> MVC .NET Core with Entity Framework Core and SQL Server. Scheduled branch visits, status tracking, and situation reporting.<br>&#9733; <b>Audit Module:</b> MVC .NET Core with Repository pattern, EF Core, SQL Server. Company-wide audit tracking, activity logging, and compliance reporting."</div><div class="tip">&#128161; <b>Tip:</b> Draw a simple architecture diagram on paper before the interview. Be ready to explain each layer!</div>'},
{q:"What was the most complex technical problem you solved?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Use <span class="key">STAR method</span> again. Pick a genuinely complex problem.<br>&#9733; Show your <span class="key">debugging process</span> - how you identified the root cause.<br>&#9733; Highlight the <span class="key">technical depth</span> of your solution.<br>&#9733; Example: "In the Store Module, we had a complex problem where stock reports were showing incorrect quantities across branches. The issue was that when items were transferred between branches, concurrent transactions were causing race conditions. I solved this by implementing proper database transactions with row-level locking (SELECT WITH UPDLOCK), adding a stock reconciliation stored procedure that runs nightly, and building a mismatch alert system. This eliminated all stock discrepancies and the operations team could trust the reports completely."</div>'},
{q:"How did you improve performance in your project? Give metrics.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Always give <span class="key">specific numbers</span> - before vs after.<br>&#9733; Mention the <span class="key">tools</span> you used to measure: SQL Profiler, Application Insights, load testing.<br>&#9733; Explain the <span class="key">techniques</span>: indexing, caching, async programming, query optimization.<br>&#9733; Example: "In the Preventive Maintenance Module (MVC .NET Core), the branch visit report page was loading slowly with 500+ branches. I improved it by: (1) Adding SQL Server indexes on BranchId and VisitDate columns - query time reduced from 4s to 300ms. (2) Implementing server-side pagination instead of loading all records - page load reduced from 8s to 1s. (3) Using async/await for database calls - improved concurrent user handling. (4) Adding output caching for the branch master data that rarely changes. Overall, the module became 5x faster."</div>'},
{q:"How do you make technical decisions? Give an example.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show a <span class="key">structured approach</span>: research, evaluate options, discuss with team, decide.<br>&#9733; Consider: <span class="key">performance</span>, <span class="key">maintainability</span>, <span class="key">team expertise</span>, <span class="key">timeline</span>, <span class="key">cost</span>.<br>&#9733; Example: "When starting the Audit Module, I had to decide between using raw ADO.NET (like our older VB projects) or Entity Framework Core. I evaluated both - ADO.NET was familiar but required more boilerplate code, while EF Core offered faster development with LINQ and migrations. I chose EF Core with Repository pattern for the Audit and Preventive Maintenance modules because it reduced development time by 40% and made the code more maintainable. For complex audit reports, I used raw SQL queries through EF Core for better performance."</div>'},
{q:"Describe a time you had to learn a new technology quickly.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show you are a <span class="key">fast learner</span> and <span class="key">self-motivated</span>.<br>&#9733; Explain your <span class="key">learning approach</span>: documentation, tutorials, hands-on practice, asking experts.<br>&#9733; Example: "When I was assigned the Preventive Maintenance Module, I had to move from VB (which I used for Helpdesk and Store projects) to MVC .NET Core. I spent the first week learning MVC architecture, Entity Framework Core, and Dependency Injection through Microsoft docs and Udemy courses. I built a small CRUD prototype to understand the Controller-View-Model flow. Within 2 weeks, I was building the branch visit scheduling feature. This transition from VB to .NET Core was a major growth step in my career."</div>'},
{q:"How do you handle production incidents/outages?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show a <span class="key">calm, systematic approach</span>.<br>&#9733; Steps: <span class="key">Acknowledge</span> the issue, <span class="key">assess impact</span>, <span class="key">communicate</span> to stakeholders, <span class="key">fix/rollback</span>, <span class="key">post-mortem</span>.<br>&#9733; Example: "In the Helpdesk Tool, we had an incident where ticket assignments were failing during peak hours. I checked the Web Service logs and found the database connection was timing out due to a long-running query in the ticket assignment stored procedure. I immediately optimized the query by adding an index on TicketStatus and TeamId columns, and increased the connection timeout as a temporary fix. I then rewrote the assignment logic to use a more efficient query. After resolution, I documented the root cause and added database monitoring alerts."</div>'},
{q:"What is your approach to estimating tasks?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Show a <span class="key">realistic and structured</span> estimation approach.<br>&#9733; Break tasks into <span class="key">smaller subtasks</span> and estimate each.<br>&#9733; Include time for <span class="key">testing, code review, and unexpected issues</span>.<br>&#9733; Example: "For the Audit Module, when estimating the audit trail feature, I broke it into: Database schema design (1 day), Audit log service with EF Core (2 days), Controller and Views (2 days), Report generation (2 days), Testing (1 day), Code review and fixes (1 day) = 9 days total + 2 days buffer = 11 days. I compared this with similar features I built in the Preventive Maintenance module for reference. I communicated the estimate to my manager with the breakdown so expectations were clear."</div>'},
{q:"How do you ensure code quality in your team?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Mention multiple <span class="key">quality practices</span> you follow.<br>&#9733; <span class="key">Code Reviews</span> - mandatory PR reviews before merge.<br>&#9733; <span class="key">Unit Tests</span> - maintain good test coverage.<br>&#9733; <span class="key">Coding Standards</span> - follow consistent naming, patterns, and style guides.<br>&#9733; <span class="key">CI/CD</span> - automated builds, tests, and deployments.<br>&#9733; <span class="key">Static Analysis</span> - tools like SonarQube to catch issues early.<br>&#9733; Example: "In the MVC .NET Core projects (Preventive Maintenance and Audit), I follow: mandatory code reviews before merging, consistent naming conventions and folder structure (Controllers, Services, Repositories, Models), proper use of Dependency Injection, and separation of concerns. I also write stored procedures for complex queries instead of inline SQL. For the older VB projects (Helpdesk, Store), I maintain proper error handling, code comments, and database transaction management."</div>'}
],
plsql:[
// Basics
{q:"What is PL/SQL? How is it different from SQL?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">SQL</span> is declarative — you tell WHAT data you want.<br>&#9733; <span class="key">PL/SQL</span> is procedural — you tell HOW to process data using variables, loops, conditions, and exception handling.<br>&#9733; PL/SQL wraps SQL with programming logic and runs as a block on the Oracle server, reducing network round trips.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- SQL: single command</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Salary > 50000;<br><br><span class="cm">-- PL/SQL: full program block</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;v_name VARCHAR2(50);<br>&nbsp;&nbsp;v_sal NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary <span class="kw">INTO</span> v_name, v_sal<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = 101;<br><br>&nbsp;&nbsp;<span class="kw">IF</span> v_sal > 50000 <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\'  is Senior\'</span>);<br>&nbsp;&nbsp;<span class="kw">ELSE</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\'  is Junior\'</span>);<br>&nbsp;&nbsp;<span class="kw">END IF</span>;<br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> NO_DATA_FOUND <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Not found\'</span>);<br><span class="kw">END</span>;</div>'},
{q:"What is a PL/SQL Block? Explain DECLARE, BEGIN, EXCEPTION, END.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A PL/SQL block has 4 sections: <span class="key">DECLARE</span> (optional — variables, cursors), <span class="key">BEGIN</span> (required — executable statements), <span class="key">EXCEPTION</span> (optional — error handling), <span class="key">END</span> (required).<br>&#9733; There are 3 types: Anonymous blocks (unnamed), Procedures (named, no return), Functions (named, returns value).</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Anonymous Block (simplest)</span><br><span class="kw">DECLARE</span> <span class="cm">-- 1. Declare variables</span><br>&nbsp;&nbsp;v_emp_name VARCHAR2(50);<br>&nbsp;&nbsp;v_salary NUMBER := 0;<br><span class="kw">BEGIN</span> <span class="cm">-- 2. Main logic</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary <span class="kw">INTO</span> v_emp_name, v_salary<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = 101;<br><br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_emp_name || <span class="str">\' earns \'</span> || v_salary);<br><span class="kw">EXCEPTION</span> <span class="cm">-- 3. Handle errors</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> NO_DATA_FOUND <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Employee not found\'</span>);<br>&nbsp;&nbsp;<span class="kw">WHEN</span> OTHERS <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Error: \'</span> || SQLERRM);<br><span class="kw">END</span>; <span class="cm">-- 4. End block</span></div>'},
{q:"What are Variables in PL/SQL? How do you declare them?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Variables in PL/SQL are declared in the <span class="key">DECLARE</span> section with syntax: <b>name datatype [:= value]</b>.<br>&#9733; Common types: VARCHAR2, NUMBER, DATE, BOOLEAN.<br>&#9733; Use <span class="key">CONSTANT</span> for fixed values, <span class="key">NOT NULL</span> to enforce value.<br>&#9733; Use <span class="key">:=</span> for assignment (not = like in SQL).<br>&#9733; Variables are local to the block.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="cm">-- Basic variables</span><br>&nbsp;&nbsp;v_name VARCHAR2(50); <span class="cm">-- text, max 50 chars</span><br>&nbsp;&nbsp;v_salary NUMBER(10,2) := 50000; <span class="cm">-- number with default</span><br>&nbsp;&nbsp;v_is_active BOOLEAN := TRUE; <span class="cm">-- true/false</span><br>&nbsp;&nbsp;v_hire_date DATE := SYSDATE; <span class="cm">-- current date</span><br><br>&nbsp;&nbsp;<span class="cm">-- Constant (cannot change)</span><br>&nbsp;&nbsp;c_tax_rate CONSTANT NUMBER := 0.18;<br><br>&nbsp;&nbsp;<span class="cm">-- NOT NULL (must have value)</span><br>&nbsp;&nbsp;v_dept VARCHAR2(20) NOT NULL := <span class="str">\'IT\'</span>;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;v_name := <span class="str">\'Arjun\'</span>; <span class="cm">-- assign value</span><br>&nbsp;&nbsp;v_salary := v_salary * (1 + c_tax_rate);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\' - \'</span> || v_salary);<br><span class="kw">END</span>;</div>'},
{q:"What is the %TYPE attribute?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">%TYPE</span> anchors a variable to a table columns data type.<br>&#9733; Syntax: <b>variable_name table.column%TYPE</b>.<br>&#9733; Benefits: no hardcoding types, auto-adapts if column type changes, reduces maintenance.<br>&#9733; Always use %TYPE instead of hardcoding VARCHAR2(50) etc.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="cm">-- Copies datatype from Employee.Name column</span><br>&nbsp;&nbsp;v_name Employee.Name<span class="kw">%TYPE</span>;<br>&nbsp;&nbsp;v_salary Employee.Salary<span class="kw">%TYPE</span>;<br>&nbsp;&nbsp;v_dept Department.DeptName<span class="kw">%TYPE</span>;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary <span class="kw">INTO</span> v_name, v_salary<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = 101;<br><br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\' - \'</span> || v_salary);<br><span class="kw">END</span>;</div>'},
{q:"What is the %ROWTYPE attribute?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">%ROWTYPE</span> declares a record variable that matches an entire table row structure.<br>&#9733; Syntax: <b>variable table_name%ROWTYPE</b>.<br>&#9733; Access columns using dot notation (v_emp.Name).<br>&#9733; Benefits: less code, auto-adapts to table changes, perfect with SELECT * INTO.<br>&#9733; Use %TYPE for single column, %ROWTYPE for entire row.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">DECLARE</span><br>&nbsp;&nbsp;v_emp Employee<span class="kw">%ROWTYPE</span>; <span class="cm">-- holds entire row</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> * <span class="kw">INTO</span> v_emp<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = 101;<br><br>&nbsp;&nbsp;<span class="cm">-- Access each column with dot notation</span><br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_emp.Name);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_emp.Salary);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_emp.Email);<br><span class="kw">END</span>;</div>'},
{q:"What are Cursors? Explain Implicit vs Explicit Cursors.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Cursor</span> is a pointer to a query result set.<br>&#9733; <span class="key">Implicit cursors</span> are auto-created by Oracle for single SQL statements.<br>&#9733; <span class="key">Explicit cursors</span> are declared by developers for multi-row processing with DECLARE, OPEN, FETCH, CLOSE lifecycle.<br>&#9733; Use cursor FOR loop for simpler syntax.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Implicit Cursor (auto by Oracle)</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * 1.1;<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(SQL%ROWCOUNT || <span class="str">\' rows updated\'</span>);<br><span class="kw">END</span>;<br><br><span class="cm">-- Explicit Cursor (you control)</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="kw">CURSOR</span> c_emp <span class="kw">IS</span> <span class="kw">SELECT</span> Name, Salary <span class="kw">FROM</span> Employee;<br>&nbsp;&nbsp;v_name Employee.Name%TYPE;<br>&nbsp;&nbsp;v_sal Employee.Salary%TYPE;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">OPEN</span> c_emp;<br>&nbsp;&nbsp;<span class="kw">LOOP</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">FETCH</span> c_emp <span class="kw">INTO</span> v_name, v_sal;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">EXIT WHEN</span> c_emp%NOTFOUND;<br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_name || <span class="str">\' - \'</span> || v_sal);<br>&nbsp;&nbsp;<span class="kw">END LOOP</span>;<br>&nbsp;&nbsp;<span class="kw">CLOSE</span> c_emp;<br><span class="kw">END</span>;</div>'},
{q:"What is the difference between WHERE and HAVING?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">WHERE</span> filters rows before GROUP BY and cannot use aggregate functions.<br>&#9733; <span class="key">HAVING</span> filters groups after GROUP BY and can use COUNT, SUM, AVG.<br>&#9733; Execution order: WHERE → GROUP BY → HAVING.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- WHERE: filter rows first, then group</span><br><span class="kw">SELECT</span> DeptId, COUNT(*) <span class="kw">as</span> Total<br><span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Salary > 30000 <span class="cm">-- filter individual rows</span><br><span class="kw">GROUP BY</span> DeptId<br><span class="kw">HAVING</span> COUNT(*) > 5; <span class="cm">-- filter groups</span><br><br><span class="cm">-- WHERE: cannot use COUNT, SUM, AVG</span><br><span class="cm">-- HAVING: can use aggregate functions</span></div>'},
{q:"What are Joins? Explain INNER, LEFT, RIGHT, FULL JOIN.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">INNER JOIN</span> returns only matching rows from both tables.<br>&#9733; <span class="key">LEFT JOIN</span> returns all left rows + matching right (NULL if no match).<br>&#9733; <span class="key">RIGHT JOIN</span> is opposite.<br>&#9733; <span class="key">FULL OUTER JOIN</span> returns all rows from both tables.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- INNER: only employees WITH department</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">INNER JOIN</span> Department d<br><span class="kw">ON</span> e.DeptId = d.DeptId;<br><br><span class="cm">-- LEFT: all employees, even without dept</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">LEFT JOIN</span> Department d<br><span class="kw">ON</span> e.DeptId = d.DeptId;</div>'},
{q:"What is a Stored Procedure? How do you create one?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Stored Procedure</span> is a named PL/SQL block stored in the database.<br>&#9733; It accepts <span class="key">IN</span> (input), <span class="key">OUT</span> (output), <span class="key">IN OUT</span> (both) parameters.<br>&#9733; Benefits: reusable, pre-compiled (faster), reduces network traffic, and provides security through controlled access.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Create Procedure</span><br><span class="kw">CREATE OR REPLACE PROCEDURE</span> give_raise(<br>&nbsp;&nbsp;p_emp_id <span class="kw">IN</span> NUMBER,<br>&nbsp;&nbsp;p_percent <span class="kw">IN</span> NUMBER,<br>&nbsp;&nbsp;p_new_sal <span class="kw">OUT</span> NUMBER<br>) <span class="kw">AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee<br>&nbsp;&nbsp;<span class="kw">SET</span> Salary = Salary * (1 + p_percent/100)<br>&nbsp;&nbsp;<span class="kw">WHERE</span> EmpId = p_emp_id<br>&nbsp;&nbsp;<span class="kw">RETURNING</span> Salary <span class="kw">INTO</span> p_new_sal;<br>&nbsp;&nbsp;<span class="kw">COMMIT</span>;<br><span class="kw">END</span>;<br><br><span class="cm">-- Call it</span><br><span class="kw">DECLARE</span> v_sal NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;give_raise(101, 10, v_sal);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'New salary: \'</span> || v_sal);<br><span class="kw">END</span>;</div>'},
{q:"What is a Function? Difference between Procedure and Function?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Function</span> MUST return a value using RETURN keyword and can be used inside SELECT statements.<br>&#9733; A <span class="key">Procedure</span> does not return a value (uses OUT params instead) and cannot be used in SELECT.<br>&#9733; Use functions for calculations, procedures for actions like INSERT/UPDATE.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Function: MUST return a value</span><br><span class="kw">CREATE OR REPLACE FUNCTION</span> get_salary(<br>&nbsp;&nbsp;p_emp_id <span class="kw">IN</span> NUMBER<br>) <span class="kw">RETURN</span> NUMBER <span class="kw">AS</span><br>&nbsp;&nbsp;v_sal NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Salary <span class="kw">INTO</span> v_sal<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> EmpId = p_emp_id;<br>&nbsp;&nbsp;<span class="kw">RETURN</span> v_sal; <span class="cm">-- MUST return!</span><br><span class="kw">END</span>;<br><br><span class="cm">-- Use in SELECT (procedure cannot do this!)</span><br><span class="kw">SELECT</span> Name, get_salary(EmpId) <span class="kw">FROM</span> Employee;</div>'},
{q:"What are IN, OUT, and IN OUT parameters?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">IN</span> is default, read-only input.<br>&#9733; <span class="key">OUT</span> is write-only, procedure assigns value for caller.<br>&#9733; <span class="key">IN OUT</span> is read-write, caller passes value and procedure can modify it.<br>&#9733; IN params can have defaults, OUT/IN OUT cannot.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE PROCEDURE</span> calculate_bonus(<br>&nbsp;&nbsp;p_emp_id <span class="kw">IN</span> NUMBER, <span class="cm">-- input: read only</span><br>&nbsp;&nbsp;p_bonus <span class="kw">OUT</span> NUMBER, <span class="cm">-- output: procedure sets this</span><br>&nbsp;&nbsp;p_salary <span class="kw">IN OUT</span> NUMBER <span class="cm">-- both: read + modify</span><br>) <span class="kw">AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;p_bonus := p_salary * 0.1; <span class="cm">-- set OUT param</span><br>&nbsp;&nbsp;p_salary := p_salary + p_bonus; <span class="cm">-- modify IN OUT param</span><br><span class="kw">END</span>;<br><br><span class="cm">-- Call it</span><br><span class="kw">DECLARE</span> v_bonus NUMBER; v_sal NUMBER := 50000;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;calculate_bonus(101, v_bonus, v_sal);<br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_bonus); <span class="cm">-- 5000</span><br>&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(v_sal); <span class="cm">-- 55000 (modified!)</span><br><span class="kw">END</span>;</div>'},
{q:"What is NVL? Difference between NVL and NVL2?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">NVL(expr, default)</span> returns default if expr is NULL.<br>&#9733; <span class="key">NVL2(expr, val_if_not_null, val_if_null)</span> returns different values based on whether expr is NULL or not.<br>&#9733; NVL is like ISNULL in SQL Server.<br>&#9733; NVL2 is more flexible with 3 parameters.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- NVL: replace NULL with default</span><br><span class="kw">SELECT</span> NVL(Phone, <span class="str">\'No Phone\'</span>) <span class="kw">FROM</span> Employee;<br><span class="cm">-- NULL → "No Phone", "9876543210" → "9876543210"</span><br><br><span class="cm">-- NVL2: different result for null vs not-null</span><br><span class="kw">SELECT</span> NVL2(Commission, Salary + Commission, Salary) <span class="kw">FROM</span> Employee;<br><span class="cm">-- Commission exists → Salary + Commission</span><br><span class="cm">-- Commission is NULL → just Salary</span><br><br><span class="cm">-- NVL2 for status display</span><br><span class="kw">SELECT</span> NVL2(ManagerId, <span class="str">\'Has Manager\'</span>, <span class="str">\'Top Level\'</span>) <span class="kw">FROM</span> Employee;</div>'},
{q:"What is the difference between DELETE, TRUNCATE, and DROP?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">DELETE</span> is DML, supports WHERE, can rollback, fires triggers, slow.<br>&#9733; <span class="key">TRUNCATE</span> is DDL, removes all rows, resets sequences, fast, no rollback.<br>&#9733; <span class="key">DROP</span> is DDL, removes entire table structure.<br>&#9733; In Oracle, use FLASHBACK TABLE to recover dropped tables from recycle bin.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- DELETE: DML, can rollback, fires triggers</span><br><span class="kw">DELETE FROM</span> Employee <span class="kw">WHERE</span> DeptId = 3;<br><span class="kw">ROLLBACK</span>; <span class="cm">-- undo! ✅</span><br><br><span class="cm">-- TRUNCATE: DDL, cannot rollback, no triggers</span><br><span class="kw">TRUNCATE TABLE</span> Employee; <span class="cm">-- all rows gone, fast!</span><br><br><span class="cm">-- DROP: DDL, removes table completely</span><br><span class="kw">DROP TABLE</span> Employee; <span class="cm">-- table + data + indexes gone!</span></div>'},
{q:"What are Constraints? Explain PK, FK, UNIQUE, CHECK, NOT NULL.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">PRIMARY KEY</span> = unique + not null.<br>&#9733; <span class="key">FOREIGN KEY</span> = references parent table.<br>&#9733; <span class="key">UNIQUE</span> = no duplicates (allows null).<br>&#9733; <span class="key">CHECK</span> = validates condition.<br>&#9733; <span class="key">NOT NULL</span> = mandatory value.<br>&#9733; Constraints ensure data integrity at DB level.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE TABLE</span> Employee (<br>&nbsp;&nbsp;Id NUMBER <span class="kw">PRIMARY KEY</span>, <span class="cm">-- unique + not null</span><br>&nbsp;&nbsp;Name VARCHAR2(50) <span class="kw">NOT NULL</span>, <span class="cm">-- must have value</span><br>&nbsp;&nbsp;Email VARCHAR2(100) <span class="kw">UNIQUE</span>, <span class="cm">-- no duplicates</span><br>&nbsp;&nbsp;Age NUMBER <span class="kw">CHECK</span>(Age BETWEEN 18 AND 65), <span class="cm">-- range rule</span><br>&nbsp;&nbsp;DeptId NUMBER <span class="kw">REFERENCES</span> Department(Id) <span class="cm">-- foreign key</span><br>);</div>'},
{q:"What is a Sequence? How do you use it?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Sequence</span> generates unique numbers using NEXTVAL (next value) and CURRVAL (current value).<br>&#9733; Used for primary keys.<br>&#9733; CACHE improves performance by pre-generating numbers.<br>&#9733; Oracle 12c+ supports <span class="key">IDENTITY columns</span> as an alternative.<br>&#9733; Sequences are independent objects — can be shared across tables.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Create sequence</span><br><span class="kw">CREATE SEQUENCE</span> emp_seq<br>&nbsp;&nbsp;START WITH 1<br>&nbsp;&nbsp;INCREMENT BY 1<br>&nbsp;&nbsp;NOCACHE; <span class="cm">-- or CACHE 20 for performance</span><br><br><span class="cm">-- Use in INSERT</span><br><span class="kw">INSERT INTO</span> Employee(Id, Name)<br><span class="kw">VALUES</span>(emp_seq.NEXTVAL, <span class="str">\'Arjun\'</span>); <span class="cm">-- Id = 1</span><br><br><span class="kw">INSERT INTO</span> Employee(Id, Name)<br><span class="kw">VALUES</span>(emp_seq.NEXTVAL, <span class="str">\'Ravi\'</span>); <span class="cm">-- Id = 2</span><br><br><span class="cm">-- Get current value</span><br><span class="kw">SELECT</span> emp_seq.CURRVAL <span class="kw">FROM</span> dual; <span class="cm">-- 2</span><br><br><span class="cm">-- Oracle 12c+ Identity column (like SQL Server)</span><br>Id NUMBER <span class="kw">GENERATED ALWAYS AS IDENTITY</span>;</div>'},
{q:"What is DECODE? How is it different from CASE?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">DECODE</span> is Oracle-specific, only does equality checks (=), compact syntax.<br>&#9733; <span class="key">CASE</span> is ANSI standard, supports ranges (>, <, BETWEEN, LIKE, IS NULL), more readable.<br>&#9733; Prefer CASE for new code — its portable and more powerful.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- DECODE: simple equality checks only</span><br><span class="kw">SELECT</span> Name,<br>&nbsp;&nbsp;DECODE(DeptId, 1, <span class="str">\'IT\'</span>, 2, <span class="str">\'HR\'</span>, 3, <span class="str">\'Sales\'</span>, <span class="str">\'Other\'</span>) <span class="kw">as</span> Dept<br><span class="kw">FROM</span> Employee;<br><span class="cm">-- If DeptId=1 then IT, if 2 then HR, else Other</span><br><br><span class="cm">-- CASE: more powerful, supports ranges ⭐</span><br><span class="kw">SELECT</span> Name,<br>&nbsp;&nbsp;<span class="kw">CASE</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">WHEN</span> Salary > 80000 <span class="kw">THEN</span> <span class="str">\'Senior\'</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">WHEN</span> Salary > 50000 <span class="kw">THEN</span> <span class="str">\'Mid\'</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">ELSE</span> <span class="str">\'Junior\'</span><br>&nbsp;&nbsp;<span class="kw">END</span> <span class="kw">as</span> Level<br><span class="kw">FROM</span> Employee;</div>'},
{q:"What is the difference between CHAR and VARCHAR2?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">CHAR</span> is fixed-length, padded with spaces — use for fixed codes (Gender=M, Country=IN).<br>&#9733; <span class="key">VARCHAR2</span> is variable-length, saves space — use for names, addresses, most text.<br>&#9733; VARCHAR2 max is 4000 bytes in SQL, 32767 in PL/SQL.<br>&#9733; Always prefer VARCHAR2 unless data is truly fixed-length.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- CHAR(10): always 10 bytes</span><br><span class="kw">DECLARE</span> v_code CHAR(10) := <span class="str">\'Hi\'</span>;<br><span class="cm">-- Stored as: "Hi        " (padded to 10 chars)</span><br>LENGTH(v_code); <span class="cm">-- 10 (includes padding!)</span><br><br><span class="cm">-- VARCHAR2(10): only uses needed space</span><br><span class="kw">DECLARE</span> v_name VARCHAR2(10) := <span class="str">\'Hi\'</span>;<br><span class="cm">-- Stored as: "Hi" (2 bytes only)</span><br>LENGTH(v_name); <span class="cm">-- 2</span><br><br><span class="cm">-- ⚠️ CHAR comparison trap!</span><br><span class="cm">-- CHAR(10) \'Hi\' = CHAR(10) \'Hi\' → TRUE (both padded)</span><br><span class="cm">-- CHAR(10) \'Hi\' = VARCHAR2 \'Hi\' → may be FALSE! (padding mismatch)</span></div>'},
// Intermediate
{q:"What are Triggers? Explain BEFORE, AFTER, INSTEAD OF triggers.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">BEFORE</span> triggers run before DML — can modify :NEW values, validate data.<br>&#9733; <span class="key">AFTER</span> triggers run after DML — used for auditing, logging.<br>&#9733; <span class="key">INSTEAD OF</span> triggers replace the DML — used on views for complex updates. :NEW has new values, :OLD has previous values.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- BEFORE trigger: auto-set created date</span><br><span class="kw">CREATE TRIGGER</span> trg_before_insert<br><span class="kw">BEFORE INSERT ON</span> Employee<br><span class="kw">FOR EACH ROW</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;:NEW.CreatedAt := SYSDATE; <span class="cm">-- set before insert</span><br>&nbsp;&nbsp;:NEW.Name := UPPER(:NEW.Name); <span class="cm">-- auto uppercase</span><br><span class="kw">END</span>;<br><br><span class="cm">-- AFTER trigger: audit log</span><br><span class="kw">CREATE TRIGGER</span> trg_after_delete<br><span class="kw">AFTER DELETE ON</span> Employee<br><span class="kw">FOR EACH ROW</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">INSERT INTO</span> AuditLog(Action, EmpName, DeletedAt)<br>&nbsp;&nbsp;<span class="kw">VALUES</span>(<span class="str">\'DELETE\'</span>, :OLD.Name, SYSDATE);<br><span class="kw">END</span>;</div>'},
{q:"What are Packages? Explain Package Specification and Body.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Package</span> groups related PL/SQL objects.<br>&#9733; <span class="key">Specification</span> declares public interface (visible to callers).<br>&#9733; <span class="key">Body</span> contains implementation + private members.<br>&#9733; Benefits: encapsulation, modularity, better performance (loaded once into memory), overloading support.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Package Specification (public interface)</span><br><span class="kw">CREATE PACKAGE</span> emp_pkg <span class="kw">AS</span><br>&nbsp;&nbsp;<span class="kw">PROCEDURE</span> hire_employee(p_name VARCHAR2, p_salary NUMBER);<br>&nbsp;&nbsp;<span class="kw">FUNCTION</span> get_salary(p_id NUMBER) <span class="kw">RETURN</span> NUMBER;<br>&nbsp;&nbsp;c_tax_rate CONSTANT NUMBER := 0.18;<br><span class="kw">END</span> emp_pkg;<br><br><span class="cm">-- Package Body (private implementation)</span><br><span class="kw">CREATE PACKAGE BODY</span> emp_pkg <span class="kw">AS</span><br>&nbsp;&nbsp;<span class="cm">-- Private helper (not in spec = hidden!)</span><br>&nbsp;&nbsp;<span class="kw">PROCEDURE</span> log_action(p_msg VARCHAR2) <span class="kw">IS BEGIN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">INSERT INTO</span> Logs <span class="kw">VALUES</span>(p_msg, SYSDATE);<br>&nbsp;&nbsp;<span class="kw">END</span>;<br><br>&nbsp;&nbsp;<span class="kw">PROCEDURE</span> hire_employee(p_name VARCHAR2, p_salary NUMBER) <span class="kw">IS BEGIN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">INSERT INTO</span> Employee(Name, Salary) <span class="kw">VALUES</span>(p_name, p_salary);<br>&nbsp;&nbsp;&nbsp;&nbsp;log_action(<span class="str">\'Hired: \'</span> || p_name);<br>&nbsp;&nbsp;<span class="kw">END</span>;<br><span class="kw">END</span> emp_pkg;<br><br><span class="cm">-- Call: emp_pkg.hire_employee(\'Arjun\', 50000);</span></div>'},
{q:"What is a REF CURSOR? Strong vs Weak REF CURSOR?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">REF CURSOR</span> is a pointer to a query result set.<br>&#9733; <span class="key">Strong</span> is typed (RETURN type specified) — compile-time checking.<br>&#9733; <span class="key">Weak</span> (SYS_REFCURSOR) can return any query — more flexible.<br>&#9733; Commonly used to return result sets to .NET/Java applications from stored procedures.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Strong REF CURSOR: fixed return type</span><br><span class="kw">TYPE</span> emp_cursor <span class="kw">IS REF CURSOR RETURN</span> Employee%ROWTYPE;<br><br><span class="cm">-- Weak REF CURSOR: any query (most common ⭐)</span><br><span class="kw">PROCEDURE</span> get_data(p_cursor <span class="kw">OUT</span> SYS_REFCURSOR) <span class="kw">IS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">OPEN</span> p_cursor <span class="kw">FOR</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = 1;<br><span class="kw">END</span>;<br><br><span class="cm">-- Call from C# / .NET</span><br><span class="cm">// OracleCommand cmd = new OracleCommand("get_data", conn);</span><br><span class="cm">// cmd.Parameters.Add("p_cursor", OracleDbType.RefCursor, ParameterDirection.Output);</span><br><span class="cm">// OracleDataReader reader = cmd.ExecuteReader();</span></div>'},
{q:"What are Collections? Explain VARRAY, Nested Table, Associative Array.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Associative Array</span> (INDEX BY) — key-value pairs, sparse, PL/SQL only, most flexible.<br>&#9733; <span class="key">Nested Table</span> — dynamic size, can be stored in DB columns, supports set operations.<br>&#9733; <span class="key">VARRAY</span> — fixed max size, dense, stored in DB.<br>&#9733; Use Associative Array for PL/SQL processing, Nested Table for DB storage.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Associative Array (INDEX BY) - most flexible ⭐</span><br><span class="kw">TYPE</span> name_table <span class="kw">IS TABLE OF</span> VARCHAR2(50) <span class="kw">INDEX BY</span> PLS_INTEGER;<br>v_names name_table;<br>v_names(1) := <span class="str">\'Arjun\'</span>; v_names(2) := <span class="str">\'Ravi\'</span>;<br><span class="cm">-- No fixed size, sparse, PL/SQL only (not in tables)</span><br><br><span class="cm">-- 2. Nested Table - can store in DB column</span><br><span class="kw">TYPE</span> name_nt <span class="kw">IS TABLE OF</span> VARCHAR2(50);<br>v_names name_nt := name_nt(<span class="str">\'Arjun\'</span>, <span class="str">\'Ravi\'</span>);<br><span class="cm">-- Dynamic size, dense, can be stored in table column</span><br><br><span class="cm">-- 3. VARRAY - fixed max size</span><br><span class="kw">TYPE</span> name_va <span class="kw">IS VARRAY</span>(5) <span class="kw">OF</span> VARCHAR2(50);<br>v_names name_va := name_va(<span class="str">\'Arjun\'</span>, <span class="str">\'Ravi\'</span>);<br><span class="cm">-- Max 5 elements, dense, can be stored in table column</span></div>'},
{q:"What is BULK COLLECT and FORALL?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">BULK COLLECT</span> fetches multiple rows into a collection in one context switch.<br>&#9733; <span class="key">FORALL</span> executes DML for all collection elements in one switch.<br>&#9733; Together they reduce SQL-PL/SQL context switches from N to 1 — 10-50x faster for large datasets.<br>&#9733; Use LIMIT clause with BULK COLLECT for memory management.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- ❌ SLOW: row-by-row processing</span><br><span class="kw">FOR</span> rec <span class="kw">IN</span> (<span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee) <span class="kw">LOOP</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * 1.1 <span class="kw">WHERE</span> Id = rec.Id;<br><span class="kw">END LOOP</span>; <span class="cm">-- 10000 context switches! 💥</span><br><br><span class="cm">-- ✅ FAST: BULK COLLECT + FORALL</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;<span class="kw">TYPE</span> id_table <span class="kw">IS TABLE OF</span> Employee.Id%TYPE;<br>&nbsp;&nbsp;v_ids id_table;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="cm">-- Fetch all IDs at once</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Id <span class="kw">BULK COLLECT INTO</span> v_ids <span class="kw">FROM</span> Employee;<br><br>&nbsp;&nbsp;<span class="cm">-- Update all at once</span><br>&nbsp;&nbsp;<span class="kw">FORALL</span> i <span class="kw">IN</span> v_ids.FIRST..v_ids.LAST<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * 1.1 <span class="kw">WHERE</span> Id = v_ids(i);<br><span class="kw">END</span>; <span class="cm">-- 1 context switch! 🚀</span></div>'},
{q:"What is the difference between UNION and UNION ALL?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">UNION</span> removes duplicates using sort — slower.<br>&#9733; <span class="key">UNION ALL</span> keeps all rows — faster.<br>&#9733; Use UNION ALL when duplicates are acceptable or impossible.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- UNION: removes duplicates</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employees <span class="kw">UNION</span> <span class="kw">SELECT</span> Name <span class="kw">FROM</span> Contractors;<br><br><span class="cm">-- UNION ALL: keeps duplicates (faster!)</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employees <span class="kw">UNION ALL</span> <span class="kw">SELECT</span> Name <span class="kw">FROM</span> Contractors;</div>'},
{q:"What are Analytical Functions? Explain ROW_NUMBER, RANK, DENSE_RANK.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">ROW_NUMBER</span> gives unique sequential numbers.<br>&#9733; <span class="key">RANK</span> gives same number for ties but skips.<br>&#9733; <span class="key">DENSE_RANK</span> gives same for ties, no skip.<br>&#9733; Use PARTITION BY to restart per group.<br>&#9733; Common interview question: find Nth highest salary using DENSE_RANK.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Salaries: 80000, 70000, 70000, 60000</span><br><br><span class="cm">-- ROW_NUMBER: unique number, no ties</span><br><span class="cm">-- 80000=1, 70000=2, 70000=3, 60000=4</span><br><br><span class="cm">-- RANK: same for ties, SKIPS next</span><br><span class="cm">-- 80000=1, 70000=2, 70000=2, 60000=4 (skips 3!)</span><br><br><span class="cm">-- DENSE_RANK: same for ties, NO skip</span><br><span class="cm">-- 80000=1, 70000=2, 70000=2, 60000=3</span><br><br><span class="kw">SELECT</span> Name, Salary,<br>&nbsp;&nbsp;ROW_NUMBER() OVER(<span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>) <span class="kw">as</span> rn,<br>&nbsp;&nbsp;RANK() OVER(<span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>) <span class="kw">as</span> rnk,<br>&nbsp;&nbsp;DENSE_RANK() OVER(<span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>) <span class="kw">as</span> drnk<br><span class="kw">FROM</span> Employee;</div>'},
{q:"What is a Materialized View? How is it different from a View?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">View</span> is virtual — query runs every time.<br>&#9733; A <span class="key">Materialized View</span> stores data physically — instant reads.<br>&#9733; Refresh modes: <span class="key">ON COMMIT</span> (auto after changes), <span class="key">ON DEMAND</span> (manual), <span class="key">FAST</span> (incremental) or <span class="key">COMPLETE</span> (full rebuild).<br>&#9733; Used for reporting, data warehousing, remote data caching.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Regular View: runs query every time</span><br><span class="kw">CREATE VIEW</span> v_dept_summary <span class="kw">AS</span><br><span class="kw">SELECT</span> DeptId, COUNT(*) cnt, AVG(Salary) avg_sal<br><span class="kw">FROM</span> Employee <span class="kw">GROUP BY</span> DeptId;<br><br><span class="cm">-- Materialized View: stores result, refreshes periodically</span><br><span class="kw">CREATE MATERIALIZED VIEW</span> mv_dept_summary<br>REFRESH FAST ON COMMIT <span class="cm">-- auto-refresh when data changes</span><br><span class="kw">AS</span><br><span class="kw">SELECT</span> DeptId, COUNT(*) cnt, SUM(Salary) total_sal<br><span class="kw">FROM</span> Employee <span class="kw">GROUP BY</span> DeptId;<br><br><span class="cm">-- Manual refresh</span><br>DBMS_MVIEW.REFRESH(<span class="str">\'mv_dept_summary\'</span>);</div>'},
{q:"What is the MERGE statement?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">MERGE</span> combines INSERT and UPDATE in one atomic statement.<br>&#9733; WHEN MATCHED = update existing rows.<br>&#9733; WHEN NOT MATCHED = insert new rows.<br>&#9733; Efficient for syncing data between tables.<br>&#9733; Also supports DELETE in the MATCHED clause.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">MERGE INTO</span> Products target<br><span class="kw">USING</span> NewProducts source<br><span class="kw">ON</span> (target.Id = source.Id)<br><br><span class="kw">WHEN MATCHED THEN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE SET</span> target.Price = source.Price<br><br><span class="kw">WHEN NOT MATCHED THEN</span><br>&nbsp;&nbsp;<span class="kw">INSERT</span>(Id, Name, Price)<br>&nbsp;&nbsp;<span class="kw">VALUES</span>(source.Id, source.Name, source.Price);</div>'},
{q:"What are Exceptions? Explain Predefined and User-Defined Exceptions.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Predefined</span> exceptions are built-in: NO_DATA_FOUND, TOO_MANY_ROWS, ZERO_DIVIDE, DUP_VAL_ON_INDEX.<br>&#9733; <span class="key">User-defined</span> are declared with EXCEPTION keyword and raised with RAISE.<br>&#9733; WHEN OTHERS catches all unhandled errors.<br>&#9733; SQLCODE gives error number, SQLERRM gives error message.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Predefined exceptions</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name <span class="kw">INTO</span> v_name <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Id = 999;<br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> NO_DATA_FOUND <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Not found\'</span>);<br>&nbsp;&nbsp;<span class="kw">WHEN</span> TOO_MANY_ROWS <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Multiple rows\'</span>);<br>&nbsp;&nbsp;<span class="kw">WHEN</span> OTHERS <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Error: \'</span> || SQLERRM);<br><span class="kw">END</span>;<br><br><span class="cm">-- User-Defined exception</span><br><span class="kw">DECLARE</span><br>&nbsp;&nbsp;e_low_salary <span class="kw">EXCEPTION</span>;<br>&nbsp;&nbsp;v_sal NUMBER;<br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Salary <span class="kw">INTO</span> v_sal <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Id = 101;<br>&nbsp;&nbsp;<span class="kw">IF</span> v_sal &lt; 10000 <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">RAISE</span> e_low_salary; <span class="cm">-- throw custom error!</span><br>&nbsp;&nbsp;<span class="kw">END IF</span>;<br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> e_low_salary <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Salary too low!\'</span>);<br><span class="kw">END</span>;</div>'},
{q:"What is PRAGMA EXCEPTION_INIT?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">PRAGMA EXCEPTION_INIT</span> associates a user-defined exception with an Oracle error number.<br>&#9733; This lets you catch specific Oracle errors by meaningful names instead of using WHEN OTHERS with SQLCODE checks.<br>&#9733; Makes error handling cleaner and more readable.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">DECLARE</span><br>&nbsp;&nbsp;e_child_exists <span class="kw">EXCEPTION</span>;<br>&nbsp;&nbsp;<span class="kw">PRAGMA EXCEPTION_INIT</span>(e_child_exists, -2292); <span class="cm">-- FK violation</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">DELETE FROM</span> Department <span class="kw">WHERE</span> Id = 1;<br><span class="kw">EXCEPTION</span><br>&nbsp;&nbsp;<span class="kw">WHEN</span> e_child_exists <span class="kw">THEN</span><br>&nbsp;&nbsp;&nbsp;&nbsp;DBMS_OUTPUT.PUT_LINE(<span class="str">\'Cannot delete - employees exist!\'</span>);<br><span class="kw">END</span>;<br><br><span class="cm">-- Common Oracle error codes:</span><br><span class="cm">-- -1: unique constraint violated</span><br><span class="cm">-- -2292: child record found (FK)</span><br><span class="cm">-- -1400: cannot insert NULL</span><br><span class="cm">-- -1422: exact fetch returns more than one row</span></div>'},
