{q:"What is LINQ? Explain Query Syntax vs Method Syntax.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>LINQ</b> (Language Integrated Query) lets you <b>query data using C# syntax</b> — like writing SQL inside C#. Works on arrays, lists, databases, XML, anything.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">var</span> employees = <span class="kw">new</span> List&lt;Employee&gt; { ... };<br><br><span class="cm">// Query Syntax (SQL-like)</span><br><span class="kw">var</span> result = <span class="kw">from</span> e <span class="kw">in</span> employees<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">where</span> e.Salary &gt; 50000<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">orderby</span> e.Name<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">select</span> e;<br><br><span class="cm">// Method Syntax (Lambda - more popular ⭐)</span><br><span class="kw">var</span> result = employees<br>&nbsp;&nbsp;.Where(e =&gt; e.Salary &gt; 50000)<br>&nbsp;&nbsp;.OrderBy(e =&gt; e.Name)<br>&nbsp;&nbsp;.Select(e =&gt; <span class="kw">new</span> { e.Name, e.Salary });<br><br><span class="cm">// Common LINQ methods</span><br>employees.First(); <span class="cm">// first item</span><br>employees.Count(); <span class="cm">// count</span><br>employees.Any(e =&gt; e.Age &gt; 30); <span class="cm">// true/false</span><br>employees.Sum(e =&gt; e.Salary); <span class="cm">// total</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">LINQ</span> provides a unified query syntax for collections, databases, XML. <span class="key">Query syntax</span> looks like SQL (from, where, select). <span class="key">Method syntax</span> uses extension methods with lambdas (Where, Select, OrderBy). Method syntax is more popular and supports more operations. Both compile to the same IL code."</p>'},
{q:"What is the difference between IEnumerable and IQueryable?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>IEnumerable</b> = filters data <b>in memory</b> (client-side). Fetches ALL data first, then filters.<br><b>IQueryable</b> = filters data <b>at the database</b> (server-side). Sends only the filtered query to DB.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// IEnumerable - loads ALL rows, then filters in C#</span><br>IEnumerable&lt;Employee&gt; emps = _db.Employees;<br><span class="kw">var</span> result = emps.Where(e =&gt; e.Salary &gt; 50000);<br><span class="cm">// SQL: SELECT * FROM Employees (ALL rows!)</span><br><span class="cm">// Then C# filters in memory ❌ slow for large data</span><br><br><span class="cm">// IQueryable - builds SQL query, filters at DB</span><br>IQueryable&lt;Employee&gt; emps = _db.Employees;<br><span class="kw">var</span> result = emps.Where(e =&gt; e.Salary &gt; 50000);<br><span class="cm">// SQL: SELECT * FROM Employees WHERE Salary > 50000</span><br><span class="cm">// Only matching rows come to C# ✅ fast!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">IEnumerable</span> executes queries in memory (LINQ to Objects) — good for in-memory collections. <span class="key">IQueryable</span> builds expression trees and translates to SQL (LINQ to SQL/EF) — filtering happens at the database. Always use IQueryable with EF Core for performance. IQueryable extends IEnumerable."</p><div class="tip">💡 <b>Rule:</b> Use IQueryable for database queries (EF Core). Use IEnumerable for in-memory collections (List, Array). This is a TOP interview question!</div>'},
{q:"What are Lambda Expressions? How are they used?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Lambda</b> is a <b>short anonymous function</b> using the <b>=></b> arrow. Instead of writing a full method, write it inline in one line. Used everywhere in LINQ, events, delegates.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Full method</span><br><span class="kw">bool</span> IsAdult(<span class="kw">int</span> age) { <span class="kw">return</span> age >= 18; }<br><br><span class="cm">// Lambda - same thing, shorter!</span><br>Func&lt;<span class="kw">int</span>, <span class="kw">bool</span>&gt; isAdult = age =&gt; age >= 18;<br><br><span class="cm">// Used in LINQ (most common)</span><br><span class="kw">var</span> adults = people.Where(p =&gt; p.Age >= 18);<br><span class="kw">var</span> names = people.Select(p =&gt; p.Name);<br><span class="kw">var</span> sorted = people.OrderBy(p =&gt; p.Salary);<br><br><span class="cm">// Multi-line lambda</span><br><span class="kw">var</span> result = people.Where(p =&gt; {<br>&nbsp;&nbsp;<span class="kw">var</span> isActive = p.Status == <span class="str">"Active"</span>;<br>&nbsp;&nbsp;<span class="kw">return</span> isActive &amp;&amp; p.Age > 18;<br>});</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Lambda expressions</span> are inline anonymous functions using => syntax. <b>(parameters) => expression</b>. They are used with delegates (Func, Action), LINQ queries, and event handlers. Single expression lambdas auto-return the result. Multi-line lambdas need curly braces and explicit return."</p>'},
{q:"What is the difference between Func, Action, and Predicate?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Action</b> = does something, returns <b>nothing</b> (void).<br><b>Func</b> = does something, <b>returns a value</b>.<br><b>Predicate</b> = takes input, returns <b>true/false</b> only.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Action - returns void</span><br>Action&lt;<span class="kw">string</span>&gt; greet = name =&gt; Console.WriteLine(<span class="str">"Hi "</span> + name);<br>greet(<span class="str">"Arjun"</span>); <span class="cm">// Hi Arjun (no return)</span><br><br><span class="cm">// Func - returns a value (last type = return type)</span><br>Func&lt;<span class="kw">int</span>, <span class="kw">int</span>, <span class="kw">int</span>&gt; add = (a, b) =&gt; a + b;<br><span class="kw">int</span> sum = add(5, 3); <span class="cm">// 8</span><br><br><span class="cm">// Predicate - always returns bool</span><br>Predicate&lt;<span class="kw">int</span>&gt; isEven = n =&gt; n % 2 == 0;<br><span class="kw">bool</span> result = isEven(4); <span class="cm">// true</span><br><br><span class="cm">// In LINQ</span><br>list.ForEach(x =&gt; Console.WriteLine(x)); <span class="cm">// Action</span><br>list.Select(x =&gt; x * 2); <span class="cm">// Func</span><br>list.FindAll(x =&gt; x > 10); <span class="cm">// Predicate</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Action</span> is a delegate that returns void — Action&lt;T&gt; takes params, no return. <span class="key">Func</span> returns a value — Func&lt;T, TResult&gt; where last type is return type. <span class="key">Predicate</span> always returns bool — Predicate&lt;T&gt; is shorthand for Func&lt;T, bool&gt;. All three are built-in generic delegates."</p>'},
{q:"What is the difference between Task and Thread?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Thread</b> = low-level, you manually create and manage OS threads. Heavy.<br><b>Task</b> = high-level, uses thread pool automatically. Lightweight, supports async/await.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Thread - manual, heavy, old way</span><br><span class="kw">var</span> thread = <span class="kw">new</span> Thread(() =&gt; {<br>&nbsp;&nbsp;Console.WriteLine(<span class="str">"Thread running"</span>);<br>});<br>thread.Start();<br>thread.Join(); <span class="cm">// wait to finish</span><br><br><span class="cm">// Task - modern, lightweight, uses thread pool</span><br><span class="kw">var</span> task = Task.Run(() =&gt; {<br>&nbsp;&nbsp;Console.WriteLine(<span class="str">"Task running"</span>);<br>});<br><span class="kw">await</span> task; <span class="cm">// await instead of Join</span><br><br><span class="cm">// Task with return value</span><br>Task&lt;<span class="kw">int</span>&gt; calcTask = Task.Run(() =&gt; 5 + 3);<br><span class="kw">int</span> result = <span class="kw">await</span> calcTask; <span class="cm">// 8</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Thread</span> is a low-level OS thread — expensive to create, manual management. <span class="key">Task</span> is a high-level abstraction over the thread pool — lightweight, supports async/await, cancellation, continuation. Always prefer Task over Thread in modern C#. Task uses ThreadPool internally for efficiency."</p>'},
{q:"What is the yield keyword and how does it work?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>yield return</b> returns items <b>one at a time</b> without creating the entire collection in memory. It is <b>lazy</b> — generates the next item only when asked. Like a vending machine giving one item at a time.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Without yield - creates entire list in memory</span><br>List&lt;<span class="kw">int</span>&gt; GetEvenNumbers(<span class="kw">int</span> max) {<br>&nbsp;&nbsp;<span class="kw">var</span> list = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;();<br>&nbsp;&nbsp;<span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt;= max; i++)<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(i % 2 == 0) list.Add(i);<br>&nbsp;&nbsp;<span class="kw">return</span> list; <span class="cm">// ALL items at once</span><br>}<br><br><span class="cm">// With yield - returns one at a time (lazy!)</span><br>IEnumerable&lt;<span class="kw">int</span>&gt; GetEvenNumbers(<span class="kw">int</span> max) {<br>&nbsp;&nbsp;<span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt;= max; i++)<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(i % 2 == 0) <span class="kw">yield return</span> i; <span class="cm">// one at a time!</span><br>}<br><br><span class="cm">// yield break - stop early</span><br><span class="kw">yield break</span>; <span class="cm">// exits the iterator</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">yield return</span> creates an iterator that returns items one at a time (lazy evaluation). It doesnt create the entire collection in memory — generates each item on demand. The method must return IEnumerable&lt;T&gt;. <span class="key">yield break</span> stops iteration early. Great for large datasets and infinite sequences."</p>'},
{q:"What is Reflection in C#? When would you use it?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Reflection</b> lets you <b>inspect and manipulate types at runtime</b>. You can read class names, properties, methods, and even create objects dynamically. Like looking at a blueprint of a building while standing inside it.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">using</span> System.Reflection;<br><br><span class="kw">var</span> emp = <span class="kw">new</span> Employee { Name = <span class="str">"Arjun"</span>, Age = 28 };<br>Type type = emp.GetType();<br><br><span class="cm">// Get class name</span><br>Console.WriteLine(type.Name); <span class="cm">// "Employee"</span><br><br><span class="cm">// Get all properties</span><br><span class="kw">foreach</span>(<span class="kw">var</span> prop <span class="kw">in</span> type.GetProperties())<br>&nbsp;&nbsp;Console.WriteLine($<span class="str">"{prop.Name} = {prop.GetValue(emp)}"</span>);<br><span class="cm">// Name = Arjun</span><br><span class="cm">// Age = 28</span><br><br><span class="cm">// Create object dynamically</span><br><span class="kw">var</span> obj = Activator.CreateInstance(type);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Reflection</span> allows inspecting metadata of types at runtime — get class names, properties, methods, attributes, and create instances dynamically. Used in: <span class="key">DI containers</span>, <span class="key">serialization</span>, <span class="key">ORM mapping</span>, <span class="key">unit test frameworks</span>. Downside: slower than direct code, breaks compile-time safety."</p>'},
{q:"What are Attributes? How do you create Custom Attributes?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Attributes</b> are <b>metadata tags</b> you attach to classes, methods, properties using <b>[SquareBrackets]</b>. They add extra information that can be read at runtime using Reflection.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Built-in attributes</span><br>[Obsolete(<span class="str">"Use NewMethod instead"</span>)]<br><span class="kw">public void</span> OldMethod() { }<br><br>[Required]<br>[StringLength(50)]<br><span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br><br><span class="cm">// Custom Attribute</span><br><span class="kw">public class</span> AuditLogAttribute : Attribute {<br>&nbsp;&nbsp;<span class="kw">public string</span> Action { <span class="kw">get</span>; }<br>&nbsp;&nbsp;<span class="kw">public</span> AuditLogAttribute(<span class="kw">string</span> action) { Action = action; }<br>}<br><br>[AuditLog(<span class="str">"Delete"</span>)]<br><span class="kw">public void</span> DeleteUser(<span class="kw">int</span> id) { }<br><br><span class="cm">// Read attribute via Reflection</span><br><span class="kw">var</span> attr = method.GetCustomAttribute&lt;AuditLogAttribute&gt;();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Attributes</span> are metadata markers using [Brackets]. Built-in examples: [Required], [Obsolete], [Authorize], [HttpGet]. Create custom attributes by inheriting from <span class="key">Attribute</span> class. Read them at runtime using <span class="key">Reflection</span>. Used in validation, serialization, MVC routing, and DI."</p>'},
{q:"What is the difference between List<T> and Dictionary<TKey,TValue>?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>List&lt;T&gt;</b> = ordered collection accessed by <b>index</b> (0, 1, 2...).<br><b>Dictionary&lt;K,V&gt;</b> = collection accessed by <b>key</b> (name, id...). Super fast key lookup!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// List - ordered, access by index</span><br><span class="kw">var</span> names = <span class="kw">new</span> List&lt;<span class="kw">string</span>&gt; { <span class="str">"Arjun"</span>, <span class="str">"Ravi"</span>, <span class="str">"Priya"</span> };<br>names[0]; <span class="cm">// "Arjun" (by index)</span><br>names.Add(<span class="str">"Meena"</span>);<br>names.Contains(<span class="str">"Ravi"</span>); <span class="cm">// true (slow - scans all)</span><br><br><span class="cm">// Dictionary - key-value pairs, fast lookup</span><br><span class="kw">var</span> ages = <span class="kw">new</span> Dictionary&lt;<span class="kw">string</span>, <span class="kw">int</span>&gt; {<br>&nbsp;&nbsp;[<span class="str">"Arjun"</span>] = 28,<br>&nbsp;&nbsp;[<span class="str">"Ravi"</span>] = 25<br>};<br>ages[<span class="str">"Arjun"</span>]; <span class="cm">// 28 (by key - O(1) fast!)</span><br>ages.ContainsKey(<span class="str">"Ravi"</span>); <span class="cm">// true (very fast!)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">List&lt;T&gt;</span> is an ordered collection accessed by index, allows duplicates, search is O(n). <span class="key">Dictionary&lt;K,V&gt;</span> stores key-value pairs, keys must be unique, lookup by key is O(1). Use List when you need ordered items, Dictionary when you need fast lookup by key."</p>'},
{q:"What are Tuples? Difference between Tuple and ValueTuple?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Tuple</b> groups multiple values into one object <b>without creating a class</b>. <b>Tuple</b> (old) is a reference type. <b>ValueTuple</b> (new, C# 7+) is a value type with named members.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Old Tuple (reference type) - Item1, Item2 names 😩</span><br>Tuple&lt;<span class="kw">string</span>, <span class="kw">int</span>&gt; old = Tuple.Create(<span class="str">"Arjun"</span>, 28);<br>old.Item1; <span class="cm">// "Arjun" - what is Item1? unclear!</span><br><br><span class="cm">// ValueTuple (C# 7+) - named members! ⭐</span><br>(<span class="kw">string</span> Name, <span class="kw">int</span> Age) person = (<span class="str">"Arjun"</span>, 28);<br>person.Name; <span class="cm">// "Arjun" ✅ clear!</span><br>person.Age; <span class="cm">// 28 ✅</span><br><br><span class="cm">// Return multiple values from method</span><br>(<span class="kw">string</span> Name, <span class="kw">int</span> Count) GetStats() {<br>&nbsp;&nbsp;<span class="kw">return</span> (<span class="str">"Products"</span>, 150);<br>}<br><span class="kw">var</span> stats = GetStats();<br>Console.WriteLine(stats.Name); <span class="cm">// "Products"</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Tuple</span> (System.Tuple) is a reference type with Item1, Item2 names — not readable. <span class="key">ValueTuple</span> (C# 7+) is a value type with named members — cleaner and more performant. Use ValueTuple to return multiple values from methods without creating a class."</p>'},
{q:"What is the Null Coalescing (??) and Null Conditional (?.) operator?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>??</b> (Null Coalescing) = if left side is null, use the <b>right side as default</b>.<br><b>?.</b> (Null Conditional) = only access member if object is <b>NOT null</b>, otherwise return null.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ?? Null Coalescing - provide default</span><br><span class="kw">string</span> name = <span class="kw">null</span>;<br><span class="kw">string</span> result = name ?? <span class="str">"Unknown"</span>; <span class="cm">// "Unknown"</span><br><br><span class="kw">string</span> name2 = <span class="str">"Arjun"</span>;<br><span class="kw">string</span> result2 = name2 ?? <span class="str">"Unknown"</span>; <span class="cm">// "Arjun"</span><br><br><span class="cm">// ??= Null Coalescing Assignment (C# 8+)</span><br>name ??= <span class="str">"Default"</span>; <span class="cm">// assign only if null</span><br><br><span class="cm">// ?. Null Conditional - safe navigation</span><br><span class="kw">string</span> city = user?.Address?.City; <span class="cm">// null if any is null</span><br><span class="cm">// Without ?. you need:</span><br><span class="cm">// if(user != null &amp;&amp; user.Address != null) city = user.Address.City;</span><br><br><span class="cm">// ?[] for arrays</span><br><span class="kw">int</span>? first = numbers?[0]; <span class="cm">// null if array is null</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">??</span> returns the left operand if not null, otherwise the right (default value). <span class="key">??=</span> assigns only if the variable is null. <span class="key">?.</span> safely accesses members — returns null instead of throwing NullReferenceException. These operators eliminate verbose null checks and make code cleaner."</p>'},
{q:"What is Pattern Matching in C#?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Pattern Matching</b> lets you <b>check type and extract value in one step</b>. Like a smart if-else that can test shapes, types, values, and ranges all at once.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Type pattern (C# 7)</span><br><span class="kw">if</span>(animal <span class="kw">is</span> Dog dog) { dog.Bark(); } <span class="cm">// check + cast!</span><br><br><span class="cm">// Switch pattern (C# 8+)</span><br><span class="kw">string</span> GetDiscount(<span class="kw">object</span> customer) =&gt; customer <span class="kw">switch</span> {<br>&nbsp;&nbsp;Employee e <span class="kw">when</span> e.Years &gt; 5 =&gt; <span class="str">"20% off"</span>,<br>&nbsp;&nbsp;Employee e =&gt; <span class="str">"10% off"</span>,<br>&nbsp;&nbsp;Student =&gt; <span class="str">"15% off"</span>,<br>&nbsp;&nbsp;<span class="kw">null</span> =&gt; <span class="str">"No customer"</span>,<br>&nbsp;&nbsp;_ =&gt; <span class="str">"5% off"</span> <span class="cm">// default</span><br>};<br><br><span class="cm">// Relational pattern (C# 9+)</span><br><span class="kw">string</span> Grade(<span class="kw">int</span> score) =&gt; score <span class="kw">switch</span> {<br>&nbsp;&nbsp;>= 90 =&gt; <span class="str">"A"</span>,<br>&nbsp;&nbsp;>= 80 =&gt; <span class="str">"B"</span>,<br>&nbsp;&nbsp;>= 70 =&gt; <span class="str">"C"</span>,<br>&nbsp;&nbsp;_ =&gt; <span class="str">"F"</span><br>};</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Pattern Matching</span> tests values against patterns and extracts data. Types: <span class="key">Type pattern</span> (is Dog d), <span class="key">Switch expression</span> (C# 8), <span class="key">Relational</span> (>= 90), <span class="key">Logical</span> (and, or, not), <span class="key">Property pattern</span> ({ Age: > 18 }). Each C# version adds more powerful patterns."</p>'},
{q:"What is the difference between Managed and Unmanaged code?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Managed code</b> = runs under <b>CLR control</b> — automatic memory management, garbage collection, type safety. All C# code is managed.<br><b>Unmanaged code</b> = runs <b>outside CLR</b> — you manage memory yourself. C/C++ code, Win32 API calls.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Managed code - CLR handles everything</span><br><span class="kw">string</span> name = <span class="str">"Arjun"</span>; <span class="cm">// GC cleans up automatically</span><br><span class="kw">var</span> list = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;(); <span class="cm">// memory managed by CLR</span><br><br><span class="cm">// Unmanaged code - calling Win32 API</span><br>[DllImport(<span class="str">"user32.dll"</span>)]<br><span class="kw">static extern int</span> MessageBox(IntPtr h, <span class="kw">string</span> text, <span class="kw">string</span> caption, <span class="kw">int</span> type);<br><br><span class="cm">// Unmanaged resources need manual cleanup</span><br><span class="cm">// File handles, DB connections, network sockets</span><br><span class="cm">// Use IDisposable + using statement!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Managed code</span> runs under CLR with automatic memory management, GC, type safety, and exception handling. <span class="key">Unmanaged code</span> runs outside CLR — no GC, manual memory management. C# is managed, C/C++ is unmanaged. To use unmanaged resources in C#, implement <span class="key">IDisposable</span> for proper cleanup."</p>'},
{q:"What are Indexers in C#?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Indexers</b> let you access a class using <b>array-like syntax [index]</b>. Instead of calling a method like GetItem(0), you write object[0]. Like making your class behave like an array.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> StudentCollection {<br>&nbsp;&nbsp;<span class="kw">private</span> List&lt;Student&gt; _students = <span class="kw">new</span>();<br><br>&nbsp;&nbsp;<span class="cm">// Indexer by int</span><br>&nbsp;&nbsp;<span class="kw">public</span> Student <span class="kw">this</span>[<span class="kw">int</span> index] {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> =&gt; _students[index];<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">set</span> =&gt; _students[index] = value;<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="cm">// Indexer by string (name)</span><br>&nbsp;&nbsp;<span class="kw">public</span> Student <span class="kw">this</span>[<span class="kw">string</span> name] {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> =&gt; _students.FirstOrDefault(s =&gt; s.Name == name);<br>&nbsp;&nbsp;}<br>}<br><br><span class="kw">var</span> col = <span class="kw">new</span> StudentCollection();<br>col[0]; <span class="cm">// access by index</span><br>col[<span class="str">"Arjun"</span>]; <span class="cm">// access by name!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Indexers</span> allow objects to be accessed using [] syntax like arrays. Defined using <b>this[parameter]</b> with get/set accessors. You can have multiple indexers with different parameter types (int, string). Used in collections like List&lt;T&gt;, Dictionary&lt;K,V&gt;."</p>'},
// Advanced
{q:"Explain the Garbage Collector. What are Gen0, Gen1, Gen2?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>The <b>Garbage Collector (GC)</b> automatically <b>frees memory</b> of objects you no longer use. It divides objects into 3 generations based on <b>how long they live</b>.</p><svg viewBox="0 0 440 140" style="max-width:440px"><rect x="10" y="5" width="130" height="125" rx="8" fill="#10b981"/><text x="75" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Gen 0 (Young)</text><text x="75" y="45" text-anchor="middle" fill="#d1fae5" font-size="8">New objects land here</text><text x="75" y="60" text-anchor="middle" fill="#d1fae5" font-size="8">Collected MOST often</text><text x="75" y="78" text-anchor="middle" fill="#d1fae5" font-size="8">Short-lived (temp vars)</text><text x="75" y="100" text-anchor="middle" fill="#fff" font-size="8">Fastest collection</text><text x="75" y="120" text-anchor="middle" fill="#d1fae5" font-size="7">~90% objects die here</text><rect x="155" y="5" width="130" height="125" rx="8" fill="#f59e0b"/><text x="220" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Gen 1 (Middle)</text><text x="220" y="45" text-anchor="middle" fill="#fef3c7" font-size="8">Survived Gen 0</text><text x="220" y="60" text-anchor="middle" fill="#fef3c7" font-size="8">Buffer between</text><text x="220" y="78" text-anchor="middle" fill="#fef3c7" font-size="8">young and old</text><text x="220" y="100" text-anchor="middle" fill="#fff" font-size="8">Medium frequency</text><text x="220" y="120" text-anchor="middle" fill="#fef3c7" font-size="7">Promoted if survives</text><rect x="300" y="5" width="130" height="125" rx="8" fill="#ef4444"/><text x="365" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Gen 2 (Old)</text><text x="365" y="45" text-anchor="middle" fill="#fecaca" font-size="8">Long-lived objects</text><text x="365" y="60" text-anchor="middle" fill="#fecaca" font-size="8">Static data, caches</text><text x="365" y="78" text-anchor="middle" fill="#fecaca" font-size="8">Collected RARELY</text><text x="365" y="100" text-anchor="middle" fill="#fff" font-size="8">Full GC (expensive!)</text><text x="365" y="120" text-anchor="middle" fill="#fecaca" font-size="7">Avoid too many here</text></svg><h4>💻 How It Works</h4><div class="code"><span class="cm">// Object created → goes to Gen 0</span><br><span class="kw">var</span> temp = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;(); <span class="cm">// Gen 0</span><br><br><span class="cm">// If survives Gen 0 collection → promoted to Gen 1</span><br><span class="cm">// If survives Gen 1 collection → promoted to Gen 2</span><br><br><span class="cm">// Force GC (avoid in production!)</span><br>GC.Collect(); <span class="cm">// forces garbage collection</span><br>GC.GetGeneration(temp); <span class="cm">// which generation?</span></div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">GC</span> automatically reclaims memory of unreferenced objects. It uses <span class="key">generational collection</span>: <span class="key">Gen 0</span> for new short-lived objects (collected most often), <span class="key">Gen 1</span> as a buffer, <span class="key">Gen 2</span> for long-lived objects (collected rarely, expensive). Objects are promoted when they survive a collection. Most objects die in Gen 0."</p>'},
{q:"What is the difference between Finalize and Dispose?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Dispose</b> = YOU call it to clean up NOW (deterministic). Uses <b>using</b> statement.<br><b>Finalize</b> = GC calls it SOMETIME later (non-deterministic). Uses <b>~destructor</b>.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> DbService : IDisposable {<br>&nbsp;&nbsp;<span class="kw">private</span> SqlConnection _conn;<br>&nbsp;&nbsp;<span class="kw">private bool</span> _disposed = <span class="kw">false</span>;<br><br>&nbsp;&nbsp;<span class="cm">// Dispose - called by developer</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Dispose() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(!_disposed) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;_conn?.Close(); <span class="cm">// clean NOW</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;_disposed = <span class="kw">true</span>;<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;GC.SuppressFinalize(<span class="kw">this</span>); <span class="cm">// skip finalizer</span><br>&nbsp;&nbsp;&nbsp;&nbsp;}<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="cm">// Finalizer - backup if Dispose not called</span><br>&nbsp;&nbsp;~DbService() { Dispose(); }<br>}<br><br><span class="cm">// Always use \"using\" statement!</span><br><span class="kw">using var</span> db = <span class="kw">new</span> DbService(); <span class="cm">// auto Dispose!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Dispose</span> is explicit cleanup called by developer via IDisposable or using statement — deterministic, immediate. <span class="key">Finalize</span> (~destructor) is called by GC — non-deterministic, unpredictable timing, adds GC overhead. Always prefer Dispose. Implement both as a safety net (Dispose pattern)."</p>'},
{q:"How does the CLR (Common Language Runtime) work?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>The <b>CLR</b> is the <b>engine that runs your C# code</b>. It handles compilation, memory management, security, and exception handling. Your C# code doesnt run directly — CLR manages everything.</p><svg viewBox="0 0 440 130" style="max-width:440px"><rect x="10" y="10" width="90" height="45" rx="6" fill="#3b82f6"/><text x="55" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="8">C# Code</text><text x="55" y="44" text-anchor="middle" fill="#bae6fd" font-size="7">.cs files</text><text x="120" y="35" text-anchor="middle" fill="#64748b" font-size="10">→</text><rect x="135" y="10" width="90" height="45" rx="6" fill="#f59e0b"/><text x="180" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="8">C# Compiler</text><text x="180" y="44" text-anchor="middle" fill="#fef3c7" font-size="7">csc.exe</text><text x="245" y="35" text-anchor="middle" fill="#64748b" font-size="10">→</text><rect x="260" y="10" width="80" height="45" rx="6" fill="#8b5cf6"/><text x="300" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="8">IL Code</text><text x="300" y="44" text-anchor="middle" fill="#ede9fe" font-size="7">.dll / .exe</text><text x="360" y="35" text-anchor="middle" fill="#64748b" font-size="10">→</text><rect x="375" y="10" width="55" height="45" rx="6" fill="#ef4444"/><text x="402" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="8">JIT</text><text x="402" y="44" text-anchor="middle" fill="#fecaca" font-size="7">Machine</text><rect x="10" y="70" width="420" height="50" rx="8" fill="#f0f9ff" stroke="#bae6fd"/><text x="220" y="88" text-anchor="middle" fill="#0369a1" font-size="9" font-weight="600">CLR Services:</text><text x="220" y="105" text-anchor="middle" fill="#334155" font-size="8">Garbage Collection | JIT Compilation | Type Safety | Exception Handling | Security | Thread Management</text></svg><h4>🗣️ Interview Answer</h4><p>"The <span class="key">CLR</span> is the runtime engine of .NET. C# compiles to <span class="key">IL (Intermediate Language)</span>, then CLR uses <span class="key">JIT compiler</span> to convert IL to native machine code at runtime. CLR provides: garbage collection, type safety, exception handling, security, and thread management. This is why C# is called managed code."</p>'},
{q:"What is Span<T> and Memory<T>? When would you use them?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Span&lt;T&gt;</b> is a <b>window/slice into memory</b> without copying data. Super fast, zero allocation. Like looking through a window at data instead of making a photocopy. <b>Memory&lt;T&gt;</b> is similar but can be stored on the heap (used in async).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Without Span - creates new array (allocation!)</span><br><span class="kw">int</span>[] arr = { 1, 2, 3, 4, 5 };<br><span class="kw">int</span>[] slice = arr[1..4]; <span class="cm">// new array {2,3,4} ❌ copies!</span><br><br><span class="cm">// With Span - no copy, just a view!</span><br>Span&lt;<span class="kw">int</span>&gt; span = arr.AsSpan(1, 3); <span class="cm">// {2,3,4} ✅ zero copy!</span><br>span[0] = 99; <span class="cm">// modifies original arr!</span><br><br><span class="cm">// String slicing without allocation</span><br>ReadOnlySpan&lt;<span class="kw">char</span>&gt; name = <span class="str">"Hello World"</span>.AsSpan(0, 5); <span class="cm">// "Hello"</span><br><br><span class="cm">// Memory&lt;T&gt; - can be used in async methods</span><br>Memory&lt;<span class="kw">int</span>&gt; mem = arr.AsMemory(1, 3);<br><span class="kw">await</span> ProcessAsync(mem); <span class="cm">// Span cant be used in async!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Span&lt;T&gt;</span> provides a type-safe view over contiguous memory without allocation — stack-only, cannot be used in async. <span class="key">Memory&lt;T&gt;</span> is similar but heap-allocated, can be used in async methods. Both reduce GC pressure and improve performance for parsing, slicing, and buffer operations."</p>'},
{q:"Explain the Task Parallel Library (TPL).",l:"e",a:'<h4>🎯 Simple Answer</h4><p>The <b>TPL</b> makes it easy to run <b>multiple tasks in parallel</b> using the thread pool. Instead of manually creating threads, use Task.Run, Parallel.ForEach, and async/await.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Task.Run - run work on thread pool</span><br><span class="kw">await</span> Task.Run(() =&gt; HeavyCalculation());<br><br><span class="cm">// Run multiple tasks in parallel</span><br><span class="kw">var</span> t1 = GetUsersAsync();<br><span class="kw">var</span> t2 = GetOrdersAsync();<br><span class="kw">var</span> t3 = GetProductsAsync();<br><span class="kw">await</span> Task.WhenAll(t1, t2, t3); <span class="cm">// all 3 run together!</span><br><br><span class="cm">// Parallel.ForEach - parallel loop</span><br>Parallel.ForEach(items, item =&gt; {<br>&nbsp;&nbsp;Process(item); <span class="cm">// each item processed in parallel</span><br>});<br><br><span class="cm">// Task.WhenAny - first to complete wins</span><br><span class="kw">var</span> fastest = <span class="kw">await</span> Task.WhenAny(t1, t2, t3);</div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">TPL</span> provides Task-based parallelism using the thread pool. Key APIs: <span class="key">Task.Run</span> (offload work), <span class="key">Task.WhenAll</span> (wait for all), <span class="key">Task.WhenAny</span> (first to finish), <span class="key">Parallel.ForEach</span> (parallel loops). TPL handles thread creation, scheduling, and load balancing automatically."</p>'},
{q:"What are Expression Trees?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Expression Trees</b> represent <b>code as data</b> — a tree structure that describes a lambda expression. Instead of executing the code, you can <b>inspect, modify, or translate</b> it (like EF Core translates C# to SQL).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Normal lambda - compiled to executable code</span><br>Func&lt;<span class="kw">int</span>, <span class="kw">bool</span>&gt; func = x =&gt; x &gt; 5; <span class="cm">// runs in C#</span><br><br><span class="cm">// Expression tree - code as DATA structure</span><br>Expression&lt;Func&lt;<span class="kw">int</span>, <span class="kw">bool</span>&gt;&gt; expr = x =&gt; x &gt; 5;<br><span class="cm">// Not executed! Its a tree:</span><br><span class="cm">//       ></span><br><span class="cm">//      / \</span><br><span class="cm">//     x   5</span><br><br><span class="cm">// EF Core uses this to build SQL!</span><br>_db.Products.Where(p =&gt; p.Price &gt; 100);<br><span class="cm">// Expression tree → translated to:</span><br><span class="cm">// SELECT * FROM Products WHERE Price > 100</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Expression Trees</span> represent lambda expressions as a data structure (tree of nodes) instead of executable code. They can be inspected, modified, and translated to other languages like SQL. <span class="key">EF Core</span> uses expression trees to convert LINQ queries to SQL. This is why IQueryable uses Expression&lt;Func&gt; instead of Func."</p>'},
{q:"What is ConfigureAwait(true) vs ConfigureAwait(false)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>ConfigureAwait(true)</b> = after await, <b>come back to the SAME thread</b> (UI thread). Default behavior.<br><b>ConfigureAwait(false)</b> = after await, <b>continue on ANY thread</b>. Faster for library/backend code.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ConfigureAwait(true) - default, returns to original thread</span><br><span class="kw">public async</span> Task LoadData() {<br>&nbsp;&nbsp;<span class="kw">var</span> data = <span class="kw">await</span> httpClient.GetAsync(url); <span class="cm">// same as .ConfigureAwait(true)</span><br>&nbsp;&nbsp;<span class="cm">// continues on ORIGINAL thread (UI thread)</span><br>&nbsp;&nbsp;label.Text = data; <span class="cm">// ✅ safe to update UI</span><br>}<br><br><span class="cm">// ConfigureAwait(false) - any thread, faster</span><br><span class="kw">public async</span> Task&lt;<span class="kw">string</span>&gt; GetDataAsync() {<br>&nbsp;&nbsp;<span class="kw">var</span> data = <span class="kw">await</span> httpClient.GetAsync(url)<br>&nbsp;&nbsp;&nbsp;&nbsp;.ConfigureAwait(<span class="kw">false</span>); <span class="cm">// any thread pool thread</span><br>&nbsp;&nbsp;<span class="cm">// ❌ DONT update UI here!</span><br>&nbsp;&nbsp;<span class="kw">return</span> data; <span class="cm">// ✅ just return data</span><br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">ConfigureAwait(true)</span> (default) captures the synchronization context and resumes on the original thread — needed for UI updates. <span class="key">ConfigureAwait(false)</span> skips context capture and resumes on any thread pool thread — better performance, avoids deadlocks. Use false in library code and backend services, true in UI code."</p>'},
{q:"How do you handle Thread Safety? Explain lock, Monitor, Semaphore, Mutex.",l:"e",a:'<h4>🎯 Simple Answer</h4><p>When multiple threads access <b>shared data</b>, they can corrupt it. Thread safety tools ensure <b>only one thread accesses the data at a time</b>.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// lock - simplest, most common ⭐</span><br><span class="kw">private static readonly object</span> _lock = <span class="kw">new</span>();<br><span class="kw">lock</span>(_lock) {<br>&nbsp;&nbsp;_balance += amount; <span class="cm">// only one thread at a time</span><br>}<br><br><span class="cm">// Monitor - same as lock but more control</span><br>Monitor.Enter(_lock);<br><span class="kw">try</span> { _balance += amount; }<br><span class="kw">finally</span> { Monitor.Exit(_lock); }<br><br><span class="cm">// Semaphore - allows N threads at once</span><br><span class="kw">var</span> sem = <span class="kw">new</span> SemaphoreSlim(3); <span class="cm">// max 3 threads</span><br><span class="kw">await</span> sem.WaitAsync();<br><span class="kw">try</span> { <span class="cm">/* work */</span> }<br><span class="kw">finally</span> { sem.Release(); }<br><br><span class="cm">// Mutex - like lock but works across PROCESSES</span><br><span class="kw">var</span> mutex = <span class="kw">new</span> Mutex(<span class="kw">false</span>, <span class="str">"MyApp"</span>);<br>mutex.WaitOne(); <span class="cm">// only one app instance!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">lock</span> is simplest — wraps Monitor.Enter/Exit, one thread at a time, same process. <span class="key">Monitor</span> gives more control (TryEnter, Wait, Pulse). <span class="key">Semaphore</span> allows N concurrent threads — great for rate limiting. <span class="key">Mutex</span> works across processes — used to prevent multiple app instances. For async code, use SemaphoreSlim."</p>'},
{q:"What are Source Generators in C#?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Source Generators</b> are a compiler feature that <b>auto-generates C# code at compile time</b>. Instead of writing boilerplate code yourself, the generator writes it for you. Like a robot assistant that writes repetitive code.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// You write this:</span><br>[AutoNotify]<br><span class="kw">partial class</span> Person {<br>&nbsp;&nbsp;<span class="kw">private string</span> _name;<br>&nbsp;&nbsp;<span class="kw">private int</span> _age;<br>}<br><br><span class="cm">// Source Generator AUTO-CREATES this at compile time:</span><br><span class="kw">partial class</span> Person : INotifyPropertyChanged {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> =&gt; _name;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">set</span> { _name = value; OnPropertyChanged(); }<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">public int</span> Age {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> =&gt; _age;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">set</span> { _age = value; OnPropertyChanged(); }<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Source Generators</span> run at compile time and generate additional C# source code. They inspect existing code using Roslyn API and produce new code. Benefits: no runtime reflection (faster), compile-time safety, reduces boilerplate. Used in: System.Text.Json, Regex, logging, MVVM frameworks."</p>'},
{q:"What is the difference between .NET Framework, .NET Core, and .NET 5/6/7/8?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>.NET Framework</b> = old, Windows only.<br><b>.NET Core</b> = new, cross-platform, fast.<br><b>.NET 5/6/7/8</b> = unified platform, Core + Framework merged. Just called <b>".NET"</b> now.</p><svg viewBox="0 0 440 130" style="max-width:440px"><rect x="10" y="10" width="130" height="110" rx="8" fill="#ef4444"/><text x="75" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">.NET Framework</text><text x="75" y="48" text-anchor="middle" fill="#fecaca" font-size="7">❌ Windows only</text><text x="75" y="62" text-anchor="middle" fill="#fecaca" font-size="7">❌ No longer developed</text><text x="75" y="76" text-anchor="middle" fill="#fecaca" font-size="7">❌ Slower</text><text x="75" y="90" text-anchor="middle" fill="#fecaca" font-size="7">v1.0 to v4.8</text><text x="75" y="110" text-anchor="middle" fill="#fecaca" font-size="7" font-weight="600">Legacy 👴</text><rect x="155" y="10" width="130" height="110" rx="8" fill="#f59e0b"/><text x="220" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">.NET Core</text><text x="220" y="48" text-anchor="middle" fill="#fef3c7" font-size="7">✅ Cross-platform</text><text x="220" y="62" text-anchor="middle" fill="#fef3c7" font-size="7">✅ Open source</text><text x="220" y="76" text-anchor="middle" fill="#fef3c7" font-size="7">✅ High performance</text><text x="220" y="90" text-anchor="middle" fill="#fef3c7" font-size="7">v1.0 to v3.1</text><text x="220" y="110" text-anchor="middle" fill="#fef3c7" font-size="7" font-weight="600">Transition 🔄</text><rect x="300" y="10" width="130" height="110" rx="8" fill="#10b981"/><text x="365" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">.NET 5/6/7/8</text><text x="365" y="48" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Unified platform</text><text x="365" y="62" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Best performance</text><text x="365" y="76" text-anchor="middle" fill="#d1fae5" font-size="7">✅ LTS: .NET 6, .NET 8</text><text x="365" y="90" text-anchor="middle" fill="#d1fae5" font-size="7">✅ Just called ".NET"</text><text x="365" y="110" text-anchor="middle" fill="#d1fae5" font-size="7" font-weight="600">Current ⭐</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">.NET Framework</span> is Windows-only, legacy, last version 4.8. <span class="key">.NET Core</span> was cross-platform rewrite (1.0-3.1). <span class="key">.NET 5+</span> unified both into one platform — just called .NET. Current LTS is <span class="key">.NET 8</span>. New projects should always use .NET 8. Even-numbered versions are LTS (Long Term Support)."</p>'},
{q:"How do you avoid Memory Leaks in C#?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>Even with GC, <b>memory leaks happen</b> when objects are still referenced but no longer needed. The GC cant collect them because something is still pointing to them.</p><h4>💻 Common Causes & Fixes</h4><div class="code"><span class="cm">// ❌ Leak 1: Event handlers not unsubscribed</span><br>button.Click += OnClick; <span class="cm">// subscribes</span><br><span class="cm">// Fix: button.Click -= OnClick; // unsubscribe!</span><br><br><span class="cm">// ❌ Leak 2: Not disposing IDisposable</span><br><span class="kw">var</span> conn = <span class="kw">new</span> SqlConnection();<br><span class="cm">// Fix: using var conn = new SqlConnection();</span><br><br><span class="cm">// ❌ Leak 3: Static collections growing forever</span><br><span class="kw">static</span> List&lt;User&gt; _cache = <span class="kw">new</span>(); <span class="cm">// never cleared!</span><br><span class="cm">// Fix: Use ConcurrentDictionary with expiry, or IMemoryCache</span><br><br><span class="cm">// ❌ Leak 4: Captured variables in closures/lambdas</span><br><span class="cm">// ❌ Leak 5: Large Object Heap fragmentation</span><br><br><span class="cm">// Tools to detect:</span><br><span class="cm">// dotnet-dump, dotnet-counters, Visual Studio Diagnostic Tools</span></div><h4>🗣️ Interview Answer</h4><p>"Common causes: <span class="key">unsubscribed event handlers</span>, <span class="key">undisposed resources</span>, <span class="key">static collections</span> growing forever, <span class="key">closures capturing references</span>. Fixes: always unsubscribe events, use using statement, use WeakReference for caches, use IMemoryCache with expiry. Detect with dotnet-dump and Visual Studio Diagnostic Tools."</p>'},
{q:"What are Channels in C#?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Channels</b> are a <b>thread-safe producer-consumer queue</b> for async communication between tasks. One task writes data, another reads it — like a pipe connecting two workers.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">var</span> channel = Channel.CreateUnbounded&lt;<span class="kw">string</span>&gt;();<br><br><span class="cm">// Producer - writes messages</span><br><span class="kw">async</span> Task Produce() {<br>&nbsp;&nbsp;<span class="kw">for</span>(<span class="kw">int</span> i = 0; i &lt; 10; i++) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> channel.Writer.WriteAsync($<span class="str">"Message {i}"</span>);<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">await</span> Task.Delay(100);<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;channel.Writer.Complete();<br>}<br><br><span class="cm">// Consumer - reads messages</span><br><span class="kw">async</span> Task Consume() {<br>&nbsp;&nbsp;<span class="kw">await foreach</span>(<span class="kw">var</span> msg <span class="kw">in</span> channel.Reader.ReadAllAsync()) {<br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(msg);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Run both together</span><br><span class="kw">await</span> Task.WhenAll(Produce(), Consume());</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Channels</span> provide async-friendly producer-consumer communication. <span class="key">CreateBounded</span> limits capacity (backpressure), <span class="key">CreateUnbounded</span> has no limit. Writer writes, Reader reads asynchronously. Better than BlockingCollection for async scenarios. Used in background processing, streaming, and pipeline architectures."</p>'},
{q:"How does the JIT Compiler work? What is AOT Compilation?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>JIT (Just-In-Time)</b> = compiles IL code to machine code <b>at runtime</b>, method by method, when first called.<br><b>AOT (Ahead-Of-Time)</b> = compiles <b>everything before running</b>. Faster startup, used in mobile/cloud.</p><svg viewBox="0 0 440 120" style="max-width:440px"><rect x="10" y="10" width="200" height="100" rx="8" fill="#3b82f6"/><text x="110" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">JIT (Just-In-Time)</text><text x="110" y="48" text-anchor="middle" fill="#bae6fd" font-size="8">IL → Machine code at RUNTIME</text><text x="110" y="63" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Optimized for current CPU</text><text x="110" y="78" text-anchor="middle" fill="#bae6fd" font-size="8">❌ Slower startup (first call)</text><text x="110" y="93" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Faster after warm-up</text><text x="110" y="105" text-anchor="middle" fill="#fff" font-size="7">Default in .NET</text><rect x="230" y="10" width="200" height="100" rx="8" fill="#10b981"/><text x="330" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">AOT (Ahead-Of-Time)</text><text x="330" y="48" text-anchor="middle" fill="#d1fae5" font-size="8">IL → Machine code BEFORE run</text><text x="330" y="63" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Instant startup</text><text x="330" y="78" text-anchor="middle" fill="#d1fae5" font-size="8">❌ Larger binary size</text><text x="330" y="93" text-anchor="middle" fill="#d1fae5" font-size="8">✅ No JIT overhead</text><text x="330" y="105" text-anchor="middle" fill="#fff" font-size="7">Native AOT in .NET 8</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">JIT</span> compiles IL to native code at runtime, method by method on first call. It optimizes for the current CPU but has slower cold start. <span class="key">AOT</span> compiles everything ahead of time — instant startup, smaller memory footprint, but larger binary. .NET 8 supports <span class="key">Native AOT</span> for serverless, containers, and mobile apps."</p>'},
{q:"What is IAsyncEnumerable<T>?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>IAsyncEnumerable&lt;T&gt;</b> lets you <b>stream data asynchronously one item at a time</b>. Instead of waiting for ALL data, you process each item as it arrives. Like watching a live stream vs downloading the full video first.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Without - wait for ALL data, then process</span><br><span class="kw">var</span> allProducts = <span class="kw">await</span> _db.Products.ToListAsync(); <span class="cm">// waits for ALL</span><br><span class="kw">foreach</span>(<span class="kw">var</span> p <span class="kw">in</span> allProducts) { Process(p); }<br><br><span class="cm">// With IAsyncEnumerable - process as they arrive!</span><br><span class="kw">async</span> IAsyncEnumerable&lt;Product&gt; GetProductsAsync() {<br>&nbsp;&nbsp;<span class="kw">await foreach</span>(<span class="kw">var</span> p <span class="kw">in</span> _db.Products.AsAsyncEnumerable()) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">yield return</span> p; <span class="cm">// stream one at a time!</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Consumer</span><br><span class="kw">await foreach</span>(<span class="kw">var</span> product <span class="kw">in</span> GetProductsAsync()) {<br>&nbsp;&nbsp;Console.WriteLine(product.Name); <span class="cm">// process immediately!</span><br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">IAsyncEnumerable&lt;T&gt;</span> combines async and streaming — returns items one at a time asynchronously using <b>await foreach</b> and <b>yield return</b>. Unlike Task&lt;List&lt;T&gt;&gt; which waits for all data, it streams items as they become available. Great for large datasets, real-time data, and API streaming."</p>'},
{q:"Explain Record types. How are they different from Class and Struct?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>A <b>Record</b> is a special type designed for <b>immutable data</b>. It auto-generates Equals, GetHashCode, ToString, and supports <b>value-based equality</b>. Two records with same data are equal.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Record - one line! Auto-generates everything</span><br><span class="kw">record</span> Person(<span class="kw">string</span> Name, <span class="kw">int</span> Age);<br><br><span class="kw">var</span> p1 = <span class="kw">new</span> Person(<span class="str">"Arjun"</span>, 28);<br><span class="kw">var</span> p2 = <span class="kw">new</span> Person(<span class="str">"Arjun"</span>, 28);<br><br>p1 == p2; <span class="cm">// true ✅ (value equality!)</span><br><span class="cm">// Class would be false (reference equality)</span><br><br>Console.WriteLine(p1); <span class="cm">// Person { Name = Arjun, Age = 28 }</span><br><br><span class="cm">// Immutable - create modified copy with "with"</span><br><span class="kw">var</span> p3 = p1 <span class="kw">with</span> { Age = 29 }; <span class="cm">// new object, Age changed</span><br><br><span class="cm">// record struct (C# 10) - value type record</span><br><span class="kw">record struct</span> Point(<span class="kw">int</span> X, <span class="kw">int</span> Y);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Record</span> is a reference type with value-based equality, auto-generated ToString, Equals, GetHashCode, and deconstruction. <span class="key">Class</span> has reference equality by default. <span class="key">Struct</span> is value type on stack. Records support <b>with</b> expression for non-destructive mutation. Use records for DTOs, immutable data, and domain value objects."</p>'},
{q:"What is the volatile keyword?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>volatile</b> tells the compiler and CPU: <b>dont cache this variable</b> — always read the latest value from memory. Used when multiple threads read/write the same field.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Worker {<br>&nbsp;&nbsp;<span class="cm">// Without volatile - thread may read cached (stale) value</span><br>&nbsp;&nbsp;<span class="cm">// private bool _running = true; // ❌ may not see update!</span><br><br>&nbsp;&nbsp;<span class="cm">// With volatile - always reads latest value</span><br>&nbsp;&nbsp;<span class="kw">private volatile bool</span> _running = <span class="kw">true</span>; <span class="cm">// ✅</span><br><br>&nbsp;&nbsp;<span class="kw">public void</span> DoWork() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">while</span>(_running) { <span class="cm">// always reads fresh value</span><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// do work...</span><br>&nbsp;&nbsp;&nbsp;&nbsp;}<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public void</span> Stop() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_running = <span class="kw">false</span>; <span class="cm">// other thread sets this</span><br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">volatile</span> prevents compiler and CPU from caching a field — ensures every read gets the latest value from main memory. Used for simple flags shared between threads. It does NOT provide atomicity — for complex operations use <span class="key">lock</span> or <span class="key">Interlocked</span> class instead."</p><div class="tip">💡 <b>Note:</b> volatile only works on simple types (bool, int, reference types). For compound operations (read-modify-write), use Interlocked.Increment or lock.</div>'},
{q:"What are Weak References? When would you use them?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>A <b>Weak Reference</b> holds a reference to an object but <b>does NOT prevent GC from collecting it</b>. Normal (strong) references keep objects alive. Weak references let GC clean up if memory is needed.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Strong reference - GC cannot collect</span><br><span class="kw">var</span> obj = <span class="kw">new</span> LargeObject(); <span class="cm">// stays in memory</span><br><br><span class="cm">// Weak reference - GC CAN collect if needed</span><br><span class="kw">var</span> weakRef = <span class="kw">new</span> WeakReference&lt;LargeObject&gt;(obj);<br>obj = <span class="kw">null</span>; <span class="cm">// remove strong reference</span><br><br><span class="cm">// Later - check if still alive</span><br><span class="kw">if</span>(weakRef.TryGetTarget(<span class="kw">out var</span> target)) {<br>&nbsp;&nbsp;Console.WriteLine(<span class="str">"Still alive!"</span>);<br>&nbsp;&nbsp;target.DoSomething();<br>} <span class="kw">else</span> {<br>&nbsp;&nbsp;Console.WriteLine(<span class="str">"GC collected it"</span>);<br>&nbsp;&nbsp;<span class="cm">// recreate if needed</span><br>}<br><br><span class="cm">// Use case: Cache that auto-clears under memory pressure</span><br><span class="kw">var</span> cache = <span class="kw">new</span> Dictionary&lt;<span class="kw">string</span>, WeakReference&lt;ExpensiveData&gt;&gt;();</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Weak Reference</span> allows GC to collect the object when memory is needed, unlike strong references that keep objects alive. Use <b>WeakReference&lt;T&gt;</b> and check with <b>TryGetTarget</b>. Used for: <span class="key">caches</span> that should auto-clear under memory pressure, <span class="key">event handlers</span> to prevent memory leaks, and large object management."</p>'},

// Basics
{q:"What is ASP.NET MVC? Explain the MVC pattern.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>ASP.NET MVC is a <b>web framework</b> by Microsoft to build websites. MVC stands for <b>Model-View-Controller</b> — it separates your code into 3 parts so it is clean, testable, and easy to maintain.</p><svg viewBox="0 0 440 210" style="max-width:440px"><rect x="10" y="5" width="420" height="35" rx="8" fill="#0ea5e9"/><text x="220" y="28" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">MVC Pattern Flow</text><rect x="160" y="50" width="120" height="50" rx="8" fill="#8b5cf6"/><text x="220" y="72" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">🎮 Controller</text><text x="220" y="88" text-anchor="middle" fill="#ede9fe" font-size="9">Handles requests</text><rect x="10" y="140" width="120" height="50" rx="8" fill="#f59e0b"/><text x="70" y="162" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">📦 Model</text><text x="70" y="178" text-anchor="middle" fill="#fef3c7" font-size="9">Data + Logic</text><rect x="310" y="140" width="120" height="50" rx="8" fill="#10b981"/><text x="370" y="162" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">💻 View</text><text x="370" y="178" text-anchor="middle" fill="#d1fae5" font-size="9">HTML / UI</text><line x1="180" y1="100" x2="90" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/><line x1="260" y1="100" x2="350" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/><line x1="130" y1="165" x2="310" y2="165" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/><defs><marker id="ar" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs><text x="160" y="118" text-anchor="middle" fill="#64748b" font-size="8">Gets data</text><text x="290" y="118" text-anchor="middle" fill="#64748b" font-size="8">Sends to view</text><text x="220" y="158" text-anchor="middle" fill="#64748b" font-size="8">passes data</text><rect x="130" y="195" width="180" height="15" rx="4" fill="#f0f9ff"/><text x="220" y="206" text-anchor="middle" fill="#0369a1" font-size="8">User Request → Controller → Model → View → Response</text></svg><h4>🗣️ Interview Answer</h4><p>"ASP.NET MVC is a web framework that follows the <span class="key">Model-View-Controller</span> pattern. <span class="key">Model</span> holds data and business logic, <span class="key">View</span> renders the UI (HTML), and <span class="key">Controller</span> handles user requests, gets data from Model, and returns the View. This separation makes code clean, testable, and maintainable."</p><div class="tip">💡 <b>Flow:</b> User clicks → Controller receives request → Gets data from Model → Passes to View → HTML sent to browser</div>'},
{q:"What is the difference between ASP.NET MVC and Web Forms?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Web Forms</b> = old way (drag-drop, event-driven, like Windows Forms for web). <b>MVC</b> = modern way (clean separation, full control over HTML, testable).</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="5" width="200" height="155" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">👴 Web Forms (Old)</text><text x="110" y="50" text-anchor="middle" fill="#334155" font-size="9">❌ ViewState (heavy page)</text><text x="110" y="67" text-anchor="middle" fill="#334155" font-size="9">❌ Event-driven (Button_Click)</text><text x="110" y="84" text-anchor="middle" fill="#334155" font-size="9">❌ No control over HTML</text><text x="110" y="101" text-anchor="middle" fill="#334155" font-size="9">❌ Hard to unit test</text><text x="110" y="118" text-anchor="middle" fill="#334155" font-size="9">❌ Tightly coupled</text><text x="110" y="148" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="600">Drag-drop, .aspx pages</text><rect x="230" y="5" width="200" height="155" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">🚀 MVC (Modern)</text><text x="330" y="50" text-anchor="middle" fill="#334155" font-size="9">✅ No ViewState (lightweight)</text><text x="330" y="67" text-anchor="middle" fill="#334155" font-size="9">✅ URL-based routing</text><text x="330" y="84" text-anchor="middle" fill="#334155" font-size="9">✅ Full HTML control</text><text x="330" y="101" text-anchor="middle" fill="#334155" font-size="9">✅ Easy unit testing</text><text x="330" y="118" text-anchor="middle" fill="#334155" font-size="9">✅ Separation of concerns</text><text x="330" y="148" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Clean, testable, RESTful</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">Web Forms</span> uses event-driven model with ViewState, server controls, and code-behind — hard to test and heavy. <span class="key">MVC</span> uses clean separation with Controllers, Views, Models — lightweight, full HTML control, SEO-friendly URLs, and easy to unit test. MVC is the modern approach."</p><div class="tip">💡 <b>Note:</b> Web Forms is dead. Microsoft no longer develops it. Always say you prefer MVC/Core in interviews!</div>'},
{q:"What is a Controller? What is its role?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A Controller is the <b>traffic police</b> of your app. It <b>receives the user request</b>, decides what to do, gets data from the Model, and <b>returns a response</b> (View, JSON, redirect, etc.).</p><svg viewBox="0 0 440 150" style="max-width:440px"><rect x="10" y="55" width="80" height="40" rx="8" fill="#64748b"/><text x="50" y="79" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">👤 User</text><line x1="90" y1="75" x2="150" y2="75" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/><text x="120" y="68" text-anchor="middle" fill="#64748b" font-size="8">/home/index</text><rect x="150" y="45" width="130" height="60" rx="8" fill="#8b5cf6"/><text x="215" y="68" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">🎮 Controller</text><text x="215" y="85" text-anchor="middle" fill="#ede9fe" font-size="8">HomeController</text><text x="215" y="97" text-anchor="middle" fill="#ede9fe" font-size="8">Index() action</text><line x1="280" y1="65" x2="340" y2="35" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/><line x1="280" y1="85" x2="340" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/><rect x="340" y="15" width="90" height="40" rx="8" fill="#f59e0b"/><text x="385" y="39" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">📦 Model</text><rect x="340" y="95" width="90" height="40" rx="8" fill="#10b981"/><text x="385" y="119" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">💻 View</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">public class</span> HomeController : Controller {<br><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Index() { <span class="cm">// Action method</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">var</span> products = _db.Products.ToList();<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> View(products); <span class="cm">// Returns HTML view</span><br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult Details(<span class="kw">int</span> id) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">var</span> product = _db.Products.Find(id);<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(product == <span class="kw">null</span>) <span class="kw">return</span> NotFound();<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> View(product);<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Controller</span> is a class that inherits from Controller base class. It contains <span class="key">Action Methods</span> that handle HTTP requests. It receives the request, interacts with the Model for data, and returns an <span class="key">ActionResult</span> (View, JSON, Redirect, etc.). Each public method in a controller is an action."</p>'},
{q:"What is a View? What is Razor syntax?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>View</b> is the <b>HTML page</b> that the user sees. <b>Razor</b> is a syntax that lets you mix <b>C# code inside HTML</b> using the <b>@</b> symbol. File extension is <b>.cshtml</b>.</p><svg viewBox="0 0 440 150" style="max-width:440px"><rect x="10" y="5" width="200" height="135" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12">Plain HTML</text><text x="110" y="50" text-anchor="middle" fill="#334155" font-size="9">&lt;h1&gt;Welcome&lt;/h1&gt;</text><text x="110" y="67" text-anchor="middle" fill="#334155" font-size="9">&lt;p&gt;Hello User&lt;/p&gt;</text><text x="110" y="90" text-anchor="middle" fill="#dc2626" font-size="9">❌ Static content only</text><text x="110" y="107" text-anchor="middle" fill="#dc2626" font-size="9">❌ Cannot show dynamic data</text><text x="110" y="130" text-anchor="middle" fill="#64748b" font-size="8">Same for everyone</text><rect x="230" y="5" width="200" height="135" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">Razor (.cshtml)</text><text x="330" y="50" text-anchor="middle" fill="#334155" font-size="9">&lt;h1&gt;Welcome&lt;/h1&gt;</text><text x="330" y="67" text-anchor="middle" fill="#16a34a" font-size="9">&lt;p&gt;Hello @Model.Name&lt;/p&gt;</text><text x="330" y="90" text-anchor="middle" fill="#16a34a" font-size="9">✅ Dynamic C# + HTML</text><text x="330" y="107" text-anchor="middle" fill="#16a34a" font-size="9">✅ Loops, conditions, data</text><text x="330" y="130" text-anchor="middle" fill="#16a34a" font-size="8" font-weight="600">@ = switch to C# mode</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">&lt;!-- Views/Home/Index.cshtml --&gt;</span><br>@model List&lt;Product&gt;<br><br>&lt;h1&gt;Products&lt;/h1&gt;<br><br>@<span class="kw">if</span>(Model.Any()) {<br>&nbsp;&nbsp;&lt;ul&gt;<br>&nbsp;&nbsp;@<span class="kw">foreach</span>(<span class="kw">var</span> p <span class="kw">in</span> Model) {<br>&nbsp;&nbsp;&nbsp;&nbsp;&lt;li&gt;@p.Name - ₹@p.Price&lt;/li&gt;<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;&lt;/ul&gt;<br>} <span class="kw">else</span> {<br>&nbsp;&nbsp;&lt;p&gt;No products found&lt;/p&gt;<br>}</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">View</span> is a .cshtml file that generates HTML for the browser. <span class="key">Razor</span> is the view engine that allows mixing C# with HTML using the <b>@</b> symbol. You can use @Model to access data, @if/@foreach for logic, and @Html helpers for forms. Views are stored in the Views folder following the convention Views/ControllerName/ActionName.cshtml."</p>'},
{q:"What is a Model? Explain Model Binding.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Model</b> is a C# class that represents your <b>data</b> (like a table row). <b>Model Binding</b> is the magic that <b>automatically maps</b> form data / URL params / JSON body to your C# model object.</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="5" width="130" height="80" rx="8" fill="#64748b"/><text x="75" y="28" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">📝 Form Data</text><text x="75" y="48" text-anchor="middle" fill="#e2e8f0" font-size="8">Name: "Arjun"</text><text x="75" y="62" text-anchor="middle" fill="#e2e8f0" font-size="8">Email: "a@b.com"</text><text x="75" y="76" text-anchor="middle" fill="#e2e8f0" font-size="8">Age: 28</text><text x="175" y="45" text-anchor="middle" fill="#64748b" font-size="20">→</text><text x="175" y="62" text-anchor="middle" fill="#10b981" font-size="8" font-weight="700">Auto Mapping!</text><rect x="220" y="5" width="210" height="80" rx="8" fill="#10b981"/><text x="325" y="28" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">📦 C# Model Object</text><text x="325" y="48" text-anchor="middle" fill="#d1fae5" font-size="8">user.Name = "Arjun"</text><text x="325" y="62" text-anchor="middle" fill="#d1fae5" font-size="8">user.Email = "a@b.com"</text><text x="325" y="76" text-anchor="middle" fill="#d1fae5" font-size="8">user.Age = 28</text><rect x="10" y="100" width="420" height="60" rx="8" fill="#f0f9ff" stroke="#bae6fd"/><text x="220" y="120" text-anchor="middle" fill="#0369a1" font-size="10" font-weight="600">Model Binding Sources:</text><text x="220" y="140" text-anchor="middle" fill="#334155" font-size="9">📋 Form fields | 🔗 URL /user/5 | ❓ Query ?id=5 | 📨 JSON body | 📥 Headers</text><text x="220" y="155" text-anchor="middle" fill="#64748b" font-size="8">ASP.NET Core automatically maps all these to your action method parameters!</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Model class</span><br><span class="kw">public class</span> User {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public string</span> Email { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public int</span> Age { <span class="kw">get</span>; <span class="kw">set</span>; }<br>}<br><br><span class="cm">// Model Binding - auto maps form/JSON to User</span><br>[HttpPost]<br><span class="kw">public</span> IActionResult Create(User user) { <span class="cm">// ✅ Auto bound!</span><br>&nbsp;&nbsp;<span class="kw">if</span>(ModelState.IsValid) {<br>&nbsp;&nbsp;&nbsp;&nbsp;_db.Users.Add(user);<br>&nbsp;&nbsp;&nbsp;&nbsp;_db.SaveChanges();<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">return</span> View(user);<br>}</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Model</span> is a class that represents data and business rules. <span class="key">Model Binding</span> automatically maps incoming request data (form fields, query strings, route data, JSON body) to action method parameters or model objects. It matches by <b>property name</b>. We validate using <span class="key">ModelState.IsValid</span> with Data Annotations."</p><div class="tip">💡 <b>Binding sources:</b> [FromBody] = JSON, [FromQuery] = ?key=val, [FromRoute] = /user/{id}, [FromForm] = form post</div>'},
{q:"What is Routing? Explain Attribute Routing vs Convention Routing.",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Routing</b> is how ASP.NET decides <b>which Controller and Action to call</b> based on the URL. Like a GPS — URL is the address, routing finds the destination.</p><svg viewBox="0 0 440 160" style="max-width:440px"><rect x="10" y="5" width="200" height="145" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">Convention Routing</text><text x="110" y="48" text-anchor="middle" fill="#334155" font-size="9">Defined in Program.cs</text><text x="110" y="68" text-anchor="middle" fill="#1e40af" font-size="8">{controller}/{action}/{id?}</text><text x="110" y="90" text-anchor="middle" fill="#334155" font-size="9">/Home/Index → HomeController</text><text x="110" y="107" text-anchor="middle" fill="#334155" font-size="9">/Product/Details/5</text><text x="110" y="130" text-anchor="middle" fill="#64748b" font-size="8">One pattern for all controllers</text><text x="110" y="145" text-anchor="middle" fill="#1e40af" font-size="8" font-weight="600">Good for MVC views</text><rect x="230" y="5" width="200" height="145" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="11">Attribute Routing</text><text x="330" y="48" text-anchor="middle" fill="#334155" font-size="9">Defined on Controller/Action</text><text x="330" y="68" text-anchor="middle" fill="#16a34a" font-size="8">[Route("api/products")]</text><text x="330" y="90" text-anchor="middle" fill="#334155" font-size="9">[HttpGet("{id}")]</text><text x="330" y="107" text-anchor="middle" fill="#334155" font-size="9">/api/products/5</text><text x="330" y="130" text-anchor="middle" fill="#64748b" font-size="8">Custom URL per action</text><text x="330" y="145" text-anchor="middle" fill="#16a34a" font-size="8" font-weight="600">Best for Web APIs ⭐</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">// Convention Routing (Program.cs)</span><br>app.MapControllerRoute(<br>&nbsp;&nbsp;name: <span class="str">"default"</span>,<br>&nbsp;&nbsp;pattern: <span class="str">"{controller=Home}/{action=Index}/{id?}"</span>);<br><br><span class="cm">// Attribute Routing (on Controller)</span><br>[Route(<span class="str">"api/[controller]"</span>)]<br><span class="kw">public class</span> ProductsController : ControllerBase {<br>&nbsp;&nbsp;[HttpGet] <span class="cm">// GET /api/products</span><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult GetAll() { }<br><br>&nbsp;&nbsp;[HttpGet(<span class="str">"{id}"</span>)] <span class="cm">// GET /api/products/5</span><br>&nbsp;&nbsp;<span class="kw">public</span> IActionResult GetById(<span class="kw">int</span> id) { }<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Routing</span> maps URLs to Controller actions. <span class="key">Convention routing</span> defines a global pattern like {controller}/{action}/{id?} in Program.cs. <span class="key">Attribute routing</span> uses [Route] and [HttpGet] attributes directly on controllers/actions for custom URLs. Attribute routing is preferred for Web APIs, convention routing for MVC views."</p>'},
{q:"What are HTML Helpers? Give examples.",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>HTML Helpers</b> are C# methods in Razor views that <b>generate HTML elements</b>. Instead of writing raw HTML for forms, you use helpers that also handle model binding, validation, and security automatically.</p><h4>💻 Common Helpers</h4><div class="code"><span class="cm">// Text input</span><br>@Html.TextBoxFor(m =&gt; m.Name)<br><span class="cm">// Generates: &lt;input type="text" name="Name" /&gt;</span><br><br><span class="cm">// Label</span><br>@Html.LabelFor(m =&gt; m.Email)<br><span class="cm">// Generates: &lt;label for="Email"&gt;Email&lt;/label&gt;</span><br><br><span class="cm">// Dropdown</span><br>@Html.DropDownListFor(m =&gt; m.Country, countryList)<br><br><span class="cm">// Form</span><br>@using(Html.BeginForm(<span class="str">"Create"</span>, <span class="str">"User"</span>, FormMethod.Post)) {<br>&nbsp;&nbsp;@Html.TextBoxFor(m =&gt; m.Name)<br>&nbsp;&nbsp;@Html.ValidationMessageFor(m =&gt; m.Name)<br>&nbsp;&nbsp;&lt;button type=<span class="str">"submit"</span>&gt;Save&lt;/button&gt;<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">HTML Helpers</span> are server-side methods that generate HTML in Razor views. Examples: <span class="key">Html.TextBoxFor</span>, <span class="key">Html.LabelFor</span>, <span class="key">Html.DropDownListFor</span>, <span class="key">Html.BeginForm</span>. They provide model binding, validation support, and anti-forgery tokens automatically. In ASP.NET Core, <span class="key">Tag Helpers</span> are the modern replacement."</p><div class="tip">💡 <b>Modern way:</b> Use Tag Helpers instead! &lt;input asp-for="Name" /&gt; is cleaner than @Html.TextBoxFor(m =&gt; m.Name)</div>'},
{q:"What is the difference between ViewBag, ViewData, and TempData?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>All three pass data from Controller to View, but they work differently. Think of them as 3 ways to send a message.</p><svg viewBox="0 0 440 190" style="max-width:440px"><rect x="10" y="5" width="135" height="175" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="77" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">ViewData</text><text x="77" y="48" text-anchor="middle" fill="#334155" font-size="8">Dictionary</text><text x="77" y="63" text-anchor="middle" fill="#334155" font-size="8">["key"] = value</text><text x="77" y="83" text-anchor="middle" fill="#334155" font-size="8">✅ Controller → View</text><text x="77" y="100" text-anchor="middle" fill="#dc2626" font-size="8">❌ Needs casting</text><text x="77" y="117" text-anchor="middle" fill="#dc2626" font-size="8">❌ Current request only</text><text x="77" y="140" text-anchor="middle" fill="#1e40af" font-size="7">ViewData["Name"]</text><text x="77" y="155" text-anchor="middle" fill="#1e40af" font-size="7">= "Arjun";</text><text x="77" y="172" text-anchor="middle" fill="#64748b" font-size="7">Type: Dictionary</text><rect x="155" y="5" width="135" height="175" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="222" y="28" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="11">ViewBag</text><text x="222" y="48" text-anchor="middle" fill="#334155" font-size="8">Dynamic wrapper</text><text x="222" y="63" text-anchor="middle" fill="#334155" font-size="8">over ViewData</text><text x="222" y="83" text-anchor="middle" fill="#334155" font-size="8">✅ Controller → View</text><text x="222" y="100" text-anchor="middle" fill="#16a34a" font-size="8">✅ No casting needed</text><text x="222" y="117" text-anchor="middle" fill="#dc2626" font-size="8">❌ Current request only</text><text x="222" y="140" text-anchor="middle" fill="#16a34a" font-size="7">ViewBag.Name</text>
