.ans-panel{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border:1px solid #bae6fd;border-radius:10px;padding:16px;margin:-2px 0 8px;font-size:.92rem;color:#1e293b;line-height:1.7;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:2000px}}

.ans-panel h4:first-child{margin-top:0}

.ans-panel .key{background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:4px;font-weight:600;font-size:.82rem;display:inline-block;margin:2px}
.ans-panel .tip{background:#fef3c7;border-left:3px solid #f59e0b;padding:8px 12px;border-radius:6px;margin:8px 0;font-size:.85rem;color:#92400e}

.ans-panel .code .kw{color:#c084fc}.ans-panel .code .str{color:#86efac}.ans-panel .code .cm{color:#64748b}
.ans-panel svg{display:block;margin:10px auto;max-width:100%}
.ans-btn{background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:.78rem;cursor:pointer;font-weight:600;margin-left:8px}
.voice-btn{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;font-weight:600;margin:8px 4px 0 0;display:inline-flex;align-items:center;gap:4px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.voice-btn:hover{transform:scale(1.03)}
</style>

<script>
const DATA={
oops:[
// Basics
{q:"What is Object-Oriented Programming? What are its four pillars?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>OOP is a way of writing code by creating <b>objects</b> — just like real-world things. Instead of writing one long code, you break it into small reusable pieces called objects.</p><h4>📦 Four Pillars of OOP</h4><svg viewBox="0 0 440 200" style="max-width:440px"><rect x="10" y="10" width="420" height="45" rx="8" fill="#0ea5e9" /><text x="220" y="38" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">OOP - 4 Pillars</text><rect x="10" y="70" width="100" height="120" rx="8" fill="#10b981" /><text x="60" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Encapsulation</text><text x="60" y="118" text-anchor="middle" fill="#d1fae5" font-size="9">Hide data</text><text x="60" y="133" text-anchor="middle" fill="#d1fae5" font-size="9">inside class</text><text x="60" y="170" text-anchor="middle" font-size="22">🔒</text><rect x="120" y="70" width="100" height="120" rx="8" fill="#f59e0b" /><text x="170" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Inheritance</text><text x="170" y="118" text-anchor="middle" fill="#fef3c7" font-size="9">Child gets</text><text x="170" y="133" text-anchor="middle" fill="#fef3c7" font-size="9">parent features</text><text x="170" y="170" text-anchor="middle" font-size="22">👨‍👦</text><rect x="230" y="70" width="100" height="120" rx="8" fill="#8b5cf6" /><text x="280" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Polymorphism</text><text x="280" y="118" text-anchor="middle" fill="#ede9fe" font-size="9">Same name</text><text x="280" y="133" text-anchor="middle" fill="#ede9fe" font-size="9">different work</text><text x="280" y="170" text-anchor="middle" font-size="22">🎭</text><rect x="340" y="70" width="90" height="120" rx="8" fill="#ef4444" /><text x="385" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Abstraction</text><text x="385" y="118" text-anchor="middle" fill="#fecaca" font-size="9">Show only</text><text x="385" y="133" text-anchor="middle" fill="#fecaca" font-size="9">what is needed</text><text x="385" y="170" text-anchor="middle" font-size="22">🎨</text></svg><h4>🗣️ Interview Answer</h4><p>"OOP is a programming approach where we organize code using objects. It has 4 pillars: <span class="key">Encapsulation</span> hides internal data, <span class="key">Inheritance</span> allows reusing parent class code, <span class="key">Polymorphism</span> lets same method behave differently, and <span class="key">Abstraction</span> shows only essential details."</p><div class="tip">💡 <b>Tip:</b> Interviewer expects you to explain each pillar with a real example. Keep one example ready for each!</div>'},
{q:"What is a Class and what is an Object? How are they related?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Class</b> is a <b>blueprint/template</b> — like an architect drawing of a house.<br>An <b>Object</b> is the <b>actual house</b> built from that blueprint.</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="10" width="180" height="150" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4"/><text x="100" y="35" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="14">📋 Class (Blueprint)</text><text x="100" y="58" text-anchor="middle" fill="#1e40af" font-size="11">class Car</text><text x="100" y="78" text-anchor="middle" fill="#334155" font-size="10">- Color</text><text x="100" y="93" text-anchor="middle" fill="#334155" font-size="10">- Speed</text><text x="100" y="108" text-anchor="middle" fill="#334155" font-size="10">- Brand</text><text x="100" y="128" text-anchor="middle" fill="#0369a1" font-size="10">+ Drive()</text><text x="100" y="143" text-anchor="middle" fill="#0369a1" font-size="10">+ Brake()</text><text x="220" y="85" text-anchor="middle" fill="#64748b" font-size="24">→</text><text x="220" y="105" text-anchor="middle" fill="#64748b" font-size="9">new Car()</text><rect x="250" y="10" width="85" height="70" rx="8" fill="#10b981"/><text x="292" y="32" text-anchor="middle" fill="#fff" font-weight="600" font-size="10">🚗 Object 1</text><text x="292" y="48" text-anchor="middle" fill="#d1fae5" font-size="9">Red, BMW</text><text x="292" y="62" text-anchor="middle" fill="#d1fae5" font-size="9">200 kmph</text><rect x="345" y="10" width="85" height="70" rx="8" fill="#f59e0b"/><text x="387" y="32" text-anchor="middle" fill="#fff" font-weight="600" font-size="10">🚙 Object 2</text><text x="387" y="48" text-anchor="middle" fill="#fef3c7" font-size="9">Blue, Audi</text><text x="387" y="62" text-anchor="middle" fill="#fef3c7" font-size="9">180 kmph</text><rect x="250" y="90" width="85" height="70" rx="8" fill="#8b5cf6"/><text x="292" y="112" text-anchor="middle" fill="#fff" font-weight="600" font-size="10">🚕 Object 3</text><text x="292" y="128" text-anchor="middle" fill="#ede9fe" font-size="9">Yellow, Taxi</text><text x="292" y="142" text-anchor="middle" fill="#ede9fe" font-size="9">120 kmph</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Car {<br>&nbsp;&nbsp;<span class="kw">public string</span> Color;<br>&nbsp;&nbsp;<span class="kw">public void</span> Drive() { }<br>}<br><br><span class="cm">// Creating Objects</span><br>Car myCar = <span class="kw">new</span> Car(); <span class="cm">// Object 1</span><br>Car yourCar = <span class="kw">new</span> Car(); <span class="cm">// Object 2</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Class</span> is a blueprint that defines properties and methods. An <span class="key">Object</span> is an instance of that class created using the <b>new</b> keyword. One class can create many objects, each with different data."</p><div class="tip">💡 <b>Key Point:</b> Class = Template (no memory), Object = Real thing (occupies memory)</div>'},
{q:"What is Encapsulation? Why is it important?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>Encapsulation means <b>wrapping data + methods together</b> inside a class and <b>hiding internal details</b> from outside. Like a capsule medicine — you dont see whats inside, you just use it.</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="30" y="10" width="170" height="150" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="115" y="32" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">❌ Without Encapsulation</text><text x="115" y="55" text-anchor="middle" fill="#334155" font-size="10">class BankAccount {</text><text x="115" y="72" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="700">public decimal balance;</text><text x="115" y="89" text-anchor="middle" fill="#334155" font-size="10">}</text><text x="115" y="115" text-anchor="middle" fill="#dc2626" font-size="9">⚠️ Anyone can do:</text><text x="115" y="132" text-anchor="middle" fill="#dc2626" font-size="9">acc.balance = -5000;</text><text x="115" y="148" text-anchor="middle" fill="#dc2626" font-size="9">💥 BROKEN!</text><rect x="240" y="10" width="170" height="150" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="325" y="32" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="12">✅ With Encapsulation</text><text x="325" y="55" text-anchor="middle" fill="#334155" font-size="10">class BankAccount {</text><text x="325" y="72" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="700">private decimal balance;</text><text x="325" y="89" text-anchor="middle" fill="#334155" font-size="10">public Deposit(amt)</text><text x="325" y="106" text-anchor="middle" fill="#334155" font-size="10">public Withdraw(amt)</text><text x="325" y="123" text-anchor="middle" fill="#334155" font-size="10">}</text><text x="325" y="148" text-anchor="middle" fill="#16a34a" font-size="9">🔒 Safe and Controlled!</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> BankAccount {<br>&nbsp;&nbsp;<span class="kw">private decimal</span> _balance; <span class="cm">// Hidden!</span><br><br>&nbsp;&nbsp;<span class="kw">public decimal</span> Balance {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> { <span class="kw">return</span> _balance; }<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public void</span> Deposit(<span class="kw">decimal</span> amt) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(amt > 0) _balance += amt;<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"Encapsulation means <span class="key">hiding internal data</span> using private fields and exposing only whats needed through <span class="key">public properties/methods</span>. It protects data from invalid access and gives us control over how data is read or modified."</p><div class="tip">💡 <b>Real Example:</b> ATM machine — you can withdraw money but cant directly access the vault. The machine controls the process.</div>'},
{q:"What is Inheritance? What are the types of inheritance in C#?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>Inheritance means a <b>child class gets all features of a parent class</b> automatically. Like a son inherits his fathers property — he gets everything without building from scratch.</p><svg viewBox="0 0 440 200" style="max-width:440px"><defs><marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs><rect x="150" y="5" width="140" height="50" rx="8" fill="#0ea5e9"/><text x="220" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">🏠 Animal (Parent)</text><text x="220" y="42" text-anchor="middle" fill="#bae6fd" font-size="10">Name, Eat(), Sleep()</text><line x1="190" y1="55" x2="110" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/><line x1="250" y1="55" x2="330" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/><rect x="40" y="80" width="140" height="50" rx="8" fill="#10b981"/><text x="110" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">🐕 Dog (Child)</text><text x="110" y="117" text-anchor="middle" fill="#d1fae5" font-size="10">+ Bark()</text><rect x="260" y="80" width="140" height="50" rx="8" fill="#f59e0b"/><text x="330" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">🐱 Cat (Child)</text><text x="330" y="117" text-anchor="middle" fill="#fef3c7" font-size="10">+ Meow()</text><rect x="10" y="150" width="420" height="42" rx="8" fill="#f0f9ff" stroke="#bae6fd"/><text x="220" y="167" text-anchor="middle" fill="#0369a1" font-size="10" font-weight="600">Dog and Cat both get Name, Eat(), Sleep() from Animal automatically! ✅</text><text x="220" y="182" text-anchor="middle" fill="#64748b" font-size="9">They only add their own special methods (Bark, Meow)</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal { <span class="cm">// Parent</span><br>&nbsp;&nbsp;<span class="kw">public string</span> Name;<br>&nbsp;&nbsp;<span class="kw">public void</span> Eat() =&gt; Console.WriteLine(<span class="str">"Eating"</span>);<br>}<br><br><span class="kw">class</span> Dog : Animal { <span class="cm">// Child inherits Animal</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Bark() =&gt; Console.WriteLine(<span class="str">"Woof!"</span>);<br>}<br><br>Dog d = <span class="kw">new</span> Dog();<br>d.Name = <span class="str">"Buddy"</span>; <span class="cm">// From Animal ✅</span><br>d.Eat(); <span class="cm">// From Animal ✅</span><br>d.Bark(); <span class="cm">// Own method ✅</span></div><h4>📋 Types in C#</h4><p><span class="key">Single</span> A → B &nbsp; <span class="key">Multilevel</span> A → B → C &nbsp; <span class="key">Hierarchical</span> A → B, A → C</p><p>⚠️ C# does <b>NOT</b> support Multiple Inheritance with classes (use Interfaces instead)</p><h4>🗣️ Interview Answer</h4><p>"Inheritance allows a <span class="key">child class to reuse</span> properties and methods of a parent class using the <b>:</b> symbol. C# supports Single, Multilevel, and Hierarchical inheritance. Multiple inheritance is achieved through <span class="key">Interfaces</span>."</p>'},
{q:"What is Polymorphism? What are its types?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>Polymorphism means <b>"one name, many forms"</b>. Same method name but it does <b>different things</b> based on the situation. Like the word "Open" — open a door, open a book, open an app — same word, different actions!</p><svg viewBox="0 0 440 190" style="max-width:440px"><rect x="120" y="5" width="200" height="35" rx="8" fill="#8b5cf6"/><text x="220" y="28" text-anchor="middle" fill="#fff" font-weight="700" font-size="13">🎭 Polymorphism</text><line x1="170" y1="40" x2="100" y2="60" stroke="#64748b" stroke-width="2"/><line x1="270" y1="40" x2="340" y2="60" stroke="#64748b" stroke-width="2"/><rect x="10" y="60" width="190" height="120" rx="8" fill="#dbeafe" stroke="#3b82f6"/><text x="105" y="82" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">Compile-Time (Static)</text><text x="105" y="100" text-anchor="middle" fill="#1e40af" font-size="11">= Method Overloading</text><text x="105" y="122" text-anchor="middle" fill="#334155" font-size="10">Add(int a, int b)</text><text x="105" y="138" text-anchor="middle" fill="#334155" font-size="10">Add(int a, int b, int c)</text><text x="105" y="154" text-anchor="middle" fill="#334155" font-size="10">Add(double a, double b)</text><text x="105" y="172" text-anchor="middle" fill="#64748b" font-size="9">Same name, different params</text><rect x="240" y="60" width="190" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b"/><text x="335" y="82" text-anchor="middle" fill="#92400e" font-weight="700" font-size="11">Run-Time (Dynamic)</text><text x="335" y="100" text-anchor="middle" fill="#92400e" font-size="11">= Method Overriding</text><text x="335" y="122" text-anchor="middle" fill="#334155" font-size="10">Animal → Speak()</text><text x="335" y="138" text-anchor="middle" fill="#334155" font-size="10">Dog → Speak() = Woof!</text><text x="335" y="154" text-anchor="middle" fill="#334155" font-size="10">Cat → Speak() = Meow!</text><text x="335" y="172" text-anchor="middle" fill="#64748b" font-size="9">Same name, different behavior</text></svg><h4>💻 Overloading (Compile-Time)</h4><div class="code"><span class="kw">class</span> Calculator {<br>&nbsp;&nbsp;<span class="kw">public int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a + b;<br>&nbsp;&nbsp;<span class="kw">public int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b, <span class="kw">int</span> c) =&gt; a+b+c;<br>}</div><h4>💻 Overriding (Run-Time)</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() =&gt; Console.WriteLine(<span class="str">"..."</span>);<br>}<br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Woof!"</span>);<br>}</div><h4>🗣️ Interview Answer</h4><p>"Polymorphism means one name, many forms. <span class="key">Compile-time</span> polymorphism is achieved through <b>Method Overloading</b> (same name, different parameters). <span class="key">Run-time</span> polymorphism is achieved through <b>Method Overriding</b> using virtual and override keywords."</p><div class="tip">💡 <b>Key Difference:</b> Overloading = same class, different params | Overriding = parent-child, same params, different body</div>'},
{q:"What is Abstraction? How is it achieved in C#?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>Abstraction means <b>showing only what is necessary</b> and <b>hiding the complex details</b>. Like driving a car — you use steering, brake, accelerator but you dont need to know how the engine works internally.</p><svg viewBox="0 0 440 180" style="max-width:440px"><rect x="10" y="10" width="200" height="160" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="35" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="13">👁️ What YOU See</text><text x="110" y="60" text-anchor="middle" fill="#334155" font-size="11">✅ Start()</text><text x="110" y="80" text-anchor="middle" fill="#334155" font-size="11">✅ Drive()</text><text x="110" y="100" text-anchor="middle" fill="#334155" font-size="11">✅ Brake()</text><text x="110" y="130" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">Simple Interface</text><text x="110" y="148" text-anchor="middle" fill="#64748b" font-size="9">Only essential methods</text><rect x="230" y="10" width="200" height="160" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="330" y="35" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="13">🔧 Hidden Inside</text><text x="330" y="60" text-anchor="middle" fill="#334155" font-size="10">🔒 CheckFuel()</text><text x="330" y="78" text-anchor="middle" fill="#334155" font-size="10">🔒 IgniteEngine()</text><text x="330" y="96" text-anchor="middle" fill="#334155" font-size="10">🔒 InjectFuel()</text><text x="330" y="114" text-anchor="middle" fill="#334155" font-size="10">🔒 CompressAir()</text><text x="330" y="148" text-anchor="middle" fill="#64748b" font-size="9">Complex logic hidden</text></svg><h4>💻 Achieved using Abstract Class</h4><div class="code"><span class="kw">abstract class</span> Shape {<br>&nbsp;&nbsp;<span class="kw">public abstract double</span> Area(); <span class="cm">// No body - child MUST implement</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Display() =&gt; Console.WriteLine(<span class="str">"I am a shape"</span>);<br>}<br><br><span class="kw">class</span> Circle : Shape {<br>&nbsp;&nbsp;<span class="kw">public double</span> Radius;<br>&nbsp;&nbsp;<span class="kw">public override double</span> Area() =&gt; 3.14 * Radius * Radius;<br>}</div><h4>💻 Achieved using Interface</h4><div class="code"><span class="kw">interface</span> IPayment {<br>&nbsp;&nbsp;<span class="kw">void</span> Pay(<span class="kw">decimal</span> amount); <span class="cm">// Only declaration</span><br>}<br><br><span class="kw">class</span> CreditCard : IPayment {<br>&nbsp;&nbsp;<span class="kw">public void</span> Pay(<span class="kw">decimal</span> amount) { <span class="cm">// Implementation</span> }<br>}</div><h4>🗣️ Interview Answer</h4><p>"Abstraction means <span class="key">hiding complex implementation</span> and showing only essential features. In C# it is achieved using <span class="key">Abstract Classes</span> (partial abstraction - can have both abstract and normal methods) and <span class="key">Interfaces</span> (full abstraction - only method signatures)."</p><div class="tip">💡 <b>Key Difference:</b> Encapsulation = hiding DATA (private fields) | Abstraction = hiding IMPLEMENTATION (abstract methods)</div>'},
{q:"What is the difference between a Class and a Struct?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Class</b> is a <b>Reference Type</b> (stored in Heap memory). <b>Struct</b> is a <b>Value Type</b> (stored in Stack memory). Class is for complex objects, Struct is for small lightweight data.</p><svg viewBox="0 0 440 200" style="max-width:440px"><rect x="10" y="10" width="200" height="180" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="35" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="14">📦 Class</text><text x="110" y="58" text-anchor="middle" fill="#334155" font-size="10">✅ Reference Type</text><text x="110" y="76" text-anchor="middle" fill="#334155" font-size="10">✅ Stored in HEAP</text><text x="110" y="94" text-anchor="middle" fill="#334155" font-size="10">✅ Supports Inheritance</text><text x="110" y="112" text-anchor="middle" fill="#334155" font-size="10">✅ Can be null</text><text x="110" y="130" text-anchor="middle" fill="#334155" font-size="10">✅ Has Destructor</text><text x="110" y="148" text-anchor="middle" fill="#334155" font-size="10">✅ Default constructor OK</text><text x="110" y="175" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">Use for: Complex objects</text><rect x="230" y="10" width="200" height="180" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="330" y="35" text-anchor="middle" fill="#92400e" font-weight="700" font-size="14">📦 Struct</text><text x="330" y="58" text-anchor="middle" fill="#334155" font-size="10">✅ Value Type</text><text x="330" y="76" text-anchor="middle" fill="#334155" font-size="10">✅ Stored in STACK</text><text x="330" y="94" text-anchor="middle" fill="#334155" font-size="10">❌ No Inheritance</text><text x="330" y="112" text-anchor="middle" fill="#334155" font-size="10">❌ Cannot be null</text><text x="330" y="130" text-anchor="middle" fill="#334155" font-size="10">❌ No Destructor</text><text x="330" y="148" text-anchor="middle" fill="#334155" font-size="10">❌ No parameterless ctor</text><text x="330" y="175" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">Use for: Small, lightweight data</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> PersonClass { <span class="kw">public string</span> Name; }<br><span class="kw">struct</span> PersonStruct { <span class="kw">public string</span> Name; }<br><br><span class="cm">// Class = Reference (both point to SAME object)</span><br>PersonClass a = <span class="kw">new</span> PersonClass { Name = <span class="str">"Arjun"</span> };<br>PersonClass b = a;<br>b.Name = <span class="str">"Ravi"</span>;<br>Console.WriteLine(a.Name); <span class="cm">// "Ravi" 😱 Changed!</span><br><br><span class="cm">// Struct = Value (each has OWN copy)</span><br>PersonStruct x = <span class="kw">new</span> PersonStruct { Name = <span class="str">"Arjun"</span> };<br>PersonStruct y = x;<br>y.Name = <span class="str">"Ravi"</span>;<br>Console.WriteLine(x.Name); <span class="cm">// "Arjun" ✅ Safe!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Class</span> is a reference type stored in Heap, supports inheritance, and can be null. <span class="key">Struct</span> is a value type stored in Stack, does not support inheritance, and cannot be null. Use struct for small data like Point, Color. Use class for complex objects like Employee, Order."</p><div class="tip">💡 <b>When to use Struct:</b> Small size (under 16 bytes), no need for inheritance, immutable data. Examples: DateTime, int, bool are all structs!</div>'},
{q:"What are Access Modifiers? Explain public, private, protected, internal.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>Access Modifiers control <b>who can see and use</b> your class members. Like a house — some rooms are open for guests (public), some only for family (protected), some only for you (private).</p><svg viewBox="0 0 440 220" style="max-width:440px"><rect x="10" y="10" width="420" height="40" rx="8" fill="#0ea5e9"/><text x="220" y="35" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">🔐 Access Modifiers - Who Can Access?</text><rect x="10" y="60" width="100" height="80" rx="8" fill="#10b981"/><text x="60" y="82" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">public</text><text x="60" y="100" text-anchor="middle" fill="#d1fae5" font-size="9">Everyone</text><text x="60" y="114" text-anchor="middle" fill="#d1fae5" font-size="9">can access</text><text x="60" y="132" text-anchor="middle" font-size="16">🌍</text><rect x="120" y="60" width="100" height="80" rx="8" fill="#ef4444"/><text x="170" y="82" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">private</text><text x="170" y="100" text-anchor="middle" fill="#fecaca" font-size="9">Only same</text><text x="170" y="114" text-anchor="middle" fill="#fecaca" font-size="9">class</text><text x="170" y="132" text-anchor="middle" font-size="16">🔒</text><rect x="230" y="60" width="100" height="80" rx="8" fill="#f59e0b"/><text x="280" y="82" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">protected</text><text x="280" y="100" text-anchor="middle" fill="#fef3c7" font-size="9">Same class +</text><text x="280" y="114" text-anchor="middle" fill="#fef3c7" font-size="9">child classes</text><text x="280" y="132" text-anchor="middle" font-size="16">👨‍👦</text><rect x="340" y="60" width="90" height="80" rx="8" fill="#8b5cf6"/><text x="385" y="82" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">internal</text><text x="385" y="100" text-anchor="middle" fill="#ede9fe" font-size="9">Same project</text><text x="385" y="114" text-anchor="middle" fill="#ede9fe" font-size="9">(assembly)</text><text x="385" y="132" text-anchor="middle" font-size="16">🏢</text><rect x="10" y="150" width="420" height="60" rx="8" fill="#f0f9ff" stroke="#bae6fd"/><text x="220" y="170" text-anchor="middle" fill="#0369a1" font-size="10" font-weight="600">Accessibility Order (Most → Least):</text><text x="220" y="190" text-anchor="middle" fill="#334155" font-size="11">public → internal → protected → private</text><text x="220" y="205" text-anchor="middle" fill="#64748b" font-size="9">Also: protected internal (both) | private protected (both but stricter)</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Employee {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name; <span class="cm">// Anyone can access</span><br>&nbsp;&nbsp;<span class="kw">private decimal</span> _salary; <span class="cm">// Only this class</span><br>&nbsp;&nbsp;<span class="kw">protected int</span> Age; <span class="cm">// This class + children</span><br>&nbsp;&nbsp;<span class="kw">internal string</span> Dept; <span class="cm">// Same project only</span><br>}<br><br><span class="kw">class</span> Manager : Employee {<br>&nbsp;&nbsp;<span class="kw">void</span> Test() {<br>&nbsp;&nbsp;&nbsp;&nbsp;Name = <span class="str">"OK"</span>; <span class="cm">// ✅ public</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Age = 30; <span class="cm">// ✅ protected (child class)</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// _salary = 100; // ❌ private - ERROR!</span><br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"Access modifiers control visibility. <span class="key">public</span> = accessible everywhere, <span class="key">private</span> = only within the same class, <span class="key">protected</span> = same class and derived classes, <span class="key">internal</span> = same assembly/project. Default for class members is private, default for classes is internal."</p><div class="tip">💡 <b>Interview Trick Question:</b> What is the default access modifier? Class members = private, Top-level class = internal</div>'},
{q:"What is the difference between private and protected?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>private</b> = Only YOU can use it (same class only).<br><b>protected</b> = You AND your children can use it (same class + child classes).</p><svg viewBox="0 0 440 200" style="max-width:440px"><rect x="10" y="10" width="200" height="180" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="110" y="35" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="14">🔒 private</text><rect x="40" y="50" width="140" height="50" rx="6" fill="#fca5a5"/><text x="110" y="70" text-anchor="middle" fill="#7f1d1d" font-weight="600" font-size="10">Parent Class</text><text x="110" y="88" text-anchor="middle" fill="#16a34a" font-size="10">✅ Can access</text><rect x="40" y="110" width="140" height="50" rx="6" fill="#fecaca"/><text x="110" y="130" text-anchor="middle" fill="#7f1d1d" font-weight="600" font-size="10">Child Class</text><text x="110" y="148" text-anchor="middle" fill="#dc2626" font-size="10">❌ CANNOT access</text><text x="110" y="185" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="600">Locked to same class only</text><rect x="230" y="10" width="200" height="180" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="330" y="35" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="14">👨‍👦 protected</text><rect x="260" y="50" width="140" height="50" rx="6" fill="#86efac"/><text x="330" y="70" text-anchor="middle" fill="#14532d" font-weight="600" font-size="10">Parent Class</text><text x="330" y="88" text-anchor="middle" fill="#16a34a" font-size="10">✅ Can access</text><rect x="260" y="110" width="140" height="50" rx="6" fill="#bbf7d0"/><text x="330" y="130" text-anchor="middle" fill="#14532d" font-weight="600" font-size="10">Child Class</text><text x="330" y="148" text-anchor="middle" fill="#16a34a" font-size="10">✅ Can access</text><text x="330" y="185" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Shared with children</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">private string</span> _secret = <span class="str">"hidden"</span>; <span class="cm">// Only Animal can see</span><br>&nbsp;&nbsp;<span class="kw">protected string</span> _name = <span class="str">"Buddy"</span>; <span class="cm">// Animal + children can see</span><br>}<br><br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">void</span> Test() {<br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(_name); <span class="cm">// ✅ protected - works!</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// Console.WriteLine(_secret); // ❌ private - ERROR!</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="kw">class</span> Program {<br>&nbsp;&nbsp;<span class="kw">void</span> Test() {<br>&nbsp;&nbsp;&nbsp;&nbsp;Dog d = <span class="kw">new</span> Dog();<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// d._name; // ❌ protected - not accessible outside</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// d._secret; // ❌ private - not accessible outside</span><br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">private</span> members are accessible only within the same class. <span class="key">protected</span> members are accessible within the same class AND in derived (child) classes. Both are NOT accessible from outside the class hierarchy."</p><div class="tip">💡 <b>Remember:</b> private = 🔒 My room, only I enter | protected = 🏠 Family room, my kids can also enter | Both are hidden from outsiders!</div>'},
{q:"What is a Constructor? What are the types of constructors?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A Constructor is a <b>special method that runs automatically when you create an object</b>. It has the <b>same name as the class</b> and <b>no return type</b>. Its job is to <b>initialize</b> the object with default or custom values.</p><svg viewBox="0 0 440 210" style="max-width:440px"><rect x="10" y="5" width="420" height="40" rx="8" fill="#0ea5e9"/><text x="220" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="14">🛠️ Types of Constructors in C#</text><rect x="10" y="55" width="130" height="70" rx="8" fill="#10b981"/><text x="75" y="75" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Default</text><text x="75" y="92" text-anchor="middle" fill="#d1fae5" font-size="8">No parameters</text><text x="75" y="105" text-anchor="middle" fill="#d1fae5" font-size="8">Car c = new Car();</text><rect x="150" y="55" width="130" height="70" rx="8" fill="#f59e0b"/><text x="215" y="75" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Parameterized</text><text x="215" y="92" text-anchor="middle" fill="#fef3c7" font-size="8">Takes parameters</text><text x="215" y="105" text-anchor="middle" fill="#fef3c7" font-size="8">Car c = new Car("Red");</text><rect x="290" y="55" width="140" height="70" rx="8" fill="#8b5cf6"/><text x="360" y="75" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Copy</text><text x="360" y="92" text-anchor="middle" fill="#ede9fe" font-size="8">Copies another object</text><text x="360" y="105" text-anchor="middle" fill="#ede9fe" font-size="8">Car c2 = new Car(c1);</text><rect x="10" y="135" width="130" height="70" rx="8" fill="#ef4444"/><text x="75" y="155" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Static</text><text x="75" y="172" text-anchor="middle" fill="#fecaca" font-size="8">Runs once for class</text><text x="75" y="185" text-anchor="middle" fill="#fecaca" font-size="8">No access modifier</text><rect x="150" y="135" width="130" height="70" rx="8" fill="#06b6d4"/><text x="215" y="155" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Private</text><text x="215" y="172" text-anchor="middle" fill="#cffafe" font-size="8">Cannot create object</text><text x="215" y="185" text-anchor="middle" fill="#cffafe" font-size="8">Used in Singleton</text></svg><h4>💻 Code Examples</h4><div class="code"><span class="cm">// 1. Default Constructor</span><br><span class="kw">class</span> Car {<br>&nbsp;&nbsp;<span class="kw">public</span> Car() { Console.WriteLine(<span class="str">"Car created!"</span>); }<br>}<br><br><span class="cm">// 2. Parameterized Constructor</span><br><span class="kw">class</span> Car {<br>&nbsp;&nbsp;<span class="kw">public string</span> Color;<br>&nbsp;&nbsp;<span class="kw">public</span> Car(<span class="kw">string</span> color) { Color = color; }<br>}<br>Car c = <span class="kw">new</span> Car(<span class="str">"Red"</span>);<br><br><span class="cm">// 3. Static Constructor - runs ONCE</span><br><span class="kw">class</span> Config {<br>&nbsp;&nbsp;<span class="kw">static</span> Config() { Console.WriteLine(<span class="str">"Loaded once"</span>); }<br>}<br><br><span class="cm">// 4. Private Constructor - Singleton</span><br><span class="kw">class</span> DB {<br>&nbsp;&nbsp;<span class="kw">private</span> DB() { }<br>&nbsp;&nbsp;<span class="kw">public static</span> DB Instance = <span class="kw">new</span> DB();<br>}</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Constructor</span> is a special method with the same name as the class, no return type, and it runs automatically when an object is created. Types: <span class="key">Default</span> (no params), <span class="key">Parameterized</span> (with params), <span class="key">Static</span> (runs once for the class, used for static initialization), <span class="key">Private</span> (prevents object creation, used in Singleton pattern), and <span class="key">Copy</span> (creates object from another object)."</p><div class="tip">💡 <b>Trick Question:</b> If you create a parameterized constructor, C# will NOT auto-generate a default constructor. You must write it yourself if needed!</div>'},
{q:"What is a Destructor/Finalizer in C#?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Destructor</b> (Finalizer) is a method that runs <b>automatically when an object is destroyed</b> by the Garbage Collector. It cleans up unmanaged resources like file handles, database connections. Uses <b>~ClassName()</b> syntax.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> FileHandler {<br>&nbsp;&nbsp;<span class="kw">private</span> StreamReader _reader;<br><br>&nbsp;&nbsp;<span class="kw">public</span> FileHandler(<span class="kw">string</span> path) {<br>&nbsp;&nbsp;&nbsp;&nbsp;_reader = <span class="kw">new</span> StreamReader(path);<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="cm">// Destructor / Finalizer</span><br>&nbsp;&nbsp;~FileHandler() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_reader?.Close(); <span class="cm">// cleanup</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(<span class="str">"Destroyed!"</span>);<br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Destructor</span> uses ~ClassName() syntax, has no parameters, no access modifier, no return type, and cannot be called manually. It is called by the <span class="key">Garbage Collector</span> when the object is no longer needed. In modern C#, prefer <span class="key">IDisposable</span> pattern with using statement instead of destructors."</p><div class="tip">💡 <b>Best Practice:</b> Use IDisposable + using statement instead of destructors. Destructors are unpredictable — you dont know WHEN GC will call them!</div>'},
{q:"What is the difference between this and base keyword?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>this</b> = refers to the <b>current class</b> instance. <b>base</b> = refers to the <b>parent class</b>. Like "myself" vs "my father".</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name;<br>&nbsp;&nbsp;<span class="kw">public</span> Animal(<span class="kw">string</span> name) { Name = name; }<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() =&gt; Console.WriteLine(<span class="str">"..."</span>);<br>}<br><br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public string</span> Breed;<br><br>&nbsp;&nbsp;<span class="cm">// base() calls parent constructor</span><br>&nbsp;&nbsp;<span class="kw">public</span> Dog(<span class="kw">string</span> name, <span class="kw">string</span> breed) : <span class="kw">base</span>(name) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">this</span>.Breed = breed; <span class="cm">// this = current Dog</span><br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">base</span>.Speak(); <span class="cm">// calls Animal.Speak()</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(<span class="str">"Woof!"</span>); <span class="cm">// then adds own</span><br>&nbsp;&nbsp;}<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">this</span> refers to the current class instance — used to access current class members and for constructor chaining with this(). <span class="key">base</span> refers to the parent class — used to call parent constructor with base() and access parent methods with base.Method()."</p>'},
{q:"What is a Static Class? When would you use it?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Static Class</b> is a class that <b>cannot be instantiated</b> (no new keyword). All members must be static. It is like a <b>utility toolbox</b> — you use the tools directly without creating the box.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">static class</span> MathHelper {<br>&nbsp;&nbsp;<span class="kw">public static double</span> PI = 3.14159;<br><br>&nbsp;&nbsp;<span class="kw">public static int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a + b;<br>&nbsp;&nbsp;<span class="kw">public static int</span> Max(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a &gt; b ? a : b;<br>}<br><br><span class="cm">// Use directly - no new keyword!</span><br><span class="kw">int</span> sum = MathHelper.Add(5, 3);<br>Console.WriteLine(MathHelper.PI);<br><br><span class="cm">// MathHelper obj = new MathHelper(); // ❌ ERROR!</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Static Class</span> cannot be instantiated or inherited. All members must be static. Used for <span class="key">utility/helper methods</span> like Math, Console, Convert. It is sealed implicitly. Use when you need stateless helper functions that dont need object state."</p>'},
{q:"What is the difference between a Static method and an Instance method?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Static method</b> = belongs to the <b>class itself</b>, called with ClassName.Method(). <b>Instance method</b> = belongs to an <b>object</b>, need to create object first with new.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Calculator {<br>&nbsp;&nbsp;<span class="kw">public int</span> Value; <span class="cm">// instance field</span><br><br>&nbsp;&nbsp;<span class="cm">// Instance method - needs object</span><br>&nbsp;&nbsp;<span class="kw">public void</span> AddToValue(<span class="kw">int</span> n) { Value += n; }<br><br>&nbsp;&nbsp;<span class="cm">// Static method - no object needed</span><br>&nbsp;&nbsp;<span class="kw">public static int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a + b;<br>}<br><br><span class="cm">// Static - call with class name</span><br><span class="kw">int</span> sum = Calculator.Add(5, 3); <span class="cm">// ✅ no object</span><br><br><span class="cm">// Instance - need object first</span><br>Calculator calc = <span class="kw">new</span> Calculator();<br>calc.AddToValue(10); <span class="cm">// ✅ needs object</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Static methods</span> belong to the class, called with ClassName.Method(), cannot access instance members, shared across all instances. <span class="key">Instance methods</span> belong to an object, need new keyword first, can access both static and instance members. Static for utility functions, instance for object-specific behavior."</p>'},
{q:"What is a Partial Class? When is it useful?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Partial Class</b> lets you <b>split one class into multiple files</b>. All parts combine into one class at compile time. Like writing a book in separate chapters — they become one book.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// File1: Employee.cs</span><br><span class="kw">partial class</span> Employee {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public void</span> Work() =&gt; Console.WriteLine(<span class="str">"Working"</span>);<br>}<br><br><span class="cm">// File2: Employee.Validation.cs</span><br><span class="kw">partial class</span> Employee {<br>&nbsp;&nbsp;<span class="kw">public bool</span> IsValid() =&gt; !<span class="kw">string</span>.IsNullOrEmpty(Name);<br>}<br><br><span class="cm">// At compile time = ONE class with all members!</span><br><span class="kw">var</span> emp = <span class="kw">new</span> Employee();<br>emp.Work(); <span class="cm">// from File1</span><br>emp.IsValid(); <span class="cm">// from File2</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Partial Class</span> splits a class definition across multiple files using the <b>partial</b> keyword. All parts merge at compile time. Used in: <span class="key">auto-generated code</span> (EF models, WinForms designer), large classes, and team collaboration where multiple developers work on the same class."</p>'},
// Intermediate
{q:"What is the difference between Method Overloading and Method Overriding?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Overloading</b> = same method name, <b>different parameters</b>, in the <b>SAME class</b>.<br><b>Overriding</b> = same method name, <b>same parameters</b>, in <b>PARENT-CHILD classes</b>.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// OVERLOADING - same class, different params</span><br><span class="kw">class</span> Calculator {<br>&nbsp;&nbsp;<span class="kw">public int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a + b;<br>&nbsp;&nbsp;<span class="kw">public int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b, <span class="kw">int</span> c) =&gt; a+b+c; <span class="cm">// different params</span><br>&nbsp;&nbsp;<span class="kw">public double</span> Add(<span class="kw">double</span> a, <span class="kw">double</span> b) =&gt; a+b; <span class="cm">// different type</span><br>}<br><br><span class="cm">// OVERRIDING - parent-child, same params</span><br><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() =&gt; Console.WriteLine(<span class="str">"..."</span>);<br>}<br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Woof!"</span>);<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Overloading</span> is compile-time polymorphism — same name, different parameters in the same class. <span class="key">Overriding</span> is runtime polymorphism — same name and parameters, child class redefines parent method using virtual/override keywords."</p>'},
{q:"What is Method Hiding using the new keyword? How is it different from Overriding?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Method Hiding</b> uses the <b>new</b> keyword to hide the parent method instead of overriding it. The difference: with <b>override</b>, the child version always runs. With <b>new</b>, it depends on the <b>reference type</b>.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Animal"</span>);<br>}<br><br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Dog"</span>);<br>}<br><span class="kw">class</span> Cat : Animal {<br>&nbsp;&nbsp;<span class="kw">public new void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Cat"</span>); <span class="cm">// hiding!</span><br>}<br><br>Animal d = <span class="kw">new</span> Dog();<br>d.Speak(); <span class="cm">// "Dog" ✅ override = child version</span><br><br>Animal c = <span class="kw">new</span> Cat();<br>c.Speak(); <span class="cm">// "Animal" 😱 new = parent version (reference is Animal)</span><br><br>Cat c2 = <span class="kw">new</span> Cat();<br>c2.Speak(); <span class="cm">// "Cat" ✅ (reference is Cat)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Override</span> replaces the parent method — child version always runs regardless of reference type. <span class="key">new (hiding)</span> creates a separate method — which version runs depends on the reference type, not the object type. Override is polymorphic, hiding is not."</p>'},
{q:"What is the difference between Abstract Class and Interface?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Abstract Class</b> = partial blueprint, can have <b>both implemented and abstract methods</b>.<br><b>Interface</b> = pure contract, only <b>method signatures</b> (what to do, not how).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Abstract Class - partial implementation</span><br><span class="kw">abstract class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name; <span class="cm">// ✅ can have fields</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Eat() { } <span class="cm">// ✅ implemented method</span><br>&nbsp;&nbsp;<span class="kw">public abstract void</span> Speak(); <span class="cm">// ✅ abstract method</span><br>}<br><br><span class="cm">// Interface - only contract</span><br><span class="kw">interface</span> IFlyable {<br>&nbsp;&nbsp;<span class="kw">void</span> Fly(); <span class="cm">// only signature</span><br>}<br><span class="kw">interface</span> ISwimmable {<br>&nbsp;&nbsp;<span class="kw">void</span> Swim();<br>}<br><br><span class="cm">// Class can inherit ONE abstract + MULTIPLE interfaces</span><br><span class="kw">class</span> Duck : Animal, IFlyable, ISwimmable {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Quack"</span>);<br>&nbsp;&nbsp;<span class="kw">public void</span> Fly() =&gt; Console.WriteLine(<span class="str">"Flying"</span>);<br>&nbsp;&nbsp;<span class="kw">public void</span> Swim() =&gt; Console.WriteLine(<span class="str">"Swimming"</span>);<br>}</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Abstract class</span> can have fields, constructors, implemented methods, and abstract methods. Only single inheritance. <span class="key">Interface</span> defines only method signatures (C# 8+ allows default implementations). Supports multiple inheritance. Use abstract class for IS-A with shared code, interface for CAN-DO capabilities."</p>'},
{q:"When would you use an Abstract Class vs an Interface?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>Use <b>Abstract Class</b> when classes share <b>common code</b> (IS-A relationship).<br>Use <b>Interface</b> when classes share <b>common behavior</b> but are unrelated (CAN-DO).</p><h4>💻 Real Example</h4><div class="code"><span class="cm">// Abstract Class: Dog IS-A Animal (shared code)</span><br><span class="kw">abstract class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public void</span> Breathe() { } <span class="cm">// shared code for ALL animals</span><br>&nbsp;&nbsp;<span class="kw">public abstract void</span> Speak(); <span class="cm">// each animal speaks differently</span><br>}<br><br><span class="cm">// Interface: Duck CAN fly, Fish CAN swim</span><br><span class="cm">// Flying and Swimming are capabilities, not identity</span><br><span class="kw">interface</span> IFlyable { <span class="kw">void</span> Fly(); }<br><span class="kw">interface</span> ISwimmable { <span class="kw">void</span> Swim(); }<br><br><span class="cm">// Duck IS-A Animal + CAN fly + CAN swim</span><br><span class="kw">class</span> Duck : Animal, IFlyable, ISwimmable { ... }<br><br><span class="cm">// Airplane is NOT an animal but CAN fly</span><br><span class="kw">class</span> Airplane : IFlyable { ... }</div><h4>🗣️ Interview Answer</h4><p>"Use <span class="key">Abstract Class</span> when you have shared implementation code and IS-A relationship (Dog is an Animal). Use <span class="key">Interface</span> when unrelated classes need same capability (Duck and Airplane both can fly). Also use interface when you need multiple inheritance."</p>'},
{q:"What is a Sealed Class? Why would you seal a class?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Sealed Class</b> is a class that <b>cannot be inherited</b>. No child class allowed. Like putting a lock on inheritance. The <b>string</b> class in C# is sealed!</p><h4>💻 Code Example</h4><div class="code"><span class="kw">sealed class</span> PaymentProcessor {<br>&nbsp;&nbsp;<span class="kw">public void</span> Process() { <span class="cm">// secure logic</span> }<br>}<br><br><span class="cm">// class HackedProcessor : PaymentProcessor { } // ❌ ERROR!</span><br><span class="cm">// Cannot inherit from sealed class</span><br><br><span class="cm">// Sealed method (seal specific method, not whole class)</span><br><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() { }<br>}<br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public sealed override void</span> Speak() { } <span class="cm">// no further override!</span><br>}</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Sealed Class</span> prevents inheritance using the sealed keyword. Reasons: <span class="key">Security</span> (prevent tampering), <span class="key">Performance</span> (JIT can optimize sealed classes), <span class="key">Design</span> (class not designed for extension). You can also seal individual methods to stop further overriding."</p>'},
{q:"What is the difference between Shallow Copy and Deep Copy?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Shallow Copy</b> = copies the object but <b>shares references</b> to nested objects. Change in one affects the other.<br><b>Deep Copy</b> = copies <b>everything including nested objects</b>. Completely independent.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Shallow Copy - nested objects are SHARED</span><br><span class="kw">var</span> original = <span class="kw">new</span> Person { Name=<span class="str">"Arjun"</span>, Address=<span class="kw">new</span> Address{City=<span class="str">"Delhi"</span>} };<br><span class="kw">var</span> shallow = (Person)original.MemberwiseClone();<br>shallow.Address.City = <span class="str">"Mumbai"</span>;<br>Console.WriteLine(original.Address.City); <span class="cm">// "Mumbai" 😱 changed!</span><br><br><span class="cm">// Deep Copy - everything is independent</span><br><span class="kw">var</span> deep = <span class="kw">new</span> Person {<br>&nbsp;&nbsp;Name = original.Name,<br>&nbsp;&nbsp;Address = <span class="kw">new</span> Address { City = original.Address.City }<br>};<br>deep.Address.City = <span class="str">"Chennai"</span>;<br>Console.WriteLine(original.Address.City); <span class="cm">// "Mumbai" ✅ safe!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Shallow Copy</span> copies value types but shares reference type members — changes to nested objects affect both. <span class="key">Deep Copy</span> creates completely independent copies of all nested objects. Use MemberwiseClone() for shallow, manual copy or serialization for deep."</p>'},
{q:"What is Constructor Chaining? How does it work with this() and base()?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Constructor Chaining</b> = one constructor calls another constructor. <b>this()</b> calls another constructor in the SAME class. <b>base()</b> calls the PARENT class constructor.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public</span> Animal(<span class="kw">string</span> name) { Console.WriteLine(<span class="str">"Animal: "</span> + name); }<br>}<br><br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="cm">// this() chains to another Dog constructor</span><br>&nbsp;&nbsp;<span class="kw">public</span> Dog() : <span class="kw">this</span>(<span class="str">"Unknown"</span>, <span class="str">"Mixed"</span>) { }<br><br>&nbsp;&nbsp;<span class="cm">// base() chains to Animal constructor</span><br>&nbsp;&nbsp;<span class="kw">public</span> Dog(<span class="kw">string</span> name, <span class="kw">string</span> breed) : <span class="kw">base</span>(name) {<br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(<span class="str">"Dog: "</span> + breed);<br>&nbsp;&nbsp;}<br>}<br><br><span class="kw">var</span> d = <span class="kw">new</span> Dog(); <span class="cm">// calls Dog() → Dog(name,breed) → Animal(name)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Constructor Chaining</span> is calling one constructor from another to avoid code duplication. <span class="key">this()</span> calls another constructor in the same class. <span class="key">base()</span> calls the parent class constructor. The chained constructor runs first, then the calling constructor body."</p>'},
{q:"What is the Diamond Problem? How does C# handle it?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>The <b>Diamond Problem</b> occurs when a class inherits from two classes that have the <b>same method</b> — which one to use? C# <b>avoids this by not allowing multiple class inheritance</b>. Use interfaces instead.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Diamond Problem (NOT possible in C#)</span><br><span class="cm">// class A { void Show() {} }</span><br><span class="cm">// class B : A { void Show() {} }</span><br><span class="cm">// class C : A { void Show() {} }</span><br><span class="cm">// class D : B, C { } // ❌ Which Show()? AMBIGUOUS!</span><br><br><span class="cm">// C# Solution: Use Interfaces</span><br><span class="kw">interface</span> IFlyable { <span class="kw">void</span> Move(); }<br><span class="kw">interface</span> ISwimmable { <span class="kw">void</span> Move(); }<br><br><span class="kw">class</span> Duck : IFlyable, ISwimmable {<br>&nbsp;&nbsp;<span class="cm">// Explicit implementation resolves ambiguity</span><br>&nbsp;&nbsp;<span class="kw">void</span> IFlyable.Move() =&gt; Console.WriteLine(<span class="str">"Flying"</span>);<br>&nbsp;&nbsp;<span class="kw">void</span> ISwimmable.Move() =&gt; Console.WriteLine(<span class="str">"Swimming"</span>);<br>}</div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">Diamond Problem</span> is ambiguity when a class inherits the same method from two parents. C# prevents this by allowing only <span class="key">single class inheritance</span>. Multiple inheritance is achieved through <span class="key">interfaces</span>, and ambiguity is resolved using <span class="key">explicit interface implementation</span>."</p>'},
{q:"What is Explicit Interface Implementation? When do you need it?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>When two interfaces have the <b>same method name</b>, you implement them <b>explicitly</b> with the interface name to avoid confusion. The method can only be called through the interface reference.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> IPrinter { <span class="kw">void</span> Print(); }<br><span class="kw">interface</span> ILogger { <span class="kw">void</span> Print(); }<br><br><span class="kw">class</span> Document : IPrinter, ILogger {<br>&nbsp;&nbsp;<span class="cm">// Explicit - specify which interface</span><br>&nbsp;&nbsp;<span class="kw">void</span> IPrinter.Print() =&gt; Console.WriteLine(<span class="str">"Printing doc"</span>);<br>&nbsp;&nbsp;<span class="kw">void</span> ILogger.Print() =&gt; Console.WriteLine(<span class="str">"Logging"</span>);<br>}<br><br>Document doc = <span class="kw">new</span> Document();<br><span class="cm">// doc.Print(); // ❌ cannot call directly!</span><br>((IPrinter)doc).Print(); <span class="cm">// "Printing doc" ✅</span><br>((ILogger)doc).Print(); <span class="cm">// "Logging" ✅</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Explicit Interface Implementation</span> uses InterfaceName.Method() syntax without access modifier. Needed when two interfaces have same method name, or when you want to hide interface methods from the class public API. Can only be called through the interface reference."</p>'},
{q:"What is the difference between Aggregation and Composition?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Aggregation</b> = "HAS-A" relationship where child <b>can exist independently</b>. Like a Teacher has Students — students exist without the teacher.<br><b>Composition</b> = "HAS-A" where child <b>cannot exist without parent</b>. Like a House has Rooms — rooms dont exist without the house.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Aggregation - Student exists without Department</span><br><span class="kw">class</span> Department {<br>&nbsp;&nbsp;<span class="kw">public</span> List&lt;Student&gt; Students; <span class="cm">// students exist independently</span><br>}<br><br><span class="cm">// Composition - Room dies with House</span><br><span class="kw">class</span> House {<br>&nbsp;&nbsp;<span class="kw">private</span> List&lt;Room&gt; _rooms;<br>&nbsp;&nbsp;<span class="kw">public</span> House() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_rooms = <span class="kw">new</span> List&lt;Room&gt; { <span class="kw">new</span> Room() }; <span class="cm">// created inside</span><br>&nbsp;&nbsp;}<br>} <span class="cm">// House destroyed = Rooms destroyed too!</span></div><h4>🗣️ Interview Answer</h4><p>"Both are HAS-A relationships. <span class="key">Aggregation</span> is weak — child can exist independently (Department-Student). <span class="key">Composition</span> is strong — child cannot exist without parent (House-Room). In composition, parent creates and owns the child object."</p>'},
{q:"What is the difference between Composition and Inheritance?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Inheritance</b> = IS-A (Dog IS-A Animal). <b>Composition</b> = HAS-A (Car HAS-A Engine). Modern best practice: <b>prefer composition over inheritance</b> for flexibility.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Inheritance: tightly coupled</span><br><span class="kw">class</span> Animal { <span class="kw">public void</span> Eat() { } }<br><span class="kw">class</span> Dog : Animal { } <span class="cm">// Dog IS-A Animal</span><br><br><span class="cm">// Composition: flexible, loosely coupled</span><br><span class="kw">class</span> Engine { <span class="kw">public void</span> Start() { } }<br><span class="kw">class</span> Car {<br>&nbsp;&nbsp;<span class="kw">private</span> Engine _engine = <span class="kw">new</span> Engine(); <span class="cm">// Car HAS-A Engine</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Start() =&gt; _engine.Start();<br>}<br><span class="cm">// Can easily swap Engine with ElectricEngine!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Inheritance</span> is IS-A, creates tight coupling, and C# allows only single inheritance. <span class="key">Composition</span> is HAS-A, creates loose coupling, and allows combining multiple behaviors. The principle <b>Favor Composition over Inheritance</b> promotes flexibility and follows SOLID principles."</p>'},
{q:"What is Operator Overloading? Give an example.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Operator Overloading</b> lets you define how operators (+, -, ==, etc.) work with your <b>custom classes</b>. Like teaching C# that adding two Money objects means adding their amounts.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Money {<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Amount;<br>&nbsp;&nbsp;<span class="kw">public</span> Money(<span class="kw">decimal</span> amt) { Amount = amt; }<br><br>&nbsp;&nbsp;<span class="cm">// Overload + operator</span><br>&nbsp;&nbsp;<span class="kw">public static</span> Money <span class="kw">operator</span> +(Money a, Money b)<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; <span class="kw">new</span> Money(a.Amount + b.Amount);<br><br>&nbsp;&nbsp;<span class="kw">public static bool operator</span> ==(Money a, Money b)<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; a.Amount == b.Amount;<br>&nbsp;&nbsp;<span class="kw">public static bool operator</span> !=(Money a, Money b)<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; a.Amount != b.Amount;<br>}<br><br>Money m1 = <span class="kw">new</span> Money(100);<br>Money m2 = <span class="kw">new</span> Money(200);<br>Money total = m1 + m2; <span class="cm">// 300 ✅ works!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Operator Overloading</span> defines custom behavior for operators on user-defined types using the <b>operator</b> keyword. Must be public static. Some operators must be overloaded in pairs (== and !=). Cannot overload &&, ||, =. Common use: mathematical types, money, vectors."</p>'},
{q:"What are Generics? Why are they important in OOP?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Generics</b> let you write <b>one class/method that works with ANY data type</b> using &lt;T&gt;. Instead of writing separate code for int, string, etc., write once and reuse. Like a universal container.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Without Generics - need separate classes!</span><br><span class="kw">class</span> IntList { <span class="kw">public void</span> Add(<span class="kw">int</span> item) { } }<br><span class="kw">class</span> StringList { <span class="kw">public void</span> Add(<span class="kw">string</span> item) { } }<br><br><span class="cm">// With Generics - ONE class for ALL types!</span><br><span class="kw">class</span> MyList&lt;T&gt; {<br>&nbsp;&nbsp;<span class="kw">private</span> T[] _items = <span class="kw">new</span> T[10];<br>&nbsp;&nbsp;<span class="kw">public void</span> Add(T item) { }<br>&nbsp;&nbsp;<span class="kw">public</span> T Get(<span class="kw">int</span> index) =&gt; _items[index];<br>}<br><br>MyList&lt;<span class="kw">int</span>&gt; nums = <span class="kw">new</span> MyList&lt;<span class="kw">int</span>&gt;();<br>MyList&lt;<span class="kw">string</span>&gt; names = <span class="kw">new</span> MyList&lt;<span class="kw">string</span>&gt;();</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Generics</span> provide type-safe, reusable code using type parameters &lt;T&gt;. Benefits: <span class="key">type safety</span> (compile-time checking), <span class="key">no boxing/unboxing</span> (performance), <span class="key">code reuse</span> (one class for all types). Examples: List&lt;T&gt;, Dictionary&lt;K,V&gt;, IEnumerable&lt;T&gt;."</p>'},
{q:"What are Generic Constraints? Explain where T : class, new(), etc.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Generic Constraints</b> restrict what types can be used with &lt;T&gt;. Like saying "this container only accepts fruits" instead of anything.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// where T : class - only reference types</span><br><span class="kw">class</span> Repo&lt;T&gt; <span class="kw">where</span> T : <span class="kw">class</span> { }<br><br><span class="cm">// where T : struct - only value types</span><br><span class="kw">class</span> Box&lt;T&gt; <span class="kw">where</span> T : <span class="kw">struct</span> { }<br><br><span class="cm">// where T : new() - must have parameterless constructor</span><br><span class="kw">class</span> Factory&lt;T&gt; <span class="kw">where</span> T : <span class="kw">new</span>() { T obj = <span class="kw">new</span> T(); }<br><br><span class="cm">// where T : BaseClass - must inherit from BaseClass</span><br><span class="kw">class</span> AnimalShelter&lt;T&gt; <span class="kw">where</span> T : Animal { }<br><br><span class="cm">// where T : IInterface - must implement interface</span><br><span class="kw">class</span> Sorter&lt;T&gt; <span class="kw">where</span> T : IComparable&lt;T&gt; { }<br><br><span class="cm">// Multiple constraints</span><br><span class="kw">class</span> Service&lt;T&gt; <span class="kw">where</span> T : <span class="kw">class</span>, IEntity, <span class="kw">new</span>() { }</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Generic Constraints</span> limit the types that can be used as type arguments. <span class="key">where T : class</span> (reference types), <span class="key">struct</span> (value types), <span class="key">new()</span> (must have parameterless constructor), <span class="key">BaseClass</span> (must inherit), <span class="key">IInterface</span> (must implement). Multiple constraints can be combined."</p>'},
{q:"What is Covariance and Contravariance?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Covariance</b> (out) = you can use a <b>more derived type</b> than specified. Like returning a Dog where Animal is expected.<br><b>Contravariance</b> (in) = you can use a <b>less derived type</b>. Like accepting Animal where Dog is expected.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Covariance (out) - return more specific type</span><br>IEnumerable&lt;Animal&gt; animals = <span class="kw">new</span> List&lt;Dog&gt;(); <span class="cm">// ✅ Dog is Animal</span><br><br><span class="cm">// Contravariance (in) - accept less specific type</span><br>Action&lt;Dog&gt; dogAction = (Animal a) =&gt; { }; <span class="cm">// ✅ Animal handler works for Dog</span><br><br><span class="cm">// Custom interface</span><br><span class="kw">interface</span> IProducer&lt;<span class="kw">out</span> T&gt; { T Create(); } <span class="cm">// covariant</span><br><span class="kw">interface</span> IConsumer&lt;<span class="kw">in</span> T&gt; { <span class="kw">void</span> Process(T item); } <span class="cm">// contravariant</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Covariance</span> (out keyword) allows using a more derived type as output — IEnumerable&lt;Dog&gt; can be assigned to IEnumerable&lt;Animal&gt;. <span class="key">Contravariance</span> (in keyword) allows using a less derived type as input. Covariance for return types, contravariance for parameter types."</p>'},
{q:"What is the difference between IEnumerable, ICollection, and IList?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>IEnumerable</b> = read-only, forward-only iteration (least features).<br><b>ICollection</b> = adds Count, Add, Remove.<br><b>IList</b> = adds index access [i] (most features).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// IEnumerable - just iterate (read-only)</span><br>IEnumerable&lt;<span class="kw">int</span>&gt; nums = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;{1,2,3};<br><span class="kw">foreach</span>(<span class="kw">var</span> n <span class="kw">in</span> nums) { } <span class="cm">// ✅ can iterate</span><br><span class="cm">// nums.Add(4); // ❌ no Add method</span><br><br><span class="cm">// ICollection - iterate + add/remove + count</span><br>ICollection&lt;<span class="kw">int</span>&gt; col = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;{1,2,3};<br>col.Add(4); <span class="cm">// ✅</span><br>col.Count; <span class="cm">// ✅</span><br><br><span class="cm">// IList - everything + index access</span><br>IList&lt;<span class="kw">int</span>&gt; list = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;{1,2,3};<br>list[0] = 10; <span class="cm">// ✅ index access</span><br>list.Insert(1, 99); <span class="cm">// ✅ insert at position</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">IEnumerable</span> supports only forward iteration (foreach). <span class="key">ICollection</span> adds Count, Add, Remove, Contains. <span class="key">IList</span> adds index-based access and Insert. Use the most restrictive interface needed — IEnumerable for read-only, IList when you need full access."</p>'},
{q:"What are Extension Methods? How do they follow Open/Closed Principle?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Extension Methods</b> let you <b>add new methods to existing classes WITHOUT modifying them</b>. Like adding a new app to your phone without changing the phone hardware.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// Extension method for string class</span><br><span class="kw">public static class</span> StringExtensions {<br>&nbsp;&nbsp;<span class="kw">public static bool</span> IsEmail(<span class="kw">this string</span> str) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> str.Contains(<span class="str">"@"</span>) &amp;&amp; str.Contains(<span class="str">"."</span>);<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">public static string</span> ToTitleCase(<span class="kw">this string</span> str) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> CultureInfo.CurrentCulture.TextInfo.ToTitleCase(str);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Use like a normal method!</span><br><span class="str">"arjun@email.com"</span>.IsEmail(); <span class="cm">// true ✅</span><br><span class="str">"hello world"</span>.ToTitleCase(); <span class="cm">// "Hello World" ✅</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Extension Methods</span> add methods to existing types without modifying source code. Defined in a static class with <b>this</b> keyword on the first parameter. They follow <span class="key">Open/Closed Principle</span> — classes are open for extension but closed for modification. LINQ is built entirely on extension methods!"</p>'},
{q:"What is the difference between Coupling and Cohesion?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Coupling</b> = how much classes <b>depend on each other</b>. LOW is good.<br><b>Cohesion</b> = how well a class <b>focuses on one job</b>. HIGH is good.<br>Goal: <b>Low Coupling + High Cohesion</b>.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// HIGH Coupling (bad) - directly depends on SqlConnection</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private</span> SqlConnection _db = <span class="kw">new</span> SqlConnection(); <span class="cm">// ❌ tight</span><br>}<br><br><span class="cm">// LOW Coupling (good) - depends on interface</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private</span> IDatabase _db; <span class="cm">// ✅ loose, can swap</span><br>&nbsp;&nbsp;<span class="kw">public</span> OrderService(IDatabase db) { _db = db; }<br>}<br><br><span class="cm">// HIGH Cohesion (good) - one responsibility</span><br><span class="kw">class</span> EmailService { <span class="cm">// only email stuff</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Send() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> Validate() { }<br>}<br><br><span class="cm">// LOW Cohesion (bad) - does everything</span><br><span class="kw">class</span> GodClass { <span class="cm">// email + payment + logging ❌</span> }</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Coupling</span> is the degree of dependency between classes — aim for LOW coupling using interfaces and DI. <span class="key">Cohesion</span> is how focused a class is on a single responsibility — aim for HIGH cohesion. Low coupling + high cohesion = maintainable, testable code."</p>'},
// Advanced / Design
{q:"What are the SOLID Principles? Explain each with example.",l:"e",a:'<h4>🎯 Simple Answer</h4><p>SOLID = 5 design principles for writing <b>clean, maintainable, scalable</b> code. Every senior developer must know these!</p><h4>💻 Quick Summary</h4><div class="code"><span class="kw">S</span> - Single Responsibility: One class = one job<br><span class="kw">O</span> - Open/Closed: Open for extension, closed for modification<br><span class="kw">L</span> - Liskov Substitution: Child can replace parent without breaking<br><span class="kw">I</span> - Interface Segregation: Many small interfaces &gt; one fat interface<br><span class="kw">D</span> - Dependency Inversion: Depend on abstractions, not concrete classes</div><h4>🗣️ Interview Answer</h4><p>"SOLID principles are: <span class="key">SRP</span> — one class, one reason to change. <span class="key">OCP</span> — extend behavior without modifying existing code. <span class="key">LSP</span> — subtypes must be substitutable for base types. <span class="key">ISP</span> — clients shouldnt depend on methods they dont use. <span class="key">DIP</span> — high-level modules depend on abstractions, not details."</p>'},
{q:"What is Single Responsibility Principle (SRP)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>A class should have <b>only ONE reason to change</b>. One class = one job. Dont make a God class that does everything.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - one class does everything</span><br><span class="kw">class</span> Employee {<br>&nbsp;&nbsp;<span class="kw">public void</span> CalculateSalary() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> SaveToDatabase() { } <span class="cm">// ❌ DB logic here?</span><br>&nbsp;&nbsp;<span class="kw">public void</span> SendEmail() { } <span class="cm">// ❌ Email logic here?</span><br>}<br><br><span class="cm">// ✅ GOOD - each class has one job</span><br><span class="kw">class</span> Employee { <span class="kw">public decimal</span> CalculateSalary() { } }<br><span class="kw">class</span> EmployeeRepository { <span class="kw">public void</span> Save(Employee e) { } }<br><span class="kw">class</span> EmailService { <span class="kw">public void</span> Send(<span class="kw">string</span> to) { } }</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">SRP</span> states a class should have only one reason to change. Separate concerns into different classes — business logic, data access, and notifications should be in separate classes. This makes code easier to test, maintain, and modify."</p>'},
{q:"What is Open/Closed Principle (OCP)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>Classes should be <b>open for extension</b> (add new features) but <b>closed for modification</b> (dont change existing code). Add new behavior by creating new classes, not editing old ones.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - modify existing code for each new shape</span><br><span class="kw">class</span> AreaCalculator {<br>&nbsp;&nbsp;<span class="kw">public double</span> Calculate(<span class="kw">object</span> shape) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(shape <span class="kw">is</span> Circle c) <span class="kw">return</span> 3.14 * c.R * c.R;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(shape <span class="kw">is</span> Rectangle r) <span class="kw">return</span> r.W * r.H;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// add Triangle? modify this class again! ❌</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// ✅ GOOD - extend without modifying</span><br><span class="kw">abstract class</span> Shape { <span class="kw">public abstract double</span> Area(); }<br><span class="kw">class</span> Circle : Shape { <span class="kw">public override double</span> Area() =&gt; 3.14*R*R; }<br><span class="kw">class</span> Rectangle : Shape { <span class="kw">public override double</span> Area() =&gt; W*H; }<br><span class="cm">// Add Triangle? Just create new class! No modification! ✅</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">OCP</span> means extend behavior by adding new classes/methods, not by modifying existing code. Achieved through <span class="key">abstraction</span>, <span class="key">inheritance</span>, and <span class="key">interfaces</span>. This prevents introducing bugs in existing working code."</p>'},
{q:"What is Liskov Substitution Principle (LSP)?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>A <b>child class should be able to replace its parent</b> without breaking anything. If Dog extends Animal, anywhere you use Animal, Dog should work perfectly.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - Penguin breaks LSP</span><br><span class="kw">class</span> Bird { <span class="kw">public virtual void</span> Fly() { } }<br><span class="kw">class</span> Penguin : Bird {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Fly() { <span class="kw">throw new</span> Exception(<span class="str">"Cant fly!"</span>); } <span class="cm">// ❌ breaks!</span><br>}<br><br><span class="cm">// ✅ GOOD - separate flying and non-flying</span><br><span class="kw">class</span> Bird { <span class="kw">public void</span> Eat() { } }<br><span class="kw">interface</span> IFlyable { <span class="kw">void</span> Fly(); }<br><span class="kw">class</span> Sparrow : Bird, IFlyable { <span class="kw">public void</span> Fly() { } }<br><span class="kw">class</span> Penguin : Bird { } <span class="cm">// no Fly() ✅</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">LSP</span> states that objects of a child class should be replaceable for objects of the parent class without breaking the application. If a subclass throws exceptions or changes expected behavior, it violates LSP. Fix by redesigning the hierarchy."</p>'},
