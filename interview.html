{q:"How do you optimize EF Core queries for performance?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>EF Core can be slow if used wrong. Key optimizations: <b>AsNoTracking</b> for reads, <b>Select only needed columns</b>, avoid N+1 with <b>Include</b>, use <b>pagination</b>.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - loads ALL columns, tracks changes</span><br><span class="kw">var</span> products = _db.Products.ToList();<br><br><span class="cm">// ✅ GOOD - no tracking (read-only), select only needed</span><br><span class="kw">var</span> products = _db.Products<br>&nbsp;&nbsp;.AsNoTracking() <span class="cm">// ✅ faster for reads</span><br>&nbsp;&nbsp;.Where(p =&gt; p.IsActive)<br>&nbsp;&nbsp;.Select(p =&gt; <span class="kw">new</span> { p.Name, p.Price }) <span class="cm">// ✅ only needed cols</span><br>&nbsp;&nbsp;.Take(20) <span class="cm">// ✅ pagination</span><br>&nbsp;&nbsp;.ToListAsync();<br><br><span class="cm">// ❌ N+1 Problem</span><br><span class="kw">var</span> orders = _db.Orders.ToList(); <span class="cm">// 1 query</span><br><span class="kw">foreach</span>(<span class="kw">var</span> o <span class="kw">in</span> orders)<br>&nbsp;&nbsp;Console.WriteLine(o.Customer.Name); <span class="cm">// N queries! 💥</span><br><br><span class="cm">// ✅ Fix with Include (eager loading)</span><br><span class="kw">var</span> orders = _db.Orders.Include(o =&gt; o.Customer).ToList(); <span class="cm">// 1 query!</span></div><h4>🗣️ Interview Answer</h4><p>"Key optimizations: <span class="key">AsNoTracking()</span> for read-only queries, <span class="key">Select()</span> to project only needed columns, <span class="key">Include()</span> to avoid N+1 problem, <span class="key">pagination</span> with Skip/Take, <span class="key">compiled queries</span> for hot paths, <span class="key">raw SQL</span> for complex queries. Always check generated SQL with ToQueryString()."</p>'},
{q:"What is Docker containerization for .NET?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Docker</b> packages your .NET app + all dependencies into a <b>container</b> that runs the same everywhere. "Works on my machine" problem solved! Like a shipping container — same box works on any truck.</p><h4>💻 Code Example</h4><div class="code"><span class="cm"># Dockerfile for .NET app</span><br>FROM mcr.microsoft.com/dotnet/sdk:8.0 AS build<br>WORKDIR /app<br>COPY *.csproj .<br>RUN dotnet restore<br>COPY . .<br>RUN dotnet publish -c Release -o /out<br><br>FROM mcr.microsoft.com/dotnet/aspnet:8.0<br>WORKDIR /app<br>COPY --from=build /out .<br>ENTRYPOINT [<span class="str">"dotnet"</span>, <span class="str">"MyApp.dll"</span>]<br><br><span class="cm"># Build and run</span><br><span class="cm"># docker build -t myapp .</span><br><span class="cm"># docker run -p 8080:80 myapp</span><br><br><span class="cm"># docker-compose.yml (multi-container)</span><br><span class="cm"># services:</span><br><span class="cm">#   api: build: . ports: ["8080:80"]</span><br><span class="cm">#   db: image: mcr.microsoft.com/mssql/server</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Docker</span> containerizes .NET apps using a Dockerfile with multi-stage build (SDK for build, runtime for run). Benefits: consistent environments, easy deployment, scalable. Use <span class="key">docker-compose</span> for multi-container (app + DB + Redis). Deploy to <span class="key">Azure Container Apps</span>, <span class="key">AKS</span>, or any cloud."</p>'},
{q:"How do you implement CI/CD for .NET Core?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>CI</b> (Continuous Integration) = auto build + test on every commit. <b>CD</b> (Continuous Deployment) = auto deploy to server after CI passes. Like an assembly line — code goes in, tested app comes out.</p><h4>💻 Code Example</h4><div class="code"><span class="cm"># Azure DevOps Pipeline (azure-pipelines.yml)</span><br>trigger:<br>&nbsp;&nbsp;branches: [main]<br><br>stages:<br>- stage: Build<br>&nbsp;&nbsp;jobs:<br>&nbsp;&nbsp;- job: BuildAndTest<br>&nbsp;&nbsp;&nbsp;&nbsp;steps:<br>&nbsp;&nbsp;&nbsp;&nbsp;- task: UseDotNet@2<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;inputs: { version: 8.x }<br>&nbsp;&nbsp;&nbsp;&nbsp;- script: dotnet restore<br>&nbsp;&nbsp;&nbsp;&nbsp;- script: dotnet build --no-restore<br>&nbsp;&nbsp;&nbsp;&nbsp;- script: dotnet test --no-build<br>&nbsp;&nbsp;&nbsp;&nbsp;- script: dotnet publish -c Release -o $(Build.ArtifactStagingDirectory)<br>&nbsp;&nbsp;&nbsp;&nbsp;- task: PublishBuildArtifacts@1<br><br>- stage: Deploy<br>&nbsp;&nbsp;jobs:<br>&nbsp;&nbsp;- deployment: DeployToAzure<br>&nbsp;&nbsp;&nbsp;&nbsp;environment: Production<br>&nbsp;&nbsp;&nbsp;&nbsp;strategy:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;runOnce:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;deploy: <span class="cm"># deploy to App Service</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">CI</span>: on every push — restore, build, test, publish artifacts. <span class="key">CD</span>: auto-deploy to staging/production. Tools: <span class="key">Azure DevOps Pipelines</span> (YAML), <span class="key">GitHub Actions</span>. Steps: restore → build → test → publish → deploy. Use environments for approval gates. Include SonarQube for code quality."</p>'},
{q:"What is the Saga Pattern for distributed transactions?",l:"e",a:'<h4>🎯 Simple Answer</h4><p>The <b>Saga Pattern</b> manages <b>distributed transactions across microservices</b>. Instead of one big transaction, it breaks into steps. If one step fails, it runs <b>compensating actions</b> to undo previous steps.</p><svg viewBox="0 0 440 110" style="max-width:440px"><rect x="10" y="10" width="90" height="40" rx="6" fill="#10b981"/><text x="55" y="28" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">1. Create Order</text><text x="55" y="42" text-anchor="middle" fill="#d1fae5" font-size="6">✅ Success</text><text x="115" y="33" text-anchor="middle" fill="#64748b" font-size="10">→</text><rect x="125" y="10" width="90" height="40" rx="6" fill="#10b981"/><text x="170" y="28" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">2. Reserve Stock</text><text x="170" y="42" text-anchor="middle" fill="#d1fae5" font-size="6">✅ Success</text><text x="230" y="33" text-anchor="middle" fill="#64748b" font-size="10">→</text><rect x="240" y="10" width="90" height="40" rx="6" fill="#ef4444"/><text x="285" y="28" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">3. Payment</text><text x="285" y="42" text-anchor="middle" fill="#fecaca" font-size="6">❌ FAILED!</text><text x="345" y="33" text-anchor="middle" fill="#ef4444" font-size="10">→</text><rect x="355" y="10" width="75" height="40" rx="6" fill="#f59e0b"/><text x="392" y="28" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">Compensate!</text><text x="392" y="42" text-anchor="middle" fill="#fef3c7" font-size="6">Undo 1 &amp; 2</text><rect x="10" y="65" width="420" height="35" rx="6" fill="#f0f9ff" stroke="#bae6fd"/><text x="220" y="80" text-anchor="middle" fill="#0369a1" font-size="8" font-weight="600">Orchestration: Central coordinator tells each step what to do</text><text x="220" y="93" text-anchor="middle" fill="#0369a1" font-size="8">Choreography: Each service listens to events and reacts</text></svg><h4>🗣️ Interview Answer</h4><p>"The <span class="key">Saga Pattern</span> handles distributed transactions by breaking them into local transactions with compensating actions for rollback. Two types: <span class="key">Orchestration</span> (central coordinator manages steps) and <span class="key">Choreography</span> (services react to events). If step 3 fails, compensating actions undo steps 1 and 2. Ensures eventual consistency across microservices."</p>'},

{q:"What is SQL Server? Difference between SQL Server and MySQL?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>SQL Server</b> is a <b>Relational Database Management System (RDBMS)</b> by Microsoft. It stores data in tables with rows and columns. <b>MySQL</b> is also an RDBMS but by Oracle (open-source).</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="5" width="200" height="155" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12">🟦 SQL Server (Microsoft)</text><text x="110" y="50" text-anchor="middle" fill="#334155" font-size="9">✅ Best with .NET / C#</text><text x="110" y="67" text-anchor="middle" fill="#334155" font-size="9">✅ T-SQL language</text><text x="110" y="84" text-anchor="middle" fill="#334155" font-size="9">✅ SSMS tool</text><text x="110" y="101" text-anchor="middle" fill="#334155" font-size="9">✅ Enterprise features</text><text x="110" y="118" text-anchor="middle" fill="#334155" font-size="9">✅ Azure SQL integration</text><text x="110" y="148" text-anchor="middle" fill="#1e40af" font-size="8" font-weight="600">Paid (Free Express edition)</text><rect x="230" y="5" width="200" height="155" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">🟡 MySQL (Oracle)</text><text x="330" y="50" text-anchor="middle" fill="#334155" font-size="9">✅ Best with PHP / Java</text><text x="330" y="67" text-anchor="middle" fill="#334155" font-size="9">✅ Standard SQL</text><text x="330" y="84" text-anchor="middle" fill="#334155" font-size="9">✅ MySQL Workbench</text><text x="330" y="101" text-anchor="middle" fill="#334155" font-size="9">✅ Open source</text><text x="330" y="118" text-anchor="middle" fill="#334155" font-size="9">✅ Cross-platform</text><text x="330" y="148" text-anchor="middle" fill="#92400e" font-size="8" font-weight="600">Free (Community edition)</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">SQL Server</span> is Microsofts RDBMS that uses T-SQL. It integrates best with .NET ecosystem and Azure. <span class="key">MySQL</span> is open-source by Oracle, popular with PHP/Java. Key differences: SQL Server uses T-SQL, MySQL uses standard SQL. SQL Server has SSMS, MySQL has Workbench. SQL Server is preferred in .NET projects."</p><div class="tip">💡 <b>For .NET interviews:</b> Always say SQL Server is your primary database. Mention Azure SQL for cloud projects!</div>'},
{q:"What are DDL, DML, DCL, TCL commands? Give examples.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>SQL commands are grouped into 4 categories based on what they do — like 4 departments in a company.</p><svg viewBox="0 0 440 200" style="max-width:440px"><rect x="10" y="5" width="210" height="90" rx="8" fill="#3b82f6"/><text x="115" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">🏗️ DDL (Data Definition)</text><text x="115" y="42" text-anchor="middle" fill="#bae6fd" font-size="9">Defines structure (tables)</text><text x="115" y="60" text-anchor="middle" fill="#fff" font-size="9">CREATE | ALTER | DROP</text><text x="115" y="75" text-anchor="middle" fill="#fff" font-size="9">TRUNCATE | RENAME</text><text x="115" y="90" text-anchor="middle" fill="#bae6fd" font-size="7">Auto-committed</text><rect x="230" y="5" width="200" height="90" rx="8" fill="#10b981"/><text x="330" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">📝 DML (Data Manipulation)</text><text x="330" y="42" text-anchor="middle" fill="#d1fae5" font-size="9">Works with data (rows)</text><text x="330" y="60" text-anchor="middle" fill="#fff" font-size="9">SELECT | INSERT | UPDATE</text><text x="330" y="75" text-anchor="middle" fill="#fff" font-size="9">DELETE | MERGE</text><text x="330" y="90" text-anchor="middle" fill="#d1fae5" font-size="7">Can be rolled back</text><rect x="10" y="105" width="210" height="90" rx="8" fill="#f59e0b"/><text x="115" y="125" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">🔐 DCL (Data Control)</text><text x="115" y="142" text-anchor="middle" fill="#fef3c7" font-size="9">Controls permissions</text><text x="115" y="160" text-anchor="middle" fill="#fff" font-size="9">GRANT | REVOKE</text><text x="115" y="185" text-anchor="middle" fill="#fef3c7" font-size="7">Who can access what?</text><rect x="230" y="105" width="200" height="90" rx="8" fill="#8b5cf6"/><text x="330" y="125" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">🔄 TCL (Transaction Control)</text><text x="330" y="142" text-anchor="middle" fill="#ede9fe" font-size="9">Controls transactions</text><text x="330" y="160" text-anchor="middle" fill="#fff" font-size="9">COMMIT | ROLLBACK</text><text x="330" y="175" text-anchor="middle" fill="#fff" font-size="9">SAVEPOINT</text><text x="330" y="190" text-anchor="middle" fill="#ede9fe" font-size="7">Save or undo changes</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">DDL</span> defines database structure (CREATE, ALTER, DROP). <span class="key">DML</span> manipulates data (SELECT, INSERT, UPDATE, DELETE). <span class="key">DCL</span> controls access permissions (GRANT, REVOKE). <span class="key">TCL</span> manages transactions (COMMIT, ROLLBACK, SAVEPOINT). DDL is auto-committed, DML can be rolled back."</p>'},
{q:"What is a Primary Key vs Unique Key?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Primary Key</b> = your <b>Aadhaar number</b> — unique, cannot be null, only ONE per table.<br><b>Unique Key</b> = your <b>email address</b> — unique, CAN be null (once), multiple allowed per table.</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="5" width="200" height="155" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="28" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="12">🔑 Primary Key</text><text x="110" y="50" text-anchor="middle" fill="#334155" font-size="9">✅ Uniquely identifies row</text><text x="110" y="67" text-anchor="middle" fill="#334155" font-size="9">❌ Cannot be NULL</text><text x="110" y="84" text-anchor="middle" fill="#334155" font-size="9">❌ Only ONE per table</text><text x="110" y="101" text-anchor="middle" fill="#334155" font-size="9">✅ Creates Clustered Index</text><text x="110" y="118" text-anchor="middle" fill="#334155" font-size="9">✅ Can be Foreign Key ref</text><text x="110" y="148" text-anchor="middle" fill="#1e40af" font-size="8" font-weight="600">Id, EmployeeId, OrderId</text><rect x="230" y="5" width="200" height="155" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="330" y="28" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">🔐 Unique Key</text><text x="330" y="50" text-anchor="middle" fill="#334155" font-size="9">✅ Ensures uniqueness</text><text x="330" y="67" text-anchor="middle" fill="#334155" font-size="9">✅ CAN be NULL (once)</text><text x="330" y="84" text-anchor="middle" fill="#334155" font-size="9">✅ Multiple per table</text><text x="330" y="101" text-anchor="middle" fill="#334155" font-size="9">✅ Creates Non-Clustered Index</text><text x="330" y="118" text-anchor="middle" fill="#334155" font-size="9">✅ Can also be FK ref</text><text x="330" y="148" text-anchor="middle" fill="#92400e" font-size="8" font-weight="600">Email, Phone, PAN</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE TABLE</span> Employee (<br>&nbsp;&nbsp;Id <span class="kw">INT PRIMARY KEY IDENTITY</span>(1,1), <span class="cm">-- PK: one, not null</span><br>&nbsp;&nbsp;Email <span class="kw">VARCHAR</span>(100) <span class="kw">UNIQUE</span>, <span class="cm">-- UK: unique, can be null</span><br>&nbsp;&nbsp;Phone <span class="kw">VARCHAR</span>(15) <span class="kw">UNIQUE</span>, <span class="cm">-- Another UK: allowed!</span><br>&nbsp;&nbsp;Name <span class="kw">VARCHAR</span>(50) <span class="kw">NOT NULL</span><br>);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Primary Key</span> uniquely identifies each row, cannot be NULL, only one per table, and creates a clustered index. <span class="key">Unique Key</span> also ensures uniqueness but allows one NULL, multiple per table, and creates a non-clustered index."</p>'},
{q:"What is a Foreign Key? Explain cascading actions.",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Foreign Key</b> is a column that <b>links two tables</b> together. It references the Primary Key of another table. Like a student ID card that links to the college database.</p><svg viewBox="0 0 440 150" style="max-width:440px"><rect x="10" y="10" width="170" height="120" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="95" y="30" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">Department (Parent)</text><text x="95" y="52" text-anchor="middle" fill="#334155" font-size="9">🔑 DeptId | Name</text><rect x="25" y="62" width="140" height="18" rx="3" fill="#93c5fd"/><text x="95" y="75" text-anchor="middle" fill="#1e3a8a" font-size="8">1 | IT</text><rect x="25" y="84" width="140" height="18" rx="3" fill="#93c5fd"/><text x="95" y="97" text-anchor="middle" fill="#1e3a8a" font-size="8">2 | HR</text><rect x="25" y="106" width="140" height="18" rx="3" fill="#93c5fd"/><text x="95" y="119" text-anchor="middle" fill="#1e3a8a" font-size="8">3 | Sales</text><line x1="180" y1="75" x2="260" y2="75" stroke="#ef4444" stroke-width="2" marker-end="url(#ar)"/><text x="220" y="68" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="700">FK Link</text><rect x="260" y="10" width="170" height="120" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="345" y="30" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="11">Employee (Child)</text><text x="345" y="52" text-anchor="middle" fill="#334155" font-size="9">EmpId | Name | 🔗DeptId</text><rect x="275" y="62" width="140" height="18" rx="3" fill="#86efac"/><text x="345" y="75" text-anchor="middle" fill="#14532d" font-size="8">1 | Arjun | 1</text><rect x="275" y="84" width="140" height="18" rx="3" fill="#86efac"/><text x="345" y="97" text-anchor="middle" fill="#14532d" font-size="8">2 | Ravi | 1</text><rect x="275" y="106" width="140" height="18" rx="3" fill="#86efac"/><text x="345" y="119" text-anchor="middle" fill="#14532d" font-size="8">3 | Priya | 2</text></svg><h4>💻 Cascading Actions</h4><div class="code"><span class="kw">CREATE TABLE</span> Employee (<br>&nbsp;&nbsp;EmpId <span class="kw">INT PRIMARY KEY</span>,<br>&nbsp;&nbsp;Name <span class="kw">VARCHAR</span>(50),<br>&nbsp;&nbsp;DeptId <span class="kw">INT</span>,<br>&nbsp;&nbsp;<span class="kw">FOREIGN KEY</span> (DeptId) <span class="kw">REFERENCES</span> Department(DeptId)<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">ON DELETE CASCADE</span> <span class="cm">-- Delete dept = delete employees too</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">ON UPDATE CASCADE</span> <span class="cm">-- Update deptId = auto update here</span><br>);<br><br><span class="cm">-- Other options:</span><br><span class="cm">-- ON DELETE SET NULL (set FK to NULL)</span><br><span class="cm">-- ON DELETE SET DEFAULT (set FK to default)</span><br><span class="cm">-- ON DELETE NO ACTION (block delete if child exists)</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Foreign Key</span> creates a relationship between two tables by referencing the Primary Key of the parent table. It ensures <span class="key">referential integrity</span> — you cannot insert invalid references. <span class="key">Cascading actions</span>: CASCADE (auto delete/update children), SET NULL, SET DEFAULT, NO ACTION (block)."</p>'},
{q:"What are Joins? Explain INNER, LEFT, RIGHT, FULL, CROSS JOIN.",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Joins</b> combine rows from <b>two or more tables</b> based on a related column. Like connecting puzzle pieces from different boxes.</p><svg viewBox="0 0 440 220" style="max-width:440px"><rect x="10" y="5" width="130" height="95" rx="8" fill="#3b82f6"/><text x="75" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">INNER JOIN</text><text x="75" y="45" text-anchor="middle" fill="#bae6fd" font-size="8">Only matching</text><text x="75" y="58" text-anchor="middle" fill="#bae6fd" font-size="8">rows from BOTH</text><text x="75" y="78" text-anchor="middle" fill="#fff" font-size="16">∩</text><text x="75" y="95" text-anchor="middle" fill="#bae6fd" font-size="7">Most common</text><rect x="155" y="5" width="130" height="95" rx="8" fill="#10b981"/><text x="220" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">LEFT JOIN</text><text x="220" y="45" text-anchor="middle" fill="#d1fae5" font-size="8">ALL from LEFT +</text><text x="220" y="58" text-anchor="middle" fill="#d1fae5" font-size="8">matching from right</text><text x="220" y="78" text-anchor="middle" fill="#fff" font-size="16">◀∩</text><text x="220" y="95" text-anchor="middle" fill="#d1fae5" font-size="7">NULL if no match</text><rect x="300" y="5" width="130" height="95" rx="8" fill="#f59e0b"/><text x="365" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">RIGHT JOIN</text><text x="365" y="45" text-anchor="middle" fill="#fef3c7" font-size="8">ALL from RIGHT +</text><text x="365" y="58" text-anchor="middle" fill="#fef3c7" font-size="8">matching from left</text><text x="365" y="78" text-anchor="middle" fill="#fff" font-size="16">∩▶</text><text x="365" y="95" text-anchor="middle" fill="#fef3c7" font-size="7">NULL if no match</text><rect x="10" y="110" width="200" height="95" rx="8" fill="#8b5cf6"/><text x="110" y="130" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">FULL OUTER JOIN</text><text x="110" y="150" text-anchor="middle" fill="#ede9fe" font-size="8">ALL from BOTH tables</text><text x="110" y="165" text-anchor="middle" fill="#ede9fe" font-size="8">NULL where no match</text><text x="110" y="185" text-anchor="middle" fill="#fff" font-size="16">◀∩▶</text><text x="110" y="200" text-anchor="middle" fill="#ede9fe" font-size="7">Everything included</text><rect x="230" y="110" width="200" height="95" rx="8" fill="#ef4444"/><text x="330" y="130" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">CROSS JOIN</text><text x="330" y="150" text-anchor="middle" fill="#fecaca" font-size="8">Every row × Every row</text><text x="330" y="165" text-anchor="middle" fill="#fecaca" font-size="8">No condition needed</text><text x="330" y="185" text-anchor="middle" fill="#fff" font-size="16">×</text><text x="330" y="200" text-anchor="middle" fill="#fecaca" font-size="7">3 rows × 4 rows = 12 rows</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">-- INNER JOIN: only matching</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">INNER JOIN</span> Department d<br><span class="kw">ON</span> e.DeptId = d.DeptId;<br><br><span class="cm">-- LEFT JOIN: all employees even without dept</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">LEFT JOIN</span> Department d<br><span class="kw">ON</span> e.DeptId = d.DeptId;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">INNER JOIN</span> returns only matching rows. <span class="key">LEFT JOIN</span> returns all left table rows + matching right (NULL if no match). <span class="key">RIGHT JOIN</span> is opposite. <span class="key">FULL OUTER JOIN</span> returns all rows from both. <span class="key">CROSS JOIN</span> returns cartesian product (every combination). INNER and LEFT are most commonly used."</p>'},
{q:"What is the difference between WHERE and HAVING?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>WHERE</b> filters <b>individual rows BEFORE</b> grouping.<br><b>HAVING</b> filters <b>groups AFTER</b> GROUP BY. Think: WHERE = before cooking, HAVING = after cooking.</p><svg viewBox="0 0 440 140" style="max-width:440px"><rect x="10" y="10" width="80" height="40" rx="6" fill="#64748b"/><text x="50" y="35" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">All Rows</text><text x="110" y="35" text-anchor="middle" fill="#64748b" font-size="14">→</text><rect x="130" y="10" width="80" height="40" rx="6" fill="#ef4444"/><text x="170" y="28" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">WHERE</text><text x="170" y="42" text-anchor="middle" fill="#fecaca" font-size="7">Filter rows</text><text x="230" y="35" text-anchor="middle" fill="#64748b" font-size="14">→</text><rect x="250" y="10" width="80" height="40" rx="6" fill="#f59e0b"/><text x="290" y="28" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">GROUP BY</text><text x="290" y="42" text-anchor="middle" fill="#fef3c7" font-size="7">Make groups</text><text x="350" y="35" text-anchor="middle" fill="#64748b" font-size="14">→</text><rect x="370" y="10" width="60" height="40" rx="6" fill="#10b981"/><text x="400" y="28" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">HAVING</text><text x="400" y="42" text-anchor="middle" fill="#d1fae5" font-size="7">Filter groups</text><rect x="10" y="65" width="420" height="65" rx="8" fill="#f0f9ff" stroke="#bae6fd"/><text x="220" y="82" text-anchor="middle" fill="#0369a1" font-size="9" font-weight="600">WHERE = before GROUP BY (on rows) | HAVING = after GROUP BY (on groups)</text><text x="220" y="100" text-anchor="middle" fill="#dc2626" font-size="9">WHERE cannot use aggregate functions (COUNT, SUM, AVG)</text><text x="220" y="118" text-anchor="middle" fill="#16a34a" font-size="9">HAVING can use aggregate functions ✅</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">SELECT</span> DeptId, COUNT(*) <span class="kw">as</span> Total<br><span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Salary > 30000 <span class="cm">-- filter rows first</span><br><span class="kw">GROUP BY</span> DeptId<br><span class="kw">HAVING</span> COUNT(*) > 5; <span class="cm">-- then filter groups</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">WHERE</span> filters individual rows before GROUP BY and cannot use aggregate functions. <span class="key">HAVING</span> filters grouped results after GROUP BY and can use aggregate functions like COUNT, SUM, AVG."</p>'},
{q:"What is GROUP BY? How does it work with aggregate functions?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>GROUP BY</b> groups rows that have the <b>same value</b> into summary rows. Like sorting students by class and counting how many in each class.</p><svg viewBox="0 0 440 150" style="max-width:440px"><rect x="10" y="5" width="150" height="135" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="85" y="25" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="10">Before GROUP BY</text><text x="85" y="42" text-anchor="middle" fill="#334155" font-size="8">IT | Arjun | 50000</text><text x="85" y="55" text-anchor="middle" fill="#334155" font-size="8">HR | Priya | 40000</text><text x="85" y="68" text-anchor="middle" fill="#334155" font-size="8">IT | Ravi | 60000</text><text x="85" y="81" text-anchor="middle" fill="#334155" font-size="8">HR | Meena | 45000</text><text x="85" y="94" text-anchor="middle" fill="#334155" font-size="8">IT | Kiran | 55000</text><text x="85" y="115" text-anchor="middle" fill="#64748b" font-size="8">5 individual rows</text><text x="185" y="70" text-anchor="middle" fill="#64748b" font-size="18">→</text><rect x="210" y="5" width="220" height="135" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="2"/><text x="320" y="25" text-anchor="middle" fill="#16a34a" font-weight="700" font-size="10">After GROUP BY Dept</text><rect x="225" y="38" width="190" height="35" rx="4" fill="#86efac"/><text x="320" y="53" text-anchor="middle" fill="#14532d" font-size="9" font-weight="600">IT | COUNT=3 | AVG=55000</text><text x="320" y="67" text-anchor="middle" fill="#14532d" font-size="7">SUM=165000 | MAX=60000</text><rect x="225" y="80" width="190" height="35" rx="4" fill="#86efac"/><text x="320" y="95" text-anchor="middle" fill="#14532d" font-size="9" font-weight="600">HR | COUNT=2 | AVG=42500</text><text x="320" y="109" text-anchor="middle" fill="#14532d" font-size="7">SUM=85000 | MAX=45000</text><text x="320" y="132" text-anchor="middle" fill="#16a34a" font-size="8">2 grouped summary rows</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">SELECT</span> Dept, COUNT(*) <span class="kw">as</span> Total, AVG(Salary) <span class="kw">as</span> AvgSal<br><span class="kw">FROM</span> Employee<br><span class="kw">GROUP BY</span> Dept;<br><br><span class="cm">-- COUNT() = rows | SUM() = total | AVG() = average</span><br><span class="cm">-- MAX() = highest | MIN() = lowest</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">GROUP BY</span> groups rows with same values into summary rows. It is used with <span class="key">aggregate functions</span>: COUNT, SUM, AVG, MAX, MIN. Every column in SELECT must either be in GROUP BY or inside an aggregate function."</p>'},
{q:"What is the difference between DELETE, TRUNCATE, and DROP?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>DELETE</b> = remove some/all rows (can undo).<br><b>TRUNCATE</b> = remove ALL rows fast (cannot undo easily).<br><b>DROP</b> = destroy the entire table (structure + data gone).</p><svg viewBox="0 0 440 170" style="max-width:440px"><rect x="10" y="5" width="135" height="155" rx="8" fill="#f59e0b"/><text x="77" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">🗑️ DELETE</text><text x="77" y="45" text-anchor="middle" fill="#fef3c7" font-size="8">DML command</text><text x="77" y="62" text-anchor="middle" fill="#fff" font-size="8">✅ WHERE clause</text><text x="77" y="77" text-anchor="middle" fill="#fff" font-size="8">✅ Can rollback</text><text x="77" y="92" text-anchor="middle" fill="#fff" font-size="8">✅ Fires triggers</text><text x="77" y="107" text-anchor="middle" fill="#fff" font-size="8">❌ Slow (row by row)</text><text x="77" y="122" text-anchor="middle" fill="#fff" font-size="8">✅ Identity NOT reset</text><text x="77" y="148" text-anchor="middle" fill="#fef3c7" font-size="7">Table structure stays</text><rect x="155" y="5" width="135" height="155" rx="8" fill="#ef4444"/><text x="222" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">⚡ TRUNCATE</text><text x="222" y="45" text-anchor="middle" fill="#fecaca" font-size="8">DDL command</text><text x="222" y="62" text-anchor="middle" fill="#fff" font-size="8">❌ No WHERE</text><text x="222" y="77" text-anchor="middle" fill="#fff" font-size="8">❌ Cannot rollback*</text><text x="222" y="92" text-anchor="middle" fill="#fff" font-size="8">❌ No triggers</text><text x="222" y="107" text-anchor="middle" fill="#fff" font-size="8">✅ Very fast</text><text x="222" y="122" text-anchor="middle" fill="#fff" font-size="8">✅ Identity RESETS</text><text x="222" y="148" text-anchor="middle" fill="#fecaca" font-size="7">Table structure stays</text><rect x="300" y="5" width="130" height="155" rx="8" fill="#7f1d1d"/><text x="365" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">💣 DROP</text><text x="365" y="45" text-anchor="middle" fill="#fecaca" font-size="8">DDL command</text><text x="365" y="62" text-anchor="middle" fill="#fff" font-size="8">❌ Removes EVERYTHING</text><text x="365" y="77" text-anchor="middle" fill="#fff" font-size="8">❌ Data + Structure</text><text x="365" y="92" text-anchor="middle" fill="#fff" font-size="8">❌ Indexes gone</text><text x="365" y="107" text-anchor="middle" fill="#fff" font-size="8">❌ Constraints gone</text><text x="365" y="122" text-anchor="middle" fill="#fff" font-size="8">❌ Cannot rollback</text><text x="365" y="148" text-anchor="middle" fill="#fecaca" font-size="7">Table DESTROYED 💥</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">DELETE FROM</span> Employee <span class="kw">WHERE</span> DeptId = 3; <span class="cm">-- some rows</span><br><span class="kw">TRUNCATE TABLE</span> Employee; <span class="cm">-- all rows fast</span><br><span class="kw">DROP TABLE</span> Employee; <span class="cm">-- table gone forever!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">DELETE</span> is DML, removes specific rows with WHERE, can be rolled back, fires triggers. <span class="key">TRUNCATE</span> is DDL, removes all rows, resets identity, faster, no triggers. <span class="key">DROP</span> is DDL, removes the entire table including structure."</p>'},
{q:"What are Subqueries? Correlated vs Non-Correlated?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>Subquery</b> is a <b>query inside another query</b>.<br><b>Non-Correlated</b> = inner query runs ONCE independently.<br><b>Correlated</b> = inner query runs for EACH row of outer query.</p><svg viewBox="0 0 440 150" style="max-width:440px"><rect x="10" y="5" width="200" height="135" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="110" y="25" text-anchor="middle" fill="#1e40af" font-weight="700" font-size="11">Non-Correlated</text><text x="110" y="45" text-anchor="middle" fill="#334155" font-size="8">Inner query runs ONCE</text><text x="110" y="62" text-anchor="middle" fill="#16a34a" font-size="8">✅ Faster</text><text x="110" y="79" text-anchor="middle" fill="#16a34a" font-size="8">✅ Independent of outer</text><text x="110" y="105" text-anchor="middle" fill="#1e40af" font-size="7">WHERE Salary ></text><text x="110" y="118" text-anchor="middle" fill="#1e40af" font-size="7">(SELECT AVG(Salary) FROM Emp)</text><rect x="230" y="5" width="200" height="135" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="330" y="25" text-anchor="middle" fill="#92400e" font-weight="700" font-size="11">Correlated</text><text x="330" y="45" text-anchor="middle" fill="#334155" font-size="8">Inner runs per EACH row</text><text x="330" y="62" text-anchor="middle" fill="#dc2626" font-size="8">❌ Slower</text><text x="330" y="79" text-anchor="middle" fill="#dc2626" font-size="8">❌ Depends on outer query</text><text x="330" y="105" text-anchor="middle" fill="#92400e" font-size="7">WHERE e.Salary > (SELECT AVG</text><text x="330" y="118" text-anchor="middle" fill="#92400e" font-size="7">..WHERE DeptId = e.DeptId)</text></svg><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Non-Correlated: inner runs ONCE</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Salary > (<span class="kw">SELECT</span> AVG(Salary) <span class="kw">FROM</span> Employee);<br><br><span class="cm">-- Correlated: inner runs per EACH row</span><br><span class="kw">SELECT</span> e.Name <span class="kw">FROM</span> Employee e<br><span class="kw">WHERE</span> e.Salary > (<br>&nbsp;&nbsp;<span class="kw">SELECT</span> AVG(Salary) <span class="kw">FROM</span> Employee<br>&nbsp;&nbsp;<span class="kw">WHERE</span> DeptId = e.DeptId <span class="cm">-- references outer!</span><br>);</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Subquery</span> is a query nested inside another. <span class="key">Non-correlated</span> runs independently once — faster. <span class="key">Correlated</span> references the outer query and runs per row — slower. Correlated subqueries can often be replaced with JOINs for better performance."</p>'},
{q:"What is a View? What are its advantages?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>A <b>View</b> is a <b>saved SQL query</b> that acts like a virtual table. It does NOT store data — it runs the query every time you access it.</p><svg viewBox="0 0 440 130" style="max-width:440px"><rect x="10" y="10" width="130" height="45" rx="6" fill="#3b82f6"/><text x="75" y="30" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Employee Table</text><text x="75" y="45" text-anchor="middle" fill="#bae6fd" font-size="7">1000 rows, 20 cols</text><rect x="10" y="65" width="130" height="45" rx="6" fill="#10b981"/><text x="75" y="85" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">Department Table</text><text x="75" y="100" text-anchor="middle" fill="#d1fae5" font-size="7">50 rows, 5 cols</text><text x="175" y="65" text-anchor="middle" fill="#64748b" font-size="14">→</text><rect x="210" y="20" width="220" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="320" y="42" text-anchor="middle" fill="#92400e" font-weight="700" font-size="11">👁️ vw_EmpDetails</text><text x="320" y="62" text-anchor="middle" fill="#334155" font-size="8">Name | Dept | Salary</text><text x="320" y="78" text-anchor="middle" fill="#334155" font-size="8">Only 3 cols, joined data</text><text x="320" y="92" text-anchor="middle" fill="#f59e0b" font-size="7" font-weight="600">No data stored! Virtual table</text></svg><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE VIEW</span> vw_EmpDetails <span class="kw">AS</span><br><span class="kw">SELECT</span> e.Name, d.DeptName, e.Salary<br><span class="kw">FROM</span> Employee e<br><span class="kw">JOIN</span> Department d <span class="kw">ON</span> e.DeptId = d.DeptId;<br><br><span class="cm">-- Use like a table</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> vw_EmpDetails <span class="kw">WHERE</span> Salary > 50000;</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">View</span> is a virtual table based on a saved SELECT query. Advantages: <span class="key">Security</span> (hide columns), <span class="key">Simplicity</span> (complex joins become simple), <span class="key">Reusability</span>. Views dont store data unless its an Indexed View."</p>'},
{q:"What is the difference between UNION and UNION ALL?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>UNION</b> = combines results and <b>removes duplicates</b> (slower).<br><b>UNION ALL</b> = combines results and <b>keeps ALL rows including duplicates</b> (faster).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- UNION: removes duplicates (slower)</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employees<br><span class="kw">UNION</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Contractors;<br><span class="cm">-- If "Arjun" exists in both, shows ONCE</span><br><br><span class="cm">-- UNION ALL: keeps duplicates (faster)</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employees<br><span class="kw">UNION ALL</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Contractors;<br><span class="cm">-- If "Arjun" exists in both, shows TWICE</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">UNION</span> combines result sets and removes duplicates using a sort/distinct operation — slower. <span class="key">UNION ALL</span> keeps all rows including duplicates — faster because no sorting needed. Use UNION ALL when you know there are no duplicates or duplicates are acceptable."</p>'},
{q:"What are Constraints? Explain PK, FK, UNIQUE, CHECK, DEFAULT, NOT NULL.",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>Constraints</b> are <b>rules on columns</b> that enforce data integrity. They prevent bad data from entering your database.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE TABLE</span> Employee (<br>&nbsp;&nbsp;Id <span class="kw">INT PRIMARY KEY IDENTITY</span>, <span class="cm">-- PK: unique + not null</span><br>&nbsp;&nbsp;Name <span class="kw">VARCHAR</span>(50) <span class="kw">NOT NULL</span>, <span class="cm">-- must have value</span><br>&nbsp;&nbsp;Email <span class="kw">VARCHAR</span>(100) <span class="kw">UNIQUE</span>, <span class="cm">-- no duplicates</span><br>&nbsp;&nbsp;Age <span class="kw">INT CHECK</span>(Age >= 18 <span class="kw">AND</span> Age <= 65), <span class="cm">-- range rule</span><br>&nbsp;&nbsp;Status <span class="kw">VARCHAR</span>(10) <span class="kw">DEFAULT</span> <span class="str">\'Active\'</span>, <span class="cm">-- auto value</span><br>&nbsp;&nbsp;DeptId <span class="kw">INT FOREIGN KEY REFERENCES</span> Dept(Id) <span class="cm">-- links to Dept</span><br>);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">PRIMARY KEY</span> = unique + not null, one per table. <span class="key">FOREIGN KEY</span> = links to another table. <span class="key">UNIQUE</span> = no duplicates, allows one null. <span class="key">CHECK</span> = validates a condition. <span class="key">DEFAULT</span> = auto-fills if no value given. <span class="key">NOT NULL</span> = must have a value. Constraints enforce data integrity at the database level."</p>'},
{q:"What is IDENTITY column? How does it work?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>IDENTITY</b> auto-generates <b>unique sequential numbers</b> for a column. You dont insert the value — SQL Server creates it automatically. Like a token counter at a bank.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE TABLE</span> Product (<br>&nbsp;&nbsp;Id <span class="kw">INT IDENTITY</span>(1, 1) <span class="kw">PRIMARY KEY</span>, <span class="cm">-- start=1, increment=1</span><br>&nbsp;&nbsp;Name <span class="kw">VARCHAR</span>(50)<br>);<br><br><span class="kw">INSERT INTO</span> Product(Name) <span class="kw">VALUES</span>(<span class="str">\'Laptop\'</span>); <span class="cm">-- Id = 1 (auto)</span><br><span class="kw">INSERT INTO</span> Product(Name) <span class="kw">VALUES</span>(<span class="str">\'Phone\'</span>); <span class="cm">-- Id = 2 (auto)</span><br><br><span class="cm">-- Get last generated identity</span><br><span class="kw">SELECT</span> SCOPE_IDENTITY(); <span class="cm">-- 2 (current scope)</span><br><span class="kw">SELECT</span> @@IDENTITY; <span class="cm">-- 2 (any scope - avoid!)</span><br><br><span class="cm">-- Reset identity</span><br>DBCC CHECKIDENT(<span class="str">\'Product\'</span>, RESEED, 0);</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">IDENTITY(seed, increment)</span> auto-generates sequential numbers. Dont include in INSERT — SQL Server fills it. Use <span class="key">SCOPE_IDENTITY()</span> to get last generated value (safer than @@IDENTITY). IDENTITY values can have gaps after deletes/rollbacks. Use DBCC CHECKIDENT to reseed."</p>'},
{q:"What is the difference between CHAR, VARCHAR, and NVARCHAR?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>CHAR</b> = fixed length, always uses full space. <b>VARCHAR</b> = variable length, uses only needed space. <b>NVARCHAR</b> = variable + supports <b>Unicode</b> (Hindi, Malayalam, Chinese etc.).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- CHAR(10): always stores 10 bytes</span><br><span class="kw">DECLARE</span> @c CHAR(10) = <span class="str">\'Hi\'</span>; <span class="cm">-- stored as "Hi        " (padded)</span><br><br><span class="cm">-- VARCHAR(10): stores only what you give</span><br><span class="kw">DECLARE</span> @v VARCHAR(10) = <span class="str">\'Hi\'</span>; <span class="cm">-- stored as "Hi" (2 bytes)</span><br><br><span class="cm">-- NVARCHAR(10): Unicode support (2 bytes per char)</span><br><span class="kw">DECLARE</span> @n NVARCHAR(10) = N<span class="str">\'\u0d39\u0d32\u0d4b\'</span>; <span class="cm">-- Malayalam works! ✅</span><br><br><span class="cm">-- When to use what:</span><br><span class="cm">-- CHAR: fixed-length codes (State = "KL", Gender = "M")</span><br><span class="cm">-- VARCHAR: English text (names, addresses)</span><br><span class="cm">-- NVARCHAR: Multi-language text (Unicode)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">CHAR</span> is fixed-length (padded with spaces) — use for fixed codes. <span class="key">VARCHAR</span> is variable-length (saves space) — use for English text. <span class="key">NVARCHAR</span> is variable + Unicode (2 bytes/char) — use for multi-language support. NVARCHAR uses double the storage of VARCHAR."</p>'},
{q:"What is NULL? How does it behave in comparisons and aggregations?",l:"b",a:'<h4>🎯 Simple Answer</h4><p><b>NULL</b> means <b>unknown/missing value</b> — NOT zero, NOT empty string. NULL behaves strangely: any comparison with NULL returns <b>UNKNOWN</b> (not true or false).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- NULL comparisons are TRICKY!</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Emp <span class="kw">WHERE</span> Salary = NULL; <span class="cm">-- ❌ returns NOTHING!</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Emp <span class="kw">WHERE</span> Salary IS NULL; <span class="cm">-- ✅ correct way!</span><br><br>NULL = NULL <span class="cm">-- UNKNOWN (not true!)</span><br>NULL != NULL <span class="cm">-- UNKNOWN</span><br>NULL + 10 <span class="cm">-- NULL (anything + NULL = NULL)</span><br><br><span class="cm">-- Aggregations IGNORE NULLs</span><br><span class="cm">-- Values: 100, NULL, 200</span><br><span class="kw">SELECT</span> AVG(Salary); <span class="cm">-- 150 (ignores NULL, not 100)</span><br><span class="kw">SELECT</span> COUNT(Salary); <span class="cm">-- 2 (ignores NULL)</span><br><span class="kw">SELECT</span> COUNT(*); <span class="cm">-- 3 (counts all rows)</span><br><br><span class="cm">-- Handle NULLs</span><br><span class="kw">SELECT</span> ISNULL(Salary, 0); <span class="cm">-- replace NULL with 0</span><br><span class="kw">SELECT</span> COALESCE(Phone, Email, <span class="str">\'N/A\'</span>); <span class="cm">-- first non-null</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">NULL</span> represents unknown/missing data. Use <span class="key">IS NULL / IS NOT NULL</span> for comparisons (not = or !=). NULL in arithmetic returns NULL. Aggregate functions (SUM, AVG, COUNT) ignore NULLs except COUNT(*). Use <span class="key">ISNULL()</span> or <span class="key">COALESCE()</span> to handle NULLs."</p>'},
{q:"What is COALESCE and ISNULL? Difference between them?",l:"b",a:'<h4>🎯 Simple Answer</h4><p>Both replace NULL with a default value. <b>ISNULL</b> = takes 2 params only (SQL Server specific). <b>COALESCE</b> = takes multiple params, returns first non-null (ANSI standard).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- ISNULL: 2 parameters only</span><br><span class="kw">SELECT</span> ISNULL(Phone, <span class="str">\'No Phone\'</span>) <span class="kw">FROM</span> Employee;<br><br><span class="cm">-- COALESCE: multiple parameters, returns first non-null</span><br><span class="kw">SELECT</span> COALESCE(Phone, Mobile, Email, <span class="str">\'No Contact\'</span>) <span class="kw">FROM</span> Employee;<br><span class="cm">-- Checks Phone first, then Mobile, then Email</span><br><span class="cm">-- Returns first one that is NOT null</span><br><br><span class="cm">-- Data type difference</span><br><span class="kw">SELECT</span> ISNULL(NULL, 1); <span class="cm">-- returns INT (follows first param type)</span><br><span class="kw">SELECT</span> COALESCE(NULL, 1); <span class="cm">-- returns INT (highest precedence type)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">ISNULL</span> takes exactly 2 parameters, is SQL Server specific, and uses the first parameters data type. <span class="key">COALESCE</span> takes multiple parameters, is ANSI standard (portable), and returns the first non-null value. Prefer COALESCE for portability and when checking multiple columns."</p>'},
// Intermediate
{q:"What is a Stored Procedure? How is it different from a Function?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Stored Procedure</b> = saved SQL program, does actions (INSERT/UPDATE), no return required.<br><b>Function</b> = MUST return a value, can be used inside SELECT.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Stored Procedure</span><br><span class="kw">CREATE PROCEDURE</span> sp_GiveRaise @EmpId INT, @Percent DECIMAL<br><span class="kw">AS BEGIN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * (1 + @Percent/100)<br>&nbsp;&nbsp;<span class="kw">WHERE</span> Id = @EmpId;<br><span class="kw">END</span><br>EXEC sp_GiveRaise 101, 10;<br><br><span class="cm">-- Function</span><br><span class="kw">CREATE FUNCTION</span> fn_GetFullName(@Id INT) <span class="kw">RETURNS VARCHAR</span>(100)<br><span class="kw">AS BEGIN</span><br>&nbsp;&nbsp;<span class="kw">DECLARE</span> @name VARCHAR(100);<br>&nbsp;&nbsp;<span class="kw">SELECT</span> @name = FirstName + <span class="str">\' \'</span> + LastName <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Id = @Id;<br>&nbsp;&nbsp;<span class="kw">RETURN</span> @name;<br><span class="kw">END</span><br><span class="kw">SELECT</span> dbo.fn_GetFullName(101); <span class="cm">-- use in SELECT!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Procedure</span> can have DML, no mandatory return, called with EXEC, cannot use in SELECT. <span class="key">Function</span> MUST return a value, can be used in SELECT/WHERE, should avoid DML. Use procedures for actions, functions for calculations."</p>'},
{q:"What are Indexes? Explain Clustered vs Non-Clustered Index.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Index</b> = like a book index — helps find data fast without scanning every row. <b>Clustered</b> = sorts the actual table data (only 1 per table). <b>Non-Clustered</b> = separate lookup structure (many per table).</p><svg viewBox="0 0 440 120" style="max-width:440px"><rect x="10" y="5" width="200" height="105" rx="8" fill="#3b82f6"/><text x="110" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Clustered Index</text><text x="110" y="45" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Sorts actual table data</text><text x="110" y="60" text-anchor="middle" fill="#bae6fd" font-size="8">❌ Only ONE per table</text><text x="110" y="75" text-anchor="middle" fill="#bae6fd" font-size="8">✅ PK creates it auto</text><text x="110" y="90" text-anchor="middle" fill="#bae6fd" font-size="8">✅ Fastest for range queries</text><text x="110" y="105" text-anchor="middle" fill="#fff" font-size="7">Like a dictionary (A-Z sorted)</text><rect x="230" y="5" width="200" height="105" rx="8" fill="#10b981"/><text x="330" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Non-Clustered Index</text><text x="330" y="45" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Separate lookup structure</text><text x="330" y="60" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Multiple per table (up to 999)</text><text x="330" y="75" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Points back to table row</text><text x="330" y="90" text-anchor="middle" fill="#d1fae5" font-size="8">✅ Good for specific lookups</text><text x="330" y="105" text-anchor="middle" fill="#fff" font-size="7">Like a book index (page numbers)</text></svg><h4>🗣️ Interview Answer</h4><p>"<span class="key">Clustered index</span> sorts the physical table data — only one per table, PK creates it automatically. <span class="key">Non-clustered index</span> is a separate structure with pointers to data — multiple allowed. Indexes speed up reads but slow down writes (INSERT/UPDATE must update index too)."</p>'},
{q:"What is a Composite Index? When would you use it?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Composite Index</b> is an index on <b>multiple columns</b>. Column order matters! Use when queries filter on multiple columns together.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Composite index on (LastName, FirstName)</span><br><span class="kw">CREATE INDEX</span> IX_Name <span class="kw">ON</span> Employee(LastName, FirstName);<br><br><span class="cm">-- ✅ Uses index (left-most column first)</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> LastName = <span class="str">\'Kumar\'</span>;<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> LastName = <span class="str">\'Kumar\'</span> <span class="kw">AND</span> FirstName = <span class="str">\'Arjun\'</span>;<br><br><span class="cm">-- ❌ Does NOT use index (skips left-most column!)</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> FirstName = <span class="str">\'Arjun\'</span>;</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Composite Index</span> covers multiple columns. The <span class="key">left-most column rule</span> applies — the index is used only if the query filters on the left-most column(s). Order matters: put the most selective column first. Use for queries that frequently filter on the same column combination."</p>'},
{q:"What is a Covering Index?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Covering Index</b> contains <b>ALL columns needed by a query</b>. SQL Server gets everything from the index without going back to the table. Super fast!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Query needs: Name, Salary WHERE DeptId = 5</span><br><br><span class="cm">-- Normal index - needs to go back to table for Name, Salary</span><br><span class="kw">CREATE INDEX</span> IX_Dept <span class="kw">ON</span> Employee(DeptId);<br><br><span class="cm">-- Covering index - includes ALL needed columns</span><br><span class="kw">CREATE INDEX</span> IX_Dept_Cover <span class="kw">ON</span> Employee(DeptId)<br>&nbsp;&nbsp;<span class="kw">INCLUDE</span>(Name, Salary); <span class="cm">-- no table lookup needed!</span><br><br><span class="cm">-- This query is fully covered:</span><br><span class="kw">SELECT</span> Name, Salary <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = 5;<br><span class="cm">-- Execution plan shows: Index Seek (no Key Lookup!) ✅</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Covering Index</span> includes all columns a query needs using the <span class="key">INCLUDE</span> clause. SQL Server reads only the index, avoiding expensive Key Lookup to the table. Check execution plan — if you see Key Lookup, add missing columns to INCLUDE. Dramatically improves read performance."</p>'},
{q:"What are Window Functions? Explain ROW_NUMBER, RANK, DENSE_RANK, NTILE.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Window Functions</b> perform calculations <b>across a set of rows</b> related to the current row — without collapsing rows like GROUP BY.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- ROW_NUMBER: unique sequential number (no ties)</span><br><span class="kw">SELECT</span> Name, Salary,<br>&nbsp;&nbsp;ROW_NUMBER() OVER(<span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>) <span class="kw">as</span> RowNum<br><span class="kw">FROM</span> Employee;<br><span class="cm">-- 80000=1, 70000=2, 70000=3 (no ties)</span><br><br><span class="cm">-- RANK: same rank for ties, skips next</span><br><span class="cm">-- 80000=1, 70000=2, 70000=2, 60000=4 (skips 3!)</span><br><br><span class="cm">-- DENSE_RANK: same rank for ties, NO skip</span><br><span class="cm">-- 80000=1, 70000=2, 70000=2, 60000=3 (no skip)</span><br><br><span class="cm">-- NTILE(4): divides into 4 equal groups</span><br><span class="cm">-- Group 1, Group 2, Group 3, Group 4</span><br><br><span class="cm">-- PARTITION BY: window per group</span><br>ROW_NUMBER() OVER(<span class="kw">PARTITION BY</span> DeptId <span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>)<br><span class="cm">-- Numbering restarts for each department!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">ROW_NUMBER</span> gives unique sequential numbers (no ties). <span class="key">RANK</span> gives same number for ties but skips. <span class="key">DENSE_RANK</span> gives same for ties, no skip. <span class="key">NTILE(N)</span> divides into N equal groups. Use <span class="key">PARTITION BY</span> to restart numbering per group. Window functions dont collapse rows like GROUP BY."</p>'},
{q:"What is a CTE (Common Table Expression)? Recursive CTE?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>CTE</b> is a <b>temporary named result set</b> defined with WITH keyword. Makes complex queries readable. <b>Recursive CTE</b> calls itself — used for hierarchical data (org chart, categories).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Simple CTE</span><br><span class="kw">WITH</span> TopEarners <span class="kw">AS</span> (<br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary, DeptId<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Salary > 80000<br>)<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> TopEarners <span class="kw">WHERE</span> DeptId = 1;<br><br><span class="cm">-- Recursive CTE: Employee hierarchy</span><br><span class="kw">WITH</span> OrgChart <span class="kw">AS</span> (<br>&nbsp;&nbsp;<span class="cm">-- Anchor: top-level manager</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Id, Name, ManagerId, 1 <span class="kw">as</span> Level<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> ManagerId <span class="kw">IS NULL</span><br><br>&nbsp;&nbsp;<span class="kw">UNION ALL</span><br><br>&nbsp;&nbsp;<span class="cm">-- Recursive: find subordinates</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> e.Id, e.Name, e.ManagerId, o.Level + 1<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee e <span class="kw">JOIN</span> OrgChart o <span class="kw">ON</span> e.ManagerId = o.Id<br>)<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> OrgChart;</div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">CTE</span> is a temporary result set using WITH keyword — improves readability, can be referenced multiple times. <span class="key">Recursive CTE</span> has an anchor member and recursive member joined by UNION ALL — used for hierarchical data like org charts, category trees, bill of materials."</p>'},
{q:"What are Triggers? Explain AFTER, INSTEAD OF triggers.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Trigger</b> is code that runs <b>automatically</b> when INSERT, UPDATE, or DELETE happens. <b>AFTER</b> = runs after the action. <b>INSTEAD OF</b> = runs instead of the action (replaces it).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- AFTER trigger: log every delete</span><br><span class="kw">CREATE TRIGGER</span> trg_AuditDelete <span class="kw">ON</span> Employee<br><span class="kw">AFTER DELETE AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">INSERT INTO</span> AuditLog(Action, EmpName, DeletedAt)<br>&nbsp;&nbsp;<span class="kw">SELECT</span> <span class="str">\'DELETE\'</span>, Name, GETDATE() <span class="kw">FROM</span> deleted; <span class="cm">-- special table!</span><br><span class="kw">END</span><br><br><span class="cm">-- INSTEAD OF trigger: prevent delete, soft-delete instead</span><br><span class="kw">CREATE TRIGGER</span> trg_SoftDelete <span class="kw">ON</span> Employee<br><span class="kw">INSTEAD OF DELETE AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> IsDeleted = 1<br>&nbsp;&nbsp;<span class="kw">WHERE</span> Id <span class="kw">IN</span> (<span class="kw">SELECT</span> Id <span class="kw">FROM</span> deleted);<br>&nbsp;&nbsp;<span class="cm">-- actual DELETE never happens!</span><br><span class="kw">END</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Triggers</span> auto-execute on DML events. <span class="key">AFTER</span> triggers run after the operation — used for auditing, logging. <span class="key">INSTEAD OF</span> triggers replace the operation — used for soft deletes, complex view updates. Special tables: <span class="key">inserted</span> (new data) and <span class="key">deleted</span> (old data). Use sparingly — hidden logic is hard to debug."</p>'},
{q:"What is a Temp Table vs Table Variable? When to use which?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Temp Table (#table)</b> = stored in tempdb, supports indexes, good for <b>large data</b>.<br><b>Table Variable (@table)</b> = stored in memory, no indexes, good for <b>small data</b>.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Temp Table: large data, supports indexes</span><br><span class="kw">CREATE TABLE</span> #TempEmp (Id INT, Name VARCHAR(50));<br><span class="kw">INSERT INTO</span> #TempEmp <span class="kw">SELECT</span> Id, Name <span class="kw">FROM</span> Employee;<br><span class="kw">CREATE INDEX</span> IX_Temp <span class="kw">ON</span> #TempEmp(Id); <span class="cm">-- ✅ can add index!</span><br><span class="kw">DROP TABLE</span> #TempEmp; <span class="cm">-- or auto-drops when session ends</span><br><br><span class="cm">-- Table Variable: small data, simpler</span><br><span class="kw">DECLARE</span> @TempEmp TABLE (Id INT, Name VARCHAR(50));<br><span class="kw">INSERT INTO</span> @TempEmp <span class="kw">SELECT</span> Id, Name <span class="kw">FROM</span> Employee;<br><span class="cm">-- auto-drops when batch ends</span><br><span class="cm">-- ❌ no explicit indexes (only PK constraint)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Temp tables</span> (#) are in tempdb, support indexes, statistics, and transactions — better for large datasets. <span class="key">Table variables</span> (@) are in memory, no statistics, minimal logging — better for small datasets (&lt;1000 rows). Temp tables participate in transactions, table variables dont."</p>'},
{q:"What is the MERGE statement? How does UPSERT work?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>MERGE</b> does INSERT, UPDATE, and DELETE in <b>one statement</b> based on matching conditions. <b>UPSERT</b> = if row exists UPDATE it, if not INSERT it.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">MERGE INTO</span> Products <span class="kw">AS</span> target<br><span class="kw">USING</span> NewProducts <span class="kw">AS</span> source<br><span class="kw">ON</span> target.Id = source.Id<br><br><span class="kw">WHEN MATCHED THEN</span> <span class="cm">-- exists? UPDATE</span><br>&nbsp;&nbsp;<span class="kw">UPDATE SET</span> target.Price = source.Price<br><br><span class="kw">WHEN NOT MATCHED THEN</span> <span class="cm">-- new? INSERT</span><br>&nbsp;&nbsp;<span class="kw">INSERT</span>(Id, Name, Price) <span class="kw">VALUES</span>(source.Id, source.Name, source.Price)<br><br><span class="kw">WHEN NOT MATCHED BY SOURCE THEN</span> <span class="cm">-- removed? DELETE</span><br>&nbsp;&nbsp;<span class="kw">DELETE</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">MERGE</span> performs INSERT, UPDATE, DELETE in one atomic statement based on MATCHED/NOT MATCHED conditions. Also called UPSERT. Useful for syncing data between tables. Always add a semicolon before MERGE and use WITH (HOLDLOCK) for concurrency safety."</p>'},
{q:"What are Transactions? Explain ACID properties.",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Transaction</b> groups multiple SQL statements into <b>one unit</b> — either ALL succeed or ALL fail. <b>ACID</b> = 4 properties that guarantee data reliability.</p><h4>💻 Code Example</h4><div class="code"><span class="kw">BEGIN TRANSACTION</span><br><span class="kw">BEGIN TRY</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance - 1000 <span class="kw">WHERE</span> Id = 1; <span class="cm">-- debit</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance + 1000 <span class="kw">WHERE</span> Id = 2; <span class="cm">-- credit</span><br>&nbsp;&nbsp;<span class="kw">COMMIT</span>; <span class="cm">-- both succeed ✅</span><br><span class="kw">END TRY</span><br><span class="kw">BEGIN CATCH</span><br>&nbsp;&nbsp;<span class="kw">ROLLBACK</span>; <span class="cm">-- both undo ❌</span><br><span class="kw">END CATCH</span><br><br><span class="cm">-- ACID:</span><br><span class="cm">-- A = Atomicity: all or nothing</span><br><span class="cm">-- C = Consistency: valid state before and after</span><br><span class="cm">-- I = Isolation: transactions dont interfere</span><br><span class="cm">-- D = Durability: committed data survives crash</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Transaction</span> ensures all-or-nothing execution. <span class="key">ACID</span>: <span class="key">Atomicity</span> (all succeed or all fail), <span class="key">Consistency</span> (data stays valid), <span class="key">Isolation</span> (concurrent transactions dont interfere), <span class="key">Durability</span> (committed data persists). Use BEGIN TRAN, COMMIT, ROLLBACK with TRY-CATCH."</p>'},
{q:"What is Transaction Isolation Level? Explain Read Uncommitted, Read Committed, Repeatable Read, Serializable.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Isolation Level</b> controls how much one transaction can <b>see changes from other transactions</b>. Higher isolation = more safety but slower.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Read Uncommitted: can read dirty (uncommitted) data</span><br><span class="kw">SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED</span>;<br><span class="cm">-- Same as: SELECT * FROM Emp WITH (NOLOCK)</span><br><br><span class="cm">-- Read Committed: only reads committed data (DEFAULT)</span><br><span class="kw">SET TRANSACTION ISOLATION LEVEL READ COMMITTED</span>;<br><br><span class="cm">-- Repeatable Read: locked rows cant change until done</span><br><span class="kw">SET TRANSACTION ISOLATION LEVEL REPEATABLE READ</span>;<br><br><span class="cm">-- Serializable: full lock, no new rows can be inserted</span><br><span class="kw">SET TRANSACTION ISOLATION LEVEL SERIALIZABLE</span>;<br><span class="cm">-- Safest but SLOWEST!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Read Uncommitted</span> — dirty reads allowed (fastest). <span class="key">Read Committed</span> — default, only committed data. <span class="key">Repeatable Read</span> — prevents non-repeatable reads. <span class="key">Serializable</span> — prevents phantom reads (slowest). Higher isolation = more consistency but more blocking/deadlocks."</p>'},
{q:"What is a Deadlock? How do you prevent and resolve it?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>A <b>Deadlock</b> = two transactions <b>waiting for each other forever</b>. Transaction A locks Row 1 and wants Row 2. Transaction B locks Row 2 and wants Row 1. Neither can proceed!</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Transaction A:          Transaction B:</span><br><span class="cm">-- Lock Row 1 ✅           Lock Row 2 ✅</span><br><span class="cm">-- Want Row 2 ⏳ waiting   Want Row 1 ⏳ waiting</span><br><span class="cm">-- DEADLOCK! 💥 SQL Server kills one (victim)</span><br><br><span class="cm">-- Prevention strategies:</span><br><span class="cm">-- 1. Access tables in SAME ORDER in all transactions</span><br><span class="cm">-- 2. Keep transactions SHORT</span><br><span class="cm">-- 3. Use proper indexes (less locking)</span><br><span class="cm">-- 4. Use READ COMMITTED SNAPSHOT</span><br><span class="cm">-- 5. Use NOLOCK for read-only queries (careful!)</span><br><br><span class="cm">-- Set deadlock priority (who gets killed)</span><br><span class="kw">SET DEADLOCK_PRIORITY LOW</span>; <span class="cm">-- this one dies first</span></div><h4>🗣️ Interview Answer</h4><p>"A <span class="key">Deadlock</span> occurs when two transactions hold locks and wait for each other. SQL Server detects it and kills one (victim). Prevent by: accessing tables in <span class="key">consistent order</span>, keeping transactions short, using proper indexes, and enabling <span class="key">READ COMMITTED SNAPSHOT</span> isolation."</p>'},
{q:"What is PIVOT and UNPIVOT?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>PIVOT</b> = turns <b>rows into columns</b> (vertical to horizontal). <b>UNPIVOT</b> = turns <b>columns into rows</b> (horizontal to vertical). Like rotating a table 90 degrees.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Data: Name, Month, Sales</span><br><span class="cm">-- Arjun, Jan, 100</span><br><span class="cm">-- Arjun, Feb, 200</span><br><span class="cm">-- Ravi, Jan, 150</span><br><br><span class="cm">-- PIVOT: months become columns</span><br><span class="kw">SELECT</span> Name, [Jan], [Feb]<br><span class="kw">FROM</span> Sales<br><span class="kw">PIVOT</span> (<br>&nbsp;&nbsp;SUM(Amount) <span class="kw">FOR</span> Month <span class="kw">IN</span> ([Jan], [Feb])<br>) <span class="kw">AS</span> pvt;<br><span class="cm">-- Result: Arjun | 100 | 200</span><br><span class="cm">--         Ravi  | 150 | NULL</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">PIVOT</span> rotates rows to columns using an aggregate function — useful for cross-tab reports. <span class="key">UNPIVOT</span> does the reverse — columns to rows. PIVOT requires knowing column values in advance. For dynamic columns, use dynamic SQL with PIVOT."</p>'},
{q:"What is the difference between APPLY (CROSS APPLY vs OUTER APPLY)?",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>APPLY</b> lets you call a <b>table-valued function for each row</b>. <b>CROSS APPLY</b> = like INNER JOIN (only matching). <b>OUTER APPLY</b> = like LEFT JOIN (all rows, NULL if no match).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Get top 3 orders for EACH customer</span><br><span class="kw">SELECT</span> c.Name, o.OrderDate, o.Total<br><span class="kw">FROM</span> Customers c<br><span class="kw">CROSS APPLY</span> (<br>&nbsp;&nbsp;<span class="kw">SELECT TOP</span> 3 OrderDate, Total<br>&nbsp;&nbsp;<span class="kw">FROM</span> Orders <span class="kw">WHERE</span> CustomerId = c.Id <span class="cm">-- references outer!</span><br>&nbsp;&nbsp;<span class="kw">ORDER BY</span> OrderDate <span class="kw">DESC</span><br>) o;<br><span class="cm">-- CROSS APPLY: only customers WITH orders</span><br><span class="cm">-- OUTER APPLY: ALL customers (NULL if no orders)</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">APPLY</span> evaluates a table expression for each row of the outer table. <span class="key">CROSS APPLY</span> returns only rows with results (like INNER JOIN). <span class="key">OUTER APPLY</span> returns all rows with NULLs for no match (like LEFT JOIN). Use for: top-N per group, calling table-valued functions per row, splitting strings."</p>'},
{q:"What is the Execution Plan? How do you read and optimize it?",l:"a",a:'<h4>🎯 Simple Answer</h4><p>An <b>Execution Plan</b> shows <b>HOW SQL Server runs your query</b> — which indexes it uses, how it joins tables, where it scans. Like an X-ray of your query performance.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Show estimated plan</span><br><span class="kw">SET SHOWPLAN_XML ON</span>;<br><br><span class="cm">-- Show actual plan (in SSMS: Ctrl+M)</span><br><span class="cm">-- Or click "Include Actual Execution Plan"</span><br><br><span class="cm">-- Key things to look for:</span><br><span class="cm">-- ✅ Index Seek = GOOD (targeted lookup)</span><br><span class="cm">-- ❌ Table Scan = BAD (reads every row!)</span><br><span class="cm">-- ❌ Index Scan = OK but Seek is better</span><br><span class="cm">-- ❌ Key Lookup = needs covering index</span><br><span class="cm">-- ⚠️ Sort = expensive, consider index</span><br><span class="cm">-- ⚠️ High cost % = focus optimization here</span><br><br><span class="cm">-- Quick text plan</span><br><span class="kw">SET STATISTICS IO ON</span>; <span class="cm">-- shows logical reads</span><br><span class="kw">SET STATISTICS TIME ON</span>; <span class="cm">-- shows CPU time</span></div><h4>🗣️ Interview Answer</h4><p>"The <span class="key">Execution Plan</span> shows the query optimizer\'s strategy. Look for: <span class="key">Index Seek</span> (good), <span class="key">Table/Index Scan</span> (bad — add index), <span class="key">Key Lookup</span> (add covering index), high-cost operators. Use SET STATISTICS IO to check logical reads. Lower reads = faster query. Enable in SSMS with Ctrl+M."</p>'},
{q:"What is Dynamic SQL? Explain sp_executesql vs EXEC.",l:"a",a:'<h4>🎯 Simple Answer</h4><p><b>Dynamic SQL</b> = building SQL queries as <b>strings at runtime</b>. <b>sp_executesql</b> = parameterized (safe). <b>EXEC</b> = string concatenation (SQL injection risk!).</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- ❌ EXEC: SQL injection risk!</span><br><span class="kw">DECLARE</span> @sql NVARCHAR(500);<br><span class="kw">SET</span> @sql = <span class="str">\'SELECT * FROM Employee WHERE Name = \"\'</span> + @name + <span class="str">\'\"\' </span>;<br><span class="kw">EXEC</span>(@sql); <span class="cm">-- ❌ dangerous! @name could be malicious</span><br><br><span class="cm">-- ✅ sp_executesql: parameterized, safe!</span><br><span class="kw">DECLARE</span> @sql NVARCHAR(500) = <span class="str">\'SELECT * FROM Employee WHERE Name = @n\'</span>;<br><span class="kw">EXEC</span> sp_executesql @sql, N<span class="str">\'@n VARCHAR(50)\'</span>, @n = @name;<br><span class="cm">-- ✅ parameterized, no injection, plan reuse!</span></div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Dynamic SQL</span> builds queries at runtime. <span class="key">sp_executesql</span> supports parameters — prevents SQL injection and allows execution plan reuse. <span class="key">EXEC()</span> uses string concatenation — vulnerable to injection, no plan reuse. Always prefer sp_executesql. Use dynamic SQL for dynamic table names, column names, or search conditions."</p>'},
// Advanced
{q:"How do you optimize slow-running SQL queries? Explain your approach.",l:"e",a:'<h4>🎯 Simple Answer</h4><p>Optimizing slow queries is a <b>step-by-step process</b>: find the problem, check execution plan, add indexes, rewrite query. Like diagnosing a sick patient — check symptoms first, then treat.</p><h4>💻 Step-by-Step Approach</h4><div class="code"><span class="cm">-- Step 1: Find slow queries</span><br><span class="kw">SET STATISTICS IO ON</span>; <span class="cm">-- check logical reads</span><br><span class="kw">SET STATISTICS TIME ON</span>; <span class="cm">-- check CPU time</span><br><br><span class="cm">-- Step 2: Check Execution Plan (Ctrl+M in SSMS)</span><br><span class="cm">-- Look for: Table Scan ❌, Key Lookup ❌, Sort ⚠️</span><br><br><span class="cm">-- Step 3: Add missing indexes</span><br><span class="kw">CREATE INDEX</span> IX_Emp_Dept <span class="kw">ON</span> Employee(DeptId) INCLUDE(Name, Salary);<br><br><span class="cm">-- Step 4: Rewrite query</span><br><span class="cm">-- ❌ SELECT * → ✅ SELECT only needed columns</span><br><span class="cm">-- ❌ Correlated subquery → ✅ JOIN</span><br><span class="cm">-- ❌ Functions on WHERE column → ✅ Move to other side</span><br><span class="cm">-- ❌ WHERE YEAR(Date) = 2024 → ✅ WHERE Date >= \'2024-01-01\'</span><br><br><span class="cm">-- Step 5: Use pagination</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">ORDER BY</span> Id<br><span class="kw">OFFSET</span> 0 <span class="kw">ROWS FETCH NEXT</span> 20 <span class="kw">ROWS ONLY</span>;</div><h4>🗣️ Interview Answer</h4><p>"My approach: 1) <span class="key">SET STATISTICS IO/TIME</span> to measure. 2) Check <span class="key">Execution Plan</span> for scans and lookups. 3) Add <span class="key">indexes</span> (covering indexes). 4) Rewrite: avoid SELECT *, avoid functions on WHERE columns, replace subqueries with JOINs. 5) Add <span class="key">pagination</span>. 6) Consider <span class="key">caching</span> for frequently accessed data."</p>'},
{q:"What is Query Store? How does it help performance tuning?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Query Store</b> is a built-in feature that <b>records query history, execution plans, and performance stats</b> over time. Like a flight recorder for your database — you can see what happened and when queries got slow.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Enable Query Store</span><br><span class="kw">ALTER DATABASE</span> MyDb <span class="kw">SET</span> QUERY_STORE = ON;<br><br><span class="cm">-- Configure</span><br><span class="kw">ALTER DATABASE</span> MyDb <span class="kw">SET</span> QUERY_STORE (<br>&nbsp;&nbsp;OPERATION_MODE = READ_WRITE,<br>&nbsp;&nbsp;DATA_FLUSH_INTERVAL_SECONDS = 900,<br>&nbsp;&nbsp;MAX_STORAGE_SIZE_MB = 1024<br>);<br><br><span class="cm">-- Find top resource-consuming queries</span><br><span class="kw">SELECT TOP</span> 10 qt.query_sql_text, rs.avg_duration, rs.avg_logical_io_reads<br><span class="kw">FROM</span> sys.query_store_query_text qt<br><span class="kw">JOIN</span> sys.query_store_query q <span class="kw">ON</span> qt.query_text_id = q.query_text_id<br><span class="kw">JOIN</span> sys.query_store_plan p <span class="kw">ON</span> q.query_id = p.query_id<br><span class="kw">JOIN</span> sys.query_store_runtime_stats rs <span class="kw">ON</span> p.plan_id = rs.plan_id<br><span class="kw">ORDER BY</span> rs.avg_duration <span class="kw">DESC</span>;<br><br><span class="cm">-- Force a good plan</span><br><span class="kw">EXEC</span> sp_query_store_force_plan @query_id = 1, @plan_id = 5;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Query Store</span> captures query text, execution plans, and runtime stats over time. Benefits: identify <span class="key">regressed queries</span> (got slower), compare plan changes, <span class="key">force a good plan</span> when optimizer picks a bad one. Available in SSMS under Database > Query Store reports. Essential for production performance monitoring."</p>'},
{q:"What is Partitioning in SQL Server? Range vs Hash?",l:"e",a:'<h4>🎯 Simple Answer</h4><p><b>Partitioning</b> splits a <b>large table into smaller pieces</b> (partitions) while still appearing as one table. Queries only scan relevant partitions — much faster for huge tables.</p><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Range Partitioning: split by date ranges</span><br><span class="cm">-- Partition 1: Orders before 2023</span><br><span class="cm">-- Partition 2: Orders 2023</span><br><span class="cm">-- Partition 3: Orders 2024</span><br><br><span class="cm">-- 1. Create partition function</span><br><span class="kw">CREATE PARTITION FUNCTION</span> pf_OrderDate(DATE)<br><span class="kw">AS RANGE RIGHT FOR VALUES</span> (<span class="str">\'2023-01-01\'</span>, <span class="str">\'2024-01-01\'</span>);<br><br><span class="cm">-- 2. Create partition scheme</span><br><span class="kw">CREATE PARTITION SCHEME</span> ps_OrderDate<br><span class="kw">AS PARTITION</span> pf_OrderDate <span class="kw">ALL TO</span> ([PRIMARY]);<br><br><span class="cm">-- 3. Create table on partition scheme</span><br><span class="kw">CREATE TABLE</span> Orders (<br>&nbsp;&nbsp;Id INT, OrderDate DATE, Total DECIMAL<br>) <span class="kw">ON</span> ps_OrderDate(OrderDate);<br><br><span class="cm">-- Query only scans 2024 partition!</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Orders <span class="kw">WHERE</span> OrderDate >= <span class="str">\'2024-01-01\'</span>;</div><h4>🗣️ Interview Answer</h4><p>"<span class="key">Partitioning</span> divides large tables into smaller segments. <span class="key">Range partitioning</span> splits by value ranges (dates, IDs) — most common in SQL Server. Queries benefit from <span class="key">partition elimination</span> — only relevant partitions are scanned. Also helps with maintenance (rebuild one partition) and archiving (switch old partitions out)."</p>'},
