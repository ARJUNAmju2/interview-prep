<script>
const DATA={
oops:[
// Basics
{q:"What is Object-Oriented Programming? What are its four pillars?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; OOP is a programming approach where we organize code using objects.<br>&#9733; It has 4 pillars: <span class="key">Encapsulation</span> hides internal data, <span class="key">Inheritance</span> allows reusing parent class code, <span class="key">Polymorphism</span> lets same method behave differently, and <span class="key">Abstraction</span> shows only essential details.</div><h4>📦 Four Pillars of OOP</h4><svg viewBox="0 0 440 200" style="max-width:440px"><rect x="10" y="10" width="420" height="45" rx="8" fill="#0ea5e9" /><text x="220" y="38" text-anchor="middle" fill="#fff" font-weight="700" font-size="16">OOP - 4 Pillars</text><rect x="10" y="70" width="100" height="120" rx="8" fill="#10b981" /><text x="60" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Encapsulation</text><text x="60" y="118" text-anchor="middle" fill="#d1fae5" font-size="9">Hide data</text><text x="60" y="133" text-anchor="middle" fill="#d1fae5" font-size="9">inside class</text><text x="60" y="170" text-anchor="middle" font-size="22">🔒</text><rect x="120" y="70" width="100" height="120" rx="8" fill="#f59e0b" /><text x="170" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Inheritance</text><text x="170" y="118" text-anchor="middle" fill="#fef3c7" font-size="9">Child gets</text><text x="170" y="133" text-anchor="middle" fill="#fef3c7" font-size="9">parent features</text><text x="170" y="170" text-anchor="middle" font-size="22">👨‍👦</text><rect x="230" y="70" width="100" height="120" rx="8" fill="#8b5cf6" /><text x="280" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Polymorphism</text><text x="280" y="118" text-anchor="middle" fill="#ede9fe" font-size="9">Same name</text><text x="280" y="133" text-anchor="middle" fill="#ede9fe" font-size="9">different work</text><text x="280" y="170" text-anchor="middle" font-size="22">🎭</text><rect x="340" y="70" width="90" height="120" rx="8" fill="#ef4444" /><text x="385" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Abstraction</text><text x="385" y="118" text-anchor="middle" fill="#fecaca" font-size="9">Show only</text><text x="385" y="133" text-anchor="middle" fill="#fecaca" font-size="9">what is needed</text><text x="385" y="170" text-anchor="middle" font-size="22">🎨</text></svg><div class="tip">💡 <b>Tip:</b> Your Project Example: Encapsulation = Ticket data hidden behind AssignTicket() method in Helpdesk. Inheritance = BaseController in MVC .NET Core Audit Module. Polymorphism = Different ticket types (Hardware/Software) processed differently. Abstraction = ITicketService interface hides implementation.</div>'},
{q:"What is a Class and what is an Object? How are they related?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Class</span> is a blueprint that defines properties and methods.<br>&#9733; An <span class="key">Object</span> is an instance of that class created using the <b>new</b> keyword.<br>&#9733; One class can create many objects, each with different data.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Car {<br>&nbsp;&nbsp;<span class="kw">public string</span> Color;<br>&nbsp;&nbsp;<span class="kw">public void</span> Drive() { }<br>}<br><br><span class="cm">// Creating Objects</span><br>Car myCar = <span class="kw">new</span> Car(); <span class="cm">// Object 1</span><br>Car yourCar = <span class="kw">new</span> Car(); <span class="cm">// Object 2</span></div><div class="tip">💡 <b>Key Point:</b> Class = Template (no memory), Object = Real thing (occupies memory)</div>'},
{q:"What is Encapsulation? Why is it important?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Encapsulation means <span class="key">hiding internal data</span> using private fields and exposing only whats needed through <span class="key">public properties/methods</span>.<br>&#9733; It protects data from invalid access and gives us control over how data is read or modified.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> BankAccount {<br>&nbsp;&nbsp;<span class="kw">private decimal</span> _balance; <span class="cm">// Hidden!</span><br><br>&nbsp;&nbsp;<span class="kw">public decimal</span> Balance {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">get</span> { <span class="kw">return</span> _balance; }<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public void</span> Deposit(<span class="kw">decimal</span> amt) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(amt > 0) _balance += amt;<br>&nbsp;&nbsp;}<br>}</div><div class="tip">💡 <b>Your Project Example:</b> In your Store Module, the stock quantity field is private - users can only update stock through AddStock() and TransferStock() methods that validate the data. Like an ATM machine — you can withdraw money but cant directly access the vault. The machine controls the process.</div>'},
{q:"What is Inheritance? What are the types of inheritance in C#?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Inheritance allows a <span class="key">child class to reuse</span> properties and methods of a parent class using the <b>:</b> symbol.<br>&#9733; C# supports Single, Multilevel, and Hierarchical inheritance.<br>&#9733; Multiple inheritance is achieved through <span class="key">Interfaces</span>.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal { <span class="cm">// Parent</span><br>&nbsp;&nbsp;<span class="kw">public string</span> Name;<br>&nbsp;&nbsp;<span class="kw">public void</span> Eat() =&gt; Console.WriteLine(<span class="str">"Eating"</span>);<br>}<br><br><span class="kw">class</span> Dog : Animal { <span class="cm">// Child inherits Animal</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Bark() =&gt; Console.WriteLine(<span class="str">"Woof!"</span>);<br>}<br><br>Dog d = <span class="kw">new</span> Dog();<br>d.Name = <span class="str">"Buddy"</span>; <span class="cm">// From Animal ✅</span><br>d.Eat(); <span class="cm">// From Animal ✅</span><br>d.Bark(); <span class="cm">// Own method ✅</span></div><h4>📋 Types in C#</h4><p><span class="key">Single</span> A → B &nbsp; <span class="key">Multilevel</span> A → B → C &nbsp; <span class="key">Hierarchical</span> A → B, A → C</p><p>⚠️ C# does <b>NOT</b> support Multiple Inheritance with classes (use Interfaces instead)</p>'},
{q:"What is Polymorphism? What are its types?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Polymorphism means one name, many forms.<br>&#9733; <span class="key">Compile-time</span> polymorphism is achieved through <b>Method Overloading</b> (same name, different parameters).<br>&#9733; <span class="key">Run-time</span> polymorphism is achieved through <b>Method Overriding</b> using virtual and override keywords.</div><h4>💻 Overloading (Compile-Time)</h4><div class="code"><span class="kw">class</span> Calculator {<br>&nbsp;&nbsp;<span class="kw">public int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a + b;<br>&nbsp;&nbsp;<span class="kw">public int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b, <span class="kw">int</span> c) =&gt; a+b+c;<br>}</div><h4>💻 Overriding (Run-Time)</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() =&gt; Console.WriteLine(<span class="str">"..."</span>);<br>}<br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Woof!"</span>);<br>}</div><div class="tip">💡 <b>Key Difference:</b> Overloading = same class, different params | Overriding = parent-child, same params, different body</div>'},
{q:"What is Abstraction? How is it achieved in C#?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Abstraction means <span class="key">hiding complex implementation</span> and showing only essential features.<br>&#9733; In C# it is achieved using <span class="key">Abstract Classes</span> (partial abstraction - can have both abstract and normal methods) and <span class="key">Interfaces</span> (full abstraction - only method signatures).</div><h4>💻 Achieved using Abstract Class</h4><div class="code"><span class="kw">abstract class</span> Shape {<br>&nbsp;&nbsp;<span class="kw">public abstract double</span> Area(); <span class="cm">// No body - child MUST implement</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Display() =&gt; Console.WriteLine(<span class="str">"I am a shape"</span>);<br>}<br><br><span class="kw">class</span> Circle : Shape {<br>&nbsp;&nbsp;<span class="kw">public double</span> Radius;<br>&nbsp;&nbsp;<span class="kw">public override double</span> Area() =&gt; 3.14 * Radius * Radius;<br>}</div><h4>💻 Achieved using Interface</h4><div class="code"><span class="kw">interface</span> IPayment {<br>&nbsp;&nbsp;<span class="kw">void</span> Pay(<span class="kw">decimal</span> amount); <span class="cm">// Only declaration</span><br>}<br><br><span class="kw">class</span> CreditCard : IPayment {<br>&nbsp;&nbsp;<span class="kw">public void</span> Pay(<span class="kw">decimal</span> amount) { <span class="cm">// Implementation</span> }<br>}</div><div class="tip">💡 <b>Key Difference:</b> Encapsulation = hiding DATA (private fields) | Abstraction = hiding IMPLEMENTATION (abstract methods)</div>'},
{q:"What is the difference between a Class and a Struct?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Class</span> is a reference type stored in Heap, supports inheritance, and can be null.<br>&#9733; <span class="key">Struct</span> is a value type stored in Stack, does not support inheritance, and cannot be null.<br>&#9733; Use struct for small data like Point, Color.<br>&#9733; Use class for complex objects like Employee, Order.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> PersonClass { <span class="kw">public string</span> Name; }<br><span class="kw">struct</span> PersonStruct { <span class="kw">public string</span> Name; }<br><br><span class="cm">// Class = Reference (both point to SAME object)</span><br>PersonClass a = <span class="kw">new</span> PersonClass { Name = <span class="str">"Arjun"</span> };<br>PersonClass b = a;<br>b.Name = <span class="str">"Ravi"</span>;<br>Console.WriteLine(a.Name); <span class="cm">// "Ravi" 😱 Changed!</span><br><br><span class="cm">// Struct = Value (each has OWN copy)</span><br>PersonStruct x = <span class="kw">new</span> PersonStruct { Name = <span class="str">"Arjun"</span> };<br>PersonStruct y = x;<br>y.Name = <span class="str">"Ravi"</span>;<br>Console.WriteLine(x.Name); <span class="cm">// "Arjun" ✅ Safe!</span></div><div class="tip">💡 <b>When to use Struct:</b> Small size (under 16 bytes), no need for inheritance, immutable data. Examples: DateTime, int, bool are all structs!</div>'},
{q:"What are Access Modifiers? Explain public, private, protected, internal.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Access modifiers control visibility.<br>&#9733; <span class="key">public</span> = accessible everywhere, <span class="key">private</span> = only within the same class, <span class="key">protected</span> = same class and derived classes, <span class="key">internal</span> = same assembly/project.<br>&#9733; Default for class members is private, default for classes is internal.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Employee {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name; <span class="cm">// Anyone can access</span><br>&nbsp;&nbsp;<span class="kw">private decimal</span> _salary; <span class="cm">// Only this class</span><br>&nbsp;&nbsp;<span class="kw">protected int</span> Age; <span class="cm">// This class + children</span><br>&nbsp;&nbsp;<span class="kw">internal string</span> Dept; <span class="cm">// Same project only</span><br>}<br><br><span class="kw">class</span> Manager : Employee {<br>&nbsp;&nbsp;<span class="kw">void</span> Test() {<br>&nbsp;&nbsp;&nbsp;&nbsp;Name = <span class="str">"OK"</span>; <span class="cm">// ✅ public</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Age = 30; <span class="cm">// ✅ protected (child class)</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// _salary = 100; // ❌ private - ERROR!</span><br>&nbsp;&nbsp;}<br>}</div><div class="tip">💡 <b>Interview Trick Question:</b> What is the default access modifier? Class members = private, Top-level class = internal</div>'},
{q:"What is the difference between private and protected?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">private</span> members are accessible only within the same class.<br>&#9733; <span class="key">protected</span> members are accessible within the same class AND in derived (child) classes.<br>&#9733; Both are NOT accessible from outside the class hierarchy.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">private string</span> _secret = <span class="str">"hidden"</span>; <span class="cm">// Only Animal can see</span><br>&nbsp;&nbsp;<span class="kw">protected string</span> _name = <span class="str">"Buddy"</span>; <span class="cm">// Animal + children can see</span><br>}<br><br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">void</span> Test() {<br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(_name); <span class="cm">// ✅ protected - works!</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// Console.WriteLine(_secret); // ❌ private - ERROR!</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="kw">class</span> Program {<br>&nbsp;&nbsp;<span class="kw">void</span> Test() {<br>&nbsp;&nbsp;&nbsp;&nbsp;Dog d = <span class="kw">new</span> Dog();<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// d._name; // ❌ protected - not accessible outside</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// d._secret; // ❌ private - not accessible outside</span><br>&nbsp;&nbsp;}<br>}</div><div class="tip">💡 <b>Remember:</b> private = 🔒 My room, only I enter | protected = 🏠 Family room, my kids can also enter | Both are hidden from outsiders!</div>'},
{q:"What is a Constructor? What are the types of constructors?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Constructor</span> is a special method with the same name as the class, no return type, and it runs automatically when an object is created.<br>&#9733; Types: <span class="key">Default</span> (no params), <span class="key">Parameterized</span> (with params), <span class="key">Static</span> (runs once for the class, used for static initialization), <span class="key">Private</span> (prevents object creation, used in Singleton pattern), and <span class="key">Copy</span> (creates object from another object).</div><h4>💻 Code Examples</h4><div class="code"><span class="cm">// 1. Default Constructor</span><br><span class="kw">class</span> Car {<br>&nbsp;&nbsp;<span class="kw">public</span> Car() { Console.WriteLine(<span class="str">"Car created!"</span>); }<br>}<br><br><span class="cm">// 2. Parameterized Constructor</span><br><span class="kw">class</span> Car {<br>&nbsp;&nbsp;<span class="kw">public string</span> Color;<br>&nbsp;&nbsp;<span class="kw">public</span> Car(<span class="kw">string</span> color) { Color = color; }<br>}<br>Car c = <span class="kw">new</span> Car(<span class="str">"Red"</span>);<br><br><span class="cm">// 3. Static Constructor - runs ONCE</span><br><span class="kw">class</span> Config {<br>&nbsp;&nbsp;<span class="kw">static</span> Config() { Console.WriteLine(<span class="str">"Loaded once"</span>); }<br>}<br><br><span class="cm">// 4. Private Constructor - Singleton</span><br><span class="kw">class</span> DB {<br>&nbsp;&nbsp;<span class="kw">private</span> DB() { }<br>&nbsp;&nbsp;<span class="kw">public static</span> DB Instance = <span class="kw">new</span> DB();<br>}</div><div class="tip">💡 <b>Trick Question:</b> If you create a parameterized constructor, C# will NOT auto-generate a default constructor. You must write it yourself if needed!</div>'},
{q:"What is a Destructor/Finalizer in C#?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Destructor</span> uses ~ClassName() syntax, has no parameters, no access modifier, no return type, and cannot be called manually.<br>&#9733; It is called by the <span class="key">Garbage Collector</span> when the object is no longer needed.<br>&#9733; In modern C#, prefer <span class="key">IDisposable</span> pattern with using statement instead of destructors.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> FileHandler {<br>&nbsp;&nbsp;<span class="kw">private</span> StreamReader _reader;<br><br>&nbsp;&nbsp;<span class="kw">public</span> FileHandler(<span class="kw">string</span> path) {<br>&nbsp;&nbsp;&nbsp;&nbsp;_reader = <span class="kw">new</span> StreamReader(path);<br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="cm">// Destructor / Finalizer</span><br>&nbsp;&nbsp;~FileHandler() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_reader?.Close(); <span class="cm">// cleanup</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(<span class="str">"Destroyed!"</span>);<br>&nbsp;&nbsp;}<br>}</div><div class="tip">💡 <b>Best Practice:</b> Use IDisposable + using statement instead of destructors. Destructors are unpredictable — you dont know WHEN GC will call them!</div>'},
{q:"What is the difference between this and base keyword?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">this</span> refers to the current class instance — used to access current class members and for constructor chaining with this().<br>&#9733; <span class="key">base</span> refers to the parent class — used to call parent constructor with base() and access parent methods with base.Method().</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name;<br>&nbsp;&nbsp;<span class="kw">public</span> Animal(<span class="kw">string</span> name) { Name = name; }<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() =&gt; Console.WriteLine(<span class="str">"..."</span>);<br>}<br><br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public string</span> Breed;<br><br>&nbsp;&nbsp;<span class="cm">// base() calls parent constructor</span><br>&nbsp;&nbsp;<span class="kw">public</span> Dog(<span class="kw">string</span> name, <span class="kw">string</span> breed) : <span class="kw">base</span>(name) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">this</span>.Breed = breed; <span class="cm">// this = current Dog</span><br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">base</span>.Speak(); <span class="cm">// calls Animal.Speak()</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(<span class="str">"Woof!"</span>); <span class="cm">// then adds own</span><br>&nbsp;&nbsp;}<br>}</div>'},
{q:"What is a Static Class? When would you use it?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Static Class</span> cannot be instantiated or inherited.<br>&#9733; All members must be static.<br>&#9733; Used for <span class="key">utility/helper methods</span> like Math, Console, Convert.<br>&#9733; It is sealed implicitly.<br>&#9733; Use when you need stateless helper functions that dont need object state.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">static class</span> MathHelper {<br>&nbsp;&nbsp;<span class="kw">public static double</span> PI = 3.14159;<br><br>&nbsp;&nbsp;<span class="kw">public static int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a + b;<br>&nbsp;&nbsp;<span class="kw">public static int</span> Max(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a &gt; b ? a : b;<br>}<br><br><span class="cm">// Use directly - no new keyword!</span><br><span class="kw">int</span> sum = MathHelper.Add(5, 3);<br>Console.WriteLine(MathHelper.PI);<br><br><span class="cm">// MathHelper obj = new MathHelper(); // ❌ ERROR!</span></div>'},
{q:"What is the difference between a Static method and an Instance method?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Static methods</span> belong to the class, called with ClassName.Method(), cannot access instance members, shared across all instances.<br>&#9733; <span class="key">Instance methods</span> belong to an object, need new keyword first, can access both static and instance members.<br>&#9733; Static for utility functions, instance for object-specific behavior.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Calculator {<br>&nbsp;&nbsp;<span class="kw">public int</span> Value; <span class="cm">// instance field</span><br><br>&nbsp;&nbsp;<span class="cm">// Instance method - needs object</span><br>&nbsp;&nbsp;<span class="kw">public void</span> AddToValue(<span class="kw">int</span> n) { Value += n; }<br><br>&nbsp;&nbsp;<span class="cm">// Static method - no object needed</span><br>&nbsp;&nbsp;<span class="kw">public static int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a + b;<br>}<br><br><span class="cm">// Static - call with class name</span><br><span class="kw">int</span> sum = Calculator.Add(5, 3); <span class="cm">// ✅ no object</span><br><br><span class="cm">// Instance - need object first</span><br>Calculator calc = <span class="kw">new</span> Calculator();<br>calc.AddToValue(10); <span class="cm">// ✅ needs object</span></div>'},
{q:"What is a Partial Class? When is it useful?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Partial Class</span> splits a class definition across multiple files using the <b>partial</b> keyword.<br>&#9733; All parts merge at compile time.<br>&#9733; Used in: <span class="key">auto-generated code</span> (EF models, WinForms designer), large classes, and team collaboration where multiple developers work on the same class.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// File1: Employee.cs</span><br><span class="kw">partial class</span> Employee {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name { <span class="kw">get</span>; <span class="kw">set</span>; }<br>&nbsp;&nbsp;<span class="kw">public void</span> Work() =&gt; Console.WriteLine(<span class="str">"Working"</span>);<br>}<br><br><span class="cm">// File2: Employee.Validation.cs</span><br><span class="kw">partial class</span> Employee {<br>&nbsp;&nbsp;<span class="kw">public bool</span> IsValid() =&gt; !<span class="kw">string</span>.IsNullOrEmpty(Name);<br>}<br><br><span class="cm">// At compile time = ONE class with all members!</span><br><span class="kw">var</span> emp = <span class="kw">new</span> Employee();<br>emp.Work(); <span class="cm">// from File1</span><br>emp.IsValid(); <span class="cm">// from File2</span></div>'},
// Intermediate
{q:"What is the difference between Method Overloading and Method Overriding?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Overloading</span> is compile-time polymorphism — same name, different parameters in the same class.<br>&#9733; <span class="key">Overriding</span> is runtime polymorphism — same name and parameters, child class redefines parent method using virtual/override keywords.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// OVERLOADING - same class, different params</span><br><span class="kw">class</span> Calculator {<br>&nbsp;&nbsp;<span class="kw">public int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b) =&gt; a + b;<br>&nbsp;&nbsp;<span class="kw">public int</span> Add(<span class="kw">int</span> a, <span class="kw">int</span> b, <span class="kw">int</span> c) =&gt; a+b+c; <span class="cm">// different params</span><br>&nbsp;&nbsp;<span class="kw">public double</span> Add(<span class="kw">double</span> a, <span class="kw">double</span> b) =&gt; a+b; <span class="cm">// different type</span><br>}<br><br><span class="cm">// OVERRIDING - parent-child, same params</span><br><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() =&gt; Console.WriteLine(<span class="str">"..."</span>);<br>}<br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Woof!"</span>);<br>}</div>'},
{q:"What is Method Hiding using the new keyword? How is it different from Overriding?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Override</span> replaces the parent method — child version always runs regardless of reference type.<br>&#9733; <span class="key">new (hiding)</span> creates a separate method — which version runs depends on the reference type, not the object type.<br>&#9733; Override is polymorphic, hiding is not.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Animal"</span>);<br>}<br><br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Dog"</span>);<br>}<br><span class="kw">class</span> Cat : Animal {<br>&nbsp;&nbsp;<span class="kw">public new void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Cat"</span>); <span class="cm">// hiding!</span><br>}<br><br>Animal d = <span class="kw">new</span> Dog();<br>d.Speak(); <span class="cm">// "Dog" ✅ override = child version</span><br><br>Animal c = <span class="kw">new</span> Cat();<br>c.Speak(); <span class="cm">// "Animal" 😱 new = parent version (reference is Animal)</span><br><br>Cat c2 = <span class="kw">new</span> Cat();<br>c2.Speak(); <span class="cm">// "Cat" ✅ (reference is Cat)</span></div>'},
{q:"What is the difference between Abstract Class and Interface?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Abstract class</span> can have fields, constructors, implemented methods, and abstract methods.<br>&#9733; Only single inheritance.<br>&#9733; <span class="key">Interface</span> defines only method signatures (C# 8+ allows default implementations).<br>&#9733; Supports multiple inheritance.<br>&#9733; Use abstract class for IS-A with shared code, interface for CAN-DO capabilities.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Abstract Class - partial implementation</span><br><span class="kw">abstract class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public string</span> Name; <span class="cm">// ✅ can have fields</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Eat() { } <span class="cm">// ✅ implemented method</span><br>&nbsp;&nbsp;<span class="kw">public abstract void</span> Speak(); <span class="cm">// ✅ abstract method</span><br>}<br><br><span class="cm">// Interface - only contract</span><br><span class="kw">interface</span> IFlyable {<br>&nbsp;&nbsp;<span class="kw">void</span> Fly(); <span class="cm">// only signature</span><br>}<br><span class="kw">interface</span> ISwimmable {<br>&nbsp;&nbsp;<span class="kw">void</span> Swim();<br>}<br><br><span class="cm">// Class can inherit ONE abstract + MULTIPLE interfaces</span><br><span class="kw">class</span> Duck : Animal, IFlyable, ISwimmable {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Speak() =&gt; Console.WriteLine(<span class="str">"Quack"</span>);<br>&nbsp;&nbsp;<span class="kw">public void</span> Fly() =&gt; Console.WriteLine(<span class="str">"Flying"</span>);<br>&nbsp;&nbsp;<span class="kw">public void</span> Swim() =&gt; Console.WriteLine(<span class="str">"Swimming"</span>);<br>}</div>'},
{q:"When would you use an Abstract Class vs an Interface?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Use <span class="key">Abstract Class</span> when you have shared implementation code and IS-A relationship (Dog is an Animal).<br>&#9733; Use <span class="key">Interface</span> when unrelated classes need same capability (Duck and Airplane both can fly).<br>&#9733; Also use interface when you need multiple inheritance.</div><h4>💻 Real Example</h4><div class="code"><span class="cm">// Abstract Class: Dog IS-A Animal (shared code)</span><br><span class="kw">abstract class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public void</span> Breathe() { } <span class="cm">// shared code for ALL animals</span><br>&nbsp;&nbsp;<span class="kw">public abstract void</span> Speak(); <span class="cm">// each animal speaks differently</span><br>}<br><br><span class="cm">// Interface: Duck CAN fly, Fish CAN swim</span><br><span class="cm">// Flying and Swimming are capabilities, not identity</span><br><span class="kw">interface</span> IFlyable { <span class="kw">void</span> Fly(); }<br><span class="kw">interface</span> ISwimmable { <span class="kw">void</span> Swim(); }<br><br><span class="cm">// Duck IS-A Animal + CAN fly + CAN swim</span><br><span class="kw">class</span> Duck : Animal, IFlyable, ISwimmable { ... }<br><br><span class="cm">// Airplane is NOT an animal but CAN fly</span><br><span class="kw">class</span> Airplane : IFlyable { ... }</div>'},
{q:"What is a Sealed Class? Why would you seal a class?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Sealed Class</span> prevents inheritance using the sealed keyword.<br>&#9733; Reasons: <span class="key">Security</span> (prevent tampering), <span class="key">Performance</span> (JIT can optimize sealed classes), <span class="key">Design</span> (class not designed for extension).<br>&#9733; You can also seal individual methods to stop further overriding.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">sealed class</span> PaymentProcessor {<br>&nbsp;&nbsp;<span class="kw">public void</span> Process() { <span class="cm">// secure logic</span> }<br>}<br><br><span class="cm">// class HackedProcessor : PaymentProcessor { } // ❌ ERROR!</span><br><span class="cm">// Cannot inherit from sealed class</span><br><br><span class="cm">// Sealed method (seal specific method, not whole class)</span><br><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public virtual void</span> Speak() { }<br>}<br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="kw">public sealed override void</span> Speak() { } <span class="cm">// no further override!</span><br>}</div>'},
{q:"What is the difference between Shallow Copy and Deep Copy?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Shallow Copy</span> copies value types but shares reference type members — changes to nested objects affect both.<br>&#9733; <span class="key">Deep Copy</span> creates completely independent copies of all nested objects.<br>&#9733; Use MemberwiseClone() for shallow, manual copy or serialization for deep.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Shallow Copy - nested objects are SHARED</span><br><span class="kw">var</span> original = <span class="kw">new</span> Person { Name=<span class="str">"Arjun"</span>, Address=<span class="kw">new</span> Address{City=<span class="str">"Delhi"</span>} };<br><span class="kw">var</span> shallow = (Person)original.MemberwiseClone();<br>shallow.Address.City = <span class="str">"Mumbai"</span>;<br>Console.WriteLine(original.Address.City); <span class="cm">// "Mumbai" 😱 changed!</span><br><br><span class="cm">// Deep Copy - everything is independent</span><br><span class="kw">var</span> deep = <span class="kw">new</span> Person {<br>&nbsp;&nbsp;Name = original.Name,<br>&nbsp;&nbsp;Address = <span class="kw">new</span> Address { City = original.Address.City }<br>};<br>deep.Address.City = <span class="str">"Chennai"</span>;<br>Console.WriteLine(original.Address.City); <span class="cm">// "Mumbai" ✅ safe!</span></div>'},
{q:"What is Constructor Chaining? How does it work with this() and base()?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Constructor Chaining</span> is calling one constructor from another to avoid code duplication.<br>&#9733; <span class="key">this()</span> calls another constructor in the same class.<br>&#9733; <span class="key">base()</span> calls the parent class constructor.<br>&#9733; The chained constructor runs first, then the calling constructor body.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Animal {<br>&nbsp;&nbsp;<span class="kw">public</span> Animal(<span class="kw">string</span> name) { Console.WriteLine(<span class="str">"Animal: "</span> + name); }<br>}<br><br><span class="kw">class</span> Dog : Animal {<br>&nbsp;&nbsp;<span class="cm">// this() chains to another Dog constructor</span><br>&nbsp;&nbsp;<span class="kw">public</span> Dog() : <span class="kw">this</span>(<span class="str">"Unknown"</span>, <span class="str">"Mixed"</span>) { }<br><br>&nbsp;&nbsp;<span class="cm">// base() chains to Animal constructor</span><br>&nbsp;&nbsp;<span class="kw">public</span> Dog(<span class="kw">string</span> name, <span class="kw">string</span> breed) : <span class="kw">base</span>(name) {<br>&nbsp;&nbsp;&nbsp;&nbsp;Console.WriteLine(<span class="str">"Dog: "</span> + breed);<br>&nbsp;&nbsp;}<br>}<br><br><span class="kw">var</span> d = <span class="kw">new</span> Dog(); <span class="cm">// calls Dog() → Dog(name,breed) → Animal(name)</span></div>'},
{q:"What is the Diamond Problem? How does C# handle it?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">Diamond Problem</span> is ambiguity when a class inherits the same method from two parents.<br>&#9733; C# prevents this by allowing only <span class="key">single class inheritance</span>.<br>&#9733; Multiple inheritance is achieved through <span class="key">interfaces</span>, and ambiguity is resolved using <span class="key">explicit interface implementation</span>.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Diamond Problem (NOT possible in C#)</span><br><span class="cm">// class A { void Show() {} }</span><br><span class="cm">// class B : A { void Show() {} }</span><br><span class="cm">// class C : A { void Show() {} }</span><br><span class="cm">// class D : B, C { } // ❌ Which Show()? AMBIGUOUS!</span><br><br><span class="cm">// C# Solution: Use Interfaces</span><br><span class="kw">interface</span> IFlyable { <span class="kw">void</span> Move(); }<br><span class="kw">interface</span> ISwimmable { <span class="kw">void</span> Move(); }<br><br><span class="kw">class</span> Duck : IFlyable, ISwimmable {<br>&nbsp;&nbsp;<span class="cm">// Explicit implementation resolves ambiguity</span><br>&nbsp;&nbsp;<span class="kw">void</span> IFlyable.Move() =&gt; Console.WriteLine(<span class="str">"Flying"</span>);<br>&nbsp;&nbsp;<span class="kw">void</span> ISwimmable.Move() =&gt; Console.WriteLine(<span class="str">"Swimming"</span>);<br>}</div>'},
{q:"What is Explicit Interface Implementation? When do you need it?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Explicit Interface Implementation</span> uses InterfaceName.Method() syntax without access modifier.<br>&#9733; Needed when two interfaces have same method name, or when you want to hide interface methods from the class public API.<br>&#9733; Can only be called through the interface reference.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> IPrinter { <span class="kw">void</span> Print(); }<br><span class="kw">interface</span> ILogger { <span class="kw">void</span> Print(); }<br><br><span class="kw">class</span> Document : IPrinter, ILogger {<br>&nbsp;&nbsp;<span class="cm">// Explicit - specify which interface</span><br>&nbsp;&nbsp;<span class="kw">void</span> IPrinter.Print() =&gt; Console.WriteLine(<span class="str">"Printing doc"</span>);<br>&nbsp;&nbsp;<span class="kw">void</span> ILogger.Print() =&gt; Console.WriteLine(<span class="str">"Logging"</span>);<br>}<br><br>Document doc = <span class="kw">new</span> Document();<br><span class="cm">// doc.Print(); // ❌ cannot call directly!</span><br>((IPrinter)doc).Print(); <span class="cm">// "Printing doc" ✅</span><br>((ILogger)doc).Print(); <span class="cm">// "Logging" ✅</span></div>'},
{q:"What is the difference between Aggregation and Composition?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Both are HAS-A relationships.<br>&#9733; <span class="key">Aggregation</span> is weak — child can exist independently (Department-Student).<br>&#9733; <span class="key">Composition</span> is strong — child cannot exist without parent (House-Room).<br>&#9733; In composition, parent creates and owns the child object.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Aggregation - Student exists without Department</span><br><span class="kw">class</span> Department {<br>&nbsp;&nbsp;<span class="kw">public</span> List&lt;Student&gt; Students; <span class="cm">// students exist independently</span><br>}<br><br><span class="cm">// Composition - Room dies with House</span><br><span class="kw">class</span> House {<br>&nbsp;&nbsp;<span class="kw">private</span> List&lt;Room&gt; _rooms;<br>&nbsp;&nbsp;<span class="kw">public</span> House() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_rooms = <span class="kw">new</span> List&lt;Room&gt; { <span class="kw">new</span> Room() }; <span class="cm">// created inside</span><br>&nbsp;&nbsp;}<br>} <span class="cm">// House destroyed = Rooms destroyed too!</span></div>'},
{q:"What is the difference between Composition and Inheritance?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Inheritance</span> is IS-A, creates tight coupling, and C# allows only single inheritance.<br>&#9733; <span class="key">Composition</span> is HAS-A, creates loose coupling, and allows combining multiple behaviors.<br>&#9733; The principle <b>Favor Composition over Inheritance</b> promotes flexibility and follows SOLID principles.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Inheritance: tightly coupled</span><br><span class="kw">class</span> Animal { <span class="kw">public void</span> Eat() { } }<br><span class="kw">class</span> Dog : Animal { } <span class="cm">// Dog IS-A Animal</span><br><br><span class="cm">// Composition: flexible, loosely coupled</span><br><span class="kw">class</span> Engine { <span class="kw">public void</span> Start() { } }<br><span class="kw">class</span> Car {<br>&nbsp;&nbsp;<span class="kw">private</span> Engine _engine = <span class="kw">new</span> Engine(); <span class="cm">// Car HAS-A Engine</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Start() =&gt; _engine.Start();<br>}<br><span class="cm">// Can easily swap Engine with ElectricEngine!</span></div>'},
{q:"What is Operator Overloading? Give an example.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Operator Overloading</span> defines custom behavior for operators on user-defined types using the <b>operator</b> keyword.<br>&#9733; Must be public static.<br>&#9733; Some operators must be overloaded in pairs (== and !=).<br>&#9733; Cannot overload &&, ||, =.<br>&#9733; Common use: mathematical types, money, vectors.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> Money {<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Amount;<br>&nbsp;&nbsp;<span class="kw">public</span> Money(<span class="kw">decimal</span> amt) { Amount = amt; }<br><br>&nbsp;&nbsp;<span class="cm">// Overload + operator</span><br>&nbsp;&nbsp;<span class="kw">public static</span> Money <span class="kw">operator</span> +(Money a, Money b)<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; <span class="kw">new</span> Money(a.Amount + b.Amount);<br><br>&nbsp;&nbsp;<span class="kw">public static bool operator</span> ==(Money a, Money b)<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; a.Amount == b.Amount;<br>&nbsp;&nbsp;<span class="kw">public static bool operator</span> !=(Money a, Money b)<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; a.Amount != b.Amount;<br>}<br><br>Money m1 = <span class="kw">new</span> Money(100);<br>Money m2 = <span class="kw">new</span> Money(200);<br>Money total = m1 + m2; <span class="cm">// 300 ✅ works!</span></div>'},
{q:"What are Generics? Why are they important in OOP?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Generics</span> provide type-safe, reusable code using type parameters &lt;T&gt;.<br>&#9733; Benefits: <span class="key">type safety</span> (compile-time checking), <span class="key">no boxing/unboxing</span> (performance), <span class="key">code reuse</span> (one class for all types).<br>&#9733; Examples: List&lt;T&gt;, Dictionary&lt;K,V&gt;, IEnumerable&lt;T&gt;.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Without Generics - need separate classes!</span><br><span class="kw">class</span> IntList { <span class="kw">public void</span> Add(<span class="kw">int</span> item) { } }<br><span class="kw">class</span> StringList { <span class="kw">public void</span> Add(<span class="kw">string</span> item) { } }<br><br><span class="cm">// With Generics - ONE class for ALL types!</span><br><span class="kw">class</span> MyList&lt;T&gt; {<br>&nbsp;&nbsp;<span class="kw">private</span> T[] _items = <span class="kw">new</span> T[10];<br>&nbsp;&nbsp;<span class="kw">public void</span> Add(T item) { }<br>&nbsp;&nbsp;<span class="kw">public</span> T Get(<span class="kw">int</span> index) =&gt; _items[index];<br>}<br><br>MyList&lt;<span class="kw">int</span>&gt; nums = <span class="kw">new</span> MyList&lt;<span class="kw">int</span>&gt;();<br>MyList&lt;<span class="kw">string</span>&gt; names = <span class="kw">new</span> MyList&lt;<span class="kw">string</span>&gt;();</div>'},
{q:"What are Generic Constraints? Explain where T : class, new(), etc.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Generic Constraints</span> limit the types that can be used as type arguments.<br>&#9733; <span class="key">where T : class</span> (reference types), <span class="key">struct</span> (value types), <span class="key">new()</span> (must have parameterless constructor), <span class="key">BaseClass</span> (must inherit), <span class="key">IInterface</span> (must implement).<br>&#9733; Multiple constraints can be combined.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// where T : class - only reference types</span><br><span class="kw">class</span> Repo&lt;T&gt; <span class="kw">where</span> T : <span class="kw">class</span> { }<br><br><span class="cm">// where T : struct - only value types</span><br><span class="kw">class</span> Box&lt;T&gt; <span class="kw">where</span> T : <span class="kw">struct</span> { }<br><br><span class="cm">// where T : new() - must have parameterless constructor</span><br><span class="kw">class</span> Factory&lt;T&gt; <span class="kw">where</span> T : <span class="kw">new</span>() { T obj = <span class="kw">new</span> T(); }<br><br><span class="cm">// where T : BaseClass - must inherit from BaseClass</span><br><span class="kw">class</span> AnimalShelter&lt;T&gt; <span class="kw">where</span> T : Animal { }<br><br><span class="cm">// where T : IInterface - must implement interface</span><br><span class="kw">class</span> Sorter&lt;T&gt; <span class="kw">where</span> T : IComparable&lt;T&gt; { }<br><br><span class="cm">// Multiple constraints</span><br><span class="kw">class</span> Service&lt;T&gt; <span class="kw">where</span> T : <span class="kw">class</span>, IEntity, <span class="kw">new</span>() { }</div>'},
{q:"What is Covariance and Contravariance?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Covariance</span> (out keyword) allows using a more derived type as output — IEnumerable&lt;Dog&gt; can be assigned to IEnumerable&lt;Animal&gt;.<br>&#9733; <span class="key">Contravariance</span> (in keyword) allows using a less derived type as input.<br>&#9733; Covariance for return types, contravariance for parameter types.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Covariance (out) - return more specific type</span><br>IEnumerable&lt;Animal&gt; animals = <span class="kw">new</span> List&lt;Dog&gt;(); <span class="cm">// ✅ Dog is Animal</span><br><br><span class="cm">// Contravariance (in) - accept less specific type</span><br>Action&lt;Dog&gt; dogAction = (Animal a) =&gt; { }; <span class="cm">// ✅ Animal handler works for Dog</span><br><br><span class="cm">// Custom interface</span><br><span class="kw">interface</span> IProducer&lt;<span class="kw">out</span> T&gt; { T Create(); } <span class="cm">// covariant</span><br><span class="kw">interface</span> IConsumer&lt;<span class="kw">in</span> T&gt; { <span class="kw">void</span> Process(T item); } <span class="cm">// contravariant</span></div>'},
{q:"What is the difference between IEnumerable, ICollection, and IList?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">IEnumerable</span> supports only forward iteration (foreach).<br>&#9733; <span class="key">ICollection</span> adds Count, Add, Remove, Contains.<br>&#9733; <span class="key">IList</span> adds index-based access and Insert.<br>&#9733; Use the most restrictive interface needed — IEnumerable for read-only, IList when you need full access.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// IEnumerable - just iterate (read-only)</span><br>IEnumerable&lt;<span class="kw">int</span>&gt; nums = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;{1,2,3};<br><span class="kw">foreach</span>(<span class="kw">var</span> n <span class="kw">in</span> nums) { } <span class="cm">// ✅ can iterate</span><br><span class="cm">// nums.Add(4); // ❌ no Add method</span><br><br><span class="cm">// ICollection - iterate + add/remove + count</span><br>ICollection&lt;<span class="kw">int</span>&gt; col = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;{1,2,3};<br>col.Add(4); <span class="cm">// ✅</span><br>col.Count; <span class="cm">// ✅</span><br><br><span class="cm">// IList - everything + index access</span><br>IList&lt;<span class="kw">int</span>&gt; list = <span class="kw">new</span> List&lt;<span class="kw">int</span>&gt;{1,2,3};<br>list[0] = 10; <span class="cm">// ✅ index access</span><br>list.Insert(1, 99); <span class="cm">// ✅ insert at position</span></div>'},
{q:"What are Extension Methods? How do they follow Open/Closed Principle?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Extension Methods</span> add methods to existing types without modifying source code.<br>&#9733; Defined in a static class with <b>this</b> keyword on the first parameter.<br>&#9733; They follow <span class="key">Open/Closed Principle</span> — classes are open for extension but closed for modification.<br>&#9733; LINQ is built entirely on extension methods!</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Extension method for string class</span><br><span class="kw">public static class</span> StringExtensions {<br>&nbsp;&nbsp;<span class="kw">public static bool</span> IsEmail(<span class="kw">this string</span> str) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> str.Contains(<span class="str">"@"</span>) &amp;&amp; str.Contains(<span class="str">"."</span>);<br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">public static string</span> ToTitleCase(<span class="kw">this string</span> str) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> CultureInfo.CurrentCulture.TextInfo.ToTitleCase(str);<br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Use like a normal method!</span><br><span class="str">"arjun@email.com"</span>.IsEmail(); <span class="cm">// true ✅</span><br><span class="str">"hello world"</span>.ToTitleCase(); <span class="cm">// "Hello World" ✅</span></div>'},
{q:"What is the difference between Coupling and Cohesion?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Coupling</span> is the degree of dependency between classes — aim for LOW coupling using interfaces and DI.<br>&#9733; <span class="key">Cohesion</span> is how focused a class is on a single responsibility — aim for HIGH cohesion.<br>&#9733; Low coupling + high cohesion = maintainable, testable code.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// HIGH Coupling (bad) - directly depends on SqlConnection</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private</span> SqlConnection _db = <span class="kw">new</span> SqlConnection(); <span class="cm">// ❌ tight</span><br>}<br><br><span class="cm">// LOW Coupling (good) - depends on interface</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private</span> IDatabase _db; <span class="cm">// ✅ loose, can swap</span><br>&nbsp;&nbsp;<span class="kw">public</span> OrderService(IDatabase db) { _db = db; }<br>}<br><br><span class="cm">// HIGH Cohesion (good) - one responsibility</span><br><span class="kw">class</span> EmailService { <span class="cm">// only email stuff</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Send() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> Validate() { }<br>}<br><br><span class="cm">// LOW Cohesion (bad) - does everything</span><br><span class="kw">class</span> GodClass { <span class="cm">// email + payment + logging ❌</span> }</div>'},
// Advanced / Design
{q:"What are the SOLID Principles? Explain each with example.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; SOLID principles are: <span class="key">SRP</span> — one class, one reason to change.<br>&#9733; <span class="key">OCP</span> — extend behavior without modifying existing code.<br>&#9733; <span class="key">LSP</span> — subtypes must be substitutable for base types.<br>&#9733; <span class="key">ISP</span> — clients shouldnt depend on methods they dont use.<br>&#9733; <span class="key">DIP</span> — high-level modules depend on abstractions, not details.</div><h4>💻 Quick Summary</h4><div class="code"><span class="kw">S</span> - Single Responsibility: One class = one job<br><span class="kw">O</span> - Open/Closed: Open for extension, closed for modification<br><span class="kw">L</span> - Liskov Substitution: Child can replace parent without breaking<br><span class="kw">I</span> - Interface Segregation: Many small interfaces &gt; one fat interface<br><span class="kw">D</span> - Dependency Inversion: Depend on abstractions, not concrete classes</div>'},
{q:"What is Single Responsibility Principle (SRP)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">SRP</span> states a class should have only one reason to change.<br>&#9733; Separate concerns into different classes — business logic, data access, and notifications should be in separate classes.<br>&#9733; This makes code easier to test, maintain, and modify.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - one class does everything</span><br><span class="kw">class</span> Employee {<br>&nbsp;&nbsp;<span class="kw">public void</span> CalculateSalary() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> SaveToDatabase() { } <span class="cm">// ❌ DB logic here?</span><br>&nbsp;&nbsp;<span class="kw">public void</span> SendEmail() { } <span class="cm">// ❌ Email logic here?</span><br>}<br><br><span class="cm">// ✅ GOOD - each class has one job</span><br><span class="kw">class</span> Employee { <span class="kw">public decimal</span> CalculateSalary() { } }<br><span class="kw">class</span> EmployeeRepository { <span class="kw">public void</span> Save(Employee e) { } }<br><span class="kw">class</span> EmailService { <span class="kw">public void</span> Send(<span class="kw">string</span> to) { } }</div>'},
{q:"What is Open/Closed Principle (OCP)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">OCP</span> means extend behavior by adding new classes/methods, not by modifying existing code.<br>&#9733; Achieved through <span class="key">abstraction</span>, <span class="key">inheritance</span>, and <span class="key">interfaces</span>.<br>&#9733; This prevents introducing bugs in existing working code.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - modify existing code for each new shape</span><br><span class="kw">class</span> AreaCalculator {<br>&nbsp;&nbsp;<span class="kw">public double</span> Calculate(<span class="kw">object</span> shape) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(shape <span class="kw">is</span> Circle c) <span class="kw">return</span> 3.14 * c.R * c.R;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span>(shape <span class="kw">is</span> Rectangle r) <span class="kw">return</span> r.W * r.H;<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="cm">// add Triangle? modify this class again! ❌</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// ✅ GOOD - extend without modifying</span><br><span class="kw">abstract class</span> Shape { <span class="kw">public abstract double</span> Area(); }<br><span class="kw">class</span> Circle : Shape { <span class="kw">public override double</span> Area() =&gt; 3.14*R*R; }<br><span class="kw">class</span> Rectangle : Shape { <span class="kw">public override double</span> Area() =&gt; W*H; }<br><span class="cm">// Add Triangle? Just create new class! No modification! ✅</span></div>'},
{q:"What is Liskov Substitution Principle (LSP)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">LSP</span> states that objects of a child class should be replaceable for objects of the parent class without breaking the application.<br>&#9733; If a subclass throws exceptions or changes expected behavior, it violates LSP.<br>&#9733; Fix by redesigning the hierarchy.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - Penguin breaks LSP</span><br><span class="kw">class</span> Bird { <span class="kw">public virtual void</span> Fly() { } }<br><span class="kw">class</span> Penguin : Bird {<br>&nbsp;&nbsp;<span class="kw">public override void</span> Fly() { <span class="kw">throw new</span> Exception(<span class="str">"Cant fly!"</span>); } <span class="cm">// ❌ breaks!</span><br>}<br><br><span class="cm">// ✅ GOOD - separate flying and non-flying</span><br><span class="kw">class</span> Bird { <span class="kw">public void</span> Eat() { } }<br><span class="kw">interface</span> IFlyable { <span class="kw">void</span> Fly(); }<br><span class="kw">class</span> Sparrow : Bird, IFlyable { <span class="kw">public void</span> Fly() { } }<br><span class="kw">class</span> Penguin : Bird { } <span class="cm">// no Fly() ✅</span></div>'},
{q:"What is Interface Segregation Principle (ISP)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">ISP</span> states clients should not be forced to depend on interfaces they dont use.<br>&#9733; Split large interfaces into smaller, specific ones.<br>&#9733; This prevents empty or exception-throwing implementations.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - fat interface</span><br><span class="kw">interface</span> IWorker {<br>&nbsp;&nbsp;<span class="kw">void</span> Work();<br>&nbsp;&nbsp;<span class="kw">void</span> Eat();<br>&nbsp;&nbsp;<span class="kw">void</span> Sleep();<br>}<br><span class="kw">class</span> Robot : IWorker {<br>&nbsp;&nbsp;<span class="kw">public void</span> Work() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> Eat() { <span class="kw">throw new</span> Exception(); } <span class="cm">// ❌ robots dont eat!</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Sleep() { <span class="kw">throw new</span> Exception(); } <span class="cm">// ❌</span><br>}<br><br><span class="cm">// ✅ GOOD - small focused interfaces</span><br><span class="kw">interface</span> IWorkable { <span class="kw">void</span> Work(); }<br><span class="kw">interface</span> IFeedable { <span class="kw">void</span> Eat(); }<br><span class="kw">class</span> Human : IWorkable, IFeedable { ... }<br><span class="kw">class</span> Robot : IWorkable { ... } <span class="cm">// only Work! ✅</span></div>'},
{q:"What is Dependency Inversion Principle (DIP)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">DIP</span> states high-level modules should depend on abstractions, not concrete implementations.<br>&#9733; Achieved through <span class="key">Dependency Injection</span> — inject interfaces via constructor.<br>&#9733; This makes code testable (mock interfaces) and flexible (swap implementations).</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// ❌ BAD - depends on concrete class</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private</span> SqlDatabase _db = <span class="kw">new</span> SqlDatabase(); <span class="cm">// ❌ tight coupling</span><br>}<br><br><span class="cm">// ✅ GOOD - depends on abstraction</span><br><span class="kw">interface</span> IDatabase { <span class="kw">void</span> Save(<span class="kw">object</span> data); }<br><span class="kw">class</span> SqlDatabase : IDatabase { ... }<br><span class="kw">class</span> MongoDatabase : IDatabase { ... }<br><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IDatabase _db;<br>&nbsp;&nbsp;<span class="kw">public</span> OrderService(IDatabase db) { _db = db; } <span class="cm">// ✅ inject!</span><br>}</div>'},
{q:"What is Dependency Injection? Explain Constructor, Property, and Method injection.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">DI</span> provides dependencies from outside instead of creating them inside.<br>&#9733; <span class="key">Constructor injection</span> (most common) — via constructor parameter.<br>&#9733; <span class="key">Property injection</span> — via public property.<br>&#9733; <span class="key">Method injection</span> — via method parameter.<br>&#9733; In your Audit Module: AddScoped for DbContext and Repositories (per request), AddSingleton for configuration, AddTransient for email service.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// 1. Constructor Injection (most common ⭐)</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IEmailService _email;<br>&nbsp;&nbsp;<span class="kw">public</span> OrderService(IEmailService email) { _email = email; }<br>}<br><br><span class="cm">// 2. Property Injection</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">public</span> IEmailService Email { <span class="kw">get</span>; <span class="kw">set</span>; } <span class="cm">// set from outside</span><br>}<br><br><span class="cm">// 3. Method Injection</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">public void</span> Process(IEmailService email) { } <span class="cm">// passed per method</span><br>}<br><br><span class="cm">// ASP.NET Core DI registration</span><br>builder.Services.AddScoped&lt;IEmailService, EmailService&gt;();</div>'},
{q:"What is the Singleton Pattern? How do you make it thread-safe?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Singleton</span> restricts a class to one instance using private constructor and static property.<br>&#9733; Thread-safe approaches: <span class="key">Lazy&lt;T&gt;</span> (best), double-check locking, or static readonly field.<br>&#9733; In your Audit Module (MVC .NET Core), you use AddSingleton for configuration services and AddScoped for DbContext in DI.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Thread-safe Singleton</span><br><span class="kw">public sealed class</span> Singleton {<br>&nbsp;&nbsp;<span class="kw">private static readonly</span> Lazy&lt;Singleton&gt; _instance<br>&nbsp;&nbsp;&nbsp;&nbsp;= <span class="kw">new</span> Lazy&lt;Singleton&gt;(() =&gt; <span class="kw">new</span> Singleton());<br><br>&nbsp;&nbsp;<span class="kw">private</span> Singleton() { } <span class="cm">// private constructor!</span><br><br>&nbsp;&nbsp;<span class="kw">public static</span> Singleton Instance =&gt; _instance.Value;<br>}<br><br><span class="cm">// Always same instance</span><br><span class="kw">var</span> a = Singleton.Instance;<br><span class="kw">var</span> b = Singleton.Instance;<br><span class="cm">// a == b → true (same object!)</span></div>'},
{q:"What is the Factory Pattern? Explain Simple Factory vs Abstract Factory.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Simple Factory</span> uses one method to create different objects based on input.<br>&#9733; <span class="key">Factory Method</span> lets subclasses decide which class to instantiate.<br>&#9733; <span class="key">Abstract Factory</span> creates families of related objects.<br>&#9733; Factory pattern promotes loose coupling and follows OCP.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Simple Factory</span><br><span class="kw">class</span> NotificationFactory {<br>&nbsp;&nbsp;<span class="kw">public static</span> INotification Create(<span class="kw">string</span> type) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> type <span class="kw">switch</span> {<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"email"</span> =&gt; <span class="kw">new</span> EmailNotification(),<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="str">"sms"</span> =&gt; <span class="kw">new</span> SmsNotification(),<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;_ =&gt; <span class="kw">throw new</span> ArgumentException()<br>&nbsp;&nbsp;&nbsp;&nbsp;};<br>&nbsp;&nbsp;}<br>}<br><span class="kw">var</span> notif = NotificationFactory.Create(<span class="str">"email"</span>);</div>'},
{q:"What is the Strategy Pattern? Give a real-world example.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Strategy Pattern</span> defines a family of algorithms, encapsulates each one, and makes them interchangeable at runtime.<br>&#9733; The client chooses which strategy to use.<br>&#9733; Follows OCP — add new strategies without modifying existing code.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> IPaymentStrategy { <span class="kw">void</span> Pay(<span class="kw">decimal</span> amount); }<br><span class="kw">class</span> CreditCard : IPaymentStrategy { <span class="kw">public void</span> Pay(<span class="kw">decimal</span> amt) { } }<br><span class="kw">class</span> UPI : IPaymentStrategy { <span class="kw">public void</span> Pay(<span class="kw">decimal</span> amt) { } }<br><br><span class="kw">class</span> Checkout {<br>&nbsp;&nbsp;<span class="kw">private</span> IPaymentStrategy _strategy;<br>&nbsp;&nbsp;<span class="kw">public</span> Checkout(IPaymentStrategy strategy) { _strategy = strategy; }<br>&nbsp;&nbsp;<span class="kw">public void</span> Process(<span class="kw">decimal</span> amt) =&gt; _strategy.Pay(amt);<br>}<br><br><span class="kw">var</span> checkout = <span class="kw">new</span> Checkout(<span class="kw">new</span> UPI()); <span class="cm">// swap strategy!</span></div>'},
{q:"What is the Observer Pattern? How does it relate to Events in C#?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Observer Pattern</span> defines a one-to-many dependency — when the subject changes state, all observers are notified.<br>&#9733; In C#, this is implemented using <span class="key">Events and Delegates</span>.<br>&#9733; The publisher raises the event, subscribers handle it.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// C# Events = Observer Pattern built-in!</span><br><span class="kw">class</span> OrderService {<br>&nbsp;&nbsp;<span class="kw">public event</span> EventHandler&lt;<span class="kw">string</span>&gt; OrderPlaced; <span class="cm">// event</span><br><br>&nbsp;&nbsp;<span class="kw">public void</span> PlaceOrder() {<br>&nbsp;&nbsp;&nbsp;&nbsp;OrderPlaced?.Invoke(<span class="kw">this</span>, <span class="str">"Order #123"</span>); <span class="cm">// notify all!</span><br>&nbsp;&nbsp;}<br>}<br><br><span class="cm">// Subscribers</span><br><span class="kw">var</span> service = <span class="kw">new</span> OrderService();<br>service.OrderPlaced += (s, msg) =&gt; SendEmail(msg); <span class="cm">// subscriber 1</span><br>service.OrderPlaced += (s, msg) =&gt; SendSMS(msg); <span class="cm">// subscriber 2</span><br>service.PlaceOrder(); <span class="cm">// both get notified!</span></div>'},
{q:"What is the Decorator Pattern? When would you use it?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Decorator Pattern</span> wraps an object to add new behavior dynamically without modifying the original class.<br>&#9733; It follows OCP.<br>&#9733; Real examples: Stream decorators in C# (BufferedStream wraps FileStream), middleware in ASP.NET Core.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> ICoffee { <span class="kw">string</span> Description(); <span class="kw">decimal</span> Cost(); }<br><br><span class="kw">class</span> BasicCoffee : ICoffee {<br>&nbsp;&nbsp;<span class="kw">public string</span> Description() =&gt; <span class="str">"Coffee"</span>;<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Cost() =&gt; 50;<br>}<br><br><span class="kw">class</span> MilkDecorator : ICoffee {<br>&nbsp;&nbsp;<span class="kw">private</span> ICoffee _coffee;<br>&nbsp;&nbsp;<span class="kw">public</span> MilkDecorator(ICoffee coffee) { _coffee = coffee; }<br>&nbsp;&nbsp;<span class="kw">public string</span> Description() =&gt; _coffee.Description() + <span class="str">" + Milk"</span>;<br>&nbsp;&nbsp;<span class="kw">public decimal</span> Cost() =&gt; _coffee.Cost() + 20;<br>}<br><br><span class="kw">var</span> coffee = <span class="kw">new</span> MilkDecorator(<span class="kw">new</span> BasicCoffee());<br><span class="cm">// "Coffee + Milk" = 70</span></div>'},
{q:"What is the Adapter Pattern?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Adapter Pattern</span> converts the interface of a class into another interface that clients expect.<br>&#9733; Used when integrating legacy systems, third-party libraries, or incompatible APIs without modifying their source code.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Old system (incompatible)</span><br><span class="kw">class</span> OldPaymentGateway {<br>&nbsp;&nbsp;<span class="kw">public void</span> MakePayment(<span class="kw">string</span> xml) { } <span class="cm">// takes XML!</span><br>}<br><br><span class="cm">// New system expects this interface</span><br><span class="kw">interface</span> IPayment { <span class="kw">void</span> Pay(Order order); }<br><br><span class="cm">// Adapter bridges the gap</span><br><span class="kw">class</span> PaymentAdapter : IPayment {<br>&nbsp;&nbsp;<span class="kw">private</span> OldPaymentGateway _old = <span class="kw">new</span>();<br>&nbsp;&nbsp;<span class="kw">public void</span> Pay(Order order) {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">string</span> xml = ConvertToXml(order); <span class="cm">// convert!</span><br>&nbsp;&nbsp;&nbsp;&nbsp;_old.MakePayment(xml);<br>&nbsp;&nbsp;}<br>}</div>'},
{q:"What is the Repository Pattern? How do you implement it?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Repository Pattern</span> abstracts data access behind an interface.<br>&#9733; Benefits: <span class="key">testability</span> (mock the interface), <span class="key">separation of concerns</span>, and ability to swap data sources.<br>&#9733; In your Preventive Maintenance Module, you use Repository pattern: IVisitRepository for branch visits, IAuditRepository for audit logs - registered in DI with AddScoped.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> IProductRepository {<br>&nbsp;&nbsp;Task&lt;List&lt;Product&gt;&gt; GetAllAsync();<br>&nbsp;&nbsp;Task&lt;Product&gt; GetByIdAsync(<span class="kw">int</span> id);<br>&nbsp;&nbsp;Task AddAsync(Product product);<br>}<br><br><span class="kw">class</span> ProductRepository : IProductRepository {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> AppDbContext _db;<br>&nbsp;&nbsp;<span class="kw">public</span> ProductRepository(AppDbContext db) { _db = db; }<br>&nbsp;&nbsp;<span class="kw">public async</span> Task&lt;List&lt;Product&gt;&gt; GetAllAsync()<br>&nbsp;&nbsp;&nbsp;&nbsp;=&gt; <span class="kw">await</span> _db.Products.ToListAsync();<br>}<br><br><span class="cm">// Controller uses interface, not DbContext!</span><br><span class="kw">class</span> ProductController {<br>&nbsp;&nbsp;<span class="kw">private readonly</span> IProductRepository _repo;<br>}</div>'},
{q:"What is the Unit of Work Pattern?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Unit of Work</span> maintains a list of changes and commits them as a single transaction.<br>&#9733; It coordinates multiple repositories to ensure data consistency.<br>&#9733; In EF Core, DbContext already implements Unit of Work — SaveChanges() commits all tracked changes at once.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">interface</span> IUnitOfWork : IDisposable {<br>&nbsp;&nbsp;IProductRepository Products { <span class="kw">get</span>; }<br>&nbsp;&nbsp;IOrderRepository Orders { <span class="kw">get</span>; }<br>&nbsp;&nbsp;Task&lt;<span class="kw">int</span>&gt; SaveChangesAsync(); <span class="cm">// commit all at once!</span><br>}<br><br><span class="cm">// Usage - multiple repos, one save</span><br><span class="kw">await</span> _uow.Products.AddAsync(product);<br><span class="kw">await</span> _uow.Orders.AddAsync(order);<br><span class="kw">await</span> _uow.SaveChangesAsync(); <span class="cm">// both saved in one transaction!</span></div>'},
{q:"What is the Builder Pattern? When would you use it?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Builder Pattern</span> constructs complex objects step by step using method chaining.<br>&#9733; Each method returns this for fluent syntax.<br>&#9733; Use when constructor has too many parameters or object creation has multiple optional steps.<br>&#9733; Examples: StringBuilder, EF Core Fluent API.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> QueryBuilder {<br>&nbsp;&nbsp;<span class="kw">private string</span> _table, _where, _order;<br>&nbsp;&nbsp;<span class="kw">public</span> QueryBuilder From(<span class="kw">string</span> t) { _table=t; <span class="kw">return this</span>; }<br>&nbsp;&nbsp;<span class="kw">public</span> QueryBuilder Where(<span class="kw">string</span> w) { _where=w; <span class="kw">return this</span>; }<br>&nbsp;&nbsp;<span class="kw">public</span> QueryBuilder OrderBy(<span class="kw">string</span> o) { _order=o; <span class="kw">return this</span>; }<br>&nbsp;&nbsp;<span class="kw">public string</span> Build() =&gt; $<span class="str">"SELECT * FROM {_table} WHERE {_where} ORDER BY {_order}"</span>;<br>}<br><br><span class="kw">var</span> sql = <span class="kw">new</span> QueryBuilder()<br>&nbsp;&nbsp;.From(<span class="str">"Employee"</span>)<br>&nbsp;&nbsp;.Where(<span class="str">"Salary > 50000"</span>)<br>&nbsp;&nbsp;.OrderBy(<span class="str">"Name"</span>)<br>&nbsp;&nbsp;.Build();</div>'},
{q:"What is the Template Method Pattern?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Template Method</span> defines the algorithm structure in a base class method, with abstract steps that subclasses implement.<br>&#9733; The overall flow is fixed, but specific steps are customizable.<br>&#9733; Follows Hollywood Principle: dont call us, we will call you.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">abstract class</span> ReportGenerator {<br>&nbsp;&nbsp;<span class="cm">// Template method - fixed steps</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Generate() {<br>&nbsp;&nbsp;&nbsp;&nbsp;FetchData(); <span class="cm">// step 1</span><br>&nbsp;&nbsp;&nbsp;&nbsp;FormatData(); <span class="cm">// step 2 - child overrides</span><br>&nbsp;&nbsp;&nbsp;&nbsp;Export(); <span class="cm">// step 3 - child overrides</span><br>&nbsp;&nbsp;}<br>&nbsp;&nbsp;<span class="kw">private void</span> FetchData() { <span class="cm">/* common */</span> }<br>&nbsp;&nbsp;<span class="kw">protected abstract void</span> FormatData();<br>&nbsp;&nbsp;<span class="kw">protected abstract void</span> Export();<br>}<br><br><span class="kw">class</span> PdfReport : ReportGenerator {<br>&nbsp;&nbsp;<span class="kw">protected override void</span> FormatData() { <span class="cm">/* PDF format */</span> }<br>&nbsp;&nbsp;<span class="kw">protected override void</span> Export() { <span class="cm">/* save .pdf */</span> }<br>}</div>'},
{q:"What is the difference between Dispose and Finalize? Explain IDisposable.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Dispose</span> is called explicitly by the developer via IDisposable or using statement — deterministic cleanup.<br>&#9733; <span class="key">Finalize</span> (~destructor) is called by GC — non-deterministic, unpredictable timing.<br>&#9733; Always implement IDisposable for unmanaged resources and use the <b>using</b> statement.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">class</span> FileService : IDisposable {<br>&nbsp;&nbsp;<span class="kw">private</span> StreamReader _reader;<br><br>&nbsp;&nbsp;<span class="kw">public void</span> Dispose() {<br>&nbsp;&nbsp;&nbsp;&nbsp;_reader?.Close(); <span class="cm">// clean up NOW</span><br>&nbsp;&nbsp;&nbsp;&nbsp;GC.SuppressFinalize(<span class="kw">this</span>); <span class="cm">// skip finalizer</span><br>&nbsp;&nbsp;}<br><br>&nbsp;&nbsp;~FileService() { Dispose(); } <span class="cm">// backup if Dispose not called</span><br>}<br><br><span class="cm">// Best practice: using statement</span><br><span class="kw">using</span>(<span class="kw">var</span> svc = <span class="kw">new</span> FileService()) {<br>&nbsp;&nbsp;<span class="cm">// use it...</span><br>} <span class="cm">// Dispose() called automatically here!</span></div>'},
{q:"What are Delegates and Events? How do they relate to OOP?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Delegates</span> are type-safe function pointers that enable callback methods and event handling.<br>&#9733; <span class="key">Events</span> are delegates with encapsulation — subscribers can only += or -=, cannot invoke directly.<br>&#9733; They implement the Observer Pattern and enable loose coupling in OOP.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">// Delegate - holds method reference</span><br><span class="kw">delegate void</span> Notify(<span class="kw">string</span> msg);<br><br>Notify n = (msg) =&gt; Console.WriteLine(msg);<br>n(<span class="str">"Hello!"</span>); <span class="cm">// calls the method</span><br><br><span class="cm">// Event - restricted delegate</span><br><span class="kw">class</span> Button {<br>&nbsp;&nbsp;<span class="kw">public event</span> EventHandler Clicked; <span class="cm">// event</span><br>&nbsp;&nbsp;<span class="kw">public void</span> Click() =&gt; Clicked?.Invoke(<span class="kw">this</span>, EventArgs.Empty);<br>}<br><br><span class="kw">var</span> btn = <span class="kw">new</span> Button();<br>btn.Clicked += (s, e) =&gt; Console.WriteLine(<span class="str">"Clicked!"</span>);<br>btn.Click();</div>'},
{q:"What is Domain-Driven Design (DDD)? Explain Entities, Value Objects, Aggregates.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">DDD</span> models software around business domain.<br>&#9733; <span class="key">Entity</span> has unique identity (Order, Customer).<br>&#9733; <span class="key">Value Object</span> has no identity, compared by value (Money, Address).<br>&#9733; <span class="key">Aggregate</span> is a cluster of entities with one root that controls access.<br>&#9733; <span class="key">Bounded Context</span> defines boundaries between different domain models.</div><h4>💻 Key Concepts</h4><div class="code"><span class="cm">// Entity - has unique ID, identity matters</span><br><span class="kw">class</span> Order { <span class="cm">// Order #123 != Order #456</span><br>&nbsp;&nbsp;<span class="kw">public int</span> Id; <span class="cm">// unique identity</span><br>&nbsp;&nbsp;<span class="kw">public</span> List&lt;OrderItem&gt; Items;<br>}<br><br><span class="cm">// Value Object - no ID, value matters</span><br><span class="kw">record</span> Money(<span class="kw">decimal</span> Amount, <span class="kw">string</span> Currency);<br><span class="cm">// Money(100,"INR") == Money(100,"INR") → true (same value)</span><br><br><span class="cm">// Aggregate - cluster of entities treated as one unit</span><br><span class="cm">// Order is the Aggregate Root</span><br><span class="cm">// OrderItems can only be accessed through Order</span></div>'},
{q:"What are Anti-Patterns? Explain God Object, Spaghetti Code.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Anti-patterns</span> are common bad practices.<br>&#9733; <span class="key">God Object</span> violates SRP — one class handles everything.<br>&#9733; <span class="key">Spaghetti Code</span> has no structure, tangled logic, hard to follow.<br>&#9733; Others: Magic Numbers, Copy-Paste Programming, Premature Optimization.<br>&#9733; Fix with SOLID principles and design patterns.</div><h4>💻 Examples</h4><div class="code"><span class="cm">// ❌ God Object - one class does EVERYTHING</span><br><span class="kw">class</span> AppManager {<br>&nbsp;&nbsp;<span class="kw">public void</span> Login() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> SendEmail() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> GenerateReport() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> ProcessPayment() { }<br>&nbsp;&nbsp;<span class="kw">public void</span> ManageInventory() { }<br>&nbsp;&nbsp;<span class="cm">// 5000 lines... impossible to maintain!</span><br>}<br><br><span class="cm">// ❌ Spaghetti Code - tangled, no structure</span><br><span class="cm">// goto statements, deeply nested ifs,</span><br><span class="cm">// no separation of concerns, copy-paste everywhere</span><br><br><span class="cm">// Other anti-patterns:</span><br><span class="cm">// ❌ Magic Numbers: if(status == 3) instead of Status.Active</span><br><span class="cm">// ❌ Copy-Paste Programming: duplicate code everywhere</span><br><span class="cm">// ❌ Golden Hammer: using same tool for everything</span></div>'},
],
csharp:[
// Basics
