// Basics
{q:"What is SQL Server? Difference between SQL Server and MySQL?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">SQL Server</span> is Microsofts RDBMS that uses T-SQL.<br>&#9733; It integrates best with .NET ecosystem and Azure.<br>&#9733; <span class="key">MySQL</span> is open-source by Oracle, popular with PHP/Java.<br>&#9733; Key differences: SQL Server uses T-SQL, MySQL uses standard SQL.<br>&#9733; SQL Server has SSMS, MySQL has Workbench.<br>&#9733; SQL Server is preferred in .NET projects.</div><div class="tip">💡 <b>For .NET interviews:</b> Always say SQL Server is your primary database. Mention Azure SQL for cloud projects!</div>'},
{q:"What are DDL, DML, DCL, TCL commands? Give examples.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">DDL</span> defines database structure (CREATE, ALTER, DROP).<br>&#9733; <span class="key">DML</span> manipulates data (SELECT, INSERT, UPDATE, DELETE).<br>&#9733; <span class="key">DCL</span> controls access permissions (GRANT, REVOKE).<br>&#9733; <span class="key">TCL</span> manages transactions (COMMIT, ROLLBACK, SAVEPOINT).<br>&#9733; DDL is auto-committed, DML can be rolled back.</div>'},
{q:"What is a Primary Key vs Unique Key?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Primary Key</span> uniquely identifies each row, cannot be NULL, only one per table, and creates a clustered index.<br>&#9733; <span class="key">Unique Key</span> also ensures uniqueness but allows one NULL, multiple per table, and creates a non-clustered index.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE TABLE</span> Employee (<br>&nbsp;&nbsp;Id <span class="kw">INT PRIMARY KEY IDENTITY</span>(1,1), <span class="cm">-- PK: one, not null</span><br>&nbsp;&nbsp;Email <span class="kw">VARCHAR</span>(100) <span class="kw">UNIQUE</span>, <span class="cm">-- UK: unique, can be null</span><br>&nbsp;&nbsp;Phone <span class="kw">VARCHAR</span>(15) <span class="kw">UNIQUE</span>, <span class="cm">-- Another UK: allowed!</span><br>&nbsp;&nbsp;Name <span class="kw">VARCHAR</span>(50) <span class="kw">NOT NULL</span><br>);</div>'},
{q:"What is a Foreign Key? Explain cascading actions.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Foreign Key</span> creates a relationship between two tables by referencing the Primary Key of the parent table.<br>&#9733; It ensures <span class="key">referential integrity</span> — you cannot insert invalid references.<br>&#9733; <span class="key">Cascading actions</span>: CASCADE (auto delete/update children), SET NULL, SET DEFAULT, NO ACTION (block).</div><h4>💻 Cascading Actions</h4><div class="code"><span class="kw">CREATE TABLE</span> Employee (<br>&nbsp;&nbsp;EmpId <span class="kw">INT PRIMARY KEY</span>,<br>&nbsp;&nbsp;Name <span class="kw">VARCHAR</span>(50),<br>&nbsp;&nbsp;DeptId <span class="kw">INT</span>,<br>&nbsp;&nbsp;<span class="kw">FOREIGN KEY</span> (DeptId) <span class="kw">REFERENCES</span> Department(DeptId)<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">ON DELETE CASCADE</span> <span class="cm">-- Delete dept = delete employees too</span><br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">ON UPDATE CASCADE</span> <span class="cm">-- Update deptId = auto update here</span><br>);<br><br><span class="cm">-- Other options:</span><br><span class="cm">-- ON DELETE SET NULL (set FK to NULL)</span><br><span class="cm">-- ON DELETE SET DEFAULT (set FK to default)</span><br><span class="cm">-- ON DELETE NO ACTION (block delete if child exists)</span></div>'},
{q:"What are Joins? Explain INNER, LEFT, RIGHT, FULL, CROSS JOIN.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">INNER JOIN</span> returns only matching rows.<br>&#9733; <span class="key">LEFT JOIN</span> returns all left table rows + matching right (NULL if no match).<br>&#9733; <span class="key">RIGHT JOIN</span> is opposite.<br>&#9733; <span class="key">FULL OUTER JOIN</span> returns all rows from both.<br>&#9733; <span class="key">CROSS JOIN</span> returns cartesian product (every combination).<br>&#9733; INNER and LEFT are most commonly used.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- INNER JOIN: only matching</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">INNER JOIN</span> Department d<br><span class="kw">ON</span> e.DeptId = d.DeptId;<br><br><span class="cm">-- LEFT JOIN: all employees even without dept</span><br><span class="kw">SELECT</span> e.Name, d.DeptName<br><span class="kw">FROM</span> Employee e <span class="kw">LEFT JOIN</span> Department d<br><span class="kw">ON</span> e.DeptId = d.DeptId;</div>'},
{q:"What is the difference between WHERE and HAVING?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">WHERE</span> filters individual rows before GROUP BY and cannot use aggregate functions.<br>&#9733; <span class="key">HAVING</span> filters grouped results after GROUP BY and can use aggregate functions like COUNT, SUM, AVG.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">SELECT</span> DeptId, COUNT(*) <span class="kw">as</span> Total<br><span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Salary > 30000 <span class="cm">-- filter rows first</span><br><span class="kw">GROUP BY</span> DeptId<br><span class="kw">HAVING</span> COUNT(*) > 5; <span class="cm">-- then filter groups</span></div>'},
{q:"What is GROUP BY? How does it work with aggregate functions?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">GROUP BY</span> groups rows with same values into summary rows.<br>&#9733; It is used with <span class="key">aggregate functions</span>: COUNT, SUM, AVG, MAX, MIN.<br>&#9733; Every column in SELECT must either be in GROUP BY or inside an aggregate function.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">SELECT</span> Dept, COUNT(*) <span class="kw">as</span> Total, AVG(Salary) <span class="kw">as</span> AvgSal<br><span class="kw">FROM</span> Employee<br><span class="kw">GROUP BY</span> Dept;<br><br><span class="cm">-- COUNT() = rows | SUM() = total | AVG() = average</span><br><span class="cm">-- MAX() = highest | MIN() = lowest</span></div>'},
{q:"What is the difference between DELETE, TRUNCATE, and DROP?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">DELETE</span> is DML, removes specific rows with WHERE, can be rolled back, fires triggers.<br>&#9733; <span class="key">TRUNCATE</span> is DDL, removes all rows, resets identity, faster, no triggers.<br>&#9733; <span class="key">DROP</span> is DDL, removes the entire table including structure.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">DELETE FROM</span> Employee <span class="kw">WHERE</span> DeptId = 3; <span class="cm">-- some rows</span><br><span class="kw">TRUNCATE TABLE</span> Employee; <span class="cm">-- all rows fast</span><br><span class="kw">DROP TABLE</span> Employee; <span class="cm">-- table gone forever!</span></div>'},
{q:"What are Subqueries? Correlated vs Non-Correlated?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Subquery</span> is a query nested inside another.<br>&#9733; <span class="key">Non-correlated</span> runs independently once — faster.<br>&#9733; <span class="key">Correlated</span> references the outer query and runs per row — slower.<br>&#9733; Correlated subqueries can often be replaced with JOINs for better performance.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Non-Correlated: inner runs ONCE</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Salary > (<span class="kw">SELECT</span> AVG(Salary) <span class="kw">FROM</span> Employee);<br><br><span class="cm">-- Correlated: inner runs per EACH row</span><br><span class="kw">SELECT</span> e.Name <span class="kw">FROM</span> Employee e<br><span class="kw">WHERE</span> e.Salary > (<br>&nbsp;&nbsp;<span class="kw">SELECT</span> AVG(Salary) <span class="kw">FROM</span> Employee<br>&nbsp;&nbsp;<span class="kw">WHERE</span> DeptId = e.DeptId <span class="cm">-- references outer!</span><br>);</div>'},
{q:"What is a View? What are its advantages?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">View</span> is a virtual table based on a saved SELECT query.<br>&#9733; Advantages: <span class="key">Security</span> (hide columns), <span class="key">Simplicity</span> (complex joins become simple), <span class="key">Reusability</span>.<br>&#9733; Views dont store data unless its an Indexed View.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE VIEW</span> vw_EmpDetails <span class="kw">AS</span><br><span class="kw">SELECT</span> e.Name, d.DeptName, e.Salary<br><span class="kw">FROM</span> Employee e<br><span class="kw">JOIN</span> Department d <span class="kw">ON</span> e.DeptId = d.DeptId;<br><br><span class="cm">-- Use like a table</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> vw_EmpDetails <span class="kw">WHERE</span> Salary > 50000;</div>'},
{q:"What is the difference between UNION and UNION ALL?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">UNION</span> combines result sets and removes duplicates using a sort/distinct operation — slower.<br>&#9733; <span class="key">UNION ALL</span> keeps all rows including duplicates — faster because no sorting needed.<br>&#9733; Use UNION ALL when you know there are no duplicates or duplicates are acceptable.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- UNION: removes duplicates (slower)</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employees<br><span class="kw">UNION</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Contractors;<br><span class="cm">-- If "Arjun" exists in both, shows ONCE</span><br><br><span class="cm">-- UNION ALL: keeps duplicates (faster)</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Employees<br><span class="kw">UNION ALL</span><br><span class="kw">SELECT</span> Name <span class="kw">FROM</span> Contractors;<br><span class="cm">-- If "Arjun" exists in both, shows TWICE</span></div>'},
{q:"What are Constraints? Explain PK, FK, UNIQUE, CHECK, DEFAULT, NOT NULL.",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">PRIMARY KEY</span> = unique + not null, one per table.<br>&#9733; <span class="key">FOREIGN KEY</span> = links to another table.<br>&#9733; <span class="key">UNIQUE</span> = no duplicates, allows one null.<br>&#9733; <span class="key">CHECK</span> = validates a condition.<br>&#9733; <span class="key">DEFAULT</span> = auto-fills if no value given.<br>&#9733; <span class="key">NOT NULL</span> = must have a value.<br>&#9733; Constraints enforce data integrity at the database level.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE TABLE</span> Employee (<br>&nbsp;&nbsp;Id <span class="kw">INT PRIMARY KEY IDENTITY</span>, <span class="cm">-- PK: unique + not null</span><br>&nbsp;&nbsp;Name <span class="kw">VARCHAR</span>(50) <span class="kw">NOT NULL</span>, <span class="cm">-- must have value</span><br>&nbsp;&nbsp;Email <span class="kw">VARCHAR</span>(100) <span class="kw">UNIQUE</span>, <span class="cm">-- no duplicates</span><br>&nbsp;&nbsp;Age <span class="kw">INT CHECK</span>(Age >= 18 <span class="kw">AND</span> Age <= 65), <span class="cm">-- range rule</span><br>&nbsp;&nbsp;Status <span class="kw">VARCHAR</span>(10) <span class="kw">DEFAULT</span> <span class="str">\'Active\'</span>, <span class="cm">-- auto value</span><br>&nbsp;&nbsp;DeptId <span class="kw">INT FOREIGN KEY REFERENCES</span> Dept(Id) <span class="cm">-- links to Dept</span><br>);</div>'},
{q:"What is IDENTITY column? How does it work?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">IDENTITY(seed, increment)</span> auto-generates sequential numbers.<br>&#9733; Dont include in INSERT — SQL Server fills it.<br>&#9733; Use <span class="key">SCOPE_IDENTITY()</span> to get last generated value (safer than @@IDENTITY).<br>&#9733; IDENTITY values can have gaps after deletes/rollbacks.<br>&#9733; Use DBCC CHECKIDENT to reseed.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">CREATE TABLE</span> Product (<br>&nbsp;&nbsp;Id <span class="kw">INT IDENTITY</span>(1, 1) <span class="kw">PRIMARY KEY</span>, <span class="cm">-- start=1, increment=1</span><br>&nbsp;&nbsp;Name <span class="kw">VARCHAR</span>(50)<br>);<br><br><span class="kw">INSERT INTO</span> Product(Name) <span class="kw">VALUES</span>(<span class="str">\'Laptop\'</span>); <span class="cm">-- Id = 1 (auto)</span><br><span class="kw">INSERT INTO</span> Product(Name) <span class="kw">VALUES</span>(<span class="str">\'Phone\'</span>); <span class="cm">-- Id = 2 (auto)</span><br><br><span class="cm">-- Get last generated identity</span><br><span class="kw">SELECT</span> SCOPE_IDENTITY(); <span class="cm">-- 2 (current scope)</span><br><span class="kw">SELECT</span> @@IDENTITY; <span class="cm">-- 2 (any scope - avoid!)</span><br><br><span class="cm">-- Reset identity</span><br>DBCC CHECKIDENT(<span class="str">\'Product\'</span>, RESEED, 0);</div>'},
{q:"What is the difference between CHAR, VARCHAR, and NVARCHAR?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">CHAR</span> is fixed-length (padded with spaces) — use for fixed codes.<br>&#9733; <span class="key">VARCHAR</span> is variable-length (saves space) — use for English text.<br>&#9733; <span class="key">NVARCHAR</span> is variable + Unicode (2 bytes/char) — use for multi-language support.<br>&#9733; NVARCHAR uses double the storage of VARCHAR.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- CHAR(10): always stores 10 bytes</span><br><span class="kw">DECLARE</span> @c CHAR(10) = <span class="str">\'Hi\'</span>; <span class="cm">-- stored as "Hi        " (padded)</span><br><br><span class="cm">-- VARCHAR(10): stores only what you give</span><br><span class="kw">DECLARE</span> @v VARCHAR(10) = <span class="str">\'Hi\'</span>; <span class="cm">-- stored as "Hi" (2 bytes)</span><br><br><span class="cm">-- NVARCHAR(10): Unicode support (2 bytes per char)</span><br><span class="kw">DECLARE</span> @n NVARCHAR(10) = N<span class="str">\'\u0d39\u0d32\u0d4b\'</span>; <span class="cm">-- Malayalam works! ✅</span><br><br><span class="cm">-- When to use what:</span><br><span class="cm">-- CHAR: fixed-length codes (State = "KL", Gender = "M")</span><br><span class="cm">-- VARCHAR: English text (names, addresses)</span><br><span class="cm">-- NVARCHAR: Multi-language text (Unicode)</span></div>'},
{q:"What is NULL? How does it behave in comparisons and aggregations?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">NULL</span> represents unknown/missing data.<br>&#9733; Use <span class="key">IS NULL / IS NOT NULL</span> for comparisons (not = or !=).<br>&#9733; NULL in arithmetic returns NULL.<br>&#9733; Aggregate functions (SUM, AVG, COUNT) ignore NULLs except COUNT(*).<br>&#9733; Use <span class="key">ISNULL()</span> or <span class="key">COALESCE()</span> to handle NULLs.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- NULL comparisons are TRICKY!</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Emp <span class="kw">WHERE</span> Salary = NULL; <span class="cm">-- ❌ returns NOTHING!</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Emp <span class="kw">WHERE</span> Salary IS NULL; <span class="cm">-- ✅ correct way!</span><br><br>NULL = NULL <span class="cm">-- UNKNOWN (not true!)</span><br>NULL != NULL <span class="cm">-- UNKNOWN</span><br>NULL + 10 <span class="cm">-- NULL (anything + NULL = NULL)</span><br><br><span class="cm">-- Aggregations IGNORE NULLs</span><br><span class="cm">-- Values: 100, NULL, 200</span><br><span class="kw">SELECT</span> AVG(Salary); <span class="cm">-- 150 (ignores NULL, not 100)</span><br><span class="kw">SELECT</span> COUNT(Salary); <span class="cm">-- 2 (ignores NULL)</span><br><span class="kw">SELECT</span> COUNT(*); <span class="cm">-- 3 (counts all rows)</span><br><br><span class="cm">-- Handle NULLs</span><br><span class="kw">SELECT</span> ISNULL(Salary, 0); <span class="cm">-- replace NULL with 0</span><br><span class="kw">SELECT</span> COALESCE(Phone, Email, <span class="str">\'N/A\'</span>); <span class="cm">-- first non-null</span></div>'},
{q:"What is COALESCE and ISNULL? Difference between them?",l:"b",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">ISNULL</span> takes exactly 2 parameters, is SQL Server specific, and uses the first parameters data type.<br>&#9733; <span class="key">COALESCE</span> takes multiple parameters, is ANSI standard (portable), and returns the first non-null value.<br>&#9733; Prefer COALESCE for portability and when checking multiple columns.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- ISNULL: 2 parameters only</span><br><span class="kw">SELECT</span> ISNULL(Phone, <span class="str">\'No Phone\'</span>) <span class="kw">FROM</span> Employee;<br><br><span class="cm">-- COALESCE: multiple parameters, returns first non-null</span><br><span class="kw">SELECT</span> COALESCE(Phone, Mobile, Email, <span class="str">\'No Contact\'</span>) <span class="kw">FROM</span> Employee;<br><span class="cm">-- Checks Phone first, then Mobile, then Email</span><br><span class="cm">-- Returns first one that is NOT null</span><br><br><span class="cm">-- Data type difference</span><br><span class="kw">SELECT</span> ISNULL(NULL, 1); <span class="cm">-- returns INT (follows first param type)</span><br><span class="kw">SELECT</span> COALESCE(NULL, 1); <span class="cm">-- returns INT (highest precedence type)</span></div>'},
// Intermediate
{q:"What is a Stored Procedure? How is it different from a Function?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Procedure</span> can have DML, no mandatory return, called with EXEC, cannot use in SELECT.<br>&#9733; <span class="key">Function</span> MUST return a value, can be used in SELECT/WHERE, should avoid DML.<br>&#9733; Use procedures for actions, functions for calculations.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Stored Procedure</span><br><span class="kw">CREATE PROCEDURE</span> sp_GiveRaise @EmpId INT, @Percent DECIMAL<br><span class="kw">AS BEGIN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> Salary = Salary * (1 + @Percent/100)<br>&nbsp;&nbsp;<span class="kw">WHERE</span> Id = @EmpId;<br><span class="kw">END</span><br>EXEC sp_GiveRaise 101, 10;<br><br><span class="cm">-- Function</span><br><span class="kw">CREATE FUNCTION</span> fn_GetFullName(@Id INT) <span class="kw">RETURNS VARCHAR</span>(100)<br><span class="kw">AS BEGIN</span><br>&nbsp;&nbsp;<span class="kw">DECLARE</span> @name VARCHAR(100);<br>&nbsp;&nbsp;<span class="kw">SELECT</span> @name = FirstName + <span class="str">\' \'</span> + LastName <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Id = @Id;<br>&nbsp;&nbsp;<span class="kw">RETURN</span> @name;<br><span class="kw">END</span><br><span class="kw">SELECT</span> dbo.fn_GetFullName(101); <span class="cm">-- use in SELECT!</span></div>'},
{q:"What are Indexes? Explain Clustered vs Non-Clustered Index.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Clustered index</span> sorts the physical table data — only one per table, PK creates it automatically.<br>&#9733; <span class="key">Non-clustered index</span> is a separate structure with pointers to data — multiple allowed.<br>&#9733; Indexes speed up reads but slow down writes (INSERT/UPDATE must update index too).</div>'},
{q:"What is a Composite Index? When would you use it?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Composite Index</span> covers multiple columns.<br>&#9733; The <span class="key">left-most column rule</span> applies — the index is used only if the query filters on the left-most column(s).<br>&#9733; Order matters: put the most selective column first.<br>&#9733; Use for queries that frequently filter on the same column combination.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Composite index on (LastName, FirstName)</span><br><span class="kw">CREATE INDEX</span> IX_Name <span class="kw">ON</span> Employee(LastName, FirstName);<br><br><span class="cm">-- ✅ Uses index (left-most column first)</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> LastName = <span class="str">\'Kumar\'</span>;<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> LastName = <span class="str">\'Kumar\'</span> <span class="kw">AND</span> FirstName = <span class="str">\'Arjun\'</span>;<br><br><span class="cm">-- ❌ Does NOT use index (skips left-most column!)</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> FirstName = <span class="str">\'Arjun\'</span>;</div>'},
{q:"What is a Covering Index?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Covering Index</span> includes all columns a query needs using the <span class="key">INCLUDE</span> clause.<br>&#9733; SQL Server reads only the index, avoiding expensive Key Lookup to the table.<br>&#9733; Check execution plan — if you see Key Lookup, add missing columns to INCLUDE.<br>&#9733; Dramatically improves read performance.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Query needs: Name, Salary WHERE DeptId = 5</span><br><br><span class="cm">-- Normal index - needs to go back to table for Name, Salary</span><br><span class="kw">CREATE INDEX</span> IX_Dept <span class="kw">ON</span> Employee(DeptId);<br><br><span class="cm">-- Covering index - includes ALL needed columns</span><br><span class="kw">CREATE INDEX</span> IX_Dept_Cover <span class="kw">ON</span> Employee(DeptId)<br>&nbsp;&nbsp;<span class="kw">INCLUDE</span>(Name, Salary); <span class="cm">-- no table lookup needed!</span><br><br><span class="cm">-- This query is fully covered:</span><br><span class="kw">SELECT</span> Name, Salary <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = 5;<br><span class="cm">-- Execution plan shows: Index Seek (no Key Lookup!) ✅</span></div>'},
{q:"What are Window Functions? Explain ROW_NUMBER, RANK, DENSE_RANK, NTILE.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">ROW_NUMBER</span> gives unique sequential numbers (no ties).<br>&#9733; <span class="key">RANK</span> gives same number for ties but skips.<br>&#9733; <span class="key">DENSE_RANK</span> gives same for ties, no skip.<br>&#9733; <span class="key">NTILE(N)</span> divides into N equal groups.<br>&#9733; Use <span class="key">PARTITION BY</span> to restart numbering per group.<br>&#9733; Window functions dont collapse rows like GROUP BY.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- ROW_NUMBER: unique sequential number (no ties)</span><br><span class="kw">SELECT</span> Name, Salary,<br>&nbsp;&nbsp;ROW_NUMBER() OVER(<span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>) <span class="kw">as</span> RowNum<br><span class="kw">FROM</span> Employee;<br><span class="cm">-- 80000=1, 70000=2, 70000=3 (no ties)</span><br><br><span class="cm">-- RANK: same rank for ties, skips next</span><br><span class="cm">-- 80000=1, 70000=2, 70000=2, 60000=4 (skips 3!)</span><br><br><span class="cm">-- DENSE_RANK: same rank for ties, NO skip</span><br><span class="cm">-- 80000=1, 70000=2, 70000=2, 60000=3 (no skip)</span><br><br><span class="cm">-- NTILE(4): divides into 4 equal groups</span><br><span class="cm">-- Group 1, Group 2, Group 3, Group 4</span><br><br><span class="cm">-- PARTITION BY: window per group</span><br>ROW_NUMBER() OVER(<span class="kw">PARTITION BY</span> DeptId <span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>)<br><span class="cm">-- Numbering restarts for each department!</span></div>'},
{q:"What is a CTE (Common Table Expression)? Recursive CTE?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">CTE</span> is a temporary result set using WITH keyword — improves readability, can be referenced multiple times.<br>&#9733; <span class="key">Recursive CTE</span> has an anchor member and recursive member joined by UNION ALL — used for hierarchical data like org charts, category trees, bill of materials.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Simple CTE</span><br><span class="kw">WITH</span> TopEarners <span class="kw">AS</span> (<br>&nbsp;&nbsp;<span class="kw">SELECT</span> Name, Salary, DeptId<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> Salary > 80000<br>)<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> TopEarners <span class="kw">WHERE</span> DeptId = 1;<br><br><span class="cm">-- Recursive CTE: Employee hierarchy</span><br><span class="kw">WITH</span> OrgChart <span class="kw">AS</span> (<br>&nbsp;&nbsp;<span class="cm">-- Anchor: top-level manager</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> Id, Name, ManagerId, 1 <span class="kw">as</span> Level<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee <span class="kw">WHERE</span> ManagerId <span class="kw">IS NULL</span><br><br>&nbsp;&nbsp;<span class="kw">UNION ALL</span><br><br>&nbsp;&nbsp;<span class="cm">-- Recursive: find subordinates</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> e.Id, e.Name, e.ManagerId, o.Level + 1<br>&nbsp;&nbsp;<span class="kw">FROM</span> Employee e <span class="kw">JOIN</span> OrgChart o <span class="kw">ON</span> e.ManagerId = o.Id<br>)<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> OrgChart;</div>'},
{q:"What are Triggers? Explain AFTER, INSTEAD OF triggers.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Triggers</span> auto-execute on DML events.<br>&#9733; <span class="key">AFTER</span> triggers run after the operation — used for auditing, logging.<br>&#9733; <span class="key">INSTEAD OF</span> triggers replace the operation — used for soft deletes, complex view updates.<br>&#9733; Special tables: <span class="key">inserted</span> (new data) and <span class="key">deleted</span> (old data).<br>&#9733; Use sparingly — hidden logic is hard to debug.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- AFTER trigger: log every delete</span><br><span class="kw">CREATE TRIGGER</span> trg_AuditDelete <span class="kw">ON</span> Employee<br><span class="kw">AFTER DELETE AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">INSERT INTO</span> AuditLog(Action, EmpName, DeletedAt)<br>&nbsp;&nbsp;<span class="kw">SELECT</span> <span class="str">\'DELETE\'</span>, Name, GETDATE() <span class="kw">FROM</span> deleted; <span class="cm">-- special table!</span><br><span class="kw">END</span><br><br><span class="cm">-- INSTEAD OF trigger: prevent delete, soft-delete instead</span><br><span class="kw">CREATE TRIGGER</span> trg_SoftDelete <span class="kw">ON</span> Employee<br><span class="kw">INSTEAD OF DELETE AS</span><br><span class="kw">BEGIN</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Employee <span class="kw">SET</span> IsDeleted = 1<br>&nbsp;&nbsp;<span class="kw">WHERE</span> Id <span class="kw">IN</span> (<span class="kw">SELECT</span> Id <span class="kw">FROM</span> deleted);<br>&nbsp;&nbsp;<span class="cm">-- actual DELETE never happens!</span><br><span class="kw">END</span></div>'},
{q:"What is a Temp Table vs Table Variable? When to use which?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Temp tables</span> (#) are in tempdb, support indexes, statistics, and transactions — better for large datasets.<br>&#9733; <span class="key">Table variables</span> (@) are in memory, no statistics, minimal logging — better for small datasets (&lt;1000 rows).<br>&#9733; Temp tables participate in transactions, table variables dont.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Temp Table: large data, supports indexes</span><br><span class="kw">CREATE TABLE</span> #TempEmp (Id INT, Name VARCHAR(50));<br><span class="kw">INSERT INTO</span> #TempEmp <span class="kw">SELECT</span> Id, Name <span class="kw">FROM</span> Employee;<br><span class="kw">CREATE INDEX</span> IX_Temp <span class="kw">ON</span> #TempEmp(Id); <span class="cm">-- ✅ can add index!</span><br><span class="kw">DROP TABLE</span> #TempEmp; <span class="cm">-- or auto-drops when session ends</span><br><br><span class="cm">-- Table Variable: small data, simpler</span><br><span class="kw">DECLARE</span> @TempEmp TABLE (Id INT, Name VARCHAR(50));<br><span class="kw">INSERT INTO</span> @TempEmp <span class="kw">SELECT</span> Id, Name <span class="kw">FROM</span> Employee;<br><span class="cm">-- auto-drops when batch ends</span><br><span class="cm">-- ❌ no explicit indexes (only PK constraint)</span></div>'},
{q:"What is the MERGE statement? How does UPSERT work?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">MERGE</span> performs INSERT, UPDATE, DELETE in one atomic statement based on MATCHED/NOT MATCHED conditions.<br>&#9733; Also called UPSERT.<br>&#9733; Useful for syncing data between tables.<br>&#9733; Always add a semicolon before MERGE and use WITH (HOLDLOCK) for concurrency safety.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">MERGE INTO</span> Products <span class="kw">AS</span> target<br><span class="kw">USING</span> NewProducts <span class="kw">AS</span> source<br><span class="kw">ON</span> target.Id = source.Id<br><br><span class="kw">WHEN MATCHED THEN</span> <span class="cm">-- exists? UPDATE</span><br>&nbsp;&nbsp;<span class="kw">UPDATE SET</span> target.Price = source.Price<br><br><span class="kw">WHEN NOT MATCHED THEN</span> <span class="cm">-- new? INSERT</span><br>&nbsp;&nbsp;<span class="kw">INSERT</span>(Id, Name, Price) <span class="kw">VALUES</span>(source.Id, source.Name, source.Price)<br><br><span class="kw">WHEN NOT MATCHED BY SOURCE THEN</span> <span class="cm">-- removed? DELETE</span><br>&nbsp;&nbsp;<span class="kw">DELETE</span>;</div>'},
{q:"What are Transactions? Explain ACID properties.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Transaction</span> ensures all-or-nothing execution.<br>&#9733; <span class="key">ACID</span>: <span class="key">Atomicity</span> (all succeed or all fail), <span class="key">Consistency</span> (data stays valid), <span class="key">Isolation</span> (concurrent transactions dont interfere), <span class="key">Durability</span> (committed data persists).<br>&#9733; Use BEGIN TRAN, COMMIT, ROLLBACK with TRY-CATCH.</div><h4>💻 Code Example</h4><div class="code"><span class="kw">BEGIN TRANSACTION</span><br><span class="kw">BEGIN TRY</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance - 1000 <span class="kw">WHERE</span> Id = 1; <span class="cm">-- debit</span><br>&nbsp;&nbsp;<span class="kw">UPDATE</span> Account <span class="kw">SET</span> Balance = Balance + 1000 <span class="kw">WHERE</span> Id = 2; <span class="cm">-- credit</span><br>&nbsp;&nbsp;<span class="kw">COMMIT</span>; <span class="cm">-- both succeed ✅</span><br><span class="kw">END TRY</span><br><span class="kw">BEGIN CATCH</span><br>&nbsp;&nbsp;<span class="kw">ROLLBACK</span>; <span class="cm">-- both undo ❌</span><br><span class="kw">END CATCH</span><br><br><span class="cm">-- ACID:</span><br><span class="cm">-- A = Atomicity: all or nothing</span><br><span class="cm">-- C = Consistency: valid state before and after</span><br><span class="cm">-- I = Isolation: transactions dont interfere</span><br><span class="cm">-- D = Durability: committed data survives crash</span></div>'},
{q:"What is Transaction Isolation Level? Explain Read Uncommitted, Read Committed, Repeatable Read, Serializable.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Read Uncommitted</span> — dirty reads allowed (fastest).<br>&#9733; <span class="key">Read Committed</span> — default, only committed data.<br>&#9733; <span class="key">Repeatable Read</span> — prevents non-repeatable reads.<br>&#9733; <span class="key">Serializable</span> — prevents phantom reads (slowest).<br>&#9733; Higher isolation = more consistency but more blocking/deadlocks.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Read Uncommitted: can read dirty (uncommitted) data</span><br><span class="kw">SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED</span>;<br><span class="cm">-- Same as: SELECT * FROM Emp WITH (NOLOCK)</span><br><br><span class="cm">-- Read Committed: only reads committed data (DEFAULT)</span><br><span class="kw">SET TRANSACTION ISOLATION LEVEL READ COMMITTED</span>;<br><br><span class="cm">-- Repeatable Read: locked rows cant change until done</span><br><span class="kw">SET TRANSACTION ISOLATION LEVEL REPEATABLE READ</span>;<br><br><span class="cm">-- Serializable: full lock, no new rows can be inserted</span><br><span class="kw">SET TRANSACTION ISOLATION LEVEL SERIALIZABLE</span>;<br><span class="cm">-- Safest but SLOWEST!</span></div>'},
{q:"What is a Deadlock? How do you prevent and resolve it?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; A <span class="key">Deadlock</span> occurs when two transactions hold locks and wait for each other.<br>&#9733; SQL Server detects it and kills one (victim).<br>&#9733; Prevent by: accessing tables in <span class="key">consistent order</span>, keeping transactions short, using proper indexes, and enabling <span class="key">READ COMMITTED SNAPSHOT</span> isolation.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Transaction A:          Transaction B:</span><br><span class="cm">-- Lock Row 1 ✅           Lock Row 2 ✅</span><br><span class="cm">-- Want Row 2 ⏳ waiting   Want Row 1 ⏳ waiting</span><br><span class="cm">-- DEADLOCK! 💥 SQL Server kills one (victim)</span><br><br><span class="cm">-- Prevention strategies:</span><br><span class="cm">-- 1. Access tables in SAME ORDER in all transactions</span><br><span class="cm">-- 2. Keep transactions SHORT</span><br><span class="cm">-- 3. Use proper indexes (less locking)</span><br><span class="cm">-- 4. Use READ COMMITTED SNAPSHOT</span><br><span class="cm">-- 5. Use NOLOCK for read-only queries (careful!)</span><br><br><span class="cm">-- Set deadlock priority (who gets killed)</span><br><span class="kw">SET DEADLOCK_PRIORITY LOW</span>; <span class="cm">-- this one dies first</span></div>'},
{q:"What is PIVOT and UNPIVOT?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">PIVOT</span> rotates rows to columns using an aggregate function — useful for cross-tab reports.<br>&#9733; <span class="key">UNPIVOT</span> does the reverse — columns to rows.<br>&#9733; PIVOT requires knowing column values in advance.<br>&#9733; For dynamic columns, use dynamic SQL with PIVOT.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Data: Name, Month, Sales</span><br><span class="cm">-- Arjun, Jan, 100</span><br><span class="cm">-- Arjun, Feb, 200</span><br><span class="cm">-- Ravi, Jan, 150</span><br><br><span class="cm">-- PIVOT: months become columns</span><br><span class="kw">SELECT</span> Name, [Jan], [Feb]<br><span class="kw">FROM</span> Sales<br><span class="kw">PIVOT</span> (<br>&nbsp;&nbsp;SUM(Amount) <span class="kw">FOR</span> Month <span class="kw">IN</span> ([Jan], [Feb])<br>) <span class="kw">AS</span> pvt;<br><span class="cm">-- Result: Arjun | 100 | 200</span><br><span class="cm">--         Ravi  | 150 | NULL</span></div>'},
{q:"What is the difference between APPLY (CROSS APPLY vs OUTER APPLY)?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">APPLY</span> evaluates a table expression for each row of the outer table.<br>&#9733; <span class="key">CROSS APPLY</span> returns only rows with results (like INNER JOIN).<br>&#9733; <span class="key">OUTER APPLY</span> returns all rows with NULLs for no match (like LEFT JOIN).<br>&#9733; Use for: top-N per group, calling table-valued functions per row, splitting strings.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Get top 3 orders for EACH customer</span><br><span class="kw">SELECT</span> c.Name, o.OrderDate, o.Total<br><span class="kw">FROM</span> Customers c<br><span class="kw">CROSS APPLY</span> (<br>&nbsp;&nbsp;<span class="kw">SELECT TOP</span> 3 OrderDate, Total<br>&nbsp;&nbsp;<span class="kw">FROM</span> Orders <span class="kw">WHERE</span> CustomerId = c.Id <span class="cm">-- references outer!</span><br>&nbsp;&nbsp;<span class="kw">ORDER BY</span> OrderDate <span class="kw">DESC</span><br>) o;<br><span class="cm">-- CROSS APPLY: only customers WITH orders</span><br><span class="cm">-- OUTER APPLY: ALL customers (NULL if no orders)</span></div>'},
{q:"What is the Execution Plan? How do you read and optimize it?",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; The <span class="key">Execution Plan</span> shows the query optimizer\'s strategy.<br>&#9733; Look for: <span class="key">Index Seek</span> (good), <span class="key">Table/Index Scan</span> (bad — add index), <span class="key">Key Lookup</span> (add covering index), high-cost operators.<br>&#9733; Use SET STATISTICS IO to check logical reads.<br>&#9733; Lower reads = faster query.<br>&#9733; Enable in SSMS with Ctrl+M.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Show estimated plan</span><br><span class="kw">SET SHOWPLAN_XML ON</span>;<br><br><span class="cm">-- Show actual plan (in SSMS: Ctrl+M)</span><br><span class="cm">-- Or click "Include Actual Execution Plan"</span><br><br><span class="cm">-- Key things to look for:</span><br><span class="cm">-- ✅ Index Seek = GOOD (targeted lookup)</span><br><span class="cm">-- ❌ Table Scan = BAD (reads every row!)</span><br><span class="cm">-- ❌ Index Scan = OK but Seek is better</span><br><span class="cm">-- ❌ Key Lookup = needs covering index</span><br><span class="cm">-- ⚠️ Sort = expensive, consider index</span><br><span class="cm">-- ⚠️ High cost % = focus optimization here</span><br><br><span class="cm">-- Quick text plan</span><br><span class="kw">SET STATISTICS IO ON</span>; <span class="cm">-- shows logical reads</span><br><span class="kw">SET STATISTICS TIME ON</span>; <span class="cm">-- shows CPU time</span></div>'},
{q:"What is Dynamic SQL? Explain sp_executesql vs EXEC.",l:"a",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Dynamic SQL</span> builds queries at runtime.<br>&#9733; <span class="key">sp_executesql</span> supports parameters — prevents SQL injection and allows execution plan reuse.<br>&#9733; <span class="key">EXEC()</span> uses string concatenation — vulnerable to injection, no plan reuse.<br>&#9733; Always prefer sp_executesql.<br>&#9733; Use dynamic SQL for dynamic table names, column names, or search conditions.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- ❌ EXEC: SQL injection risk!</span><br><span class="kw">DECLARE</span> @sql NVARCHAR(500);<br><span class="kw">SET</span> @sql = <span class="str">\'SELECT * FROM Employee WHERE Name = \"\'</span> + @name + <span class="str">\'\"\' </span>;<br><span class="kw">EXEC</span>(@sql); <span class="cm">-- ❌ dangerous! @name could be malicious</span><br><br><span class="cm">-- ✅ sp_executesql: parameterized, safe!</span><br><span class="kw">DECLARE</span> @sql NVARCHAR(500) = <span class="str">\'SELECT * FROM Employee WHERE Name = @n\'</span>;<br><span class="kw">EXEC</span> sp_executesql @sql, N<span class="str">\'@n VARCHAR(50)\'</span>, @n = @name;<br><span class="cm">-- ✅ parameterized, no injection, plan reuse!</span></div>'},
// Advanced
{q:"How do you optimize slow-running SQL queries? Explain your approach.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; "My approach: 1) <span class="key">SET STATISTICS IO/TIME</span> to measure. 2) Check <span class="key">Execution Plan</span> for scans and lookups. 3) Add <span class="key">indexes</span> (covering indexes). 4) Rewrite: avoid SELECT *, avoid functions on WHERE columns, replace subqueries with JOINs. 5) Add <span class="key">pagination</span>. 6) Consider <span class="key">caching</span> for frequently accessed data."</div><h4>💻 Step-by-Step Approach</h4><div class="code"><span class="cm">-- Step 1: Find slow queries</span><br><span class="kw">SET STATISTICS IO ON</span>; <span class="cm">-- check logical reads</span><br><span class="kw">SET STATISTICS TIME ON</span>; <span class="cm">-- check CPU time</span><br><br><span class="cm">-- Step 2: Check Execution Plan (Ctrl+M in SSMS)</span><br><span class="cm">-- Look for: Table Scan ❌, Key Lookup ❌, Sort ⚠️</span><br><br><span class="cm">-- Step 3: Add missing indexes</span><br><span class="kw">CREATE INDEX</span> IX_Emp_Dept <span class="kw">ON</span> Employee(DeptId) INCLUDE(Name, Salary);<br><br><span class="cm">-- Step 4: Rewrite query</span><br><span class="cm">-- ❌ SELECT * → ✅ SELECT only needed columns</span><br><span class="cm">-- ❌ Correlated subquery → ✅ JOIN</span><br><span class="cm">-- ❌ Functions on WHERE column → ✅ Move to other side</span><br><span class="cm">-- ❌ WHERE YEAR(Date) = 2024 → ✅ WHERE Date >= \'2024-01-01\'</span><br><br><span class="cm">-- Step 5: Use pagination</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">ORDER BY</span> Id<br><span class="kw">OFFSET</span> 0 <span class="kw">ROWS FETCH NEXT</span> 20 <span class="kw">ROWS ONLY</span>;</div>'},
{q:"What is Query Store? How does it help performance tuning?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Query Store</span> captures query text, execution plans, and runtime stats over time.<br>&#9733; Benefits: identify <span class="key">regressed queries</span> (got slower), compare plan changes, <span class="key">force a good plan</span> when optimizer picks a bad one.<br>&#9733; Available in SSMS under Database > Query Store reports.<br>&#9733; Essential for production performance monitoring.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Enable Query Store</span><br><span class="kw">ALTER DATABASE</span> MyDb <span class="kw">SET</span> QUERY_STORE = ON;<br><br><span class="cm">-- Configure</span><br><span class="kw">ALTER DATABASE</span> MyDb <span class="kw">SET</span> QUERY_STORE (<br>&nbsp;&nbsp;OPERATION_MODE = READ_WRITE,<br>&nbsp;&nbsp;DATA_FLUSH_INTERVAL_SECONDS = 900,<br>&nbsp;&nbsp;MAX_STORAGE_SIZE_MB = 1024<br>);<br><br><span class="cm">-- Find top resource-consuming queries</span><br><span class="kw">SELECT TOP</span> 10 qt.query_sql_text, rs.avg_duration, rs.avg_logical_io_reads<br><span class="kw">FROM</span> sys.query_store_query_text qt<br><span class="kw">JOIN</span> sys.query_store_query q <span class="kw">ON</span> qt.query_text_id = q.query_text_id<br><span class="kw">JOIN</span> sys.query_store_plan p <span class="kw">ON</span> q.query_id = p.query_id<br><span class="kw">JOIN</span> sys.query_store_runtime_stats rs <span class="kw">ON</span> p.plan_id = rs.plan_id<br><span class="kw">ORDER BY</span> rs.avg_duration <span class="kw">DESC</span>;<br><br><span class="cm">-- Force a good plan</span><br><span class="kw">EXEC</span> sp_query_store_force_plan @query_id = 1, @plan_id = 5;</div>'},
{q:"What is Partitioning in SQL Server? Range vs Hash?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Partitioning</span> divides large tables into smaller segments.<br>&#9733; <span class="key">Range partitioning</span> splits by value ranges (dates, IDs) — most common in SQL Server.<br>&#9733; Queries benefit from <span class="key">partition elimination</span> — only relevant partitions are scanned.<br>&#9733; Also helps with maintenance (rebuild one partition) and archiving (switch old partitions out).</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Range Partitioning: split by date ranges</span><br><span class="cm">-- Partition 1: Orders before 2023</span><br><span class="cm">-- Partition 2: Orders 2023</span><br><span class="cm">-- Partition 3: Orders 2024</span><br><br><span class="cm">-- 1. Create partition function</span><br><span class="kw">CREATE PARTITION FUNCTION</span> pf_OrderDate(DATE)<br><span class="kw">AS RANGE RIGHT FOR VALUES</span> (<span class="str">\'2023-01-01\'</span>, <span class="str">\'2024-01-01\'</span>);<br><br><span class="cm">-- 2. Create partition scheme</span><br><span class="kw">CREATE PARTITION SCHEME</span> ps_OrderDate<br><span class="kw">AS PARTITION</span> pf_OrderDate <span class="kw">ALL TO</span> ([PRIMARY]);<br><br><span class="cm">-- 3. Create table on partition scheme</span><br><span class="kw">CREATE TABLE</span> Orders (<br>&nbsp;&nbsp;Id INT, OrderDate DATE, Total DECIMAL<br>) <span class="kw">ON</span> ps_OrderDate(OrderDate);<br><br><span class="cm">-- Query only scans 2024 partition!</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Orders <span class="kw">WHERE</span> OrderDate >= <span class="str">\'2024-01-01\'</span>;</div>'},
{q:"What are Columnstore Indexes? When would you use them?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Columnstore indexes</span> store data column-wise with high compression. 10-100x faster for analytical queries (SUM, AVG on millions of rows) because only needed columns are read.<br>&#9733; Use for <span class="key">data warehousing, reporting, OLAP</span>.<br>&#9733; Not ideal for OLTP (single row operations).<br>&#9733; Can be clustered or non-clustered.</div>'},
{q:"What is Always Encrypted? How does it work?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Always Encrypted</span> encrypts data client-side — database stores only ciphertext.<br>&#9733; Even DBAs and cloud admins cannot read it.<br>&#9733; Two types: <span class="key">Deterministic</span> (allows equality search) and <span class="key">Randomized</span> (more secure, no search).<br>&#9733; Uses Column Master Key (CMK) and Column Encryption Key (CEK).<br>&#9733; Used for PII, SSN, credit cards.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Two encryption types:</span><br><span class="cm">-- 1. Deterministic: same input = same encrypted value</span><br><span class="cm">--    Can be used in WHERE, JOIN, GROUP BY</span><br><span class="cm">-- 2. Randomized: same input = different encrypted value</span><br><span class="cm">--    More secure but cannot search/join</span><br><br><span class="cm">-- Setup in SSMS:</span><br><span class="cm">-- Right-click column > Encrypt Column > Choose type</span><br><br><span class="cm">-- Column definition</span><br><span class="kw">CREATE TABLE</span> Patient (<br>&nbsp;&nbsp;Id INT,<br>&nbsp;&nbsp;Name VARCHAR(50),<br>&nbsp;&nbsp;SSN VARCHAR(11) ENCRYPTED WITH (<br>&nbsp;&nbsp;&nbsp;&nbsp;ENCRYPTION_TYPE = DETERMINISTIC,<br>&nbsp;&nbsp;&nbsp;&nbsp;ALGORITHM = <span class="str">\'AEAD_AES_256_CBC_HMAC_SHA_256\'</span>,<br>&nbsp;&nbsp;&nbsp;&nbsp;COLUMN_ENCRYPTION_KEY = CEK1<br>&nbsp;&nbsp;)<br>);<br><br><span class="cm">-- DBA sees: 0x7E4A... (encrypted gibberish)</span><br><span class="cm">-- App with key sees: 123-45-6789 (actual SSN)</span></div>'},
{q:"What is Row-Level Security (RLS)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">RLS</span> transparently filters rows based on user context using a security predicate function.<br>&#9733; Users query the same table but see only authorized rows.<br>&#9733; Two types: <span class="key">Filter predicate</span> (silently filters rows) and <span class="key">Block predicate</span> (prevents INSERT/UPDATE of unauthorized rows).<br>&#9733; Applied at database level — no app code changes needed.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create filter function</span><br><span class="kw">CREATE FUNCTION</span> fn_SecurityFilter(@DeptId INT)<br><span class="kw">RETURNS TABLE</span><br><span class="kw">WITH</span> SCHEMABINDING<br><span class="kw">AS RETURN</span><br>&nbsp;&nbsp;<span class="kw">SELECT</span> 1 <span class="kw">AS</span> result<br>&nbsp;&nbsp;<span class="kw">WHERE</span> @DeptId = USER_NAME() <span class="cm">-- only your dept!</span><br>&nbsp;&nbsp;<span class="kw">OR</span> USER_NAME() = <span class="str">\'admin\'</span>; <span class="cm">-- admin sees all</span><br><br><span class="cm">-- 2. Create security policy</span><br><span class="kw">CREATE SECURITY POLICY</span> DeptFilter<br>&nbsp;&nbsp;<span class="kw">ADD FILTER PREDICATE</span> fn_SecurityFilter(DeptId) <span class="kw">ON</span> Employee;<br><br><span class="cm">-- Now: User "IT" runs SELECT * FROM Employee</span><br><span class="cm">-- Only sees IT department rows! ✅</span><br><span class="cm">-- User "admin" sees ALL rows ✅</span></div>'},
{q:"What is SQL Server Profiler and Extended Events?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">SQL Server Profiler</span> is the legacy tracing tool — heavy overhead, being deprecated.<br>&#9733; <span class="key">Extended Events</span> is the modern replacement — lightweight, configurable, minimal performance impact.<br>&#9733; Use Extended Events to capture slow queries, deadlocks, errors in production.<br>&#9733; Access via SSMS or system DMVs.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- SQL Server Profiler (old, being deprecated)</span><br><span class="cm">-- Tools > SQL Server Profiler in SSMS</span><br><span class="cm">-- Captures: queries, duration, reads, CPU</span><br><span class="cm">-- ❌ Heavy overhead on production!</span><br><br><span class="cm">-- Extended Events (modern, lightweight ⭐)</span><br><span class="kw">CREATE EVENT SESSION</span> SlowQueries <span class="kw">ON SERVER</span><br><span class="kw">ADD EVENT</span> sqlserver.sql_statement_completed (<br>&nbsp;&nbsp;<span class="kw">WHERE</span> duration > 5000000 <span class="cm">-- queries > 5 seconds</span><br>)<br><span class="kw">ADD TARGET</span> package0.event_file (<br>&nbsp;&nbsp;<span class="kw">SET</span> filename = <span class="str">\'SlowQueries.xel\'</span><br>);<br><br><span class="kw">ALTER EVENT SESSION</span> SlowQueries <span class="kw">ON SERVER STATE</span> = START;<br><br><span class="cm">-- View in SSMS: Management > Extended Events</span></div>'},
{q:"What is Database Sharding? When would you use it?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Sharding</span> horizontally partitions data across multiple database servers.<br>&#9733; Each shard holds a subset of data.<br>&#9733; Strategies: <span class="key">Range</span> (by ID range), <span class="key">Hash</span> (modulo), <span class="key">Geography</span> (by region).<br>&#9733; Use when single server cant handle the load.<br>&#9733; Challenges: cross-shard queries, joins, and maintaining consistency.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Sharding strategies:</span><br><br><span class="cm">-- 1. Range-based: by ID range</span><br><span class="cm">-- Shard 1: Users 1-1000000</span><br><span class="cm">-- Shard 2: Users 1000001-2000000</span><br><br><span class="cm">-- 2. Hash-based: by hash of key</span><br><span class="cm">-- Shard = UserId % NumberOfShards</span><br><span class="cm">-- User 101 % 3 = Shard 2</span><br><br><span class="cm">-- 3. Geography-based</span><br><span class="cm">-- Shard India: Indian users</span><br><span class="cm">-- Shard US: American users</span><br><br><span class="cm">-- Application routes to correct shard</span><br><span class="kw">var</span> shardId = userId % totalShards;<br><span class="kw">var</span> connStr = GetConnectionString(shardId);</div>'},
{q:"What is Replication? Explain Snapshot, Transactional, Merge.",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Snapshot</span> copies entire data periodically — simple but heavy.<br>&#9733; <span class="key">Transactional</span> sends incremental changes in near real-time — most common for reporting replicas.<br>&#9733; <span class="key">Merge</span> allows changes on both sides with conflict resolution — used for mobile/offline scenarios.<br>&#9733; Components: Publisher, Distributor, Subscriber.</div>'},
{q:"What is Always On Availability Groups?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Always On AG</span> provides high availability with automatic failover.<br>&#9733; Primary replica handles writes, secondary replicas are read-only (for reporting).<br>&#9733; Uses <span class="key">synchronous</span> (zero data loss) or <span class="key">asynchronous</span> (better performance) replication.<br>&#9733; Apps connect via a <span class="key">Listener</span> that auto-routes to the active primary.</div><h4>💻 How It Works</h4><div class="code"><span class="cm">-- Architecture:</span><br><span class="cm">-- Primary Replica (read-write) → handles all writes</span><br><span class="cm">--   ↓ sync/async replication</span><br><span class="cm">-- Secondary Replica 1 (read-only) → reporting queries</span><br><span class="cm">-- Secondary Replica 2 (read-only) → backup/DR</span><br><br><span class="cm">-- Benefits:</span><br><span class="cm">-- ✅ Automatic failover (seconds!)</span><br><span class="cm">-- ✅ Read-only secondaries (offload reports)</span><br><span class="cm">-- ✅ Multiple databases in one group</span><br><span class="cm">-- ✅ No shared storage needed</span><br><br><span class="cm">-- Listener: virtual name that auto-routes</span><br><span class="cm">-- App connects to Listener, not specific server</span><br><span class="cm">-- Failover? Listener points to new primary automatically!</span></div>'},
{q:"How do you handle Pagination efficiently in SQL Server?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; Use <span class="key">OFFSET-FETCH</span> for pagination — requires ORDER BY.<br>&#9733; For deep pages (page 1000+), OFFSET becomes slow.<br>&#9733; Use <span class="key">Keyset pagination</span> (WHERE Id > @lastId) for better performance on large datasets.<br>&#9733; Always have an index on the ORDER BY column.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- OFFSET-FETCH (modern, recommended ⭐)</span><br><span class="kw">SELECT</span> Id, Name, Salary<br><span class="kw">FROM</span> Employee<br><span class="kw">ORDER BY</span> Id <span class="cm">-- ORDER BY is REQUIRED!</span><br><span class="kw">OFFSET</span> 20 <span class="kw">ROWS</span> <span class="cm">-- skip first 20</span><br><span class="kw">FETCH NEXT</span> 10 <span class="kw">ROWS ONLY</span>; <span class="cm">-- take next 10 (page 3)</span><br><br><span class="cm">-- Dynamic pagination</span><br><span class="kw">DECLARE</span> @Page INT = 3, @PageSize INT = 10;<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee<br><span class="kw">ORDER BY</span> Id<br><span class="kw">OFFSET</span> (@Page - 1) * @PageSize <span class="kw">ROWS</span><br><span class="kw">FETCH NEXT</span> @PageSize <span class="kw">ROWS ONLY</span>;<br><br><span class="cm">-- Keyset pagination (faster for deep pages)</span><br><span class="kw">SELECT TOP</span> 10 * <span class="kw">FROM</span> Employee<br><span class="kw">WHERE</span> Id > @LastId <span class="cm">-- start after last seen ID</span><br><span class="kw">ORDER BY</span> Id;</div>'},
{q:"What is Parameter Sniffing? How do you fix it?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Parameter Sniffing</span> occurs when SQL Server caches a plan based on the first parameter value.<br>&#9733; Fixes: <span class="key">OPTIMIZE FOR</span> (specific or UNKNOWN), <span class="key">RECOMPILE</span> hint (fresh plan each time), local variables, or <span class="key">Query Store</span> to force a good plan.<br>&#9733; RECOMPILE has CPU overhead but guarantees optimal plan.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- Problem: Plan optimized for DeptId=1 (10 rows)</span><br><span class="cm">-- But DeptId=5 has 100000 rows → same plan = SLOW!</span><br><br><span class="cm">-- Fix 1: OPTIMIZE FOR hint</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = @DeptId<br><span class="kw">OPTION</span> (OPTIMIZE FOR (@DeptId = 5)); <span class="cm">-- optimize for typical value</span><br><br><span class="cm">-- Fix 2: OPTIMIZE FOR UNKNOWN</span><br><span class="kw">OPTION</span> (OPTIMIZE FOR UNKNOWN); <span class="cm">-- uses average statistics</span><br><br><span class="cm">-- Fix 3: RECOMPILE (new plan every time)</span><br><span class="kw">OPTION</span> (RECOMPILE); <span class="cm">-- fresh plan each execution</span><br><br><span class="cm">-- Fix 4: Local variables in stored procedure</span><br><span class="kw">DECLARE</span> @localDept INT = @DeptId;<br><span class="kw">SELECT</span> * <span class="kw">FROM</span> Employee <span class="kw">WHERE</span> DeptId = @localDept;</div>'},
{q:"What are Indexed Views? When should you use them?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">Indexed Views</span> materialize view data on disk with a unique clustered index.<br>&#9733; Reads are instant but writes are slower (must update view too).<br>&#9733; Requires WITH SCHEMABINDING and deterministic expressions.<br>&#9733; Use for: frequently queried aggregations, reporting summaries, dashboards.<br>&#9733; Not for frequently updated tables.</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create view WITH SCHEMABINDING (required!)</span><br><span class="kw">CREATE VIEW</span> vw_DeptSummary <span class="kw">WITH SCHEMABINDING AS</span><br><span class="kw">SELECT</span> DeptId, COUNT_BIG(*) <span class="kw">as</span> EmpCount, SUM(Salary) <span class="kw">as</span> TotalSalary<br><span class="kw">FROM</span> dbo.Employee<br><span class="kw">GROUP BY</span> DeptId;<br><br><span class="cm">-- 2. Create unique clustered index on view</span><br><span class="kw">CREATE UNIQUE CLUSTERED INDEX</span> IX_DeptSummary<br><span class="kw">ON</span> vw_DeptSummary(DeptId);<br><br><span class="cm">-- Now data is physically stored!</span><br><span class="cm">-- SELECT from view is instant (no recalculation)</span><br><span class="kw">SELECT</span> * <span class="kw">FROM</span> vw_DeptSummary; <span class="cm">-- reads stored data ✅</span><br><br><span class="cm">-- ⚠️ INSERT/UPDATE on Employee auto-updates the view</span></div>'},
{q:"What is TDE (Transparent Data Encryption)?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">TDE</span> encrypts database files at rest using AES encryption.<br>&#9733; Protects against physical theft of drives/backups.<br>&#9733; <span class="key">Transparent</span> — no application changes needed.<br>&#9733; Encrypts data files, log files, and backups.<br>&#9733; Must backup the certificate — without it, database cannot be restored on another server.<br>&#9733; Different from Always Encrypted (which encrypts specific columns client-side).</div><h4>💻 Code Example</h4><div class="code"><span class="cm">-- 1. Create master key</span><br><span class="kw">USE</span> master;<br><span class="kw">CREATE MASTER KEY ENCRYPTION BY PASSWORD</span> = <span class="str">\'StrongP@ss123\'</span>;<br><br><span class="cm">-- 2. Create certificate</span><br><span class="kw">CREATE CERTIFICATE</span> TDE_Cert <span class="kw">WITH SUBJECT</span> = <span class="str">\'TDE Certificate\'</span>;<br><br><span class="cm">-- 3. Create database encryption key</span><br><span class="kw">USE</span> MyDatabase;<br><span class="kw">CREATE DATABASE ENCRYPTION KEY</span><br><span class="kw">WITH ALGORITHM</span> = AES_256<br><span class="kw">ENCRYPTION BY SERVER CERTIFICATE</span> TDE_Cert;<br><br><span class="cm">-- 4. Enable encryption</span><br><span class="kw">ALTER DATABASE</span> MyDatabase <span class="kw">SET ENCRYPTION ON</span>;<br><br><span class="cm">-- ✅ Data files (.mdf), log files (.ldf), backups = ALL encrypted</span><br><span class="cm">-- ✅ No app code changes needed!</span><br><span class="cm">-- ⚠️ BACKUP the certificate! Without it, cant restore DB elsewhere</span></div>'},
{q:"What is the difference between OLTP and OLAP?",l:"e",a:'<div class="quick-ans"><b>Quick Answer:</b><br>&#9733; <span class="key">OLTP</span> is optimized for fast transactions — normalized tables, row-store indexes, many concurrent users.<br>&#9733; <span class="key">OLAP</span> is optimized for analytics — denormalized (star/snowflake schema), columnstore indexes, complex aggregations.<br>&#9733; Typically OLTP data is replicated to an OLAP data warehouse for reporting.</div>'},
],
