<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Prep Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(160deg,#0a1628,#0f2847,#0a1e3d);color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:600px;width:100%;padding:30px 20px;text-align:center}
h1{background:linear-gradient(135deg,#38bdf8,#06b6d4,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2.4rem;margin-bottom:8px}
.subtitle{color:#64748b;font-size:.95rem;margin-bottom:30px}
.quote-box{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #1e3a5f;border-radius:16px;padding:28px 24px;margin-bottom:36px;position:relative;overflow:hidden}
.quote-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#0ea5e9,#22d3ee,#06b6d4)}
.quote-icon{font-size:2.5rem;margin-bottom:12px;display:block}
.quote-text{font-size:1.15rem;font-style:italic;color:#cbd5e1;line-height:1.8;margin-bottom:12px}
.quote-author{color:#0ea5e9;font-size:.85rem;font-weight:600}
.btn-refresh{background:none;border:1px solid #1e3a5f;color:#64748b;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.78rem;margin-top:10px;transition:all .2s}
.btn-refresh:hover{border-color:#0ea5e9;color:#0ea5e9}
.links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
.link-card{flex:1;min-width:220px;text-decoration:none;border-radius:16px;padding:28px 20px;transition:all .3s;position:relative;overflow:hidden}
.link-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s}
.link-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.link-card:hover::before{opacity:1}
.link-interview{background:linear-gradient(135deg,#0ea5e9,#0284c7);box-shadow:0 4px 20px rgba(14,165,233,.25)}
.link-interview:hover{box-shadow:0 12px 40px rgba(14,165,233,.35)}
.link-timetable{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 4px 20px rgba(245,158,11,.25)}
.link-timetable:hover{box-shadow:0 12px 40px rgba(245,158,11,.35)}
.link-icon{font-size:2.8rem;display:block;margin-bottom:10px}
.link-title{font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:4px}
.link-desc{font-size:.82rem;color:rgba(255,255,255,.8)}
.footer{color:#334155;font-size:.78rem;margin-top:20px}
.time{color:#0ea5e9;font-size:.9rem;font-weight:500;margin-bottom:20px}
</style>
</head>
<body>
<div class="container">
<h1>My Prep Hub</h1>
<p class="subtitle">Stay focused. Stay consistent. Crack it.</p>
<div class="time" id="clock"></div>

<div class="quote-box">
<span class="quote-icon" id="qIcon">💡</span>
<div class="quote-text" id="quoteText"></div>
<div class="quote-author" id="quoteAuthor"></div>
<button class="btn-refresh" onclick="showQuote()">↻ New Quote</button>
</div>

<div class="links">
<a href="interview.html" class="link-card link-interview">
<span class="link-icon">🎯</span>
<div class="link-title">Interview Prep</div>
<div class="link-desc">OOPs, C#, SQL, MVC, PL/SQL, Web API & more</div>
</a>
<a href="timetable.html" class="link-card link-timetable">
<span class="link-icon">📅</span>
<div class="link-title">Timetable</div>
<div class="link-desc">Daily schedule & study planner</div>
</a>
</div>

<div class="footer">Keep pushing. Every day counts.</div>
</div>

<script>
const QUOTES=[
{t:"Success is not final, failure is not fatal: it is the courage to continue that counts.",a:"Winston Churchill",i:"🔥"},
{t:"The only way to do great work is to love what you do.",a:"Steve Jobs",i:"💡"},
{t:"Believe you can and you're halfway there.",a:"Theodore Roosevelt",i:"✨"},
{t:"Hard work beats talent when talent doesn't work hard.",a:"Tim Notke",i:"💪"},
{t:"Don't watch the clock; do what it does. Keep going.",a:"Sam Levenson",i:"⏰"},
{t:"The secret of getting ahead is getting started.",a:"Mark Twain",i:"🚀"},
{t:"Your future is created by what you do today, not tomorrow.",a:"Robert Kiyosaki",i:"⚡"},
{t:"It does not matter how slowly you go as long as you do not stop.",a:"Confucius",i:"🐢"},
{t:"Push yourself, because no one else is going to do it for you.",a:"Unknown",i:"💥"},
{t:"Wake up with determination. Go to bed with satisfaction.",a:"Unknown",i:"🌅"},
{t:"Dream big. Start small. Act now.",a:"Robin Sharma",i:"🎯"},
{t:"The pain you feel today will be the strength you feel tomorrow.",a:"Unknown",i:"🏋️"},
{t:"Code is like humor. When you have to explain it, it's bad.",a:"Cory House",i:"😄"},
{t:"First, solve the problem. Then, write the code.",a:"John Johnson",i:"🧠"},
{t:"The best error message is the one that never shows up.",a:"Thomas Fuchs",i:"🐛"},
{t:"Discipline is the bridge between goals and accomplishment.",a:"Jim Rohn",i:"🌉"},
{t:"Success usually comes to those who are too busy to be looking for it.",a:"Henry David Thoreau",i:"🏆"},
{t:"Don't be afraid to give up the good to go for the great.",a:"John D. Rockefeller",i:"🌟"},
{t:"I find that the harder I work, the more luck I seem to have.",a:"Thomas Jefferson",i:"🍀"},
{t:"The expert in anything was once a beginner.",a:"Helen Hayes",i:"📚"},
{t:"Stay hungry, stay foolish.",a:"Steve Jobs",i:"🍎"},
{t:"Talk is cheap. Show me the code.",a:"Linus Torvalds",i:"💻"},
{t:"Simplicity is the soul of efficiency.",a:"Austin Freeman",i:"✂️"},
{t:"Any fool can write code that a computer can understand. Good programmers write code that humans can understand.",a:"Martin Fowler",i:"🧑‍💻"},
{t:"One day or day one. You decide.",a:"Unknown",i:"📆"}
];

function showQuote(){
const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
document.getElementById('qIcon').textContent=q.i;
document.getElementById('quoteText').textContent='"'+q.t+'"';
document.getElementById('quoteAuthor').textContent='— '+q.a;
}
showQuote();

function updateClock(){
const now=new Date();
const opts={weekday:'long',year:'numeric',month:'long',day:'numeric'};
const time=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
const date=now.toLocaleDateString('en-US',opts);
document.getElementById('clock').textContent=date+' • '+time;
}
updateClock();
setInterval(updateClock,60000);
</script>
</body>
</html>
